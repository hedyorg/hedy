        obst = ['Apfel', 'Banane', 'Kirsche']
        {print} obst
-   name: Nimm ein Element aus einer Liste
    explanation: Um ein Element aus einer Liste zu erhalten, verwenden wir [zahl]. Mit obst[1] erhalten wir also das erste Obst aus der Liste!
