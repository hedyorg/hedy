-   name: '{add}'
    explanation: '`{add}` fügt ein Ding zu einer `{to_list}`-Liste hinzu.'
    demo_code: "tiere {is} Kuh, Katze \n{add} Hund {to_list} tiere"
-   name: '{remove}'
    explanation: '`{remove}` ein Element `{from}` einer Liste.'
