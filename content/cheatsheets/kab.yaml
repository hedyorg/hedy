-   name: Yemgarrad ɣef
    explanation: Nesseqdac `!=` i usenqed ma yella magarradent snat n tɣawsiwin.
    demo_code: "tiririt = {ask} 'D acu ara d-imudd 5 * 5?'\n{if} tiririt != 25\n    {print} 'Ur iṣeḥḥa ara!'"
-   name: Ameẓẓyan neɣ yeεdel
    explanation: Nesseqdac `<=`i usenqed ma yella uṭṭun amezwaru meẓẓiy neɣ yeεdel akked wuṭṭun wis sin
