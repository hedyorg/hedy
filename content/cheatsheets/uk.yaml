13:
-   name: '{and}'
    explanation: Обидві частини повинні бути правильними.
    demo_code: |-
        відповідь1 = {ask} 'Скільки буде 3+2?'
        відповідь2 = {ask} 'Скільки буде 2+2?'
        {if} відповідь1 {is} 5 {and} відповідь2 {is} 4
            {print} 'Обидві відповіді правильні!'
        {else}
            {print} 'Щонайменше одна неправильна відповідь!'
-   name: '{or}'
    explanation: Принаймні 1 з двох частин повинна бути правильною. Якщо обидві правильні, це теж добре.
    demo_code: |-
        відповідь1 = {ask} 'Скільки буде 3+2?'
        відповідь2 = {ask} 'Скільки буде 2+2?'
        {if} відповідь1 {is} 5 {or} відповідь2 {is} 4
            {print} 'Щонайменше одна правильна відповідь!'
        {else}
            {print} 'Обидві відповіді неправильні!'
14:
-   name: Менший
    explanation: Для перевірки того, чи перше число є меншим за друге, використовується символ `<`.
    demo_code: |-
        вік = {ask} 'Скільки тобі років?'
        {if} вік < 13
            {print} 'Ти молодший від мене!'
-   name: Більший
    explanation: Для перевірки того, чи перше число є більшим за друге, використовується символ `>`.
    demo_code: |-
        вік = {ask} 'Скільки тобі років?'
        {if} вік > 13
            {print} 'Ти старший від мене!'
-   name: Дорівнює
    explanation: Ми використовуємо `==`, щоб перевірити, чи є дві речі однаковими.
    demo_code: |-
        відповідь = {ask} 'Скільки буде 5 * 5?'
        {if} відповідь == 25
            {print} 'Правильно!'
-   name: Не дорівнює
    explanation: Ми використовуємо `!=` для перевірки того, що дві речі не є однаковими.
    demo_code: |-
        відповідь = {ask} 'Скільки буде 5 * 5?'
        {if} відповідь != 25
            {print} 'Неправильно!'
-   name: Менше або дорівнює
    explanation: Ми використовуємо `<=` для перевірки того, чи перше число менше або дорівнює другому числу.
    demo_code: |-
        вік = {ask} 'Скільки тобі років?'
        {if} вік <= 12
            {print} 'Ти молодший від мене!'
-   name: Більше або дорівнює
    explanation: Ми використовуємо `>=` для перевірки, чи є перше число більшим або рівним другому числу.
    demo_code: |-
        вік = {ask} 'Скільки тобі років?'
        {if} вік >= 14
            {print} 'Ти старший від мене!'
