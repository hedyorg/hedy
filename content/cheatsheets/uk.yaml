1:
-   name: '{print}'
    explanation: Надрукуйте щось за допомогою `{print}`.
    demo_code: '{print} Привіт, ласкаво просимо в Hedy!'
-   name: '{ask}'
    explanation: Запитайте щось за допомогою `{ask}`.
    demo_code: '{ask} Який ваш улюблений колір?'
-   name: '{answer}'
    explanation: Повторіть щось, використовуючи `{answer}`.
    demo_code: |-
        {ask} Який ваш улюблений колір?
        {print} тож ваш улюблений колір {answer}
-   name: '{forward}'
    explanation: Проведіть лінію за допомогою `{forward}`.
    demo_code: '{forward} 100'
-   name: '{turn}'
    explanation: Поверніть малюнок черепашки за допомогою `{turn}`.
    demo_code: |-
        {forward} 25
        {turn} {left}
        {forward} 25
        {turn} {right}
2:
-   name: '{is}'
    explanation: Назвіть щось за допомогою `{is}`. Ви самі можете вибрати назву.
    demo_code: |-
        імʼя {is} Хейді
        {print} ласкаво просимо, імʼя
-   name: '{sleep}'
    explanation: Із `{sleep}` , ви можете змусити Hedy затримуватися на секунду, або на кілька секунд.
    demo_code: |-
        {sleep} 3
3:
-   name: Виберіть випадкове
    explanation: Виберіть довільне слово з групи з `{at}` і `{random}``.
    demo_code: |-
        тварини {is} собака, кіт, кенгуру
        {print} тварини {at} {random}
-   name: '{add}'
    explanation: '`{add}` елемент `{to_list}` списку.'
    demo_code: |-
        тварини {is} корова, кіт
        {add} собака {to_list} тварини
-   name: '{remove}'
    explanation: '`{remove}` елемент `{from}` списку.'
    demo_code: |-
        тварини {is} кіт, собака, корова
        {remove} собака {from} тварини
4:
-   name: '{print}'
    explanation: Друкуй конкретні фрази за допомогою лапок.
    demo_code: '{print} ''Привіт, вітаємо в Хейді.'''
-   name: '{is}'
    explanation: Назвіть якись текст і `{print}` його без лапок.
    demo_code: |-
        імʼя {is} Хейді
        {print} 'мене звати ' імʼя
9:
-   name: '{if} з багатьма лініями'
    explanation: Запитай про суму чисел за допомогою команди `{ask}` і перевір відповідь. Тепер ми друкуємо дві лінії.
    demo_code: |-
        відповідь = {ask} "Скільки буде 10 додати 10?"
        {if} відповідь {is} 20
            {print} 'Молодець!!!'
            {print} 'Відповідь дійсно' відповідь
        {else}
            {print} 'Неправильно'
            {print} 'Відповідь 20'
-   name: '{repeat} з багатьма лініями'
    explanation: Повторіть кілька рядків.
    demo_code: |-
        {repeat} 4 {times}
            {print} 'Hello!'
12:
-   name: плавати безпосередньо
    explanation: Десяткові числа.
    demo_code: |-
        {print} 'Порахуємо!'
        {print} 'Два з половиною додати два з половиною це...'
        {print} 2.5 + 2.5
-   name: визнач текст
    explanation: Текст в лапках після `=`
    demo_code: |-
        імʼя= 'Робот Хейді'
        {print} 'Привіт ' імʼя
-   name: лапки після оператора зрівняння `{if}`
    explanation: Текст в лапках після `{if}`.
    demo_code: |-
        імʼя = {ask} 'Ти хто?'
        {if} імʼя = 'Хейді'
            {print} 'Привіт!'
13:
-   name: '{and}'
    explanation: Обидві частини повинні бути правильними.
    demo_code: |-
        відповідь1 = {ask} 'Скільки буде 3+2?'
        відповідь2 = {ask} 'Скільки буде 2+2?'
        {if} відповідь1 {is} 5 {and} відповідь2 {is} 4
            {print} 'Обидві відповіді правильні!'
        {else}
            {print} 'Щонайменше одна неправильна відповідь!'
-   name: '{or}'
    explanation: Принаймні 1 з двох частин повинна бути правильною. Якщо обидві правильні, це теж добре.
    demo_code: |-
        відповідь1 = {ask} 'Скільки буде 3+2?'
        відповідь2 = {ask} 'Скільки буде 2+2?'
        {if} відповідь1 {is} 5 {or} відповідь2 {is} 4
            {print} 'Щонайменше одна правильна відповідь!'
        {else}
            {print} 'Обидві відповіді неправильні!'
14:
-   name: Менший
    explanation: Для перевірки того, чи перше число є меншим за друге, використовується символ `<`.
    demo_code: |-
        вік = {ask} 'Скільки тобі років?'
        {if} вік < 13
            {print} 'Ти молодший від мене!'
-   name: Більший
    explanation: Для перевірки того, чи перше число є більшим за друге, використовується символ `>`.
    demo_code: |-
        вік = {ask} 'Скільки тобі років?'
        {if} вік > 13
            {print} 'Ти старший від мене!'
-   name: Дорівнює
    explanation: Ми використовуємо `==`, щоб перевірити, чи є дві речі однаковими.
    demo_code: |-
        відповідь = {ask} 'Скільки буде 5 * 5?'
        {if} відповідь == 25
            {print} 'Правильно!'
-   name: Не дорівнює
    explanation: Ми використовуємо `!=` для перевірки того, що дві речі не є однаковими.
    demo_code: |-
        відповідь = {ask} 'Скільки буде 5 * 5?'
        {if} відповідь != 25
            {print} 'Неправильно!'
-   name: Менше або дорівнює
    explanation: Ми використовуємо `<=` для перевірки того, чи перше число менше або дорівнює другому числу.
    demo_code: |-
        вік = {ask} 'Скільки тобі років?'
        {if} вік <= 12
            {print} 'Ти молодший від мене!'
-   name: Більше або дорівнює
    explanation: Ми використовуємо `>=` для перевірки, чи є перше число більшим або рівним другому числу.
    demo_code: |-
        вік = {ask} 'Скільки тобі років?'
        {if} вік >= 14
            {print} 'Ти старший від мене!'
15:
-   name: '{while}'
    explanation: Ми можемо використовувати цикл `{while}` з оператором нерівності.
    demo_code: |-
        відповідь = 0
        {while} відповідь != 25
            відповідь = {ask} 'Скільки буде 5 помножити на 5?'
        {print} 'Подана правильна відповідь'
-   name: Менше {while}
    explanation: Також можна використовувати цикл `{while}` з операторами `<` та `>`.
    demo_code: |-
        лічник = 1
        {while} лічник < 3
            {print} 'Повторюємо ще ' 3 - лічник ' разів'
            лічник = лічник + 1
        {print} 'Ми закінчили'
16:
-   name: квадратні дужки
    explanation: Списки у квадратних дужках.
    demo_code: |-
        фрукти = ['яблуко', 'банан', 'вишня']
        {print} фрукти
-   name: Отримати елемент зі списку
    explanation: Для отримання елементу зі списку ми використовуємо [число], тому фрукти[1] означає отримати перший фрукт зі списку!
    demo_code: |-
        фрукти = ['банан', 'яблуко', 'вишня']
        першийфрукт = фрукти[1]
        {print} першийфрукт
-   name: Отримати випадковий елемент зі списку
    explanation: Для отримання випадкового елемента зі списку ми використовуємо [{random}], тому фрукти[{random}] означає, отримати довільний фрукт зі списку!
    demo_code: |-
        фрукти = ['банан', 'яблуко', 'вишня']
        випадковий_фрукт = фрукти[{random}]
        {print} випадковий_фрукт
17:
-   name: '{elif}'
    explanation: '`{elif}`'
    demo_code: |-
        a = 2
        {if} a == 1:
            {print} 'a це 1'
        {elif} a == 2:
            {print} 'a це 2'
        {else}:
            {print} 'a це не 1 і не 2'
-   name: '{print}'
    explanation: Коли ми використовуємо `{for}`, ми повинні ставити `:` за оператором `{for}`!
    demo_code: |-
        {for} i {in} {range} 1 {to} 12:
            {print} i
        {print} 'Готові чи ні, я іду!'
-   name: '{if}'
    explanation: Ми повинні робити те ж саме з усіма нашими операторами `{if}`.
    demo_code: |-
        колір = {ask} 'Який твій улюблений колір?'
        {if} колір == 'зелений':
            {print} 'Зелений твій улюблений колір'
        {else}:
            {print} 'Зелений не твій улюблений колір'
18:
-   name: '{print}'
    explanation: Після `{print}` потрібно використовувати круглі дужки.
    demo_code: '{print}(''привіт!'')'
-   name: '{range}'
    explanation: Після `{range}` потрібно використовувати круглі дужки.
    demo_code: |-
        {for} i {in} {range} (1,10):
            {print}('Привіт раз ', i)
-   name: '{print} зі змінною'
    explanation: З `{print}` потрібно використовувати круглі дужки і коми, якщо ви друкуєте більше елементів.
    demo_code: |-
        імʼя = 'Хейді'
        {print}('мене звати ', імʼя)
-   name: запитайте щось за допомогою {input}
    explanation: Використовуйте `{input}` замість `{ask}`, щоб щось запитати.
    demo_code: |-
        імʼя = {input}('Як тебе звати?')
        {print}('Отже, тебе звати ', імʼя)
