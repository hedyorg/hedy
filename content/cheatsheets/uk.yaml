    demo_code: |-
        відповідь = 0
        {while} відповідь != 25
            відповідь = {ask} 'Скільки буде 5 помножити на 5?'
        {print} 'Подана правильна відповідь'
-   name: Менше {while}
    explanation: Також можна використовувати цикл `{while}` з операторами `<` та `>`.
    demo_code: |-
        лічник = 1
        {while} лічник < 3
            {print} 'Повторюємо ще ' 3 - лічник ' разів'
            лічник = лічник + 1
        {print} 'Ми закінчили'
