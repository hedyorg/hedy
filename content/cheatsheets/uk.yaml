        {print} колір твій улюблений!
-   name: '{sleep}'
    explanation: Із `{sleep}` , ви можете змусити Hedy затримуватися на секунду, або на кілька секунд.
    demo_code: |-
        {print} Одну секунду, дайте подумати...
        {sleep}
        {print} Хм.. Мені потрібно ще 3 секунди...
        {sleep} 3
        {print} Еврика! В мене получилось!
-   name: '{is} з черепашкою'
