1:
-   name: '{print}'
    explanation: '`{print}`로 출력 합니다.'
    demo_code: '{print} 안녕 어서와 Hedy!'
-   name: '{ask}'
    explanation: '`{ask}`로 물어본다.'
    demo_code: '{ask} 너의 가장 좋아하는 색깔은 무었이니?'
-   name: '{answer}'
    explanation: '`{answer}`를 사용하여 무엇인가를 반복한다.'
    demo_code: |-
        {ask} 너의 가장 좋아하는 색깔은 무었이니?
        {print} so your favorite 색깔 is {answer}
-   name: '{forward}'
    explanation: '`{forward}`로 선을 그립니다.'
    demo_code: '{forward} 100'
-   name: '{turn}'
    explanation: 그림 거북이를 `{turn}`으로 돌려주세요.
    demo_code: |-
        {forward} 25
        {turn} {left}
        {forward} 25
        {turn} {right}
2:
-   name: '{is}'
    explanation: '`{is}`를 사용하여 프로그램에서 사용할 단어의 이름을 지정합니다. 직접 이름을 선택할 수 있습니다.'
    demo_code: |-
        이름 {is} Hedy
        {print} 어서와 이름
-   name: '{sleep}'
    explanation: '`{sleep}`은 Hedy를 잠시 쉬게 해준다.'
    demo_code: |-
        {sleep} 3
3:
-   name: Choose random
    explanation: '`{at}`와 `{random}`을 가진 그룹에서 랜덤_과일 단어를 선택한다.'
    demo_code: |-
        동물들 {is} 강아지, 고양이, 캥거루
        {print} 동물들 {at} {random}
-   name: '{add}'
    explanation: '`{add}` 항목 `{to_list}` 목록입니다.'
    demo_code: |-
        동물들 {is} 소, 고양이
        {add} 강아지 {to_list} 동물들
-   name: '{remove}'
    explanation: 항목 `{remove}` 목록 `{from}`.
    demo_code: |-
        동물들 {is} 고양이, 강아지, 소
        {remove} 강아지 {from} 동물들
4:
-   name: '{print}'
    explanation: 따옴표를 사용하여 정확하게 print합니다.
    demo_code: '{print} ''안녕 어서와 Hedy.'''
-   name: '{is}'
    explanation: 일부 텍스트와 따옴표 없이 `{print}`에 이름을 붙여라.
    demo_code: |-
        이름 {is} Hedy
        {print} '나의 이름은 ' 이름
9:
-   name: '{if}를 여러 라인과 함께'
    explanation: 질문의 총합을 `{ask}`로 맞춘 다음 그것이 맞는지 확인한다. 이제 우리는 두 줄을 출력한다.
    demo_code: |-
        대답 = {ask} '10 더하기 10은 무엇이니?'
        {if} 대답 {is} 20
            {print} '잘했어!!'
            {print} '결국 정답은 ' 대답
        {else}
            {print} '틀렸어'
            {print} '정답은 20'
-   name: '{repeat}를 여러 라인과 함께'
    explanation: 여러 줄을 반복합니다.
    demo_code: |-
        {repeat} 4 {times}
            {print} 'Hello!'
13:
-   name: '{print}'
-   name: '{print} with a variable'
-   name: 'ask something with {input}'
-   name: '{if} {elif} {else}'
-   name: Smaller
    explanation: 우리는 `<`를 사용하여 첫 번째 숫자가 두 번째 숫자보다 작은지 확인합니다.
    demo_code: |-
        나이 = {input}('How old are you?')
        {if} 나이 < 13:
            {print}('You are younger than me!')
-   name: Bigger
    explanation: 첫 번째 숫자가 두 번째 숫자보다 큰지 확인할 때는 `>`를 사용합니다.
    demo_code: |-
        나이 = {input}('How old are you?')
        {if} 나이 > 13:
            {print}('You are older than me!')
-   name: Equal
    explanation: 우리는 `==`를 사용하여 두 가지가 같은지 확인합니다.
    demo_code: |-
        대답 = {input}('5 * 5는 무었이니?')
        {if} 대답 == 25:
            {print}('맞았어!')
-   name: Not equal
    explanation: 우리는 `!=`를 사용하여 두 가지가 같지 않은지 확인합니다.
    demo_code: |-
        대답 = {input}('5 * 5는 무었이니?')
        {if} 대답 != 25:
            {print}('틀렸어!')
-   name: Smaller or equal
    explanation: 우리는 `<=`를 사용하여 첫 번째 숫자가 두 번째 숫자보다 작거나 같은지 확인합니다.
    demo_code: |-
        나이 = {input}('How old are you?')
        {if} 나이 <= 12:
            {print}('You are younger than me!')
-   name: Bigger or equal
    explanation: 첫 번째 숫자가 두 번째 숫자보다 크거나 같은지 확인하기 위해 `>=`를 사용합니다.
    demo_code: |-
        나이 = {input}('How old are you?')
        {if} 나이 >= 14:
            {print}('You are older than me!')
14:
-   name: 'creating a list'
    explanation: 대괄호가 있는 목록입니다.
    demo_code: |-
        과일 = ['사과', '바나나', '체리']
16:
-   name: '{while}'
    explanation: 우리는 `{while}` 루프를 동일하지 않게 사용할 수 있다.
    demo_code: |-
        대답 = 0
        {while} 대답 != 25:
            대답 = {input}('5 곱하기 5는 뭐지?')
        {print}('정답은 다음과 같다')
-   name: '{while} with > and <'
    explanation: 또한 `<`와 `>`와 함께 `{while}` 루프를 사용할 수 있다.
    demo_code: |-
        숫자 = 1
        {while} 숫자 < 3:
            {print} ('우리는 이것을 ', 3 - 숫자, '번 할거야')
            숫자 = 숫자 + 1
        {print}('우리는 해냈어')
18:
-   name: '{print}'
    explanation: '`{print}` 뒤에는 괄호를 사용해야 합니다.'
    demo_code: '{print}(''hi!'')'
-   name: '{range}'
    explanation: '`{range}` 뒤에는 괄호를 사용해야 합니다.'
    demo_code: |-
        {for} i {in} {range} (1,10):
            {print}('안녕, 반복 ', i)
-   name: '{print}를 변수와 함께'
    explanation: '`{print}`에서는 항목을 더 print할 경우 괄호와 쉼표를 사용해야 합니다.'
    demo_code: |-
        이름 = 'Hedy'
        {print}('나의 이름은 ', 이름)
-   name: 무언가 질문할 때는 {input}
    explanation: 질문할 때는 `{ask}` 대신 `{input}`을 사용한다.
    demo_code: |-
        이름 = {input}('너의 이름은 무엇이니?')
        {print}('그래서 너의 이름은 ', 이름)
