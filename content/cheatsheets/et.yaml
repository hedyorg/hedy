        {ask} Mis on su lemmikvärv?
        {print} nii et su lemmikvärv on {answer}
-   name: '{forward}'
    explanation: Tõmba joon kasutades `{forward}` käsku.
    demo_code: '{forward} 100'
-   name: '{turn}'
    explanation: Pööra joonistuskilpkonna `{turn}` abil.
    demo_code: |-
