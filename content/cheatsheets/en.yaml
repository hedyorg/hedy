1:
-   name: '{print}'
    explanation: Print something with `{print}`.
    demo_code: '{print} Hello welcome to Hedy!'
-   name: '{ask}'
    explanation: Ask something with `{ask}`.
    demo_code: '{ask} What is your favorite sport?'
-   name: '{answer}'
    explanation: Print the answer using `{answer}`.
    demo_code: |-
        {ask} What is your favorite sport?
        {print} so your favorite sport is {answer}
-   name: '{play}'
    explanation: Play a musical note with `{play}`.
    demo_code: |-
        {play} C5
-   name: '{forward}'
    explanation: Draw a line with `{forward}`.
    demo_code: '{forward} 100'
-   name: '{turn}'
    explanation: Turn the drawing turtle with `{turn}`.
    demo_code: |-
        {forward} 25
        {turn} {left}
        {forward} 25
        {turn} {right}
2:
-   name: '{is}'
    explanation: Use a variable with `{is}`.
    demo_code: |-
        name {is} Hedy
        {print} welcome name
-   name: '{ask}'
    explanation: Ask something with `{ask}`. Beware! You need to use a variable with `{is}`.
    demo_code: |-
        sport {is} {ask} What is your favorite sport?
        {print} sport is your favorite!
-   name: '{sleep}'
    explanation: With `{sleep}`, you can let Hedy pause for a (couple of) second(s).
    demo_code: |-
        {sleep} 3
-   name: '{turn} 90'
    explanation: Instead of just `{right}` and `{left}`, you can now make turn of all degrees possible.
    demo_code: |-
        {forward} 100
        {turn} 90
        {forward} 100
        {turn} -90
-   name: 'These keywords have stayed the same'
    explanation: '`{print}`, `{play}`, `{forward}`'
    demo_code: |-
        # print
        {print} hello world 🌍
        # play
        {play} C5
        # forward
        {forward} 100
