13:
-   name: '{print}'
-   name: '{print} with a variable'
-   name: 'ask something with {input}'
-   name: '{if} {elif} {else}'
-   name: Kisebb
    explanation: A `<` ellenőrzi, hogy az első szám kisebb-e, mint a második.
    demo_code: |-
        kor = {input}('Hány éves vagy?')
        {if} kor < 13:
         {print}('Fiatalabb vagy, mint én!')
-   name: Nagyobb
    explanation: A `>` ellenőrzi, hogy az első szám nagyobb-e, mint a második.
    demo_code: |-
        kor = {input}('Hány éves vagy?')
        {if} kor < 13:
         {print}('Idősebb vagy, mint én!')
16:
-   name: '{while}'
    explanation: Használhatjuk a `{while}` hurkot a nem egyenlővel.
    demo_code: |-
        valasz = 0
        {while} valasz != 25:
          valasz = {input}('Mennyi 5-ször 5?')
        {print}('A helyes válasz megadásra került')
-   name: '{while} with > and <'
    explanation: |-
        Használhatjuk a `{while}` ciklust a `<` és `>` karakterekkel is.
    demo_code: |-
        szam = 1
        {while} szam < 3:
          {print}('Ezt ', 3 - szam, ' alkalommal ismételjük')
          szam = szam + 1
        {print}('Készen vagyunk')
14:
-   name: 'creating a list'
    explanation: Listáknál szögletes zárójelet fogunk használni! A lista egyes elemeit aposztrófok (') közé tesszük.
    demo_code: |-
        gyumolcs = ['alma', 'banán', 'cseresznye']
17:
-   name: 'for ezzel:'
    explanation: Ha a `for` utasítást használjuk, egy  `:`-ot teszünk a `for` utasítás végére!
    demo_code: |-
        for i in range 1 to 12:
            print i
        print 'Aki bújt, aki nem, megyek!'
-   name: 'if ezzel:'
    explanation: Ugyanúgy kell eljárnunk `if` állítás esetén
    demo_code: |-
        szin = ask 'Mi a kedvenc színed?'
        if szin is 'zöld':
            print 'a szín zöld'
        else:
            print 'A szin nem zöld'
-   name: elif
    explanation: 'Mutatunk neked egy új utasítást, amit ezután használhatsz: `elif`. Az `elif` azt jelenti "else if". Először leellenőrizzük hogy `if` helyes-e, ha nem helyes, megnézzük az `elif` feltételt és ha ez sem helyes, akkor `else` utasításhoz megyünk.'
    demo_code: |-
        a = 2
        if a is 1:
            print 'a értéke 1'
        elif a is 2:
            print 'a értéke 2'
        else:
            print 'a értéke nem 1 vagy 2'
18:
-   name: '{print}'
    explanation: A `{print}` után zárójeleket kell használni.
    demo_code: '{print}(''hi!'')'
-   name: '{print} with var'
    explanation: A `{range}` után zárójeleket kell használni.
    demo_code: |-
        name = 'Hedy'
        {print}('my name is ', name)
-   name: '{print} with var'
    explanation: A `{print}`-nél zárójeleket és vesszőket kell használnod, ha több elemet írsz ki.
    demo_code: |-
        name = 'Hedy'
        {print}('my name is ', name)
-   name: ask something with {input}
    explanation: Használd az `{input}`-ot az `{ask}` helyett, ha kérdezni akarsz valamit.
    demo_code: |-
        name = {input}('What is your name?')
        {print}('So your name is ', name)
