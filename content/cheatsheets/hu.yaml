2:
-   name: '{is}'
    explanation: Nevezz el egy szót az `{is}` paranccsal, és használd a programban. Tetszőleges nevet választhatsz.
    demo_code: |-
        név {is} Hedy
        {print} szia név
-   name: '{sleep}'
    explanation: A `{sleep}` segítségével megállítható a Hedy egy (néhány) másodpercig.
    demo_code: |-
        {sleep} 3
