    demo_code: |-
        {print} 'Ciao benvenuta/o su Hedy.'
-   name: {is}
    explanation: Dai un nomignolo ad un testo e scrivilo con `{print}` senza usare le virgolette
    demo_code: |-
        nome {is} Hedy
        {print} 'Il mio nome è ' nome