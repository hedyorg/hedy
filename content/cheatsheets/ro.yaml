1:
-   name: '{print}'
    explanation: Printeaza ceva cu `{print}`.
    demo_code: '{print} Hello welcome to Hedy!'
-   name: '{ask}'
    explanation: Ask something with `{ask}`.
    demo_code: '{ask} What is your favorite color?'
-   name: '{answer}'
    explanation: Repeat something using `{answer}`.
    demo_code: |-
        {ask} What is your favorite color?
        {print} so your favorite color is {answer}
-   name: '{forward}'
    explanation: Draw a line with `{forward}`.
    demo_code: '{forward} 100'
-   name: '{turn}'
    explanation: Turn the drawing turtle with `{turn}`.
    demo_code: |-
        {forward} 25
        {turn} {left}
        {forward} 25
        {turn} {right}
2:
-   name: '{is}'
    explanation: Give a word a name to use in the program using `{is}`. You can choose the name yourself.
    demo_code: |-
        Numele {is} Hedy
        {print} salutare nume
-   name: '{sleep}'
    explanation: '`{sleep}` let Hedy pause for a (couple of) second(s).'
    demo_code: |-
        {sleep} 3
12:
-   name: float directly
    explanation: Decimal numbers.
    demo_code: |-
        {print} 'Calculate away!'
        {print} 'Two and a half plus two and a half is...'
        {print} 2.5 + 2.5
-   name: assign text
    explanation: Text with quotation marks after `=`
    demo_code: |-
        name = 'Hedy the Robot'
        {print} 'Hello ' name
-   name: quotes after {if} comparison
    explanation: Text with quotation marks after `{if}`.
    demo_code: |-
        name = {ask} 'Who are you?'
        {if} name = 'Hedy'
            {print} 'Hi there!'
-   name: quotes in list
    explanation: A list with quotation marks.
    demo_code: |-
        superheroes = 'Iron Man', 'Batman', 'Superman'
        {print} superheroes {at} {random}
16:
-   name: square brackets
    explanation: Lists with square brackets.
    demo_code: |-
        fruit = ['apple', 'banana', 'cherry']
        {print} fruit
-   name: Get an item from a list
    explanation: To get an item from a list we use [number] so fruit[1] means, get the first fruit from the list!
    demo_code: |-
        fruit = ['banana', 'apple', 'cherry']
        firstfruit = fruit[1]
        {print} firstfruit
-   name: Get a random item from a list
    explanation: To get a random item from a list we use [random] so fruit[random] means, get a random fruit from the list!
    demo_code: |-
        fruit = ['banana', 'apple', 'cherry']
        random_fruit = fruit[{random}]
        {print} random_fruit
