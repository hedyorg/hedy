16:
-   name: {while}
    explanation: We kinne dus in `{while}`-lus brûke mei de `True` en `False`
    demo_code: |-
        antwoord = 0
        {while} antwoord != 25:
            antwurd = {input}('Wat is 5 kear 5?')
        {print}('Dat wie it goede antwurd!')
-   name: Smaller {while}
    explanation: We kinne in `{while}`-lus ek brûke mei `<` en `>`.
    demo_code: |-
        tel = 1
        {while} tel < 3
            {print}('Dit is de ', tel, 'e kear')
            tel = tel + 1
        {print}('We zijn klaar')
