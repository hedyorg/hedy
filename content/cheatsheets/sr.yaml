-   name: '{if} са више линија'
    explanation: Одговор на збир питања са `{ask}` и види да ли је тачан. Сада исписујемо две линије.
    demo_code: |-
        answer = {ask} 'Колико је 10 плус 10?'
        {if} answer {is} 20
            {print} 'Браво!!'
            {print} 'Одговор је заиста' answer
        {else}
            {print} 'Погрешно'
            {print} 'Одговор је 20'
