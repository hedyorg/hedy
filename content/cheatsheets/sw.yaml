    demo_code: |-
        {print} Salamu, karibu Hedy!
-   name: '{ask}'
    explanation: Kuliza mtumiaji achapishe kitu, tumia neno `{ask}`.
    demo_code: |-
        {ask} Unaitwa nani?
-   name: '{answer}'
    explanation: Rudia kuchapisha kitu kwa kutumia neno `{answer}`.
    demo_code: |-
        {ask} Unaitwa nani?
        {print} Sawa, Kumbe unaitwa {answer}
-   name: '{forward}'
    explanation: Draw a line with `{forward}`.
    demo_code: '{forward} 100'
-   name: '{turn}'
    explanation: turn the drawing turtle with `{turn}`
