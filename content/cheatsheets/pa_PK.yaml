
6:
-   name: '{print}'
    explanation: Print exactly using quotation marks.
    demo_code: '{print} ''5 times 5 is '' 5 * 5'
-   name: '{ask}'
    explanation: Ask for a calculation and check whether it is correct.
    demo_code: |-
        answer = {ask} 'What is 10 plus 10?'
        {if} answer {is} 20 {print} 'Yes!' {else} {print} 'Oops'
-   name: '{ask} and {if} with turtle'
    explanation: Ask the user how many angles they want.
    demo_code: |-
        angles = {ask} 'How many angles?'
        angle = 360 / angles
        {forward} 50
12:
-   name: float directly
    explanation: Decimal numbers.
    demo_code: |-
        {print} 'Calculate away!'
        {print} 'Two and a half plus two and a half is...'
        {print} 2.5 + 2.5
-   name: assign text
    explanation: Text with quotation marks after `=`
    demo_code: |-
        name = 'Hedy the Robot'
        {print} 'Hello ' name
-   name: quotes after {if} comparison
    explanation: Text with quotation marks after `{if}`.
    demo_code: |-
        name = {ask} 'Who are you?'
        {if} name = 'Hedy'
            {print} 'Hi there!'
-   name: quotes in list
    explanation: A list with quotation marks.
    demo_code: |-
        superheroes = 'Iron Man', 'Batman', 'Superman'
        {print} superheroes {at} {random}
16:
-   name: square brackets
    explanation: Lists with square brackets.
    demo_code: |-
        fruit = ['apple', 'banana', 'cherry']
        {print} fruit
-   name: Get an item from a list
    explanation: To get an item from a list we use [number] so fruit[1] means, get the first fruit from the list!
    demo_code: |-
        fruit = ['banana', 'apple', 'cherry']
        firstfruit = fruit[1]
        {print} firstfruit
-   name: Get a random item from a list
    explanation: To get a random item from a list we use [random] so fruit[random] means, get a random fruit from the list!
    demo_code: |-
        fruit = ['banana', 'apple', 'cherry']
        random_fruit = fruit[{random}]
        {print} random_fruit
