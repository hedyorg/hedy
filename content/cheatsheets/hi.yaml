-   name: छोटा {while}
    explanation: हम `{while}` लूप का उपयोग `<` और `>` के साथ भी कर सकते हैं।
    demo_code: |-
        गिनती = 1
        {while} गिनती <3
            {print} 'हम ऐसा करते हैं' 3 - गिनती 'अधिक बार'
            गिनती = गिनती + 1
        {print} 'हम कर चुके हैं'
