-   name: '{if} एकाधिक पंक्तियों के साथ'
    explanation: '`{ask}` के साथ प्रश्नों के योग का उत्तर दें और देखें कि क्या यह सही है। अब हम दो पंक्तियाँ प्रिंट करते हैं।'
