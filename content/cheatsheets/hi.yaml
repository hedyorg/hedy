17:
-   name: '{elif}'
    explanation: '`{elif}`'
    demo_code: |-
        अ = 2
        {if} अ == 1:
            {print} 'अ 1 है'
        {elif} अ == 2:
            {print} 'अ 2 है'
        {else}:
            {print} 'अ 1 या 2 नहीं है'
-   name: '{print}'
    explanation: जब हम `{for}` का उपयोग करते हैं, तो हमें `{for}` कथन के पीछे `:` लगाने की आवश्यकता होती है!
    demo_code: |-
