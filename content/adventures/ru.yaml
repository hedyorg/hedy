    restaurant:
        name: Ресторан
        default_save_name: Ресторан
        description: Создайте свой собственный виртуальный ресторан
        levels:
            1:
                story_text: |
                    На первом уровне вы сможете создать свой собственный виртуальный ресторан и принимать заказы гостей.
                story_text_2: |
                    ### Упражнение
                    Можете ли вы придумать больше строк, которые можно добавить в код ресторана? Например, вы можете {ask} гостям, что они хотели бы выпить, сообщить им цену или пожелать приятного аппетита?
                example_code_2: |
                    ```
                    {print} Добро пожаловать в ресторан Хейди 🍟
                    _ Что бы вы хотели заказать?
                    {echo} Итак, вы хотели бы заказать
                    {print} Спасибо за заказ!
                    {print} Он уже в пути!
                    ```
            2:
                story_text: |
                    На уровне 2 вы можете расширить свой ресторан, используя переменные. В первом уровне Хеди могла сделать заказ только один раз {echo} и запомнить только то, что было заказано последним.
                    Теперь вы можете использовать переменные, и Хеди сможет запомнить и блюда, и начинку!
                example_code: |
                    ```
                    {print} Добро пожаловать в ресторан Хеди!
                    {print} Сегодня мы подаем пиццу или лазанью.
                    еда {is} {ask} Что бы вы хотели съесть?
                    {print} Отличный выбор! Еда - моя любимая!
                    топпинг {is} {ask} Вы бы хотели мясо или овощи?
                    {print} Еда с топпингом уже в пути!
                    ```
                story_text_2: |
                    ### Задача
                    Скоприуйте код своего ресторана с предыдущего уровня в окно ввода ниже.
                    Поправьте код, заменив команды `{ask}` и `{echo}` и используя переменные так, как вы увидели на этом уровне.

                    Сейчас когде ваш код стал опять рабочим, самое время в него кое-что добавить.
                    Посмотрите на последнюю строку в примере: `{print} блюдо с топпингом в пути!`
                    В этой одной строке используются две переменные для того, чтобы создать содержимое заказа.
                    Теперь добавьте свой список еды и напитков, заказанных клиентом.

                    **Дополнительное задание** Теперь, когда вы уже узнали как можно использовать переменные, вы способны использовать сколько угодно переменных в одной строке. Можете добавить больше переменных в свой код, вроде был ли заказ на вынос или для ресторана, оплата картой или наличными, с трубочкой для напитка или без?
            3:
                story_text: |
                    Не можете решить, что хотите съесть на ужин? Вы можете позволить Хеди выбрать за вас!
                    Просто добавьте списки ваших любимых (или нелюбимых) блюд, и Хеди сможет случайным образом выбрать ваш ужин.
                    Вы также можете повеселиться, позволив Хеди выбрать цену вашего ужина! Что вы получите?
                story_text_2: |
                    У вашего клиента есть аллергия или ему не нравятся определенные блюда? Тогда вы можете воспользоваться командой `{remove}`, чтобы удалить его из своего меню.
                example_code_2: |
                    ```
                    {print} Молочный коктейль "Тайна
                    вкусы {is} клубника, шоколад, ваниль
                    аллергия {is} {ask} Есть ли у вас аллергия на какие-либо фалворы?
                    _
                    {print} Вы получаете молочный коктейль со вкусом {at} {random}.
                    ```
            4:
                example_code: |
                    ```
                    _ Добавьте кавычки к этому коду _
                    {print} Добро пожаловать в ресторан Hedys!
                    {print} Сегодня мы подаем пиццу или лазанью.
                    еда {is} {ask} Что бы вы хотели съесть?
                    {print} Отличный выбор! Еда - моя любимая!
                    топпинг {is} {ask} Вы бы хотели мясо или овощи?
                    {print} Еда с начинкой уже в пути!
                    напитки {is} {ask} Что бы вы хотели выпить с этим?
                    {print} Спасибо за ваш заказ.
                    {print} Ваша еда и напитки будут доставлены прямо сейчас!
                    ```
            6:
                story_text: |
                    На этом уровне команда `{if}` позволяет вам `{ask}` задавать вопросы клиентам и давать различные ответы на них.
                    В приведенном ниже примере видно, что вы можете `{ask}` клиенту `{if}`, что он хочет услышать о специальных блюдах, а Хеди может ответить соответствующим образом.
            7:
                story_text: |
                    В этом уровне вы можете использовать математику для подсчета общей стоимости заказа клиента, что может сделать ваш виртуальный ресторан более реалистичным.
                example_code: |
                    Вы можете сделать простой код ресторана, например, такой:
                    ```
                    {print} 'Добро пожаловать в ресторан Hedys'
                    {print} 'Вот наше меню:'
                    {print} 'Наши основные блюда - пицца, лазанья или спагетти'
                    блюдо = {ask} 'Какое основное блюдо вы бы хотели?'
                    цена = 0
                    {if} основное {is} пицца цена = 10
                    {if} основное {is} лазанья цена = 12
                    {if} главная {is} спагетти цена = 8
                    {print} 'Вы заказали ' блюдо
                    {print} 'Это будет стоить ' цена ' долларов, пожалуйста'
                    {print} 'Спасибо, приятного аппетита!'
                    ```
            8:
                story_text: |
                    На этом уровне вы узнали, как использовать команду `{repeat}` для повторения строки кода определенное количество раз.
                    Вы можете использовать это в своем ресторане, чтобы `{ask}` нескольким людям о том, что они хотели бы съесть.

                    Можете ли вы заполнить пробелы? Хеди нужно повторить этот вопрос столько раз, сколько людей. Так, если есть 5 человек, то вопрос нужно задать 5 раз.
                example_code: |
                    ```
                    {print} 'Добро пожаловать в ресторан Hedys!'
                    люди = {ask} 'Сколько человек присоединилось к нам сегодня?'
                    {repeat} _ {times} еда = {ask} 'Что бы вы хотели съесть?'
                    {print} 'Спасибо за ваш заказ! Его сейчас принесут!
                    ```
            9:
                story_text: |
                    На этом уровне вы можете сделать свой виртуальный ресторан более сложным, повторяя несколько строк кода. Например:

                    ### Задача
                    Конечно, этот код можно расширить, добавив больше позиций в меню, предложив напитки и/или несколько блюд.
                    **Дополнительное задание** Добавьте ещё больше вариантов - столько, сколько вам нравится!
                example_code: |
                    ```
                    {print} 'Добро пожаловать в ресторан Hedys!'
                    люди = {ask} 'Сколько человек присоединится к нам сегодня?'
                    {print} 'Отлично!'
                    {repeat} люди {times}
                        еда = {ask} 'Что бы вы хотели заказать?'
                        {print} еда
                    {print} 'Спасибо за заказ!'
                    {print} 'Приятного аппетита!'
                    ```
            10:
                story_text: "В этом уровне вы можете использовать вложенность, чтобы сделать ваш ресторан более реалистичным и веселым!\n\n### Упражнение\nВ коде примера были удалены отступы. \nМожете ли вы определить, сколько отступов должно быть в каждой строке, чтобы код работал правильно?\nЕсли клиент заказывает пиццу, Хеди не должна спрашивать, какой соус хочет клиент.\n\n**(экстра)** В ресторане не все соусы имеются в наличии. Составьте список доступных соусов и при каждом заказе отвечайте, продаете ли вы его. <br>\n**(дополнительно)** У пиццы есть начинка. Спросите клиентов, что они хотят.<br>\n**(дополнительно)** Хотят ли клиенты напитки? Спросите и их! <br>                    \n"
                example_code: |
                    ```
                    {print} 'Добро пожаловать в ресторан Хеди!'
                    люди = {ask} 'Сколько человек присоединится к нам сегодня?'
                    {print} 'Отлично!'
                    цена = 0
                    {repeat} люди {times}
                    _ еда = {ask} 'Что бы вы хотели заказать?'
                    _ {print} еда
                    _ {if} еда {is} картофель фри
                    _ цена = цена + 3
                    _ соус = {ask} 'Какой соус вы хотели бы получить к картофелю фри?'
                    _ {if} соус {is} нет
                    _ {print} 'без соуса'
                    _ {else}
                    _ цена = цена + 1
                    _ {print} 'с соусом'
                    _ {if} еда {is} пицца
                    _ цена = цена + 4
                    {print} 'Это будет стоить ' цена ' доллар'
                    {print} 'Приятного аппетита!'
                    ```
            11:
                story_text: |
                    На этом уровне вы узнаете, как легко {ask} заказы ваших гостей в виде короткого кода.
                example_code: |
                    ```
                    courses = appetizer, main course, dessert
                    {for} course {in} courses
                        еда = {ask} 'What would you like to eat as your ' course '?'
                        {print} еда ' will be your ' course
                    ```
                story_text_2: |
                    Конечно, вы также можете сделать заказ для нескольких человек!
                    Можете ли вы добавить нужное количество отступов перед каждой строкой, чтобы код работал правильно?
                    СОВЕТ: некоторые строки вообще не нуждаются в отступах.
                example_code_2: |
                    ```
                    _ блюда = закуска, основное блюдо, десерт
                    _ имена = Тимон, Онно
                    _ {for} имя {in} имена
                    _ {for} курс {in} курсы
                    _ еда = {ask} имя ', что бы вы хотели съесть в качестве своего ''блюда''?
                    _ {print} имя ' заказывает ' еду ' в качестве своего ' блюда
                    ```
            16:
                example_code: |
                    ```
                    {print} 'Добро пожаловать в МакХеди'
                    more = 'yes'
                    _
                        заказать = {ask} 'Что бы вы хотели заказать?'
                        {print} заказать
                        more = {ask} 'Вы хотите заказать что-нибудь еще?'
                    {print} 'Спасибо!'
                    ```
    rock:
        name: Камень, ножницы, бумага
        default_save_name: Камень
        description: Создайте свою собственную игру "камень, ножницы, бумага"
        levels:
            1:
                story_text: |
                    На уровне 1 вы можете начать с игры "Камень, ножницы, бумага"

                    С помощью команды `{ask}` вы можете сделать выбор, а с помощью `{echo}` вы можете повторить этот выбор.
                example_code: |
                    ```
                    {print} Что ты выберешь?
                    {ask} Выбери камнь, бумагу или ножницы
                    {echo} Твой выбор был:
                    ```
                story_text_2: |
                    ### Задача
                    Кроме слов вы можете писать и эмодзи: ✊✋✌
                    Можете ли вы создать код используя эмодзи?
                example_code_2: |
                    ```
                    {print} Что ты выберешь?
                    {ask} Выбери из _
                    {echo} Итак, твой выбор был:
                    ```
            2:
                story_text: |
                    В этом уровне вы можете попрактиковаться в использовании переменных, чтобы в следующем уровне вы могли провести игру "Камень, ножницы, бумага"!
                example_code: |
                    ```
                     {is} {ask} камень, бумага или ножницы?
                    {print} Я выбираю _
                    ```
            3:
                story_text: |
                    В этом уровне мы можем вводить списки и выбирать из них предметы.
                    Сначала вы составляете список с помощью `{is}`. Затем вы можете позволить компьютеру выбрать что-то из списка с помощью `{at} {random}`{random}`.
                    Например, вы можете позволить компьютеру выбрать из списка "камень, бумага и ножницы"
                example_code: |
                    ```
                    choices {is} rock, paper, scissors
                    {print} choices {at} {random}
                    ```
                story_text_2: "### Задача\nСкопируйте код примера и заполните в нём проблелы, чтобы добавить ещё одного игрока.\n\n**Дополнительное задание** Сейчас игроков зовут \"игрок 1\" и \"игрок 2\". Можете добавить несколько команд `{ask}` (конечно же с переменными), чтобы дать игрокам имена? \nТаким образом, вы сможете получить вывод вроде `Ваня выбрал... бумагу`\n"
                example_code_2: |
                    ```
                    выбор {is} камень, бумага, ножницы
                    {print} игрок 1 выбирает... выбор {at} {random}
                    {print} игрок 2 _
                    ```
            10:
                story_text: |
                    В этом уровне вы можете запрограммировать целую игру "Камень, ножницы, бумага" путем вложения команд `{if}`. Сможете ли вы закончить код?
            11:
                story_text: |
                    Лень играть в игру самому? Позвольте Хеди сыграть за вас!
                    Вам нужно только заполнить имена игроков.
                example_code: |
                    ```
                    выбор = камень, бумага, ножницы
                    игроки = _
                    {for} игрок {in} игроки
                         {print} игрок ' выбирает ' выбор {at} {random}
                    ```
            16:
                story_text: |
                    ### Задача
                    Играйте, пока не победите компьютер! Но сначала закончите код примера...
                example_code: |
                    ```
                    победа = 'нет'
                    варианты = 'камень', 'бумага', 'ножницы'
                    {while} выиграл == 'нет'
                        your_choice = {ask} 'Что вы выбираете?'
                        компьютерный_выбор = варианты {at} {random}
                        {print} 'вы выбрали ' ваш_выбор
                        {print} 'компьютер выбрал' computer_choice
                        {if} компьютерный_выбор == ваш_выбор
                            {print} 'Ничья!'
                        {if} computer_choice == 'rock' {and} your_choice == 'scissors'
                            {print} 'Вы проиграли!'
                        {if} компьютерный_выбор == 'камень' {and} ваш_выбор == 'бумага'
                            {print} 'Вы выиграли!'
                            выиграл = 'да'
                    _
                    ```
    secret:
        name: СуперШпион
        default_save_name: СуперШпион
        description: Сделайте свой собственный шпионский код
        levels:
            10:
                story_text: |
                    Можете ли вы заполнить правильную команду на бланке? Разум: Супершпион должен правильно ответить на ОБА вопроса, прежде чем он получит конфиденциальную информацию!
                example_code: |
                    ```
                    name = {ask} 'What is your name?'
                    пароль = {ask} 'Какой у вас пароль?'
                    {if} имя {is} 'Agent007' _ пароль {is} 'TOPSECRET'
                        {print} 'Поехать в аэропорт в 02.00'
                    {else}
                        {print} 'Отправиться на вокзал в 10.00'
                     ```
    songs:
        name: Спойте песню!
        default_save_name: Песня
        description: Печать песни
        levels:
            8:
                story_text: |
                    Песни часто содержат много повторений. Например... Детеныш акулы! Если вы поете ее, вы продолжаете петь одно и то же:

                    Baby Shark tututudutudu <br>
                    Baby Shark tutututudutudu <br>
                    Baby Shark tututudutudu <br>
                    Baby Shark

                    Вы можете сделать эту песню намного короче с помощью `{repeat}`! Вы можете закончить код?
                example_code: |
                    ```
                    {repeat} _ _ {print} 'Baby Shark tututudutudu'
                    {print} 'Baby Shark'
                    ```

                    After Baby Shark you can of course also program other songs. There are many songs with repetition.
            9:
                story_text: |
                    В предыдущем уровне вы запрограммировали песню "Бутылки пива". Вы сочинили один куплет, а затем должны были скопировать его 99 раз. В этом уровне вы можете повторить песню 99 раз, просто добавив одну простую строчку!
                    Знаете ли вы, какую строку кода нужно добавить на пустом месте?
                example_code: |
                    ```
                    стих = 99
                    _ _ _
                        {print} стих 'бутылки пива на стене'
                        {print} стих ' бутылки пива'
                        {print} 'Возьми одну, передай по кругу'
                        стих = стих - 1
                        {print} стих ' бутылки пива на стене'
                    ```
            11:
                story_text: |
                    На этом уровне вы легко сможете исполнить детскую песенку "Пять маленьких обезьянок". Сможете ли вы сделать последний припев?
                    Вы также можете сделать всю песню про акулу (включая всех остальных акул в семье) всего за 6 строк, используя `{for}`!
                    Или вы можете сделать песню Old MacDonald со всеми различными животными.



                    Можете ли вы добавить последний куплет про обезьянок на кровати, когда осталась только одна обезьянка?

                    Можете ли вы сделать код акулы-малютки еще короче, используя команду `{repeat}`?

                    Можете ли вы добавить новых животных на ферму старого Макдональда?
                example_code: |
                    ```
                    обезьянки = 5, 4, 3, 2
                    {for} обезьяна {in} обезьянки
                        {print} обезьяна ' маленькие обезьянки прыгают на кровати'
                        {print} 'Один упал и ударился головой'
                        {print} 'Мама позвонила доктору, и доктор сказал'
                        {print} 'БОЛЬШЕ НИКАКИХ ОБЕЗЬЯНОК, ПРЫГАЮЩИХ НА КРОВАТИ!'
                    ```

                    ```
                    акулы = ребенок, мама, папа, бабушка, дедушка
                    {for} акула {in} акулы
                        {print} акула ' акула тутутутутуду'
                        {print} акула ' акула тутутутутутуду'
                        {print} акула ' акула тутутутутуду'
                        {print} акула ' акула '
                    ```
                    ```
                    животные = свинья, собака, корова
                    {for} животное {in} животные
                        {if} животное {is} свинья
                            звук = ойк
                        {if} животное {is} собака
                            звук = гав
                        {if} животное {is} корова
                            звук = му
                        {print} 'У старого Макдональда была ферма'
                        {print} 'E I E E I O!'
                        {print} 'и на этой ферме у него было ' животное
                        {print} 'E I E I O!'
                        {print} 'со звуком ' звук
                        {print} 'и ' звук ' там'
                        {print} 'здесь ' звук
                        {print} 'там ' звук
                        {print} 'везде ' звук звук звук
                    ```
    turtle:
        name: Черепаха
        default_save_name: Черепаха
        description: Создайте свой собственный рисунок
        levels:
            1:
                story_text: |
                    Ещё можно использовать Хейди для рисования. Используя линии и повороты, вы можете сделать квадрат или лестницу!

                    Для того чтобы нарисовать линию - используйте команду  `{forward}`. Число за ней определяет, как далеко пройдет черепаха. Команда `{turn} {right}` повернёт черепаху на четверть оборота по часовой стрелке, `{turn} {left}` - повернёт её против часовой стрелки.

                    Чтобы пойти назад, можно использовать ту же команду `{forward}`, но с отрицательным числом. Например, `{forward} -100`
                story_text_2: |
                    ### Упражнение
                    Это начало маленькой лестницы. Можете ли вы сделать так, чтобы у нее было 5 ступенек?
            2:
                story_text: |
                    В этом уровне вы можете использовать переменные, чтобы сделать черепаху интерактивной. Например, вы можете спросить игрока, сколько шагов должна сделать черепаха.
                example_code: |
                    ```
                    ответ {is} {ask} Сколько шагов должна сделать черепаха?
                    {forward} ответ
                    ```
                story_text_2: |
                    Кроме того, на первом уровне черепаха могла поворачивать только влево или вправо. Это немного скучно!
                    На втором уровне она может поворачивать свой нос во все стороны.

                    Используйте 90 для поворота на четверть. Мы называем это градусами. Полный поворот - это 360 градусов.

                    ### Задача
                    Можете ли вы построить фигуру с помощью этого кода? Может треугольник или круг?
                example_code_2: |
                    ```
                    {print} Чертежные фигуры
                    угол {is} 90
                    {turn} угол
                    {forward} 25
                    {turn} угол
                    {forward} 25
                    ```
            3:
                story_text: |
                    В этом уровне вы можете использовать `{at} {random}`{random}` с рисующей черепахой. Случайный выбор заставляет черепаху каждый раз идти по разному пути.
                    Используйте `{at} {random}`{random}` для выбора значения из списка.
                    Можете ли вы скопировать и вставить строки 2 и 3, чтобы создать более длинный случайный путь?
            4:
                story_text: |
                    В четвертом уровне вы должны использовать кавычки с `{print}` и `{ask}`. Также при рисовании!
                example_code: |
                    ```
                    {print} _ Чертежные фигуры _
                    угол {is} 90
                    {turn} угол
                    {forward} 25
                    {turn} угол
                    {forward} 25
                    ```
                story_text_2: |
                    Вы также можете изменить цвет линий с помощью команды `{color}`. Посмотрите пример.
                    Вы также можете использовать команду `{color} {white}`{white}`, чтобы сделать "невидимые" линии. Вы можете использовать эти белые линии для перемещения черепашки в любую точку экрана перед началом рисования.
            5:
                story_text: |
                    На уровне 5 вы можете сделать выбор с помощью `{if}`. Например, между разными типами фигур.
            7:
                story_text: |
                    На этом уровне вы можете использовать вычисления для рисования различных фигур.
                    Возможно, в школе вы узнали, что полный круг - это 360 градусов. Если нет, то теперь вы знаете!
                    Вот почему вы также используете 90 градусов для квадрата. 360 разделить на 4 - это 90.
                    Теперь, когда мы можем заниматься математикой вместе с Хеди, мы можем рисовать любые фигуры, какие захотим!
            9:
                story_text: |
                    Теперь, когда мы можем повторять несколько линий, нам легче строить фигуры.
                    Нам нужно только один раз задать угол, а затем использовать эту переменную в `{repeat}`.
                story_text_2: |
                    Кроме того, теперь мы можем усовершенствовать программу, которая рисует различные фигуры.
                    Можете ли вы определить, насколько черепаха должна повернуться здесь? Доработайте код, и вы сможете нарисовать любой многоугольник, какой захотите!
    years:
        name: Новый год
        default_save_name: Новогодний отсчет
        description: Обратный отсчет до Нового года!
