adventures:
    story:
        name: कथा
        description: एक छोटी कथा बनवा
        levels:
            1:
                story_text: "लेव्हल १ मध्ये तुम्ही स्वतः प्रविष्ट केलेल्या एका वेगळ्या मुख्य पात्रासह एक कथा बनवू शकता.\nपहिल्या ओळीत, `{ask}` वापरा आणि कथेचे मुख्य पात्र कोण असेल ते विचारा.\nत्या पहिल्या ओळीनंतर, जर वाक्य छापायचे असेल तर `{print}` ने सुरुवात करा.\nजर तुम्हाला तुमचे मुख्य पात्र वाक्याच्या शेवटी हवे असेल तर तुम्ही `{echo}` वापरता.\n"
                example_code: "```\n\n{ask} या कथेतील मुख्य पात्र आहे\n\n{print} मुख्य पात्र आता जंगलात फिरायला जात आहे\n\n{echo} ते थोडे घाबरले आहेत,\n\n{print} त्यांना सर्वत्र वेडे आवाज ऐकू येतात\n\n{print} त्यांना भीती वाटते की हे एक झपाटलेले जंगल आहे\n\n```\n"
                story_text_2: "### व्यायाम करा\nआता कमीत कमी ६ ओळींच्या कोडची तुमची स्वतःची कथा तयार करा.\nही कथा उदाहरण कोडसारखी असू शकत नाही.\nकिमान एक `{ask}` आणि एक `{echo}` कमांड वापरा.\nतुम्हाला आवडणाऱ्या कोणत्याही विषयावर तुम्ही ती बनवू शकता.\nजर तुम्हाला एखादा विषय सुचत नसेल, तर आमच्या पर्यायांपैकी एक वापरा: चित्रपट पाहणे, खेळाचा सामना करणे किंवा प्राणीसंग्रहालयात एक दिवस घालवणे.\n"
            2:
                story_text: "स्तर 2 मध्ये तुमची कथा तुम्ही बनवू शकता. तुमच्या मुख्य पात्राचे नाव आता वाक्यातही असू शकते.\n\nत्यासाठी तुम्हाला अतिरिक्त प्रोग्राम करना होगा। आता तुम्हाला तुमच्या मुख्य पात्राचे नाव सांगा.\n\nफिर तुम्ही तुमच्या नावात वाक्यही ठेवू शकता.\n"
                example_code: "```\nname {is} {ask} What is the name of the main character?\n{print} name is now going to run in the woods\n{print} name is a bit scared\n{print} Suddenly she hears a crazy noise...\n{sleep}\n{print} name is afraid this is a haunted forest\n```"
                story_text_2: "### व्यायाम\nआता तुमच्या स्वतःच्या कथेत व्हेरिअबल्स जोडण्याची वेळ आली आहे जी तुम्ही मागील स्तरावर बनवली आहे.\n\n'माझे प्रोग्राम्स' वर जा, तुमचा लेव्हल १ स्टोरी अ‍ॅडव्हेंचर शोधा आणि कोड कॉपी करा. या लेव्हलमध्ये तुमच्या इनपुट स्क्रीनमध्ये कोड पेस्ट करा.\n\nहा कोड या लेव्हलमध्ये काम करणार नाही, कारण तुम्ही अद्याप व्हेरिअबल्स वापरलेले नाहीत.\n\nतुमच्या कोडमधील `{ask}` कमांड आणि `{echo}` कमांड या लेव्हलमध्ये शिकलेल्या योग्य स्वरूपात बदला.\n\n**अतिरिक्त** तुमच्या कथेत तणाव निर्माण करण्यासाठी तुमच्या कोडमध्ये `{sleep}` कमांड जोडा.\n"
            3:
                story_text: "लेव्हल ३ मध्ये तुम्ही तुमची गोष्ट अधिक मजेदार बनवू शकता. तुम्ही कोणत्याही राक्षस, प्राण्या किंवा इतर अडथळ्यासाठी यादृच्छिकता वापरू शकता, जसे की:\n"
                example_code: "```\nanimals {is} 🦔, 🐿, 🦉, 🦇\n{print} They now hear the sound of an animals {at} {random}\n```\n"
                story_text_2: "तुमच्या कथेत `{add}` ही कमांड देखील उपयोगी पडू शकते.\n"
                example_code_2: "```\n{print} They hear a sound\nanimals {is} 🐿, 🦔, 🦇, 🦉\nanimal {is} {ask} What do you think it is?\n{add} animal {to_list} animals\n{print} it was an animals {at} {random}\n```\n"
