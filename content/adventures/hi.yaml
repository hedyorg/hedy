adventures:
    story:
        name: कहानी
        default_save_name: कहानी
        description: कहानी
        levels:
            1:
                story_text: |
                    स्तर 1 में आप एक अलग मुख्य पात्र के साथ एक कहानी बना सकते हैं जिसे आप स्वयं दर्ज करते हैं।

                    पहली पंक्ति के रूप में, इस कोड का उपयोग करें  `{ask}`.

                    उस पहली पंक्ति के बाद, `{print}` {if} से शुरू करें, वाक्य को मुद्रित करने की आवश्यकता है।
                    आप `{echo}` {if} का उपयोग करते हैं, आप चाहते हैं कि आपका मुख्य चरित्र वाक्य के अंत में हो।
                example_code: |
                    ```
                    {ask} इस कहानी का मुख्य पात्र है
                    {print} मुख्य पात्र अब जंगल में चलने वाला है
                    {echo} वह थोड़ा डरा हुआ है,
                    {print} वह हर जगह क्षीण शोर सुनता है
                    {print} उसे डर है कि यह एक प्रेतवाधित जंगल है
                    ```
                story_text_2: |
                    ### Exercise
                    Can you make your own story in Hedy now by using `{print}` , `{ask}` and `{echo}`?
            2:
                story_text: |-
                    स्तर 2 में आप अपनी कहानी को और मजेदार बना सकते हैं। आपके मुख्य पात्र का नाम अब वाक्य में कहीं भी हो सकता है।

                    इसके लिए आपको थोड़ा अतिरिक्त प्रोग्राम करना होगा। अब आपको पहले अपने मुख्य पात्र का नाम बताना होगा।

                    फिर आप उस नाम को वाक्य में कहीं भी रख सकते हैं।
                example_code: |
                    ```
                    नाम {is} {ask} मुख्य पात्र का नाम क्या है?
                    {print} नाम अब जंगल में चलने वाला है
                    {print} नाम थोड़ा डरा हुआ है
                    {print} अचानक उसे एक क्षीण शोर सुनाई देता है...
                    {sleep}
                    {print} नाम डरता है यह एक प्रेतवाधित जंगल है
                    ```
                story_text_2: |
                    ### व्यायाम
                    अब आपकी अपनी कहानी में वेरिएबल जोड़ने का समय आ गया है जो आपने पिछले स्तर पर बनाए थे।
                    'माई प्रोग्राम्स' पर जाएं, अपनी लेवल 1 कहानी साहसिक खोजें और कोड कॉपी करें। इस स्तर पर अपनी इनपुट स्क्रीन में कोड चिपकाएँ।

                    यह कोड इस स्तर पर काम नहीं करेगा, क्योंकि आपने अभी तक वेरिएबल का उपयोग नहीं किया है।
                    अपने कोड में `{ask}` कमांड और `{echo}` कमांड को उस सही रूप में बदलें जो आपने इस स्तर पर सीखा है।

                    **अतिरिक्त** अपनी कहानी में तनाव पैदा करने के लिए अपने कोड में `{sleep}` कमांड जोड़ें।
            3:
                story_text: |
                    स्तर 3 में आप अपनी कहानी को और मजेदार बना सकते हैं। आप इस तरह किसी भी राक्षस, जानवर या अन्य बाधा के लिए यादृच्छिकता का उपयोग कर सकते हैं:
                example_code: |
                    ```
                    जानवर {is} 🦔, 🐿, 🦉, 🦇
                    {print} वह अब एक की आवाज सुनता है जानवर {at} {random}
                    ```
                story_text_2: |
                    आदेश `{add}` भी आपकी कहानी में काम आ सकता है। उदाहरण के लिए
                example_code_2: |-
                    ```
                    {print} वह एक आवाज सुनता है
                    जानवरों {is} 🐿, 🦔, 🦇, 🦉
                    जानवर_extra {is} {ask} आपको क्या लगता है कि यह क्या है?
                    {add} जानवर_extra {to_list} जानवरों
                    {print} यह एक था जानवरों {at} {random}
                    ```
                story_text_3: |
                    यह आपकी कहानी में `{remove}` कमांड का एक उदाहरण है

                    ### व्यायाम
                    अपनी कहानी को पिछले स्तरों से इस स्तर पर कॉपी करें।
                    इस स्तर पर आपने 3 नए कमांड `{at} {random}` , `{add} {to_list}` और `{remove} {from}` सीखे हैं।
                    अपनी कहानी में कोड की नई पंक्तियाँ जोड़ें, ताकि सभी नए कमांड आपकी कहानी में कम से कम एक बार प्रदर्शित हों।
                example_code_3: |
                    ```
                    {print} उनका बै ग बहुत भारी हो गया था।
                    {print} अंदर पानी की एक बोतल, एक टॉर्च और एक ईंट थी।
                    बैग {is} पानी, टॉर्च, ईंट
                    डंप {is} {ask} उसे कौन सी वस्तु गिराना चाहिए?
                    {remove} डंप {from} बैग
                    ```
            4:
                story_text: |
                    ### व्यायाम
                    उदाहरण कोड की प्रतिलिपि बनाएँ और पंक्तियों 1 और 2 में रिक्त स्थान पर उद्धरण चिह्न जोड़कर इसे समाप्त करें।
                    पंक्ति 3 और 4 में रिक्त स्थान को उद्धरण चिह्नों से नहीं, बल्कि `{sleep}` और `{clear}` कमांड से बदला जाना चाहिए। क्या आप इसे काम में ला सकते हैं?

                    ### व्यायाम 2
                    पिछले स्तर पर वापस जाएँ और अपना कहानी कोड कॉपी करें। सही स्थानों पर उद्धरण चिह्न जोड़कर कोड को इस स्तर पर कार्यान्वित करें।
                    मन: आपकी अपनी कहानी में चर उद्धरण चिह्नों के बाहर होने चाहिए। उदाहरण कोड की दूसरी पंक्ति की तरह। उस पंक्ति में चर का नाम उद्धरण चिह्नों के बाहर रखा गया है।
                example_code: |
                    ```
                    नाम {is} {ask} _ आपका नाम क्या है? _
                    {print} _ मुख्य पात्र को _ नाम कहा जाता है
                    _
                    _
                    {print} नाम _ अब जंगल में चलने वाला है _
                    {print} नाम _थोड़ा डरा हुआ है_
                    जानवर {is} 🦔, 🐿, 🦉, 🦇
                    {print} _ वह जानवरों की आवाज़ सुनता है {at} {random}
                    {print} नाम _ डर है कि यह एक प्रेतवाधित जंगल है _
                    ```
            5:
                story_text: |
                    इस स्तर पर आप अलग-अलग अंत को प्रोग्राम कर सकते हैं, जो आपकी कहानी को और भी मजेदार बना देगा।

                    उदाहरण के लिए, अपनी कहानी के दो अंत के बारे में सोचें:

                    - राजकुमारी जंगल से घूम रही है
                    - उसका सामना एक राक्षस से होता है

                    - सुखद अंत: वह अपनी तलवार लेती है और राक्षस जल्दी से भाग जाता है
                    - बुरा अंत: राक्षस राजकुमारी को खा जाता है

                    आप यह भी सुनिश्चित कर सकते हैं कि एक नाम फिर से दर्ज किया जा सकता है। यह पिछले स्तरों की तरह ही काम करता है। आप इसे एक `{if}` के साथ जोड़ सकते हैं, और फिर आप पहले से ही एक पूरा प्रोग्राम बना चुके हैं!
                example_code: |-
                    ```
                    नाम {is} {ask} 'जंगल में कौन चल रहा है?'
                    {print} नाम 'जंगल के माध्यम से चलता है'
                    {print} नाम 'एक राक्षस का सामना करता है'
                    अंत {is} {ask} 'क्या आप एक अच्छा या बुरा अंत चाहते हैं?'
                    {if} अंत {is} अच्छा {print} नाम 'तलवार लेता है और राक्षस जल्दी से भाग जाता है'
                    {else} {print} 'राक्षस खाता है' नाम
                    ```
            8:
                story_text: |
                    एक कहानी में, कोई कई बार शब्द कहता है। उदाहरण के लिए, जब कोई मदद के लिए पुकारता है या गाना गाता है।
                    आप अपनी कहानी में इस स्तर पर `{repeat}` के साथ इस तरह के दोहराव डाल सकते हैं।
                example_code: |-
                    ```
                    {print} 'राजकुमार मदद के लिए पुकारता रहा'
                    {repeat} 5 {times} {print} 'सहायता!'
                    {print} 'कोई मेरी मदद क्यों नहीं कर रहा है?'
                    ```
            9:
                story_text: |
                    इस स्तर में आप अपने {if} आदेश में कई पंक्तियों का उपयोग कर सकते हैं, इस तरह आप अपने सुखद या दुखद अंत को उन्नयन कर सकते हैं!
                example_code: |
                    ```
                    {print} 'अरे नहीं! टी-रेक्स बंद हो रहा है!'
                    अंत = {ask} 'क्या आप सुखद या दुखद अंत चाहते हैं?'
                    {if} अंत {is} सुखद
                        {print} 'ठीक समय पर रिचर्ड टाइम मशीन में वापस कूदता है!'
                        {print} 'माइकल कोड टाइप करता है और...'
                        {print} 'ज़ैप!💥'
                        {print} 'वे अपने गैरेज में वापस आ गए हैं'
                    {else}
                        {print} 'माइकल चिल्लाता है कम ऑन रिचर्ड! तेजी से भागना!'
                        {print} 'लेकिन रिचर्ड बहुत धीमा है...'
                        {print} 'टी-रेक्स बंद हो जाता है और उसे एक बड़े दंश में खा जाता है!🦖'
                    ```
            10:
                story_text: |
                    इस स्तर पर आप अन्य {if}, {repeat} या {for} आदेश के अंदर {if}, {repeat} या {for} आदेश डालने के लिए नेस्टिंग का उपयोग कर सकते हैं। यह आपको कई विकल्प देता है और वास्तव में आपकी कहानी को परस्पर संवादात्मक बनाने में आपकी मदद करता है।
                example_code: |-
                    ```
                    {print} 'रॉबिन शहर में घूम रहा है'
                    स्थान = {ask} 'क्या रॉबिन एक दुकान में जा रहा है, या वह घर जाती है?'
                    {if} स्थान {is} दुकान
                        {print} 'वह दुकान में प्रवेश करती है।'
                        {print} 'रॉबिन एक दिलचस्प दिखने वाली किताब देखता है'
                        किताब = {ask} 'क्या रॉबिन किताब खरीदता है?'
                        {if} किताब {is} हां
                            {print} 'रॉबिन किताब खरीदता है और घर जाता है'
                        {else}
                            {print} 'रॉबिन दुकान छोड़कर घर चला जाता है'
                    {else}
                        {print} 'रॉबिन घर जाता है'
                    ```
            11:
                story_text: |
                    इस स्तर में आप अपनी कहानी में {for} आदेश का इस्तेमाल कर सकते हैं। इस तरह आप आसानी से बच्चों की किताब 'भूरा भालू, भूरा भालू, आप क्या देखते हैं' को प्रोग्राम कर सकते हैं।
                example_code: |
                    ```
                    जानवर = लाल पक्षी, काली भेड़, हरा मेंढक, पीली बत्तख, छोटा बच्चा
                    {print} 'भूरा भालू'
                    {print} 'भूरा भालू'
                    {print} 'आप क्या देखते हैं?'
                    {for} प्राणी {in} जानवर
                        {print} 'मुझे एक 'प्राणी' दिखाई दे रहा है जो मुझे देख रहा है'
                        {print} प्राणी
                        {print} प्राणी
                        {print} 'आप क्या देखते हैं?'
                    {print} 'मैं देख रहा हूं कि सभी जानवर मुझे देख रहे हैं!'
                    ```
            13:
                story_text: "हम एक और कहानी छापने जा रहे हैं, लेकिन अब हमें `{print}` के साथ कोष्ठक का उपयोग करना होगा।\n\n### अभ्यास 1\nकम से कम 5 वाक्यों की एक कहानी बनाएँ। आपको अभी 'नाम' का उपयोग करने की आवश्यकता नहीं है।\n"
                example_code: "```\n{print}('इस कहानी में आपका स्वागत है!')\n```\n"
                story_text_2: "### अभ्यास 2\nहमने आपके लिए पहले से ही एक `{input}` तैयार कर लिया है। सबसे पहले, अपनी कहानी में `name` वेरिएबल का उपयोग करें।\nफिर एक दूसरा `{ask}` जोड़ें और उस वेरिएबल का भी उपयोग करें।\nसुझाव: `{print}` में टेक्स्ट और वेरिएबल के बीच कॉमा को याद रखें!\n"
                example_code_2: "```\nनाम = {input}(\"आपका नाम क्या है?\")\n{print}('इस कहानी में आपका स्वागत है!')\n```\n"
    add_remove_command:
        name: '{add} {to} & {remove} {from}'
        description: introducing add to and remove from
        levels:
