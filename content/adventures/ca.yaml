                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\n**Extra** Fes només un codi que permeti al jugador decidir quina lletra vol veure! I pots afegir encara més lletres?\n\n<div class=\"w-full flex flex-row gap-2\">\nF <img src=\"https://github.com/hedyorg/hedy/assets/80678586/8a021b76-c24b-4e7c-b960-48d57f3bcb20\" width=\"100\">\nE <img src=\"https://github.com/hedyorg/hedy/assets/80678586/12821803-6422-416a-8e36-9902d14e57a4\" width=\"100\">\nL <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3af6f919-7b67-4ee7-b923-11e56f2b6b24\" width=\"100\">\n</div>\n"
            7:
                example_code: "Pista per el quadrat:\n```\ncolor_escollit = {ask} _\n```\n"
                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\n**Extra** Deixa que el jugador decideixi de quin color ha de ser el quadrat.\n\n***Extra*** Pots fer la lletra del teu propi nom i la bandera del teu propi país també?\n\n<div class=\"w-full flex flex-row gap-2\">\nQuadrat <img src=\"https://github.com/hedyorg/hedy/assets/80678586/03b96c2c-7b94-4032-9f9f-3f3b13573623\" width=\"150\">\nLletres <img src=\"https://github.com/hedyorg/hedy/assets/80678586/e75f4fa5-f1f5-4b48-806c-916c28e4e8ad\" width=\"100\">\nBandera <img src=\"https://github.com/hedyorg/hedy/assets/80678586/877fc337-df80-4185-8005-a6c28904f66e\" width=\"300\">\n</div>\n"
            3:
                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\n<div class=\"w-full flex flex-row gap-2\">\nTriangle <img src=\"https://github.com/hedyorg/hedy/assets/80678586/71e04d98-9545-4614-9caf-a5f179b756a1\" width=\"150\">\nEstrella <img src=\"https://github.com/hedyorg/hedy/assets/80678586/421c4d28-cb99-424b-be26-dcae30d65c80\" width=\"150\">\nFletxa <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3cbebcae-5258-47c5-a6ac-e7ee36c1d1ce\" width=\"200\">\n</div>\n"
            4:
                example_code: "**Extra** Preparat per a un veritable repte? Assegura't que els colors d'aquestes figures se seleccionin aleatòriament, de manera que cada vegada que executis el teu programa es vegi diferent!\n\n```\ncolors {is} vermell, taronja, groc, verd, blau, lila, rosa, marró, gris, negre\ncolor _\n```\n"
                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\n<div class=\"w-full flex flex-row gap-2\">\nEstrella de colors <img src=\"https://github.com/hedyorg/hedy/assets/80678586/dbe39006-c050-4833-b5c4-f9d1fb1c0781\" width=\"150\">\nArc de Sant Martí <img src=\"https://github.com/hedyorg/hedy/assets/80678586/2728b10f-9f7f-45ea-964e-5b284033e4f0\" width=\"500\">\nQuadrats niats <img src=\"https://github.com/hedyorg/hedy/assets/80678586/f013f9fa-bc68-4c60-b778-2c457799d6f7\" width=\"200\">\n</div>\n"
            8:
                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\n<div class=\"w-full flex flex-row gap-2\">\nHexàgon <img src=\"https://github.com/hedyorg/hedy/assets/80678586/92e492e1-1593-489b-aaf0-51d2a29755f4\" width=\"200\">\nTriangle <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3629a5e6-1f02-4851-aab9-c5430ba4a1f1\" width=\"200\">\nVentall <img src=\"https://github.com/hedyorg/hedy/assets/80678586/1ba2ff71-1230-4fe3-8255-b2c504cf1b4e\" width=\"200\">\n</div>\n"
            10:
                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\n**Extra** El número entre parèntesis indica en quantes línies de codi es pot dibuixar aquesta figura. Pots fer-ho en la mateixa quantitat de línies?\n\n**Extra** Dóna al jugador l'opció de triar de quin país vol veure la bandera.\n\n<div class=\"w-full flex flex-row gap-2\">\nCreu (7) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/76e42c76-aa3f-4863-8eee-ead73c09a186\" width=\"150\">\nQuadrats niats de colors aleatoris (8) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/17f878cc-e893-4c10-b32e-a09a50bf08de\" width=\"200\">\nBanderes <img src=\"https://github.com/hedyorg/hedy/assets/80678586/877fc337-df80-4185-8005-a6c28904f66e\" width=\"300\">\n</div>\n"
                example_code: "Pista per als quadrats nidats:\n```\ncolors = vermell, blau, taronja, groc, rosa, lila, verd, marró, negre\ndistancia = 120\n{repeat} 5 {times}\n_\n```\nPista per a les banderes:\n```\npais = {ask} \"Escull un país per veure'n la bandera?\"\n{if} pais {is} \"Andorra\"\n    color_1 = blau\n    color_2 = groc\n    color_3 = vermell\n```\n"
            1:
                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\n<div class=\"w-full flex flex-row gap-2\">\n    Rectangle <img src=\"https://github.com/hedyorg/hedy/assets/80678586/77aa99d5-cd8f-4969-b49d-e8fed34ac550\" width=\"100\">\n    Quadrat <img src=\"https://github.com/hedyorg/hedy/assets/80678586/03b96c2c-7b94-4032-9f9f-3f3b13573623\" width=\"200\">\n    Escales <img src=\"https://github.com/hedyorg/hedy/assets/80678586/d4301e62-ec66-4031-827c-7d21f73ba106\" width=\"200\">\n</div>\n"
            2:
                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\n<div class=\"w-full flex flex-row gap-2\">\nTriangle <img src=\"https://github.com/hedyorg/hedy/assets/80678586/e974b62c-f0cf-445a-8bd4-5ad9f1f71204\" width=\"100\">\nFletxa <img src=\"https://github.com/hedyorg/hedy/assets/80678586/803d8f42-9708-448c-82ea-d035697f08c9\" width=\"150\">\nVaixell <img src=\"https://github.com/hedyorg/hedy/assets/80678586/94ef7189-442a-4c8f-827d-12a69203c2e9\" width=\"150\">\n</div>\n"
            9:
                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\n**Extra** El número entre parèntesis indica en quantes línies de codi es pot dibuixar aquesta figura. Pots fer-ho en la mateixa quantitat de línies?\n\n<div class=\"w-full flex flex-row gap-2\">\nQuadrat (3) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/03b96c2c-7b94-4032-9f9f-3f3b13573623\" width=\"200\">\nEstrella de colors aleatoris (5) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/dbe39006-c050-4833-b5c4-f9d1fb1c0781\" width=\"150\">\nEspiral de colors aleatoris (7) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/9bcdb3f1-367d-4ae0-878f-d09005424a35\" width=\"150\">\n</div>\n"
            12:
                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\nPrimer, defineix una funció **per a cada forma** que vulguis utilitzar al braçalet. Després, afegeix les formes al braçalet així:\n\nPrograma de disseny de braçalets <img src=\"https://github.com/hedyorg/hedy/assets/80678586/549d7f3a-c492-4b4a-b173-746eb3400951\" width=\"500\">\n"
                example_code: "Pista del programa dissenya el teu braçalet\n```\n{define} dibuixa_un_quadrat\n_\n\n{color} blanc\n{turn} -90\n{forward} 300\n{turn} 180\n\n{for} i {in} {range} 1 {to} 5\n    {color} gris\n    {forward} 100\n    forma = {ask} \"Quina és la forma següent del teu braçalet?\"\n    color_escollit = {ask} \"De quin color?\"\n    {color} color_escollit\n    {if} forma = \"quadrat\"\n        {call} dibuixa_un_quadrat\n```\n"
            16:
                example_code_3: "Estrella\nUna estrella normalment es dibuixa utilitzant girs de 144 graus. Si canvies això lleugerament a 143 graus, per exemple, i repeteixes el patró múltiples vegades amb un bucle {while}, pots fer aquesta figura.\n"
                story_text_2: "Ventilador <img src=\"https://github.com/hedyorg/hedy/assets/80678586/cb671065-b47b-49f0-b298-dcbcd2a5e28f\" width=\"150\">\n"
                story_text_3: "Estrella <img src=\"https://github.com/hedyorg/hedy/assets/80678586/17564e0a-63e1-4794-8d41-15ac8c1a5a93\" width=\"150\">\n"
                story_text: "### Exercici\nRecrea els dibuixos amb la tortuga!\n\nEspiral <img src=\"https://github.com/hedyorg/hedy/assets/80678586/6943223c-018b-435b-a391-23723cc7a6ad\" width=\"150\">\n"
                example_code_2: "Ventilador\n```\n{define} dibuixar_quadrat (costat)\n_\n\ni = 100\n{while} i > 1\n    _(i)\n    _\n    i = i - 3\n```\n"
                example_code: "Espiral\n```\ndistancia = 5\n{while} distancia < 200\n    distancia = distancia + 5\n     _\n```\n"
            11:
                story_text_2: "Llums de Nadal <img src=\"https://github.com/hedyorg/hedy/assets/80678586/9637ea6d-6edc-4d88-a6f7-10271bfc5371\" width=\"500\">\n"
                story_text: "### Exercici\n\nRecrea els dibuixos amb la tortuga!\n<div class=\"w-full flex flex-row gap-2\">\nHexàgons niats <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3629e908-3cd5-44ac-bbcd-1f1cceb15654\" width=\"150\">\nSemàfors <img src=\"https://github.com/hedyorg/hedy/assets/80678586/edbbb608-5ff8-4349-85a6-e47809adde43\" width=\"100\">\n</div>\n"
                example_code: "Pista pels hexàgons nidats:\n```\ndistancies = 100, 80, 60, 40, 20\n{for} distancia {in} distancies\n_\n```\n\nPista pel semàfor:\n```\ncolors = vermell, groc, verd\n{for} color_escollit {in} colors\n    {color} _\n    {repeat} _\n```\n"
                example_code_2: "Pista per les llums de Nadal:\n\nComença movent-te a la part esquerra de la pantalla amb una línia blanca invisible. Després penja les llums de Nadal!\n```\n{color} blanc\n{turn} -90\n{forward} 300\n{turn} 90\n\ncolors = vermell, blau, groc, lila, verd, taronja, rosa\n{for} color_escollit {in} colors\n_\n```\n"
            15:
                story_text: "### Exercici\nCrea un programa que pregunti al jugador quants costats ha de tenir la seva figura i després crea aquesta figura.\nLa figura de la imatge és el resultat quan el jugador introdueix 10.\n\n<div class=\"w-full flex flex-row gap-2\">\n <img src=\"https://github.com/hedyorg/hedy/assets/80678586/ee32f40e-dea1-4e7c-a813-3ef63671254b\" width=\"300\">\n <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3621bf77-527d-41e8-a44f-c5a21bb4ffd2\" width=\"200\">\n</div>\n"
        description: Dibuixa la imatge amb la tortuga
        name: dibuixa-ho!
    rock_2:
        levels:
            2:
                example_code: "```\neleccio {is} _\n{print} Escullo eleccio\n```\n"
                story_text: "Ara que has après a utilitzar la comanda `{ask}`, també pots fer que el teu codi de pedra, paper, tisores sigui interactiu!\n\n### Exercici\nFes que el codi de pedra, paper, tisores sigui interactiu afegint la comanda `{ask}` amb una pregunta al teu codi de pedra, paper, tisores.\n"
        default_save_name: pedra_2
        description: 2a part de pedra, paper, tisores
        name: pedra, paper, tisores 2
    secret:
        name: superespia
        levels:
            10:
                example_code: "```\nnom = {ask} \"Com et dius?\"\npassword = {ask} \"Quina és la contrasenya?\"\n{if} nom {is} \"Agent007\" _ password {is} \"TOPSECRET\"\n    {print} \"Ves a l'aeroport demà a les 02:00\"\n{else}\n    {print} \"Ves a l'estació de tren avui a les 10:00\"\n ```\n"
                story_text: "Podem simplificar el codi de superespia amb `{and}`, de manera que només necessitem un `{if}`.\n\n### Exercici 1\nCompleta el codi omplint la comanda correcta en el buit. Consell: El superespia ha de respondre TOTES les preguntes correctament abans d'obtenir la informació confidencial!\n\n### Exercici 2\nVolem confondre encara més l'enemic! Crea una llista amb respostes falses i selecciona'n una a l'atzar quan es doni una resposta incorrecta.\n"
        default_save_name: SuperEspia
        description: Fes el teu propi codi espia
    while_command:
        description: '{while}'
        default_save_name: comanda_while
        name: '{while}'
        levels:
            16:
                story_text: "Aprendrem un nou bucle, el bucle `{while}`! Continuem el bucle mentre la declaració sigui certa.\nAixí que no oblidis canviar el valor dins del bucle.\n\nEn el codi d'exemple, continuem fins que s'hagi donat una resposta correcta.\nSi mai es dóna la resposta correcta, el bucle mai acaba!"
                example_code: "```\nresposta = 0\n{while} resposta != 25\n    resposta = {ask} \"Quan fa 5 per 5?\"\n{print} \"La resposta donada és correcte\"\n```\n"
    and_or_command:
        name: '{and} i {or}'
        default_save_name: i_o_command
        description: i, o
        levels:
            10:
                story_text: "Ara aprendrem `{and}` i `{or}`! Si vols comprovar dues afirmacions, no cal que utilitzis dues comandes `{if}`, sinó que pots fer servir `{and}` i `{or}`.\nSi fas servir `{and}`, totes dues afirmacions, la de l’esquerra i la de la dreta de l'`{and}`, han de ser certes. També podem fer servir `{or}`. I , només una de les dues afirmacions haurà de ser correcta."
                example_code: "```\nnom = {ask} \"quin és el teu nom?\"\nedat = {ask} \"quants anys tens?\"\n{if} nom {is} \"Hedy\" {and} edat {is} 2\n    {print} \"Ets la Hedy real!\"\n{elif} nom {is} \"Hedy\" {or} edat {is} 2\n    {print} \"Quasi... però no ets la Hedy!\"\n{else}\n    {print} \"No ets la Hedy!\"\n```\n"
    elif_command:
        name: '{elif}'
        default_save_name: sinosi
        description: '{elif}'
        levels:
            6:
                story_text: "En aquest nivell farem servir una nova comanda: `{elif}`. `{elif}` és una combinació de les paraules clau `{else}` i `{if}`, i la serà molt útil quan volem crear 3 (o més!) opcions.\nDona-hi un cop d’ull!\n### Exercici\nFes la teva pròpia roda de la fortuna, on pots guanyar diferents premis i obtenir reaccions corresponents.\n"
                example_code: "```\npremis is 1 milió d'euros, un pastís de poma, res\nel_teu_premi is premis {at} {random}\n{print} \"Guanyes \" el_teu_premi\n{if} el_teu_premi {is} \"1 milió d'euros\"\n{print} \"Sí! Ets ric!\"\n{elif} el_teu_premi {is} \"un pastís de poma\"\n{print} \"Mmm, un pastís de poma!\"\n{else}\n{print} \"Més sort la propera vegada..\"\n```\n"
    hospital:
        levels:
            3:
                story_text: "Hi ha un problema a la infermeria. Tot l'equip d'infermers es queixen que el calendari dels torns de nit no és just. Alguns infermers han de treballar 2 torns de nit per setmana, mentre que d’altres no en fan cap.\nPots ajudar als infermers creant un programa que faci un calendari de torns de nit just?\n### Exercici\nEl programa ha de:\n* Mostrar quin infermer ha de treballar el torn de nit en quin dia de la setmana.\n* Assegurar-se que cada infermer només hagi de treballar un torn de nit per setmana.\nEls noms dels infermers són: Maria, Mireia, Àlex, Damià, Cristina, Iu, Jordi\n"
            4:
                story_text: "Els nostres infermers tenen moltes tasques per fer en un dia. Una d'aquestes tasques és passar per tots els pacients al matí i preguntar-los que els agradaria esmorzar.\nPots alleugerir la càrrega de treball dels nostres infermers creant un programa en què els pacients triïn el seu esmorzar i enviïn la seva comanda directament al personal de cuina?\n### Exercici\nEl programa ha de:\n* Demanar al pacient que introdueixi el seu nom i número d'habitació\n* Saludar el pacient pel seu nom\n* Mostrar tots els aliments (entrepans, cereals, fruita, etc.) i begudes del menú\n* Preguntar al pacient què li agradaria menjar\n* Preguntar-li què li agradaria beure\n* Repetir la comanda al pacient\n* Agrair al pacient per fer la comanda\n* Dir-li que la seva comanda serà portada al seu número d'habitació en 15 minuts.\n"
            5:
                story_text: "El nostre centre de cremades vol alleugerir la càrrega de treball utilitzant una eina de triatge en línia. D'aquesta manera, els pacients no només poden registrar el seu nom i data de naixement, sinó també quin tipus de cremada tenen (de primer, segon o tercer grau) i rebre assessorament sobre què fer a continuació.\nPots ajudar-los?\n### Exercici\nEl programa ha de:\n* Començar amb una salutació i el registre simple del nom i la data de naixement del pacient\n* Realitzar un triatge. La pell només està vermella: cremada de primer grau. Hi ha butllofes: cremada de segon grau. La pell ha desaparegut/està ennegrida/blanquejada per la cremada: cremada de tercer grau.\n* Donar al pacient el consell adequat. Primer grau: Refreda la cremada amb aigua i aplica una mica de crema. No cal que vegis un metge. Segon grau: El metge et veurà et prescriurà una crema especial. Si us plau, espera a la sala d'espera. Tercer grau: Si us plau, dirigeix-te ara a la recepció. Necessitaràs atenció urgent tan aviat com sigui possible.\n"
            6:
                story_text: "Les nostres llevadores reben moltes preguntes de dones embarassades sobre què poden i no poden menjar durant l'embaràs. Pots ajudar les seves pacients creant una aplicació que els indiqui si un aliment és segur o no?\n### Exercici\nEl programa ha de:\n* Preguntar a la pacient que li agradaria menjar.\n* Comprovar si està a la llista d'\"aliments no segurs\"\n* Si està a la llista d'aliments no segurs, dir a la pacient que no és segur menjar-lo.\n* Si no està a la llista, dir a la pacient que probablement és segur menjar-lo.\n* Després, l'aplicació també avisa a la persona que sempre utilitzi el sentit comú perquè la llista pot no ser 100% completa. I aconsella a la persona que sempre eviti carns, peixos i ous crus i alcohol.\nDurant l'embaràs, no és segur menjar: sushi, gambes, tonyina, formatge blau, tiramisú, ous poc cuits, carpaccio, entrecot poc fet, steak tartar\n"
            7:
                story_text: "Les nostres infermeres controlen el balanç de líquids dels nostres pacients. El balanç de líquids és la quantitat de líquid que el pacient ha guanyat avui (bevent, menjant o per via intravenosa) menys la quantitat de líquid que la persona ha perdut avui (orinent o vomitant).\nEl balanç de líquids ha de romandre positiu. Si el balanç de líquids és negatiu, la infermera ha d'administrar més líquid per via intravenosa.\nPots ajudar les nostres infermeres fent una eina que puguin utilitzar per calcular el balanç de líquids dels seus pacients?\n### Exercici\nEl programa ha de:\n* Preguntar quants líquids ha guanyat el pacient bevent aquest dia.\n* Preguntar quants líquids ha guanyat el pacient menjant aquest dia.\n* Preguntar quants líquids ha guanyat el pacient per via intravenosa aquest dia.\n* Preguntar quants líquids ha perdut el pacient orinant aquest dia.\n* Preguntar quants líquids ha perdut el pacient vomitant aquest dia.\n* Calcular el balanç de líquids del pacient i mostrar-lo a la infermera.\n* Dir a la infermera que comprovi si el balanç és positiu o negatiu per decidir si el pacient necessita més líquid per via intravenosa avui o no.\n"
            8:
                story_text: "El nostre heliport per a l'helicòpter de trauma ha perdut la seva capa de pintura. Pots escriure un programa per a la tortuga per tornar a dibuixar les marques?\n### Exercici\nDibuixa les marques a l'heliport.\n<img src=\"https://github.com/user-attachments/assets/96deeb9e-b155-4a3d-91f3-3c447df7ce2b\" width=\"200\">\n"
            9:
                story_text: "La nostra ambulància li toca una mica de manteniment. La creu vermella pintada al costat s'està esvaint i la sirena ja no funciona.\nPots arreglar-ho?\n### Exercici\nEl programa ha de:\n* Pintar una creu vermella amb la tortuga de dibuix.\n* Fer un so de sirena després d'acabar la creu vermella.\nPISTA: utilitza la comanda repeat.\n"
            10:
                story_text: "El personal de les nostres urgències té un problema. Diuen que hi arriben molts pacients que realment no tenen una emergència i que en realitat haurien d'anar al seu metge de capçalera.\nAquesta gent està omplint la sala d'espera i suposa una gran càrrega de treball per al nostre personal. Vols ajudar el personal d'urgències fent una aplicació de triatge que indiqui al pacient si ha d'anar a urgències o no?\n### Exercici\nEl teu programa ha d'indicar al pacient si ha d'\"anar a urgències tan aviat com sigui possible\", \"trucar al teu proveïdor d'atenció mèdica per discutir la teva situació\" o \"anar al teu metge de capçalera quan puguis\".\nEl programa farà aquestes preguntes:\n* És la teva situació potencialment mortal?\n* Tens problemes per respirar?\n* De sobte no pots parlar, veure, caminar o moure't?\n* Has ingerit o inhalat verí?\n* T'has trencat un os?\n* Tens una reacció al·lèrgica greu?\n* Tens un dolor intens?\nSi el pacient respon \"sí\" a qualsevol d'aquestes preguntes, el programa li dirà que vagi a urgències tan aviat com sigui possible. No farà cap altra pregunta, perquè el temps és crucial.\nSi el pacient respon \"no\" a totes les qüestions, el programa preguntarà:\n* Pot esperar fins demà?\nSi la resposta és \"sí\", el programa dirà al pacient que vagi al metge de capçalera quan pugui. Si la resposta és \"no\", el programa aconsellarà trucar al seu proveïdor d'atenció mèdica per discutir la situació.\n"
            11:
                story_text: "Tenim un problema a la clínica de vacunació. La pantalla que crida el següent pacient per anar a l'àrea de vacunació està espatllada. Pots arreglar-ho?\n### Exercici\nEl programa ha de:\n* Tenir una llista de noms de pacients amb cita\n* Preguntar a la infermera si hi ha pacients nous avui i, en cas afirmatiu, quants.\n* Afegir els noms dels nous pacients a la llista també\n* Després, el programa ha de cridar un pacient perquè vagi a l'àrea de vacunació.\n* El programa ha d'esperar 10 segons, esborrar la pantalla i cridar el següent pacient, fins que hagi cridat a tots els pacients de la llista.\n"
            12:
                story_text: "Estem dissenyant una nova planta d'hospital i ens agradaria dibuixar un plànol per a aquesta nova planta.\nVoldríem tenir espai per a 5 pacients a la planta. Tots els pacients han de tenir un llit i una tauleta de nit.\nEl plànol hauria de tenir una aparença semblant a aquesta:\n<img src=\"https://github.com/user-attachments/assets/078929cb-c9af-4bcf-87a2-0398ad91d3f0\" width=\"500\">\n### Exercici\nEl programa ha de:\n* Dibuixar el plànol per a la nova planta!\n* Utilitzar funcions per dibuixar els llits i les tauletes de nit.\n"
            13:
                story_text: "El nostre hospital no només té molts pacients, sinó també molt personal. Cada membre del personal necessita una credencial que indiqui la seva informació.\nPots fer un programa perquè un nou empleat pugui omplir la seva informació i rebre una credencial impresa?\n### Exercici\nEl programa ha de:\n* Donar la benvinguda al nou empleat\n* Preguntar-li el seu títol, nom, cognom, data de naixement, lloc de naixement, funció, departament i número de personal.\n* Agrair al nou empleat i dir-li que la seva credencial s'imprimirà aviat.\n* Fer una pausa al programa durant 2 segons.\n* Imprimir el títol, nom i cognom.\n* Imprimir la data de naixement i el lloc de naixement.\n* Imprimir la funció i el departament.\n* Imprimir el número de personal.\n"
            14:
                story_text: "Els nostres conserges tenen una llista gran de tasques. Algunes tasques es fan cada dia, altres en un dia, estació o data determinats. Això és molt confús i porta a situacions en què algunes tasques s'obliden.\nPots ajudar escrivint un programa que imprimeixi la llista de tasques correcta per a aquest dia?\n### Exercici\nEl programa ha de:\n* Desitjar bon dia al conserge.\n* Preguntar al conserge quin dia de la setmana és, quin mes i quin dia del mes.\n* Imprimir la llista de tasques correcta per a aquest dia.\nLes tasques que s'han de fer:\n* Tasques diàries: fregar el terra, netejar els lavabos, obrir les cortines\n* Dilluns i dijous: regar les plantes\n* Dimarts i divendres: fregar els sostres\n* Dissabtes: rentar la màquina de cafè\n* El primer de cada mes: rentar les finestres\n* El 7 de cada mes: omplir les màquines expenedores\n* El 14 de cada mes: comprovar les bateries dels detectors d'incendis\n* Cada dia durant els mesos d'hivern: engegar les escalfadores\n* Cada dia durant els mesos d'estiu: engegar l'aire condicionat\n"
                example_code: "El programa ha d'acabar així:\n  ```\n  _ El programa ha d'acabar així _\n  llista_tasques(dia, mes, any)\n  ```\n"
            1:
                story_text: "Benvingut a l'Aventura de l'Hospital. En aquesta aventura ajudaràs el director d'un hospital a solucionar alguns problemes que ocorren al seu hospital. Aquesta és la teva primera tasca:\n\nHi ha una cua horriblement llarga a la nostra recepció i l'empleat està molt ocupat. Podries ajudar aquest empleat programant un quiosc d'autoregistre?\n### Exercici\nEl quiosc d'autoregistre ha de:\n* Donar la benvinguda al pacient\n* Demanar el seu nom i repetir-lo\n* Demanar la seva data de naixement i repetir-la\n* Preguntar en quin departament té la seva cita\n* Preguntar amb quin metge té la seva cita\n* Agrair al pacient per registrar-se amb èxit\n* Dir al pacient que esperi assegut a la sala d'espera\n"
            15:
                story_text: "Després d'una cirurgia, els nostres pacients de vegades poden experimentar molt dolor. En aquests casos, es pot donar als pacients una bomba de morfina. Poden administrar-se una mica de morfina ells mateixos si tenen dolor.\nAquestes bombes s'han de programar amb molta cura, perquè els pacients no se n'administrin massa. Pots programar una bomba de morfina per a nosaltres?\n### Exercici\nEl programa ha de:\n* Preguntar a la infermera quants mil·lilitres de morfina ha rebut avui el pacient.\n* Dir a la infermera que doni el dispositiu al pacient\n* Preguntar al pacient quant dolor experimenta en una escala de l'1 al 10.\n* Dir al pacient que premi el botó x si vol una mica més de morfina.\n* Cridar la funció començar_bombeig amb els arguments nivell_dolor i nivell_morfina si es prem x.\n* La funció ha d'imprimir 'Se us administraran 20 ml més de morfina' mentre el nivell de dolor del pacient sigui superior o igual a 6 i el nivell de morfina sigui inferior a 120.\n* Després d'administrar nova morfina, el programa ha de fer una pausa de 2 minuts (mentre proves el programa pots utilitzar 2 segons).\n* Després d'aquests 2 minuts, s'ha d'actualitzar el nivell de morfina (+20ml) i s'ha d'actualitzar el nivell de dolor preguntant al pacient com se sent ara.\n* Si el nivell de morfina és massa alt o el pacient ja no té dolor, el programa ha de dir als pacients que no rebran més morfina. Si tenen molt dolor, digues-los que truquin a la infermera.\n* Digues al pacient que la bomba es tancarà ara, i que premi x si necessita que la bomba s'iniciï de nou.\n"
            16:
                story_text: "Els nostres estudiants de medicina han d’aprendre els termes mèdics de totes les parts del cos. Sembla que els costa recordar tots els noms anatòmics i que troben l’estudi molt avorrit.\nPots ajudar-los creant un joc que els permeti practicar els termes mèdics?\nAquests són els termes que els estudiants han de saber: corpus = cos, caput = cap, ocolus = ull, nasus = nas, auris = orella, os = boca, collum = coll, manus = mà, pectus = pit, humerus = espatlla, venter = estómac, tergum = esquena\n### Exercici\nEl programa ha de:\n* Ser un joc que permeti als estudiants practicar els termes mèdics.\n* Donar als estudiants un punt i un elogi quan han donat la resposta correcta.\n* Treure un punt i dir-los que la resposta és incorrecta quan s’han equivocat.\n* També mostrar als estudiants la resposta correcta durant uns segons si han respost malament, esborrar la resposta de la pantalla i continuar preguntant fins que l’encertin.\n* Continuar jugant fins que l’estudiant hagi respost correctament totes les preguntes.\n* Mostrar la puntuació final a l’estudiant.  \n* Donar a l’estudiant una valoració basada en la seva puntuació: 12 punts: Impressionant!, 8 - 11 punts: Bona feina, continua practicant!, 7 o menys: Hauries d’estudiar més!\n"
            2:
                story_text: |
                    La sala de maternitat del nostre hospital voldria música perquè els nadons s'adormin. Pots programar una cançó de bressol?
                    ### Exercici
                    Tria una cançó per reproduir:
                    * Do, Re, Mi, Al jardí (fàcil)
                    * Plou i fa sol (mitjà)
                    * Cançó de bressol de Brahms (difícil)
                    CONSELL: Pots intentar pensar les notes musicals tu mateix, però també les pots cercar a internet.
        name: hospital
        default_save_name: hospital
        description: Hospital
