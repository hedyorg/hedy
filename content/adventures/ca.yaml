                example_code: "```\n{print} El meu color preferit és el ...\n{sleep} 2\n{print} verd!\n```\n"
                story_text: "Una altra comanda nova d'aquest nivell és `{sleep}`, que farà una pausa al programa durant un segon. Si escrius un número després de la comanda `{sleep}`, el programa s'aturarà durant aquest nombre de segons.\n\n### Exercici\nPractica aquesta nova comanda fent un programa on facis servir la comanda `{sleep}` almenys 3 vegades. Amb cada comanda `{sleep}` el temps de pausa ha de ser diferent.\n"
    turtle_draw_it:
