                example_code: "```\ncases = Gryffindor, Slytherin, Hufflepuff, Ravenclaw\nsubjects = pocions, defensa contra les forces del mal, encanteris, transfiguració\nfears = en Voldemort, les aranyes, suspendre els examens GNOM\nnoms = Harry, Ron, Hermione\n_\n_ {print} nom \" pertany a la casa \" cases {at} {random}\n_ {print} nom \" és bo amb \" subjects {at} {random}\n_ {print} nom \" li aterra \" fears {at} {random}\n```\n"
    songs:
        levels:
            7:
                example_code: "```\nampolles = 99\n{print} \"Hi ha \" ampolles \" ampolles a dalt de la paret,\"\n{print} \"Hi ha \" ampolles \" ampolles a dalt de la paret,\"\n{print} \"Però si una ampolla caigués per mala sort,\"\nampolles = ampolles - 1\n{print} \"Queden \" ampolles \" ampolles a dalt de la paret.\"\n{sleep}\n```\n"
                story_text: "Les cançons sovint contenen molta repetició. A vegades, la repetició també es basa a comptar.  \nPer exemple, en la cançó \"Ampolles a dalt de la paret\". Pots programar aquesta cançó amb una mica de matemàtiques.\n\n**Consell:** Utilitza la funció de lectura en veu alta perquè Hedy et canti la cançó!\n\n### Exercici\nAra pots repetir les línies 2 a 7 tantes vegades com vulguis copiant-les.\n"
                example_code_2: "```\nnum = 6\nnum = num - 1\n{print} num \" pometes té el pomer\"\n{print} \"de \" num \" una, de \" num \" una\"\n{print} num \" pometes té el pomer\"\n{print} \"de \" num \" una en caigué. \"\n{sleep}\n```\n"
                story_text_2: "Aquesta cançó infantil compta enrere des de 5 pometes fins a una\nSi copies la línia 2 - 7 i l'enganxes sota el codi, pots cantar tota la cançó!\n"
            9:
                example_code: "```\nampolles = 99\n_ 99 {times}\n{print} \"Hi ha \" ampolles \" ampolles a dalt de la paret,\"\n{print} \"Hi ha \" ampolles \" ampolles a dalt de la paret,\"\n{print} \"Pero si una ampolla caiguès per mala sort,\"\nampolles = ampolles - 1\n{print} \"Queden \" ampolles \" ampolles a dalt de la paret.\"\n```\n"
                story_text: "En un nivell anterior has programat la cançó \"Ampolles dalt de la paret\". En aquell moment no coneixies la comanda `{repeat}`, i havies de copiar els versos moltes vegades.\nEn aquest nivell pots repetir la cançó 99 vegades, només afegint una línia senzilla!\n\n### Exercici\nAfegeix la comanda correcta als buits i ajusta la indentació del codi correctament.\n"
            8:
                example_code: "```\n{repeat} _ _ {print} \"Baby Shark tututudutudu\"\n{print} \"Baby Shark\"\n```\n"
                story_text: "Les cançons sovint contenen molta repetició. Per exemple... Baby Shark! Quan ho cantes, repeteixes tota l'estona el mateix:\n\nBaby Shark tututudutudu <br>\nBaby Shark tututudutudu <br>\nBaby Shark tututudutudu <br>\nBaby Shark\n\n### Exercici\nPots imprimir la cançó Baby Shark amb un `{repeat}`? Acaba el codi reemplaçant els buits.\n**Extra** Després de Baby Shark podràs programar altres cançons. Hi ha moltes cançons amb repetició!\nPots pensar en una altra cançó i imprimir-la?\n"

            11:
                example_code_2: "```\npometes = 5, 4, 3, 2, 1\n```\n"
                story_text_2: "### Exercici 2\nImprimeix la cançó \"Cinc pometes té el pomer\". Busca la lletra si no la recordes.\n\n**Extra** Imprimeix la cançó \"En MacDonald viu al camp\" i assegura't que tots els animals facin un so diferent utilitzant un `{if}`.\n"
                example_code: "```\nfamilia = baby, mammy, daddy, grandma, grandpa\n_ _ _ _ \n  {print} _\n```\n"
                story_text: "Amb `{for}` pots imprimir tota la cançó de Baby Shark (incloent-hi tots els altres taurons de la família) en només 6 línies!\n\n### Exercici 1\nPots fer que el codi de Baby Shark sigui encara més curt utilitzant una comanda `{for}`? Acaba l'exemple de codi.\n"
            13:
                story_text: "Ara ja fem servir Python. Les cançons que havíem programat s'hauran d'adaptar a la sintaxi Python!\n\n### Exercici 1  \nT'hem donat la cançó \"The Drunken Sailor\" com a exemple, però encara no funciona.\nPots assegurar-te que funcioni de nou? Per ajudar-te, hem posat _ en lloc d'alguns errors.\n\n### Exercici 2  \nAra també busca el programa que vas fer de la cançó \"Old MacDonald\" i corregeix-lo.\n"
                example_code: "```\nlinies = [\"what shall we do with the drunken sailor\", \"shave his belly with a rusty razor\", \"put him in a long boat till hes sober\"]\n{for} linia {in} linies _\n    {for} i {in} {range} (1,3) _\n        {print} _ linia _\n    {print} \"early in the morning\"\n    {for} i {in} {range} (1,3)\n        {print} \"way hay and up she rises\"\n    {print} \"early in the morning\"\n```\n"
            15:
                story_text: |
                    A l'aventura anterior has après com utilitzar un argument en una funció, però sabies que també podries combinar-los amb les ordres `{ask}`?
                    En aquest exemple hem canviat el programa d'en "Joan petit quan balla" i l'hem fet interactiu. Ara se't demanarà amb quina part balla.
                example_code: |
                    ```
                    {def} cançó(part)
                        {print}("En joan petit quan balla, balla amb el ", part)

                    {repeat} 4 {times}
                        part_escollida = {ask} "Amb quina part balla en Joan petit"
                        cançó(part_escollida)
                    ```
            14:
                story_text: |
                    En aquest nivell, es pot programar una cançó com "Old MacDonald" encara més ràpidament. Pots connectar l'animal correcte al so correcte simplement posant-los en el mateix lloc de la llista.
                    Ara també podrem fer "The Drunken Sailor" més ràpidament. Només calen 8 línies per a tota la cançó, mira-ho!

                    ### Exercici
                    Completeu la cançó "Old MacDonald" establint la variable  `animal` a `animals[i]` i `so` a `sons[i]`.
                example_code: |
                    ```
                    animals = ["un porc", "un gos", "una vaca"]
                    sons = ["oinc", "bub", "muu"]
                    {for} i {in} {range} (1, 3)
                        animal = _
                        so = _
                        {print} "En MacDonald viu al camp"
                        {print} "I A I A O!"
                        {print} "I a la granja té " animal
                        {print} "I A I A O!"
                        {print} "Fa " so so " per 'quí"
                        {print} "Fa " so so "  per 'llà."
                        {print} so ", per 'quí"
                        {print} so ", per 'llà"
                        {print} " tot arreu un " so so
                    ```

                    ```
                    versos = ["what shall we do with the drunken sailor", "shave his belly with a rusty razor", "put him in a long boat till hes sober"]
                    {for} vers {in} versos
                        {for} i {in} {range} (1, 3)
                            {print} vers
                        {print} "early in the morning"
                        {for} i {in} {range} (1, 3)
                            {print} "way hay and up she rises"
                        {print} "early in the morning"
                    ```
