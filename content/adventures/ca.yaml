    pressit:
        levels:
            6:
                example_code_2: "```\n{if} x {is} {pressed} {forward} 15\n{else} {turn} 90\n```\n"
                example_code: "```\n{print} \"Vols un final feliç (f) o un de trist (t)?\"\n{if} f {is} {pressed} {print} \"Van viure feliços sempre més ❤\"\n{else} {print} \"Un hipopòtam es va menjar el princep 😭\"\n```\n"
                story_text: "En aquest nivell hi ha una nova paraula clau: `{pressed}`!\nAmb `{pressed}` pots utilitzar les tecles del teu teclat per controlar quines línies s'usen.\n\n### Exercici\nMira l'exemple i afegeix una línia de codi més que reaccioni a una tecla pressionada.\n"
                story_text_2: "També pots vincular comandes de tortuga a les tecles.\n\n### Exercici\nCopia les línies unes quantes vegades perquè puguis crear un dibuix més gran.\n"
            8:
                story_text: "Ara que has après sobre `{repeat}`, podem prémer les tecles múltiples vegades.\nPots utilitzar-lo per fer que la tortuga camini cap endavant i giri.\n\n### Exercici\nEl codi que has vist al nivell 5 només comprova la tecla una vegada. Copia el codi d'exemple i afegeix un `{repeat}` perquè puguis prémer les tecles moltes vegades.\nUsa aquest codi per dibuixar-hi alguna cosa bonica.\n"
                example_code: "```\n{if} x {is} {pressed} {forward} 15 {else} {turn} 90\n```\n"
            10:
                story_text: "Ara que saps com combinar instruccions, pots crear una eina de mecanografia tàctil amb `{pressed}`.\n\n### Exercici\nAcaba el codi. Cada vegada s'ha de triar una lletra aleatòria, que hauràs de prémer. Obteniu un punt per cada pressió correcta i dos punts de deducció per una pressió incorrecta.\n**Extra** Neteja la pantalla després de cada lletra i mostra a l'usuari quants punts ha aconseguit.\n"
                example_code: "```\npunts = 0\nlletres = a, b, c, d, e\n{repeat} 10 {times}\n    lletra = _ _ _\n    {print} \"Prem la lletra \" lletra\n    {if} lletra {is} {pressed}\n    _\n    _\n    _\n```\n"
        description: Prova de vincular una tecla amb una comanda!
        name: '{pressed}'
        default_save_name: Premut
    piggybank:
        default_save_name: Guardiola
        name: guardiola
        levels:
            15:
                story_text: "### Exercici\nEn aquest nivell pots fer que Hedy t'expliqui si has estalviat prou diners!\nAcaba aquest codi omplint els buits!\n"
                example_code: "```\n_ calcula_pressupost (objectiu, diners, paga):\n    a_estalviar = objectiu- diners\n    setmanes = a_estalviar / paga\n    {if} objectiu _ diners\n        {print} (\"Has d'estalviar més!\")\n        {print} (\"Necessites \", setmanes, \" setmanes més.\")\n    {else}\n        {print} (\"Perfecte! Ja en tens suficient\")\n        {print} (\"Ja ho pots comprar!\")\n\ndiners = {input} (\"Quant has estalviat?\")\nobjectiu= {input} (\"Quants diners necessites?\")\npaga = {input} (\"Quants diners aconsegueixes cada setmana?\")\n\n_\n```\n"
            7:
                example_code: "```\n{print} \"La teva guardiola digital\"\ndesig = {ask} \"Què vols comprar?\"\npreu = {ask} \"Quant costa?\"\nestalviat = {ask} \"Quants diners ja has estalviat?\"\npaga = {ask} \"Quants diners aconsegueixes cada setmana?\"\na_estalviar = preu - estalviat\nweeks = a_estalviar / paga\n{print} \"Ho podràs comprar \" _ \" en \" _ \" setmanes.\"\n```\n"
                story_text: "En aquesta aventura aprendràs a crear una guardiola digital.\n\n### Exercici\nAcaba el codi per calcular quants diners tens i quant temps necessites estalviar per comprar allò que vols!\n**Extra** Potser ja has estalviat alguns diners? Dedueix-los de la quantitat que hauràs d'estalviar.\n"
        description: Conta el teu efectiu!
    random_command:
        levels:
            3:
                example_code: "```\nanimals {is} gossos, gats, cangurs\n{print} animals {at} {random}\n```\n"
                story_text: "## A l'atzar\nEn aquest nivell pots fer una llista utilitzant la comanda `{is}`. Pots fer que l'ordinador triï un element a l'atzar d'aquesta llista. Ho fas amb `{at} {random}`.\n"
                example_code_2: "```\nmenjar {is} entrepà, tall de pizza, amanida, kebab\n{print} Menjaré menjar {at} {random} per dinar.\n```\n"
                story_text_2: "Pots fer servir la comanda `{at} {random}` també en una frase.\n"
                story_text_3: "### Exercici\nProva la comanda `{at} {random}` per crear el teu propi concurs (com els que es veuen a la TV) on tries una porta o maleta i aquesta conté un superpremi!\nCreus que ho pots fer? Hem posat les primeres línies al codi d'exemple.\n"
                example_code_3: "```\n{print} El super-concurs!\n{print} Hi ha 3 caixes davant teu...\nescollit {is} {ask} Quina esculls?\npremis {is}  _\n_ a la caixa _ hi ha _\n```\n"
            14:
                story_text_2: "Ara que ja has après a utilitzar els claudàtors en les llistes, també pots començar a fer servir la comanda {at} {random} a la manera de Python!\nNomés has d'escriure el nom de la teva llista amb `[random]` darrere!"
                example_code: "```\namics = [\"Moha\", \"Bernat\", \"Tomeu\"]\n{print} \"En \" amics[1] \"  és el primer amic de la llista.\"\n{print} \"En \" amics[2] \" és el segon amic de la llista.\"\n{print} \"En \" amics[1] \" és el tercer  amic de la llista.\"\n# Ara mirarem dues llistes fent servir la variable i \nnumeros_sort = [15, 18, 6]\n{for} i {in} {range} (1, 3)\n    {print} \"El numero de la sort d'en \" amics[i] \" és el \" numeros_sort[i]\n```\n"
                example_code_2: "```\nfruita = [\"poma\", \"plàtan\", \"cirera\"]\n{print} fruita[random]\n```"
                story_text: "A partir d'ara farem les llistes a la manera Pythoniana, amb claudàtors al seu voltant! També mantindrem les cometes al voltant de cada element com hem après als nivells anteriors.\nUtilitzem claudàtors per indicar una posició en una llista. Per exemple: `friends[1]` és el primer nom de la llista d'amics, com pots veure en la primera part del codi d'exemple.\nLa segona part del codi d'exemple et mostra que també podem combinar dues llistes fent servir la variable i."
        name: '{random}'
        default_save_name: comanda_random
        description: Introduint la comanda {at} {random}
    repeat_command:
        levels:
            8:
                example_code: "```\n{repeat} 3 {times} {print} \"Hedy és divertit!\"\n```\n"
                story_text: "El nivell 7 afegeix la comanda `{repeat}`. La comanda `{repeat}` es pot utilitzar per executar una línia de codi diverses vegades. Així:\n\n### Exercici\nJuga amb la comanda `{repeat}`. Pots fer la cançó de moltes felicitats amb només 3 línies de codi en lloc de les 4 d'ara?\n"
            9:
                example_code: "```\n{repeat} 5 {times}\n    {print} \"Hola a tothom\"\n    {print} \"Això es repeteix 5 cops\"\n```\n"
                story_text: "En aquest nivell pots repetir múltiples línies de codi amb només 1 comanda `{repeat}`.\nPer a fer-ho has de crear un bloc amb les línies que vols repetir.\nLes línies en aquest bloc necessitaran **indentació**.\nAixò significa posar quatre espais al començament de cada línia. També hauràs d'indentar quan només vulguis crear un bloc d'una línia.\n"
            10:
                example_code: "```\n{repeat} 3 {times}\n    comanda = {ask} \"Què vols demanar?\"\n    {if} comanda {is} pizza\n        {print} \"Nyam! nyam... 🤤\"\n    {else}\n        {print} \"Bah.. la pizza és millor!\"\n```\n"
                story_text: "Bona feina! Has assolit un altre nivell nou! En el nivell anterior has après a utilitzar múltiples línies de codi en una comanda `{if}` o `{repeat}`.\nPerò encara no hem pogut combinar les dues...\n\nDoncs bones notícies! En aquest nivell se't permetrà posar una comanda `{if}` dins d'una altra comanda `{if}`, una comanda `{repeat}` dins d'una altra comanda `{repeat}` i fins i tot una dins de l'altra.\nProva-ho!\n"
        default_save_name: comanda_repeteix
        description: comanda {repeat}
        name: '{repeat}'
    repeat_command_2:
        description: Comanda {repeat} 2
        name: '{repeat} 2'
        default_save_name: comanda_repeteix_2
        levels:
            8:
                example_code: "```\n{repeat} 2 {times} resposta = {ask} \"Sabies que podries fer una pregunta diverses vegades?\"\n{if} resposta {is} sí \n{repeat} 2 {times} {print} \"Així que ja ho sabies!\"\n{else}\n{repeat} 3 {times} {print} \"Has après alguna cosa nova!\"\n```\n"
                story_text_2: "Una altra cosa interessant que pots fer amb la comanda `{repeat}` és utilitzar variables per establir la quantitat de vegades que alguna cosa s'ha de repetir. En el codi d'exemple pots veure que primer preguntem a la persona quants anys té.\nDesprés, en la línia 3, la pregunta es repeteix \"edat\" vegades. Així que hem usat la variable \"edat\" amb la comanda `{repeat}`.\n"
                story_text: "## Repetir amb altres comandes i amb variables\nAra has practicat la comanda `{repeat}` en combinació amb la comanda `{print}`, però sabies que també podries utilitzar altres comandes amb `{repeat}`?\nEn aquest codi d'exemple pots veure que la comanda `{repeat}` també es pot fer servir amb una comanda `{ask}`, `{if}` o `{else}`.\n"
                example_code_2: "```\n{print} \"Eii! És el teu aniversari!\"\nedat = {ask} \"Quants anys fas?\"\n{repeat} edat {times} {print} \"Visca!\"\n```\n"
            9:
                example_code: "```\n_ {print} \"El gegant del Pi\"\n_ {repeat} 2 {times}\n_ {print} \"ara balla\"\n_ {print} \"El gegant del Pi ara balla pel camí\"\n```\n"
                story_text: "### En el bloc o no?\nEn aquest nivell has de pensar detingudament quines línies de codi haurien d'estar en el bloc i quines no.\nPer exemple: Si vols cantar la cançó *el gegant del Pi*. Només vols que la línia amb el text \"ara balla\" es repeteixi dues vegades.\nAixò vol dir que l'última línia no hauria de començar amb indentació, ja que no pertany al bloc.\nSi comences l'última línia amb indentació, la cançó no sortirà bé.\n\n### Exercici\nCada línia del codi d'exemple comença amb un espai buit. Elimina els buits i intenta esbrinar quina línia necessita indentació i quina no per fer la cançó del *gegant del Pi*.\n"
    rock:
        description: Crea el teu propi joc de pedra, paper, tisores
        name: pedra, paper, tisores
        default_save_name: Pedra_2
        levels:
            1:
                example_code_2: "```\n{print} què vols escollir?\n{ask} tria entre _\n{echo} la teva elecció és:\n```\n"
                story_text: "Al nivell 1 començarem fent el joc de pedra, paper, tisores.\n\nAmb la comanda `{ask}` podrem triar, i amb la comanda `{echo}` podràs repetir l'elecció mostrant-la per pantalla.\n"
                story_text_2: "### Exercici\nEn lloc d'utilitzar paraules, també pots fer servir emojis: ✊✋✌\nPots crear un programa usant emojis?\n"
                example_code: "```\n{print} què vols escollir?\n{ask} tria entre pedra, paper o tisores\n{echo} la teva elecció és:\n```\n"
            2:
                example_code: "```\neleccio {is} pedra\n{print} Escullo _\n```"
                story_text: "En aquest nivell pots practicar l'ús de variables, i així podràs fer el joc de pedra, paper, tisores al pròxim nivell!\n### Exercici\nAcaba el codi omplint la **variable** en el buit.\nAquest joc no és molt interactiu, però no et preocupis! A la pròxima aventura aprendràs com utilitzar variables amb la comanda `{ask}` per fer el teu joc interactiu!\n"
            3:
                example_code: "```\nopcions {is} pedra, paper, tisores\n{print} opcions _\n```\n"
                story_text_2: "**Extra** Fes un joc per a dos jugadors. Primer demana als dos jugadors que introdueixin els seus noms. Després deixa que l'ordinador triï les seves eleccions aleatòriament.\n"
                story_text: "Pots utilitzar la comanda `{at} {random}` per fer que l'ordinador triï pedra, paper o tisores!\n\n### Exercici\nAcaba el codi fent servir la comanda `{at} {random}`.\n"
                example_code_2: "```\nopcions {is} pedra, paper, tisores\njugador_1 {is} {ask} Nom del jugador 1:\n_\n```\n"
            16:
                story_text: "### Exercici\nJuga fins a guanyar l'ordinador! Però primer, acaba el codi d'exemple...\n"
                example_code: "```\nguanyar = \"no\"\nopcions = \"pedra\", \"paper\", \"tisores\"\n{while} guanyar == \"no\"\n    teva_eleccio = {ask} \"Què esculls?\"\n    ordinador_eleccio = opcions {at} {random}\n    {print} \"Has escollit \" teva_eleccio\n    {print} \"L'Ordinador ha escollit \" ordinador_eleccio\n    {if} ordinador_eleccio == teva_eleccio\n        {print} \"Empat\"\n    {if} ordinador_eleccio == \"pedra\" {and} teva_eleccio == \"tisores\"\n        {print} \"Has perdut!\"\n    {if} ordinador_eleccio == \"pedra\" {and} teva_eleccio == \"paper\"\n        {print} \"Has gunayat!\"\n        guanyar = \"sí\"\n_\n```\n"
            10:
                example_code: "```\nopcions = \"pedra\", \"paper\", \"tisores\"\nteva_eleccio = {ask} \"Què vols escollir?\"\nordinador_eleccio = opcions {at} {random}\n{print} \"Has escollit \" teva_eleccio\n{print} \"L'ordinador escull \" ordinador_eleccio\n{if} ordinador_eleccio {is} teva_eleccio\n    {print} \"Empat\"\n{elif} ordinador_eleccio {is} \"pedra\" {and} teva_eleccio {is} \"paper\"\n    {print} \"Has guanyat!\"\n{elif} ordinador_eleccio {is} \"pedra\" {and} teva_eleccio {is} \"tisores\"\n    {print} \"Has perdut!\"\n_\n```\n"
                story_text: "En aquest nivell amb la comanda `{and}`pots escurçar el codi del joc de pedra, paper, tisores!, mira l'exemple.\n\n### Exercici\nAcaba el codi de manera que sempre es mostri qui ha guanyat. Executa el teu codi diverses vegades per assegurar-te que sempre es mostra el guanyador.\n"
            11:
                story_text: "### Exercici\nEn els nivells anteriors has fet sovint el teu propi joc de pedra, paper, tisores. Pots acabar el codi i utilitzar correctament la comanda `{for}` i fer que el joc funcioni?\n"
                example_code: "```\nopcions = _\njugadors = _\n{for} _\n```\n"
            4:
                story_text: "En aquest nivell podem programar encara més el joc de pedra, paper, tisores. Però si vols afegir text recorda que hauràs d'utilitzar cometes.\n### Exercici\nOmple les cometes en els buits. Recorda que la variable `opcions` ha d'estar fora de les cometes.\n"
                example_code: "```\nopcions {is} pedra, paper, tisores\n{print} _ L'ordinador ha escollit ... _ opcions {at} {random}\n```\n"
            5:
                example_code: "```\nopcions {is} pedra, paper, tisores\neleccio_ordinador {is} _\neleccio {is} _\n{print} \"Has escollit \" _\n{print} \"L'ordinador ha escollit \" _\n{if} _ {is} _ {print} \"empat!\" {else} {print} \"no hi ha empat\"\n```\n\nOmple els buits amb codi correcte per veure si és un empat.\n"
                story_text: "En aquest nivell podem determinar si hi ha empat o no. Per això necessites la nova comanda `{if}`.\n\n### Exercici\nAcaba el codi omplint els buits:\n* Fes que l'ordinador triï una opció aleatòria\n* Pregunta al jugador què vol triar\n* Omple les variables correctes a la línia 4 i 5\n* Acaba la línia 6 perquè Hedy pugui comprovar si hi ha empat o no.\n"
    restaurant:
        default_save_name: Restaurant
        levels:
            1:
                story_text: "En el nivell 1 pots crear el teu propi restaurant virtual i prendre les comandes dels clients.\n"
                example_code_2: "```\n{print} Benvingut al restaurant de Hedy 🍟 \n_ Què voldria prendre? \n{echo} Així que voldria\n {print} Gràcies per la teva comanda!\n{print} Ja està de camí!\n```\n"
                story_text_2: "### Exercici\nCopia el codi d'exemple a la teva pantalla d'entrada fent clic al botó groc.\nPrimer, omple amb la comanda correcta als buits perquè el codi funcioni correctament.\nA continuació, afegeix almenys 4 línies més de codi al programa del restaurant.\nPregunta al client què li agradaria beure i pregunta si vol pagar en efectiu o amb targeta.\nFinalment, pensa en una manera agradable d'acomiadar el teu client.\n"
            3:
                example_code_2: "```\n{print} Benvingut al teu restaurant aleatori!\nprimers {is} _\nsegons {is} _\npostres {is} _\nbegudes {is} _\npreus {is} _\n_\n```\n"
                story_text: "Tens problemes per decidir què vols prendre per a sopar? Pots deixar que Hedy triï per tu!\nSimplement, afegeix llistes dels teus menjars preferits (o dels menys preferits) i Hedy escollirà el teu sopar de manera aleatòria.\nTambé pots divertir-te una mica deixant que Hedy triï el preu del teu sopar! Què n'obtindràs?\n"
                example_code: "```\nplats {is} espaguetis, cols de Brussel·les, peus de porc\n{print} Soparàs plats {at} {random} per sopar!\npreus {is} 1 euro, 10 euros, 100 euros\n{print} Puja a un total de preus {at} {random}, siusplau.\n```\n"
                story_text_2: "### Exercici\nAra fes la teva pròpia versió del restaurant aleatori.\nFes una llista d'entrants, plats principals, postres, begudes i preus tu mateix.\nDesprés utilitza les comandes `{print}` i `{at} {random}` per dir al client què hi haurà al seu menú aquesta nit.\n"
            2:
                story_text: "En el nivell 2 pots expandir el teu restaurant utilitzant variables. En el nivell 1 Hedy només es podia fer `{echo}` de la comanda una vegada i recordar només l'última cosa que s'ha demanat.\nAra pots fer servir variables i Hedy pot recordar tant el menjar com les guarnicions!\n"
                example_code: "```\n{print} Benvinguts al restaurant de Hedy!\n{print} Avui servim pizza i lasanya.\nmenjar {is} {ask} Què t'agradria menjar?\n{print} Bona elecció! La menjar m'encanta!\nguarnició {is} {ask} Què hi prefereixes verdures o carn?\n{print} menjar amb guarnició en marxa!\n```\n"
                story_text_2: "### Exercici\nCopia el teu propi codi del restaurant del nivell anterior a la pantalla d'entrada a continuació.\nCorregeix el codi substituint les comandes `{ask}` i `{echo}` i utilitzant variables, com has après en aquest nivell.\n\nAra que el teu codi torna a funcionar, és hora d'afegir-hi alguna cosa més.\nMira l'última línia del codi d'exemple: `{print} menjar amb guarnició en marxa!`\nEn aquesta única línia s'han fet servir 2 variables per crear un resum de la comanda.\nAra afegeix el teu propi resum amb el menjar i les begudes que ha demanat el client.\n\n**Extra** Ara que has après a utilitzar variables, pots fer servir tantes variables com vulguis en una línia. Pots afegir més variables al teu codi, com menjar al local o emportar-s'ho a casa, pagar en efectiu o amb targeta, amb palleta o sense, etc.?\n"
            11:
                story_text: "En aquest nivell aprendràs com demanar fàcilment comandes per a diferents plats.\n\n### Exercici 1\nAcaba el codi amb una comanda `{ask}` en els buits de manera que se li pregunti al client què vol menjar per a cada plat.\n"
                example_code: "```\nplats = entrant, primer plat, postres\n{for} plat {in} plats\n    {print} \"Què vol de \" plat \"?\"\n    _ \n    _\n```\n"
                story_text_2: "### Exercici\nPer descomptat, també pots fer una comanda per a diverses persones!\nPots afegir la quantitat correcta d'indentació abans de cada línia perquè el codi funcioni correctament?\nConsell: algunes línies no necessiten cap indentació.\n"
                example_code_2: "```\n_ plats = primer plat, segon plat, postre\n_ noms= Toni, Olga\n_ {for} nom {in} noms\n_ {for} plat {in} plats\n_ menjar = {ask} nom \", què t'agradaria menjar com a \" plat \"?\"\n_ {print} nom \" demana \" menjar \" com a \" plat\n```\n"
            9:
                story_text: "En aquest nivell pots fer que el teu restaurant virtual sigui més elaborat repetint diverses línies de codi. Com això:\n\n### Exercici\nAquest codi es pot ampliar amb més elements al menú, per exemple oferint begudes i/o diversos plats o postres. Afegeix almenys un element més.\n**Extra** Afegeix encara més elements, tantes opcions com vulguis!\n"
                example_code: "```\n{print} \"Benvinguts al restaurant del xef Hedy\"\ngent = {ask} \"Quantes persones sereu a taula?\"\n{print} \"Perfecte!\"\n{repeat} gent {times}\n    menjar = {ask} \"Què voldrà menjar?\"\n    {print} menjar\n{print} \"Moltes gràcies per la comanda!\"\n{print} \"Bon profit!\"\n```\n"
            7:
                example_code: "Pots fer un codi de restaurant senzill, com aquest:\n```\n{print} \"Benvinguts al restaurant del xef Hedy\"\n{print} \"Avui a la nostra carta tenim:\"\n{print} \"Com a plats principals tenim pizza, lasanya, or espaguetis\"\nplat = {ask} \"Què voldrà com a plat principal?\"\npreu = 0\n{if} plat {is} pizza\npreu = 10\n{if} plat {is} lassanya \npreu = 12\n{if} plat {is} espaguetis \npreu = 8\n{print} \"Has demanat \" plat\n{print} \"Costarà \" preu \" euros, si us plau\"\n{print} \"Moltes gràcies, Bon profit!\"\n```\n"
                story_text: "En aquest nivell pots utilitzar les matemàtiques per calcular el preu total de la comanda del teu client, el que pot fer que el teu restaurant virtual sigui més realista.\nPerò també pots afegir moltes més coses al teu restaurant virtual, per exemple, més plats.\n\n### Exercici\nPots afegir moltes més coses al teu restaurant virtual. Per exemple, pots...\n- preguntar quantes persones vindran i multiplicar el preu per aquesta quantitat?\n- afegir un altre plat?\n- donar un descompte quan entren un codi de cupó (secret)?\n- afegir un menú infantil?\n- pensar en altres coses divertides per afegir?\n"
            8:
                example_code: "```\n{print} \"Benvinguts al restaurant del xef Hedy\"\ngent = {ask} \"Quantes persones sereu a taula?\"\n```\n"
                story_text: "En aquest nivell has après a utilitzar la comanda `{repeat}` per repetir una línia de codi un cert nombre de vegades.\nPots fer servir això al teu restaurant per preguntar ( `{ask}`) a diverses persones què els agradaria menjar.\n\n### Exercici\nPots completar el codi? Hedy necessita repetir aquesta pregunta tantes vegades com persones hi hagi. Així que si hi ha 5 persones, la pregunta s'ha de fer 5 vegades.\n**Extra** Amplia el teu codi amb més preguntes, per exemple sobre quines begudes o salsa volen.\n"
            6:
                example_code: "```\nbegudes_estoc {is} aigua, llionada, coca-cola, suc de taronja\nbeguda {is} {ask} \"Què vols beure?\"\n{if} beguda {in} begudes_estoc\n{print} \"Una \" beguda \" en marxa!\"\n{else}\n{print} \"Ho sentim, ja no en servim.\"\n```\n"
                story_text: "### Exercici\nEl codi d'exemple mostra com podries programar quan t'has quedat sense un plat del menú al teu restaurant.\nCopia el teu codi del restaurant dels nivells anteriors. Crea un problema al teu restaurant i programa'l, tal com ho ha fet el codi d'exemple.\nPer exemple, el problema pot ser que t'has quedat sense un element del menú, o que no acceptes targetes de crèdit, o que la màquina de gelat està trencada.\n\n**Extra** Has programat el problema i les respostes adequades? Llavors intenta afegir més comandes `{if}` i `{else}` al teu codi.\nIntenta afegir un `{if}` després de cada comanda `{ask}` en el teu codi per fer-lo tan interactiu com sigui possible!\n"
            4:
                example_code: "```\n_ Afegiu les cometes a aquest codi _\n{print} Benvingut al Restaurant del xef Hedy!\n{print} Avui servim pizza o lasanya.\nmenjar {is} {ask} Què li agradria menjar?\n{print} Bona elecció! La menjar m'encanta!\nguarnició  {is} {ask} Què hi prefereix verdures o carn?\n{print} menjar amb guarnició en marxa!\nbegudes {is} {ask} Què voldria beure?\n{print} Gràcies per la comanda.\n{print} menjar de guarnició i begudes en marxa!\n```\n"
                story_text: "Al restaurant has d'utilitzar també les cometes quan facis servir la comanda `{print}` o `{ask}`.\n\n### Exercici\nAfegeix les cometes a aquest codi per fer-lo funcionar! Ves amb compte: les variables no han d'estar entre cometes.\nDesprés, utilitza la comanda `{clear}` per mostrar només una línia cada vegada a la pantalla de sortida.\n\n### Exercici 2\nTorna al nivell anterior i copia el teu codi del restaurant. Fes que el codi funcioni en aquest nivell afegint cometes als llocs adequats i afegeix algunes comandes `{clear}`.\n"
            10:
                story_text: "En aquest nivell pots utilitzar la nidificació per fer que el teu restaurant sigui més realista i divertit!\n\n### Exercici\nLa indentació s'ha eliminat del codi d'exemple.\nPots esbrinar quanta indentació necessita cada línia perquè el codi funcioni correctament?\nSi el client demana pizza, Hedy no hauria de preguntar quina salsa vol el client.\n\n**Extra** El restaurant no disposa de totes les salses. Fes una llista de les salses disponibles i dona una resposta amb cada comanda en funció de si està disponible. <br>\n**Extra** Les pizzes tenen ingredients. Pregunta als clients què volen. <br>\n**Extra** Els clients potser volen beguda. Pregunta'ls-hi també! <br>\n"
                example_code: "```\n{print} \"Benvinguts al restaurant del xef Hedy\"\ngent = {ask} \"Quantes persones sereu a taula?\"\n{print} \"Perfecte!\"\npreu = 0\n{repeat} gent {times}\n_ menjar = {ask} \"Què voldrà menjar?\"\n_ {print} menjar\n_ {if} menjar {is} patates fregides\n_ preu = preu + 3\n_ salsa = {ask} \"Quina salsa vol per les patates?\"\n_ {if} salsa {is} no\n_ {print} \"sense salsa\"\n_ {else}\n_ preu = preu + 1\n_ {print} \"amb \" salsa\n_ {if} menjar {is} pizza\n_ preu = preu + 4\n{print} \"En total costarà \" preu \" euros\"\n{print} \"Bon profit!\"\n```\n"
                story_text_2: |
                    En aquest nivell aprendràs noves ordres per ampliar encara més el teu codi.

                    ### Exercici 1
                    Col·loca un `{and}` i un `{or}` al lloc lògic del programa.

                    ### Exercici 2
                    Amplia el teu restaurant amb almenys un `{and}` i un `{or}` més.
                    Per exemple, crea un cupó de descompte especial que només s'apliqui a la pizza, o dona una beguda gratuïta al teu client amb patates fregides i pancakes. O una cosa completament diferent, i tant!
                example_code_2: |
                    ```
                    preu = 10
                    menjar = {ask} "Què voldries menjar?"
                    beguda = {ask} "Què voldries beure?"
                    {if} menjar {is} "entrepà" _ beguda {is} "suc"
                        {print} "Aquest és el nostre menú amb descompte"
                        preu = preu - 3
                    {if} beguda {is} "aigua" _ beguda {is} "suc"
                        {print} "Quina tria més saludable!"
                    {print} "Seran " preu " euros"
                    ```
            16:
                story_text: "Amb la comanda `{while}` pots assegurar-te que els teus clients puguin continuar afegint comandes fins que hagin acabat.\n\n### Exercici\nAfegeix correctament la comanda `{while}` a aquest codi.\n"
                example_code: "```\n{print} \"Benvinguts al McHedy\"\ncontinuar = \"sí\"\n_\n    comanda = {ask} \"Què vol demanar?\"\n    {print} comanda\n    continuar = {ask} \"Voldria demanar alguna cosa més?\"\n{print} \"Gràcies!\"\n```\n"
        name: restaurant
        description: Crea el teu propi restaurant virtual
    turtle:
        levels:
            9:
                example_code: "```\nangle = 90\n{repeat} 4 {times}\n    {turn} angle\n    {forward} 50\n```\n"
                story_text_2: "**Extra** Ara podem millorar el programa que dibuixa diferents figures. Acaba el codi i podràs dibuixar qualsevol polígon que vulguis!\n"
                example_code_2: "```\nfigura = {ask} \"Quants angles haig de dibuixar?\"\nangle = 360 / figura\n{repeat} figura {times}\n    {turn} _\n    {forward} _\n```\n"
                story_text: "Ara que podem repetir diverses línies, podem fer figures més fàcilment.\nNomés hem d'establir l'angle una vegada i després utilitzar aquesta variable en el `{repeat}`.\n\n### Exercici 1\nEl codi d'exemple crea un quadrat. Canvia el codi perquè creï una altra figura, com un triangle o un hexàgon.\nAixò requereix un canvi en dues línies de codi.\nConsell: Un cercle complet són 360 graus.\n\n### Exercici 2\nAra crea un dibuix format per almenys dos polígons.\n"
            1:
                example_code_2: "```\n{forward} 20\n{turn} {right}\n{forward} 20\n{turn} {left}\n{forward} 20\n```\n"
                story_text: "També pots utilitzar Hedy per dibuixar. Combinant girs i línies, pots fer un quadrat o escales!\n\nFent servir `{forward}` es dibuixa una línia cap endavant. El número que hi ha darrere determina quant caminarà la tortuga. `{turn} {right}` gira un quart de volta en sentit horari, `{turn} {left}` gira en sentit antihorari.\n\nPer anar cap enrere, has de fer servir la comanda `{forward}` però amb un número negatiu. Així, per exemple, `{forward} -100`.\n"
                example_code: "```\n{forward} 100\n{turn} {left}\n```\n"
                story_text_2: "### Exercici\nAquest és l'inici d'una petita escala. Pots fer que tingui 5 graons?\n"
            10:
                example_code: "```\n{color} {black}\n{repeat} 3 {times}\n    {repeat} 3 {times}\n        {forward} 10\n        {turn} 120\n    {color} {white}\n    {forward} 50\n    {color} {black}\n```\n"
                story_text: "Ara que podem utilitzar un `{repeat}` dins d'un `{repeat}`, podem crear figures més complexes.\n\n### Exercici 1\nAquest codi crea tres triangles negres, canvia-ho per cinc quadrats roses.\n\n**Extra** Crea una figura de la teva elecció que consti d'almenys dos tipus de formes diferents.\n"
            5:
                story_text: "Al nivell 5 pots fer una elecció amb `{if}`. Per exemple, entre diferents tipus de figures.\n"
                example_code: "```\n{print} \"Dibuixant figures\"\nfigura {is} {ask} \"Vols un quadrat o un triangle?\"\n{if} figura {is} triangle angle {is} 120\n{else} angle {is} 90\n{turn} angle\n{forward} 25\n{turn} angle\n{forward} 25\n{turn} angle\n{forward} 25\n{turn} angle\n{forward} 25\n```\n"
                story_text_2: "### Exercici\nOmple els números correctes en aquest codi per fer-lo funcionar.\nDesprés d'haver-ho fet, pots provar d'afegir l'opció cap enrere.\n\n**Extra** En lloc d'utilitzar \"left\" i \"right\", torna a fer el programa amb Nord, Est, Sud i Oest.\nD'aquesta manera podries afegir encara més direccions com Nord-est i Sud-oest, etc.\n"
                example_code_2: "```\ndireccio {is} {ask} \"Vols anar dreta, esquerra o cap endavant?\"\n{if} direccio {is} dreta {turn} _\n{if} direccio {is} esquerra {turn} _\n{forward} 100\n```\n"
            2:
                example_code: "```\n{forward} 80\n{turn} 90\n{forward} 50\n{turn} 180\n{forward} 100\n```\n"
                story_text: "Al nivell 1 la tortuga només podia girar a l'esquerra o a la dreta. Tot plegat una mica avorrit!\nAl nivell 2 pot apuntar el seu nas en totes direccions.\n\nUtilitza 90 graus per girar un quart, 180 per girar mig, i un cercle complet són 360 graus.\n\n### Exercici\nAquest codi ara crea la lletra T. Pots canviar-lo per fer la lletra B?\n\n**Extra** Canvia la lletra a una lletra diferent, com la primera del teu nom.\nTambé pots fer múltiples lletres, establint el color a `{color}` `{white}` enmig.\n"
                story_text_2: "Pots utilitzar variables per al `turn` de la tortuga.\n\n### Exercici\nCanvia el codi de manera que creï un triangle. Pista: només has de canviar el codi en un lloc.\n"
                example_code_2: "```\n{print} Dibuixant figures\nangle {is} 90\n{turn} angle\n{forward} 25\n{turn} angle\n{forward} 25\n{turn} angle\n{forward} 25\n```\n"
            7:
                story_text: "En aquest nivell pots utilitzar càlculs per dibuixar diferents figures.\nPotser has après a l'escola que per a girar un cercle complet són 360 graus. Si no, ara ho saps!\nÉs per això que també fas servir 90 graus per a un quadrat. 360 dividit per 4 és 90.\nAra que podem fer matemàtiques amb Hedy, podem dibuixar totes les figures que vulguem!\n"
                example_code: "```\nangles = {ask} \"Quants angles vols?\"\nangle = 360 / angles\n{forward} 50\n{turn} angle\n{forward} 50\n{turn} angle\n{forward} 50\n{turn} angle\n{forward} 50\n{turn} angle\n{forward} 50\n{turn} angle\n{forward} 50\n{turn} angle\n```\n"
            12:
                example_code: "```\n{define} quadrat\n    {repeat} 4 {times}\n        {turn} _\n        {forward} _\n{call} quadrat\n{forward} 50\n{call} quadrat\n{forward} 50\n{call} quadrat\n```\n"
                story_text: "Podem utilitzar funcions per dibuixar figures més complexes amb menys codi.\n### Exercici 1\nOmple la funció perquè es creïn tres quadrats. Si vols que la imatge es vegi més bonica, pots fer que les línies entre els quadrats siguin blanques.\n\n### Exercici 2\nEl codi es pot fer encara més curt. Col·loca les línies finals en un `{repeat}` perquè la figura encara sigui la mateixa.\n\n### Exercici 3\nCrea el teu propi dibuix amb figures diferents.\nCanvia tant el nombre de figures amb el `{repeat}` com la forma de les figures en el `{define}`\n"
            3:
                story_text: "En aquest nivell pots utilitzar `{at} {random}` amb la tortuga de dibuix. Una elecció aleatòria fa que la tortuga camini per un camí diferent cada vegada.\nFes servir `{at} {random}` per triar un valor d'una llista.\n### Exercici\nPots copiar i enganxar les línies 2 i 3 per crear un camí aleatori més llarg?\n"
                example_code: "```\nangles {is} 10, 50, 90, 150, 250\n{turn} angles {at} {random}\n{forward} 25\n```\n"
            4:
                story_text: "Al nivell 4 has d'utilitzar cometes amb `{print}` i `{ask}`. També quan dibuixes!\n"
                story_text_2: "També pots canviar el color de les línies amb la comanda `{color}`. Dona una ullada a l'exemple.\nTambé pots utilitzar la comanda `{color} {white}` per fer línies \"invisibles\". Pots fer servir aquestes línies blanques per moure la tortuga a qualsevol lloc de la pantalla abans de començar a dibuixar.\n"
                example_code: "```\n{print} _ Dibuixant figures _\nangle {is} 90\n{turn} angle\n{forward} 25\n{turn} angle\n{forward} 25\n```\n"
                example_code_2: "```\n{color} {white}\n{forward} -80\n{color} {green}\n{forward} 50\n{color} {yellow}\n{forward} 50\n{color} {red}\n{forward} 50\n```\n"
            11:
                example_code: "```\n{turn} 90\ndistancies = 10, 20, 30, 40, 50, 60\n{for} distancia {in} distancies\n    {forward} distancia \n```\n"
                story_text: "En aquest nivell pots fer que la tortuga dibuixi una figura.\nLa tortuga recorrerà les distàncies de la llista, una per una, fent passos cada vegada més grans.\n### Exercici 1\nAfegeix un gir de 90 graus en el bucle, perquè es dibuixi una espiral.\nAfegeix almenys 5 números a la llista, perquè l'espiral creixi més.\n**(extra)** pots canviar l'espiral a una altra forma? Experimenta amb números per al gir!\n### Exercici 2\nL'espiral es dibuixa cap a fora, fes que vagi cap a dins?\n"
        default_save_name: Tortuga
        name: tortuga
        description: Crea el teu dibuix
    sleep_command:
