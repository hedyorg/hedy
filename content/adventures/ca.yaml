                example_code: "```\n{define} cada_dia\n    {print} \"Cada dia al dematí\"\n    {print} _\n\n{call} cada_dia\n{print} \"I la gent mig adormida\"\n{print} \"es desperta de seguida.\"\n _\n```\n"
            11:
