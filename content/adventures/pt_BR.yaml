    dice:
        name: Dado
        default_save_name: Dado
        description: Faça seu próprio dado
        levels:
            3:
                story_text: |
                    Neste nível, podemos escolher algo de uma lista. Com isso, podemos deixar o computador escolher uma face do dado.
                    Dê uma olhada nos jogos que você tem guardados em casa.
                    Há algum jogo que usa um dado especial? Você também pode copiá-lo com esse código.
                    Por exemplo, os dados do jogo Earthworms (Minhocas) têm faces numeradas de 1 a 5 e uma minhoca na sexta face.

                    ![Dado de Earthworms com faces numeradas de 1 a 5 e uma minhoca na sexta face](https://cdn.jsdelivr.net/gh/felienne/hedy@24f19e9ac16c981517e7243120bc714912407eb5/coursedata/img/dobbelsteen.jpeg)
                example_code: |
                    ```
                    escolhas {is} 1, 2, 3, 4, 5, minhoca
                    {print} Você tirou _ {at} {random} !
                    ```
                story_text_2: |
                    ### Exercício
                    Os dados no exemplo acima são para um jogo específico. Você consegue fazer dados normais?
                    Ou outros dados especiais para um jogo diferente?
                example_code_2: |
                    ```
                    escolhas {is} _
                    ```
            4:
                story_text: |
                    In this level we can make sentences with the die value in the sentence, with quotes of course.
                    This time the sample code is not quite complete. Can you finish the code?
            5:
                story_text: |
                    You can also make a die again in this level using the `{if}`.
                    Complete the sample code so that the code says "You can stop throwing" once you have thrown an earthworm.

                    But maybe you want to recreate a die from a completely different game. That's fine too! Then make up your own reaction. Eg 'yes' for 6 and 'pity' for something {else}.
                example_code: |
                    ```
                    escolhas {is} 1, 2, 3, 4, 5, minhoca
                    jogada {is} escolhas {at} {random}
                    {print} 'você tirou ' jogada
                    _ jogada {is} minhoca {print} 'Você pode parar de jogar.'
                    _ {print} 'Você terá de jogar de novo!'
                    ```
            7:
                story_text: |
                    Você também pode refazer o dado do jogo Earthworms (Minhocas) aqui, mas desta vez você pode calcular sua pontuação.
                    Nesse jogo, a minhoca vale 5 pontos. Agora, logo após rolar os dados, você pode calcular imediatamente quantos pontos você tirou.
                    Este é o código para calcular pontos para um dado:

                    ### Exercício
                    Você consegue mudar o código de modo a calcular a pontuação total de 8 dados? Para isso, você terá de copiar e colar algumas linhas de código.
                example_code: |
                    ```
                    escolhas = 1, 2, 3, 4, 5, minhoca
                    pontos = 0
                    jogada = escolhas {at} {random}
                    {print} 'você tirou ' jogada
                    {if} jogada {is} minhoca pontos = pontos + 5 {else} pontos = pontos + jogada
                    {print} 'isso dá ' pontos ' pontos'
                    ```
                example_code_2: |
                    Você conseguiu calcular a pontuação para 8 dados? Precisou copiar e colar muitas vezes, né? Vamos deixar isso mais fácil no nível 7!
            8:
                story_text: |
                    Você também pode fazer um dado novamente neste nível. Com o comando `{repeat}`, você pode facilmente rolar uma mão cheia de dados.

                    ### Exercício
                    Tente finalizar o código amostra! **Extra** Pense num jogo que você conhece que envolve dados e o programe usando um `{repeat}`.
                example_code: |
                    ```
                    escolhas = 1, 2, 3, 4, 5, 6
                    _ _ _ _ _ _ _
                    ```
            11:
                story_text: |
                    ### Exercício
                    Estão todos demorando demais para jogar os dados? Neste nível você pode deixar Hedy jogar todos os dados de uma vez!
                    Mude os nomes para os nomes de seus amigos ou família e finalize o código.
                example_code: |
                    ```
                    jogadores = Ana, John, Jessie
                    escolhas = 1, 2, 3, 4, 5, 6
                    _ _ _ _
                        {print} jogador ' tirou ' escolhas {at} {random}
                        {sleep}
                    ```
    dishes:
        name: Pratos?
        default_save_name: Pratos
        description: Use o computador para decidir quem lava a louça
        levels:
            3:
                story_text: |
                    Você sempre discorda em casa sobre quem deve lavar a louça ou trocar a caixa de areia hoje?
                    Então você pode deixar o computador escolher de forma muito justa. Você pode programar isso neste nível!
                example_code: |
                    ```
                    pessoas {is} mãe, pai, Eva, Sofia
                    {print} pessoas {at} {random} é quem vai lavar a louça
                    ```
                story_text_2: |
                    ### Exercício
                    Faça a sua própria versão do programa de lavar louça. Primeiro, faça uma lista dos membros de sua família.
                    Então, pense em uma tarefa que precisa ser feita e deixe que o computador decida quem terá de fazê-la, usando o comando `{at} {random}`.

                    **Extra** Não está a fim de lavar a louça? Hackeie o programa removendo o seu próprio nome da lista com o comando `{remove}``{from}`.
            4:
                story_text: |
                    Com as aspas simples você pode deixar seu planejamento de lavagem de louça mais bonito.
                    Desta vez, o código de exemplo não está completo.

                    Você pode completar o código preenchendo os espaços em branco? Cada espaço em branco deve ser substituído por uma palavra de símbolo.

                    Dica: Não se esqueça das aspas!
                example_code: |
                    ```
                    pessoas {is} mãe, pai, Eva, Sofia
                    {print} _ os pratos são limpos por _
                    {sleep}
                    {print} pessoas {at} _
                    ```
            5:
                story_text: |
                    Com o `{if}` agora você pode se divertir mais com a escolha do programa. Você pode fazer com que seu programa responda à escolha que o computador fez.

                    Você pode terminar o código para que ele imprima 'muito ruim' quando for sua vez e, caso contrário, 'sim!'?
                    Não se esqueça das aspas simples!
                example_code: |
                    ```
                    pessoas {is} mãe, pai, Eva, Sofia
                    lavador {is} pessoas {at} {random}
                    _ lavador {is} Sofia {print} _ pena que tenho que lavar os pratos _
                    _ {print} 'felizmente sem pratos para lavar porque ' _ ' já está lavando'
                    ```
            7:
                story_text: |
                    Quantas vezes todo mundo vai lavar a louça? Isso é justo? Você pode contá-lo neste nível.
                example_code: |
                    ```
                    pessoas = mãe, pai, Eva, Sofia
                    vezes_eva_lava = 0
                    lavador = pessoas {at} {random}
                    {print} lavador ' é quem vai lavar a louça'
                    {if} lavador {is} Eva vezes_eva_lava = vezes_eva_lava + 1
                    {print} 'Eva vai lavar a louça ' vezes_eva_lava ' vezes essa semana'
                    ```

                    Agora você pode copiar as linhas 3 a 5 algumas vezes (para uma semana, 7 vezes) e calcular para uma semana inteira novamente.
                    Você consegue fazer o código funcionar para a semana inteira?
                story_text_2: |
                    Se você tiver uma extrema falta de sorte, o programa anterior pode escolher você para lavar a louça a semana inteira! Não é justo!
                    Para criar um sistema mais justo, você pode usar o comando `{remove}` para remover a pessoa escolhida da lista. Assim você não precisa lavar a louça de novo até que todos tenham tido sua vez.

                    Segunda e Terça já estão prontos para você! Você consegue adicionar o resto da semana?
                    E... você consegue pensar em uma solução para quando a lista ficar vazia?
                example_code_2: |
                    ```
                    pessoas = mãe, pai, Eva, Sofia
                    lavador = pessoas {at} {random}
                    {print} 'Segunda-feira quem lava a louça é: ' lavador
                    {remove} lavador {from} pessoas
                    lavador = pessoas {at} {random}
                    {print} 'Terça-feira quem lava a louça é: ' lavador
                    {remove} lavador {from} pessoas
                    ```
            8:
                story_text: |
                    Com o `{repeat}` você pode repetir pedaços de código. Você pode usá-lo para calcular para múltiplos dias quem vai lavar a louça!
                    ### Exercício
                    Use o comando `{repeat}` para decidir quem vai lavar a louça em cada dia de uma semana inteira. Cada lacuna precisa ser preenchida com um comando ou número!
                    **Extra** Você consegue pensar em outras tarefas na casa? Ajuste o código para que decida em três afazeres domésticos. Não se esqueça de imprimir quais são os afazeres em questão!
                example_code: |
                    ```
                    pessoas = mãe, pai, Eva, Sofia
                    {repeat} _ _ {print} 'A louça será lavada por ' _ _ _
                    ```
            11:
                story_text: |
                    Neste nível, você poderá fazer um cronograma para a semana inteira de uma maneira mais fácil!

                    ### Exercício
                    Adicione uma segunda tarefa, como aspirar ou arrumar, e certifique-se de também dividí-la para a semana inteira.
                    <br> **Extra** O programa não é justo, você pode ter azar e ter de lavar a louça a semana toda. De que modo você poderia deixar o programa mais justo?
                example_code: |
                    ```
                    dias = Segunda, Terça, Quarta, Quinta, Sexta, Sábado, Domingo
                    nomes = mãe, pai, Eva, Sofia
                    {for} dia {in} dias
                        {print} nomes {at} {random} ' irá lavar a louça ' dia
                    ```
    elif_command:
