    fortune:
        name: Vidente
        default_save_name: Vidente
        description: Deixe Hedy prever o futuro
        levels:
            1:
                story_text: |
                    Você já foi a um parque de diversões e teve seu futuro previsto por uma cartomante? Ou você já jogou com uma bola oito mágica?
                    Então você provavelmente sabe que eles não podem prever seu futuro, mas ainda é divertido de jogar!

                    Nos próximos níveis, você pode aprender a criar sua própria máquina de adivinhação!
                    No nível 1 você pode começar de leve, deixando a Hedy se apresentar como uma cartomante e deixá-la repetir com {echo} as respostas dos jogadores.
                    Dessa forma:
                example_code: |
                    ```
                    _ Olá, sou Hedy, a vidente!
                    _ Quem é você?
                    _ Deixe-me dar uma olhada na minha bola de cristal
                    _ Eu vejo... eu vejo...
                    _ Seu nome é
                    ```
                story_text_2: |
                    ### Exercício
                    Copie o código exemplo à sua tela de entrada e preencha as lacunas para fazer o código funcionar.
                    **Extra** Altere o código e deixe que a vidente preveja não apenas seu nome, mas também sua idade, seu time favorito ou algo mais sobre você.
            3:
                story_text: |
                    Nos níveis anteriores você criou sua primeira máquina de adivinhação, mas Hedy não conseguia prever nada, apenas usava {echo}.
                    Neste nível você pode usar uma variável e o comando `{at} {random}` para realmente deixar Hedy escolher uma resposta para você. Confira este código, por exemplo:
                example_code: |
                    ```
                    {print} Eu sou Hedy, a vidente!
                    pergunta {is} {ask} O que você quer saber?
                    {print} Isso é o que você quer saber: pergunta
                    respostas {is} sim, não, talvez
                    {print} Minha bola de cristal diz...
                    {sleep} 2
                    {print} respostas {at} {random}
                    ```
                story_text_2: |
                    ### Exercício
                    No momento, Hedy só pode responder sim, não ou talvez. Você pode dar à Hedy mais opções de resposta, como 'definitivamente' ou 'pergunte novamente'.
            4:
                story_text: |
                    ### Exercício
                    Nós removemos todas as aspas deste código exemplo, você consegue adicioná-las nos lugares certos?

                    ### Exercício 2
                    Volte ao nível anterior e copie o seu código da vidente. Faça aquele código funcionar neste nível adicionando as aspas nos locais certos.
                example_code: |
                    ```
                    _ Adicione as aspas a este código _
                    {print} Sou Hedy, a vidente!
                    pergunta {is} {ask} O que você quer saber?
                    {print} Essa é sua pergunta:  pergunta
                    respostas {is} sim, não, talvez
                    {print} Minha bola de cristal diz...
                    {sleep} 2
                    {print} respostas {at} {random}
                    ```
            6:
                story_text: |
                    ### Exercício
                    No código exemplo abaixo, você pode ver como se faz um programa de vidente que permite que você incline as probabilidades a seu favor. Esse programa trapaceiro sempre diz que você vai ganhar na loteria, mas seus amigos nunca vão ganhar.

                    Use isso para fazer seu próprio programa, seja criativo(a)! Você poderia, por exemplo, fazer um programa que prevê que:
                    * seu time favorito vai derrotar todos os competidores!
                    * seu filme favorito será escolhido para a noite de filme!
                    * você ganhará ingressos para seu show favorito!
                    * você é a mais bela de todas, como o espelho da Branca de Neve.
                    Deixe sua imaginação fluir!

                    Seu programa deve conter pelo menos 10 linhas de código e ter pelo menos um comando `{if}` e um `{else}`.
                example_code: |
                    ```
                    amigos {is} Jorge, Lúcia, Davi
                    {print} 'Posso prever se você ganhará na loteria amanhã!'
                    pessoa {is} {ask} 'Quem é você?'
                    resposta_boa {is} Oba! Você ganhou!, Você certamente vai ganhar!, Temos um vencedor!
                    resposta_ruim {is} Sem sorte! Tente novamente!, Outra pessoa vai ganhar, Você perdeu!
                    {if} pessoa {in} amigos {print} resposta_boa {at} {random}
                    {else} {print} resposta_ruim {at} {random}
                    ```
            7:
                story_text: |
                    In this level you can use math in your predictions as a fortune teller. This allows you to make up (silly) formulas to calculate the future.
                    For example you could calculate how rich you'll get or how many kids you will have when you grow up.
                example_code: |
                    ```
                    {print} 'Eu sou Hedy, a vidente!'
                    {print} 'Eu posso prever quantos filhos/filhas você terá quando crescer!'
                    idade = {ask} 'Quantos anos você tem?'
                    irmãos = {ask} 'Quantos irmãos/irmãs você tem?'
                    altura = {ask} 'Qual é a sua altura em centímetros?'
                    filhos = altura / idade
                    filhos = filhos - irmãos
                    {print} 'Você terá...'
                    {sleep}
                    {print} filhos ' filhos(as)!'
                    ```
            8:
                story_text: |
                    ### Exercício
                    Termine este programa que diz se seu/sua crush também te ama ou não.
                example_code: |
                    ```
                    {print} 'Eu tenho uma flor com pétalas mágicas'
                    {print} 'Se você tirar as pétalas, a flor te dirá se seu/sua crush também te ama'
                    quantidade = {ask} 'Quantas pétalas você quer tirar?'
                    opções = bem te quer, mal te quer
                    _ _ _ _ opções {at} {random}
                    ```
            9:
                story_text: |
                    No próximo exemplo, você poderá deixar a sua vidente fazer várias perguntas e também imprimí-las!

                    ### Exercício
                    Você consegue preencher as lacunas com os comandos certos?
                example_code: |
                    ```
                    {print} 'Eu sou Hedy, a vidente!'
                    {print} 'Você pode me fazer 3 perguntas.'
                    respostas = sim, não, talvez
                    _ _ _
                       pergunta = {ask} 'O que você quer saber?'
                       {print} pergunta
                       {sleep}
                       {print} 'Minha bola de cristal diz... ' respostas {at} {random}
                    ```
            11:
                story_text: |
                    Nesse nível, você aprenderá a programar o jogo MASH (mansion, apartment, shack, house). Nesse jogo, você pode prever para todos os jogadores ao mesmo tempo como será o futuro deles.

                    ### Exercício
                    Preencha os espaços em branco usando o novo comando que você aprendeu neste nível.
    functions:
        default_save_name: funções
        levels:
            12:
                story_text: |
                    Neste nível, você vai aprender a usar **funções**. Uma função é um bloco de código que você pode facilmente usar várias vezes. Funções podem nos ajudar a organizar pedaços de código que podemos usar de novo e de novo.
                    Para criar uma função, use `{define}` e a dê um nome. Depois, coloque todas as linhas que você quer que estejam na função em um bloco indentado abaixo da linha do `{define}`.
                    Deixe uma linha em branco no seu código para que ele fique mais elegante. Ótimo trabalho! Você criou uma função!

                    Agora, sempre que precisarmos daquele bloco de código, vamos simplesmente usar o nome da função para executá-lo! Não teremos de digitar aquele bloco novamente.

                    Veja este código exemplo de um jogo chamado Twister. A função 'giro' contém um bloco de código que escolhe qual membro do corpo deve ir aonde.

                    ### Exercício
                    Termine o código definindo as duas variáveis `membro_escolhido` e `cor_escolhida`.
                    Então, escolha quantas vezes você quer chamar a função de girar a roda do Twister.

                    ### Exercício 2
                    Melhore seu código adicionando uma variável chamada "pessoas". Use-a para dar um comando próprio a cada um dos jogadores.
                    Por exemplo: 'Ahmed, mão direita no verde' ou 'Jéssica, pé esquerdo no amarelo'.
                example_code: |
                    ```
                    lados = 'esquerdo', 'direito'
                    membros = 'mão', 'pé'
                    cores = 'vermelho', 'azul', 'verde', 'amarelo'

                    {define} giro
                        lado_escolhido = lados {at} {random}
                        membro_escolhido = membros _
                        cor_escolhida = cores _
                        {print} membro_escolhido ' ' lado_escolhido ' no ' cor_escolhida

                    {print} 'Vamos jogar uma partida de Twister!'
                    {for} i {in} {range} 1 {to} _
                        {call} giro
                        {sleep} 2
                    ```
        name: funções
        description: funções
    guess_my_number:
        default_save_name: adivinhe o número
        description: adivinhe o número
        name: Adivinhe o número
    harry_potter:
        description: Aventuras de Harry Potter
        default_save_name: Harry Potter
        name: Harry Potter
    haunted:
        name: Casa mal-assombrada
        default_save_name: Casa mal-assombrada
        description: escape from the haunted house
        levels:
            1:
                story_text: |
                    Nesta aventura você está trabalhando para fazer um jogo no qual você tem que escapar de uma casa mal-assombrada escolhendo a porta correta.
                    Se você escolher a porta certa, você sobreviverá, mas senão um monstro terrível pode...

                    No nível 1 começamos nosso jogo de casa mal-assombrada inventando uma história assustadora e perguntando ao jogador que monstro ele verá na casa mal-assombrada.
                example_code: |
                    ```
                    {print} Como eu cheguei aqui?
                    {print} Lembro-me de meu amigo me dizendo para entrar na antiga mansão...
                    {print} e de repente tudo ficou preto.
                    {print} Mas como eu acabei no chão...?
                    {print} Minha cabeça dói como se eu tivesse sido atingido por um taco de beisebol!
                    {print} Que som é esse?
                    {print} Oh não! Eu sinto que não estou sozinho nesta casa!
                    {print} Eu preciso sair daqui!
                    {print} Há 3 portas na minha frente..
                    {ask} Qual porta devo escolher?
                    {echo} eu escolho a porta
                    {print} ...?
                    ```
                story_text_2: |
                    ### Exercício
                    Copie o código exemplo à sua tela de entrada clicando no botão amarelo.
                    Agora termine a história adicionando pelo menos 5 linhas de código.
                    Lembre-se de começar cada linha com um comando `{print}`.
            2:
                story_text: |
                    Nesta casa mal-assombrada, você pode escolher seus monstros com emojis. Mas claro, você também poderia usar palavras.
                example_code: |
                    ```
                    monstro_1 {is} 👻
                    monstro_2 {is} 🤡
                    monstro_3 {is} 👶
                    {print} Você entra na casa mal-assombrada.
                    {print} De repente, você vê um monstro_1
                    {print} Você corre para a outra sala...
                    {print} Mas um monstro_2 está lá te esperando!
                    {print} Oh não! Você vai depressa até a cozinha.
                    {print} Mas ao entrar, um monstro_3 te ataca!
                    ```
                story_text_2: |
                    ### Exercício
                    No exemplo acima os monstros são pré-determinados. Portanto, cada vez que você executa seu código, o resultado é o mesmo.
                    Você pode adicionar comandos `{ask}` para tornar a casa mal-assombrada interativa e fazer com que os jogadores escolham os monstros que encontrarão?
                example_code_2: |
                    ```
                    monstro_1 {is} _
                    monstro_2 {is} _
                    monstro_3 {is} _
                    {print} Você entra na casa mal-assombrada.
                    {print} De repente, você vê um monstro_1
                    {print} Você corre para a outra sala...
                    {print} Mas um monstro_2 está lá te esperando!
                    {print} Oh não! Você vai depressa até a cozinha.
                    {print} Mas ao entrar, um monstro_3 te ataca!
                    ```
            3:
                story_text: |
                    Nos níveis anteriores você fez uma introdução ao seu jogo de casa mal-assombrada, mas como você deve ter notado, a história sempre teria um final terrível.
                    Neste nível você pode tornar sua história mais interativa alterando o resultado do jogo; às vezes você será comido, às vezes você escapará!
                    Deixe Hedy decidir aleatoriamente!
                example_code: |
                    ```
                    _ Escape da casa mal-assombrada!
                    _ Há 3 portas na sua frente...
                    _ _ _ Qual delas você escolhe?
                    _ Você escolheu a porta... escolha
                    monstros _ um zumbi, um vampiro, ALGO IMPOSSÍVEL DE SE ESCAPAR
                    _ Você vê...
                    {sleep}
                    _ _ _ _
                    ```
            4:
                story_text: |
                    In this level you learn how to use quotation marks in your games.
                    Can you make your Haunted House level 4 proof?
                example_code: |
                    ```
                    _ Adicione aspas a este código _
                    {print} Escape da casa mal-assombrada!
                    {print} Há 3 portas na sua frente...
                    escolha {is} {ask} Qual delas você escolhe?
                    {print} Você escolheu a porta... escolha
                    monstros {is} um zumbi, um vampiro, ALGO IMPOSSÍVEL DE SE ESCAPAR
                    {print} Você vê...
                    {sleep}
                    {print} monstros {at} {random}
                     ```
            5:
                story_text: |
                    Up until this level the haunted house game always asked the player to choose a door, but as you might have noticed, they didn't really have to answer correctly.
                    If the player filled in a completely random answer, the game would still work and the player might even win (despite not picking a door).
                    In this level you can only win the game by picking the same door Hedy picked randomly.
                example_code: |
                    ```
                    {print} 'Escape da casa mal-assombrada!'
                    {print} 'Há 3 portas na sua frente...'
                    portas {is} 1, 2, 3
                    monstros {is} lobisomem, múmia, vampiro, zumbi
                    porta_escolhida {is} {ask} 'Qual delas você escolhe?'
                    {print} 'Você escolhe a porta... ' porta_escolhida
                    {sleep}
                    porta_correta {is} portas {at} {random}
                    _ _ _ _ {print} 'Ótimo! Você escapou!'
                    {else} {print} 'Ah não! Você está sendo devorado(a) por um(a)... ' monstros {at} {random}
                    ```
            10:
                story_text: |
                    In this level you can use nesting, which allows you to make the haunted house even more interactive!
                example_code: |
                    ```
                    {print} 'Escape da Casa Mal-Assombrada!!'
                    jogador = vivo
                    portas = 1, 2, 3
                    monstros = zumbi, vampiro, aranha gigante
                    {repeat} 3 {times}
                        {if} jogador {is} vivo
                            porta_correta {is} portas {at} {random}
                            {print} 'Há 3 portas na sua frente...'
                            porta_escolhida = {ask} 'Qual delas você escolhe?'
                            {if} porta_escolhida {is} porta_correta
                                {print} 'Sem monstros aqui!'
                            {else}
                                {print} 'Você foi devorado(a) por um(a) ' monstros {at} {random}
                                jogador = morto
                        {else}
                            {print} 'FIM DE JOGO'
                    {if} jogador {is} morto
                        {print} 'Ótimo! Você sobreviveu!'
                    ```
    if_command:
        default_save_name: comando_se
        description: Introduzindo o comando {if}
        levels:
            5:
                story_text: |
                    ## Se... senão....
                    No nível 5, há um comando novo: o `{if}`! Com o `{if}` você pode escolher entre duas opções diferentes.
                    Este código imprime 'legal' se você digita Hedy como nome, e 'meh!' se você digita outra coisa.
                    `{ask}` e `{print}` ainda funcionam da mesma forma que no nível 4.
                example_code: |
                    ```
                    nome {is} {ask} 'qual é o seu nome?'
                    {if} nome {is} Hedy {print} 'legal' {else} {print} 'meh!'
                    ```
                story_text_2: |
                    Às vezes, códigos com um `{if}` ficam bem longos e não cabem direito na linha. <br> Você também pode dividir o código em duas linhas, começando a segunda linha com o `{else}`, assim:
                example_code_2: |
                    ```
                    nome {is} {ask} 'qual é o seu nome?'
                    {if} nome {is} Hedy {print} 'legal'
                    {else} {print} 'meh!'
                    ```
                story_text_3: |
                    ### Exercício
                    Tente criar seu próprio código com `{if}` e `{else}`. Você pode usar o código exemplo se quiser.
                example_code_3: |
                    ```
                    resposta {is} {ask} '2 + 2 = ?'
                    _ _ _ 4 _ 'Ótimo trabalho!'
                    _ _ 'Não, 2 + 2 = 4'
                    ```
            10:
                story_text: |
                    Neste nível, você também pode colocar um comando `{if}` dentro de outro comando `{if}`.
                example_code: "```\ncontinuar = {ask} 'Você quer continuar?'\n{if} continuar = sim\n    certeza = {ask} 'Tem certeza?'\n    {if} certeza {is} sim\n        {print} 'Vamos continuar'\n    {else}\n        {print} 'Você não tem certeza'\n{else}\n    {print} 'Você não quer continuar'\n```\n"
            9:
                example_code: "```\nnome = {ask} 'Qual é o seu nome?'\n{if} nome {is} Hedy\n    {print} 'Bem-vinda, Hedy'\n    {print} 'Você pode jogar no seu computador!'\n```\n"
        name: '{if} & {else}'
    in_command:
        default_save_name: comando_em
        description: Introduzindo o comando {in}
        levels:
            6:
                story_text: |
                    ## Listas
                    A partir de agora, quando quisermos checar se algo está em uma lista, poderemos usar o comando `{in}`.
                    Este código imprime 'bela!' se você escolhe verde ou amarelo, e 'meh' caso contrário.
                example_code: |
                    ```
                    cores_belas {is} verde, amarelo
                    cor_favorita {is} {ask} 'Qual é a sua cor favorita?'
                    {if} cor_favorita {in} cores_belas {print} 'bela!'
                    {else} {print} 'meh'
                    ```
                story_text_2: |
                    ### Exercício
                    Complete o código exemplo preenchendo as lacunas com comandos que você aprendeu.
                    Quando tiver terminado, tente criar seu próprio código com sua própria pergunta.
                example_code_2: |
                    ```
                    animais {is} cachorro, vaca, ovelha
                    resposta {is} {ask} 'Qual é o seu animal favorito?'
                    _ resposta _ animais _ 'O meu também!'
                    _ _ 'Meus animais favoritos são cachorros, vacas e ovelhas.'
                    ```
        name: '{in}'
    is_command:
        default_save_name: comando_é
        description: introduzindo o comando {is}
        levels:
            2:
                story_text: |
                    ## Variáveis
                    Você pode dar um valor a uma palavra usando `{is}`. Isso se chama **variável**. Neste exemplo, fizemos uma variável chamada de nome e uma variável chamada de idade. Você pode usar a palavra nome em qualquer parte do seu código e ela será substituída por Hedy, assim:
                example_code: |
                    ```
                    nome {is} Hedy
                    idade {is} 15
                    {print} nome tem idade anos
                    ```
                story_text_2: |
                    ### Exercício
                    É hora de criar suas próprias variáveis!
                    No código exemplo, fizemos um exemplo da variável `animal_favorito`. Na linha 1, a variável é definida e, na linha 2, usamos a variável em um comando `{print}`.
                    Primeiro, complete o nosso exemplo preenchendo a lacuna com o seu animal favorito. Então, faça você mesmo pelo menos 3 desses códigos. Escolha uma variável e a defina com o comando `{is}`. Em seguida, use-a com um comando {print}, assim como fizemos.
                example_code_2: |
                    ```
                    animal_favorito {is} _
                    {print} Eu gosto de animal_favorito
                    ```
            7:
                example_code: "```\nnome = Hedy\nresposta = 20 + 4\n```\n"
                story_text: "Também mudamos a forma como você guarda uma palavra em uma variável! Agora você pode usar `=` em vez de `{is}` para guardar um nome ou número numa variável, assim:\n"
        name: '{is}'
    language:
        name: Língua
        default_save_name: Idioma
        description: Pratique palavras em um idioma estrangeiro
        levels:
            5:
                story_text: |
                    Make your own program to practice your vocabulary in a new language.
                example_code: "```\n{print} 'Aprenda Francês!'\ngato {is} {ask} '🐱'\n{if} gato {is} chat {print} 'Incrível!'\n{else} {print} 'Não, gato é chat'\nsapo {is} {ask} '🐸'\n{if} sapo {is} grenouille {print} 'Sensacional!'\n{else} {print} 'Não, sapo é grenouille'\n```\n"
    maths:
        name: matemática
        default_save_name: matemática
        description: introduzindo matemática
        levels: {}
    music:
        name: música
        default_save_name: música
        description: Toque uma música!
        levels:
            1:
                story_text: |-
                    Neste nível, você irá aprender a usar o comando `{play}` para tocar uma melodia!

                    Digite `{play}` seguido da nota que você quer tocar. A escala vai assim: C-D-E-F-G-A-B (no lugar de Dó, Ré, Mi, Fá, Sol, Lá, Si; nessa ordem)
                    Como pode ver, há 7 letras diferentes, mas podemos tocar mais do que apenas 7 notas.
                    Digite um número entre 0 e 9 depois da letra para escolher a escala. Por exemplo, depois de B4 vem C5.
                    C0 é a nota mais grave que você pode tocar, e B9, a mais aguda.

                    ### Exercício
                    Experimente o código exemplo e então brinque com ele! Você consegue criar sua própria melodia?
                    No próximo nível, você aprenderá a tocar algumas músicas já existentes.
                example_code: "```\n{play} C4\n{play} D4\n{play} E4\n{play} F4\n{play} G4\n{play} A4\n{play} B4\n{play} C5\n```"
            2:
                story_text: |
                    ### Exercise
                    Termine as canções! Nós começamos os códigos para algumas melodias.
                example_code: |
                    ```
                    {print} O Velho MacDonald tinha uma fazenda
                    {play} C5
                    {play} C5
                    {play} C5
                    {play} G4
                    {play} A4
                    {play} A4
                    {play} G4
                    ```
                story_text_2: Como pode ver, você também pode usar o comando `{sleep}` para dar uma pequena pausa na música.
                example_code_2: |
                    ```
                    {print} Brilha Brilha Estrelinha
                    {play} C
                    {play} C
                    {play} G
                    {play} G
                    {play} A
                    {play} A
                    {play} G
                    {sleep} 1
                    {play} F
                    {play} F
                    ```
            3:
                story_text: |
                    Crie uma melodia aleatória!

                    ### Exercício
                    O código exemplo cria uma melodia aleatória, mas ela é bem curta e não usa muitas notas.
                    Adicione mais notas à lista e crie uma meloda mais longa copiando a última linha mais algumas vezes.
                example_code: |
                    ```
                    notas {is} A4, B4, C4
                    {play} notas {at} {random}
                    {play} notas {at} {random}
                    {play} notas {at} {random}
                    ```
            5:
                example_code: |
                    ```
                    resposta {is} {ask} 'Qual é a capital do Zimbábue?'
                    {if} resposta {is} Harare {play} C6
                    _
                    ```
                story_text: "Você não precisa sempre tocar uma música inteira quando for usar o comando `{play}`. Às vezes, você só quer tocar uma única nota.\nPor exemplo, se você quiser criar um quiz, você pode tocar uma nota aguda e feliz se a resposta estiver correta e uma nota grave e triste se estiver errada.\n\n### Exercício\nTermine a primeira pergunta adicionando uma linha de código que toca uma nota C3 se a resposta dada estiver errada.\nEm seguida, pense em mais 3 perguntas para adicionar a esse quiz.\n"
            7:
                story_text: "Instead of playing notes, you can also play numbers now. Simply type `{play} 1` for the lowest note, `{play} 70` for the highest note, or anything in between.\n\n### Exercise\n This calls for musical maths! Try out the example code a couple of times with different starting numbers. \nThen, see if you can compose a song using the numbers.\n"
            8:
                example_code: |
                    ```
                    {print} 'Brilha Brilha Estrelinha'
                    {repeat} 2 {times} {play} C4
                    {repeat} 2 {times} {play} G4
                    _
                    ```
            10:
                story_text: "From this level on you can - among other things - use a {repeat} command inside a {repeat} command.\nThat makes songs like 'Happy birthday' even shorter!\n\n### Exercise\nFinish the song!\n"
            16:
                example_code: "```\n{def} música\n    {play} _\n\nsim_ou_não = {input}('Quer ouvir a minha música infinita?')\n{while} sim_ou_não = 'sim':\n    {call} música\n    {print} '🥳'\n```\n"
                story_text: "**Aviso** Essa aventura pode ficar extremamente irritante!\nTambém podemos usar o comando {while} para repetir uma música infinitamente.\n\n### Exercício\nComplete a música infinita.\n"
    parrot:
        name: Papagaia
        default_save_name: Papagaia
        description: Crie sua própria papagaia de estimação online que irá copiar você!
        levels:
            1:
                story_text: |
                    Crie sua própria papagaia de estimação online que irá copiar você!
                example_code: |
                    ```
                    {print} Sou Hedy, a papagaia
                    {ask} qual é o seu nome?
                    {echo}
                    {echo}
                    ```
                story_text_2: |
                    ### Exercício
                    Copie o código exemplo à sua tela de entrada clicando no botão amarelo.
                    Faça a papagaia perguntar outra coisa. Preencha as lacunas no exemplo!
                    **Extra** Você também pode deixar a papagaia fazer múltiplas perguntas. Escreva mais algumas linhas de código embaixo de seu programa.
                example_code_2: |
                    ```
                    {print} Sou Hedy, a papagaia
                    {ask} _
                    {echo}
                    {echo}
            2:
                story_text: |
                    No nível anterior, você fez uma papagaia que repete o que você diz. Neste nível, tornaremos a papagaia interativa usando uma variável e o comando `{ask}`.
                    Também faremos a papagaia parecer mais viva adicionando comandos `{sleep}` depois que algo é dito.
                example_code: |
                    ```
                    {print} Sou Hedy, a papagaia
                    nome _ _ qual é o seu nome?
                    {print} nome
                    _
                    {print} grasnido
                    _
                    {print} nome
                    ```
                story_text_2: |
                    ### Exercício
                    Primeiramente, complete a linha 2 com os comando `{is}` e `{ask}`.
                    Em seguida, coloque um comando `{sleep}` nas linhas 4 e 6 para que a papagaia fique quieta por um tempo.

                    **Extra** Você consegue fazer a papagaia pedir mais do que apenas seu nome adicionando mais linhas de código?
            3:
                story_text: |
                    Ensine a sua papagaia uma nova palavra com `{add}`.
                    ### Exercício
                    Você consegue adicionar o comando `{add} {to_list}` de modo a fazer o código funcionar?
                example_code: |
                    ```
                    palavras {is} crrác, Hedy
                    {print} Treine sua papagaia!
                    palavra_nova {is} {ask} Qual palavra você quer ensinar a ela?
                    _ palavra_nova _ palavras
                    {print} 🧒 Diga palavra_nova, Hedy!
                    {print} 🦜 palavras {at} {random}
                    ```
            4:
                story_text: |
                    In this level we have to use quotation marks with the commands `{ask}` and `{print}`.
                    Can you complete the code by adding quotation marks?
                example_code: "```\npalavras {is} crrác, Hedy\n{print} _ Treine sua papagaia! _\npalavra_nova {is} {ask} _ Qual palavra você quer ensinar a ela? _\n{add} palavra_nova {to_list} palavras\n{print} _ 🧒 Diga _ palavra_nova _, Hedy!_\n{print} _ 🦜 _ palavras {at} {random}\n```\n"
            5:
                story_text: |
                    Recompense seu papagaio se ele disser a palavra correta!
                example_code: |
                    ```
                    palavras {is} crrác, Hedy
                    {print} 'Treine sua papagaia!'
                    palavra_nova {is} {ask} 'Qual palavra você quer ensinar a ela?'
                    {add} palavra_nova {to_list} palavras
                    palavra_dita {is} palavras {at} {random}
                    {print} '🧒 Diga ' palavra_nova ', Hedy!'
                    {print} '🦜' palavra_dita
                    _ palavra_dita {is} palavra_nova _ '🧒 Ótimo trabalho, Hedy! 🍪'
                    _ _ '🧒 Não, Hedy! Diga ' palavra_nova
                    ```
    piggybank:
        levels:
            7:
                story_text: |
                    In this adventure you learn how to make a digital piggy bank, to calculate how much money you have and how long you need to save up to buy what you want!
            15:
                example_code: |
                    ```
                    _ calculate_budget with wish, money, allowance
                        to_save = wish - money
                        weeks = to_save / allowance
                        {if} wish _ money
                            {print} 'You need to save up some more!'
                            {print} 'Youll need ' weeks ' more weeks.'
                        {else}
                            {print} 'Great! You have enough'
                            {print} 'Lets go shopping!'

                    money = {ask} 'How much money have you saved?'
                    wish = {ask} 'How much money do you need?'
                    allowance = {ask} 'How much pocket money do you get each week?'

                    {call} calculate_budget with _, _, _
                    ```
    print_command:
        default_save_name: imprima
        description: Introdução ao comando imprima
        levels:
            1:
                story_text: |
                    ## O comando {print}
                    Você pode imprimir texto na tela usando o comando `{print}`.
                example_code: |
                    ```
                    {print} Olá, programador(a)!
                    {print} Bem-vindo(a) à Hedy!
                    ```
                story_text_2: |
                    ### Exercício
                    Em Hedy você encontrará exercícios em todas as aventuras. Um exercício permite que você pratique os novos comandos e conceitos além de permitir que você dê seu toque pessoal aos códigos de exemplo.
                    Neste exercício você verá um espaço em branco de cor rosa. Você deve preencher algo no lugar do espaço em branco antes que o código possa ser executado.

                    Coloque o comando `{print}` no espaço em branco e então adicione mais cinco linhas de código. Cada linha precisa começar com o comando `{print}`.
                    Divirta-se!
                example_code_2: |
                    ```
                    _ Olá!
                    ```
            13:
                story_text: |-
                    Chegamos ao código real de Python! Isso significa que teremos de usar parênteses com `{print}` e `{range}` de agora em diante.
                    Também significa que você pode usar códigos Hedy deste nível em qualquer ambiente Python contanto que você use os comandos em inglês. Caso ainda não tenha tentado, você pode trocar o idioma de comandos no menu de comandos.
                example_code: |
                    ```
                    {print}('Olá!')
                    {for} i {in} {range}(1, 10):
                        {print}('Essa é a linha ', i)
                    ```
                story_text_2: Se quiser imprimir mais de um item, terá de separá-los por vírgulas.
                example_code_2: |
                    ```
                    temperatura = 25
                    {print}('Está ', temperatura, ' graus lá fora.')
                    ```
                    ```
                    nome = 'Hedy'
                    {print}('Meu nome é ', nome)
                    ```
    quotation_marks:
        name: '''aspas'''
        default_save_name: aspas
        description: Introdução às aspas
        levels:
            4:
                story_text: |
                    ## 'Aspas'
                    No nível 4, `{ask}` e `{print}` mudaram.
                    Agora, quando quiser imprimir qualquer texto, terá de colocá-lo entre aspas.
                    O bom disso é que agora você pode imprimir todas as palavras que quiser, mesmo as que você já usou para guardar algum valor usando `{is}`.
                    A maioria das linguagens de programação também usa aspas para isso, então estamos ficando um passo mais perto da programação real!
                example_code: |
                    ```
                    {print} 'Você terá de usar aspas de agora em diante!'
                    resposta {is} {ask} 'O que teremos de usar de agora em diante?'
                    {print} 'Teremos de usar ' resposta
                    ```
                story_text_2: |
                    ## Contrações
                    Importante! Note que, agora que estamos usando aspas simples, Hedy ficará confusa se você usar o apóstrofo em contrações como "d'água".
                    Certifique-se de delimitar o texto por aspas duplas em vez de simples quando for usar um apóstrofo.
                    Confira o código exemplo para ver a forma errada de usar apóstrofos em seu programa.
                example_code_2: |
                    ```
                    _ Esta é a forma errada de usar apóstrofos no seu código _
                    {print} 'Amigo, pode me trazer um copo d'água? Gelada, se tiver.'
                    {print} 'Claro, sempre deixo uma garrafa d'água cheia na geladeira.'
                    _ É assim que se resolve esse problema _
                    {print} "Amigo, pode me trazer um copo d'água? Gelada, se tiver."
                    {print} "Claro, sempre deixo uma garrafa d'água cheia na geladeira."
                    ```
    random_command:
        default_save_name: comando_aleatório
        description: introduzindo o comando em aleatório
        levels:
            3:
                story_text: |
                    ## Em aleatório
                    Neste nível, você pode fazer uma lista usando o comando `{is}` e então deixar o computador escolher um item aleatório dessa lista. Para isso, se usa o `{at} {random}`.
                example_code: |
                    ```
                    animais {is} cães, gatos, cangurus
                    {print} animais {at} {random}
                    ```
                story_text_2: |
                    Você pode usar o comando `{at} {random}` em uma frase também.
                example_code_2: |
                    ```
                    comida {is} hambúrguer, pizza, salada, burrito
                    {print} Vou comer comida {at} {random} no almoço.
                    ```
                story_text_3: |
                    ### Exercício
                    Experimente o comando `{at} {random}` criando o seu próprio game show onde você escolhe uma porta ou mala e ela contém um grande prêmio!
                    Consegue fazer isso? Já colocamos as primeiras linhas no código exemplo.
                example_code_3: |
                    ```
                    {print} O grande game show!
                    {print} Há 3 malas na sua frente...
                    escolhida {is} {ask} Qual mala você escolhe?
                    premios {is} _
                    _
                    ```
    restaurant:
        name: Restaurante
        default_save_name: Restaurante
        description: Crie seu próprio restaurante virtual
        levels:
            1:
                story_text: |
                    No nível 1 você pode fazer seu próprio restaurante virtual e receber os pedidos de seus convidados.
                story_text_2: |
                    ### Exercício
                    Copie o código exemplo à sua tela de entrada clicando no botão amarelo.
                    Primeiro, preencha as lacunas com os comandos certos para fazer o código funcionar corretamente.
                    Então, adicione pelo menos mais 4 linhas de código ao programa de restaurante.
                    Pergunte ao(à) cliente o que ele(a) gostaria de beber e pergunte se o pagamento será em dinheiro ou cartão.
                    Por fim, pense em uma forma gentil de se despedir do(a) cliente.
                example_code_2: |
                    ```
                    {print} Bem-vindo(a) ao restaurante da Hedy 🍟
                    _ O que você gostaria de pedir?
                    {echo} Então você gostaria de pedir
                    {print} Obrigado pelo seu pedido!
                    {print} Está a caminho!
                    ```
            2:
                story_text: |
                    No nível 2, você pode expandir seu restaurante usando variáveis. No nível 1, Hedy só conseguia executar `{echo}` no pedido uma única vez e só se lembrava da última coisa pedida.
                    Agora, você pode usar variáveis e Hedy poderá se lembrar tanto da comida quanto das bebidas!
                example_code: |
                    ```
                    {print} Bem-vindo(a) ao restaurante da Hedy!
                    {print} Hoje estamos servimos pizza ou lasanha.
                    comida {is} {ask} O que você gostaria de comer?
                    {print} Ótima escolha! Essa comida é minha favorita!
                    acompanhamento {is} {ask} Gostaria da comida com carne ou com vegetais?
                    {print} comida com acompanhamento a caminho!
                    ```
                story_text_2: |
                    ### Exercício
                    Copie o código do seu próprio restaurante do nível anterior para a tela de entrada abaixo.
                    Corrija o código substituindo os comandos `{ask}` e `{echo}` e usando variáveis, como você aprendeu neste nível.

                    Agora que seu código está funcionando novamente, é hora de adicionar algo mais.
                    Veja a última linha do código de exemplo: `{print} comida com acompanhamento a caminho!`
                    Nesta única linha foram utilizadas 2 variáveis para criar um resumo do pedido.
                    Agora adicione seu próprio resumo das comidas e bebidas que o cliente pediu.

                    **Extra** Agora que você aprendeu como usar variáveis, você pode usar quantas variáveis desejar em uma linha. Você pode adicionar mais variáveis ao seu código, como comer no local ou levar, dinheiro ou cartão, com ou sem canudo, etc.?
            3:
                story_text: |
                    Está tendo problemas para decidir o que quer jantar? Você pode deixar Hedy escolher por você!
                    Basta adicionar listas de suas refeições favoritas (ou menos favoritas) e Hedy poderá escolher seu jantar aleatoriamente.
                    Você também pode se divertir um pouco, deixando Hedy escolher o preço do seu jantar também! O que você vai conseguir?
                example_code: |
                    ```
                    pratos {is} espaguete, couve de Bruxelas, hambúrgueres
                    {print} Você terá pratos {at} {random} esta noite!
                    preços {is} 1 euro, 10 euros, 100 euros
                    {print} Isso custará preços {at} {random}, por favor.
                    ```
                story_text_2: |
                    ### Exercício
                    Agora faça a sua própria versão do restaurante aleatório.
                    Faça por conta própria uma lista de entradas, pratos principais, sobremesas, bebidas e preços.
                    Em seguida, use os comandos `{print}` e `{at} {random}` para informar ao(à) cliente o que estará em seu menu esta noite.
                example_code_2: |
                    ```
                    {print} Bem-vindo(a) ao seu próprio restaurante aleatório!
                    entradas {is} _
                    pratos_principais {is} _
                    sobremesas {is} _
                    bebidas {is} _
                    preços {is} _
                    _
                    ```
            4:
                example_code: "```\n_ Adicione aspas neste código _\n{print} Bem-vindo(a) ao Restaurante Chez Hedy!\n{print} Hoje, estamos servindo pizza ou lasanha.\ncomida {is} {ask} O que você gostaria de comer?\n{print} Ótima escolha!  comida  é meu prato preferido!\ncobertura {is} {ask} Você quer cobertura de carne ou de vegetais?\n{print} comida  com  cobertura  a caminho!\nbebida {is} {ask} O que você gostaria de beber?\n{print} Agradecemos por seu pedido.\n{print} Sua  comida  e  bebida  estarão aqui logo, logo!\n```\n"
                story_text: "Agora, no programa de restaurante, você também precisa de aspas para usar os comandos `{print}` ou `{ask}`.\n\n### Exercício\nAdicione aspas neste código para fazê-lo funcionar! Mas atenção: variáveis não devem ser colocadas em aspas.\nEm seguida, use o comando `{clear}` para mostrar apenas uma linha por vez na sua tela de saída.\n\n### Exercício 2\nVolte ao nível anterior e copie o seu código do restaurante. Faça o código funcionar neste nível colocando aspas nos lugares certos e adicione alguns comandos `{clear}`.\n"
            6:
                example_code: "```\nbebidas_disponíveis {is} água, limonada, coca, suco de laranja\nbebida {is} {ask} 'O que você gostaria de beber?'\n{if} bebida {in} bebidas_disponíveis {print} 'Um copo de ' bebida ' saindo!'\n{else} {print} 'Desculpe, não vendemos isso'\n```\n"
                story_text: "### Exercício\nO código exemplo mostra como você poderia programar o caso de algum item do cardápio já ter acabado no seu restaurante.\nCopie o seu próprio código do restaurante dos níveis anteriores. Crie um problema em seu restaurante e programe-o, assim como o código exemplo fez.\nPor exemplo, você também pode ter algum item do cardápio em falta, ou você não aceita cartão de crédito, ou talvez a máquina de sorvetes esteja quebrada.\n\n**Extra** Já programou o problema e as respostas apropriadas? Então tente adicionar mais comandos `{if}` e `{else}` ao seu código.\nTente adicionar um `{if}` depois de todo comando `{ask}` em seu código para torná-lo o mais interativo possível!\n"
    rock:
        name: Pedra, papel, tesoura
        default_save_name: Pedra_2
        description: Faça seu próprio jogo de pedra, papel e tesoura
        levels:
            1:
                story_text: |
                    No nível 1, você pode começar com um jogo de pedra, papel e tesoura.

                    Com o comando `{ask}` você pode fazer uma escolha, e com `{echo}` você pode repetir essa escolha.
                example_code: |
                    ```
                    {print} o que você escolhe?
                    {ask} escolha entre pedra, papel ou tesoura
                    {echo} então sua escolha foi:
                    ```
                story_text_2: |
                    ### Exercício
                    Em vez de usar palavras, você também pode usar emojis: ✊✋✌
                    Você consegue criar um código usando emojis?
                example_code_2: |
                    ```
                    {print} o que você escolhe?
                    {ask} escolha entre _
                    {echo} então sua escolha foi:
                    ```
            2:
                story_text: |
                    Neste nível, você pode praticar o uso de variáveis. Assim, você vai conseguir criar o jogo de pedra, papel e tesoura no próximo nível!
                    ### Exercício
                    Complete o código preenchendo a lacuna com a **variável**.
                    Este jogo não é muito interativo, mas não se preocupe! Na próxima aventura, você aprenderá a usar variáveis com o comando `{ask}` para tornar o seu jogo mais interativo!
                example_code: |-
                    ```
                    escolha {is} pedra
                    {print} Eu escolho _
                    ```
            3:
                story_text: |
                    Você pode usar o comando `{at} {random}` para deixar o computador escolher pedra, papel ou tesoura!

                    ### Exercício
                    Termine o código usando o comando `{at} {random}`.
                example_code: |
                    ```
                    escolhas {is} pedra, papel, tesoura
                    {print} escolhas _
                    ```
                story_text_2: |
                    **Extra** Faça um jogo para duas pessoas jogarem. Primeiro, peça que as duas digitem seus nomes. Então, deixe que o computador escolha aleatoriamente para elas.
                example_code_2: |
                    ```
                    escolhas {is} pedra, papel, tesoura
                    jogador_1 {is} {ask} Nome do(a) jogador(a) 1:
                    _
                    ```
            11:
                story_text: |
                    ### Exercício
                    Nos níveis anteriores, você fez diversas vezes o seu próprio jogo de pedra, papel e tesoura. Você consegue terminar este código e usar o comando `{for}` para fazer o jogo funcionar corretamente?
                example_code: |
                    ```
                    escolhas = _
                    jogadores = _
                    {for} _
                    ```
            4:
                example_code: "```\nescolhas {is} pedra, papel, tesoura\n{print} _O computador escolhe..._ escolhas {at} {random}\n```\n"
                story_text: "Neste nível, podemos continuar programando o jogo de pedra, papel e tesoura. Mas se quiser adicionar texto, você terá de usar aspas aqui também.\n### Exercício\nPreencha as lacunas com aspas. Note que a variável `escolhas` deve ficar fora das aspas.\n"
            5:
                example_code: "```\nopções {is} pedra, papel, tesoura\nescolha_do_computador {is} _\nescolha {is} _\n{print} 'você escolheu ' _\n{print} 'o computador escolheu ' _\n{if} _ {is} _ {print} 'empatado!' {else} {print} 'sem empate'\n```\n\nPreencha as lacunas com o código certo para ver se há empate.\n"
                story_text: "Neste nível, podemos determinar se houve ou não um empate. Para tanto, você precisa do novo comando `{if}`.\n\n### Exercício\nComplete o código preenchendo as lacunas:\n* Deixe o computador escolher aleatoriamente\n* Pergunte ao(à) jogador(a) qual opção ele(a) quer escolher\n* Preencha as linhas 4 e 5 com as variáveis corretas\n* Complete a linha 6 para que Hedy possa checar se houve ou não um empate.\n"
    rock_2:
        name: Pedra, papel e tesoura 2
        default_save_name: pedra_2
        description: Parte 2 de pedra, papel e tesoura
        levels:
            2:
                story_text: |
                    Agora que você aprendeu a usar o comando `{ask}`, você pode deixar o código do seu jogo de pedra, papel e tesoura mais interativo!

                    ### Exercício
                    Deixe o jogo mais interativo adicionando um comando `{ask}` para fazer uma pergunta em seu jogo de pedra, papel e tesoura.
                example_code: |
                    ```
                    escolha {is} _
                    {print} Eu escolho escolha
                    ```
    secret:
        name: Superespião
        default_save_name: Superespião
        description: Faça seu próprio código de espião
    sleep_command:
        default_save_name: comando_durma
        description: introduzindo o comando {sleep}
        levels:
            2:
                story_text: |
                    Mais um comando novo deste nível é o `{sleep}`, que pausa o seu programa por um segundo. Se você digitar um número depois do comando `{sleep}`, o programa pausa por essa quantidade de segundos.
                    ### Exercí
                    cio
                    Pratique esse novo comando fazendo um código de sua própria autoria, em que você usa o `{sleep}` pelo menos 3 vezes. Para cada comando `{sleep}`, o tempo de pausa tem de ser diferente.
                example_code: |
                    ```
                    {print} Minha cor favorita é...
                    {sleep} 2
                    {print} verde!
                    ```
    songs:
        name: Cante uma canção!
        default_save_name: Canção
        description: Imprima uma canção
        levels:
            8:
                story_text: |
                    As músicas geralmente contêm muita repetição. Por exemplo... Bebê Tubarão! Se você canta, você continua cantando a mesma coisa:

                    Bebê tubarão tututudutudu <br>
                    Bebê tubarão tututudutudu <br>
                    Bebê tubarão tututudutudu <br>
                    Tubarão bebê

                    Você pode fazer esta música muito mais curta com um `{repeat}`! Você pode terminar o código?
            9:
                story_text: |
                    Em um nível anterior você programou a música 'Garrafas de cerveja'. Você fez um verso e depois teve que copiar os versos 99 vezes. No nível 7 você pode repetir a música 99 vezes, apenas adicionando uma linha simples!
                example_code: |
                    ```
                    verso = 99
                    {repeat} 99 {times}
                         {print} verso 'garrafas de cerveja na parede'
                         {print} verso 'garrafas de cerveja'
                         {print} 'Pegue uma, passe por aí'
                         verso = verso - 1
                         {print} verso 'garrafas de cerveja na parede'
                    ```
            11:
                story_text: |
                    Neste nível, você pode facilmente fazer a música infantil 'Cinco macaquinhos'. Você pode fazer o último refrão?
                    Você também pode fazer toda a música do tubarão bebê (incluindo todos os outros tubarões da família) em apenas 6 linhas!
                    Ou você pode fazer o Velho MacDonald com todos os diferentes animais.
                example_code: |
                    ```
                    macacos = 5, 4, 3, 2
                    {for} macaco {in} macacos
                        {print} macaco 'macaquinhos pulando na cama'
                        {print} 'Um caiu e bateu a cabeça'
                        {print} 'Mamãe chamou o médico e o médico disse'
                        {print} 'SEM MAIS MACACOS PULANDO NA CAMA!'
                    ```

                    ```
                    tubarões = bebê, mamãe, papai, vovó, vovô
                    {for} tubarão {in} tubarões
                        {print} tubarão 'tututututudu'
                        {print} tubarão 'tututututudu'
                        {print} tubarão 'tututututudu'
                        {print} tubarão
                    ```
                    ```
                    animais = porco, cachorro, vaca
                    {for} animal {in} animais
                        {if} animal {is} porco
                            som = oink
                        {if} animal {is} cachorro
                            som = au
                        {if} animal {is} vaca
                            som = mu
                        {print} 'O velho MacDonald tinha uma fazenda'
                        {print} 'I A I A O U!'
                        {print} 'e naquela fazenda ele tinha um ' animal
                        {print} 'I A I A O U!'
                        {print} 'com um ' som som ' aqui'
                        {print} 'e um ' som som ' ali'
                        {print} 'aqui um ' som
                        {print} 'lá um' som
                        {print} 'em todos os lugares um ' som som
                    ```
    songs_2:
        default_save_name: Canção 2
        description: Cante uma canção 2
        levels:
            12:
                example_code: |
                    ```
                    {define} twinkle
                        {print} 'Twinkle'
                        {print} '...'

                    {call} twinkle
                    {print} 'Up above the world so high'
                    {print} 'Like a diamond in the sky'
                    {call} _
                    ```
    turtle:
        name: Tartaruga
        default_save_name: Tartaruga
        description: Faça o seu próprio desenho
        levels:
            1:
                story_text: |
                    Você também pode usar Hedy para desenhar. Ao combinar giros e linhas, você pode fazer um quadrado ou uma escada!

                    Usando `{forward}` você desenha uma linha para frente. O número depois dele determina o quão longe a tartaruga vai andar. `{turn} {right}` gira um quarto de volta no sentido horário, `{turn} {left}` gira no sentido anti-horário.
                    Se você quiser voltar, você usa o comando `{forward}` mas com um número negativo. Por exemplo, `{forward} -100`
                story_text_2: |
                    ### Exercise
                    Este é o início de uma pequena escada. Você pode fazê-la ter 5 degraus?
                example_code_2: "```\n{forward} 20\n{turn} {right}\n{forward} 20\n{turn} {left}\n{forward} 20\n```\n"
                example_code: "```\n{forward} 100\n{turn} {left}\n```\n"
            2:
                story_text: |
                    No nível 1, a tartaruga só podia virar para a esquerda ou para a direita. Isso é meio chato!
                    No nível 2, ela pode apontar seu nariz para qualquer direção.

                    Use 90 graus para dar um quarto de volta, 180 para dar meia volta, e 360 para dar uma volta completa.

                    ### Exercício
                    No momento, esse código cria a letra T. Você consegue mudá-lo de forma que ele faça a letra B?

                    **Extra** Mude a letra para alguma outra letra, como, por exemplo, a primeira do seu nome.
                    Você também pode criar várias letras, definindo a cor como `{color}` `{white}` entre elas.
                example_code: |
                    ```
                    {forward} 80
                    {turn} 90
                    {forward} 50
                    {turn} 180
                    {forward} 100
                    ```
                story_text_2: |
                    Você também pode usar variáveis no comando `turn` da tartaruga.

                    ### Exercício
                    Altere o código de modo que ele crie um triângulo. Dica: você só precisa mudar o código em um lugar.
                example_code_2: |
                    ```
                    {print} Desenhando figuras
                    ângulo {is} 90
                    {turn} ângulo
                    {forward} 25
                    {turn} ângulo
                    {forward} 25
                    {turn} ângulo
                    {forward} 25
                    ```
            3:
                story_text: |
                    Neste nível você pode usar `{at} {random}` com a tartaruga de desenho. Uma escolha aleatória faz com que a tartaruga percorra um caminho diferente a cada vez.
                    Use `{at} {random}` para escolher um valor de uma lista. Você pode copiar e colar as linhas 2 e 3 para criar um caminho aleatório mais longo.
                example_code: |
                    ```
                    ângulos {is} 10, 50, 90, 150, 250
                    {turn} ângulos {at} {random}
                    {forward} 25
                    ```
            4:
                story_text: |
                    No nível 4 você tem que usar aspas com `{print}` e `{ask}`. Também ao desenhar!
                example_code: |
                    ```
                    {print} _ Desenhando figuras _
                    ângulo {is} 90
                    {turn} ângulo
                    {forward} 25
                    {turn} ângulo
                    {forward} 25
                    ```
                example_code_2: "```\n{color} {white}\n{forward} -80\n{color} {green}\n{forward} 50\n{color} {yellow}\n{forward} 50\n{color} {red}\n{forward} 50\n```\n"
                story_text_2: "Você também pode mudar a cor das linhas com o comando `{color}`. Dê uma olhada no exemplo.\nVocê também pode usar o comando `{color} {white}` para fazer linhas \"invisíveis\". Você pode usar essas linhas brancas para mover a tartaruga para qualquer lugar da tela antes de começar a desenhar.\n"
            5:
                story_text: |
                    No nível 5 você pode fazer uma escolha com `{if}`. Por exemplo, entre diferentes tipos de figuras.
                example_code: |
                    ```
                    {print} 'Desenhando Figuras'
                    figura {is} {ask} 'Você quer um quadrado ou um triângulo?'
                    {if} figura {is} triângulo ângulo {is} 120
                    {else} ângulo {is} 90
                    {turn} ângulo
                    {forward} 25
                    {turn} ângulo
                    {forward} 25
                    {turn} ângulo
                    {forward} 25
                    {turn} ângulo
                    {forward} 25
                    ```
                example_code_2: |
                    ```
                    direção {is} {ask} 'Você quer seguir para a esquerda, direita ou em frente?'
                    {if} direção {is} esquerda {turn} _
                    {if} direção {is} direita {turn} _
                    {forward} 100
                    ```
                story_text_2: "### Exercício\nPreencha este código com os números corretos para fazê-lo funcionar.\nDepois disso, você pode tentar adicionar a opção \"para trás\".\n\n**Extra** Em vez de usar 'esquerda' e 'direita', refaça o programa usando Norte, Leste, Sul e Oeste.\nAssim, você poderia até mesmo incluir outras direções como Nordeste, Sudoeste etc.\n"
            7:
                story_text: |
                    Neste nível você pode usar cálculos para desenhar figuras diferentes.
                    Você pode ter aprendido na escola que girar um círculo completo é de 360 graus. Se não, agora você sabe!
                    É por isso que você também usa 90 graus para um quadrado. 360 dividido por 4 é 90.
                    Agora que podemos fazer contas com a Hedy, podemos desenhar todas as figuras que quisermos!
                example_code: |
                    ```
                    ângulos = {ask} 'Quantos ângulos você deseja?'
                    ângulo = 360 / ângulos
                    {forward} 50
                    {turn} ângulo
                    {forward} 50
                    {turn} ângulo
                    {forward} 50
                    {turn} ângulo
                    {forward} 50
                    {turn} ângulo
                    {forward} 50
                    {turn} ângulo
                    {forward} 50
                    {turn} ângulo
                    ```
            9:
                story_text: |
                    Agora que podemos repetir várias linhas, podemos fazer figuras com mais facilidade.
                    Nós só temos que definir o ângulo uma vez e então usar essa variável no `{repeat}`.
                example_code: |
                    ```
                    ângulo = 90
                    {repeat} 4 {times}
                        {turn} ângulo
                        {forward} 50
                    ```
                story_text_2: |
                    **Extra** Agora podemos melhorar o programa que desenha diversas figuras. Termine o código e você poderá desenhar qualquer polígono que quiser!
                example_code_2: |
                    ```
                    ângulos = {ask} 'Quantos ângulos eu deve desenhar?'
                    ângulo= 360 / ângulos
                    {repeat} ângulos {times}
                        {turn} _
                        {forward} _
                    ```
            10:
                story_text: |
                    Now that we can use a `{repeat}` inside a `{repeat}`, we can create more complex figures.

                    ### Exercise 1
                    This code creates three black triangles, change that into five pink squares.

                     **(extra)** Create a figure of your own choosing consisting of at least two different shapes types.
            11:
                story_text: |
                    In this level you can make the turtle draw a figure.
                    The turtle will travel the distances in the list, one by one, making bigger and bigger steps.

                    ### Exercise 1
                    Add a 90 degree turn in the loop, so that a spiral is drawn.
                    Add at least 5 numbers to the list, so the spiral grows larger.
                     **(extra)** can you change the spiral into another shape? Experiment with numbers for the turn!

                    ### Exercise 2
                    The spiral is drawn outwards, make it go inwards?
                example_code: |
                    ```
                    {turn} 90
                    distâncias = 10, 20, 30, 40, 50, 60
                    {for} distância {in} distâncias
                        {forward} distância
                    ```
