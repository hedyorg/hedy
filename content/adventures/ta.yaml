                example_code: "**எச்சரிக்கை! இந்தக் குறியீடு பிழைத்திருத்தம் செய்யப்பட வேண்டும்!** \n``` \n{print} 'எடியின் கை நகங்கள் மற்றும் பாதத்தில் வரும் காழ்ப்புணர்ச்சிகளுக்கு வரவேற்கிறோம்' \nஉடல் உறுப்புகள் {is} {ask} 'உங்கள் விரல் நகங்கள் அல்லது கால் நகங்களை இன்று செய்து முடிக்கிறீர்களா? அல்லது இரண்டா?' \n{if} உடல் {is} \nவிலை = 25 \n{else} \n18 \n{print} 'அது $' விலை \ncolor = {ask} 'நீங்கள் எந்த நிறத்தை விரும்புகிறீர்கள்?' \nsparkles = {ask} 'அதனுடன் சில பிரகாசங்களை நீங்கள் விரும்புகிறீர்களா? அதற்காக $3 கூடுதல் வசூலிக்கிறோம்.' \n{if} பிரகாசங்கள் {is} ஆம் \nவிலை = விலை + 3 \n{else} {print} 'எனவே கூடுதல் கட்டணம் இல்லை' \n{repeat} 3 {print} 'மற்றொரு நொடி...' \n{print} 'எல்லாம் முடிந்தது! அது $' விலை 'தயவுசெய்து!' \n'நன்றி! விடைபெறுகிறேன்!' \n```"
