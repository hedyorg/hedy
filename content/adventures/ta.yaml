    piggybank:
        name: பிக்கி வங்கி
        default_save_name: பிக்கி வங்கி
        description: உங்கள் பாக்கெட் பணத்தை எண்ணுங்கள்!
        levels:
            7:
                example_code: "```\n {print} 'டிசிட்டல் பிக்கி வங்கி'\n ask = {ask} 'நீங்கள் என்ன வாங்க விரும்புகிறீர்கள்?'\n விலை = {ask} 'அது எவ்வளவு செலவாகும்?'\n சேமிக்கப்பட்டது = {ask} 'நீங்கள் ஏற்கனவே எவ்வளவு பணம் சேமித்தீர்கள்?'\n கொடுப்பனவு = {ask} 'வாரத்திற்கு எவ்வளவு பாக்கெட் பணம் கிடைக்கும்?'\n to_save = விலை - சேமிக்கப்பட்டது\n வாரங்கள் = to_save / கொடுப்பனவு\n {print} 'நீங்கள்' _ 'வாரங்களில்' _ 'வாங்கலாம்.\n ```\n"
                story_text: "இந்த சாகசத்தில் டிசிட்டல் பிக்கி வங்கியை எவ்வாறு உருவாக்குவது என்பதை நீங்கள் கற்றுக்கொள்கிறீர்கள்.\n\n ### உடற்பயிற்சி\n உங்களிடம் எவ்வளவு பணம் இருக்கிறது, நீங்கள் விரும்பியதை வாங்க எவ்வளவு நேரம் சேமிக்க வேண்டும் என்பதைக் கணக்கிட குறியீட்டை முடிக்கவும்!\n ** கூடுதல் ** ஒருவேளை நீங்கள் ஏற்கனவே கொஞ்சம் பணத்தை மிச்சப்படுத்தியிருக்கலாம்? நீங்கள் சேமிக்க வேண்டிய தொகையிலிருந்து அதைக் கழிக்கவும்.\n"
            15:
                story_text: "### உடற்பயிற்சி\n இந்த மட்டத்தில் நீங்கள் போதுமான பணத்தை மிச்சப்படுத்தியிருந்தால் எடி உங்களுக்குச் சொல்ல அனுமதிக்கலாம்!\n வெற்றிடங்களை நிரப்புவதன் மூலம் இந்த குறியீட்டை முடிக்கவும்!\n"
                example_code: "``` \n_ கணக்கிட_பட்செட்(ஆசை, பணம், கொடுப்பனவு): \nto_save = ஆசை - பணம் \nவாரங்கள் = சேமிப்பதற்கு / கொடுப்பனவு \n{if} விரும்பினால் _ பணம்: \n{print} ('நீங்கள் இன்னும் கொஞ்சம் சேமிக்க வேண்டும்!') \n{print} (\"உங்களுக்கு ', வாரங்கள், ' மேலும் வாரங்கள் தேவைப்படும்.\") \n{else}: \n{print} ('அருமை! உங்களுக்கு போதுமானது') \n{print} (\"சாப்பிங் போகலாம்!\") \n\nபணம் = {input}('நீங்கள் எவ்வளவு பணம் சேமித்துள்ளீர்கள்?') \nwish = {input}('உங்களுக்கு எவ்வளவு பணம் தேவை?') \nகொடுப்பனவு = {input}('ஒவ்வொரு வாரமும் உங்களுக்கு எவ்வளவு பாக்கெட் பணம் கிடைக்கும்?') \n\n_ \n```\n"
    print_command:
        name: '{print}'
        default_save_name: அச்சிடுக
        description: அறிமுகம் அச்சு கட்டளை
        levels:
            1:
                example_code_2: "```\n _ வணக்கம்!\n ```\n"
                story_text: "## {print} கட்டளை \n`{print}` கட்டளையைப் பயன்படுத்தி திரையில் உரையை அச்சிடலாம்.\n"
                example_code: "```\n {print} ஆய், புரோகிராமர்!\n {print} எர்டிக்கு வருக!\n ```\n"
                story_text_2: "### உடற்பயிற்சி\n எடியில் ஒவ்வொரு சாகசத்திலும் நீங்கள் பயிற்சிகளைக் காண்பீர்கள். புதிய கட்டளைகளையும் கருத்துகளையும் பயிற்சி செய்ய ஒரு உடற்பயிற்சி உங்களை அனுமதிக்கிறது, மேலும் எடுத்துக்காட்டு குறியீடுகளுக்கு உங்கள் சொந்த திருப்பத்தை வழங்க உங்களை அனுமதிக்கிறது.\n இந்த பயிற்சியில் நீங்கள் ஒரு இளஞ்சிவப்பு வெற்று இடத்தைக் காண்பீர்கள். குறியீட்டை இயக்குவதற்கு முன்பு நீங்கள் வெற்று இடத்தின் இடத்தில் எதையாவது நிரப்ப வேண்டும்.\n\n வெற்று இடத்தில் `{print}` கட்டளையை நிரப்பவும், பின்னர் மேலும் ஐந்து வரிகளைச் சேர்க்கவும். ஒவ்வொரு வரியும் `{print}` கட்டளையுடன் தொடங்க வேண்டும்.\n வேடிக்கையாக இருங்கள்!\n"
            13:
                example_code: "```\n {print} ('அலோ!')\n {for} i {in} {range} (1, 10):\n {print} ('இது வரி', i)\n ```\n"
                example_code_2: "```\n வெப்பநிலை = 25\n {print} ('இது', வெப்பநிலை, 'டிகிரி வெளியே')\n ```\n ```\n பெயர் = 'எடி'\n {print} ('என் பெயர்', பெயர்)\n ```\n"
                story_text_2: நீங்கள் ஒன்றுக்கு மேற்பட்ட உருப்படிகளை அச்சிட விரும்பினால், அவற்றை காற்புள்ளிகளால் பிரிக்க வேண்டும்.
                story_text: "நாங்கள் உண்மையான பைதான் குறியீட்டிற்கு வந்தோம்! அதாவது இனிமேல் `{print}` மற்றும் `{range}` உடன் அடைப்புக்குறிகளைப் பயன்படுத்த வேண்டும். \nநீங்கள் ஆங்கில கட்டளைகளைப் பயன்படுத்தும் வரை எந்த பைதான் சூழலிலும் இந்த நிலையிலிருந்து Hedy குறியீட்டைப் பயன்படுத்தலாம் என்பதும் இதன் பொருள். இதுவரை நீங்கள் அவ்வாறு செய்யவில்லை என்றால், கட்டளைகள் பட்டியலில் மாற்றத்தை மாற்றலாம்."
