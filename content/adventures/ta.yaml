        levels:
            15:
                example_code: "```\n # முந்தைய சாகசத்திலிருந்து உங்கள் சொந்த குறியீட்டைப் பயன்படுத்தவும்.\n ```\n"
                story_text: "### உடற்பயிற்சி 2 \n**இந்த சாகசத்தின் இரண்டாம் பாகம் இது.** துணிவு முந்தைய சாகசத்தில் தொடங்குகிறது. \nநிச்சயமாக, நீங்கள் எப்போதும் 4 சோதனைகளின் சராசரியைக் கணக்கிட விரும்பவில்லை. நீங்கள் 10 சோதனைகளின் சராசரியைக் கணக்கிட விரும்பலாம் அல்லது 2... \nஉரையாடல் மற்றும் 'amount_of_tests' என்ற மாறியைச் சேர்ப்பதன் மூலம் இந்த சிக்கலை சரிசெய்யலாம். \n* வரி 3 இல் ஒரு புதிய வரியைத் தொடங்கவும். அவர்கள் எத்தனை சோதனைகளைச் செய்திருக்கிறார்கள் என்று மாணவரிடம் கேட்டுத் தொகை_ஆஃப்_டெட்ச் வாதத்தை அமைக்கவும். \n* வரி 4ல் உள்ள 4ஐ புதிய வாத அளவு_ஆஃப்_டெச்ட்களுக்கு மாற்றவும். \n* கடைசியாக, வரி 6ல் உள்ள 4ஐத் தொகை_ஆஃப்_டெச்ட்களுக்கு மாற்றவும் \n\nஉங்கள் புதிய திட்டத்தை முயற்சிக்கவும். இது வேலை செய்யுமா? \n\n### உடற்பயிற்சி 3 \nஉங்கள் திட்டத்தை இன்னும் சிறப்பாக்க விரும்புகிறீர்களா? அருமை! முந்தைய திட்டத்தில் நீங்கள் 1 பாடத்தின் சராசரி தரத்தை மட்டுமே கணக்கிட முடியும், ஆனால் நீங்கள் விரும்பும் அனைத்து பாடங்களுக்கும் சராசரி தரத்தை கணக்கிடினால் நன்றாக இருக்கும்! \nஇதை எப்படி செய்வது என்று நாங்கள் உங்களுக்குச் சொல்ல மாட்டோம், ஆனால் நாங்கள் உங்களுக்கு ஒரு உதவிக்குறிப்பைத் தருகிறோம்: உங்கள் குறியீட்டை வரி 1 இல் தொடங்கவும்: {define} count_mean_grade {with} subject.\n"
            10:
                story_text: "### உடற்பயிற்சி 1 \nபயிற்சி திட்டத்தை சற்று கடினமாக்குவோம். வீரர் இப்போது இரண்டு கேள்விகளுக்கு சரியாக பதிலளிக்க வேண்டும். நிரலை முடிக்க வெற்றிடங்களை நிரப்பவும். \n\n### உடற்பயிற்சி 2 \nசில நேரங்களில், கணக்கீடுகள் பல சரியான பதில்களைக் கொண்டிருக்கும். உதாரணமாக, 10 ஐ 5 மற்றும் 2 ஆல் வகுக்கலாம். எனவே 'எந்த எண் 10 ஐப் பிரிக்கிறது?' 2 மற்றும் 5 ஆல் பதிலளிக்க முடியும். \nபல சரியான பதில்களைக் கொண்ட கணக்கீட்டைக் கேட்கவும், அதற்கு பதிலளிக்க பிளேயரைக் கேட்கவும், மேலும் `{or}` ஐப் பயன்படுத்தி அது சரியானதா என்பதைத் தீர்மானிக்கவும். \nநிரலாக்க புலத்தை வெறுமை செய்து உங்கள் சொந்த தீர்வை உருவாக்கவும்.\n"
                example_code: "``` \nanswer1 = {ask} '10 பெருக்கல் 7 என்றால் என்ன?' \nanswer2 = {ask} '6 பெருக்கல் 7 என்றால் என்ன?' \n{if} _ _ _ _ _ _ \n{print} _ \n```\n"
