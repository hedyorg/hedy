                example_code: "**எச்சரிக்கை! இந்தக் குறியீடு பிழைத்திருத்தம் செய்யப்பட வேண்டும்!** \n``` \n{print} 'எங்கள் சாண்ட்விச் கடைக்கு வரவேற்கிறோம்' \nதொகை 'எத்தனை சாண்ட்விச்களை வாங்க விரும்புகிறீர்கள்?' \n{repeat} தொகை {times} \n{ask} {is} {ask} 'உங்கள் சாண்ட்விச் என்ன வகையான ரொட்டியாக இருக்க விரும்புகிறீர்கள்?' \nரொட்டி_வகைகள் {is} வெள்ளை, கோதுமை, கம்பு, பூண்டு, பசையம் இல்லாதவை \n{if} தேர்ந்துஎடுக்கப்பட்ட_வகை_of_bread \n{print} 'அழகு!' \n{else} \n'நாங்கள் அதை விற்காததற்கு மன்னிக்கவும்' \nடாப்பிங் {is} {ask} 'நீங்கள் எந்த வகையான டாப்பிங்கை விரும்புகிறீர்கள்?' \nசாச் {is} {ask} 'நீங்கள் என்ன வகையான சாச் விரும்புகிறீர்கள்?' \n{print} டாப்பிங் மற்றும் சாசுடன் தேர்ந்தெடுக்கப்பட்ட ஒரு_ரொட்டி. \nவிலை = தொகை * 6 \n{print} 'அது 'விலை டாலர்கள்' தயவு செய்து' \n```\n"
                answer_code: "``` \n{print} 'எங்கள் சாண்ட்விச் கடைக்கு வரவேற்கிறோம்' \nதொகை = {ask} 'எத்தனை சாண்ட்விச்களை வாங்க விரும்புகிறீர்கள்?' \n{repeat} தொகை {times} \nதேர்வு_பிரெட் = {ask} 'உங்கள் சாண்ட்விச் என்ன வகையான ரொட்டியாக இருக்க விரும்புகிறீர்கள்?' \nவகைகள்_of_bread = வெள்ளை, கோதுமை, கம்பு, பூண்டு, பசையம் இல்லாதது \n{if} தேர்ந்தெடுக்கப்பட்ட_ரொட்டி {in} வகையான_of_bread \n{print} 'அழகு!' \n{else} \n{print} \"மன்னிக்கவும், நாங்கள் அதை விற்கவில்லை\" \ntopping = {ask} 'எப்படிப்பட்ட டாப்பிங்கை விரும்புகிறீர்கள்?' \nசாச் = {ask} 'நீங்கள் என்ன வகையான சாச் விரும்புகிறீர்கள்?' \n{print} 'One ' selected_bread ' உடன் ' topping ' மற்றும் ' sauce '.' \nவிலை = தொகை * 6 \n{print} 'அது ' விலை ' டாலர்கள் ப்ளீச்.' \n```\n"
