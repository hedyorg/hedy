        levels:
            11:
                story_text: "### உடற்பயிற்சி\n நாம் ஒரு ஆரி பாட்டர் கருப்பொருள் அதிர்ச்ட சொல்பவர் செய்ய முடியும். 9 கோடுகள் அச்சிடப்படும் வெற்றிடங்களை நிரப்பவும்.\n ** கூடுதல் ** உங்களுக்கு பிடித்த நூல், திரைப்படம் அல்லது தொலைக்காட்சி நிகழ்ச்சி போன்ற பார்ச்சூன் சொல்பரின் கருப்பொருளை வேறு ஏதாவது மாற்றவும்.\n"
                example_code: "``` \nவீடுகள் = Gryffindor, Slytherin, Hufflepuff, Ravenclaw \nபாடங்கள் = மருந்து, இருண்ட கலைகளுக்கு எதிரான பாதுகாப்பு, வசீகரம், உருமாற்றம் \nஅச்சங்கள் = வோல்ட்மார்ட், சிலந்திகள், உங்கள் OWL சோதனையில் தோல்வி \nபெயர்கள் = ஆரி, ரான், எர்மியோன் \n_ \n_ {print} பெயர் ' வீடுகளில் {at} {random} வைக்கப்பட்டுள்ளது \n_ {print} பெயர் ' பாடங்களில் {at} {random} இல் சிறப்பாக உள்ளது \n_ {print} பெயரின் மிகப் பெரிய அச்சம் ' பயங்கள் {at} {random} \n```\n"
    haunted:
        name: பேய் வீடு
        default_save_name: பேய் வீடு
        description: பேய் வீட்டிலிருந்து தப்பிக்க
        levels:
            2:
                story_text_2: "### உடற்பயிற்சி \nமேலே உள்ள எடுத்துக்காட்டில், அரக்கர்கள் முன்னரே தீர்மானிக்கப்பட்டவர்கள். எனவே ஒவ்வொரு முறையும் உங்கள் குறியீட்டை இயக்கும்போது, வெளியீடு ஒரே மாதிரியாக இருக்கும். \nபேய் வீட்டை ஊடாடச் செய்ய `{ask}` கட்டளைகளைச் சேர்க்க முடியுமா?\n"
                example_code_2: "```\n monster_1 {is} _\n monster_2 {is} _\n monster_3 {is} _\n {print} நீங்கள் பேய் வீட்டிற்குள் நுழைகிறீர்கள்.\n {print} திடீரென்று நீங்கள் ஒரு அசுரன்_1 ஐக் காண்கிறீர்கள்\n {print} நீங்கள் மற்ற அறைக்குள் ஓடுகிறீர்கள் ...\n {print} ஆனால் ஒரு அசுரன்_2 உங்களுக்காக அங்கே காத்திருக்கிறது!\n {print} ஓ! விரைவாக சமையலறைக்குச் செல்லுங்கள்.\n {print} ஆனால் நீங்கள் நுழையும் போது அசுரன்_3 உங்களைத் தாக்குகிறது!\n ```\n"
                story_text: "இந்த பேய் வீட்டில் நீங்கள் ஈமோசிகளுடன் உங்கள் அரக்கர்களை தேர்வு செய்யலாம். நிச்சயமாக நீங்கள் சொற்களையும் பயன்படுத்தலாம்.\n"
                example_code: "```\n monster_1 {is}\n MONSTER_2 {is}\n monster_3 {is}\n {print} நீங்கள் பேய் வீட்டிற்குள் நுழைகிறீர்கள்.\n {print} திடீரென்று நீங்கள் ஒரு அசுரன்_1 ஐக் காண்கிறீர்கள்\n {print} நீங்கள் மற்ற அறைக்குள் ஓடுகிறீர்கள் ...\n {print} ஆனால் ஒரு அசுரன்_2 உங்களுக்காக அங்கே காத்திருக்கிறது!\n {print} ஓ! விரைவாக சமையலறைக்குச் செல்லுங்கள்.\n {print} ஆனால் நீங்கள் நுழையும் போது அசுரன்_3 உங்களைத் தாக்குகிறது!\n ```\n"
            1:
                story_text: "இந்த சாகசத்தில் நீங்கள் ஒரு விளையாட்டை உருவாக்குவதற்கு வேலை செய்கிறீர்கள், அதில் நீங்கள் சரியான கதவைத் தேர்ந்தெடுப்பதன் மூலம் ஒரு பேய் வீட்டிலிருந்து தப்பிக்க வேண்டும்.\n நீங்கள் சரியான கதவைத் தேர்ந்தெடுத்தால் நீங்கள் பிழைப்பீர்கள், ஆனால் இல்லையென்றால் பயங்கரமான அரக்கன் இருக்கலாம் ...\n\n நிலை 1 இல், எங்கள் பேய் வீட்டு விளையாட்டை ஒரு பயங்கரமான கதையை உருவாக்குவதன் மூலம் தொடங்குகிறோம், மேலும் பேய் வீட்டில் அவர்கள் என்ன அரக்கனைப் பார்ப்பார்கள் என்று வீரரிடம் கேளுங்கள்.\n"
                story_text_2: "### உடற்பயிற்சி\n மஞ்சள் பொத்தானைக் சொடுக்கு செய்வதன் மூலம் எடுத்துக்காட்டு குறியீட்டை உங்கள் உள்ளீட்டுத் திரையில் நகலெடுக்கவும்.\n இப்போது குறைந்தது 5 வரிகளைச் சேர்ப்பதன் மூலம் கதையை முடிக்கவும்.\n ஒவ்வொரு குறியீடுகளையும் `{print}` கட்டளையுடன் தொடங்க நினைவில் கொள்ளுங்கள்.\n"
                example_code: "```\n {print} நான் எப்படி இங்கு வந்தேன்?\n {print} பழைய மாளிகைக்கு செல்ல என் நண்பர் என்னிடம் சொன்னது எனக்கு நினைவிருக்கிறது ...\n {print} திடீரென்று எல்லாம் கருப்பு நிறத்தில் சென்றது.\n {print} ஆனால் நான் எப்படி தரையில் முடிந்தது ...?\n {print} என் தலை ஒரு பேச்பால் மட்டையால் தாக்கப்பட்டதைப் போல வலிக்கிறது!\n {print} அந்த ஒலி என்ன?\n {print} ஓ! நான் இந்த வீட்டில் தனியாக இல்லை என்று நினைக்கிறேன்!\n {print} நான் இங்கிருந்து வெளியேற வேண்டும்!\n {print} எனக்கு முன்னால் 3 கதவுகள் உள்ளன ..\n {ask} நான் எந்த கதவை எடுக்க வேண்டும்?\n {echo} நான் கதவைத் தேர்வு செய்கிறேன்\n {print} ...?\n ```\n"
            3:
                example_code: "```\n _ பேய் வீட்டிலிருந்து தப்பித்தல்!\n _ உங்களுக்கு முன்னால் 3 கதவுகள் உள்ளன ...\n _ _ _ நீங்கள் எந்த கதவைத் தேர்வு செய்கிறீர்கள்?\n _ நீங்கள் கதவைத் தேர்ந்தெடுத்தீர்கள் ... தேர்வு\n அரக்கர்கள் _ ஒரு சாம்பி, ஒரு காட்டேரி, நீங்கள் தப்பவில்லை\n _ நீங்கள் பார்க்கிறீர்கள் ...\n {sleep}\n _ _ _ _\n ```\n"
                story_text: "முந்தைய நிலைகளில் நீங்கள் உங்கள் பேய் வீட்டு விளையாட்டுக்கு ஒரு அறிமுகம் செய்துள்ளீர்கள், ஆனால் நீங்கள் கவனித்திருக்கலாம், கதை எப்போதும் ஒரு பயங்கரமான முடிவைக் கொண்டிருக்கும்.\n இந்த மட்டத்தில் விளையாட்டின் முடிவை மாற்றுவதன் மூலம் உங்கள் கதையை மேலும் ஊடாடும்; சில நேரங்களில் நீங்கள் சாப்பிடுவீர்கள், சில நேரங்களில் நீங்கள் தப்பிப்பீர்கள்!\n எடி தோராயமாக முடிவு செய்யட்டும்!\n\n ### உடற்பயிற்சி\n எடுத்துக்காட்டு குறியீடுகளை நகலெடுத்து, அதை வேலை செய்ய வெற்றிடங்களை நிரப்பவும்!\n\n ** கூடுதல் ** இந்த கதை மிகவும் நேராக முன்னோக்கி உள்ளது, ஒருவேளை நீங்கள் மிகவும் உற்சாகமான கதையைச் சேர்ப்பதன் மூலம் அதை கொஞ்சம் கொஞ்சமாக பேசலாம்.\n உங்களிடம் இப்போது மிகக் குறைந்த விளைவுகள் உள்ளன, கதவுகளுக்குப் பின்னால் இருப்பதற்கு 3 விருப்பங்கள் மட்டுமே உள்ளன. பட்டியலில் சேர்க்க அதிகமான அரக்கர்களைப் பற்றி நீங்கள் சிந்திக்கலாம்!\n"
            10:
                story_text: "இந்த மட்டத்தில் நீங்கள் கூடு கட்டுவதைப் பயன்படுத்தலாம், இது பேய் வீட்டை இன்னும் ஊடாடும் வகையில் மாற்ற அனுமதிக்கிறது!\n\n ### உடற்பயிற்சி\n இப்போது இந்த விளையாட்டை வெல்வது மிகவும் கடினம், நீங்கள் வெல்ல எளிதாக்க முடியுமா?\n உங்கள் குறியீட்டை மாற்றவும், இதனால் ஒரு சரியான கதவு மற்றும் இரண்டு தவறான கதைகளுக்கு பதிலாக ஒரு தவறான கதவு மற்றும் இரண்டு சரியான கதவுகள் மட்டுமே உள்ளனவா?\n உதவிக்குறிப்பு: இதன் பொருள் சரியான_ டூரை தவறான_ டூராக மாற்றுவதோடு, `{if}` மற்றும் `{else}` குறியீட்டை மாற்றவும்.\n நிச்சயமாக நீங்கள் கதையை மாற்றி அதை உங்கள் சொந்தமாக்கலாம். அரக்கர்களை மாற்றவும் அல்லது உங்களுக்கு பரிசு பெறும் இடத்தை மகிழ்ச்சியான விளையாட்டு நிகழ்ச்சியாக மாற்றவும்!\n"
                example_code: "``` \n{print} 'பேய் வீட்டில் இருந்து தப்பிக்க!' \nவீரர் = உயிருடன் \nகதவுகள் = 1, 2, 3 \nஅரக்கர்கள் = சோம்பை, காட்டேரி, ராட்சத சிலந்தி \n{repeat} 3 {times} \n{if} வீரர் {is} இருக்கிறார் \nசரியான_கதவு {is} கதவுகள் {at} {random} \n{print} 'உங்களுக்கு முன்னால் 3 கதவுகள் உள்ளன...' \nதேர்வு_கதவு = {ask} 'நீங்கள் எந்த கதவைத் தேர்வு செய்கிறீர்கள்?' \n{if} தேர்ந்தெடுத்த_கதவு {is} சரியான_கதவு \n{print} 'இங்கே அரக்கர்கள் இல்லை!' \n{else} \n{print} 'நீங்கள் ஒரு ' அரக்கர்களால் உண்ணப்பட்டீர்கள் {at} {random} \nவீரர் = இறந்தவர் \n{else} \n{print} 'கேம் ஓவர்' \n{if} வீரர் {is} இருக்கிறார் \n{print} 'அருமை! நீ பிழைத்தாய்!' \n```\n"
            14:
                story_text: "### உடற்பயிற்சி\n இந்தப் பேய் வீட்டு விளையாட்டு இந்த மட்டத்தில் நீங்கள் பயன்படுத்தக்கூடிய பட்டியல்களுக்கு இடையிலான தொடர்பைப் பயன்படுத்துகிறது.\n எடுத்துக்காட்டாக: சாம்பிக்கு சொந்தமான அனைத்து பண்புகளும் எல்லா பட்டியல்களிலும் முதலாவதாக உள்ளன, விட்ச் செகண்ட் மற்றும் வாம்பயர் மூன்றாவது.\n குறியீட்டைப் பார்த்தபிறகு குறியீடு வேலை செய்யக் கோடிட்ட இடங்களை இந்தச் சொற்களைக் கொண்டு நிரப்புக! `weapons[i]`, `monsters[i]`, `bad_fate[i]`, `good_fate[i]`, `hint[i]`\n"
                example_code: "``` \nஎண்கள் = [1, 2, 3] \nநான் = எண்கள்[{random}] \nகுறிப்பு = ['உருறும்', 'ஒரு கேவலமான சிரிப்பு', 'படபடக்கும் பேட்விங்ச்'] \nஅரக்கர்கள் = ['சாம்பி', 'சூனியக்காரி', 'காட்டேரி'] \nbad_fate = ['உங்கள் மூளை தின்று விட்டது', 'நீங்கள் என்றென்றும் சபிக்கப்பட்டவர்', 'நீங்கள் கடிக்கப்பட்டீர்கள்'] \ngood_fate = ['நீங்கள் ஆம் எறியுங்கள். சாம்பி திசைதிருப்பப்பட்டு அதை சாப்பிடத் தொடங்குகிறது.', 'நீங்கள் திரைச்சீலைகளுக்கு தீ வைத்தீர்கள். சூனியக்காரி நெருப்புக்கு பயந்து ஓடுகிறது', 'காட்டேரி பூண்டை வெறுத்து ஓடுகிறது'] \nஆயுதங்கள் = ['ஆம்', 'லைட்டர்', 'பூண்டு'] \n{print} ('நீங்கள் ஒரு பழைய மாளிகையின் முன் நிற்கிறீர்கள்') \n{print} ('இங்கே ஏதோ சரியில்லை') \n{print} ('நீங்கள் கேட்கிறீர்கள்', _) \n{print} ('நீங்கள் அதை ஆராயப் போகிறீர்கள்') \n{print} ('நீங்கள் சமையலறைக்குள் நுழைந்து ஒரு லைட்டர், ஒரு பச்சை ஆம் மற்றும் ஒரு பூண்டு ஆகியவற்றைப் பார்க்கிறீர்கள்.') \nyour_weapon = {input} ('நீங்கள் என்ன கொண்டு வருகிறீர்கள்?') \n{print} ('உங்கள் ', உங்கள்_ஆயுதத்துடன், ' நீங்கள் வாழ்க்கை அறைக்குள் நுழைகிறீர்கள்') \n{print} ('அங்கு நீங்கள் ஒரு ', _) \nதேவையான_ஆயுதம் =_ \n{if} your_weapon == need_weapon: \n{print} ('நீங்கள் உங்கள்', உங்கள்_ஆயுதத்தைப் பயன்படுத்துகிறீர்கள்) \n{print} _ \n{print} ('நீங்கள் செய் பெறுவீர்கள்!') \n{else}: \n{print} ('நீங்கள் தவறான ஆயுதத்தைத் தேர்ந்தெடுத்துள்ளீர்கள்...') \n{print} _ \n{print} ('கேம் ஓவர்') \n```\n"
            5:
                example_code: "``` \n{print} 'பேய் வீட்டில் இருந்து தப்பிக்க!' \n{print} 'உங்களுக்கு முன்னால் 3 கதவுகள் உள்ளன...' \nகதவுகள் {is} 1, 2, 3 \nஅரக்கர்கள் {is} ஓநாய், மம்மி, காட்டேரி, சாம்பி \nதேர்ந்தெடுக்கப்பட்ட_கதவு {is} {ask} 'நீங்கள் எந்த கதவைத் தேர்வு செய்கிறீர்கள்?' \n{print} 'நீங்கள் கதவைத் தேர்ந்தெடுத்தீர்கள்...' தேர்ந்தெடுக்கப்பட்ட_கதவு \n{sleep} \nசரியான_கதவு {is} கதவுகள் {at}{random} \n_ _ _ _ {print} 'அருமை! நீ தப்பித்துவிட்டாய்!' \n{else} {print} 'ஐயோ! உன்னை ஒரு...' அரக்கர்கள் {at} {random} சாப்பிடுகிறார்கள் \n```\n"
                story_text: "இந்த நிலை வரை பேய் அவுச் விளையாட்டு எப்போதுமே ஒரு கதவைத் தேர்வு செய்யும்படி வீரரிடம் கேட்டது, ஆனால் நீங்கள் கவனித்தபடி, அவர்கள் உண்மையில் சரியாக பதிலளிக்க வேண்டியதில்லை.\n வீரர் முற்றிலும் சீரற்ற பதிலில் நிரப்பப்பட்டால், விளையாட்டு இன்னும் வேலை செய்யும், மேலும் வீரர் கூட வெல்லக்கூடும் (ஒரு கதவை எடுக்கவில்லை என்றாலும்).\n இந்த மட்டத்தில் நீங்கள் தோராயமாக எடுக்கப்பட்ட அதே கதவு எடியைத் தேர்ந்தெடுப்பதன் மூலம் மட்டுமே விளையாட்டை வெல்ல முடியும்.\n\n ### உடற்பயிற்சி\n குறியீட்டை முடிக்க காணாமல் போன 4 சொற்களைக் கண்டுபிடிக்க முடியுமா?\n"
            4:
                story_text: "உங்கள் விளையாட்டுகளில் மேற்கோள் மதிப்பெண்களை எவ்வாறு பயன்படுத்துவது என்பதை இந்த மட்டத்தில் நீங்கள் கற்றுக்கொள்கிறீர்கள்.\n\n ### உடற்பயிற்சி\n உங்கள் பேய் வீடு நிலை 4 ஆதாரத்தை உருவாக்க முடியுமா?\n\n ### உடற்பயிற்சி 2\n முந்தைய நிலைக்குச் சென்று உங்கள் பேய் வீட்டுக் குறியீட்டை நகலெடுக்கவும். சரியான இடங்களில் மேற்கோள் குறிகளைச் சேர்ப்பதன் மூலம் குறியீட்டை இந்த மட்டத்தில் செயல்படுத்தவும்.\n"
                example_code: "``` \n_இந்த குறியீட்டில் மேற்கோள் குறிகளைச் சேர்_ \n{print} பேய் வீட்டில் இருந்து தப்பிக்க! \n{print} உங்களுக்கு முன்னால் 3 கதவுகள் உள்ளன... \nதேர்வு {is} {ask} நீங்கள் எந்த கதவை தேர்வு செய்கிறீர்கள்? \n{print} நீங்கள் கதவைத் தேர்ந்தெடுத்தீர்கள்... தேர்வு \nஅரக்கர்கள் {is}ஒரு சாம்பி, ஒரு காட்டேரி, நீங்கள் எதுவும் தப்பிக்கவில்லை \n{print} நீங்கள் பார்க்கிறீர்கள்... \n{sleep}\n{print} அரக்கர்கள் {at}{random}\n```\n"
    hotel:
        default_save_name: ஓட்டல்
        description: ஓட்டல்
        name: ஓட்டல்
        levels:
            15:
                story_text: "முந்தைய சாகசத்தில், ஒரு செயல்பாட்டில் வாதத்தை எவ்வாறு பயன்படுத்துவது என்பதை நீங்கள் கற்றுக்கொண்டீர்கள், மேலும் அதை {ask} உடன் எவ்வாறு இணைப்பது என்பதை நீங்கள் கற்றுக்கொண்டீர்கள். \nநீங்கள் ஏன் செயல்பாடுகளைப் பயன்படுத்துகிறீர்கள் என்று நீங்கள் யோசித்திருக்கலாம், ஏனெனில் எடுத்துக்காட்டில் உள்ள செயல்பாடுகள் ஒரே ஒரு வரி குறியீடு மட்டுமே. \nஒரு பெரிய செயல்பாடு எப்படி இருக்கும் என்பதை இப்போது நாங்கள் உங்களுக்குக் காண்பிப்போம், மேலும் பல வாதங்களைப் பயன்படுத்துவோம். செயல்பாடு பெரியதாகிவிட்டால், ஒரு செயல்பாட்டைப் பயன்படுத்துவது எவ்வளவு சிறந்தது என்பதை நீங்கள் காண்பீர்கள். \n`{ask}` கட்டளைகளுடன் இணைந்து வாதங்கள் கொண்ட செயல்பாட்டின் சான்று இங்கே உள்ளது.\n"
                example_code: "``` \n{def} welcome_message(தலைப்பு, கடைசி_பெயர், நாடு, அறை_எண்): \n{print} ('ஓட்டல் எடிக்கு வரவேற்கிறோம், ', தலைப்பு, ' ', கடைசி_பெயர்) \nnice_trip {is} {input} ('நீங்கள் ', நாடு, '?' இலிருந்து ஒரு நல்ல பயணம் செய்தீர்களா?') \n{if} nice_trip == 'ஆம்': \n{print} ('அழகானது!') \n{else}: \n{print} ('அதைக் கேட்டதற்கு மன்னிக்கவும்.') \n{print} ('உங்கள் அறையில் நீங்கள் நன்றாக ஓய்வெடுக்கலாம் என்று நம்புகிறேன்.') \n{print} ('உங்கள் அறை எண்', room_number) \n\n{print} ('வணக்கம். செக் இன் செய்ய உங்கள் தகவலை நிரப்பவும்.') \nதலைப்பு = {input} ('உங்கள் தலைப்பு என்ன (mr, mrs, ms, dr, etc.)?') \nபெயர் = {input} ('உங்கள் கடைசி பெயர் என்ன?') \nhomecountry = {input}('நீங்கள் எந்த நாட்டில் இருந்து வருகிறீர்கள்?') \n\nவரவேற்பு_செய்தி(தலைப்பு, பெயர், சொந்த நாடு, 105) \n```\n"
    if_command:
        name: '{if} & {else}'
        default_save_name: if_command
        description: '{if} கட்டளையை அறிமுகப்படுத்துகிறது'
        levels:
            5:
                example_code: "```\n பெயர் {is} {ask} 'உங்கள் பெயர் என்ன?'\n {if} பெயர் {is} hedy {print} 'nice' {else} {print} 'boo!'\n ```\n"
                example_code_2: "```\n பெயர் {is} {ask} 'உங்கள் பெயர் என்ன?'\n {if} பெயர் {is} hedy {print} 'நல்லது'\n {else} {print} 'boo!'\n ```\n"
                story_text_2: "சில நேரங்களில் ஒரு `{if}` உண்மையில் நீளமாகி, வரியில் சரியாக பொருந்தாது. <br> நீங்கள் குறியீட்டை இரண்டு வரிகளில் பிரிக்கலாம், இரண்டாவது வரியை `{else}` இதைப் போலவே தொடங்கலாம்:\n"
                story_text_3: "### உடற்பயிற்சி\n உங்கள் சொந்த குறியீட்டை `{if}` மற்றும் `{else}` உடன் உருவாக்க முயற்சிக்கவும். நீங்கள் விரும்பினால் எடுத்துக்காட்டு குறியீட்டைப் பயன்படுத்தலாம்.\n"
                example_code_3: "``` \nபதில் {is} {ask} '2 + 2 = ?' \n_ _ _ 4 _ 'அருமையான வேலை!' \n_ _ 'எண் 2 + 2 = 4' \n```\n"
                story_text: "## என்றால்... வேறு.... \nநிலை 5 இல் புதிதாக ஒன்று உள்ளது, `{if}`! `{if}` மூலம் நீங்கள் இரண்டு வெவ்வேறு விருப்பங்களுக்கு இடையே தேர்வு செய்யலாம். \nநீங்கள் எடியை ஒரு பெயராக உள்ளிட்டால், இந்த குறியீடு நன்றாக அச்சிடுகிறது, மேலும் பூ! நீங்கள் வேறு ஏதாவது உள்ளிடினால். \n`{ask}` மற்றும் `{print}` இன்னும் நிலை 4 இல் இருந்ததைப் போலவே செயல்படுகின்றன.\n"
            9:
                example_code: "```\n பெயர் = {ask} 'உங்கள் பெயர் என்ன?'\n {if} பெயர் {is} hedy\n {print} 'வரவேற்பு எடி'\n {print} 'உங்கள் கணினியில் விளையாடலாம்!'\n ```\n"
                story_text: "## என்றால் ... வேறு ...\n `{repeat}` கட்டளைக்குப் பிறகு குறியீட்டின் வரிகளை மீண்டும் செய்யக் கற்றுக்கொண்டீர்கள்.\n இப்போது நீங்கள் `{if}` அல்லது `{else}` கட்டளைக்குப் பிறகு தொகுதிகளை உருவாக்க உள்தள்ளலைப் பயன்படுத்தலாம்.\n எடுத்துக்காட்டு குறியீட்டைப் பாருங்கள்.\n\n ### உடற்பயிற்சி\n எடுத்துக்காட்டு குறியீட்டில் {else} கட்டளையைச் சேர்க்கவும். உள்தள்ளலைப் பயன்படுத்தி வரியின் தொகுதியை உருவாக்கவும். ஒவ்வொரு வரியையும் 4 இடைவெளிகளுடன் தொடங்குவதன் மூலம் இதைச் செய்கிறீர்கள்.\n"
            10:
                story_text: "இந்த நிலையில் நீங்கள் மற்றொரு `{if}` கட்டளைக்குள் `{if}` கட்டளையை வைக்கலாம்.\n"
                example_code: "```\n தொடரவும் = {ask} 'நீங்கள் தொடர விரும்புகிறீர்களா?'\n {if} cantion = ஆம்\n நிச்சயமாக = {ask} 'நீங்கள் உறுதியாக இருக்கிறீர்களா?'\n {if} நிச்சயமாக {is} ஆம்\n {print} 'நாங்கள் தொடருவோம்'\n {else}\n {print} 'உங்களுக்கு நிச்சயமாகத் தெரியவில்லை'\n {else}\n {print} 'நீங்கள் தொடர விரும்பவில்லை'\n ```\n"
    language:
        levels:
            5:
                example_code: "```\n {print} 'பிரஞ்சு மொழியைக் கற்றுக்கொள்ளுங்கள்!'\n பூனை {is} {ask} '🐱'\n {if} cat {is} chat {print} 'பயங்கரமானது!'\n {else} {print} 'இல்லை, பூனை அரட்டை'\n தவளை {is} {ask} '🐸'\n {if} தவளை {is} grenouill {print} 'super!'\n {else} {print} 'இல்லை, தவளை கிரென ou ல்'\n ```\n"
                story_text: "உங்கள் சொற்களஞ்சியத்தை புதிய மொழியில் பயிற்சி செய்ய உங்கள் சொந்த திட்டத்தை உருவாக்கவும்.\n\n ### உடற்பயிற்சி\n வீரர் கற்றுக்கொள்ள குறைந்தபட்சம் 3 சொற்களைச் சேர்ப்பதன் மூலம் குறியீட்டை நீண்ட நேரம் செய்யுங்கள்.\n ** கூடுதல் ** நிச்சயமாக, நீங்கள் பிரஞ்சு விட வேறு மொழியைப் பயன்படுத்த தேர்வு செய்யலாம். நீங்கள் கற்றுக்கொள்ள விரும்பும் எந்த மொழிக்கும் குறியீடாக மாற்றலாம்.\n"
            14:
                story_text: "### உடற்பயிற்சி\n எடுத்துக்காட்டு குறியீட்டைப் பாருங்கள். பிரஞ்சு சொற்களஞ்சியத்தை கடைப்பிடிப்பதற்கான ஒரு திட்டம் இது. இப்போது உங்கள் சொற்களஞ்சியத்தை புதிய மொழியில் பயிற்சி செய்ய உங்கள் சொந்த திட்டத்தை உருவாக்கவும்.\n உங்களுக்கு வேறு எந்த மொழிகளும் தெரியாவிட்டால், நீங்கள் Google மொழிபெயர்ப்பைப் பயன்படுத்தலாம் அல்லது ஈமோசிகளையும் உங்கள் சொந்த மொழியையும் பயன்படுத்தலாம்.\n"
                example_code: "``` \nFrench_words = ['bonjour', 'ordinateur', 'pomme de Terre'] \nமொழிபெயர்ப்பு = ['அலோ', 'கணினி', 'உருளைக்கிழங்கு'] \nமதிப்பெண் = 0 \n{for} i {in} {range} (1,3): \nபதில் = {input} (', பிரெஞ்சு_வார்த்தைகள்[i], ' என்றால் என்ன?') \nசரியான = மொழிபெயர்ப்பு[i] \n{if} பதில் == சரி: \n{print} ('சரி!') \nமதிப்பெண் = மதிப்பெண் + 1 \n{else}: \n{print} ('தவறான, ', பிரெஞ்சு_வார்த்தைகள்[i], ' என்றால் ', மொழிபெயர்ப்பு[i]) \n{print} ('நீங்கள் கொடுத்தீர்கள்', மதிப்பெண், 'சரியான பதில்கள்.') \n```\n"
        name: மொழி
