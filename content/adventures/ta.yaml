            3:
                example_code: "``` \nதேர்வுகள் {is} 1, 2, 3, 4, 5, மண்புழு \n{print} நீங்கள் எறிந்தீர்கள் _ {at} {random} ! \n```\n"
                example_code_2: "```\n தேர்வுகள் {is} _\n ```\n"
                story_text_2: "### உடற்பயிற்சி\n மேலே உள்ள எடுத்துக்காட்டில் உள்ள பகடை ஒரு குறிப்பிட்ட விளையாட்டுக்கான பகடை. சாதாரண பகடை செய்ய முடியுமா?\n அல்லது வேறு விளையாட்டிலிருந்து பிற சிறப்பு பகடை?\n"
                story_text: "இந்த மட்டத்தில் நாம் ஒரு பட்டியலிலிருந்து தேர்வு செய்யலாம். அதனுடன் கணினியை இறப்பின் ஒரு பக்கத்தைத் தேர்வுசெய்ய அனுமதிக்கலாம்.\n வீட்டில் உங்கள் மறைவில் உள்ள விளையாட்டுகளைப் பாருங்கள்.\n (சிறப்பு) இறப்புடன் விளையாட்டுகள் உள்ளதா? இந்த குறியீட்டையும் நீங்கள் நகலெடுக்கலாம்.\n எடுத்துக்காட்டாக, விளையாட்டின் பகடை 1 முதல் 5 எண்களைக் கொண்ட மண்புழுக்கள் மற்றும் அதன் மீது ஒரு மண்புழு.\n\n !\n"
            7:
                story_text: "இதில் நீங்கள் மீண்டும் ஒரு மண்புழு இறக்கவும் செய்யலாம், ஆனால் இப்போது எத்தனை புள்ளிகள் உருட்டப்பட்டுள்ளன என்பதையும் நீங்கள் கணக்கிடலாம்.\n மண்புழுக்களுக்கு புழு 5 புள்ளிகளைக் கணக்கிடுகிறது என்பதை நீங்கள் அறிந்து கொள்ளலாம். இப்போது ஒரு ரோலுக்குப் பிறகு நீங்கள் எத்தனை புள்ளிகளை எறிந்தீர்கள் என்பதை உடனடியாகக் கணக்கிடலாம்.\n ஒரு இறப்புக்கான புள்ளிகளைக் கணக்கிடுவதற்கான குறியீடு இது:\n\n ### உடற்பயிற்சி\n 8 பகலுக்கான மொத்த மதிப்பெண்ணைப் பெறுவதற்கு குறியீட்டை உருவாக்க முடியுமா? அதைச் செய்ய, நீங்கள் குறியீட்டின் சில வரிகளை நகலெடுத்து ஒட்ட வேண்டும்.\n"
                example_code: "```\nதேர்வுகள் = 1, 2, 3, 4, 5, மண்புழு\nபுள்ளிகள் = 0\nஎறி = தேர்வுகள் {at} {random}\n{print} எறி 'நீங்கள் வீசியது' \n{if} எறி {is} மண்புழு\nபுள்ளிகள் = புள்ளிகள் + 5\n{else}\nபுள்ளிகள் = புள்ளிகள் + வீசுதல்\n{print} 'அவை ' புள்ளிகள் ' இந்த புள்ளிகள்'\n```\n"
                example_code_2: "8 பகடைக்கு மதிப்பெண்ணைக் கணக்கிட முடிந்தது? அதற்கு நிறைய நகல் மற்றும் ஒட்டுதல் தேவை, இல்லையா? நிலை 7 இல் நாங்கள் அதை எளிதாக்கப் போகிறோம்!\n"
            16:
                story_text: "### உடற்பயிற்சி \nஇந்த நிலையில் நீங்கள் ஒரு சிறிய விளையாட்டை உருவாக்கலாம், அதில் நீங்கள் 6 ஐ முடிந்தவரை வேகமாக வீச வேண்டும். \nநாங்கள் குறியீட்டைத் தொடங்கினோம், விளையாட்டை இயக்குவது உங்களுடையது! \n\nமுதலில், 6 வீசப்பட்டதா இல்லையா என்பதைச் சரிபார்க்கும் `{while}` வளையத்தைச் சேர்க்கவும். \nநீங்கள் ஏற்கனவே 6 ஐ எறியாத வரை, சீரற்ற எண்ணில் பகடை எறியுங்கள். \nவீரர் எறிந்ததை அச்சிடுங்கள். \nமுயற்சிகளின் எண்ணிக்கையில் ஒரு முயற்சியைச் சேர்க்கவும் \nநீங்கள் மீண்டும் வீசுவதற்கு முன் ஒரு நொடி காத்திருங்கள், அல்லது - நீங்கள் 6-ஐ எறிந்திருந்தால் - விளையாட்டு முடிவடைவதற்கு முன்பு.\n"
                example_code: "```\n விருப்பங்கள் = 1, 2, 3, 4, 5, 6\n {print} 'உங்களால் முடிந்தவரை 6 ஐ வேகமாக எறியுங்கள்!'\n வீசப்பட்டது = 0\n முயற்சிக்கிறது = 0\n _\n _\n _\n _\n _\n {print} 'ஆம்! 'முயற்சிகள்' முயற்சிகளில் நீங்கள் 6 எறிந்தீர்கள்.\n ```\n"
            4:
                story_text: "இந்த மட்டத்தில் நீங்கள் பகடைகளையும் உருவாக்கலாம். ஆனால் இந்த நேரத்தில் ஒரு எடுத்துக்காட்டு குறியீடு இல்லாமல் அதை நீங்களே முயற்சி செய்யலாம்!\n\n ### உடற்பயிற்சி\n இந்த மட்டத்தில் உங்கள் சொந்த பகடைகளை உருவாக்குங்கள்.\n உதவிக்குறிப்பு: டைச் செய்வது எப்படி என்று உங்களுக்குத் தெரியாவிட்டால். முந்தைய மட்டத்திலிருந்து உங்கள் பகடைகளை எட்டிப் பாருங்கள், ஆனால் மேற்கோள் மதிப்பெண்களைச் சேர்க்க மறக்காதீர்கள்.\n"
            8:
                story_text: "இந்த மட்டத்தில் மீண்டும் ஒரு பகடை உருவாக்கலாம். `{repeat}` குறியீட்டைக் கொண்டு நீங்கள் ஒரு முழு கை பகடைகளையும் உருட்டலாம்.\n\n ### உடற்பயிற்சி\n மாதிரி குறியீட்டை முடிக்க முயற்சிக்கவும்! ** கூடுதல் ** உங்களுக்குத் தெரிந்த ஒரு விளையாட்டைப் பற்றி சிந்தியுங்கள், அதில் ஒரு பகடை மற்றும் நிரல் ஆகியவை `{repeat}` பயன்படுத்துகின்றன.\n"
                example_code: "```\n தேர்வுகள் = 1, 2, 3, 4, 5, 6\n _ _ _ _ _ _ _ _\n ```\n"
            5:
                story_text: "எங்கள் பகடைகளில் `{if}` மற்றும் `{else}` கட்டளைகளைச் சேர்க்கப் போகிறோம்!\n\n ### உடற்பயிற்சி\n மாதிரி குறியீட்டை நிறைவு செய்யுங்கள், இதனால் நீங்கள் ஒரு மண்புழுவை எறிந்தவுடன் \"நீங்கள் வீசுவதை நிறுத்தலாம்\" என்று குறியீடு கூறுகிறது. நீங்கள் வேறு எதையும் எறிந்தால் \"நீங்கள் மீண்டும் வீச வேண்டும்\" என்று சொல்ல வேண்டும்.\n ** கூடுதல் ** ஒருவேளை நீங்கள் முற்றிலும் மாறுபட்ட விளையாட்டிலிருந்து ஒரு இறப்பை மீண்டும் உருவாக்க விரும்பலாம். அதுவும் நல்லது! உங்கள் சொந்த எதிர்வினையை உருவாக்குங்கள், எ.கா. 6 க்கு 'ஆம்' மற்றும் வேறு எதையாவது 'பரிதாபம்'.\n"
                example_code: "``` \nதேர்வுகள் {is} 1, 2, 3, 4, 5, மண்புழு \nஎறியுங்கள் {is} தேர்வுகள் {at} {random} \n{print} 'நீ எறிந்தாய்' எறி \n_ எறியுங்கள் {is} மண்புழு {print} 'நீங்கள் வீசுவதை நிறுத்தலாம்.' \n_ {print} 'நீங்கள் அதை மீண்டும் தூக்கி எறிய வேண்டும்!' \n```\n"
            11:
                story_text: "### உடற்பயிற்சி\n எல்லோரும் பகடை வீச அதிக நேரம் எடுத்துக்கொள்கிறார்களா? இந்த மட்டத்தில் நீங்கள் எடி அனைத்து பகடைகளையும் ஒரே நேரத்தில் வீச அனுமதிக்கலாம்!\n பெயர்களை உங்கள் நண்பர்கள் அல்லது குடும்பத்தினரின் பெயர்களாக மாற்றி, குறியீட்டை முடிக்கவும்.\n"
                example_code: "``` \nவீரர்கள் = ஆன், சான், செச்சி \nதேர்வுகள் = 1, 2, 3, 4, 5, 6 \n_ _ _ \n{print} பிளேயர் ' த்ரோச்' தேர்வுகள் {at} {random} \n{sleep} \n```\n"
        default_save_name: பகடை
    elif_command:
        name: '{elif}'
        default_save_name: எலிஃப்
        levels:
            6:
                story_text: "இந்த நிலையில் நீங்கள் ஒரு புதிய கட்டளையையும் பயன்படுத்தலாம்: `{elif}`. `{elif}` என்பது `{else}` மற்றும் `{if}` ஆகிய முக்கிய வார்த்தைகளின் கலவையாகும், மேலும் நீங்கள் 3 (அல்லது அதற்கு மேற்பட்ட!) விருப்பங்களை உருவாக்க விரும்பும் போது உங்களுக்குத் தேவைப்படும். \nஅதைப் பாருங்கள்!\n"
                example_code: "``` \nபரிசுகள் 1 மில்லியன் டாலர்கள், ஒரு ஆப்பிள் பை, எதுவும் இல்லை \nyour_prize என்பது பரிசுகள் {at} {random} \n{print} 'நீங்கள் செய் பெறுவீர்கள்' your_prize \n{if}உங்கள்_பரிசு {is} '1 மில்லியன் டாலர்கள்' \n{print} 'ஆமாம்! நீ பணக்காரன்!' \n{elif} your_prize {is} 'ஒரு ஆப்பிள் பை' \n{print} 'அழகான, ஒரு ஆப்பிள் பை!' \n{else} \n{print} 'அடுத்த முறை நல்ல அதிர்ச்டம்..' \n```\n"
        description: '{elif}'
    fortune:
        levels:
            1:
                story_text_2: "### உடற்பயிற்சி\n உங்கள் உள்ளீட்டுத் திரையில் எடுத்துக்காட்டு குறியீட்டை நகலெடுத்து, குறியீட்டைச் செயல்படுத்த வெற்றிடங்களை நிரப்பவும்.\n ** கூடுதல் ** குறியீட்டை மாற்றி, பார்ச்சூன் சொல்பவர் உங்கள் பெயரை மட்டுமல்ல, உங்கள் அகவை, உங்களுக்கு பிடித்த விளையாட்டுக் குழு அல்லது உங்களைப் பற்றி வேறு ஏதாவது கணிக்கட்டும்.\n"
                story_text: "நீங்கள் எப்போதாவது ஒரு திருவிழாவிற்குச் சென்றிருக்கிறீர்களா, உங்கள் எதிர்காலம் ஒரு அதிர்ச்ட சொல்பவரால் கணிக்கப்பட்டுள்ளதா? அல்லது நீங்கள் எப்போதாவது ஒரு மேசிக் எட்டு பந்துடன் விளையாடியிருக்கிறீர்களா?\n உங்கள் எதிர்காலத்தை அவர்களால் உண்மையில் கணிக்க முடியாது என்பதை நீங்கள் அறிந்திருக்கலாம், ஆனால் விளையாடுவது இன்னும் வேடிக்கையாக இருக்கிறது!\n\n வரவிருக்கும் நிலைகளில் உங்கள் சொந்த அதிர்ச்டத்தைச் சொல்லும் இயந்திரத்தை எவ்வாறு உருவாக்குவது என்பதை நீங்கள் கற்றுக் கொள்ளலாம்!\n நிலை 1 இல், எடி தன்னை ஒரு அதிர்ச்ட சொல்பவராக அறிமுகப்படுத்த அனுமதிப்பதன் மூலம் நீங்கள் எளிதாகத் தொடங்கலாம், மேலும் அவளது `{echo}` வீரர்களின் பதில்களை அனுமதிக்கலாம்.\n இது போன்றது:\n"
                example_code: "```\n _ அலோ, நான் அதிர்ச்டம் சொல்பவர்!\n _ நீங்கள் யார்?\n _ என் படிக பந்தில் பாருங்கள்\n _ நான் பார்க்கிறேன் ... நான் பார்க்கிறேன் ...\n _ உங்கள் பெயர்\n ```\n"
            3:
                example_code: "``` \n{print} நான் எடி சோசியம் சொல்பவன்! \nகேள்வி {is} {ask} நீங்கள் என்ன தெரிந்து கொள்ள விரும்புகிறீர்கள்? \n{print} நீங்கள் தெரிந்து கொள்ள விரும்புவது இதுதான்: கேள்வி \nபதில்கள் {is} ஆம், இல்லை, இருக்கலாம் \n{print} என் படிக பந்து கூறுகிறது... \n{sleep} 2 \n{print} பதில்கள் {at}{random} \n```\n"
                story_text_2: "### உடற்பயிற்சி\n இப்போது, எடி ஆம், இல்லை அல்லது இருக்கலாம் என்று மட்டுமே பதிலளிக்க முடியும். 'நிச்சயமாக' அல்லது 'மீண்டும் கேளுங்கள்' போன்ற கூடுதல் பதில் விருப்பங்களை நீங்கள் கொடுக்க முடியுமா?\n"
                story_text: "முந்தைய நிலைகளில் உங்கள் முதல் அதிர்ச்டம் சொல்லும் இயந்திரத்தை உருவாக்கியுள்ளீர்கள், ஆனால் எடியால் எதையும் கணிக்க முடியவில்லை, `{echo}` மட்டுமே. \nஇந்த நிலையில் நீங்கள் ஒரு மாறி மற்றும் `{at} {random}` கட்டளையைப் பயன்படுத்தி உங்களுக்கான பதிலைத் தேர்ந்தெடுக்க Hedyயை அனுமதிக்கலாம். உதாரணமாக இந்த குறியீட்டைப் பாருங்கள்:\n"
            8:
                example_code: "```\n {print} 'எனக்கு மேசிக் இதழ்களுடன் ஒரு மலர் உள்ளது'\n {print} 'நீங்கள் இதழ்களைத் தேர்ந்தெடுத்தால், உங்கள் ஈர்ப்பு உங்களை மீண்டும் நேசிக்கிறதா என்று மலர் சொல்லும்'\n தொகை = {ask} 'நீங்கள் எத்தனை இதழ்களை எடுக்க விரும்புகிறீர்கள்?'\n விருப்பங்கள் = அவர்கள் உன்னை நேசிக்கிறார்கள், அவர்கள் உன்னை நேசிக்கவில்லை\n _ _ _ _ விருப்பங்கள் {at} {random}\n ```\n"
                story_text: "### உடற்பயிற்சி\n உங்கள் ஈர்ப்பு உங்களை மீண்டும் நேசிக்கிறதா இல்லையா என்பதைச் சொல்லும் இந்த திட்டத்தை முடிக்கவும்.\n"
            9:
                example_code: "```\n {print} 'நான் அதிர்ச்டம் சொல்பவர்!'\n {print} 'நீங்கள் என்னிடம் 3 கேள்விகளைக் கேட்கலாம்.'\n பதில்கள் = ஆம், இல்லை, ஒருவேளை\n _ _ _\n கேள்வி = {ask} 'நீங்கள் என்ன தெரிந்து கொள்ள விரும்புகிறீர்கள்?'\n {print} கேள்வி\n {sleep}\n {print} 'என் படிக பந்து சொல்கிறது ...' பதில்கள் {at} {random}\n ```\n"
                story_text: "அடுத்த எடுத்துக்காட்டில், உங்கள் அதிர்ச்ட சொல்பவர் பல கேள்விகளைக் கேட்கலாம், மேலும் அவற்றை அச்சிடலாம்!\n\n ### உடற்பயிற்சி\n வெற்றிடங்களில் சரியான கட்டளையை நிரப்ப முடியுமா?\n"
            4:
                story_text: "### உடற்பயிற்சி\n இந்த எடுத்துக்காட்டு குறியீட்டிலிருந்து அனைத்து மேற்கோள் குறிகளையும் நாங்கள் அகற்றியுள்ளோம், அவற்றை சரியான இடங்களில் சேர்க்க முடியுமா?\n\n ### உடற்பயிற்சி 2\n முந்தைய நிலைக்குச் சென்று உங்கள் பார்ச்சூன் டெல்லர் குறியீட்டை நகலெடுக்கவும். சரியான இடங்களில் மேற்கோள் குறிகளைச் சேர்ப்பதன் மூலம் குறியீட்டை இந்த மட்டத்தில் செயல்படுத்தவும்.\n"
                example_code: "``` \n_இந்த குறியீட்டில் மேற்கோள் குறிகளைச் சேர்_ \n{print} நான் எடி சோசியம் சொல்பவன்! \nகேள்வி {is} {ask} நீங்கள் என்ன தெரிந்து கொள்ள விரும்புகிறீர்கள்? \n{print} இது உங்கள் கேள்வி: கேள்வி \nபதில்கள் {is} ஆம், இல்லை, இருக்கலாம் \n{print} என் படிக பந்து கூறுகிறது... \n{sleep} 2 \n{print} பதில்கள் {at}{random} \n```\n"
            7:
                story_text: "இந்த மட்டத்தில் நீங்கள் ஒரு அதிர்ச்ட சொல்பவராக உங்கள் கணிப்புகளில் கணிதத்தைப் பயன்படுத்தலாம். எதிர்காலத்தைக் கணக்கிட (வேடிக்கையான) சூத்திரங்களை உருவாக்க இது உங்களை அனுமதிக்கிறது.\n எடுத்துக்காட்டாக, நீங்கள் எவ்வளவு பணக்காரர்களைப் பெறுவீர்கள் அல்லது நீங்கள் வளரும்போது எத்தனை குழந்தைகள் இருப்பார்கள் என்பதைக் கணக்கிடலாம்.\n\n\n\n ### உடற்பயிற்சி\n உங்கள் சொந்த (வேடிக்கையான) அதிர்ச்டம் சொல்லும் இயந்திரத்தைப் பற்றி யோசிக்க முடியுமா?\n"
                example_code: "```\n {print} 'நான் அதிர்ச்டம் சொல்பவர்!'\n {print} 'நீங்கள் வளரும்போது எத்தனை குழந்தைகளைப் பெறுவீர்கள் என்பதை என்னால் கணிக்க முடியும்!'\n அகவை = {ask} 'உங்களுக்கு எவ்வளவு வயது?'\n உடன்பிறப்புகள் = {ask} 'உங்களிடம் எத்தனை உடன்பிறப்புகள் உள்ளனர்?'\n நீளம் = {ask} 'நீங்கள் சென்டிமீட்டரில் எவ்வளவு உயரமாக இருக்கிறீர்கள்?'\n குழந்தைகள் = நீளம் / அகவை\n குழந்தைகள் = குழந்தைகள் - உடன்பிறப்புகள்\n {print} 'நீங்கள் பெறுவீர்கள் ...'\n {sleep}\n {print} குழந்தைகளின் குழந்தைகள்! '\n ```\n"
            11:
                story_text: "இந்த மட்டத்தில் நீங்கள் விளையாட்டு மேச் (மாளிகை, அபார்ட்மென்ட், சேக், அவுச்) எவ்வாறு நிரல் செய்வது என்பதை நீங்கள் கற்றுக்கொள்வீர்கள். இந்த விளையாட்டில் நீங்கள் எல்லா வீரர்களுக்கும் ஒரே நேரத்தில் கணிக்க முடியும், அவர்களின் எதிர்காலம் எப்படி இருக்கும்.\n\n ### உடற்பயிற்சி\n இந்த நிலையை நீங்கள் கற்றுக்கொண்ட புதிய கட்டளையைப் பயன்படுத்துவதன் மூலம் வெற்றிடங்களில் ஃபில்.\n"
                example_code: "``` \nவீடுகள் = மாளிகை, அடுக்குமாடி குடியிருப்பு, குடில், வீடு \nநேசிக்கிறார் = யாரும், ஒரு அரசர், அவர்களது அண்டை வீட்டார், அவர்களின் உண்மையான அன்பு \nசெல்லப்பிராணிகள் = நாய், பூனை, யானை \nபெயர்கள் = சென்னா, ரியான், சிம் \n_ \n{print} பெயர் ' ஒரு ' வீடுகளில் {at} {random} வாழ்கிறது \n{print} பெயர் ' will marry ' loves {at} {random} \n{print} பெயர் ' அவர்களின் செல்லப் பிராணியாக ஒரு ' செல்லப்பிராணிகளை {at} {random} ' பெறும்.' \n{sleep} \n```\n"
            6:
                story_text: "### உடற்பயிற்சி \nஉதாரணக் குறியீட்டில், உங்களுக்குச் சாதகமாக முரண்பாடுகளைக் குறிக்க உங்களை அனுமதிக்கும் அதிர்ச்டம் சொல்பவர் திட்டத்தை எவ்வாறு உருவாக்குவது என்பதை நீங்கள் பார்க்கலாம். இந்த ஏமாற்று திட்டம் எப்போதும் நீங்கள் லாட்டரியை வெல்வீர்கள் என்று கூறுகிறது, ஆனால் உங்கள் நண்பர்கள் ஒருபோதும் வெல்ல மாட்டார்கள். \n\nஉங்கள் சொந்த திட்டத்தை உருவாக்க இதைப் பயன்படுத்தவும், ஆக்கப்பூர்வமாக இருங்கள்! எடுத்துக்காட்டாக, நீங்கள் ஒரு குறியீட்டை உருவாக்கலாம்: \n* உங்களுக்கு பிடித்த விளையாட்டு அணி அனைத்து போட்டியாளர்களையும் வெல்லும்! \n* உங்களுக்கு பிடித்த திரைப்படம் திரைப்பட இரவுக்கு தேர்ந்தெடுக்கப்படும்! \n* உங்களுக்கு பிடித்த நிகழ்ச்சிக்கான டிக்கெட்டுகளை வென்றீர்கள்! \n* ச்னோ ஒயிட்டின் மாயக்கண்ணாடியைப் போல நீங்கள் அனைவரையும் விட அழகானவர். \nஉங்கள் கற்பனை வேலை செய்யட்டும்! \n\nஉங்கள் நிரலில் குறைந்தது 10 கோடுகள் இருக்க வேண்டும் மற்றும் குறைந்தபட்சம் ஒரு `{if}` மற்றும் `{else}` கட்டளை இருக்க வேண்டும்.\n"
                example_code: "``` \nநண்பர்கள் {is} சோர்டான், லூசி, டேவ் \n{print} 'நீங்கள் நாளை லாட்டரியில் செய் பெறுவீர்கள் என்பதை என்னால் கணிக்க முடியும்!' \nநபர் {is}{ask} 'நீங்கள் யார்?' \nநல்ல_பதில் {is} ஐயா! நீங்கள் வெற்றி பெறுவீர்கள்!, நீங்கள் நிச்சயமாக வெற்றி பெறுவீர்கள்!, எங்களிடம் ஒரு வெற்றியாளர் இருக்கிறார்! \nbad_answer {is} தோல்வி! மீண்டும் முயற்சி!, மற்றொருவர் வெற்றி பெறுவார், நீங்கள் தோற்றுவிடுவீர்கள்! \n{if} நபர் {in} நண்பர்கள் \n{print} good_answer {at}{random} \n{else} \n{print} bad_answer {at} {random} \n```\n"
        name: அதிர்ச்டம் சொல்பவர்
        default_save_name: அதிர்ச்டம் சொல்பவர்
