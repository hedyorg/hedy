    functions:
        levels:
            12:
                story_text: "இந்த நிலையில், ** செயல்பாடுகளை** எவ்வாறு பயன்படுத்துவது என்பதை நீங்கள் கற்றுக் கொள்வீர்கள். ஒரு செயல்பாடு என்பது நீங்கள் பல முறை எளிதாகப் பயன்படுத்தக்கூடிய குறியீட்டின் தொகுதி. செயல்பாடுகளைப் பயன்படுத்துவது, நாம் மறுநிகழ்வு பயன்படுத்தக்கூடிய குறியீட்டின் துண்டுகளை ஒழுங்கமைக்க உதவுகிறது. \nஒரு செயல்பாட்டை உருவாக்க, `{define}` ஐப் பயன்படுத்தி, செயல்பாட்டிற்கு ஒரு பெயரைக் கொடுங்கள். செயல்பாட்டில் நீங்கள் விரும்பும் அனைத்து வரிகளையும் `{define}` வரியின் கீழ் உள்தள்ளப்பட்ட தொகுதியில் வைக்கவும். \nஉங்கள் குறியீட்டில் ஒரு வெற்று வரியை விடவும், அது அழகாகவும் நேர்த்தியாகவும் இருக்கும். பெரிய வேலை! நீங்கள் ஒரு செயல்பாட்டை உருவாக்கியுள்ளீர்கள்! \n\nஇப்போது, அந்தக் குறியீட்டின் தொகுதி தேவைப்படும் போதெல்லாம், அதை அழைக்க செயல்பாட்டின் பெயரைப் பயன்படுத்துகிறோம்! அந்தக் குறியீட்டின் தொகுதியை நாம் மீண்டும் தட்டச்சு செய்ய வேண்டியதில்லை. \n\nட்விச்டர் விளையாட்டின் இந்த உதாரணக் குறியீட்டைப் பாருங்கள். 'டர்ன்' செயல்பாட்டில் எந்த மூட்டு எங்கு செல்ல வேண்டும் என்பதைத் தேர்ந்தெடுக்கும் குறியீட்டின் தொகுதி உள்ளது. \n\n### உடற்பயிற்சி \n`chosen_limb` மற்றும் `chosen_color` ஆகிய 2 மாறிகளை அமைப்பதன் மூலம் இந்தக் குறியீட்டை முடிக்கவும். \nபின்னர், ட்விச்டர் ச்பின்னரை சுழற்றுவதற்கு, செயல்பாட்டை எத்தனை முறை அழைக்க வேண்டும் என்பதைத் தேர்வுசெய்யவும். \n\n### உடற்பயிற்சி 2 \n'மக்கள்' எனப்படும் மாறியைச் சேர்ப்பதன் மூலம் உங்கள் குறியீட்டை மேம்படுத்தவும். விளையாட்டில் அனைத்து வீரர்களுக்கும் அவர்களின் சொந்த கட்டளையை வழங்க மாறியைப் பயன்படுத்தவும். \nஉதாரணமாக: 'அஅ்மத், பச்சை நிறத்தில் வலது கை' அல்லது 'செசிகா, மஞ்சள் நிறத்தில் இடது கால்'.\n"
                example_code: "``` \nபக்கங்கள் = 'இடது', 'வலது' \nமூட்டுகள் = 'கை', 'கால்' \nநிறங்கள் = 'சிவப்பு', 'நீலம்', 'பச்சை', 'மஞ்சள்' \n\n{define} next_turn \nதேர்வு_பக்கம் = பக்கங்கள் {at} {random} \nதேர்ந்தெடுக்கப்பட்ட_மூட்டு = மூட்டுகள் _ \nதேர்வு_நிறம் = நிறங்கள்_ \n{print} selected_side ' ' selected_limb ' on ' selected_color \n\n{print} 'Twister விளையாட்டை விளையாடலாம்!' \n{repeat} _ \nஅடுத்த_திருப்பை அழைக்கவும் \n{sleep} 2 \n```\n"
