    fortune:
        name: 예언가
        default_save_name: 예언가
        levels:
            1:
                story_text: |
                    당신은 카니발에 가보고 예언가에게 당신의 미래를 점쳐본적이 있는가? 아니면 마법의 8구를 가지고 놀아본적이 있는가?
                    그러면 여러분은 아마 그들이 여러분의 미래를 정말로 예측하지 못한다는 것을 알 거예요, 하지만 노는 것은 여전히 재미있어요!

                    다음 레벨에서 여러분은 여러분만의 점치는 기계를 만드는 방법을 배울 수 있습니다!
                    레벨 1에서는 Hedy가 자신을 점쟁이라고 소개하고 선수들의 대답을 `{echo}`하게 하면 쉽게 시작할 수 있다.
                    이런 식으로:
                story_text_2: |
                    ### 연습문제
                    예제 코드를 입력 화면에 복사하고 빈칸을 입력하면 코드가 작동합니다.
                    **추가** 코드를 바꿔서 점쟁이가 당신의 이름뿐만 아니라 당신의 나이, 당신이 좋아하는 스포츠 팀, 또는 당신 자신에 관한 다른 것들도 예측할 수 있도록 하세요.
            6:
                story_text: |
                    ### 확장
                    예시에서 당신은 당신이 당신의 호의에 확률을 팁 할 수있는 행운의 teller 프로그램을 만드는 방법을 볼 수 있습니다. 이 속임수 프로그램은 항상 복권을 이길 것이라고 말하지만 친구는 결코 이길 수 없습니다.

                    이 프로그램을 만들기 위해, 창조적! 예를 들어 다음과 같은 코드를 만들 수 있습니다.
                    * 당신의 마음에 드는 스포츠 팀은 모든 경쟁자를 이길 것입니다!
                    * 당신의 좋아하는 영화는 영화 밤을 위해 선택될 것입니다!
                    * 당신은 당신의 마음에 드는 쇼에 표 승리!
                    * 당신은 눈 백색의 마술 거울 같이 그들 전부의 가장 공정합니다.
                    당신의 상상력은 일을!

                    최소 10줄 이상의 코드가 존재하고 적어도 하나의 `{if}`와 `{else}` 명령이 있어야 합니다.
                    .
    functions:
        levels:
            12:
                story_text: |
                    이 수준에서 **기능**를 사용하는 방법을 배울 수 있습니다. 함수는 여러 번 쉽게 사용할 수 있는 코드의 블록입니다. 함수를 사용하여 우리가 다시 사용하고 다시 사용할 수 있는 코드의 조각을 구성합니다.
                    함수를 만들기 위해, `{define}`를 사용하고 함수를 이름을 부여합니다. 그런 다음 `{define}` 라인에서 들여진 블록에서 원하는 모든 라인을 넣어.
                    코드에 한 빈 라인을 두고 멋지고 깔끔합니다. 좋은 일! 당신은 기능을 만들었습니다!

                    이제 코드의 블록이 필요할 때마다, 우리는 그냥 호출하는 기능의 이름을 사용합니다! 우리는 코드를 다시 블록을 입력 할 필요가 없습니다.

                    Twister의 게임의이 예제 코드를 체크 아웃. 함수 'turn'는 limb가 어디로 가야 하는 코드를 선택 하는 블록을 포함 합니다.

                    ### 확장
                    2 변수 `chosen_limb` 및 `chosen_color`를 설정하여이 코드를 완료하십시오.
                    그런 다음, 당신이 Twister 스피너에게 스핀을 줄 수있는 기능을 호출하는 방법을 선택할 수 있습니다.

                    ### 엑스포 2
                    '사람'이라는 변수를 추가하여 코드를 개선합니다. 게임에서 모든 플레이어에게 명령을 부여하는 변수를 사용합니다.
