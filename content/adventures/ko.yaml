            6:
                story_text: |
                    우리의 중산 부는 임신 한 숙녀로부터 임신 한 숙박시에 많은 질문을하고 있습니다. 임신 한 동안 임신 한 숙박 시설에 대해 많은 질문을받습니다. 음식을 안전한 경우 뭔가를 말하는 앱을 만드는 것을 환자를 도울 수 있습니까? ### 운동 프로그램은 다음과 같은 것을 환영합니다. * 확인을 위해 무엇을 받기를 원한다. * '안전하지 않은 음식'이라는 목록에 있는지 확인하십시오. * 운영되지 않은 상태에서 인식을받지 않습니다. * 그것은 당신이 그것을 안전하게하지 않을 것입니다. * 그것은 당신이 그것을 준비하는 것이 좋습니다. * 그것은 임신 한 자리를 사용합니다.
            4:
                story_text: |
                    우리 간호사는 하루에 성취 할 많은 작업을 가지고 있습니다.이 작업 중 하나는 아침에 모든 환자를 돌아 다니며 아침 식사를 위해 무엇을 원할 것입니다. 환자가 아침 식사를 선택하고 주방의 즉시 주문을 보내 주시면 프로그램이 만들어졌습니다. ### 운동을 통해 귀하의 이름과 roomnumber *를 환자에게 요청하십시오 * * 모든 음식을 찍으십시오 * * 음식을 찍으십시오 * 뉴욕을 먹고 참을성을주십시오 * *를 주신 것처럼 * 주어진 환자에게 물건을 묻습니다. * 주문 환자에게 다시 주문하십시오 * * 주문을 환영 받으십시오 * 주문을 환영합니다 * * 주문을 환영 받으십시오 * 주문을 환영합니다 * * 주문 환자에게 다시 환자에게 반드시 물어보십시오 * * 주문 환자에게 15 분 안에 그들의 주문을 해당 수당으로 넘어줍니다.
            13:
                story_text: |
                    우리 병원은 환자의 많은뿐만 아니라 많은 인원이 없습니다. 직원의 각 구성원은 정보를 주지 않는 배지를 필요로 합니다.
                    새로운 직원이 정보를 채우고 배지를 인쇄 할 수 있도록 프로그램을 만들 수 있습니까?
                    ### 확장
                    이 프로그램은:
                    * 이름 새로운 직원 환영
                    * 이름 제목, 첫 번째 이름, 마지막 이름, 생년월일, 생년월일, 기능, 부서 및 인원 번호.
                    * 이름 새로운 직원을 감사 하 고 그들의 배지를 곧 인쇄 될 것 이다.
                    * 이름 2 초 동안 프로그램을 일시 중지합니다.
                    * 제목, 이름 및 마지막 이름을 인쇄합니다.
                    * 출생일 및 출생지
                    * 기능 및 부서를 인쇄하십시오.
                    * 인원 번호 인쇄.
                    .
            1:
                story_text: |
                    병원 모험에 오신 것을 환영합니다. 이 모험에서는 병원의 이사가 병원에서 발생하는 문제를 해결하는 데 도움이 될 것입니다. 이것은 당신의 첫번째 할당입니다:

                    프론트 데스크에서 horribly 긴 라인이 있으며 직원은 매우 바빴습니다. 자체 등록 키오스크를 프로그래밍하여이 직원을 도울 수 있습니까?
