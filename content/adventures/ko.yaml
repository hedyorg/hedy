                    이 프로그램은:
                    * 이름 환자에게서 약속을 가진 이름의 명부가 있으십시오
                    * 이름 오늘 새로운 환자가있는 경우 간호사에게 문의하십시오.
                    * 이름 목록에 새로운 환자의 이름을 추가하고
                    * 이름 그런 다음 프로그램은 환자에게 백신 영역으로 이동해야합니다.
                    * 이름 이 프로그램은 10 초를 기다립니다, 화면을 정리하고 다음 환자에 호출, 목록의 모든 환자가 호출 될 때까지.
                    .
