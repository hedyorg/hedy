                    이전 레벨에서 함수를 생성하고 인자를 사용합니다. 기능의 또 다른 큰 사용은 당신에게 무언가를 계산하는 것입니다.
                    계산 함수를 줄 수 있고 계산의 답을 줄 것입니다. 이 대답은 ** 반환 값**라고합니다.

                    예를 들어, 이 코드에서 function count_new_price는 모든 항목의 새로운 가격을 계산합니다. 반환 값으로 새로운 가격을 줄 것입니다.

