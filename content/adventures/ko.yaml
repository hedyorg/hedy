                    {print} (안녕하세요.) 자주 묻는 질문
                    title = {input} ('당신의 제목 (mr, mrs, ms, dr, 등)?')
                    name = {input} ('당신의 마지막 이름은 무엇입니까?')
                    국내 = {input} 어떤 나라에서 왔습니까?')

                    welcome_message(제목, 이름, 고향, 105)
                    ₢ 킹 ₢ 킹
                story_text: |
                    이전 모험에서는 함수의 인수를 사용하는 방법을 배웠습니다. 그리고 {ask}와 결합하는 방법을 배웠습니다.
                    예를 들어 함수가 코드의 한 줄이기 때문에 함수를 사용하는 이유가 궁금해 할 수 있습니다.
                    이제 우리는 당신이 더 큰 기능처럼 보이고 우리는 이제 여러 인수를 사용할 것입니다. 함수가 더 커질 때 함수를 사용하는 것이 얼마나 좋을까요?
                    `{ask}` 명령어와 결합된 인수를 가진 함수의 예입니다.
                    .
    if_command:
        description: Introducing the if command
        levels:
            5:
                story_text: |
                    ## If... else....
                    레벨 5에는 새로운 것인 {if}가 있다! `{if}`을(를) 사용하면 두 개의 다른 옵션 중에서 선택할 수 있다.
                    이 코드는 이름으로 Hedy를 입력하면 인쇄가 잘 되고, 다른 이름으로 입력하면 야유.
                    `{ask}`와 `{print}`는 여전히 레벨 4와 같이 작동한다.
                story_text_2: |
                    `{if}`인 코드가 정말 길어져서 행에 잘 맞지 않을 때도 있다. <br> 코드를 두 줄에 걸쳐 나눌 수도 있는데, 두 번째 줄은 다음과 같이 `{else}`에서 시작한다:
                story_text_3: |
                    ### 연습 문제
                    `{if}`와 `{else}`로 자신만의 코드를 만들어 보자. 원한다면 예제 코드를 사용할 수 있다.
    in_command:
        description: Introducing the in command
        levels: {}
    is_command:
        description: introducing is command
        levels:
            2:
                story_text: |
                    ## Variables
                    단어의 이름은 `{is}`로 지을 수 있다. 이를 **variable**라고 한다. 이 예제에서 name이라는 변수와 age라는 변수를 만들었다. name이라는 단어는 코드 어디에서나 사용할 수 있으며 다음과 같이 Hedy로 대체된다:
                story_text_2: |
                    ### 연습문제
                    변수를 직접 만들어 볼 시간!
                    예제 코드에서 우리는 `favorite_animal` 변수의 예를 만들었다. 1행에서 변수가 설정되어 있고, 2행에서 우리는 인쇄 명령에 변수를 사용했다.
                    먼저 빈칸에 가장 좋아하는 동물을 채우는 것으로 예제를 끝내라. 그런 다음 적어도 3개의 코드를 직접 만들어라. 변수를 골라서, {is} 명령어로 변수를 설정한다. 그런 다음 우리가 했던 것처럼 {print} 명령어로 사용한다.
            13:
                story_text: |
                    우리는 더 새로운 아이템을 배울 것입니다. 수학, `<` 및 `>`에서 이미 알고 있습니다. 우리가 사용 하기 전에 `{greater} {than}` 과 `{less} {than}`, 하지만 대부분의 프로그래밍 언어 사용 기호 이.
                    `<` 첫 번째 숫자가 두 번째보다 작을 경우, 예를 들어 연령 `<` 12 세 미만이 12 세 미만인지 확인합니다.
                    첫 번째 숫자가 작거나 두 번째와 동일하면 `<=`를 사용할 수 있습니다. 예를 들어 `<=` 11.
                    `>` 첫 번째 숫자가 두 번째보다 큰 경우, 예를 들어 포인트 `>` 10 체크 포인트가 10보다 큰 경우.
                    첫 번째 숫자가 더 크거나 두 번째와 동일하면 `>=`를 사용할 수 있습니다. 예를 들어 `>=` 11을 사용합니다.
                    이 비교를 사용하여 `{if}`, 다음과 같이:
    language:
