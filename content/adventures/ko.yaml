    turtle:
        name: 거북이
        default_save_name: 거북이
        levels:
            1:
                story_text: |
                    여러분은 또한 Hedy를 그림을 그리기 위해 사용할 수 있습니다. 회전과 선을 결합함으로써, 여러분은 사각형이나 계단을 만들 수 있습니다!

                    `{forward}`을 사용하면 앞으로 선을 그립니다. 뒤에 있는 숫자에 따라 거북이가 걸어갈 거리가 결정됩니다.`{turn} {right}`는 시계 방향으로 1/4회전, `{turn} {left}`는 시계 반대 방향으로 회전합니다.

                    뒤로 가려면 `{forward}` 명령을 사용하지만 음수가 됩니다. 따라서 예를 들어 `{forward} -100`
                story_text_2: |
                    ### 연습문제
                    작은 시작 단계입니다. 계단을 5개로 만들 수 있나요?
            2:
                story_text: |
                    레벨 1에서 거북은 왼쪽 또는 오른쪽으로 돌릴 수 있습니다. 조금 지루하다!
                    레벨 2에서 그는 모든 방향으로 코를 지적 할 수 있습니다.

                    90도를 사용하여 분기, 180을 반으로 돌리고 전체 원은 360도입니다.

                    ### 확장
                    이 코드는 이제 문자 T를 만듭니다. 문자 B를 만들 수 있습니까?

                    **Extra** 다른 문자로 문자 변경, 이름의 첫 번째 것 처럼.
                    색상을 `{color}` `{white}`로 설정하여 여러 문자를 만들 수도 있습니다.
                    .
            9:
                story_text_2: |
                    **Extra** 다양한 도형을 그리는 프로그램을 개선할 수 있습니다. 코드를 완성하면 원하는 다각형을 그릴 수 있습니다!
            12:
                story_text: |
                    더 복잡한 수치를 더 적은 코드로 그리는 기능을 사용할 수 있습니다.
                    ### 확장 1
                    3개의 사각형이 생성된 함수를 채웁니다. 이미지가 더 멋지게 보이고 싶다면 사각형 흰색 사이에 줄을 만들 수 있습니다.

                    ### 제 2 장
                    코드는 더 짧은 만들 수 있습니다. 마지막 줄을 `{repeat}`로 배치하십시오. 그림은 동일합니다.

                    ### 확장 3
                    다른 인물로 자신의 그림을 만듭니다.
                    `{repeat}`와 그림의 수를 모두 변경하고 `{define}`의 그림의 모양
