adventures:
    story:
        name: 스토리
        default_save_name: 스토리
        description: 짧은 이야기를 만듭니다
        levels:
            1:
                story_text: "레벨 1에서는 여러분이 직접 입력한 여러 주인공으로 이야기를 만들 수 있습니다. \n\n첫 번째 줄에  `{ask}`를 사용해서 이야기의 주인공아 누가 될 지를 물어보세요. \n\n첫 번째 줄 이후로는, 출력해야 하는 문장이 있다면 `{print}`로 시작하세요. \n문장의 맨 끝에 여러분의 주인공이 나오게 하고 싶다면  `{echo}`를 사용하세요.\n"
                example_code: "```\n{ask} 이 이야기의 주인공은\n{print} 주인공은 숲 속을 걷고 있습니다.\n{echo} 겁에 질려있네요,\n{print} 사방에서 온갖 시끄러운 소리가 들려옵니다.\n{print} 어쩌면 이 곳이 귀신들린 숲은 아닐까 두려워하고 있습니다.\n```\n"
                story_text_2: |
                    ### 연습문제
                    이제 최소 6줄의 코드로 된 자신만의 이야기를 만들어 보세요.
                    이 스토리는 예제 코드와 같을 수 없습니다.
                    적어도 하나의 `{ask}` 명령과 하나의 `{echo}` 명령을 사용합니다.
                    당신은 당신이 좋아하는 어떤 주제에 대해서도 그것을 만들 수 있다.
                    주제가 생각나지 않는다면, 우리가 선택한 것 중 하나를 이용해 보세요: 영화를 보러 가거나, 스포츠 경기를 하거나, 동물원에서 하루를 보내거나.
            2:
                story_text: "레벨 2에서는 여러분의 이야기를 더 재미있게 만들 수 있습니다. 여러분이 만든 주인공의 이름이 문장 어디에든 들어갈 수 있게 되었습니다.\n\n그러기 위해서는 프로그래밍을 조금 더 해야 해요. 당신은 이제 주인공의 이름을 먼저 지어줘야 합니다. \n\n지어준 이름을 문장 어디에나 넣을 수 있습니다.\n"
                example_code: "```\n이름 {is} {ask} 주인공의 이름이 무엇인가요?\n{print} 이름 은 숲속을 달릴거예요.\n{print} name 은 조금 겁에 질려있습니다.\n{print} 갑자기 소름끼치는 소음이 들려옵니다.\n{sleep}\n{print} 이름 은 여기가 귀신들린 숲이 아닐까 두려워하고 있습니다.\n```"
                story_text_2: |
                    ### 연습문제
                    이제 이전 레벨에서 만들었던 자신의 스토리에 변수를 추가해야 할 때입니다.
                    '내 프로그램'으로 이동하여 레벨 1 스토리 모험을 찾아 코드를 복사하세요. 코드를 이 레벨의 입력 화면에 붙여넣으세요.

                    아직 변수를 사용하지 않았기 때문에 이 레벨에서는 붙여넣은 코드가 작동하지 않습니다.
                    코드에 있는 `{ask}`명령어와 `{echo}` 명령어를 이 레벨에서 배운 올바른 형태로 변경합니다.

                    **추가** 코드에  `{sleep}` 명령을 추가하여 스토리에 긴장감을 조성해 보세요.
            3:
                story_text: |
                    레벨 3에서는 여러분의 이야기를 더 재미있게 만들 수 있습니다. 몬스터, 동물이나 장애물에 랜덤성을 사용할 수 있게 됐습니다. 이렇게요:
                example_code: "```\n동물들 {is} 🦔, 🐿, 🦉, 🦇\n{print} 이제 동물들 {at} {random} 의 울음소리가 들리기 시작합니다.\n```\n"
                story_text_2: |
                    `{add}` 명령어도 여러분의 이야기에 유용하게 쓰일 수 있습니다.
                example_code_2: "```\n{print} 소리가 들려옵니다.\n동물들 {is} 🐿, 🦔, 🦇, 🦉\n동물 {is} {ask} 어떤 동물의 소리일까요?\n{add} 동물 {to_list} 동물들\n{print} 동물들 {at} {random} 이었습니다. \n```\n"
                story_text_3: |
                    `{remove}` 명령을 스토리에 사용할 수 있는 예제입니다

                    ### 연습문제
                    이전 레벨들의 스토리를 이 레벨로 복사해 보세요.
                    본 레벨에서 우리는 `{at} {random}`, `{add} {to_list}` 및 `{remove} {from}` 명령 3개를 새로 배웠습니다.
                    스토리에 새 코드 줄을 추가하여 모든 새 명령이 스토리에 한 번 이상 포함되도록 합시다.
                example_code_3: |
                    ```
                    {print}가방이 너무 무거워졌습니다.
                    {print}가방 안에는 물병, 손전등, 그리고 벽돌이 있습니다.
                    가방{is}물병, 손전등, 벽돌
                    버릴물건{is}{ask}어느 물건을 버려야 할까요?
                    {remove} 버릴물건{from}가방
                    ```
            4:
                story_text: |
                    ### 연습문제
                    예제 코드를 복사한 후 1행과 2행의 빈칸에 따옴표'를 붙여서 마무리하세요.
                    3번과 4번의 빈칸은 따옴표가 아니라 `{sleep}`과 `{clear}`명령어로 대체해야 하는데, 할 수 있을까요?

                    ### 연습문제 2
                    이전 레벨로 돌아가서 스토리 코드를 복사하세요. 올바른 자리에 따옴표를 추가하여 코드가 이 레벨에서 작동하도록 하세요.
                    주의: 당신의 스토리에 나오는 변수들은 따옴표 밖에 있어야 합니다. 예제 코드의 두 번째 줄처럼 말이죠. 그 줄에서 변수 이름은 따옴표 밖에 놓여 있습니다.
                example_code: |
                    ```
                    이름{is} {ask} _ 당신의 이름은 무엇인가요? _
                    {print} _ 주인공의 이름은 _ 이름 _ 입니다
                    _
                    _
                    {print} 이름 _ 은 숲에 산책을 나섰습니다 _
                    {print} 이름 _ 은 조금 겁에 질렸습니다 _
                    동물 {is} 🦔, 🐿, 🦉, 🦇
                    {print} _ 그는 _ animals {at} {random} _ 의 소리가 들립니다 _
                    {print} 이름 _ 은 이 숲이 귀신들린 숲인것 같아 두렵습니다 _
                    ```
            5:
                story_text: |
                    이 레벨에선 여러 엔딩을 프로그래밍 할 수 있어, 더욱더 이야기를 재미있게 만들 수 있습니다.
                    예제 코드에서 두 가지 다른 엔딩을 만드는 방법을 볼 수 있습니다.

                    ### 연습문제 1
                    당신이 선택한 주제에 대해 최소 6줄의 코드로 된 새로운 단편 소설을 써 보세요.
                    영감이 없다고요? 다음 주제들 중 하나를 고르세요: 슈퍼히어로, 지루한 학교생활, 무인도 표류기.

                    이제 예제 코드와 같이 플레이어에게 해피엔딩 또는 배드엔딩를 선택할 수 있는 변화를 줍니다.
                    양쪽 엔딩을 모두 프로그래밍 합시다.

                    ### 연습문제 2
                    만든 이야기를 이전 레벨에서의 스토리 모험에 복사해 보세요.
                    스토리에 최소한 두 개의 `{if}` 명령과 `{else}` 명령을 추가하는 방법을 찾으십시오.
                    이것은 행복한 결말일 수도 있고 나쁜 결말일 수도 있지만 명령어를 포함할 다른 방법들도 찾아보세요.
                example_code: |
                    ```
                    이름{is} {ask} '숲 속에 누가 있나요?'
                    {print} 이름 ' 은 숲으로 깊이 들어갑니다'
                    {print} 이름 ' 은 괴물을 마주칩니다'
                    결말 {is} {ask} ' 좋은 결말과 나쁜 결말 중 어느 것을 고르시겠습니까?'
                    {if} 결말 {is} 좋은 결말 {print} 이름 ' 이 검을 들자 괴물은 도망쳤습니다'
                    {else} {print} ' 괴물은 ' 이름 ' 을 잡아먹었습니다.'
                    ```
            6:
                story_text: |-
                    이제 `{elif}` 를 이용하여 더욱 더 상호작용이 가득한 이야기를 만들 수 있습니다! 예를들어 여러 등장인물을 만들 수 있고, 각자 다른 특성을 보유하게 할 수 있습니다.
                    혹은 플레이어가 어느 길을 가야 할지, 어느 문을 열어야 할지, 어느 마법 물약을 마셔야 할지 정하게 할 수 있습니다...

                    ### 연습문제
                    {elif}를 이용하여 3개 이상의 선택지가 있는 당신만의 이야기를 만들어 보세요.
                example_code: |
                    ```
                    등장인물 {is}{ask} '누가 당신의 임무를 돕게 하겠습니까?'
                    {if} 등장인물 {is} '영희'
                    {print} '영희를 고르셨습니다! 그녀는 셋중 가장 똑똑합니다!'
                    {elif} 등장인물 {is} '철수'
                    {print} '철수를 고르셨습니다! 그는 셋중 가장 힘이 쎕니다!'
                    {elif} 등장인물 {is} '민수'
                    {print} '민수를 고르셨습니다! 그는 셋중 가장 빠릅니다!'
                    ```
            8:
                story_text: |
                    스토리에서, 어떤 사람은 여러 번 말을 합니다. 예를 들어, 누군가가 도움을 요청하거나 노래를 부를 때 말입니다.
                    이 레벨에서는 `{repeat}` 을 이용해서, 이러한 반복을 당신의 스토리에 포함할 수 있습니다.

                    ### 연습문제
                    자신의 스토리에 반복을 넣어보세요. 저장된 프로그램들에서, 이전의 레벨 중 사용한 스토리 프로그램을 골라서
                    `{print}` 가 들어간 라인을 찾아 반복해 보세요!
                example_code: |
                    ```
                    {print} '왕자는 계속해서 도움을 요청했어요'
                    {repeat} 5 {times}{print} '도와주세요!'
                    {print} '왜 아무도 나를 돕지 않는 거지?'
                    ```
            9:
                story_text: |
                    이 레벨에서는 `{if}` 명령에 여러 줄을 사용할 수 있으며, 이렇게 해피엔딩이나 새드엔딩을 업그레이드할 수 있습니다!

                    ### ### 연습문제 1
                    예제 코드는 두 개의 다른 엔딩을 보여주는데, 하나는 캐릭터가 타임머신에 뛰어드는 것이고, 다른 하나는 그렇지 않은 것입니다.
                    엔딩 마다 한 문장 이상을 이용하여 빈칸을 완성하세요.
                    **추가적으로** 스토리를 더 길게 만들어 보세요. 스토리에서 무슨 일이 일어날까요? 다른 선택지 들이 있는 두 번째 `{ask}`를 추가할 수도 있습니다.

                    ### ### 연습문제 2
                    저장된 프로그램으로 돌아가서 5레벨에서의 스토리 프로그램을 선택하세요. 이제 각각 최소 세 줄의 좋은 결말과 나쁜 결말을 쓰세요!
                example_code: |
                    ```
                    {print} '으아 안돼! 티라노가 점점 가까워지고 있어!'
                    엔딩 = {ask} '해피엔딩을 원하시나요, 새드엔딩을 원하시나요?'
                    {if} 엔딩 {is} '해피엔딩'
                        {print} '철수는 제때 타임머신에 다시 뛰어들었어요!'
                        {print} _
                    {else}
                        {print}'이런! 철수는 너무 느렸어요...'
                        {print} _
                    ```
            10:
                story_text: "이 레벨에서는 다른 `{if}` 및 `{repeat}` 명령어 내에서 {if} 및 {repeat} 명령어를 사용할 수 있습니다. \n이것은 여러분에게 많은 선택권을 주고 여러분의 이야기를 상호작용적으로 만드는 데 정말로 도움을 줍니다.\n\n ### 연습문제 1\n코드를 완료하여 `{if}`가 올바르게 작동하도록 하십시오.\n\n### 연습문제 2\n로빈이 집에 가는 스토리의 부분도 `{if}`와 `{else}`를 붙인다.\n\n### 연습문제 3\n레벨 8 스토리로 돌아가서 다른 `{if}` 안에 최소한 두 개의 `{if}`을 사용합니다.\n"
                story_text_2: |
                    `{and}`와 `{or}` 명령을 사용하여 더 다양한 스토리를 만들 수 있습니다. 두 가지 질문을하고 답변의 조합에 응답 할 수 있습니다.

                    ### 확장 1
                    예를 들어 코드에서 확인하고 완료하십시오. 그런 다음 `{if}` 코드를 `{and}` 또는 `{or}`.

                    ### 확장 2
                    이전 레벨에서 이야기 찾기, 하나 추가 `{and}` 또는 `{or}`.
                    예제 _ 코드: |
                    ₢ 킹 ₢ 킹
                    {print} '우리의 영웅은 숲을 통해 걸어 이름 *
                    {print} '이 경로는 두 가지 방법을 분할 이름 *
                    path = {ask} '그 경로가 선택되어야합니까? 이름 *
                    무기 = {ask} '그의 무기가 그리는 것은 무엇입니까? 이름 *
                    {if} 경로 {is} '왼쪽' {and} 무기 {is} 'sword 이름 *
                    _ 한국어
                    ₢ 킹 ₢ 킹
            11:
                story_text: |
                    이 레벨에서 스토리에서 {for} 명령을 사용할 수 있다. 이렇게 하면 어린이 책 '갈색 곰, 갈색곰, 무엇이 보이니'를 쉽게 프로그래밍할 수 있다.

                    ### 연습 문제

                    <a href="https://www.yonkerspublicschools.org/cms/lib/NY01814060/Centricity/Domain/1621/Brown%20Bear%20Book.pdf">스토리</a> 를 보고, 책에서처럼 인쇄되어 있는지 확인한다.
                example_code: "```\nanimals = _ , _ , _ \n{print} 'Brown bear, Brown bear'\n {print} 'What do you see?'\n```\n"
            13:
                story_text: |
                    다른 이야기를 인쇄할 건데 이제는 `{print}`가 붙은 괄호를 써야 해요.

                    ### ### 연습문제 1
                    최소 5문장 이상의 이야기를 만들어 보세요. 아직 '이름'을 사용하지 않아도 됩니다.
                story_text_2: |
                    ### 연습문제 2
                    우리는 이미 당신을 위해 `{input}`을 준비했습니다. 먼저 당신의 이야기에 `name` 변수를 사용하세요.
                    그런 다음 두 번째 `{ask}`를 추가하고 그 변수도 사용합니다.
                    팁: 텍스트와 변수 사이의 `{print}`에 있는 쉼표를 기억하세요!
    add_remove_command:
        name: '{add} {to} & {remove} {from}'
        description: introducing add to and remove from
        levels:
            3:
                story_text: "## Add to \n`{add} {to_list}` 명령을 사용하여 항목을 목록에 추가할 수 있습니다. 항목을 목록에 추가하려면 간단히 `{add} penguin {to} animals`를 입력하거나 예제 코드처럼 `{ask}` 명령을 사용합니다.\n"
                story_text_2: |
                    ## Remove from
                    목록에 항목을 추가할 수 있다면 당연히 항목을 삭제할 수도 있다. 이는 `{remove} {from}` 명령으로 완료된다.
                story_text_3: |
                    ### Exercise
                    이 가상 레스토랑에서 새로운 명령어를 사용해 보십시오. 플레이어가 원하는 맛을 목록에 추가하고 알레르기가 있는 맛을 제거하십시오.
    and_or_command:
        levels: {}
    ask_command:
        description: Introduction ask command
        levels:
            1:
                story_text: |
                    ## ask 명령어
                    이제 `{print}` 명령어를 사용할 수 있게 되었으므로 다음 명령어인 `{ask}`를 배울 준비가 되었다. `{ask}` 명령어를 사용하면 질문을 할 수 있다. 다음을 확인해 보자:
                example_code: |
                    ```
                    {print} 안녕하세요!
                    {ask} 너는 이름이 무엇이니?
                    ```
                story_text_2: |
                    ## echo 명령어
