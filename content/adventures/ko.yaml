                    **argument** 함수 안에 사용되는 변수입니다. 그것은 기능 밖에 사용되지 않습니다.

                    예를 들어, 이 코드에서 우리는 노래의 첫 번째 구절을 프로그래밍했습니다 '내 Bonnie는 바다 위에 있습니다.
                    이 예제에서 인수 'place'가 사용됩니다. 속성은 함수에서만 사용되는 변수이므로 인수가 됩니다.
                    'place'를 사용하려면 `place`를 `{define} song` 후 배치했습니다.
                    함수가 호출될 때, 컴퓨터는 ` song {with}` 후에 텍스트의 조각과 더불어 인수 'place'를 대체합니다.

                    ### 확장
                    이 곡의 다음 구절이 간다:

