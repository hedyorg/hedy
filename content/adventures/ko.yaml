                story_text: |
                    우리의 수위자는 일상적인 일을하고 있습니다. 일부 작업은 일상, 일정, 계절 또는 날짜에 다른 사람들이 완료됩니다. 이것은 매우 혼란스럽고 잊혀지는 상황에 이어집니다. 이런 일을 위해 옳은 작업을 인쇄 할 수있는 프로그램을 작성할 수 있습니까? ### 해당 일을 올바른 작업을 인쇄 할 것입니다. * 운동은 프로그램을 받아들이는 것을 요구하십시오. * 월요일과 월 어느 날을위한 소요하십시오. * 일상적인 작업 : 하루에 정확한 작업을 수행하십시오. 매주, 커튼을 엽니 다. * 월요일에 뉴욕의 첫 번째 : 뉴스를 씻어 내십시오. 매월 1/4 : 뉴스를 씻어 내야합니다. * 매일의 14 일에 뉴스를 씻어 내십시오 : * 18 번째의 첫 번째 : 뉴스를 씻어 내야합니다 * 매크로 경보를위한 워시 * 겨울의 첫 번째 : 겨울의 첫 번째 : 겨울의 첫 번째 : 히터를 켜십시오 * * Fore Holaters * Multine Monthens * Swiemonth에서의 매일 * 히터를 켜십시오 * 여름 승마를받습니다.
