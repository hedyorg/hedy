    maths:
        levels: {}
    music:
        levels:
            1:
                story_text: |-
                    이 수준에서 `{play}` 명령을 사용하여 튜닝을 수행하는 방법을 배울 수 있습니다!

                    Type `{play}` 다음 메모를 통해 재생합니다. 가늠자는 C-D-E-F-G-A-B를 갑니다.
                    7개의 다른 문자가 있을 수 있으므로 7개의 메모를 재생할 수 있습니다.
                    0과 9 사이의 숫자를 입력하여 스케일을 선택할 수 있습니다. 예를 들어 B4가 C5를 옵니다.
                    C0은 가장 낮은 메모입니다, B9는 가장 높습니다.

                    ### 확장
                    예제 코드를 시도하고 그 주위에 재생! 자신의 멜로디를 만들 수 있습니까?
                    다음 단계에서 당신은 기존 노래를 재생하는 방법을 배울 것입니다.
    parrot:
        name: 앵무새
        default_save_name: 앵무새
        description: 당신의 말을 따라할 당신만의 온라인 애완 앵무새를 만들어 보세요!
        levels:
            1:
                story_text: |
                    당신을 따라 할 당신만의 온라인 애완 앵무새를 만들어 보세요!
                story_text_2: |
                    ### 연습문제
                    노란색 버튼을 클릭하여 예제 코드를 입력 화면에 복사합니다.
                    앵무새가 다른 질문을 하도록 하세요. 예제에서 빈칸을 채우세요!
                    **추가** 앵무새가 여러 질문을 하도록 할 수도 있습니다. 자신의 코드 아래에 몇 줄의 코드를 더 입력하세요.
            2:
                story_text_2: |
                    ### 연습문제
                    먼저 `{is}`와 `{ask}` 명령으로 2번 행을 마칩니다.
                    그런 다음 4번과 6번 줄에서 `{sleep}` 명령을 입력하면 앵무새가 잠시 동안 조용히 있을 수 있습니다.

                    **Extra** 코드 줄을 더 추가해서 앵무새가 이름만 요구하게 만들 수 있나요?
            3:
                story_text: |
                    앵무새에게 `{add}`로 새로운 단어를 가르쳐라.
                    ### 연습문제
                    코드를 작동시키기 위해 `{add} {to_list}` 명령을 추가할 수 있습니까?
            4:
                story_text: |
                    이 레벨에서 우리는 `{ask}`와 `{print}` 명령어가 있는 따옴표를 사용해야 한다.
                    ### 연습문제
                    빈칸에 따옴표를 기입하여 코드를 완성한다.
            5:
                story_text: |
                    앵무새가 정확한 단어를 말하면 보상을 해주세요!

                    ### 연습문제
                    누락된 명령어 4개를 입력하여 코드를 마무리합니다.
    piggybank:
        levels: {}

    print_command:
        levels:
            1:
                story_text: |
                    ## print 명령어
                    `{print}` 명령을 사용하여 화면에 텍스트를 print할 수 있습니다.
                example_code: |
                    ```
                    {print} 안녕, 프로그래머 여러분!
                    {print} Hedy에 오신걸 환영해요!
                    ```
                story_text_2: |
                    ### 확장
                    Hedy에서는 모든 모험에서 운동을 찾을 수 있습니다. 운동은 새로운 명령과 개념을 연습 할 수 있으며, 예를 들어 코드에 자신의 트위스트를 부여 할 수 있습니다.
                    이 운동에서는 핑크 빈 공간을 볼 수 있습니다. 코드가 실행되기 전에 공백 공간에서 무언가를 채울 수 있습니다.

                    공백 공간에서 `{print}` 명령을 채우고 5개의 코드를 추가합니다. 각 행은 `{print}` 명령으로 시작합니다.
                    재미있어!
                    !
                example_code_2: |
                    ```
                    _ 안녕하세요!
                    ```
    quizmaster:
        levels: {}
    quotation_marks:
        name: '''따옴표'''
        levels:
            4:
                story_text: |
                    ## 'Quotation marks'
                    레벨 4의 `{ask}`와 `{print}`가 변경되었습니다.
                    따옴표 사이에 인쇄할 텍스트를 넣어야 합니다.
                    이제 원하는 단어를 모두 인쇄할 수 있기 때문에 유용합니다. 또한 `{is}`과(와) 함께 저장할 때 사용한 단어도 있습니다.
                    대부분의 프로그래밍 언어도 인쇄할 때 따옴표를 사용하기 때문에 실제 프로그래밍에 한 걸음 더 다가가고 있습니다!
                story_text_2: |
                    ## Contractions
                    중요해요! 이제 따옴표를 사용하게 되었으니, Hedy는 따옴표'를 I'm이나 What's처럼 수축할 때 혼동할 거예요.
                    아포스트로피를 제거하고 철자를 I 또는 What is로 변경해야 합니다.
                    아포스트로피를 사용하는 잘못된 방법을 알아보려면 예제 코드를 확인하십시오.
    random_command:
        levels:
            3:
                story_text: |
                    ## At random
                    이 레벨에서 당신은 `{is}` 명령을 사용하여 목록을 만들 수 있다. 당신은 컴퓨터로 하여금 그 목록에서 임의의 항목을 선택하게 할 수 있다. 당신은 `{at} {random}`로 그렇게 할 수 있다.
                story_text_2: |
                    문장에서도 `{at} {random}` 명령을 사용할 수 있습니다.
                story_text_3: |
                    ### 연습 문제
                    문이나 여행가방을 고르는 게임쇼(TV에 나오는 것처럼)를 만들어 `{at} {random}` 명령어를 사용해 보세요. 가격이 엄청나요!
                    할 수 있겠어? 우리는 이미 예제 코드에 첫 줄을 넣었다.
    repeat_command:
        description: repeat 명령어
        levels:
            8:
                story_text: |
                    ### Repeat commands and indentation
                    이 레벨에서는 1회 반복 명령만으로 여러 줄의 코드를 반복할 수 있습니다.
                    이것은 반복하고 싶은 선들의 블록을 만들어서 하는 것이다.
                    이 블록의 줄에는 **indentation**가 필요합니다.
                    그것은 각 줄의 시작에 4칸을 넣는 것을 의미한다. 한 줄로 된 블록을 만들고 싶을 때도 들여쓰기를 해야 한다.
    repeat_command_2:
        description: repeat 명령어 2
        levels:
            8:
                story_text: |
                    ### In the block or not?
                    이 레벨에서 당신은 어떤 코드 라인이 블록에 있어야 하고 어떤 코드 라인이 있어서는 안 되는지 신중하게 생각해야 한다.
                    예를 들어, 만약 당신이 *the muffin man*이라는 노래를 부르고 싶다면. 당신은 'the muffin man'이라는 대사를 두 번만 반복하기를 원한다.
                    이것은 마지막 줄이 블록에 속하지 않으므로 들여쓰기로 시작해서는 안 된다는 것을 의미합니다.
                    마지막 줄을 들여쓰기로 시작하면 곡이 틀릴 것이다.

                    ## 연습운동
                    예제 코드의 각 줄은 빈칸으로 시작한다. 빈칸을 제거하고 어떤 줄은 들여쓰기가 필요하고 어떤 줄은 머핀 맨 노래가 되지 않는지 알아낸다.
            9:
                story_text: |
                    ### 블록이나 아닙니다?
                    이 수준에서 코드의 줄이 블록에 있어야주의 깊게 생각해야합니다.
                    예를 들면: 노래를 노래하는 경우 *muffin man*. 두 번 반복 될 '더 머핀 남자'와 줄을 원합니다.
                    이것은 마지막 선이 블록에 속하지 않는 것처럼 indentation로 시작해서는 안됩니다.
                    마지막 줄을 시작하면 노래가 잘못됩니다.

                    ### 확장
                    예제 코드의 각 라인은 공백으로 시작합니다. 공백을 제거하고 필요한 줄을 파악하고 머핀 남자 노래를 만들지 않는다.
                    .
    restaurant:
        name: 식당
        default_save_name: 식당
        levels:
            1:
                story_text: |
                    레벨 1에서는 가상의 식당을 직접 만들어 손님들의 주문을 받아볼 수 있다.
                story_text_2: |
                    ### 연습문제
                    노란색 버튼을 클릭하여 예제 코드를 입력 화면에 복사합니다.
                    먼저 빈칸에 정확한 명령어를 입력하여 코드가 제대로 작동하도록 합니다.
                    그러면 식당 프로그램에 최소 4줄의 코드를 추가해주세요.
                    고객에게 무엇을 마시고 싶은지 물어보고 현금이나 카드로 지불하고 싶은지 물어봅니다.
                    마지막으로 고객과 작별할 수 있는 좋은 방법을 생각해 보세요.
            8:
                story_text: |
                    이 레벨에서는 코드의 한 줄을 일정 시간 반복하기 위해 `{repeat}` 명령을 사용하는 방법을 배웠습니다.
                    레스토랑에서 여러 사람이 무엇을 먹고 싶은지 `{ask}` 용도로 사용할 수 있습니다.

                    ### 연습문제
                    코드를 완성할 수 있나요? Hedy는 이 질문을 사람 수만큼 반복해야 합니다. 그래서 만약에 5명이면 5번 질문을 해야 합니다.
                    **추가** 음료나 소스와 같은 더 많은 질문으로 코드를 확장합니다.
            16:
                story_text: |
                    `{while}`를 사용하면 고객이 주문이 완료될 때까지 주문을 계속 추가할 수 있습니다.

                    ### Exercise
                    Correctly add the `{while}` command to this code.
            2:
                story_text_2: |
                    ### 운동
                    이전 레벨에서 입력 화면으로 자신의 레스토랑 코드를 복사하십시오.
                    `{ask}`와 `{echo}` 명령을 대체하고, 이 레벨에서 배운 것처럼 변수를 사용하여 코드를 수정합니다.

                    이제 코드를 다시 일하고, 더 많은 것을 추가하는 시간입니다.
                    예를 들어 코드의 마지막 줄을 봐: `{print} 음식과 토핑은 그 길에! ₢ 킹
                    이 단일 라인 2 변수는 순서의 요약을 만들기 위해 사용되었습니다.
                    이제 고객이 주문 한 음식과 음료의 자신의 요약을 추가합니다.

                    **Extra** 이제 변수를 사용하는 방법을 배웠습니다. 한 줄에 많은 변수를 사용할 수 있습니다. 코드에 더 많은 변수를 추가 할 수 있습니다, 에서 먹고 또는 테이크 아웃, 현금 또는 카드, 와 또는 밀짚 등없이?
                    ?
            6:
                story_text: |
                    ### 확장
                    예제 코드는 당신이 당신의 레스토랑에서 메뉴 항목에서 실행 한 프로그램을 어떻게 보여줍니다.
                    이전 레벨에서 자신의 레스토랑 코드를 복사합니다. 레스토랑에 문제가 생성하고, 예를 들어 코드가되었습니다.
                    예를 들어, 메뉴 항목에서 실행할 수도 있습니다. 또는 신용 카드를 가지고 있지 않거나 아이스크림 기계는 부서집니다.

                    **Extra** 문제 및 적절한 응답을 프로그래밍 했습니까? 그런 다음 `{if}`와 `{else}` 코드를 추가하려고합니다.
                    `{if}` 를 추가하려고하면 모든 `{ask}` 코드를 사용하여 코드를 대화 형으로 만들 수 있습니다!
                    !
            10:
                example_code: |
                    ```
                    {print} 'Welcome to Restaurant Chez Hedy!'
                    people = {ask} 'How many people will be joining us today?'
                    {print} 'Great!'
                    price = 0
                    {repeat} people {times}
                    _ food = {ask} 'What would you like to order?'
                    _ {print} food
                    _ {if} food {is} fries
                    _ price = price + 3
                    _ sauce = {ask} 'What kind of sauce would you like with your fries?'
                    _ {if} sauce {is} no
                    _ {print} 'no sauce'
                    _ {else}
                    _ price = price + 1
                    _ {print} 'with ' sauce
                    _ {if} food {is} pizza
                    _ price = price + 4
                    {print} 'That will be ' price ' dollar'
                    {print} 'Enjoy your meal!'
                    ```
                story_text: |
                    이 수준에서 당신은 당신의 레스토랑을 더 현실적이고 더 재미있게 만들기 위해 배열을 사용할 수 있습니다!

                    ### 확장
                    indentation은 예제 코드에서 제거되었습니다.
                    각 라인이 제대로 작동하려면 코드를 주문하는 방법에 대해 알아볼 수 있습니까?
                    고객이 피자를 주문하면 Hedy는 고객이 원하는 소스를 묻지 않습니다.

                    **Extra** 레스토랑은 모든 소스를 저장하지 않습니다. 사용 가능한 소스의 목록을 만들고 판매하는 각 주문에 대한 답변을 제공합니다. <br>
                    **Extra** 피자가 토핑되었습니다. 고객이 원하는 것을 물어보십시오.<br>
                    **Extra** 고객이 음료를 원하십니까? 자주 묻는 질문 <br>
            7:
                story_text: |
                    이 수준에서 가상 레스토랑을 더 현실적으로 만들 수있는 고객의 주문의 총 가격을 계산하는 수학을 사용할 수 있습니다.
                    그러나 가상 레스토랑에 더 많은 것을 추가 할 수 있습니다. 예를 들어 더 많은 코스.

                    ### 확장
                    가상 레스토랑에서 더 많은 것을 추가 할 수 있습니다. 예를 들어, 할 수 있습니다 ...
                    - 얼마나 많은 사람들이 와서 그 금액으로 가격을 곱?
                    - 다른 코스를 추가?
                    - 그들은 (secret) 쿠폰 코드를 입력 할 때 할인을 제공?
                    - 어린이 메뉴 추가?
                    - 다른 재미있는 것들을 추가 생각?
                    ?
            4:
                story_text: |
                    `{print}` 또는 `{ask}` 명령을 사용할 때 인용 마크를 사용할 필요가있는 레스토랑.

                    ### 확장
                    이 코드에 인용 표시를 추가하여 작업을합니다! 주의하십시오: 변수는 인용 표에 있어야 합니다.
                    그런 다음 출력 화면에서 한 줄 만 표시하려면 `{clear}` 명령을 사용하십시오.

                    ### 확장 2
                    이전 레벨로 돌아가서 레스토랑 코드를 복사하십시오. 이 수준에서 코드 작업을 오른쪽에 인용 표시를 추가하고 일부 `{clear}` 명령을 추가하여.
                    .
