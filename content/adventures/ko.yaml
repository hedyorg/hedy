                    때로는 계산은 여러 가지 정확한 답변을 가지고 있습니다. 예를 들어, 10은 5과 2로 나눌 수 있습니다. 그래서 질문 '무엇 번호 분할 10?' 2 및 5에 의해 응답 할 수 있습니다.
