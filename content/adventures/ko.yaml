            3:
                story_text: |
                    이전 레벨에서 당신은 당신의 집 게임에 대한 소개를했다, 하지만 당신은 이야기가 항상 dreadful 끝을 가질 수 있기 때문에.
                    이 수준에서 당신은 게임의 outcome를 변경하여 더 많은 대화를 만들 수 있습니다; 때때로 당신은 먹을거야, 때로는 당신은 탈출 할 것이다!
                    Hedy가 무작위로 결정하자!

                    ### 확장
                    예를 들어 코드를 복사하고 공백을 채우고 작업을 할 수 있습니다!

                    ** 엑셀 ** 이 이야기는 꽤 직진, 어쩌면 당신은 더 흥미로운 이야기를 추가하여 비트를 스파이 할 수 있습니다.
