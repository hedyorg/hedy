            10:
                story_text: |
                    На цьому рівні ви можете використовувати вкладення, щоб зробити свій ресторан більш реалістичним і веселішим!

                    ### Вправи
                    У прикладі коду видалено відступ. 
                    Чи можете ви визначити, скільки відступів потрібно для кожного рядка, щоб код працював належним чином?
                    Якщо клієнт замовляє піцу, Хеді не повинна запитувати, який соус клієнт хоче. 

                    **Екстра** У ресторані не є всі соуси. Складіть список доступних соусів і на кожне замовлення відповідайте, чи продаєте ви його.<br>
                    **Екстра** Піца має начинку. Запитуйте клієнтів, чого вони хочуть.<br>
                    **Додатково** Клієнти хочуть випити? Запитайте їх також!<br>
                example_code: |
                    й й
                    {print} 'Велком в ресторан Chez Hedy! Р
                    люди = {ask} "Як багато людей будуть приєднатися до нас сьогодні? Р
                    {print} 'Великий! Р
                    ціна = 0
                    {repeat} люди {times}
                    _ їжа = {ask} 'Що б ви хотіли замовити? Р
                    _ {print} їжа
                    {if} {is} fries
                    _ ціна = ціна + 3
                    _ соус = {ask} 'Що б ви хотіли б з вигодою? Р
                    _ {if} соус {is} немає
                    _ {print} 'но соус Р
                    {else}
                    Ціна = ціна + 1
                    _ {print} "з соусом "
                    {if} їжа {is} піца
                    _ ціна = ціна + 4
                    {print} 'Ця буде ' ціна ' долар Р
                    {print} 'Знайди своє харчування! Р
                    й й
            11:
                story_text: |
