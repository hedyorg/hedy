    repeat_command:
        description: '{repeat} команда'
        levels:
            8:
                story_text: |
                    Рівень 7 додає команду `{repeat}`. `{repeat}` можна використовувати для виконання одного рядка коду кілька разів. як це:

                    ### Вправи
                    Пограйте з командою `{repeat}`. Чи можете ви створити пісню з днем народження лише в 3 рядках коду замість 4 зараз?
                example_code: "й й\n{repeat} 3 {times} {print} 'Hedy весело! Р\nй й\n"
            10:
                story_text: |
                    Чудова робота! Ви вийшли на новий рівень! На попередньому рівні ви навчилися використовувати кілька рядків коду в команді `{if}` або `{repeat}`.
                    Але ви ще не можете поєднати два...

                    Хороші новини! На цьому рівні вам буде дозволено розміщувати `{if}` всередині `{if}`, `{repeat}` всередині команди `{repeat}` і один в одному. 
                    Спробуйте!
                example_code: |
                    й й
                    {repeat} 3 {times}
                    замовлення = {ask} 'Що б ви хотіли замовити? Р
                    {if} замовлення {is} піца
                    {print} "Yammie Р
                    {else}
                    {print} 'pizza краще! Р
                    й й
            9:
                example_code: "й й\n{repeat} 5 {times}\n{print} 'Привіт всім Р\n{print} 'Це все повторено 5 раз Р\nй й\n"
                story_text: "На цьому рівні ви можете повторювати кілька рядків коду за допомогою лише 1 `{repeat}` команд. \nВи робите це, створюючи блок ліній, які ви хочете повторити. \nДля рядків цього блоку знадобиться **відступ**. \nЦе означає розміщення чотирьох пробілів на початку кожного рядка. Вам також доведеться зробити відступ, якщо ви просто хочете створити блок з одного рядка.\n"
        name: '{repeat}'
        default_save_name: repeat command
    repeat_command_2:
        description: '{repeat} команда 2'
        levels:
            8:
                story_text_2: |
                    Інша цікава річ, яку ви можете зробити за допомогою команди `{repeat}`, це використання змінних для встановлення кількості разів, які потрібно повторити. У прикладі коду ви бачите, що ми спочатку запитуємо людину, скільки їй років. 
                    Потім, у рядку 3, питання повторюється «вік» разів. Тому ми використали змінну 'age' з командою `{repeat}`.
                example_code_2: "й й\n{print} 'Яй! Це ваш день народження! Р\nВік = {ask} 'Як старі ви зараз? Р\n{repeat} вік {times} {print} 'Hip Hip Hurray! Р\nй й\n"
                story_text: "## Повторіть з іншими командами та змінними \nЗараз ви практикували команду `{repeat}` у поєднанні з командою `{print}`, але чи знаєте ви, що можете також використовувати інші команди з `{repeat}`? \nУ цьому прикладі коду ви бачите, що `{repeat}` також можна використовувати з командою `{ask}`, `{if}` або `{else}`.\n"
                example_code: "й й\n{repeat} 2 {times} відповідь = {ask} 'Ви знаєте, що ви можете запитати питання кілька разів? Р\n{if} відповідь {is} так {repeat} 2 {times} {print} 'Ви знали, що вже! Р\n{else} {repeat} 3 {times} {print} - Ви навчились щось нове! Р\nй й\n"
            9:
                example_code: "й й\n_ {print} 'Ви знаєте чоловіка мафіна? Р\n{repeat} 2 {times}\n_ {print} \"Мафін людина\"\n_ {print} 'Ви знаєте чоловіка мафіна, який живе на Drury Lane? Р\nй й\n"
                story_text: "### У блоці чи ні? \nНа цьому рівні ви повинні ретельно продумати, які рядки коду повинні бути в блоці, а які ні. \nНаприклад: Якщо ви хочете заспівати пісню *the muffin man*. Вам потрібно лише, щоб репліка з «людиною-мафіном» повторювалася двічі. \nЦе означає, що останній рядок не повинен починатися з відступу, оскільки він не належить до блоку. \nЯкщо ви почнете останній рядок з відступу, пісня вийде неправильною. \n\n### Вправи\nКожен рядок у прикладі коду починається з пропуску. Видаліть пробіли та спробуйте з’ясувати, який рядок потребує відступу, а який ні, щоб пісенька булачка.\n"
        name: '{repeat} 2'
        default_save_name: javascript licenses api веб-сайт
    restaurant:
        levels:
            1:
                story_text_2: |
                    ### Вправи
                    Скопіюйте приклад коду на екран введення, натиснувши жовту кнопку.
                    По-перше, заповніть правильну команду в порожніх полях, щоб код працював належним чином.
                    Потім додайте ще принаймні 4 рядки коду до ресторанної програми.
                    Запитайте клієнта, що він хоче випити, і запитайте, чи хоче він заплатити готівкою чи карткою. 
                    Нарешті, подумайте, як приємно попрощатися зі своїм клієнтом.
                example_code_2: |
                    ```
                    {print} Welcome to Hedy's restaurant 🍟
                    _ What would you like to order?
