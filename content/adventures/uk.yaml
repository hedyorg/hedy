                    {sleep}
                    ```
                story_text_2: "Ця дитяча пісенька веде зворотний відлік від 5 маленьких мавпочок до 1 мавпочки.\nЯкщо ви скопіюєте рядок 2 - 7 і вставите його під код, ви зможете заспівати всю пісню!\n"
            8:
                story_text: |
                    Пісні часто містять багато повторів. Наприклад... Baby Shark! Якщо ви співаєте це, ви продовжуєте співати те саме:

                    Baby Shark tututudutudu<br>
                    Baby Shark tututudutudu<br>
                    Baby Shark tututudutudu<br>
                    Baby Shark

                    ### Вправи
                    Ви можете надрукувати пісню Baby Shark із `{repeat}`? Завершити код, замінивши пробіли?
                    **Додатково** Після Baby Shark ви, звичайно, також можете запрограмувати інші пісні. Є багато пісень з повторенням!
                    Чи можете ви придумати ще одну пісню і надрукувати її?
                example_code: |
                    ```
                    {repeat} _ _ {print} 'Baby Shark tututudutudu'
                    {print} "Дитя акули"
                    ```
            9:
                story_text: |
                    На попередньому рівні ви запрограмували пісню «Пляшки пива». Але без команди `{repeat}` вам довелося багато разів копіювати вірші.
                    На цьому рівні ви можете повторити пісню 99 разів, просто додавши одну просту лінію!

                    ### Вправи
                    Додайте правильну команду на пробіли та правильно вставте відступ у коді.
                example_code: |
                    й й
                    вірші = 99
                    _ 99 {times}
                    {print} вірші ' пляшки пива на стіні Р
                    {print} вірші ' пляшки пива Р
                    {print} 'Зробити один вниз, пропустити його навколо'
                    вірші = вірші - 1
                    {print} вірші ' пляшки пива на стіні Р
                    й й
            11:
                story_text: |
                    За допомогою `{for}` ви можете надрукувати всю пісню про дитинча акули (включаючи всіх інших акул у родині) лише у 6 рядках!

                    ### Вправа 1
                    Чи можете ви зробити код дитини акули ще коротшим за допомогою команди `{for}`? Завершіть приклад коду.
                example_code: |
                    ```
                    родина = дитина, мама, тато, бабуся, дідусь
                    _ _ _ _ 
                      {print} _
                    ```
                story_text_2: |
                    ### Вправа 2
                    Роздрукувати пісню П'ять маленьких мавпочок стрибають на ліжку. Перегляньте текст, якщо не пам’ятаєте. 

                    **Екстра** Надрукуйте пісню «У старого Макдональда була ферма» та переконайтеся, що всі тварини видають різні звуки, використовуючи `{if}`.
                example_code_2: "й й\nмавпи = 5, 4, 3, 2, 1\nй й\n"
            13:
                story_text: "На рівні 16 ми зробили пісні за допомогою списків. Ці програми, однак, більше не працюють належним чином на цьому рівні. Полонини від рівня 17 і кронштейни від рівня 18 все ще потрібно додавати.\n\n### Exercise 1\nП'яна вітрильник пісня надається як зразок коду, але ще не працює.\nЧи можна зробити все знову? Щоб допомогти вам, ми одягаємо _ в місцях _ some_ похибки.\n\n### Exercise 2\nТепер також подивіться свою пісню Old MacDonald від рівня 16, і виправте її.\n"
                example_code: "й й\nлінії = ['Чому ми робимо з п'ятим вітрильником', - поклавши його живіт з ірстим бритвом', - в'яжемо його в довге катері до сараю']]\n{for} лінії {in} _\n{for} i {in} {range} 1 {to} 1 час\n{print} _ лінія _\n{print} 'поранку'\n{for} i {in} {range} 1 {to} 3 хв\n{print} 'way hay і вгору вона піднімається Р\n{print} 'поранку'\nй й\n"
        description: Друк пісень
        name: Пісня!
        default_save_name: Пісня
    songs_2:
        levels:
            12:
                example_code: |
                    й й
                    {define} близнюки
                    {print} 'Твінкле Р
                    {print} _

                    {call} близнюки
                    {print} 'Зверху над світом так висока'
                    {print} 'Подивитися діамант в небі'
                    {call} _
                    й й
                story_text: "Пісні містять безліч повторень. Ми можемо захопити його функцією!\n### Exercise\nПодивіться на прикладний код з функцією. Наповнювати дві лінії, щоб надрукувати повну пісню.\n"
            11:
                example_code: "й й\nномер = ['one', 'два', 'трій', 'four', 'six', 'six', 'eight', 'nine', 'ten']\nоб'єкт = ['на його барабані', 'на його взутті', 'на його коліні', 'на його двері', 'на його хтиві', 'на його палиці', 'на небі', 'на його хвіртки', 'на його ване', 'на його знову']\n\nУ\n{print} 'Ця стара людина'\n{print} 'Віграти' _\n{print} 'Віграти knick-knack' _\n{print} 'З кнік-кнаком paddywhack Р\n{print} 'Див собаку кісточку'\n{print} 'Ця стара людина прийшла в рулон будинку Р\n{sleep} 8\n{clear}\nй й\n"
                example_code_2: "й й\nоб'єкт = ['wheels', 'doors', _]\nрух = [ 'круглий і круглий', 'відкритий і відключення', _]\nй й\n"
                story_text: "### Exercise\nОздоблення дитячої рифом!\n"
                story_text_2: "### Вправа 2\nТепер таким же чином створіть власний код для дитячого віршика «Колеса в автобусі»!\n"
        default_save_name: Пісня 2
        name: Пісня! 2
        description: Пісня 2
    turtle:
        levels:
            1:
                story_text: |
                    Ви також можете використовувати Hedy для малювання. Комбінуючи повороти і лінії, ви можете зробити квадрат або сходи!

                    Використовуючи `{forward}`, ви малюєте лінію вперед. Число за ним визначає, яку відстань пройде черепаха. `{turn} {right}` повертається на чверть оберту за годинниковою стрілкою, `{turn} {left}` повертається проти годинникової стрілки.

                    Якщо ви хочете повернутися назад, ви використовуєте команду `{forward}`, але з від’ємним числом. Так, наприклад, `{forward} -100`
                story_text_2: "### Exercise\nЦе початок маленької сходи. Чи можете ви зробити це 5 кроків?\n"
                example_code: "Й Й\n{forward} 100\n{turn} {left}\nЙ Й\n"
                example_code_2: "```\n{forward} 20\n{turn} {right}\n{forward} 20\n{turn} {left}\n{forward} 20\n```\n"
            3:
                story_text: |
                    На цьому рівні ви можете використовувати `{at} {random}` із малюнком черепахи. Випадковий вибір змушує черепаху щоразу йти іншим шляхом.
                    Використовуйте `{at} {random}`, щоб вибрати значення зі списку.
                    ### Вправи
                    Чи можете ви скопіювати та вставити рядки 2 і 3, щоб створити довший випадковий шлях?
                example_code: "й й\nкути {is} 10, 50, 90, 150, 250\n{turn} кути {at} {random}\n{forward} 25\nй й\n"
            4:
                example_code: |
                    й й
                    {print} _ Рисунок креслення _
                    кут {is} 90
                    {turn} кут
                    {forward} 25
                    {turn} кут
                    {forward} 25
                    й й
                story_text: "На рівні 4 ви повинні використовувати значення цитат з `{print}` і `{ask}`. Також при малюнку!\n"
                story_text_2: "Ви також можете змінити колір ліній за допомогою команди `{color}`. Переглянути приклад.\nВи також можете використовувати команду `{color} {white}`, щоб зробити «невидимі» лінії. Ви можете використовувати ці білі лінії для переміщення черепахи в будь-якому місці в екрані перед початком малювання.\n"
                example_code_2: "Й Й\n{color} {white}\n{forward} -80\n{color} {green}\n{forward} 50\n{color} {yellow}\n{forward} 50\n{color} {red}\n{forward} 50\nЙ Й\n"
            5:
                example_code_2: |
                    ```
                    direction {is} {ask} 'Ви хочете йти ліворуч, праворуч чи прямо?'
                    {if} напрямок {is} ліворуч {turn} _
                    {if} напрямок {is} праворуч {turn} _
                    {forward} 100
                    ```
                story_text: "На рівні 5 ви можете зробити вибір з `{if}`. Наприклад між різними видами фігур.\n"
                story_text_2: "### Exercise\nЗаповніть правильні номери в цьому коді, щоб отримати його на роботу.\nПісля того, як ви зробили, ви можете спробувати додати варіант назад.\n\n**Екстра*** Замість використання «лівого» і «право», що відреагують програму з Північним, східним, Південно-Західним.\nЦей спосіб ви можете додати ще більше напрямків, таких як Північно-східний та Південно-Західний тощо.\n"
                example_code: "й й\n{print} 'Вилучення фігур Р\n{is} {ask} - Ви хочете квадрат або трикутник? Р\n{if} цифра {is} трикутник кут {is} 120\n{else} кут {is} 90\n{turn} кут\n{forward} 25\n{turn} кут\n{forward} 25\n{turn} кут\n{forward} 25\n{turn} кут\n{forward} 25\nй й\n"
            9:
                story_text: |
                    Тепер, коли ми можемо повторити кілька рядків, ми можемо легше створювати фігури.
                    Нам потрібно встановити кут лише один раз, а потім використати цю змінну в `{repeat}`.

                    ### Вправа 1
                    Приклад коду створює квадрат. Змініть код так, щоб він створив іншу фігуру, наприклад трикутник або шестикутник. 
                    Для цього потрібно змінити два рядки коду.
                    Порада: все коло становить 360 градусів.

                    ### Вправа 2
                    Тепер створіть малюнок, що складається принаймні з двох багатокутників.
                example_code: |
                    й й
                    кут = 90
                    {repeat} 4 {times}
                    {turn} кут
                    {forward} 50
                    й й
                story_text_2: |
                    **Додатково** Тепер ми можемо покращити програму, яка малює різні фігури. Завершіть код, і ви зможете малювати будь-який багатокутник, який забажаєте!
                example_code_2: "й й\nцифра = {ask} \"Як багато кутів слід малювати? Р\nкут = 360 / фігура\n{repeat} цифра {times}\n{turn} _\n{forward} _\nй й\n"
            10:
                example_code: "Й Й\n{color} {black}\n{repeat} 3 {times}\n{repeat} 3 {times}\n{forward} 10\n{turn} 120\n{color} {white}\n{forward} 50\n{color} {black}\nЙ Й\n"
                story_text: "Тепер, коли ми можемо використовувати `{repeat}` всередині `{repeat}`, ми можемо створювати складніші фігури. \n\n### Вправа 1\nЦей код створює три чорні трикутники, змініть їх на п’ять рожевих квадратів. \n\n **Додатково** Створіть фігуру за власним вибором, що складається принаймні з двох різних типів форм.\n"
            11:
                example_code: "й й\n{turn} 90\nдистанції = 10, 20, 30, 40, 50, 60\nВідстань {for} {in}\n{forward} відстань\nй й\n"
                story_text: "На цьому рівні ви можете змусити черепаху намалювати фігуру. \nЧерепаха буде проходити відстані в списку одну за одною, роблячи все більші і більші кроки. \n### Вправа 1\nДодайте петлю поворот на 90 градусів, щоб вийшла спіраль. \nДодайте до списку не менше 5 чисел, щоб спіраль стала більшою. \n**(додатково)** чи можете ви змінити форму спіралі? Експериментуйте з числами для черги! \n### Вправа 2\nСпіраль витягнута назовні, змусити її зайти всередину?\n"
            2:
                story_text_2: "Ви можете використовувати змінні в черепахі `turn`.\n\n### Exercise\nЗміна коду, такого, що створює трикутник. Хін: Ви повинні змінити код в одному місці.\n"
                story_text: "На рівні 1 черепаха може тільки повернути ліворуч або праворуч. Це трохи нудний!\nНа рівні 2 він може вказувати ніс у всіх напрямках.\n\nВикористовуйте 90 градусів, щоб перетворити чверть, 180, щоб перевернути половину, і повне коло становить 360 градусів.\n\n### Exercise\nЦей код тепер створює лист Т. Чи можна змінити його, щоб зробити лист B?\n\n**Extra*** Змініть літеру в інший лист, як перше ім'я.\nВи також можете зробити кілька літер, встановивши колір до `{color}` `{white}` в між собою.\n"
                example_code: "```\n{forward} 80\n{turn} 90\n{forward} 50\n{turn} 180\n{forward} 100\n```\n"
                example_code_2: "й й\n{print} Малюнок\nкут {is} 90\n{turn} кут\n{forward} 25\n{turn} кут\n{forward} 25\n{turn} кут\n{forward} 25\nй й\n"
            7:
                story_text: "У цьому рівні можна використовувати розрахунки для малювання різних фігур.\nВи можете навчатися в школі, що перетворюючи повне коло 360 градусів. Якщо ви не знаєте!\nОсь чому ви також використовуєте 90 градусів для площі. 360 розділений на 4 - 90.\nМи можемо самі зателефонувати одержувачу і узгодити зручний час і місце вручення квітів.\n"
                example_code: "й й\nкути = {ask} 'Як багато кутів ви хочете? Р\nкут = 360 / кути\n{forward} 50\n{turn} кут\n{forward} 50\n{turn} кут\n{forward} 50\n{turn} кут\n{forward} 50\n{turn} кут\n{forward} 50\n{turn} кут\n{forward} 50\n{turn} кут\nй й\n"
            12:
                story_text: "Ми можемо використовувати функції, щоб зробити більш складні цифри з меншим кодом.\n### Exercise 1\nЗаповнити функцію так, щоб створюються три квадрати. Якщо ви хочете виглядати красиво, ви можете зробити лінії між квадратами білого кольору.\n\n### Exercise 2\nКод може бути виконаний навіть коротшим. Помістіть фінальні лінії в `{repeat}` так, що фігура залишається однаковою.\n\n### Exercise 3\nСтворіть власний малюнок з різними малюнками.\nЗміна кількості фігур `{repeat}` і форми фігур в `{define}`\n"
                example_code: "й й\n{define} квадрат\n{repeat} 4 {times}\n{turn} _\n{forward} _\n{call} квадрат\n{forward} 50\n{call} квадрат\n{forward} 50\n{call} квадрат\nй й\n"
        name: Кошик
        description: Зробіть свій власний малюнок
        default_save_name: Кошик
    turtle_draw_it:
        levels:
            10:
                example_code: |
                    Підказка для вкладених квадратів: 
                    ``` 
                    кольори = червоний, синій, оранжевий, жовтий, рожевий, фіолетовий, зелений, коричневий, чорний 
                    відстань = 120 
                    {repeat} 5 {times}
                    _
                    ``` 
                    Підказка для прапорів: 
                    ``` 
                    country = {ask} 'прапор якої країни ви б хотіли бачити?' 
                    {if} країна {is} 'Нідерланди' 
                        колір_1 = червоний 
                        колір_2 = білий 
                        колір_3 = синій 
                    ```
                story_text: "### Exercise\nВідтворити малюнки з черепахою!\n\n**Екстра** Кількість у дужках вказує на скільки рядків коду цей показник можна намальовувати. Чи можна це зробити в одній кількості рядків?\n\n**Extra** Подаруйте гравця вибір, яку країна хоче побачити прапор.\n\n<div class=\"w-full flex flex-row gap-2\">\nCross (7) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/76e42c76-aa3f-4863-8eee-ead73c09a186\" width=\"150\">\nВипадкові кольорові підвісні квадрати (8) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/17f878cc-e893-4c10-b32e-a09a50bf08de\" width=\"200\">\nПрапори <img src=\"https://github.com/hedyorg/hedy/assets/80678586/877fc337-df80-4185-8005-a6c28904f66e\" width=\"300\">\n</div>\n"
            11:
                example_code: |
                    Вкладений шестикутник підказки: 
                    ``` 
                    відстані = 100, 80, 60, 40, 20 
                    {for} distance {in} відстані 
                    _
                    ``` 

                    Підказка Світлофор: 
                    ``` 
                    кольори = червоний, жовтий, зелений 
                    {for} selected_color {in} кольори 
                        {color} _ 
                        {repeat} _ 
                    ```
                story_text_2: "Різдвяні вогні <img src=\"https://github.com/hedyorg/hedy/assets/80678586/9637ea6d-6edc-4d88-a6f7-10271bfc5371\" width=\"500\">\n"
                story_text: "### Вправа\nВідтворіть малюнки разом з черепахою!\n\n<div class=\"w-full flex flex-row gap-2\">\nВкладений шестикутник <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3629e908-3cd5-44ac-bbcd-1f1cceb15654\" width=\"150\">\nСвітлофори <img src=\"https://github.com/hedyorg/hedy/assets/80678586/edbbb608-5ff8-4349-85a6-e47809adde43\" width=\"100\">\n</div>\n"
                example_code_2: "Різдвяні вогні:\n\nПочати переїзд на ліву сторону екрана з невидимою білою лінією. Потім повісьте різдвяні вогні!\nй й\n{color} білий\n{turn} -90\n{forward} 300\n{turn} 90\n\nколір = червоний, синій, жовтий, фіолетовий, зелений, помаранчевий, рожевий\n{for} select_color {in} кольори\nУ\nй й\n"
            12:
                story_text: |
                    ### Вправи
                    Відтворіть малюнки разом з черепахою!

                    По-перше, визначте функцію **для кожної форми**, яку ви хочете використовувати на браслеті. Потім додайте фігури до браслета так:

                    Програму для конструювання браслетів <img src="https://github.com/hedyorg/hedy/assets/80678586/549d7f3a-c492-4b4a-b173-746eb3400951" width="500">
                example_code: |
                    Програма для проектування браслетів Hint
                    ``` 
                    {define} draw_a_quarte
                    _

                    {color} білий
                    {turn} -90
                    {forward} 300
                    {turn} 180

                    {repeat} 5 {times}
                        {color} сірий
                        {forward} 100
                        shape = {ask} 'Яку форму браслета ви хотіли б мати наступного разу?'
                        selected_color = {ask} 'Якого кольору?'
                        {color} вибраний_колір
                        {if} shape = 'квадрат'
                            {call} draw_a_quarte
                    ```
            16:
                example_code: "Спіраль\nй й\nвідстань = 5\n{while} відстань < 200\nвідстань = відстань + 5\nУ\nй й\n"
                story_text_3: "Зірка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/17564e0a-63e1-4794-8d41-15ac8c1a5a93\" width=\"150\">\n"
                example_code_3: "Зірки\nЗірка зазвичай тягнеться за допомогою 144-дегре-повернення. Якщо ви зміните цей трохи до 143 градусів, наприклад і повторіть візерунок кілька разів за допомогою петлі {while} ви можете зробити цей малюнок.\n"
                example_code_2: "Вентилятор\nй й\n{define} Draw_a_square {with} сторона\nУ\n\nдо 100\n{while} i > 1 час\n{with} i\nУ\nI = I - 3\nй й\n"
                story_text: "### Exercise\nВідтворити малюнки з черепахою!\n\nSpiral <img src=\"https://github.com/hedyorg/hedy/assets/80678586/6943223c-018b-435b-a391-23723cc7a6ad\" width=\"150\">\n"
                story_text_2: "Вентилятор <img src=\"https://github.com/hedyorg/hedy/assets/80678586/cb671065-b47b-49f0-b298-dcbcd2a5e28f\" width=\"150\">\n"
            1:
                story_text: "### Вправи\nВідтворіть малюнки разом з черепахою!\n\n<div class=\"w-full flex flex-row gap-2\">\n    Прямокутник <img src=\"https://github.com/hedyorg/hedy/assets/80678586/77aa99d5-cd8f-4969-b49d-e8fed34ac550\" width=\"100\">\n    Квадрат <img src=\"https://github.com/hedyorg/hedy/assets/80678586/03b96c2c-7b94-4032-9f9f-3f3b13573623\" width=\"200\">\n    Сходи <img src=\"https://github.com/hedyorg/hedy/assets/80678586/d4301e62-ec66-4031-827c-7d21f73ba106\" width=\"200\">\n</div>\n"
            2:
                story_text: "### Exercise\nВідтворити малюнки з черепахою!\n\n<div class=\"w-full flex flex-row gap-2\">\nТрикутник <img src=\"https://github.com/hedyorg/hedy/assets/80678586/e974b62c-f0cf-445a-8bd4-5ad9f1f71204\" width=\"100\">\nСтрілка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/803d8f42-9708-448c-82ea-d035697f08c9\" width=\"150\">\nЧовен <img src=\"https://github.com/hedyorg/hedy/assets/80678586/94ef7189-442a-4c8f-827d-12a69203c2e9\" width=\"150\">\n</div>\n"
            3:
                story_text: "### Exercise\nВідтворити малюнки з черепахою!\n\n<div class=\"w-full flex flex-row gap-2\">\nТрикутник <img src=\"https://github.com/hedyorg/hedy/assets/80678586/71e04d98-9545-4614-9caf-a5f179b756a1\" width=\"150\">\nЗірка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/421c4d28-cb99-424b-be26-dcae30d65c80\" width=\"150\">\nСтрілка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3cbebcae-5258-47c5-a6ac-e7ee36c1d1ce\" width=\"200\">\n</div>\n"
            4:
                story_text: "### Exercise\nВідтворити малюнки з черепахою!\n\n<div class=\"w-full flex flex-row gap-2\">\nКольорова зірка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/dbe39006-c050-4833-b5c4-f9d1fb1c0781\" width=\"150\">\nВеселка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/2728b10f-9f7f-45ea-964e-5b284033e4f0\" width=\"500\">\nNested квадрати <img src=\"https://github.com/hedyorg/hedy/assets/80678586/f013f9fa-bc68-4c60-b778-2c457799d6f7\" width=\"200\">\n</div>\n"
                example_code: "**Екстра** Включити реальний виклик? Переконайтеся, що кольори цих фігур вибирають випадково, щоб кожен раз ви запустили свої програми, вони будуть виглядати по-різному!\n\n```\nкольори {is} червоний, помаранчевий, жовтий, зелений, синій, фіолетовий, рожевий, коричневий, сірий, чорний\nКолір _\n```\n"
            7:
                story_text: "### Exercise\nВідтворити малюнки з черепахою!\n\n**Екстра** Вирішить, що колір квадрата повинен бути.\n\n***Extra*** Чи можете ви зробити лист свого імені та прапора своєї країни занадто?\n\n<div class=\"w-full flex flex-row gap-2\">\nКвадрат <img src=\"https://github.com/hedyorg/hedy/assets/80678586/03b96c2c-7b94-4032-9f9f-3f3b13573623\" width=\"150\">\nЛисти <img src=\"https://github.com/hedyorg/hedy/assets/80678586/e75f4fa5-f1f5-4b48-806c-916c28e4e8ad\" width=\"100\">\nПрапор <img src=\"https://github.com/hedyorg/hedy/assets/80678586/877fc337-df80-4185-8005-a6c28904f66e\" width=\"300\">\n</div>\n"
                example_code: "Hint for the square:\n```\nchosen_color = {ask}_\n```\n"
            9:
                story_text: "### Exercise\nВідтворити малюнки з черепахою!\n\n**Екстра** Кількість у дужках вказує на скільки рядків коду цей показник можна намальовувати. Чи можна це зробити в одній кількості рядків?\n\n<div class=\"w-full flex flex-row gap-2\">\nSquare (3) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/03b96c2c-7b94-4032-9f9f-3f3b13573623\" width=\"200\">\nВипадково кольорова зірка (5) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/dbe39006-c050-4833-b5c4-f9d1fb1c0781\" width=\"150\">\nВипадкові кольорові спіральні (7) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/9bcdb3f1-367d-4ae0-878f-d09005424a35\" width=\"150\">\n</div>\n"
            15:
                story_text: "### Exercise\nСтворіть програму, яка просить гравця, скільки кутів їх фігури повинен мати, а потім створює цей малюнок.\nНа малюнку у зображенні є вихід, коли гравець заповнює 10.\n\n<div class=\"w-full flex flex-row gap-2\">\n<img src=\"https://github.com/hedyorg/hedy/assets/80678586/ee32f40e-dea1-4e7c-a813-3ef63671254b\" width=\"300\">\n<img src=\"https://github.com/hedyorg/hedy/assets/80678586/3621bf77-527d-41e8-a44f-c5a21bb4ffd2\" width=\"200\">\n</div>\n"
            5:
                story_text: "### Exercise\nВідтворити малюнки з черепахою!\n\n**Екстра*** Зробіть лише один код, який дозволяє гравця прийняти рішення, який лист, яким подобається бачити! І можна додати ще більше листів?\n\n<div class=\"w-full flex flex-row gap-2\">\nF <img src=\"https://github.com/hedyorg/hedy/assets/80678586/8a021b76-c24b-4e7c-b960-48d57f3bcb20\" width=\"100\">\nE <img src=\"https://github.com/hedyorg/hedy/assets/80678586/12821803-6422-416a-8e36-9902d14e57a4\" width=\"100\">\nL <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3af6f919-7b67-4ee7-b923-11e56f2b6b24\" width=\"100\">\n</div>\n"
                example_code: "Хін:\nй й\nselect_letter {is} {ask} 'Числовий лист вам сподобається бачити? Ф, Е або Л? Р\n{if} _\nй й\n"
            8:
                story_text: "### Exercise\nВідтворити малюнки з черепахою!\n\n<div class=\"w-full flex flex-row gap-2\">\nХексагон <img src=\"https://github.com/hedyorg/hedy/assets/80678586/92e492e1-1593-489b-aaf0-51d2a29755f4\" width=\"200\">\nТрикутник <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3629a5e6-1f02-4851-aab9-c5430ba4a1f1\" width=\"200\">\nВентилятор <img src=\"https://github.com/hedyorg/hedy/assets/80678586/1ba2ff71-1230-4fe3-8255-b2c504cf1b4e\" width=\"200\">\n</div>\n"
        name: Написати нам!
        default_save_name: Написати його
        description: Намалюйте цю картину з черепицею
    while_command:
        description: '{while}'
        levels:
            16:
                example_code: "```\nвідповідь = 0\n{while} відповідь != 25\n    answer = {ask} 'Скільки буде 5 помножити на 5?'\n{print} \"Дано правильну відповідь\"\n```\n"
                story_text: "Збираємося дізнатися нову петлю, петлі `{while}`! Продовжуємо петлю до тих пір, поки заява неправда.\nТак не забудьте змінити значення в петлі.\n\nУ прикладному коді ми продовжуємо до дати коректної відповіді.\nЯкщо вірна відповідь ніколи не дається, петля ніколи не закінчується!"
        default_save_name: while_command
        name: '{while}'
    years:
        name: Новий рік
        default_save_name: Новорічний відлік
        description: Зворотний відлік до Нового року!
    calculator_2:
        name: Калькулятор 2
        default_save_name: Калькулятор 2
        description: Калькулятор 2
        levels:
            15:
                story_text: "### Вправа 2\n**Це друга частина цієї пригоди.** Пригода починається в попередній пригоді. \nЗвичайно, ви не завжди хочете обчислювати середнє значення 4 тестів. Ви можете обчислити середнє значення 10 тестів або лише 2...\nМи можемо вирішити цю проблему, додавши аргумент і змінну 'amount_of_tests'.\n* Почніть новий рядок у рядку 3. Встановіть аргумент сума_тестів, запитавши студента, скільки тестів він зробив.\n* Змініть 4 у рядку 4 на новий аргумент сума_тестів.\n* Нарешті, змініть 4 у рядку 6 на суму_тестів\n\nСпробуйте свою нову програму. це працює?\n\n### Вправа 3\nВи хотіли зробити свою програму ще кращою? Чудово! У попередній програмі ви могли обчислити середню оцінку лише з 1 предмету, але було б краще, якби ви могли обчислити середню оцінку з усіх предметів, які вам потрібні!\nМи не розповідатимемо вам, як це зробити, але дамо вам одну пораду: починайте свій код у першому рядку з: {define} calculate_mean_grade {with} subject.\n"
                example_code: "```\n# Використовуйте власний код із попередньої пригоди.\n```\n"
    guess_my_number:
        name: Вгадай мій номер
        default_save_name: вгадай мій номер
        description: вгадай мій номер
    quotation_marks:
        levels:
            4:
                example_code: "```\n{print} 'You need to use quotation marks from now on!'\nanswer {is} {ask} 'What do we need to use from now on?'\n{print} 'We need to use ' answer\n```\n"
                story_text_2: "## Скорочення \nважливо! Майте на увазі, що тепер, коли ми використовуємо лапки, Хеді заплутається, коли ви використовуєте апостроф для скорочень, як-от I'm або What's. \nОбов’язково використовуйте подвійні лапки, коли використовуєте апостроф у своєму рядку! \nПерегляньте приклад коду, щоб побачити неправильний спосіб використання апострофів.\n"
                story_text: "## \"Лапки\" \nНа рівні 4 `{ask}` і `{print}` змінилися. \nТекст, який потрібно надрукувати, потрібно взяти в лапки. \nЦе корисно, тому що тепер ви можете друкувати всі слова, які хочете. Також слова, які ви використовували для зберігання чогось із `{is}`. \nБільшість мов програмування також використовують лапки під час друку, тож ми також стаємо на крок ближче до справжнього програмування!\n"
                example_code_2: "``` \n_ Це неправильний спосіб використання апострофів _ \n{print} «Я доглядаю за дітьми своєї сестри» \n{print} \"Що веселіше, ніж це?\" \n_ Ось як ви це вирішуєте _ \n{print} \"Я доглядаю за дітьми своєї сестри\" \n{print} \"Що ще веселіше?\" \n```\n"
        description: Вступні лапки
        name: "'quotation marks'"
        default_save_name: quotation_marks
    quizmaster:
        description: Зробіть власну вікторину!
        default_save_name: Вікторина
        name: Вікторина
    hotel:
        levels:
            15:
                example_code: "```\n{define} welcome_message {with} title, last_name, country, room_number\n    {print} 'Welcome to Hotel Hedy, ' title ' ' last_name\n    nice_trip {is} {ask} 'Did you have a nice trip from, ' country '?'\n    {if} nice_trip {is} 'yes'\n        {print} 'Lovely!'\n    {else}\n        {print} 'Sorry to hear that.'\n        {print} 'Hopefully you can take a nice rest in you room.'\n    {print} 'Your room number is ' room_number\n\n{print} 'Hello. Please fill in your information to check in.'\ntitle = {ask} 'What is your title (mr, mrs, ms, dr, etc.)?'\nname = {ask} 'What is you last name?'\nhomecountry = {ask} 'What country do you come from?'\n\n{call} welcome_message {with} title, name, homecountry, 105\n```\n\ntitle = {ask} 'What is your title (mr, mrs, ms, dr, etc.)?'\nname = {ask} 'What is you last name?'\nhomecountry = {ask} 'What country do you come from?'\n\n{call} welcome_message {with} title, name, homecountry, 105\n"
                story_text: "У попередній пригоді ви навчилися використовувати аргумент у функції та навчилися поєднувати його з {ask}. \nМожливо, ви задавалися питанням, навіщо вам використовувати функції, оскільки функції в прикладі являли собою лише один рядок коду. \nЗараз ми покажемо вам, як виглядає більша функція, а також використаємо декілька аргументів. Ви побачите, наскільки краще використовувати функцію, коли функція стане більшою. \nОсь приклад функції з аргументами в поєднанні з командами `{ask}`.\n"
        name: готель
        description: готель
        default_save_name: готель
    harry_potter:
        default_save_name: Гаррі Поттер
        description: Пригоди Гаррі Поттера
        levels:
            11:
                story_text: "### Вправи\nМи також можемо зробити ворожку на тему Гаррі Поттера. Заповніть пропуски так, щоб вийшло 9 рядків. \n**Додатково** Змініть тему ворожки на щось інше, наприклад на свою улюблену книгу, фільм або телешоу.\n"
                example_code: "``` \nбудинки = Ґрифіндор, Слизерин, Хаффлпафф, Рейвенкло \nпредмети = зілля, захист від темних мистецтв, чари, трансфігурація \nстрахи = Волдеморт, павуки, провал тесту OWL \nімена = Гаррі, Рон, Герміона \n_\n_ {print} ім'я ' розміщено в ' будинках {at} {random} \n_ {print} ім'я 'знайомиться з' предметами {at} {random} \n_ {print} ім'я найбільший страх ' страхи {at} {random} \n```\n"
        name: Гаррі Поттер
    and_or_command:
        name: '{and} & {or}'
        default_save_name: and_or_command
        levels:
            10:
                story_text: |-
                    Тепер ми вивчемо `{and}` та `{or}`! Якщо ти хочеш перевірити два оператори, ти не маєш використовувати 2 `{if}` оператори, а натомість можеш використовувати `{and}` або `{or}`.
                    Якщо ти використовуєш `{and}`, потім обидва оператори, все що зліва і зправа від `{and}` має бути правдивим. Ми також можемо використовувати `{or}`. Тоді тільки один оператор має бути правильним.
