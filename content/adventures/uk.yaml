                    Тепер ви можете використовувати змінні, і Хеді зможе запам’ятати як їжу, так і начинку!
                example_code: |
                    ```
                    {print} Ласкаво просимо до ресторану Hedy's!
                    {print} Сьогодні подаємо піцу або лазанью.
                    food {is} {ask} Що б ви хотіли з'їсти?
                    {print} Чудовий вибір! Їжа моя улюблена!
                    topping {is} {ask} Хочете м’яса чи овочів?
                    {print} їжа з начинкою вже в дорозі!
                    ```
                story_text_2: |
                    ### Вправи
                    Скопіюйте власний код ресторану з попереднього рівня на екран введення нижче.
                    Виправте код, замінивши команди `{ask}` і `{echo}` і використовуючи змінні, як ви навчилися на цьому рівні.

                    Тепер, коли ваш код знову працює, настав час додати ще щось.
                    Подивіться на останній рядок прикладу коду: `{print} їжа з начинкою вже в дорозі!`
                    У цьому одному рядку 2 змінні були використані для створення підсумку замовлення.
                    Тепер додайте власний короткий опис їжі та напоїв, замовлених клієнтом.

                    **Додатково** Тепер, коли ви навчилися використовувати змінні, ви можете використовувати скільки завгодно змінних в одному рядку. Чи можете ви додати більше змінних до свого коду, як-от їжа в місці або на винос, готівка чи картка, із соломинкою чи без тощо?
            3:
                example_code: |
                    ```
                    dishes {is} spaghetti, brussels sprouts, hamburgers
                    {print} You will have dishes {at} {random} tonight!
