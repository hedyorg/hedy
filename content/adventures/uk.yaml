                    ```
                    name = 'Hedy'
                    {print}('My name is ', name)
                    ```
                story_text: "Ми отримали справжній код Python! Це означає, що відтепер нам потрібно використовувати круглі дужки з `{print}` і `{range}`. \nЦе також означає, що ви можете використовувати код Hedy з цього рівня в будь-якому середовищі Python, якщо ви використовуєте англійські команди. Якщо ви цього не зробили досі, ви можете перемкнути перемикач у меню команд, щоб зробити це."
                story_text_2: Якщо ви хочете надрукувати більше одного елемента, потрібно розділити їх комами.
                example_code: "```\n{print}('Привіт!')\n{for} i {in} {range}(1, 10):\n    {print}('Це лінія ', i)\n```\n"
            1:
                example_code_2: "```\n_ Привіт!\n```\n"
                story_text_2: "### Вправи\nУ Hedy ви знайдете вправи в кожній пригоді. Вправа дозволяє відпрацьовувати нові команди та поняття, а також дає змогу надати власний вид прикладам кодів. \nУ цій вправі ви побачите рожеве порожнє місце. Вам потрібно щось заповнити на місці порожнього простору, перш ніж можна буде запустити код. \n\nЗаповніть команду `{print}` у порожньому місці, а потім додайте ще п’ять рядків коду. Кожен рядок має починатися з команди `{print}`. \nвесело провести час!\n"
                story_text: "## Команда {print}\nВи можете вивести текст на екран за допомогою команди `{print}`.\n"
                example_code: "```\n{print} Привіт, програмісте!\n{print} Ласкаво просимо до Hedy!\n```\n"
        description: Вступна команда друку
