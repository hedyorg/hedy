    debugging:
        levels:
            1:
                story_text: "Ласкаво просимо до пригоди налагодження. Налагодження коду означає позбавлення від помилок у коді.\nЦе означає, що в цих пригодах з налагодження ми покажемо вам код, який ще не працює.\nВам доведеться з'ясувати, що не так, і виправити помилки.\n\n### Вправи\nНалагодити цей код. удачі!"
                example_code: "**УВАГА! Цей код потрібно налагодити!**\n```\n{print} Я люблю програмувати\nВи теж любите програмувати?\n{echo}\n{print} Які у вас захоплення?\n{echo} Ваші хобі\n```\n"
            2:
                story_text: "Ласкаво просимо до пригоди налагодження. Налагодження коду означає позбавлення від помилок у коді.\nЦе означає, що в цих пригодах з налагодження ми дамо вам код, який ще не працює.\nВам доведеться з'ясувати, що не так, і виправити помилки.\n\n### Вправи\nНалагодити цей код. удачі!"
                example_code: "**УВАГА! Цей код потрібно налагодити!**\n```\nпризначення {ask} Куди ти збираєшся у відпустку?\n{print} Рейс до пункту призначення відправляється о 15:00.\n{ask} Ви вже зареєстрували свій багаж?\n{echo}\n{print} Дозвольте мені роздрукувати ваш посадковий талон.\n{sleep}\nОсь вам! Приємної подорожі!\n```\n"
            3:
                example_code: |
                    **УВАГА! Цей код потрібно налагодити!**
                    ```
                    movie_choices {is} dracula, fast and furious, one home, barbie
                    selected_movie {is} фільми {at} {random}
                    {print} Сьогодні ввечері ми дивимось вибрані _фільми
                    like {ask} Тобі подобається цей фільм?
                    {print} Завтра будемо дивитися щось інше.
                    {add} selected_movie {to_list} movie_choices
                    {print} Завтра будемо дивитися tomorrows_movie
                    tomorrows_movie {is} movie_choices {at} {random}
                    Я піду за попкорном! {print}
                    ```
                story_text: "Ласкаво просимо до пригоди налагодження. Налагодження коду означає позбавлення від помилок у коді.\nЦе означає, що в цих пригодах з налагодження ми дамо вам код, який ще не працює.\nВам доведеться з'ясувати, що не так, і виправити помилки.\n\n### Вправи\nНалагодити цей код. удачі!"
            4:
                story_text: "### Вправи\nНалагодити цей код. удачі!"
                example_code: "**УВАГА! Цей код потрібно налагодити!**\n```\n{print} 'Ласкаво просимо до онлайн-бібліотеки!\n{ask} Який жанр книг тобі подобається?\n{print} Вам подобається жанр\nавтор {is} {ask} 'Хто твій улюблений автор?'\n{print} 'автор — ваш улюблений автор'\n{print} Хмм... я думаю, тобі варто спробувати... книги {at} {random}\n```\n"
        name: налагодження
