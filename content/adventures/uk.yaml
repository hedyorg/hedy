                    Потім скористайтеся командами `{print}` і `{at} {random}`, щоб повідомити клієнту, що буде в його меню сьогодні ввечері.
                example_code_2: |
                    ```
                    {print} Ласкаво просимо у ваш власний випадковий ресторан!
                    початківці {is} _
                    мережа {is} _
                    десерти {is} _
                    напої {is} _
                    ціни {is} _
                    _
                    ```
                story_text: "Вирішивши, що у вас є вечеря? Ви можете вибрати для Вас!\nПросто додайте список улюблених страв (або принаймні улюблених) і Hedy можна випадково вибрати вечерю.\nВи також можете трохи весело провести час, дозволяючи йому вибрати ціну на вечерю, а також! Що ви отримаєте?\n"
            4:
                story_text: |
                    У ресторані ви також повинні використовувати лапки під час використання команди `{print}` або `{ask}`.

                    ### Вправи
                    Додайте лапки до цього коду, щоб він працював! Будьте уважні: змінні не повинні бути взяті в лапки.
                    Потім скористайтеся командою `{clear}`, щоб відображати лише один рядок на екрані виводу.

                    ### Вправа 2
                    Поверніться на попередній рівень і скопіюйте код свого ресторану. Змусьте код працювати на цьому рівні, додавши лапки в потрібні місця та додавши кілька команд `{clear}`.
                example_code: "й й\nУ Додайте позначки квоти до цього коду _\n{print} Ласкаво просимо до ресторану Chez Hedy!\n{print} Сьогодні ми обслуговуємо піцу або lasagna.\n{is} {ask} Що б ви хотіли їсти?\n{print} Великий вибір! Їжа моя улюблена!\n{is} {ask} Вам сподобається м'ясо або овочі на цьому?\n{print} їжа з верхівкою на своєму шляху!\nнапої {is} {ask} Що б ви хочете пити з цим?\n{print} Дякуємо за Ваше замовлення.\n{print} Ваше харчування і напої будуть прямо там!\nй й\n"
            6:
                story_text: |
                    ### Вправи
                    Приклад коду показує, як можна запрограмувати, щоб у вашому ресторані закінчився пункт меню.
                    Скопіюйте власний код ресторану з попередніх рівнів. Створіть проблему у своєму ресторані та закодуйте її, як у прикладі коду.
                    Наприклад, у вас також може закінчитися пункт меню, або ви не приймаєте кредитні картки, або машина для морозива зламалася.

                    **Додатково** Чи запрограмували ви проблему та відповідні відповіді? Потім спробуйте додати більше команд `{if}` і `{else}` у свій код.
                    Спробуйте додати `{if}` після кожної команди `{ask}` у вашому коді, щоб зробити код максимально інтерактивним!
                example_code: |
                    ```
                    drinks_in_stock {is} water, lemonade, cola, orange juice
                    drink {is} {ask} 'What would you like to drink?'
                    {if} drink {in} drinks_in_stock {print} 'One ' drink 'coming up!'
                    {else} {print} 'Sorry, we do not sell that'
                    ```
            7:
                story_text: |
                    На цьому рівні ви можете використовувати математику, щоб обчислити загальну вартість замовлення вашого клієнта, що може зробити ваш віртуальний ресторан більш реалістичним.
                    Але ви також можете додати багато іншого до свого віртуального ресторану, наприклад, більше страв.

                    ### Вправи
                    Ви можете додати багато іншого до свого віртуального ресторану. Наприклад, чи можете ви...
                    - запитайте, скільки людей прийде і помножте ціну на цю суму?
                    - додати інший курс?
                    - надавати людям знижку, коли вони вводять (секретний) код купона? 
                    - додати дитяче меню?
                    - подумайте про інші цікаві речі, які можна додати?
                example_code: "Ми можемо самі зателефонувати одержувачу:\nй й\n{print} 'Велком до ресторану Chez Hedy Р\n{print} 'Хай наше меню: Р\n{print} 'Наші основні курси піци, lasagne або спагетті Р\nГоловна = {ask} 'Чизький основний курс вам сподобається? Р\nціна = 0\n{if} головна {is} ціна піци = 10\n{if} головна {is} ціна lasagne = 12\n{if} головна {is} спагетті ціна = 8\n{print} 'Ви замовляєте ' головна\n{print} 'Чому буде ' ціна ' доларів, будь ласка, Р\n{print} 'Подаруйте вам, насолоджуйтеся смачними стравами! Р\nй й\n"
            8:
                story_text: |
                    На цьому рівні ви навчилися використовувати команду `{repeat}`, щоб повторити рядок коду певну кількість разів.
                    Ви можете використовувати це у своєму ресторані, щоб `{ask}` кількох людей, що вони хочуть їсти.

                    ### Вправи
                    Чи можете ви завершити код? Хеді потрібно повторити це запитання стільки разів, скільки буде людей. Отже, якщо є 5 осіб, питання потрібно поставити 5 разів.
                    **Екстра** Розширте свій код додатковими запитаннями, наприклад про напої чи соус.
