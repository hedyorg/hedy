                example_code: "```\nanimals {is} dogs, cats, kangaroos\n{print} animals {at} {random}\n```\n"
                example_code_2: "```\nfood {is} sandwich, slice of pizza, salad, burrito\n{print} I am going to have a food {at} {random} for lunch.\n```\n"
                story_text_3: "### Вправи\nСпробуйте команду `{at} {random}`, створивши власне ігрове шоу (як ті, що на телебаченні), де ви обираєте двері чи валізу, і в них міститься великий приз! \nти можеш це зробити Ми вже помістили перші рядки в приклад коду.\n"
                story_text_2: "Ви також можете використовувати команду `{at} {random}` у реченні.\n"
                example_code_3: "```\n{print} Велике ігрове шоу!\n{print} Перед вами 3 валізи...\nобрано {is} {ask} Яку валізу ви обираєте?\nпризи {is} _\n_\n``\n"
