adventures:
    story:
        name: історія
        default_save_name: Історія
        description: Складіть коротке оповідання
        levels:
            1:
                story_text: |
                    На першому рівні ви можете створити історію з іншим головним героєм, якого ви вводите самостійно.

                    У першому рядку використовуйте `{ask}` і запитайте, хто буде головним героєм історії.

                    Після першого рядка почніть з `{print}`, якщо речення потрібно вивести на екран.
                    Використовуйте `{echo}`, якщо ви хочете, щоб ваш головний герой знаходився в кінці речення.
                example_code: |
                    ```
                    {ask} Головний герой цієї історії
                    {print} Головний герой зараз збирається прогулятися лісом
                    {echo} Він трохи наляканий,
                    {print} Він чує дивні звуки звідусіль
                    {print} Він боїться, що це ліс з привидами
                    ```
                story_text_2: |
                    ### Вправа
                    Тепер створіть власну історію з щонайменше 6 рядків коду.
                    Ця історія не може збігатися з прикладом коду.
                    Використовуйте принаймні одну команду `{ask}` і одну команду `{echo}`.
                    Ви можете написати історію на будь-яку тему, яка вам подобається.
                    Якщо ви не можете придумати тему, скористайтеся одним з наших варіантів: похід у кіно, спортивний матч або день у зоопарку.
            2:
                story_text: |
                    У 2 рівні ви можете зробити свою історію ще веселішою. Ім'я вашого головного героя тепер може бути в будь-якому місці речення.

                    Для цього вам доведеться запрограмувати трохи більше. Тепер ви повинні спочатку назвати свого головного героя.

                    Потім ви можете вставити це ім'я в будь-яке місце в реченні.
                example_code: |-
                    й й
                    {is} {ask} Що таке ім'я основного персонажа?
                    {print} назва тепер збирається запустити в лісах
                    {print} назва трохи рубається
                    {print} Suddenly вона чує божевільний...
                    {sleep}
                    {print} назва боїться це лісовий ліс
                    й й
                story_text_2: |
                    ### Вправа
                    Тепер настав час додати змінні до вашої власної історії, яку ви створили на попередньому рівні.
                    Перейдіть до "Моїх програм", знайдіть свою пригоду з першого рівня і скопіюйте код. Вставте код у вікно введення в цьому рівні.

                    Цей код не працюватиме у цьому рівні, оскільки ви ще не використовували змінні.
                    Змініть команди `{ask}` та `{echo}` у вашому коді на правильну форму, яку ви вивчили у цьому рівні.

                    **Додатково** Додайте до коду команду `{sleep}`, щоб створити напругу у вашій історії.
            3:
                story_text: |
                    На третьому рівні ви можете зробити свою історію веселішою. Ви можете використовувати випадковість для будь-якого монстра, тварини або іншої перешкоди, наприклад, так:
                example_code: |
                    ```
                    animals {is} 🦔, 🐿, 🦉, 🦇
                    {print} They now hear the sound of an animals {at} {random}
                    ```
                story_text_2: |
                    Команда `{add}` також може стати в нагоді у вашій історії.
                example_code_2: |
                    ```
                    {print} Вони чують звук
                    тварини {is} 🐿, 🦔, 🦇, 🦉
                    тварина {is} {ask} Як ви думаєте, що це?
                    {add} тварина {to_list} тварини
                    {print} це були тварини {at} {random}
                    ```
                story_text_3: |
                    Це приклад команди `{remove}` у вашій історії

                    ### Вправи
                    Скопіюйте історію з попередніх рівнів на цей рівень.
                    На цьому рівні ви вивчили 3 нові команди `{at} {random}`, `{add} {to_list}` і `{remove} {from}`.
                    Додайте нові рядки коду до своєї історії, щоб усі нові команди були представлені у вашій історії принаймні один раз.
                example_code_3: |
                    ```
                    {print} Його став занадто важким.
                    {print} Усередині були пляшка води, ліхтарик і цегла.
                    рюкзак {is} вода, ліхтарик, цегла
                    викинути {is} {ask} Який предмет він повинен викинути?
                    {remove} викинути {from} рюкзак
                    ```
            4:
                story_text: |
                    ### Вправи
                    Скопіюйте приклад коду та завершіть його, додавши лапки до пропусків у рядках 1 і 2.
                    Пробіли в рядках 3 і 4 слід замінювати не лапками, а командою `{sleep}` і `{clear}`. Ви можете змусити це працювати?

                    ### Вправа 2
                    Поверніться на попередній рівень і скопіюйте код історії. Змусьте код працювати на цьому рівні, додавши лапки в потрібні місця.
                    Пам’ятайте: змінні у вашій історії не повинні бути взяті в лапки. Так само, як другий рядок прикладу коду. У цьому рядку назва змінної поміщена поза лапками.
                example_code: |
                    ```
                    name {is} {ask} _ Як вас звати? _
                    {print}_ Головного героя звуть _ name
                    _
                    _
                    {print} name_ тепер буде гуляти в лісі _
                    {print} name _ трохи налякан. _
                    animals {is} 🦔, 🐿, 🦉, 🦇
                    {print} _ Він чує звук _ animals {at} {random}
                    {print} name _ боїться, що це ліс з привидами _
                    ```
            5:
                story_text: |
                    У цьому рівні ви можете запрограмувати різні кінцівки, які зроблять вашу історію ще веселішою.
                    У прикладі коду ви можете побачити, як зробити 2 різні закінчення.

                    ### Вправа 1
                    Напишіть нове оповідання обсягом не менше 6 рядків коду на обрану вами тему.
                    Немає натхнення? Оберіть одну з цих тем: супергерой, нудний шкільний день, застряглі на безлюдному острові.

                    Тепер дайте гравцеві можливість вибрати щасливий або поганий кінець, як у прикладі коду.
                    Запрограмуйте обидві кінцівки.

                    ###Вправа 2
                    Скопіюйте історію, яку ви створили у власній сюжетній пригоді на попередніх рівнях.
                    Знайдіть спосіб додати принаймні 2 команди `{if}` та `{else}` до вашої історії.
                    Це може бути зі щасливим або поганим кінцем, але ви також можете спробувати знайти інші способи включити команди.
                example_code: |
                    ```
                    name {is} {ask} 'Who is walking in the forest?'
                    {print} name ' walks through the forest'
                    {print} name ' encounters a monster'
                    end {is} {ask} 'Would you like a good or a bad ending?'
                    {if} end {is} good {print} name ' takes the sword and the monster quickly runs away'
                    {else} {print} 'The monster eats ' name
                    ```
            8:
                story_text: |
                    В історії хтось вимовляє слова кілька разів. Наприклад, коли хтось кличе на допомогу або співає пісню.
                    Ви можете додати такі повтори у свою історію на цьому рівні за допомогою `{repeat}`.

                    ### Вправи
                    Додайте повторення до власної історії. Поверніться до збережених програм, виберіть сюжетну програму з попереднього рівня та
                    знайдіть рядок, що містить `{print}`, і повторіть його!
                example_code: |
                    ```
                    {print} 'Принц продовжував кликати на допомогу!'
                    {repeat} 5 {times} {print} 'Допоможіть!!!'
                    {print} 'Чому мені ніхто не допомагає?'
                    ```
            9:
                story_text: |
                    На цьому рівні ви можете використовувати кілька рядків у своїх командах `{if}`, таким чином ви можете покращити свій щасливий чи сумний кінець!

                    ### Вправа 1
                    Приклад коду показує два різні закінчення; один, де герої стрибають у машині часу, а інший – ні.
                    Заповніть пропуски принаймні одним реченням на кінцівку.
                    **Екстра** Зробіть історію довшою. Що відбувається в оповіданні? Ви також можете додати другий `{ask}` з різними параметрами.

                    ### Вправа 2
                    Поверніться до збережених програм, оберіть свою сюжетну програму з рівня 5. Тепер напишіть хороший і поганий кінець, щонайменше три рядки кожен!
                example_code: |
                    ```
                    {print} 'О, ні! Тиранозавр наближається!'
                    кінець = {ask} 'Ви хочете щасливий чи сумний кінець?'
                     {if} {is} щасливий
                        {print} 'Якраз вчасно, Річард стрибає назад у машину часу!'
                        {print} _
                    {else}
                        {print} 'О ні! Річард занадто повільний...'
                        {print} _
                    ```
            10:
                story_text: "У цьому рівні ви можете використовувати команди `{if}` і `{repeat}` всередині інших команд `{if}` і `{repeat}`. \nЦе дає вам багато можливостей і дійсно допомагає зробити вашу історію інтерактивною.\n\n### Вправа 1\n Закінчіть код, щоб `{if}` працював коректно.\n\n### Вправа 2\nДодайте `{if}` та `{else}` для тієї частини історії, де Робін також повертається додому.\n \n### Вправа 3\nПоверніться до своєї історії 8-го рівня і використайте принаймні два `{if}` всередині іншого `{if}`.\n"
                example_code: |
                    ```
                    {print} 'Робін йде центром міста'
                    місце = {ask} 'Робін йде до магазину чи додому?'
                    {if} місце {is} магазин
                        {print} 'Вона заходить до магазину.'
                        {print} 'Робін бачить цікаву на вигляд книгу'
                        книга = {ask} 'Робін купує книгу?'
                        {if} книга {is} так
                        _ {print} 'Робін купує книгу і йде додому'
                        _ {else}
                        _ {print} 'Робін залишає магазин і йде додому'
                    {else}
                        {print} 'Робін йде додому'
                    ```
                story_text_2: |
                    Використовуючи команди `{and}` або `{or}`, ти можеш зробити свої історії більш універсальними. Ти зможеш запитувати два питання та давати відповідь комбінаціями відповідей.

                    ### Вправа 1
                    Переглянь цей приклад коду та закінчи його. Потім, додай принаймні 2 `{if}` кодів з `{and}` або `{or}`.

                    ### Вправа 2
                    Знайди історію з минулого рівня, та додай `{and}` або `{or}`.
                    example_code: |
                    ```
                    {print} 'Наш герой йде крізь ліс'
                    {print} 'Тропина розгалужується'
                    тропина = {ask} 'Яку тропину вона обере?'
                    зброя = {ask} 'Яку зброю вона витягне?'
                    {if} тропина {is} 'ліво' {and} зброя {is} 'меч'
                        _
                    ```
            11:
                story_text: |
                    На цьому рівні ви можете використовувати команду `{for}` у своїй історії. Таким чином ви можете легко запрограмувати дитячу книжку 'Бурий ведмедик, бурий ведмедик, що ти бачиш'.

                    ### Вправа

                    Подивіться на <a href="https://www.yonkerspublicschools.org/cms/lib/NY01814060/Centricity/Domain/1621/Brown%20Bear%20Book.pdf">історію</a> , якщо ви її не знаєте, і переконайтеся, що вона надрукована так, як у книжці.
                example_code: |
                    ```
                    звіри = _ , _ , _
                    {print} 'Бурий ведмідь, Бурий ведмідь'
                    {print} 'Що ти бачиш?'
                    ```
            16:
                story_text: |
                    Використання циклу `{while}` може зробити ваші історії цікавішими. Наприклад, ви можете використовувати `{while} game == 'on'`, щоб ви могли грати, поки гра не закінчиться.
                    Або ви можете використати `{while} sword == 'lost'`, щоб гравець не міг продовжувати гру, поки щось не знайде.

                    ### Вправи
                    У прикладі коду показано, як використовувати цикл `{while}` в історії. Тепер **подумайте про власний сценарій**, у якому гравець повинен щось знайти, перш ніж продовжити.
                example_code: |
                    ```
                    ключі = 'загублені'
                    {print} 'Ви стоїте у своєму саду і загубили ключі.'
                    {print} 'Де ви хочете їх шукати?'
                    {print} 'Ви можете вибрати: дерево, клумба, камінь, поштова скринька'
                    {while} ключі == 'загублені'
                        місце = {input} 'Де ви хочете шукати?'
                        {if} місце == 'клумба'
                            {print} 'Ось вони!'
                            ключі = 'знайдено'
                        {else}
                            {print} 'Ні, їх немає в ' місце
                    {print} 'Тепер ви можете зайти в будинок!'
                    ```
            13:
                story_text: |
                    Ми збираємося надрукувати ще одну історію, але тепер нам потрібно використовувати дужки з `{print}`.

                    ### Вправа 1
                    Створіть історію щонайменше з 5 речень. Поки що не обов'язково використовувати 'ім\'я'.
                example_code: |
                    ```
                    {print}('Ласкаво просимо до цієї історії!')
                    ```
                story_text_2: |
                    ### Вправа 2
                    Ми вже підготували для вас `{input}`. По-перше, використовуйте змінну `name` у своїй історії.
                    Потім додайте другий `{ask}` і також використовуйте цю змінну.
                    Порада: пам’ятайте про коми в `{print}` між текстом і змінними!
                example_code_2: |
                    ```
                    name = {input}("Як тебе звати?")
                    {print}("Ласкаво просимо до цієї історії!")
                    ```
            6:
                example_code: |
                    ```
                    персонаж {is} {ask} 'Хто тобі допоможе в your квесті?'
                    {if} персонаж {is} 'Дейзі'
                    {print} 'Ти обрав(-ла) Дейзі! Вона найрозумніша з усіх!'
                    {elif} персонаж {is} 'Джейсон'
                    {print} 'Ти обрав(-ла) Джейсон! Він найсильніший з усіх!'
                    {elif} персонаж {is} 'Сем'
                    {print} 'Ти обрав(-ла) Сем! Він/вона найшвидший(-а) з усіх!'
                    ```
    add_remove_command:
        default_save_name: javascript licenses api веб-сайт go1.13.8
        description: 'представляємо {add} {to_list} і {remove} {from}'
        levels:
            3:
                story_text: |
                    ## {add} {to_list}
                    Ви можете додати елементи до списку за допомогою команди `{add} {to_list}`. Щоб додати елемент до списку, ви можете просто ввести: `{add} penguin {to_list} animals` або ви можете скористатися командою `{ask}`, як у прикладі co
                story_text_3: |
                    ### Вправи
                    Спробуйте нові команди у цьому віртуальному ресторані. Додайте смак, на який гравець сподівається, до списку та видаліть смаки, на які у нього алергія.
                story_text_2: "## {remove} {from}\nЯкщо ви можете додавати елементи до списку, ви, звичайно, можете їх і вилучати. Це робиться за допомогою команди `{remove} {from}`.\n"
                example_code: "```\nтварини {is} собака, кіт, кенгуру\nяк {is} {ask} Яка твоя улюблена тварина?\n{add} як {to_list} тварини\n{print} Я вибираю тварини {at} {random}\n```\n"
                example_code_3: "```\n{print} Mystery milkshake\nароматизатори{is} полуниця, шоколад, ваніль\nнадія {is} {ask} На який смак ти сподіваєшся?\n_\nалергія {is} {ask} У вас алергія на будь-які смаки?\n_\n{print} Ви отримуєте молочний коктейль зі смаком {at} {random}\n```\n"
                example_code_2: "```\nanimals {is} dog, cat, kangaroo\ndislike {is} {ask} What animal do you not like?\n{remove} dislike {from} animals\n{print} I choose animals {at} {random}\n```\n"
        name: '{add} {to_list} & {remove} {from}'
    ask_command:
        description: Команда вступу {ask}
        levels:
            1:
                story_text_2: |
                    ## Команда `{echo}`
                    Якщо ви хочете, щоб комп’ютер повторив вам відповідь, ви можете скористатися командою `{echo}`. Відповідь буде повторено в кінці речення, тому в цьому прикладі після hello.
                story_text: "## Команда `{ask}`\nТепер, коли ви можете використовувати команду `{print}`, ви готові вивчити наступну команду: `{ask}`. За допомогою команди `{ask}` ви можете поставити запитання. Перевірте це:\n"
                story_text_3: "### Вправи\nСпробуйте команди `{ask}` і `{echo}`. По-перше, заповніть порожні поля, щоб ця програма запрацювала.\nПотім поставте ще 2 запитання за допомогою команди `{ask}`, після кожного `{ask}` використовуйте `{echo}`, щоб вивести відповідь на екран.\n"
                example_code: "```\n{print} Привіт!\n{ask} Як тебе звати?\n```\n"
                example_code_2: "```\n{print} Привіт!\n{ask} Як тебе звати?\n{echo} привіт\n```\n"
                example_code_3: "```\n_ Як справи?\n_\n```\n"
            2:
                story_text: "## Команда `{ask}` \nТепер, коли ми можемо використовувати **змінні** у наших кодах, нам більше не потрібна команда `{echo}`.\nМи можемо використовувати змінні для зберігання відповідей на наші запитання, і таким чином ми можемо використовувати відповіді на кілька запитань у наших кодах.\nПеревірте це:\n\nТаким чином ваш код стає інтерактивним!\n"
                example_code_2: "```\nfavorite_animal {is} {ask} Яка твоя улюблена тварина?\n{print} Мені подобається favorite_animal\n```\n"
                story_text_2: "### Вправи\nУ попередній пригоді ви вправлялися в установці змінних за допомогою команди `{is}`. \nВи створили принаймні 3 змінні та використали їх за допомогою команди `{print}`. \nТепер, замість встановлення змінних, ми хочемо, щоб ви зробили змінні інтерактивними, як ми зробили в нашому прикладі.\n\nСкопіюйте свій код із попередньої пригоди та зробіть змінні інтерактивними за допомогою команд `{ask}`.\n"
                example_code: "```\nname {is} {ask} What is your name?\n{print} Hello name\nage {is} {ask} How old are you?\n{print} name is age years old.\n```\n"
            13:
