                    Курс {for} {in}
                    _ їжа = {ask} ім'я ', що б ви хотіли б їсти як курс '? Р
                    _ {print} назва ' замовлення ' їжа ' як їх ' курс
                    й й
            9:
                example_code: "```\n{print} 'Welcome to Restaurant Chez Hedy!'\npeople = {ask} 'How many people will be joining us today?'\n{print} 'Great!'\n{repeat} people {times}\n    food = {ask} 'What would you like to order?'\n    {print} food\n{print} 'Thank you for ordering!'\n{print} 'Enjoy your meal!'\n```\n"
                story_text: "У цьому рівні ви можете зробити свій віртуальний ресторан більш розроблений, повторюючи декілька рядків коду. Як це:\n\n### Exercise\nЦей код може бути розширений з більш детальною інформацією в меню, наприклад, пропонують напої та / або кілька курсів або десертів. Додати принаймні один елемент.\n**Extra*** Додати ще більше товарів, скільки вам подобається!\n"
            16:
                example_code: "й й\n{print} 'Welcome в McHedy Р\nбільше = \"так Р\nУ\nзамовлення = {ask} 'Що б ви хотіли замовити? Р\n{print} замовлення\nбільше = {ask} \"Що вам подобається замовити щось інше? Р\n{print} 'Дякуй! Р\nй й\n"
                story_text: "З `{while}` ви можете переконатися, що ваші костюми можуть тримати додавати замовлення, поки вони не будуть виконані.\n\n### Exercise\nПравильно додайте команду `{while}` до цього коду.\n"
