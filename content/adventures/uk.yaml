                story_text: "На цьому рівні ми можемо вибрати зі списку. З цим ми можемо дозволити комп’ютеру вибрати одну сторону кубика.\nПодивіться на ігри, які є у вас вдома в шафі.\nЧи існують ігри зі (спеціальним) кубиком? Ви також можете скопіювати його за допомогою цього коду.\nНаприклад, кубик гри Earthworms з цифрами від 1 до 5 і дощовим черв'яком на ньому.\n\n![Die of earthworms with 1 to 5 and an earthworm on it](https://cdn.jsdelivr.net/gh/felienne/hedy@24f19e9ac16c981517e7243120bc714912407eb5/coursedata/img/dobbelsteen.jpeg)\n"
                example_code_2: "```\nвибір {is} _\n```\n"
                story_text_2: "### Вправи\nГральні кістки в наведеному вище прикладі є кістками для конкретної гри. Ви можете зробити нормальні кубики?\nАбо інші спеціальні кубики з іншої гри?\n"
            4:
                story_text: |
                    На цьому рівні ви також можете створювати кубики. Але цього разу ви можете спробувати самі, без прикладу коду!

                    ### Вправи
                    Зробіть власні кубики на цьому рівні.
                    Порада: якщо ви не знаєте, як робити кубики. Подивіться на свої кубики з попереднього рівня, але не забудьте додати лапки.
            5:
                story_text: |
                    Ми збираємося додати команди `{if}` і `{else}` до наших кубиків!

                    ### Вправи
                    Заповніть зразок коду так, щоб код казав «Ви можете припинити кидати», коли ви кинули дощового черв’яка. Має бути написано: «Ви повинні кинути знову», якщо ви кинули ще щось.
                    **Екстра** Можливо, ви захочете відтворити кубик із зовсім іншої гри. Це теж добре! Потім придумайте власну реакцію, наприклад, «так» для 6 і «шкода» для чогось іншого.
                example_code: |
                    ```
                    вибір {is} 1, 2, 3, 4, 5, дощовий черв'як
                    кинути {is} варіанти {at} {random}
                    {print} 'ви кинули' кинути
                    _ throw {is} дощовий черв'як {print} 'Ви можете припинити кидати.'
                    _ {print} "Ти маєш кинути це знову!"
                    ```
            7:
                story_text: |
                    Ви також можете змусити дощового хробака знову померти в цьому, але тепер ви також можете підрахувати, скільки очок було викинуто.
                    Можливо, ви знаєте, що хробак нараховує 5 очок для Дощових хробаків. Тепер після кидка ви можете відразу підрахувати, скільки очок ви кинули.
                    Це код для розрахунку очок за один кубик:

                    ### Вправи
                    Чи можете ви створити код, щоб отримати загальну кількість балів за 8 кубиків? Для цього вам потрібно скопіювати та вставити кілька рядків коду.
                example_code: |
                    ```
                    choices = 1, 2, 3, 4, 5, earthworm
                    points = 0
                    throw = choices {at} {random}
                    {print} 'you threw ' throw
                    {if} throw {is} earthworm points = points + 5 {else} points = points + throw
                    {print} 'those are ' points ' points'
                    ```
                example_code_2: |
                    Чи вдалося вам підрахувати рахунок для 8 кубиків? Для цього потрібно було багато копіювати та вставляти, чи не так? Ми збираємося зробити це простіше на рівні 7!
            8:
                story_text: |
                    Ви також можете знову зробити кубик на цьому рівні. За допомогою коду `{repeat}` ви можете легко кинути цілу руку кубиків.

                    ### Вправи
                    Спробуйте завершити зразок коду! **Екстра** Подумайте про відому вам гру, у якій використовуються кубики та програма, яка використовує `{repeat}`.
                example_code: |
                    ```
                    вибір = 1, 2, 3, 4, 5, 6
                    _ _ _ _ _ _ _
                    ```
            11:
                story_text: |
                    ### Вправи
                    Усі надто довго кидають кубики? На цьому рівні ви можете дозволити Хеді кинути всі кубики одночасно!
                    Змініть імена на імена ваших друзів або родини та закінчіть код.
                example_code: |
                    ```
                    гравці = Енн, Джон, Джессі
                    варіанти = 1, 2, 3, 4, 5, 6
                    _ _ _ _
                        {print} гравець 'кидає' вибір {at} {random}
                        {sleep}
                    ```
            16:
                example_code: "```\nваріанти = 1, 2, 3, 4, 5, 6\n{print} \"Кидни 6 якнайшвидше!\"\nкинуто = 0\nспроби = 0\n_\n_\n_\n_\n_\n{print} 'Так! Ви кинули 6 у «спробах».\n```\n"
                story_text: "### Вправи\nНа цьому рівні ви можете створити маленьку гру, в якій вам доведеться кинути 6 якомога швидше.\nМи запустили код, вам належить змусити гру працювати!\n\nПо-перше, додайте цикл `{while}`, який перевіряє, чи було викинуто 6 чи ні.\nЯкщо ви ще не кинули 6, кидайте кубик на випадкове число.\nРоздрукувати те, що кинув гравець.\nДодайте спробу до кількості спроб\nЗачекайте секунду, перш ніж кинути знову, або - якщо ви кинули 6 - до закінчення гри.\n"
        description: Зробіть свої власні кубики
        default_save_name: кубики
        name: кубики
    dishes:
        description: Використовуйте комп’ютер, щоб побачити, хто миє посуд
        levels:
            3:
                story_text: |
                    Чи завжди ви вдома сперечаєтесь, хто має сьогодні помити посуд чи змінити лоток?
                    Тоді ви можете дозволити комп’ютеру вибирати дуже справедливо. Ви можете запрограмувати це на цьому рівні!
                example_code: |
                    ```
                    people {is} mom, dad, Emma, Sophie
                    {print} people {at} {random} has to do the dishes
                    ```
                story_text_2: |
                    ### Вправи
                    Зробіть власну версію програми посудомийної машини. Спочатку складіть список членів вашої родини.
                    Потім подумайте про завдання, яке потрібно виконати, і дозвольте комп’ютеру вирішити, хто має виконати це завдання за допомогою команди `{at} {random}`.

                    **Додатково** Не хочеться мити посуд самостійно? Зламай програму, видаливши своє ім’я зі списку за допомогою команди `{remove}` `{from}`.
            4:
                story_text: |
                    За допомогою лапок ви можете покращити свою програму миття посуду.

                    ### Вправи
                    Спочатку заповніть правильні символи або команди в порожніх полях, щоб цей приклад програми працював.
                    Ви зрозуміли? Чудово! Тепер скопіюйте свій власний код із попереднього рівня та змусьте його працювати на цьому рівні, додавши лапки в потрібні місця.
                example_code: "```\nлюди {is} мама, тато, Емма, Софі\n{print} _ посуд готує _\n{sleep}\n{print} людей {at} _\n```\n"
            5:
                story_text: |
                    З `{if}` тепер ви можете отримати більше задоволення від вибору в програмі. Ви можете змусити свою програму реагувати на вибір, зроблений комп’ютером.
                    ### Вправи
                    Чи можете ви закінчити код так, щоб він друкував «дуже погано», коли настане ваша черга, а в іншому випадку «так!»?
                    Не забувайте про цитати!
                example_code: "```\nлюди {is} мама, тато, Емма, Софі\nпосудомийна машина {is} людей {at} {random}\n_ посудомийна машина {is} Софі {print} _ шкода, що мені доводиться мити посуд _\n_ {print} 'на щастя немає посуду, тому що ' _ ' вже миє посуд'\n```\n"
            7:
                story_text_2: |
                    Якщо вам дуже не пощастить, попередня програма може запропонувати вам мити посуд цілий тиждень! Це не чесно!
                    Щоб створити більш справедливу систему, ви можете скористатися командою `{remove}`, щоб видалити вибрану особу зі списку. Таким чином вам не доведеться знову мити посуд, доки всі не займуть свою чергу.

                    Понеділок і вівторок для вас готові! Чи можете ви додати решту тижня?
                    І... чи можете ви придумати рішення, коли ваш список порожній?
                example_code_2: |
                    ```
                    people = mom, dad, Emma, Sophie
                    dishwasher = people {at} {random}
                    {print} 'Monday the dishes are done by: ' dishwasher
                    {remove} dishwasher {from} people
                    dishwasher = people {at} {random}
                    {print} 'Tuesday the dishes are done by: ' dishwasher
                    {remove} dishwasher {from} people
                    ```
                story_text: "Як часто всі збираються мити посуд? Це справедливо? Ви можете порахувати це на цьому рівні.\n"
                example_code: "```\npeople = mom, dad, Emma, Sophie\nemma_washes = 0\ndishwasher = people {at} {random}\n{print} 'The dishwasher is' dishwasher\n{if} dishwasher {is} Emma emma_washes = emma_washes + 1\n{print} 'Emma will do the dishes this week' emma_washes 'times'\n```\n\nNow you can copy lines 3 to 5 a few times (e.g. 7 times for a whole week) to calculate for a whole week again.\nDo you make the code for the whole week?\n"
            8:
                story_text: |
                    За допомогою `{repeat}` ви можете повторювати частини коду. Ви можете використовувати це, щоб обчислити, хто буде мити посуд протягом кількох днів!
                    ### Вправи
                    Використовуйте команду `{repeat}`, щоб вирішити, кому потрібно мити посуд цілий тиждень. Кожне поле потрібно заповнити однією командою або числом!
                    **Додатково** Чи можете ви згадати інші завдання в домі? Адаптуйте код, щоб він вирішував три домашні справи. Не забудьте роздрукувати, про які завдання йдеться!
                example_code: |
                    ```
                    люди = мама, тато, Емма, Софі
                    {repeat} _ _ {print} 'Посуд митиме ' _ _ _
                    ```
            11:
                story_text: |
                    На цьому рівні ви можете легко скласти розклад на весь тиждень!

                    ### Вправи
                    Додайте другу роботу, таку як пилосос або прибирання, і поділіть її також на весь тиждень.
                    <br>**Екстра** Програма нечесна, можна не пощастити і прати весь тиждень. Як зробити програму більш справедливою?
                example_code: "```\ndays = Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday\nnames = mom, dad, Emma, Sophie\n{for} day {in} days\n    {print} names {at} {random} ' does the dishes on ' day\n```\n"
        name: Посуд?
        default_save_name: Посуд
    elif_command:
        description: '{elif}'
        default_save_name: elif
        name: '{elif}'
    for_command:
        description: '{for} команда'
        levels:
            14:
                story_text: "Нарешті, ми перетворимо `{for} i {in} {range} 1 {to} 5` на справжній код Python, ось так:\n"
                example_code: "```\n{for} i {in} {range}(1,5):\n    {print} (i)\n```\n"
            11:
                story_text: "## Для\nНа цьому рівні ми вивчаємо новий код під назвою `{for}`. За допомогою `{for}` ви можете створити список і використовувати всі елементи.\n`{for}` створює блок, як `{repeat}` і `{if}`, тому всі рядки в блоці повинні починатися з 4 пробілів."
                example_code: "```\nanimals = dog, cat, blobfish\n{for} animal {in} animals\n    {print} 'I love ' animal\n```\n"
                story_text_2: "### Вправи\nЗавершіть цей код, додавши `{for} action {in} actions` до рядка 2.\n"
                example_code_2: "``` \nдії = плескати в долоні, тупати ногами, кричати Ура!\n_\n    {repeat} 2 {times}\n        {print} \"Якщо ти щасливий і ти це знаєш,\" дія\n        {sleep} 2\n    {print} \"Якщо ти щасливий, ти це знаєш і справді хочеш це показати\"\n    {print} \"Якщо ти щасливий і ти це знаєш,\" дія\n    {sleep} 3\n```\n"
        default_save_name: for
        name: '{for}'
    fortune:
        levels:
            1:
                story_text: |
                    Ви коли-небудь були на карнавалі і вам ворожка передбачила майбутнє? Або ви коли-небудь грали з чарівною вісімкою?
                    Тоді ви, мабуть, знаєте, що вони не можуть передбачити ваше майбутнє, але грати все одно цікаво!

                    На наступних рівнях ви зможете навчитися створювати власну машину для ворожіння!
                    На першому рівні ви можете почати легко, дозволивши Хеді представитися як ворожка та дозволити їй `{echo}` відповіді гравців.
                    як це:
                example_code: |
                    ```
                    _ Привіт, я ворожка Геді!
                    _ Хто ти?
                    _ Дозвольте мені поглянути на свою кришталеву кулю
                    _ Я бачу... Я бачу...
                    _ Ваше ім'я
                    ```
                story_text_2: |
                    ### Вправи
                    Скопіюйте приклад коду на екран введення та заповніть пропуски, щоб код працював.
                    **Додатково** Змініть код і дозвольте ворожці передбачити не лише ваше ім’я, а й вік, улюблену спортивну команду чи щось інше про вас.
            3:
                story_text: |
                    На попередніх рівнях ви створили свою першу машину для ворожіння, але Хеді не могла нічого передбачити, лише `{echo}`.
                    На цьому рівні ви можете використовувати змінну та команду `{at} {random}`, щоб дійсно дозволити Хеді вибрати відповідь за вас. Подивіться, наприклад, цей код:
                story_text_2: |
                    ### Вправи
                    Тепер Хеді може відповісти лише «так», «ні» чи «можливо». Чи можете ви дати Хеді більше варіантів відповіді, наприклад «безумовно» або «запитати ще раз».
                example_code: "```\n{print} I’m Hedy the fortune teller!\nquestion {is} {ask} What do you want to know?\n{print} This is what you want to know: question\nanswers {is} yes, no, maybe\n{print} My crystal ball says...\n{sleep} 2\n{print} answers {at} {random}\n```\n"
            4:
                example_code: |
                    ```
                    _ Додайте лапки до цього коду _
                    {print} Я Хеді ворожка!
                    question {is} {ask} Що ти хочеш знати?
                    {print} Це ваше запитання: запитання
                    відповіді {is} так, ні, можливо
                    {print} Моя кришталева куля говорить...
                    {sleep} 2
                    {print} відповідає {at} {random}
                    ```
                story_text: "### Вправи\nМи видалили всі лапки з цього прикладу коду, чи можете ви додати їх у всіх потрібних місцях? \n\n### Вправа 2\nПоверніться на попередній рівень і скопіюйте свій код ворожки. Змусьте код працювати на цьому рівні, додавши лапки в потрібні місця.\n"
            6:
                story_text: |
                    ### Вправи
                    У прикладі коду ви бачите, як створити програму-ворожку, яка дозволить вам схилити шанси на вашу користь. Ця шахрайська програма завжди повідомляє вам, що ви виграєте в лотерею, але ваші друзі ніколи не виграють.

                    Використовуйте це, щоб створити власну програму, будьте креативними! Наприклад, ви можете створити код, який передбачає, що:
                    * ваша улюблена спортивна команда переможе всіх конкурентів!
                    * для кіновечору буде обрано ваш улюблений фільм!
                    * Ви виграєте квитки на улюблене шоу!
                    * ти найпрекрасніша з усіх, як чарівне дзеркало Білосніжки.
                    Нехай ваша уява зробить свою роботу!

                    Ваша програма повинна складатися з принаймні 10 рядків коду та мати принаймні одну команду `{if}` і `{else}`.
                example_code: |
                    ```
                    friends {is} Jordan, Lucy, Dave
                    {print} 'I can predict if you will win the lottery tomorrow!'
                    person {is} {ask} 'Who are you?'
                    good_answer {is} Hurray! You win!, You will definitely win!, We have a winner!
                    bad_answer {is} Bad luck! Try again!, Another person will win, You lose!
                    {if} person {in} friends {print} good_answer {at} {random}
                    {else} {print} bad_answer {at} {random}
                    ```
            7:
                story_text: |
                    На цьому рівні ви можете використовувати математику у своїх передбаченнях як ворожка. Це дозволяє вам складати (дурні) формули для розрахунку майбутнього.
                    Наприклад, ви можете підрахувати, наскільки багатими ви станете або скільки дітей у вас буде, коли виростете.



                    ### Вправи
                    Чи можете ви придумати власну (безглузду) машину для ворожіння?
                example_code: |
                    ```
                    {print} 'I am Hedy the fortune teller!'
                    {print} 'I can predict how many kids youll get when you grow up!'
                    age = {ask} 'How old are you?'
                    siblings = {ask} 'How many siblings do you have?'
                    length = {ask} 'How tall are you in centimetres?'
                    kids = length / age
                    kids = kids - siblings
                    {print} 'You will get ...'
                    {sleep}
                    {print} kids ' kids!'
                    ```
            8:
                story_text: |
                    ### Вправи
                    Завершіть цю програму, яка скаже вам, чи любить ваша кохана відповідь чи ні.
                example_code: |
                    ``` 
                    {print} "У мене є квітка з чарівними пелюстками" 
                    {print} "Якщо ти зірвеш пелюстки, квітка скаже тобі, чи кохає тебе у відповідь" 
                    сума = {ask} «Скільки пелюсток ви хочете зірвати?» 
                    варіанти = вони люблять вас, вони вас не люблять 
                    _ _ _ _ варіанти {at} {random} 
                    ```
            9:
                story_text: |
                    У наступному прикладі ви можете попросити ворожку поставити кілька запитань і також роздрукувати їх!

                    ### Вправи
                    Чи можете ви заповнити правильну команду в пропусках?
                example_code: |
                    ``` 
                    {print} 'Я ворожка Хеді!'
                    {print} "Ви можете поставити мені 3 запитання". 
                    відповіді = так, ні, можливо 
                    _ _ _ 
                       question = {ask} 'Що ви хочете знати?' 
                       {print} питання 
                       {sleep} 
                       {print} "Моя кришталева куля каже..." відповідає {at} {random} 
                    ```
            11:
                story_text: |
                    На цьому рівні ви навчитеся програмувати гру MASH (особняк, квартира, халупа, будинок). У цій грі ви можете передбачити для всіх гравців відразу, як буде виглядати їх майбутнє.

                    ### Вправи
                    Заповніть пропуски, використовуючи нову команду, яку ви вивчили на цьому рівні.
                example_code: |
                    ``` 
                    houses = особняк, квартира, халупа, будинок 
                    любить = ніхто, королівська особа, їхній сусід, їхня справжня любов 
                    домашні тварини = собака, кіт, слон 
                    імена = Дженна, Райан, Джим 
                    _
                        {print} name 'живе в' будинках {at} {random} 
                        {print} name 'вийде заміж' любить {at} {random} 
                        {print} name ' отримає ' pets {at} {random} ' як свого улюбленця.' 
                        {sleep}
                    ```
        default_save_name: Ворожка
        name: Ворожка
        description: Нехай Хеді передбачить майбутнє
    functions:
        levels:
            12:
                example_code: |
                    ``` 
                    sides = 'ліворуч', 'праворуч' 
                    кінцівки = 'рука', 'нога' 
                    кольори = 'червоний', 'синій', 'зелений', 'жовтий'

                    {define} поворот 
                        вибрана_сторона = сторони {at} {random} 
                        вибрана_кінцівка = кінцівки _ 
                        вибраний_колір = кольори _ 
                        {print} selected_side ' ' selected_limb ' on ' selected_color 

                    {print} "Давайте пограємо в гру Twister!" 
                    {for} i {in} {range} 1 {to} _ 
                        {call} чергу 
                        {sleep} 2
                    ```
                story_text: "На цьому рівні ви навчитеся використовувати **функції**. Функція — це блок коду, який можна легко використовувати кілька разів. Використання функцій допомагає нам організувати фрагменти коду, які ми можемо використовувати знову і знову. \nЩоб створити функцію, використовуйте `{define}` і дайте функції назву. Потім помістіть усі рядки, які вам потрібні у функції, у блоці з відступом під рядком `{define}`. \nЗалиште один порожній рядок у своєму коді, щоб він виглядав гарно та акуратно. Чудова робота! Ви створили функцію! \n\nТепер, коли нам потрібен цей блок коду, ми просто використовуємо <code>{call}</code> із назвою функції, щоб викликати його! Нам не потрібно знову вводити цей блок коду. \n\nПерегляньте цей приклад коду гри Twister. Функція «turn» містить блок коду, який вибирає, яка кінцівка куди повинна бути спрямована. \n\n### Вправи\nЗавершіть цей код, встановивши 2 змінні selected_limb і selected_color. \nПотім оберіть, скільки разів ви хочете викликати функцію, щоб закрутити блешню. \n\n### Вправа 2\nПокращіть свій код, додавши змінну під назвою «люди». Використовуйте змінну, щоб надати всім гравцям власні команди в грі. \nНаприклад: «Ахмед, права рука на зеленому» або «Джесіка, ліва нога на жовтому».\n"
        name: функції
        description: функції
        default_save_name: функції
    haunted:
        levels:
            1:
                story_text_2: |
                    ### Вправи
                    Скопіюйте приклад коду на екран введення, натиснувши жовту кнопку.
                    Тепер завершіть історію, додавши принаймні 5 рядків коду.
                    Не забувайте починати кожен рядок коду з команди `{print}`.
                story_text: "У цій пригоді ви працюєте над створенням гри, у якій вам доведеться втекти з будинку з привидами, вибравши правильні двері. \nЯкщо ви виберете правильні двері, ви виживете, але якщо ні, жахливий монстр може... \n\nНа першому рівні ми починаємо нашу гру про будинок з привидами, вигадуючи страшну історію та запитуючи гравця, якого монстра він побачить у будинку з привидами.\n"
                example_code: "``` \n{print} Як я сюди потрапив? \n{print} Пам'ятаю, мій друг сказав мені зайти в старий особняк... \n{print} і раптом усе потемніло. \n{print} Але як я опинився на підлозі...? \n{print} Голова болить, як бейсбольною битою! \n{print} Що це за звук? \n{print} О ні! Я відчуваю, що я не одна в цьому домі! \n{print} Мені потрібно забратися звідси! \n{print} Переді мною 3 двері.. \n{ask} Які двері вибрати? \n{echo} Я вибираю двері \n{print} ...? \n```\n"
            2:
                example_code_2: |
                    ```
                    чудовисько_1 {is} _
                    чудовисько_2 {is} _
                    monster_3 {is} _
                    {print} Ви входите в будинок з привидами.
                    {print} Раптом ви бачите чудовисько_1
                    {print} Ви біжите в іншу кімнату...
                    {print} Але там на вас чекає чудовисько_2!
                    {print} О ні! Швидше на кухню.
                    {print} Але коли ви входите, monster_3 атакує вас!
                    ```
                story_text: "У цьому будинку з привидами ви можете вибрати собі монстрів за допомогою емодзі. Звичайно, ви також можете використовувати слова.\n"
                story_text_2: "### Вправи\nУ наведеному вище прикладі монстри визначені заздалегідь. Отже, кожного разу, коли ви запускаєте свій код, результат буде однаковим. \nЧи можете ви додати команди `{ask}`, щоб зробити дім із привидами інтерактивним і дозволити гравцям вибирати монстрів, яких вони зустрінуть?\n"
                example_code: "``` \nmonster_1 {is} 👻\nmonster_2 {is} 🤡 \nmonster_3 {is} 👶 \n{print} Ви входите в будинок з привидами.\n{print} Раптом ви бачите чудовисько_1\n{print} Ви біжите в іншу кімнату...\n{print} Але там на вас чекає чудовисько_2!\n{print} О ні! Швидше на кухню.\n{print} Але коли ви входите, monster_3 атакує вас!\n```\n"
            3:
                story_text: |
                    На попередніх рівнях ви познайомилися зі своєю грою про будинок з привидами, але, як ви могли помітити, історія завжди матиме жахливий кінець.
                    На цьому рівні ви можете зробити свою історію більш інтерактивною, змінивши результат гри; то з'їдять, то втечеш!
                    Нехай Хеді вирішує навмання!

                    ### Вправи
                    Скопіюйте приклади кодів і заповніть пропуски, щоб це запрацювало!

                    **Екстра** Ця історія досить проста, можливо, ви можете її трохи налякати, додавши більш захоплюючу історію.
                    Крім того, зараз у вас дуже обмежені результати, є лише 3 варіанти того, що знаходиться за дверима. Можливо, ви придумаєте ще монстрів, щоб додати до списку!
                example_code: "``` \n_ Втеча з будинку з привидами! \n_ Перед вами 3 двері... \n_ _ _ Які двері ви обираєте? \n_ Ви вибрали двері ... вибір \nмонстри _ зомбі, вампір, НІЧОГО ВИ НЕ ВТІКЛИ \n_ Бачите... \n{sleep}\n_ _ _ _ \n```\n"
            4:
                story_text: |
                    На цьому рівні ви навчитеся використовувати лапки в іграх.

                    ### Вправи
                    Чи можете ви зробити свій Будинок з привидами 4 рівня доказом?

                    ### Вправа 2
                    Поверніться на попередній рівень і скопіюйте свій код будинку з привидами. Змусьте код працювати на цьому рівні, додавши лапки в потрібні місця.
                example_code: |
                    ```
                    _ Додайте цей код у лапки _
                    {print} Втеча з дому з привидами!
                    {print} Перед вами 3 двері...
                    вибір {is} {ask} Які двері ви обираєте?
                    {print} Ви вибрали двері ... вибір
                    монстри {is} зомбі, вампір, НІЩО ВИ ВТІКЛИ
                    {print} Бачите...
                    {sleep}
                    {print} монстрів {at} {random}
                     ```
            5:
                story_text: |
                    До цього рівня в грі «Будинок з привидами» гравець завжди просив вибрати двері, але, як ви могли помітити, їм не обов’язково відповідати правильно.
                    Якщо гравець заповнив абсолютно випадкову відповідь, гра все одно працюватиме, і гравець може навіть виграти (не дивлячись на те, що не вибрав двері).
                    На цьому рівні ви можете виграти гру, лише вибравши двері, які випадковим чином вибрала Хеді.

                    ### Вправи
                    Чи можете ви знайти 4 пропущених слова, щоб завершити код?
                example_code: |
                    ``` 
                    {print} "Втеча з дому з привидами!" 
                    {print} «Перед вами 3 двері...» 
                    двері {is} 1, 2, 3 
                    монстри {is} перевертень, мумія, вампір, зомбі 
                    selected_door {is} {ask} 'Які двері ви обираєте?' 
                    {print} 'Ви вибрали двері...' selected_door 
                    {sleep}
                    correct_door {is} двері {at} {random} 
                    _ _ _ _ {print} "Чудово! Ти втік! 
                    {else} {print} «О ні! Вас їдять...' монстри {at} {random} 
                    ```
            10:
                story_text: |
                    На цьому рівні ви можете використовувати вкладення, що дозволяє зробити будинок з привидами ще більш інтерактивним!

                    ### Вправи
                    Зараз дуже важко виграти цю гру, чи можете ви полегшити перемогу?
                    Змінити свій код, щоб він містив лише одні неправильні двері та двоє правильних, а не одні правильні двері та двоє неправильних? 
                    Порада: це означає зміну змінної correct_door на wrong_door і перемикання кодів `{if}` і `{else}`.
                    І, звичайно, ви також можете змінити історію та зробити її своєю. Змініть монстрів або зробіть веселе ігрове шоу, де ви отримаєте подарунок!
                example_code: "```\n{print} 'Escape from the Haunted House!'\nplayer = alive\ndoors = 1, 2, 3\nmonsters = zombie, vampire, giant spider\n{repeat} 3 {times}\n    {if} player {is} alive\n        correct_door {is} doors {at} {random}\n        {print} 'There are 3 doors in front of you...'\n        chosen_door = {ask} 'Which door do you choose?'\n        {if} chosen_door {is} correct_door\n            {print} 'No monsters here!'\n        {else}\n            {print} 'You are eaten by a ' monsters {at} {random}\n            player = dead\n    {else}\n        {print} 'GAME OVER'\n{if} player {is} alive\n    {print} 'Great! You survived!'\n```\n"
            14:
                story_text: "### Вправи\nУ цій грі з привидами використовується зв’язок між списками, які можна використовувати на цьому рівні. \nНаприклад: усі властивості, які належать зомбі, є першими у всіх списках, відьма – другою, а вампір – третьою. \nПеревірте код і заповніть `weapons[i]`, `monsters[i]` , `bad_fate[i]`, `good_fate[i]`, `hint[i]` у правильних полях, щоб отримати код для робота!\n"
                example_code: "``` \nчисла = [1, 2, 3] \ni = числа[{random}] \nпідказка = ['гарчання', 'кудихаючий сміх', 'тріпотливі крила кажана'] \nмонстри = ['зомбі', 'відьма', 'вампір'] \nbad_fate = ['Твій мозок з'їдено', 'Ти назавжди проклятий', 'Тебе вкусили'] \ngood_fate = ['Ви кидаєте шинку. Зомбі відволікається і починає його їсти.', 'Ви підпалюєте штори. Відьма тікає зі страху перед вогнем», «Вампір ненавидить часник і тікає»] \nзброя = ['ham', 'lighter', 'garlic'] \n{print} «Ви стоїте перед старим особняком» \n{print} \"Щось тут не так\" \n{print} \"Ви чуєте\" _ \n{print} \"Ви збираєтеся це дослідити\" \n{print} «Ви заходите на кухню і бачите запальничку, сиру шинку та часник». \nyour_weapon = {ask} 'Що ви берете з собою?' \n{print} \"Зі своєю зброєю ти входиш у вітальню\" \n{print} \"Там ви знайдете\" _ \nпотрібна_зброя = _ \n{if} ваша_зброя == потрібна_зброя \n    {print} \"Ви використовуєте свою\" зброю \n    {print} _ \n    {print} \"ВИ ПЕРЕМОГЛИ!\" \n{else}\n    {print} \"Ви вибрали не ту зброю...\" \n    {print} _ \n    {print} \"ГРА ЗАВЕРШЕНА\" \n```\n"
        description: Втеча з будинку з привидами
        name: Будинок з привидами
        default_save_name: Будинок з привидами
    if_command:
        description: Знайомство з командою {if}
        levels:
            10:
                story_text: |
                    На цьому рівні ви також можете розмістити команду `{if}` всередині іншої команди `{if}`.
                example_code: "```\ncontinue = {ask} 'Do you want to continue?'\n{if} continue = yes\n    sure = {ask} 'Are you sure?'\n    {if} sure {is} yes\n        {print} 'We will continue'\n    {else}\n        {print} 'You are not sure'\n{else}\n    {print} 'You do not want to continue'\n```\n"
            5:
                example_code_3: "```\nвідповідь {is} {ask} '2 + 2 = ?'\n_ _ _ 4 _ \"Чудова робота!\"\n_ _ 'Ні 2 + 2 = 4'\n```\n"
                story_text_2: "Іноді код із `{if}` стає дуже довгим і погано вписується в рядок. <br> Ви також можете розділити код на два рядки, починаючи другий рядок із `{else}` так:\n"
                story_text: "## Якщо... інакше.... \nНа рівні 5 є щось нове, `{if}`! За допомогою `{if}` ви можете вибрати між двома різними варіантами. \nЦей код добре друкується, якщо ви введете Hedy як ім’я, і бу! якщо ви введете щось інше. \n`{ask}` і `{print}` все ще працюють, як і на рівні 4.\n"
                example_code_2: "```\nname {is} {ask} 'як тебе звуть?'\n{if} name {is} Hedy {print} 'nice'\n{else} {print} \"бу!\"\n```\n"
                example_code: "```\nname {is} {ask} 'як тебе звуть?'\n{if} name {is} Hedy {print} 'приємно' {else} {print} 'бу!'\n```\n"
                story_text_3: "### Вправи\nСпробуйте створити власний код за допомогою `{if}` і `{else}`. Ви можете використовувати приклад коду, якщо хочете.\n"
            9:
                story_text: "## Якщо... Інакше... \nВи навчилися повторювати блок рядків коду після команди `{repeat}`. \nТепер ви також можете використовувати відступи для створення блоків після команд `{if}` або `{else}`. \nПерегляньте приклад коду. \n\n### Вправи\nДодайте команду `{else}` до прикладу коду. Створіть рядковий блок за допомогою відступу. Це можна зробити, починаючи кожен рядок із 4 пробілів.\n"
                example_code: "```\nname = {ask} 'Як тебе звати?'\n{if} name {is} Hedy\n    {print} «Ласкаво просимо, Хеді»\n    {print} \"Ви можете грати на своєму комп'ютері!\"\n```\n"
        name: '{if} & {else}'
        default_save_name: if_command
    in_command:
        description: Знайомство з командою {in}
        levels:
            6:
                example_code_2: |
                    ``` 
                    тварини {is} собака, корова, вівця 
                    answer {is} {ask} 'Яка твоя улюблена тварина?' 
                    _ відповідь _ тварини _ «Я теж!» 
                    _ _ «Мої улюблені тварини собаки, корови та вівці» 
                    ```
                story_text: "## Списки\nКоли ми хочемо перевірити, чи є щось у списку, ми тепер можемо використовувати команду `{in}`.\nЦей код гарно друкується! якщо ви обираєте зелений або жовтий, і meh інакше.\n"
                example_code: "```\npretty_colors {is} зелений, жовтий\nfavorite_color {is} {ask} 'Який твій улюблений колір?'\n{if} favorite_color {in} pretty_colors {print} 'красиво!'\n{else} {print} 'мех'\n```\n"
                story_text_2: "### Вправи\nЗавершіть приклад коду, заповнивши пропуски командами, які ви вивчили. \nКоли ви закінчите код, спробуйте створити власний код і використайте запитання, яке ви самі придумали.\n"
        name: '{in}'
        default_save_name: in_command
    is_command:
        description: представлення команди {is}
        levels:
            2:
                story_text_2: |
                    ### Вправи
                    Час створювати власні змінні! 
                    У прикладі коду ми зробили приклад змінної `favorite_animal`. У рядку 1 встановлено змінну, а в рядку 2 ми використали змінну в команді `{print}`. 
                    По-перше, завершіть наш приклад, заповнивши поле вашої улюбленої тварини. Потім створіть принаймні 3 з цих кодів самостійно. Виберіть змінну та встановіть її за допомогою команди `{is}`. Потім використовуйте його з командою `{print}`, як і ми.
                example_code: "```\nname {is} Hedy\nage {is} 15\n{print} name is age years old\n```\n"
                story_text: "## Змінні \nВи можете назвати слово за допомогою `{is}`. Це називається **змінною**. У цьому прикладі ми створили змінну ім’я та вік. Ви можете використовувати слово name у будь-якому місці коду, і воно буде замінено на Hedy, ось так:\n"
                example_code_2: "```\nулюблена_тварина {is} _\n{print} Мені подобається favorite_animal\n```\n"
            7:
                example_code: "```\nname = Hedy\nanswer = 20 + 4\n```\n"
                story_text: "Ми також вносимо зміни в збереження слова в змінній! Тепер ви можете використовувати `=` замість `{is}`, коли ми зберігаємо ім'я або число в змінній, як це:\n"
        default_save_name: is_command
        name: '{is}'
    language:
        levels:
            5:
                story_text: |
                    Створіть власну програму для відпрацювання словникового запасу новою мовою.

                    ### Вправи
                    Зробіть код довшим, додавши принаймні ще 3 слова, які гравець може вивчити.
                    **Додатково** Звичайно, ви можете вибрати мову, відмінну від французької. Ви можете змінити код на будь-яку мову, яку хочете вивчити.
                example_code: "``` \n{print} \"Вивчай французьку!\" \nкіт {is} {ask} '🐱' \n{if} cat {is} chat {print} \"Чудово!\" \n{else} {print} \"Ні, кіт - це чат\" \nжаба {is} {ask} '🐸' \n{if} жаба {is} grenouille {print} \"Супер!\" \n{else} {print} \"Ні, жаба - це Гренуй\" \n```\n"
            14:
                example_code: "```\nfrench_words = ['bonjour', 'ordinateur', 'pomme de terre']\ntranslation = ['hello', 'computer', 'potato']\nscore = 0\n{for} i {in} {range} 1 {to} 3\n    answer = {ask} 'What does ' french_words[i] ' mean?'\n    correct = translation[i]\n    {if} answer == correct\n        {print} 'Correct!'\n        score = score + 1\n    {else}\n        {print} 'Wrong, ' french_words[i] ' means ' translation[i]\n{print} 'You gave ' score ' correct answers.'\n```\n"
                story_text: "### Вправи\nПодивіться на приклад коду. Це програма для відпрацювання французької лексики. Тепер створіть власну програму, щоб тренувати свій словниковий запас новою мовою. \nЯкщо ви не знаєте жодної іншої мови, ви можете скористатися перекладачем Google або використовувати емодзі та свою рідну мову.\n"
        name: Мова
        description: Відпрацювання слів іноземною мовою
        default_save_name: Мова
    maths:
        levels: {}
        default_save_name: математика
        description: Знайомство з математикою
        name: математика
    music:
        levels:
            7:
                story_text: "Instead of playing notes, you can also play numbers now. Simply type `{play} 1` for the lowest note, `{play} 70` for the highest note, or anything in between.\n\n### Exercise\n This calls for musical maths! Try out the example code a couple of times with different starting numbers. \nThen, see if you can compose a song using the numbers.\n"
                example_code: "```\nnumber = {ask} 'Say a starting number between 1 and 67'\n{print} number\n{play} number\nnumber = number + 1\n{print} number\n{play} number\nnumber = number + 1\n{print} number\n{play} number\n```\n"
            1:
                example_code: "```\n{play} C4\n{play} D4\n{play} E4\n{play} F4\n{play} G4\n{play} A4\n{play} B4\n{play} C5\n```"
                story_text: "У цьому рівні ви дізнаєтеся, як використовувати команду `{play}` для відтворення мелодії!\n\nТип `{play}` слідувати заміткою, яку ви хочете грати. Модель: C-D-E-F-G-A-B\nЯк ви можете побачити, що є 7 різних літер, але ми можемо грати більше ніж просто 7 нот.\nВведіть номер мобільного, який Ви вказали при укладаннi договору з банком - для ідентифікації.\nC0 є найнижчою заміткою, яку ви можете грати, B9 є найвищою.\n\n### Exercise\nСпробуйте прикладний код, а потім грати з ним! Чи можна створити власну мелодію?\nУ наступному рівні ви дізнаєтеся, як грати деякі існуючі пісні."
            3:
                example_code: "```\nnotes {is} A4, B4, C4\n{play} notes {at} {random}\n{play} notes {at} {random}\n{play} notes {at} {random}\n```\n"
                story_text: "Створіть випадкову мелодію! \n\n### Вправи\nУ прикладі коду створюється випадкова мелодія, але вона дуже коротка і не використовує багато нот. \nДодайте більше нот до списку та створіть довшу мелодію, скопіювавши останній рядок ще кілька разів.\n"
            5:
                example_code: "```\nanswer {is} {ask} 'Яка столиця Зімбабве?'\n{if} відповідь {is} Хараре {play} C6\n_\n```\n"
                story_text: "Вам не завжди потрібно використовувати команду `{play}`, щоб відтворити цілу пісню, іноді потрібно відтворити лише одну ноту. \nНаприклад, якщо ви хочете провести вікторину, ви можете зіграти щасливу високу ноту, якщо відповідь правильна, і сумну низьку, якщо відповідь неправильна. \n\n### Вправи\nЗавершіть перше запитання, додавши рядок коду, який відтворює ноту C3, якщо дається неправильна відповідь. \nТоді придумайте ще 3 запитання, щоб додати до цього тесту.\n"
            2:
                story_text: "### Вправи\nЗакінчуй пісні! Ми почали коди для деяких мелодій.\n"
                example_code: "```\n{print} Старий Мак Дональд мав ферму\n{play} C5\n{play} C5\n{play} C5\n{play} G4\n{play} A4\n{play} A4\n{play} G4\n```\n"
                story_text_2: Як бачите, ви також можете використовувати команду `{sleep}`, щоб додати невелику паузу в пісню.
                example_code_2: "```\n{print} Мерехтить Мерехтить маленька зірка\n{play} C\n{play} C\n{play} G\n{play} G\n{play} A\n{play} A\n{play} G\n{sleep} 1\n{play} F\n{play} F\n```\n"
            4:
                story_text: "Використовуйте команду `{clear}`, щоб створити караоке!\n\n### Вправи\nЗакінчіть караоке-версію пісні «У Мері було маленьке ягня».\nПотім створіть караоке-версію будь-якої пісні, яку хочете!\n"
                example_code: "```\n{print} 'Mary had a little lamb'\n{play} E\n{play} D\n{play} C\n{play} D\n{play} E\n{play} E\n{play} E\n{clear}\n{print} 'Little lamb, little lamb'\n{play} D\n{play} D\n{play} D\n{play} E\n{play} E\n{play} E\n{clear}\n{print} 'Mary had a little lamb'\n{play} E\n```\n"
            12:
                story_text: "Використовуйте функції у своїх піснях! Як ви можете бачити в прикладі коду, ви можете створити функцію для кожного рядка Twinkle Twinkle Little Star. Після того, як ви запрограмували перші три рядки, все, що вам потрібно зробити, це викликати функції в тому порядку, в якому ви хочете їх відтворювати. \n\n### Вправи\nЗакінчіть пісню Twinkle Twinkle Little Star. \nПотім подивіться на всі пісні, які ви запрограмували на попередніх рівнях, чи можете ви зробити ці коди кращими та коротшими за допомогою функцій?\n"
                example_code: "``` \n{define} перший_рядок \n    {play} C \n    {play} C \n    {play} Г \n    {play} Г \n    {play} А \n    {play} А \n    {play} Г \n    {sleep}\n\n{define} другий_рядок \n    {play} Ф \n    {play} Ф \n    {play} E \n    {play} E \n    {play} D \n    {play} D \n    {play} C \n    {sleep}\n\n{define} третій_рядок \n    {play} Г \n    {play} Г \n    {play} Ф \n    {play} Ф \n    {play} E \n    {play} E \n    {play} D \n    {sleep}\n\n{call} _\n{call} _\n{call} _\n{call} _\n{call} _\n{call} _\n```\n"
            16:
                example_code: "```\n{define} пісня\n    {play} _\n\nyes_or_no = {ask} «Хочеш почути мою нескінченну пісню?»\n{while} yes_or_no = 'так'\n    {call} пісня\n    {print} '🥳'\n```\n"
                story_text: "**Попередження** Ця пригода може стати надзвичайно дратівливою!\nМи також можемо використовувати команду `{while}`, щоб вічно повторювати пісню.\n\n### Вправи\nЗакінчіть нескінченну пісню.\n"
            8:
                story_text: "Використання команди `{repeat}` може зробити коди для мелодій набагато коротшими! \n\n### Вправи\nЗавершіть код для Twinkle Twinkle Little Star, використовуючи команду `{repeat}`. \nПотім поверніться до пісень, створених на попередніх рівнях. Чи можете ви також скоротити ці коди?\n"
                example_code: "```\n{print} «Мерехтить маленька зірка»\n{repeat} 2 {times} {play} C4\n{repeat} 2 {times} {play} G4\n_\n```\n"
            10:
                example_code: "``` \nfirst_time = так \n{repeat} 2 {times}\n    {repeat} 2 {times}\n        {play} C \n    {play} D \n    {play} C \n    {if} first_time {is} так \n        {play} Ф \n        {play} E \n        first_time {is} ні \n    {else}\n        _ \n```\n"
