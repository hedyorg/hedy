                    ### Übung
                    Wir können auch ein Orakel im Harry Potter Stil machen. Fülle die Leerstellen aus, so dass 9 Zeilen ausgegeben werden.
                    **Extra** Ändere die Sil des Orakels in dein Lieblingsbuch, -film oder -serie.
