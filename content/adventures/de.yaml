                    _
                    ```
                    Hinweis für die Flaggen:
                    ```
                    land = {ask} 'Von welchem Land willst Du die Flagge sehen?'
                    {if} land {is} 'Deutschland'
                        farbe_1 = Rot
                        farbe_2 = Weiß
                        farbe_3 = Schwarz
                    ```
            10:
                story_text: |
                    ### Übung
                    Mache die Zeichnungen mit der Schildkröte nach!

