                    ### Exercise 2
                    Manchmal haben Berechnungen mehrere korrekte Antworten. Beispielsweise kann 10 durch 5 und durch 2 geteilt werden. Die Frage "Welche Zahl teilt 10?" kann also von 2 und von 5 beantwortet werden.
                    Fragen Sie nach einer Berechnung, die mehrere korrekte Antworten hat, fragen Sie den Spieler, ihn zu beantworten, und bestimmen Sie, ob es korrekt ist mit `{or}`.
                    Leeren Sie das Programmierfeld und erstellen Sie Ihre eigene Lösung.
