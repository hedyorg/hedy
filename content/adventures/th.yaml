                story_text: |
                    ### แบบฝึกหัด
                    วาดรูปนี้ขึ้นใหม่ด้วยเจ้าเต่า!

                    **เพิ่มเติม** ตัวเลขในวงเล็บคือจำนวนบรรทัดของโค้ดที่ใช้ในการวาด หนูสามารถเขียนโค้ดที่ใช้จำนวนบรรทัดตามที่กำหนดได้ไหม?

                    **เพิ่มเติม** ให้ผู้เล่นเลือกว่าอยากวาดธงของประเทศอะไร

