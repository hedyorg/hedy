    calculator_2:
        levels:
            10:
                story_text: |
                    ### แบบฝึกหัด 1
                    มาทำให้โปรแกรมฝึกหัดยากขึ้นสักหน่อย คราวนี้ผู้เล่นต้องตอบคำถาม 2 คำถามให้ถูกต้อง จงเติมช่องว่างเพื่อทำให้โปรแกรมสมบูรณ์

                    ### แบบฝึกหัด 2
                    บางครั้งสามารถมีคำตอบที่ถูกต้องได้หลายคำตอบในการคำนวณ ตัวอย่างเช่น 10 สามารถหารด้วย 5 และ 2 ลงตัว ดังนั้นคำถามว่า 'เลขอะไรหาร 10 ลงตัว?' สามารถตอบ 2 หรือ 5 ก็ได้
                    ถามคำถามคณิตศาสตร์ที่มีคำตอบที่ถูกต้องหลายคำตอบ ถามให้ผู้เล่นตอบ และประเมินว่าคำตอบถูกต้องหรือไม่ด้วยการใช้ `{or}`
                    ลบโค้ดโปรแกรมแล้วสร้างวิธีแก้ปัญหาด้วยตนเอง
                example_code: |
                    ```
                    answer1 = {ask} '10 x 7 ได้เท่าไหร่?'
                    answer2 = {ask} '6 x 7 ได้เท่าไหร่?'
                    {if} _ _ _ _ _ _ _
                        {print} _
                    ```
            15:
                story_text: |
                    ### แบบฝึกหัด 2
                    **นี่คือส่วนที่สองของการผจญภัย**การผจญภัยเริ่มต่อจากการผจญภัยที่ผ่านมา
                    แน่นอนว่า หนูไม่ได้ต้องการจะคำนวณค่าเฉลี่ยจากการสอบ 4 ครั้งเสมอไป หนูอาจจะอยากคำนวณค่าเฉลี่ยของการสอบ 10 ครั้ง หรือแค่ 2 ครั้ง
                    เราสามารถจัดการปัญหานี้ด้วยการเพิ่ม argument และตัวแปร 'amount_of_tests'.
                    * เริ่มบรรทัดใหม่ตรงบรรทัดที่ 3 กำหนดค่า argument ของ amount_of_tests ด้วยการถามนักเรียนว่าได้ทำการสอบกี่ครั้ง
                    * เปลี่ยนเลข 4 ในบรรทัดที่ 4 เป็น argument ใหม่ของ amount_of_tests
                    * ท้ายที่สุดเปลี่ยนเลข 4 ในบรรทัดที่ 6 เป็น amount_of_tests

                    ลองใช้งานโปรแกรมใหม่ของเธอดูว่าทำงานหรือไม่?

                    ### แบบฝึกหัด 3
                    อยากทำให้โปรแกรมดีขึ้นกว่านี้อีกไหม? เยี่ยม! ในโปรแกรมก่อนหน้านี้หนูคำนวณได้แค่เกรดเฉลี่ยของวิชาหนึ่งเท่านั้น แต่จะดีกว่าไหมถ้าหนูสามารถคำนวณเกรดเฉลี่ยจากกี่วิชาก็ได้ที่ต้องการ!
                    เราจะไม่บอกว่าต้องทำยังไง แต่เรามีคำแนะนำให้ก็คือ: เริ่มโค้ดในบรรทัดที่ 1 ด้วย: {define} calculate_mean_grade {with} subject
                example_code: |
