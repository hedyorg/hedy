                        {print}(drink, ' ', number_of_drinks, ' แก้ว')

                    {print}('ยินดีต้อนรับสู่ร้านพิซซ่าเฮดี้')
                    more_food = {input}('เธออยากสั่งพิซซ่าใช่ไหม?')
                    {while} more_food == 'ใช่':
                        food_order()
                        more_food = {input}('เธออยากสั่งพิซซ่าไหม?')
                    more_drinks = {input}('เธอต้องการเครื่องดื่มไหม?')
                    {while} more_drinks == 'ใช่':
                        drink_order()
                        more_drinks = {input}('เธอต้องการสั่งเครื่องดื่มเพิ่มไหม?')

                    {print}('ขอบคุณที่ใช้บริการ!')
                    ```
        name: การดีบัค
        default_save_name: การดีบัค
        description: การผจญภัยเพื่อเรียนรู้การดีบัค
    dice:
        levels:
            3:
                story_text: |
                    ในเลเวลนี้เราสามารถเลือกของจากรายการได้ด้วยการกำหนดให้คอมพิวเตอร์เลือกด้านของลูกเต๋า
                    ลองดูบอร์ดเกมที่อยู่ในตู้เสื้อผ้าที่บ้านดูสิ
                    มีเกมที่มีลูกเต๋า (พิเศษ) หรือเปล่า? หนูสามารถเลียนแบบมาใช้ในโค้ดได้นะ
                    ตัวอย่างเช่นในเกม Earthworms ลูกเต้าจะมีด้านที่เป็นตัวเลข 1 - 5 และรูปไส้เดือน

                    ![ลูกเต๋าของเกม Earthworms ที่มีตัวเลข 1 -5 และรูปไส้เดือน](https://cdn.jsdelivr.net/gh/felienne/hedy@24f19e9ac16c981517e7243120bc714912407eb5/coursedata/img/dobbelsteen.jpeg)
                example_code: |
                    ```
                    choices {is} 1, 2, 3, 4, 5, ไส้เดือน
                    {print} เธอทอยได้ _ {at} {random} !
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    ลูกเต๋าในตัวอย่างเป็นลูกเต๋าที่ทำมาสำหรับเกมหนึ่งโดยเฉพาะ ลองทำลูกเต๋าปกติดูไหม?
                    หรือจะลองทำลูกเต๋าพิเศษสำหรับเกมอื่นดีล่ะ?
                example_code_2: |
                    ```
                    choices {is} _
                    ```
            4:
                story_text: |
                    ในเลเวลนี้หนูสามารถสร้างลูกเต๋าได้ แต่คราวนี้ลองทำขึ้นมาเองโดยไม่มีโค้ดตัวอย่างดู!

                    ### แบบฝึกหัด
                    จงสร้างลูกเต๋าของหนูขึ้นมาในเลเวลนี้
                    คำแนะนำ: ถ้าไม่รู้ว่าจะสร้างลูกเต๋ายังไง ให้ลองดูลูกเต๋าที่สร้างขึ้นมาในเลเวลก่อนหน้า แต่อย่าลืมใส่เครื่องหมายคำพูดล่ะ
            5:
                story_text: |
                    เราจะเพิ่มคำสั่ง `{if}` และ `{else}` ให้กับลูกเต๋ากัน!

                    ### แบบฝึกหัด
                    ทำให้โค้ดตัวอย่างเสร็จสมบูรณ์จนกว่าโค้ดจะแสดงผลว่า "เธอเลิกทอยเต๋าได้แล้ว" หลังจากหนูทอยได้ไส้เดือน และโปรแกรมควรจะแสดงผลว่า "เธอต้องทอยใหม่" เมื่อหนูทอยได้ค่าอื่น
                    **เพิ่มเติม** บางทีหนูอาจจะอยากสร้างลูกเต๋าสำหรับเกมอื่นก็ทำได้เลย แต่ต้องสร้างการตอบกลับขึ้นมาเองด้วยนะเช่น 'ใช่' สำหรับ 6 หรือ 'สงสาร' สำหรับค่าอื่น
                example_code: |
                    ```
                    choices {is} 1, 2, 3, 4, 5, ไส้เดือน
                    throw {is} choices {at} {random}
                    {print} 'เธอทอยได้ ' throw
                    _ throw {is} ไส้เดือน {print} 'เธอหยุดทอยได้แล้ว'
                    _ {print} 'เธอต้องทอยใหม่อีกครั้ง!'
                    ```
            7:
                story_text: |
                    หนูสามารถสร้างลูกเต้า Earthworm ขึ้นมาอีกได้ แต่คราวนี้สามารถทำให้โปรแกรมคำนวณแต้มทั้งหมดที่ทอยได้ได้ด้วย
                    หนูอาจจะรู้อยู่แล้วว่าการทอยได้ไส้เดือนจะนับเป็น 5 คะแนนสำหรับเกม Earthworms เพราะงั้นหนูก็สามารถคำนวณคะแนนได้ทันทีหลังจากที่ทอย
                    นี่คือโค้ดที่ใช้คำนวณแต้มจากเต๋าหนึ่งลูก:

                    ### แบบฝึกหัด
                    หนูสามารถเขียนโค้ดที่คำนวณคะแนนจากลูกเต๋า 8 ลูกได้ไหม? เพื่อสร้างโปรแกรมต้องลองคัดลอกโค้ดมาใช้ซ้ำซะหน่อย
                example_code: |
                    ```
                    choices = 1, 2, 3, 4, 5, ไส้เดือน
                    points = 0
                    throw = choices {at} {random}
                    {print} 'เธอทอยได้ ' throw
                    {if} throw {is} ไส้เดือน
                    points = points + 5
                    {else}
                    points = points + throw
                    {print} 'รวมเป็น ' points ' คะแนน'
                    ```
                example_code_2: |
                    เธอสามารถคำนวณคะแนนของลูกเต๋า 8 ลูกได้สำเร็จไหม? นั่นต้องใช้การคัดลอกและวางเยอะพอควรเลยใช่ไหม เรามาทำให้ง่ายขึ้นในเลเวล 7 กันดีกว่า!
            8:
                story_text: |
                    เธอสามารถสร้างลูกเต๋าขึ้นมาอีกได้ในเลเวลนี้. ใช้คำสั่ง `{repeat}` เพื่อให้ทอยเต๋าทั้งมือได้ง่ายขึ้น.

                    ### แบบฝึกหัด
                    ลองทำให้โค้ดตัวอย่างสมบูรณ์ดู! **เพิ่มเติม** ลองคิดถึงเกมที่ใช้ลูกเต๋าและโปรแกรมที่ใช้คำสั่ง `{repeat}`
                example_code: |
                    ```
                    choices = 1, 2, 3, 4, 5, 6
                    _ _ _ _ _ _ _
                    ```
            11:
                story_text: |
                    ### แบบฝึกหัด
                    ผู้เล่นใช้เวลานานเกินไปในการทอยเต๋าหรอ? ในเลเวลนี้เราจะให้เฮดี้ทอยลูกเต๋าพร้อมกันทีเดียวไปเลย!
                    เปลี่ยนชื่อในตัวแปร names เป็นชื่อของเพื่อน ๆ หรือครอบครัว และทำให้โค้ดสมบูรณ์
                example_code: |
                    ```
                    players = แอนน์, จอห์น, เจสซ์
                    choices = 1, 2, 3, 4, 5, 6
                    _ _ _ _
                        {print} player 'ทอยได้ ' choices {at} {random}
                        {sleep}
                    ```
            16:
                story_text: |
                    ### แบบฝึกหัด
                    ในเลเวลนี้ หนูสามารถสร้างเกมขนาดเล็กซึ่งจะต้องทอยเต๋าให้ได้ 6 ให้เร็วที่สุด
                    เราได้เริ่มต้นโค้ดให้แล้ว ที่เหลือหนูต้องเป็นคนจัดการเพิ่มจนเสร็จ!

                    อันดับแรกให้เพิ่มลูป `{while}` ที่เช็คว่าทอยได้ 6 หรือยัง
                    ตราบใดที่ยังทอยไม่ได้ 6 ลูกเต๋าก็จะถูกทอยต่อไปเรื่อย ๆ
                    แสดงผลว่าผู้เล่นทอยได้อะไร
                    นับเพิ่มจำนวนครั้งที่ทอยไป
                    รอสักวินาทีหนึ่งก่อนทอยครั้งต่อไป หรือก่อนเกมจบเพราะทอยได้ 6
                example_code: |
                    ```
                    options = [1, 2, 3, 4, 5, 6]
                    {print} 'ทอยให้ได้ 6 ให้ไวที่สุด!'
                    thrown = 0
                    tries = 0
                    _
                    _
                    _
                    _
                    _
                    {print}('เย้! เธอทอยได้ 6 ภายใน ', tries, ' ครั้ง')
                    ```
        name: ลูกเต๋า
        default_save_name: ลูกเต๋า
        description: สร้างระบบลูกเต๋า
    dishes:
        levels:
            3:
                story_text: |
                    เคยไหมที่เถียงกันว่าใครควรจะเป็นคนล้างจานหรือทิ้งขยะวันนี้?
                    เรามาแก้ปัญหาด้วยการให้คอมพิวเตอร์เลือกให้อย่างยุติธรรมซึ่งเราจะเขียนโปรแกรมกันในเลเวลนี้!
                example_code: |
                    ```
                    people {is} แม่, พ่อ, เอมม่า, โซฟี
                    {print} people {at} {random} ต้องเป็นคนล้างจาน
                    ```
                story_text_2: |
                    ### แบบฝึกหัด 
                    ลองสร้างโปรแกรมหาคนล้างจานในแบบของหนูดู เริ่มแรกเราต้องสร้างรายชื่อสมาชิกในครอบครัวก่อน.
                    หลังจากนั้นดูว่ามีงานบ้านไหนบ้างที่ต้องทำ แล้วให้คอมพิวเตอร์เป็นผู้ตัดสินใจว่าใครต้องทำงานนั้นด้วยการใช้คำสั่ง `{at} {random}`

                    **เพิ่มเติม** ไม่อยากล้างจานหรอ? แฮคโปรแกรมด้วยการเอาชื่อของตัวเองออกจากรายชื่อด้วยคำสั่ง `{remove}` `{from}`
            4:
                story_text: |
                    เราทำให้โปรแกรมหาคนล้างจางดีขึ้นด้วยการใช้เครื่องหมายคำพูด

                    ### แบบฝึกหัด
                    อย่างแรก เติมสัญลักษณ์หรือคำสั่งที่ถูกต้องในช่องว่างเพื่อทำให้โปรแกรมตัวอย่างทำงาน
                    เข้าใจนะ? เยี่ยมเลย! จากนั้นคัดลอกโค้ดของหนูจากเลเวลก่อนหน้าแล้วทำให้มันทำงานในเลเวลนี้ด้วยการเพิ่มเครื่องหมายคำพูดให้ถูกตำแหน่ง
                example_code: |
                    ```
                    people {is} แม่, พ่อ, เอมม่า, โซฟี
                    {print} _ จานจะถูกล้างโดย _
                    {sleep}
                    {print} people {at} _
                    ```
            5:
                story_text: |
                    ด้วยคำสั่ง `{if}` หนูสามารถเล่นสนุกกับตัวเลือกในโปรแกรมมากขึ้น. หนูสามารถให้โปรแกรมตอบสนองต่อตัวเลือกที่คอมพิวเตอร์ได้ตัดสินใจ
                    ### แบบฝึกหัด
                    หนูสามารถทำให้โค้ดสมบูรณ์เพื่อให้มันแสดงผลว่า 'แย่จัง' เมื่อถึงรอบของหนูและ 'ใช่เลย!' สำหรับกรณีอื่น
                    อย่าลืมเครื่องหมายคำพูด!
                example_code: |
                    ```
                    people {is} แม่, พ่อ, เอมม่า, โซฟี
                    dishwasher {is} people {at} {random}
                    _ dishwasher {is} โซฟี {print} _ แย่จังนะที่ฉันต้องล้างจาน _
                    _ {print} 'ไม่มีจานที่ต้องล้างเพราะ' _ 'ได้ล้างจานทั้งหมดแล้ว'
                    ```
            7:
                story_text: |
                    แต่ละคนต้องล้างจานบ่อยแค่ไหน? ยุติธรรมไหม? เรามานับกันในเลเวลนี้ดีกว่า
                example_code: |
                    ```
                    people = แม่, พ่อ, เอมม่า, โซฟี
                    emma_washes = 0
                    dishwasher = people {at} {random}
                    {print} 'คนที่ต้องล้างจานคือ' dishwasher
                    {if} dishwasher {is} เอมม่า
                    emma_washes = emma_washes + 1
                    {print} 'สัปดาห์นี้เอมม่าต้องล้างจาน ' emma_washes ' ครั้ง'
                    ```

                    หนูสามารถคัดลอกโค้ดบรรทัดที่ 3 - 5 ซ้ำ ๆ (เช่นสัก 7 ครั้ง) เพื่อคำนวณสำหรับทั้งสัปดาห์
                    ได้ทำให้โค้ดนับสำหรับทั้งสัปดาห์หรือยัง?
                story_text_2: |
                    ถ้าโชคร้ายมาก ๆ โปรแกรมก่อนหน้าอาจจะเลือกให้หนูเป็นคนล้างจานทั้งสัปดาห์เลย นั่นไม่ยุติธรรมเลยเนอะ
                    เพื่อสร้างระบบที่ยุติธรรมเราสามารถใช้คำสั่ง `{remove}` เพื่อลบคนที่กำหนดออกจากรายชื่อ แบบนี้ระบบจะไม่เลือกให้หนูล้างจานอีกจนกว่าทุกคนจะได้ล้างจานแล้ว

                    วันจันทร์และอังคารได้ถูกเตรียมไว้แล้ว หนูลองเพิ่มจนครบทั้งสัปดาห์ดูนะ
                    และ...ลองดูว่าจะแก้ปัญหายังไงถ้ารายชื่อไม่เหลือใครแล้ว?
                example_code_2: |
                    ```
                    people = แม่, พ่อ, เอมม่า, โซฟี
                    dishwasher = people {at} {random}
                    {print} 'คนล้างจานวันจันทร์คือ: ' dishwasher
                    {remove} dishwasher {from} people
                    dishwasher = people {at} {random}
                    {print} 'คนล้างจานวันอังคารคือ: ' dishwasher
                    {remove} dishwasher {from} people
                    ```
            8:
                story_text: |
                    ด้วยการใช้ `{repeat}` หนูสามารถใช้งานโค้ดซ้ำ ๆ ได้ ซึ่งจะทำให้คนวณว่าใครต้องเป็นคนล้างจานสำหรับหลายๆ วันได้!
                    ### แบบฝึกหัด
                    ใช้คำสั่ง `{repeat}` เพื่อเลือกว่าใครต้องล้างจานสำหรับทั้งสัปดาห์ ช่องว่างแต่ละอันต้องถูกเติมด้วยคำสั่งหรือตัวเลข!
                    **เพิ่มเติม** ลองคิดถึงงานบ้านอื่นๆดูไหม? แล้วปรับโค้ดให้มันตัดสินว่าใครต้องทำงานบ้านสัก 3 อย่าง อย่าลืมแสดงผลว่ามันกำลังตัดสินใจงานไหน!
                example_code: |
                    ```
                    people = แม่, พ่อ, เอมม่า, โซฟี
                    {repeat} _ _ {print} 'ผู้รับผิดชอบงานล้างจานคือ ' _ _ _
                    ```
            11:
                story_text: |
                    ในเลเวลนี้ หนูสามารถสร้างตารางสัปดาห์ได้ง่าย ๆ!

                    ### แบบฝึกหัด
                    เพิ่มงานบ้านที่ 2 เช่นงานดูดฝุ่นหรืองานเก็บกวาด แล้วทำให้งานถูกกระจายเท่า ๆ กันตลอดสัปดาห์
                    <br> **เพิ่มเติม** โปรแกรมไม่ยุติธรรม หากโชคร้ายหนูอาจต้องล้างจานทั้งสัปดาห์ หนูต้องทำยังไงเพื่อให้โปรแกรมยุติธรรมขึ้น?
                example_code: |
                    ```
                    days = วันจันทร์, วันอังตาร, วันพุธ, วันพฤหัส, วันศุกร์, วันเสาร์, วันอาทิตย์
                    names = แม่, พ่อ, เอมม่า, โซฟี
                    {for} day {in} days
                        {print} names {at} {random} 'ต้องล้างจาน' day
                    ```
        name: จานชาม?
        default_save_name: จานชาม
        description: ใช้คอมพิวเตอร์หาคำตอบว่าใครเป็นคนล้างจาน
    elif_command:
        levels:
            6:
                story_text: |
                    ในเลเวลนี้หนูสามารถใช้คำสั่งใหม่: `{elif}` ได้ `{elif}`คือคำสั่งที่รวม `{else}` และ `{if}` เข้าด้วยกัน ซึ่งจะทำให้หนูสร้างตัวเลือกที่มี 3 ตัวเลือกขึ้นไปได้
                    ลองดูอันนี้!
                    ### แบบฝึกหัด
                    สร้างวงล้อสุ่มของหนูเอง ซึ่งมีรางวัลที่หลากหลายและการตอบโต้ที่สอดคล้องกัน
                example_code: |
                    ```
                    prizes {is} เงินหนึ่งล้านบาท, พายแอปเปิล, ไม่ได้อะไร
                    your_prize {is} prizes {at} {random}
                    {print} 'เธอได้รางวัล' your_prize
                    {if} your_prize {is} 'เงินหนึ่งล้านบาท'
                    {print} 'เย้! เธอรวยเละเลย!'
                    {elif} your_prize {is} 'พายแอปเปิล'
                    {print} 'น่ากินนะ พายแอปเปิล!'
                    {else}
                    {print} 'โชคร้ายจังนะ..'
                    ```
        name: '{elif}'
        default_save_name: elif
        description: คำสั่ง {elif}
    for_command:
        levels:
            11:
                story_text: |-
                    ## For
                    ในเลเวลนี้เราจะเรียนโค้ดใหม่ที่เรียกว่า `{for}`. ด้วย`{for}` หนูสามารถสร้างรายการขึ้นมาแล้วใช้งานมันทั้งหมด.
                    `{for}` สร้างบล็อกขึ้นมา, เหมือน`{repeat}` และ `{if}` เพราะฉะนั้นทุกบรรทัดในบล็อกจะต้องเริ่มด้วยการเว้น 4 ช่อง
                example_code: |
                    ```
                    animals = สุนัข, แมว, บล็อบฟิช
                    {for} animal {in} animals
                        {print} 'ฉันรัก' animal
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    ทำโค้ดให้สมบูณณ์ด้วยการเพิ่ม `{for} action {in} actions` ตรงบรรทัดที่ 2.
                example_code_2: |
                    ```
                    actions = ปรบมือพลัน, กระทืบเท้าพลัน, ส่งเสียงดัง!
                    _
                        {repeat} 2 {times}
                            {print} 'หากพวกเรากำลังสบายจง' action
                            {sleep} 2
                        {print} 'หากพวกเรากำลังมีสุข ปลดเปลื้องทุกข์ใด ๆ ทุกสิ่ง'
                        {print} 'หากพวกเรากำลังสบายจง' action
                        {sleep} 3
                    ```
            13:
                story_text: |
                    ท้ายที่สุดเราจะเปลี่ยน `{for} i {in} {range} 1 {to} 5` ให้เป็นโค้ด Python จริง ๆ แบบนี้:
                example_code: |
                    ```
                    {for} i {in} {range}(1,5):
                        {print} (i)
                    ```
        name: '{for}'
        default_save_name: for
        description: คำสั่ง {for}
    fortune:
        levels:
            1:
                story_text: |
                    เคยไปงานคาร์นิวัลแล้วได้รับการทำนายจากหมอดูหรือเปล่า? หรือเคยเล่น Magic 8 Ball ไหม?
                    งั้นก็คงรู้แล้วว่าพวกนั้นทำนายอนาคตไม่ได้จริง ๆ หรอก แต่มันก็สนุกดี!

                    ในเลเวลต่อจากนี้ หนูจะได้เรียนรู้วิธีสร้างเครื่องทำนายดวงชะตาด้วยตนเอง
                    ในเลเวล 1 เราจะเริ่มกันง่าย ๆ ด้วยการให้ Hedy แนะนำตัวเองว่าเป็นหมอดูแล้วให้เธอ `{echo}` คำตอบของผู้เล่น
                    แบบนี้:
                example_code: |
                    ```
                    _ สวัสดีฉันคือแม่หมอเฮดี้!
                    _ เธอเป็นใคร?
                    _ ไหนให้ฉันลองดูในลูกบอลวิเศษก่อน
                    _ เห็นแล้ว... ฉันเห็น...
                    _ เธอชื่อ
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    คัดลอกโค้ดตัวอย่างไปที่หน้าจอคำสั่งแล้วเติมช่องว่างเพื่อให้โค้ดทำงานปกติ
                    **เพิ่มเติม** แก้ไขโค้ดแล้วให้หมอดูทำนายมากกว่าแค่ชื่อ แต่ทำนายอายุ ทำนายทีมกีฬาที่ชอบ หรืออย่างอื่นเกี่ยวกับตัวหนูเอง
            3:
                story_text: |
                    ในเลเวลก่อนหน้า หนูได้สร้างเครื่องทำนายดวงอันแรก แต่ Hedy ยังไม่สามารถทำนายอะไรได้จริงๆ ทำได้แค่ `{echo}`
                    ในเลเวลนี้ หนูจะต้องใช้ตัวแปรและคำสั่ง `{at} {random}` เพื่อทำให้ Hedy เลือกคำตอบให้กับเธอได้ ลองดูโค้ดนี้เป็นตัวอย่าง:
                example_code: |
                    ```
                    {print} ฉันคือแม่หมอเฮดี้!
                    question {is} {ask} เธออยากรู้เรื่องอะไร?
                    {print} นี่คือสิ่งที่เธออยากรู้: question
                    answers {is} ใช่, ไม่ใช่, อาจจะ
                    {print} ลูกแก้ววิเศษบอกว่า...
                    {sleep} 2
                    {print} answers {at} {random}
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    ตอนนี้เฮดี้ทำได้แค่ตอบว่าใช่ ไม่ใช่ หรืออาจจะ เธอลองทำให้เฮดี้มีตัวเลือกคำตอบเยอะขึ้นดูสิอย่างเช่น 'แน่นอน' หรือ 'ถามอีกครั้ง'
            4:
                story_text: |
                    ### แบบฝึกหัด
                    เราได้ลบเครื่องหมายคำพูดออกจากโค้ดตัวอย่างนี้ หนูใส่มันกลับเข้าไปที่เดิมให้หน่อยได้ไหม?

                    ### แบบฝึกหัด 2
                    กลับไปเลเวลที่แล้วและคัดลอกโค้ดมา จากนั้นทำให้โค้ดทำงานในเลเวลนี้ด้วยการเติมเครื่องหมายคำพูดให้ถูกต้อง
                example_code: |
                    ```
                    _ เติมเครื่องหมายคำพูดในโค้ดนี้ _
                    {print} ฉันคือแม่หมอเฮดี้!
                    question {is} {ask} เธออยากรู้เรื่องอะไร?
                    {print} นี่คือคำถามของเธอ:  question
                    answers {is} ใช่, ไม่ใช่, อาจจะ
                    {print} ลูกแก้ววิเศษบอกว่า...
                    {sleep} 2
                    {print} answers {at} {random}
                    ```
            6:
                story_text: |
                    ### แบบฝึกหัด
                    ในโค้ดตัวอย่างหนูได้เห็นว่าจะทำยังไงเพื่อปรับให้โปรแกรมเข้าข้างหนู โปรแกรมขี้โกงนี้จะบอกเสมอว่าหนูจะถูกหวยแต่เพื่อนของหนูไม่มีวันถูกหวย

                    ใช้สิ่งนี้สร้างโปรแกรมของตัวเอง สร้างสรรค์เข้าไว้! ตัวอย่างเช่นหนูสามารถสร้างโค้ดที่ทำนายว่า:
                    * ทีมกีฬาสุดโปรดของหนูจะชนะคู่แข่งทั้งหมด
                    * หนังเรื่องโปรดของหนูจะถูกเลือกมาดู!
                    * หนูเป็นผู้โชคดีได้ตั๋วไปรายการโปรด!
                    * หนูสวยที่สุดในโลกเหมือนที่กระจกของสโนว์ไวท์บอก
                    ปล่อยให้จินตนาการโลดแล่น!

                    โปรแกรมจะต้องมีโค้ดอย่างน้อย 10 บรรทัด และจะต้องมีคำสั่ง `{if}` และ `{else}` อย่างน้อย 1 ครั้ง
                example_code: |
                    ```
                    friends {is} จอร์แดน, ลูซี่, เดฟ
                    {print} 'ฉันทำนายได้ว่าเธอจะถูกหวยรางวัลที่ 1 หรือไม่พรุ่งนี้!'
                    person {is} {ask} 'เธอคือใคร?'
                    good_answer {is} ว้าว! เธอถูกหวย! เธอถูกหวยแน่ๆ! ผู้ชนะรรางวัลที่ 1!
                    bad_answer {is} โชคไม่ดี! ลองใหม่นะ! คนอื่นจะถูกหวย แต่เธอไม่!
                    {if} person {in} friends
                    {print} bad_answer {at} {random}
                    {else}
                    {print} good_answer {at} {random}
                    ```
            7:
                story_text: |
                    ในเลเวลนี้ หนูใช้คณิตศาสตร์ในการทำนายในฐานะหมอดูได้ คราวนี้ก็สามารถสร้างสูตรทำนายอนาคต (เล่น ๆ) ได้
                    ตัวอย่างเช่น หนูสามารถคำนวณว่าหนูจะรวยแค่ไหน หรือจะมีลูกกี่คนเมื่อโตขึ้น

                    ### แบบฝึกหัด
                    หนูสามารถคิดค้นเครื่องทำนายดวงชะตา (เล่น ๆ) ได้ไหม
                example_code: |
                    ```
                    {print} 'ฉันคือแม่หมอเฮดี้!'
                    {print} 'ฉันทำนายได้นะว่าโตไปเธอจะมีลูกกี่คน!'
                    age = {ask} 'เธออายุเท่าไหร่?'
                    siblings = {ask} 'เธอมีพี่น้องกี่คน?'
                    length = {ask} 'เธอสูงกี่เซนติเมตร?'
                    kids = length / age
                    kids = kids - siblings
                    {print} 'เธอจะมีลูกทั้งหมด ...'
                    {sleep}
                    {print} kids ' คน!'
                    ```
            8:
                story_text: |
                    ### แบบฝึกหัด
                    สร้างโปรแกรมที่จะบอกว่าคนที่เธอแอบชอบชอบเธอรึเปล่าให้เสร็จสมบูรณ์
                example_code: |
                    ```
                    {print} 'ฉันมีดอกไม้ที่มีกลีบดอกที่วิเศษ'
                    {print} 'ถ้าฉันเด็ดกลีบดอกไม้ มันจะบอกฉันว่าคนที่ฉันแอบชอบชอบฉันรึไม่'
                    amount = {ask} 'เธอจะเด็ดกี่กลีบ?'
                    options = เขารักเธอ, เขาไม่ได้รักเธอ
                    _ _ _ _ options {at} {random}
                    ```
            9:
                story_text: |
                    ในตัวอย่างถัดไป เธอจะทำให้โปรแกรมทำนายถามคำถามหลายอย่างและแสดงผลมัน!

                    ### แบบฝึกหัด
                    เติมคำสั่งในช่องว่างให้สมบูรณ์ได้ไหม?
                example_code: |
                    ```
                    {print} 'ฉันคือแม่หมอเฮดี้!'
                    {print} 'เธอถามฉันได้ 3 คำถาม.'
                    answers = ใช่, ไม่ใช่, อาจจะ
                    _ _ _
                       question = {ask} 'อยากรู้เรื่องอะไร?'
                       {print} question
                       {sleep}
                       {print} 'ลูกแก้ววิเศษตอบว่า... ' answers {at} {random}
                    ```
            11:
                story_text: |
                    ในเลเวลนี้หนูจะได้เรียนการโปรแกรมเกม MASH (Mansion, Apartment, Shack, House) ซึ่งเกมนี้จะให้หนูทายอนาคตของผู้เล่นทุกคนพร้อม ๆ กัน

                    ### แบบฝึกหัด
                    เติมคำสั่งใหม่ในช่องว่างที่ได้เรียนมาจากเลเวลนี้
                example_code: |
                    ```
                    houses = แมนชัน อพาร์ตเมนต์, กระท่อม, บ้าน
                    loves = ไม่มีใคร, ราชวงศ์, เพื่อนบ้าน, รักแท้
                    pets = สุนัข, แมว, ช้าง
                    names = เจนน่า, ไรอัน, จิม
                    _
                        {print} name 'จะได้อาศัยอยู่ที่' houses {at} {random}
                        {print} name 'จะได้แต่งงานกับ' loves {at} {random}
                        {print} name 'จะได้' pets {at} {random} 'มาเป็นสัตว์เลี้ยง'
                        {sleep}
                    ```
        name: นักทำนายดวงชะตา
        default_save_name: นักทำนายดวงชะตา
        description: ให้ Hedy ทำนายอนาคตของเธอดูสิ
    functions:
        levels:
            12:
                story_text: |
                    ในเลเวลนี้จะได้เรียนรู้วิธีใช้ **ฟังก์ชัน**. ฟังก์ชันคือบล็อกของโค้ดที่นำมาใช้งานซ้ำ ๆ ได้ การใช้ฟังก์ชันเป็นการจัดระเบียบโค้ดเพื่อให้นำมาใช้งานใหม่ได้ง่าย
                    เราสร้างฟังก์ชันด้วยการใช้ `{define}` พร้อมตั้งชื่อให้ฟังก์ชัน จากนั้นใส่โค้ดในฟังก์ชันในบล็อกที่เว้าเข้าไปอยู่ใต้บรรทัดหลังจาก `{define}`
                    ทิ้งบรรทัดว่างในโค้ดเพื่อให้ดูสะอาดเรียบร้อย เท่านี้ก็สร้างฟังก์ชันเสร็จแล้ว เยี่ยมมาก!

                    ตอนนี้เวลาเราต้องการใช้บล็อกหรือก้อนโค้ดนั้น เราก็ใช้ชื่อของฟังก์ชันได้เลย ไม่ต้องพิมพ์โค้ดทั้งก้อนนั้นใหม่

                    ลองดูตัวอย่างโค้ดของเกมทวิสเตอร์จะเห็นว่าฟังก์ชัน 'turn' มีบล็อกของโค้ดที่จะคอยเลือกว่าจะต้องวางแขนขาตรงจุดไหน

                    ### แบบฝึกหัด
                    ทำให้โค้ดสมบูรณ์ด้วยการสร้างตัวแปร `chosen_limb` และ `chosen_color`.
                    จากนั้นเลือกว่าจะเรียกใช้ฟังก์ชันกี่ครั้งเพื่อทำให้วงล้อทวิสเตอร์หมุน

                    ### แบบฝึกหัด 2
                    พัฒนาโค้ดด้วยการเพิ่มตัวแปร 'people' และใช้ตัวแปรนี้เพื่อให้ผู้เล่นมีคำสั่งของตัวเองในเกม
                    เช่น: 'อาห์เมด ขยับมือขวาไปสีเขียว' หรือ 'เจสสิก้า ขยับเท้าซ้ายไปสีเหลือง'
                example_code: |
                    ```
                    sides = 'ซ้าย', 'ขวา'
                    limbs = 'มือ', 'เท้า'
                    colors = 'สีแดง', 'สีน้ำเงิน', 'สีเขียว', 'สีเหลือง'

                    {define} next_turn
                        chosen_side = sides {at} {random}
                        chosen_limb = limbs _
                        chosen_color = colors _
                        {print} chosen_limb ' ' chosen_side 'ไปที่' chosen_color

                    {print} 'มาเล่นเกมทวิสเตอร์กัน!'
                    {repeat} _
                        call next_turn
                        {sleep} 2
                    ```
            15:
                story_text: |
                    เธอใช้ฟังก์ชันเป็นแล้ว คราวนี้มาลองใช้ฟังก์ชันแบบมีอาร์กิวเมนต์ (argument)หรือค่าที่ถูกใส่เข้าไปในฟังก์ชัน
                    ** อาร์กิวเมนต์ ** คือตัวแปรที่ถูกใช้ในฟังก์ชันเท่านั้น มันจะไม่ถูกใช้นอกฟังก์ชัน

                    ยกตัวอย่างโค้ดนี้ที่เราได้ทำไว้สำหรับท่อนแรกของเพลง 'My Bonnie is over the ocean'
                    ในโค้ดตัวอย่างนี้อาร์กิวเมนต์คือ 'place' ซึ่งเป็นตัวแปรที่ใช้ในฟังก์ชันเท่านั้น
                    การจะใช้ 'place' เราต้องวาง `place` ตามหลัง `{define} song`
                    เมื่อฟังก์ชันถูกเรียกใช้ คอมพิวเตอร์จะแทนที่อาร์กิวเมนต์ 'place' ด้วยข้อความที่ตามหลัง ` song {with}`

                    ### แบบฝึกหัด
                    ท่อนต่อไปของเพลงคือ:

                    ```ไม่ใช่โค้ดของ Hedy
                    Last night as I lay on my pillow
                    Last night as I lay on my bed
                    Last night as I lay on my pillow
                    I dreamed that my Bonnie is dead
                    ```

                    เธอลองเขียนโปรแกรมท่อนนี้ให้เหมือนกับในตัวอย่างดูได้ไหม?
                example_code: |
                    ```
                    {def} song(place):
                        {print} ('My Bonnie is over the ', place)

                    song('ocean')
                    song('sea')
                    song('ocean')
                    ```
                story_text_2: |
                    ในเลเวลก่อนหน้าเธอได้เรียนวิธีสร้างฟังก์ชันและการใช้อาร์กิวเมนต์แล้ว การใช้งานฟังก์ชันอีกอย่างคือให้มันคำนวณบางอย่างให้
                    หนูสามารถกำหนดให้ฟังก์ชันเป็นการคำนวณ และมันจะให้คำตอบของการคำนวณนั้น เราเรียกคำตอบนี้ว่า 'ค่าที่ส่งกลับ (return value)' 

                    ตัวอย่างเช่น ในโค้ดนี้ฟังก์ชัน calculate_new_price จะคำนวณราคาใหม่ของไอเทมใดๆก็ตาม และมันจะส่งคืนค่าราคาใหม่มาให้

                    ### แบบฝึกหัด
                    เขียนโค้ดให้สมบูรณ์ เราสร้างตัวแปร new_price ให้แล้ว เธอแค่ต้องตั้งค่ามันให้เรียบร้อย
                    โค้ดจะสมบูรณ์ถ้าเธอเรียกฟังก์ชันแล้วมันคำนวณราคาใหม่กลับมาให้
                example_code_2: |
                    ```
                    {def} calculate_new_price(amount, percentage):
                        percentage = percentage / 100
                        discount_amount = amount * percentage
                        {return} amount - discount_amount

                    old_price = {input} ('ราคาบนป้ายคือเท่าไหร่?')
                    discount = {input} ('ส่วนลดกี่เปอร์เซนต์?')

                    new_price = _ calculate_new_price(old_price, _)
                    {print}('ราคาใหม่คือ ', new_price, ' บาท')
                    ```
                story_text_3: |
                    คราวนี้มาเขียนฟังก์ชันแบบ Python กัน ในการกำหนดฟังก์ชัน เราจะไม่ใช้:

                    `{define} name_function {with} argument_1, argument_2):`

                    แต่จะใช้:

                    `{def} name_function(argument_1, argument_2):`.

                    ถ้าไม่อยากใช้อาร์กิวเมนต์ สามารถปล่อยวงเล็บว่างได้เลย
                example_code_3: |
                    ```
                    {def} calculate_score(answer, correct_answer):
                        {if} answer == correct_answer:
                            score = 1
                        {elif} answer == '?':
                            score = 0
                        {else}:
                            score = -1
                        {return} score

                    answer = {input} ('หอไอเฟลอยู่ที่ไหน?')
                    correct_answer = 'ปารีส'
                    score = calculate_score(answer, correct_answer)
                    {print} ('คะแนนของเธอคือ... ', score)
                    ```
        name: ฟังก์ชัน
        default_save_name: ฟังก์ชัน
        description: ฟังก์ชัน
    guess_my_number:
        levels:
