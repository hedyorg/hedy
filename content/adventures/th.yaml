            11:
                story_text: |
                    ### แบบฝึกหัด
                    วาดรูปนี้ขึ้นใหม่ด้วยเจ้าต่า!

                    <div class="w-full flex flex-row gap-2">
                    หกเหลี่ยมซ้อนกัน <img src="https://github.com/hedyorg/hedy/assets/80678586/3629e908-3cd5-44ac-bbcd-1f1cceb15654" width="150">
                    ไฟจราจร <img src="https://github.com/hedyorg/hedy/assets/80678586/edbbb608-5ff8-4349-85a6-e47809adde43" width="100">
                    </div>
                example_code: |
                    คำใบ้การวาดหกเหลี่ยมซ้อนกัน:
                    ```
                    distances = 100, 80, 60, 40, 20
                    {for} distance {in} distances
                    _
                    ```

                    คำใบ้การวาดไฟจราจร:
                    ```
                    colors = red, yellow, green
                    {for} chosen_color {in} colors
                        {color} _
                        {repeat} _
                    ```
                story_text_2: |
                    ไฟคริสต์มาส <img src="https://github.com/hedyorg/hedy/assets/80678586/9637ea6d-6edc-4d88-a6f7-10271bfc5371" width="500">
                example_code_2: |
                    คำใบ้การวาดไฟคริสต์มาส:

                    เริ่มจากการขยับไปทางซ้ายของจอด้วยเส้นสีขาวล่องหน แล้วค่อยเริ่มแขวนไฟคริสต์มาส!
                    ```
                    {color} white
                    {turn} -90
                    {forward} 300
                    {turn} 90

                    colors = red, blue, yellow, purple, green, orange, pink
                    {for} chosen_color {in} colors
                    _
                    ```
            12:
                story_text: |
                    ### แบบฝึกหัด
                    วาดรูปนี้ขึ้นใหม่ด้วยเจ้าต่า!

                    อันดับแรกให้กำหนดฟังก์ชัน **สำหรับแต่ละรูปทรง** ที่จะใช้บนกำไลข้อมือ จากนั้นเพิ่มรูปทรงเข้าไปบนกำไลข้อมือดังนี้:

                    โปรแกรมออกแบกำไลมือ <img src="https://github.com/hedyorg/hedy/assets/80678586/549d7f3a-c492-4b4a-b173-746eb3400951" width="500">
                example_code: |
                    คำใบ้การสร้างโปรแกรมออกแบบกำไลมือ
                    ```
                    {define} draw_a_square
                    _

                    {color} white
                    {turn} -90
                    {forward} 300
                    {turn} 180

                    {for} i {in} {range} 1 {to} 5
                        {color} gray
                        {forward} 100
                        shape = {ask} 'อยากให้มีรูปทรงอะไรอีกบนกำไล?'
                        chosen_color = {ask} 'ใช้สีอะไร? (ตอบเป็นภาษาอังกฤษ)'
                        {color} chosen_color
                        {if} shape = 'สี่เหลี่ยม'
                            {call} draw_a_square
                    ```
            15:
                story_text: |
                    ### แบบฝึกหัด
                    สร้างโปรแกรมที่ถามผู้เล่นว่าอยากให้รูปทรงมีกี่มุมแล้วสร้างรูปทรงนั้น
                    รูปทรงในรูปคือผลลัพธ์เมื่อผู้เล่นกรอกเลข 10

                    <div class="w-full flex flex-row gap-2">
                     <img src="https://github.com/hedyorg/hedy/assets/80678586/ee32f40e-dea1-4e7c-a813-3ef63671254b" width="300">
                     <img src="https://github.com/hedyorg/hedy/assets/80678586/3621bf77-527d-41e8-a44f-c5a21bb4ffd2" width="200">
                    </div>
                example_code: |
                    ```
                    {define} calculate_degrees(amount_of_corners)
                        _ 360 / amount_of_corners


                    {define} draw_figure(degrees)
                        _
                            {forward} 400/amount_of_corners
                            {turn} _

                    amount_of_corners = {ask} _
                    degrees = _(_)

                    _ {with}
                    _ {with}
                    ```
            16:
                story_text: |
                    ### แบบฝึกหัด
                    วาดรูปนี้ขึ้นใหม่ด้วยเจ้าเต่า!

                    รูปทรงขดม้วน <img src="https://github.com/hedyorg/hedy/assets/80678586/6943223c-018b-435b-a391-23723cc7a6ad" width="150">
                story_text_2: |
                    พัด <img src="https://github.com/hedyorg/hedy/assets/80678586/cb671065-b47b-49f0-b298-dcbcd2a5e28f" width="150">
                example_code: |
                    รูปทรงขดม้วน
                    ```
                    distance = 5
                    {while} distance < 200
                        distance = distance + 5
                         _
                    ```
                example_code_2: |
                    พัด
                    ```
                    {define} draw_a_square(side)
                    _

                    i = 100
                    {while} i > 1
                        _(i)
                        _
                        i = i - 3
                    ```
                story_text_3: |
                    ดวงดาว <img src="https://github.com/hedyorg/hedy/assets/80678586/17564e0a-63e1-4794-8d41-15ac8c1a5a93" width="150">
                example_code_3: |
                    ดวงดาว
                    ดวงดาวถูกวาดด้วยการใช้ทิศการหัน 144 องศา แต่ถ้าหนูเปลี่ยนมันเป็น 143 องศาแล้วให้โค้ดทำงานซ้ำไปเรื่อย ๆ ด้วยลูป {while} จะได้เป็นรูปนี้
        name: วาดรูปกัน!
        default_save_name: วาดรูปกัน
        description: วาดรูปนี้ด้วยเจ้าเต่า
    while_command:
        levels:
            16:
                story_text: |-
                    เราจะมาเรียนลูปใหม่ที่ชื่อ `{while}` ซึ่งทำให้โค้ดทำงานเป็นวงจรไปเรื่อยๆตราบใดที่คำสั่งยังเป็นจริง
                    เพราะงั้นอย่าลืมแก้ค่าในลูปนะ

                    ในโค้ดตัวอย่าง โค้ดจะทำงานจนกว่าจะได้รับคำตอบที่ถูกต้อง
                    ถ้าไม่ได้คำตอบที่ถูกต้อง ลูปจะไม่มีวันจบลง
                example_code: |
                    ```
                    answer = 0
                    {while} answer != 25
                        answer = {ask} 5 x 5 เท่ากับเท่าไหร่?'
                    {print} 'ได้รับคำตอบที่ถูกต้องแล้ว'
                    ```
        name: '{while}'
        default_save_name: คำสั่ง_while
        description: '{while}'
    years:
        levels:
            9:
                story_text: |
                    นับถอยหลังเข้าสู่ปีใหม่

                    ### แบบฝึกหัด
                    เติมคำในช่องว่างเพื่อทำให้โค้ดสมบูรณ์
                example_code: |
                    ```
                    number = 10
                    {repeat} _
                        {print} number
                        {sleep}
                        number = number - 1
                    {print} 'สวัสดีปีใหม่!'
                    ```
        name: ปีใหม่
        default_save_name: นับถอยหลังเข้าสู่ปีใหม่
        description: นับถอยหลังเข้าสู่ปีใหม่!
