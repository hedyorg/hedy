    harry_potter:
        levels:
            11:
                story_text: |
                    ### แบบฝึกหัด
                    เราสามารถทำโปรแกรมทำนายดวงในธีมแฮร์รี่ พอตเตอร์ได้ เติมช่องว่างเพื่อให้ทั้ง 9 บรรทัดถูกแสดงผล
                    **เพิ่มเติม** เปลี่ยนธีมของโปรแกรมทำนายดวงเป็นธีมอื่นเช่น หนังสือ, ภาพยนตร์ หรือรายการเรื่องโปรด
                example_code: |
                    ```
                    houses = กริฟฟินดอร์, สลิธีริน, ฮัฟเฟิลพัฟ, เรเวนคลอ
                    subjects = วิชาปรุงยา, วิชาป้องกันตัวจากศาสตร์มืด, วิชาคาถา, วิชาแปลงกาย
                    fears = โวลเดอมอร์, แมงมุม, สอบ OWL ไม่ผ่าน
                    names = แฮร์รี่, รอน, เฮอร์ไมโอนี่
                    _
                    _ {print} name 'ได้อยู่บ้าน' houses {at} {random}
                    _ {print} name 'เชี่ยวชาญ' subjects {at} {random}
                    _ {print} name 'มีสิ่งที่กลัวที่สุดคือ' fears {at} {random}
                    ```
        name: แฮร์รี่ พอตเตอร์
        default_save_name: แฮร์รี่ พอตเตอร์
        description: การผจญภัยของ แฮร์รี่ พอตเตอร์
    haunted:
        levels:
            1:
                story_text: |
                    ในการผจญภัยนี้ หนูกำลังจะสร้างเกมที่หนูจะต้องหนีออกจากบ้านผีสิงด้วยการเลือกประตูที่ถูกต้อง
                    ถ้าหนูเลือกประตูที่ถูกต้องหนูจะรอด แต่ถ้าไม่ล่ะก็เจ้าอสูรร้ายตัวนั้นมันก็จะ...

                    ในเลเวล 1 เราจะเริ่มเกมบ้านผีสิงด้วยการแต่งเรื่องราวสยองขวัญขึ้นมาและถามผู้เล่นว่าพวกเขาคิดว่าจะพบเจออสูรร้ายแบบไหนในบ้านผีสิง
                example_code: |
                    ```
                    {print} ฉันมาอยู่ที่นี่ได้ยังไง?
                    {print} จำได้ว่าเพื่อนของฉันบอกให้ไปที่แมนชั่นร้าง...
                    {print} แล้วทุกอย่างก็ทำดำมืดไปหมด
                    {print} แต่ทำไมฉันถึงมาสลบอยู่บนพื้น...?
                    {print} ตอนนี้ปวดหัวมากยังกับโดนฟาดด้วยไม้เบสบอล
                    {print} เสียงอะไรน่ะ?
                    {print} ไม่นะ! มันมีอะไรบางอย่างอยู่ที่นี่!
                    {print} ต้องรีบหนีออกไป!
                    {print} มีประตูอยู่ 3 บาน..
                    {ask} ฉันควรเลือกประตูไหน?
                    {echo} ฉันเลือกประตู
                    {print} ...?
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    คัดลอกโค้ดตัวอย่างไปที่หน้าจอคำสั่งด้วยการคลิกที่ปุ่มสีเหลือง
                    จากนั้นทำให้เรื่องราวสมบูรณ์ด้วยการเติมโค้ดอย่างน้อย 5 บรรทัด
                    อย่าลืมว่าต้องเริ่มทุกบรรทัดด้วยคำสั่ง `{print}`
            2:
                story_text: |
                    หนูสามารถเลือกอสูรร้ายในบ้านผีสิงหลังนี้ด้วยอิโมจิ หรือจะใช้คำพูดก็ได้เช่นกัน
                example_code: |
                    ```
                    monster_1 {is} 👻
                    monster_2 {is} 🤡
                    monster_3 {is} 👶
                    {print} เธอเข้าไปในบ้างผีสิง
                    {print} ทันใดนั้นเธอได้พบกับ monster_1
                    {print} เธอจึงรีบหนีไปห้องอื่น...
                    {print} แต่ว่า monster_2 รอเธออยู่ในห้องนั้น!
                    {print} ไม่นะ! ต้องรีบหนีไปห้องครัว
                    {print} ทว่าเมื่อเข้าไป monster_3 ก็จู่โจมเธอ!
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    ในตัวอย่างก่อนหน้า เราได้กำหนดอสูรร้ายไว้แล้ว เพราะฉะนั้นเวลาโค้ดทำงานจะได้ผลลัพธ์เดิม
                    หนูลองเพิ่มคำสั่ง `{ask}` เพื่อทำให้บ้านผีสิงนี้มีปฏิสัมพันธ์มากขึ้นโดยการให้ผู้เล่นเลือกอสูรร้ายที่พวกเขาจะพบเจอได้ไหม?
                example_code_2: |
                    ```
                    monster_1 {is} _
                    monster_2 {is} _
                    monster_3 {is} _
                    {print} เธอเข้าไปในบ้างผีสิง
                    {print} ทันใดนั้นเธอได้พบกับ monster_1
                    {print} เธอจึงรีบหนีไปห้องอื่น...
                    {print} แต่ว่า monster_2 รอเธออยู่ในห้องนั้น!
                    {print} ไม่นะ! ต้องรีบหนีไปห้องครัว
                    {print} ทว่าเมื่อเข้าไป monster_3 ก็จู่โจมเธอ!
                    ```
            3:
                story_text: |
                    ในเลเวลก่อนหน้านี้เราได้สร้างบทนำสำหรับบ้านผีสิง แต่อย่างที่เห็นว่าเรื่องราวจะมีจุดจบเลวร้ายเสมอ
                    ในเลเวลนี้หนูสามารถทำให้เรื่องราวมีปฏิสัมพันธ์มากขึ้นด้วยการเปลี่ยนผลลัพธ์ของเกมทำให้บางครั้งก็อาจรอด บางครั้งก็อาจถูกกิน!
                    มาให้ Hedy สุ่มให้ดีกว่า!

                    ### แบบฝึกหัด
                    คัดลอกโค้ดตัวอย่าแล้วเติมช่องว่างเพื่อทำให้โปรแกรมทำงาน!

                    **เพิ่มเติม** เรื่องราวตอนนี้ตรงไปตรงมามาก บางทีหนูอาจจะปรับเพิ่มเล็กน้อยให้เรื่องราวน่าตื่นเต้นมากขึ้น
                    และตอนนี้ผลลัพธ์ที่เป็นไปได้จำกัดมาก มีตัวเลือกว่ามีอะไรอยู่ด้านหลังประตูแค่ 3 อันเท่านั้น บางทีหนูอาจจะลองเพิ่มอสูรร้ายเพิ่มเข้าไปในรายชื่อนะ!
                example_code: |
                    ```
                    _ หนีจากบ้านผีสิงให้ได้!
                    _ ด้านหน้าเธอมีประตูอยู่ 3 บาน...
                    _ _ _ เธอจะเลือกประตูบานไหน?
                    _ เธอเลือกบานที่... choice
                    monsters _ ซอมบี้, แวมไพร์, ปีศาจที่ไม่เคยเห็นมาก่อน
                    _ เธอเจอกับ...
                    {sleep}
                    _ _ _ _
                    ```
            4:
                story_text: |
                    ในเลเวลนี้หนูจะได้เรียนรู้วิธีใช้เครื่องหมายคำพูด

                    ### แบบฝึกหัด
                    หนูสร้างเรื่องราวบ้านผีสิงได้ไหมในเลเวล 4?

                    ### แบบฝึกหัด 2
                    กลับไปที่เลเวลก่อนหน้าและคัดลอดโค้ดเกมบ้านผีสิง จากนั้นทำให้โค้ดสมบูรณ์ด้วยการเติมเครื่องหมายคำพูดให้ถูกต้องในเลเวลนี้
                example_code: |
                    ```
                    _ เติมเครื่องหมายคำพูดในโค้ดนี้ _
                    {print} หนีจากบ้านผีสิงให้ได้!
                    {print} ด้านหน้าเธอมีประตูอยู่ 3 บาน...
                    choice {is} {ask} เธอจะเลือกประตูบานไหน?
                    {print} เธอเลือกบานที่ ... choice
                    monsters {is} ซอมบี้, แวมไพร์, ปีศาจที่ไม่เคยเห็นมาก่อน
                    {print} เธอเจอกับ...
                    {sleep}
                    {print} monsters {at} {random}
                     ```
            5:
                story_text: |
                    ที่ผ่านมาเกมบ้านผีสิงจะถามให้ผู้เล่นเลือกประตูทุกครั้ง แต่หนูอาจจะสังเกตได้ว่าผู้เล่นไม่จำเป็นต้องตอบคำถามให้ถูกต้อง
                    เกมจะยังทำงานได้ตามปกติและทำให้ผู้เล่นชนะ แม้ว่าพวกเขาจะตอบคำถามมั่ว ๆ หรือไม่ได้เลือกประตูด้วยซ้ำ
                    ในเลเวลนี้หนูจะทำให้ผู้เล่นชนะเกมด้วยการเลือกประตูที่ถูกต้องซึ่ง Hedy ได้สุ่มเลือก

                    ### แบบฝึกหัด
                    หนูสามารถหาว่า 4 คำที่หายไปที่ทำให้โค้ดสมบูรณ์ได้ไหม?
                example_code: |
                    ```
                    {print} 'หนีจากบ้านผีสิงให้ได้!'
                    {print} 'ด้านหน้าเธอมีประตูอยู่ 3 บาน...'
                    doors {is} 1, 2, 3
                    monsters {is} มนุษย์หมาป่า, มัมมี่, แวมไพร์, ซอมบี้
                    chosen_door {is} {ask} 'เธอจะเลือกประตูบานไหน?'
                    {print} 'เธอเลือกบานที่...' chosen_door
                    {sleep}
                    correct_door {is} doors {at} {random}
                    _ _ _ _ {print} 'เยี่ยม! เธอเอาตัวรอดสำเร็จ!'
                    {else} {print} 'ไม่นะ! เธอกำลังถูกเขมือบโดย' monsters {at} {random}
                    ```
            10:
                story_text: |
                    ในเลเวลนี้หนูจะได้รู้จักการเขียนโค้ดซ้อนกัน (nesting) ซึ่งจะทำให้บ้านผีสิงมีปฏิสัมพันธ์ยิ่งขึ้น!

                    ### แบบฝึกหัด
                    เนื่องจากตอนนี้เอาชนะเกมยากเกินไป หนูทำให้มันง่ายขึ้นได้ไหม?
                    แก้โค้ดโดยทำให้มีประตูที่ผิดแค่ 1 บาน ถูกต้อง 2 บาน จากที่มีประตูผิด 2 บาน และมีถูกต้องแค่ 1 บาน ได้ไหม? 
                    คำแนะนำ: หมายความว่าหนูจะต้องเปลี่ยนตัวแปรจาก correct_door เป็น wrong_door และสลับการใช้โค้ด `{if}` และ `{else}`
                    แน่นอนว่าหนูสามารถแก้ไขเรื่องราวให้เป็นตัวเองมากขึ้น ลองเปลี่ยนอสูรร้ายหรือทำให้กลายเป็นเกมโชว์ที่ลุ้นได้ของรางวัล!
                example_code: |
                    ```
                    {print} 'หนีจากบ้านผีสิงให้ได้!'
                    player = มีชีวิต
                    doors = 1, 2, 3
                    monsters = ซอมบี้, แวมไพร์, แมงมุมยักษ์
                    {repeat} 3 {times}
                        {if} player {is} มีชีวิต
                            correct_door {is} doors {at} {random}
                            {print} 'ด้านหน้าเธอมีประตูอยู่ 3 บาน...'
                            chosen_door = {ask} 'เธอจะเลือกประตูบานไหน?'
                            {if} chosen_door {is} correct_door
                                {print} 'ที่นี่ไม่มีสัตว์ประหลาด!'
                            {else}
                                {print} 'เธอถูกเขมือบโดย' monsters {at} {random}
                                player = ตาย
                        {else}
                            {print} 'เกมโอเวอร์'
                    {if} player {is} มีชีวิต
                        {print} 'เยี่ยม! เธอเอาตัวรอดสำเร็จ!'
                    ```
            14:
                story_text: |
                    ### แบบฝึกหัด
                    เกมบ้านผีสิงนี้ใช้ความเชื่อมโยงของรายการที่ใช้งานในเลเวลนี้
                    ตัวอย่างเช่น คุณสมบัติที่เกี่ยวข้องกับซอมบี้จะอยู่ในอันดับแรกของรายการ ส่วนแม่มดและแวมไพร์คืออันดับ 2 และ 3 ตามลำดับ
                    ลองดูในโค้ดและเติม `weapons[i]`, `monsters[i]` , `bad_fate[i]`, `good_fate[i]`, `hint[i]` ในช่องว่างให้ถูกต้อง!
                example_code: |
                    ```
                    numbers = [1, 2, 3]
                    i = numbers[{random}]
                    hint = ['เสียงคำราม', 'เสียงหัวเราะร่า', 'เสียงปีกค้างคาวขยับ']
                    monsters = ['ซอมบี้', 'แม่มด', 'แวมไพร์']
                    bad_fate = ['ถูกกินสมอง', 'โดนสาป', 'ถูกกัด']
                    good_fate = ['เธอโยนแฮมเพื่อเบี่ยงเบนความสนใจ', 'เธอจุดไฟเผาผ้าม่านจนแม่มดหนีไป', 'แวมไพร์เกลียดกระเทียมจึงหนีไป']
                    weapons = ['แฮม', 'ไฟแช็ค', 'กระเทียม']
                    {print} ('เธอยืนอยู่ด้านหน้าแมนชั่นร้าง')
                    {print} ('บางสิ่งบางอย่างไม่ชอบมาพากล')
                    {print} ('เธอได้ยิน ', _)
                    {print} ('เธอจึงตัดสินใจสำรวจ')
                    {print} ('เมื่อเข้าไปในครัวก็เจอกับไฟแช็ค, แฮมสด และกระเทียม')
                    your_weapon = {input} ('เธอหยิบอะไร?')
                    {print} ('เมื่อหยิบ', your_weapon, 'เธอก็เดินไปที่ห้องนั่งเล่น')
                    {print} ('ที่นั่นเธอได้พบกับ', _)
                    needed_weapon = _
                    {if} your_weapon == needed_weapon:
                        {print} ('เธอใช้', your_weapon)
                        {print} _
                        {print} ('เธอชนะ!')
                    {else}:
                        {print} ('เธอเลือกอาวุธผิด...')
                        {print} _
                        {print} ('เกมโอเวอร์')
                    ```
        name: บ้านผีสิง
        default_save_name: บ้านผีสิง
        description: หนีจากบ้านผีสิง
    hospital:
        levels:
            1:
                story_text: |
                    ยินดีต้อนรับสู่การผจญภัยในโรงพยาบาล หนูจะต้องช่วยผู้อำนวยการโรงพยาบาลแก้ไขปัญหาที่เกิดขึ้นโรงพยาบาล และนี่คืองานแรกของหนู:

                    แผนกต้อนรับประสบปัญหาคิวยาวและพนักงานไม่เพียงพอ หนูพอจะช่วยพนักงานคนนี้สร้างโปรแกรมลงทะเบียนด้วยตนเองได้ไหม?
                    ### แบบฝึกหัด
                    ระบบลงทะเบียนด้วยตนเองควร:
                    * ทักทายคนไข้
                    * ถามและทวนชื่อของคนไข้
                    * ถามและทวนวันเกิดของคนไข้
                    * ถามแผนกที่ได้ทำการนัดหมายไว้
                    * ถามชื่อแพทย์ที่ได้ทำการนัดหมายไว้
                    * ขอบคุณคนไข้เมื่อลงทะเบียนสำเร็จ
                    * แจ้งคนไข้ให้นั่งรอในห้องรับรอง
            2:
                story_text: |
                    แผนกแม่และเด็กของโรงพยาบาลต้องการเพลงเพื่อเปิดกล่อมเด็กทารก หนูเขียนโปรแกรมเพลงกล่อมเด็กได้ไหม?
                    ### แบบฝึกหัด
                    เลือกเพลงที่ใช้เล่น:
                    * แมรี่มีลูกแกะตัวเล็ก (ง่าย)
                    * แมงมุมลายตัวนั้น (ปานกลาง)
                    * เพลงกล่อมเด็กของบรามส์ (ยาก)
                    คำใบ้: หนูจะลองนึกโน้ดของเพลงที่ถูกต้องด้วยตนเอง หรือค้นหาในอินเทอร์เน็ตก็ได้นะ
            3:
                story_text: |
                    ตอนนี้มีปัญหาในห้องทำงานของพยาบาล ทุกคนบ่นเป็นเสียงเดียวกันว่าตารางกะดึกมันไม่ยุติธรรมเพราะมีพยาบาลบางคนต้องทำกะดึก 2 คืนใน 1 สัปดาห์ ในขณะที่บางคนไม่ต้องทำเลยสักคืน
                    หนูช่วยเขียนโปรแกรมที่จัดการตารางทำงานกะดึกที่ยุติธรรมให้หน่อยได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมควร:
                    * แสดงให้ดูได้ว่าพยาบาลคนไหนต้องทำงานกะดึกในวันใดของสัปดาห์
                    * ทำให้แน่ใจว่าพยาบาลแต่ละคนจะได้ทำกะดึกแค่คืนเดียวต่อสัปดาห์
                    ชื่อของพยาบาล: เมเรดิธ, มิแรนด้า, อเล็กซ์, เดเร็ก, คริสติน่า, อิซซี่, จอร์จ
            4:
                story_text: |
                    พยาบาลของเรามีหน้าที่หลายอย่างที่ต้องทำในหนึ่งวัน และหนึ่งในหน้าที่สำคัญคือการตรวจเยี่ยมผู้ป่วยในตอนเช้าเพื่อนสอบถามว่าพวกเขาต้องการมื้อเช้าเป็นอะไร
                    หนูช่วยลดภาระงานของพวกเขาด้วยการสร้างโปรแกรมที่คนไข้สามารถเลือกเมนูอาหารเช้าและส่งคำสั่งไปหาพนักงานครัวเองเลยได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมนี้ต้อง:
                    * ให้คนไข้กรอกชื่อและเลขห้อง
                    * ทักทายคนไข้ด้วยชื่อของพวกเขา
                    * แสดงเมนูอาหาร (แซนด์วิช, ซีเรียล. ผลไม้ และอื่น ๆ) และเครื่องดื่ม
                    * ถามคนไข้ว่าต้องการรับประทานอะไร
                    *ถามคนไข้ว่าต้องการดื่มอะไร
                    * ทวนรายการที่สั่ง
                    * ขอบคุณสำหรับการสั่ง
                    * แจ้งคนไข้ว่ารายการที่สั่งจะได้นำเสิร์ฟที่ห้องภายใน 15 นาที
            5:
                story_text: |
                    ศูนย์ดูแลแผลไฟไหม้ต้องการลดภาระงานด้วยการใช้ระบบคัดแยกผู้ป่วยออนไลน์ ซึ่งจะทำให้ผู้ป่วยลงทะเบียนชื่อ วันเกิด และระดับแผลไฟไหม้ (ระดับ 1, 2 หรือ 3) จากนั้นให้คำแนะนำเบื้องต้น
                    หนูช่วยพวกเขาได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมนี้ควร:
                    * เริ่มจากการทักทายและให้ลงทะเบียนคนไข้ด้วยชื่อและวันเกิด
                    * ทำการคัดกรองด้วยคำถาม ผิวมีอาการแดงอย่างเดียวหรือไม่?: แผลไฟไหม้ระดับ 1, มีการพุพองหรือไม่?: แผลไฟไหม้ระดับ 2, ผิวหนังหายไป เปลี่ยนเป็นสีดำหรือขาวหรือไม่: แผลไฟไห้มระดับ 3
                    * ให้คำแนะนำเบื้องต้น ระดับ 1: ประคบด้วยน้ำเปล่าและทาครีม ยังไม่จำเป็นต้องพบแพทย์, ระดับ 2: ต้องพบแพทย์เพื่อสั่งจ่ายยาเฉพาะทาง, ระดับ 3: รีบไปโรงพยาบาลโดยด่วนเพื่อรับการรักษาฉุกเฉิน
            6:
                story_text: |
                    เจ้าหน้าที่ผดุงครรภ์ต้องตอบคำถามจากสตรีมีครรภ์ว่าพวกเขากินอะไรได้หรือไม่ได้บ้าง หนูช่วยคนไข้เหล่านี้สร้างแอปที่บอกพวกเขาว่าอาหารต่าง ๆ ปลอดภัยหรือไม่ได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมควร:
                    * ถามคนไข้ว่าอยากกินอะไร
                    * ตรวจสอบว่าอยู่ในรายการ 'อาหารไม่ปลอดภัย' หรือไม่
                    *ถ้าอยู่ในรายการอาหารไม่ปลอดภัย ต้องแจ้งคนไข้ว่าไม่ปลอดภัย
                    * ถ้าไม่อยู่ในรายการนั้น แจ้งคนไข้ว่าปลอดภัย
                    * จากนั้นแอปต้องเตือนคนไข้ว่าต้องใช้วิจารณญาณด้วย เพราะข้อมูลในรายการอาจไม่ครบถ้วนสมบูรณ์ และแนะนำว่าควรเลี่ยงเนื้อดิบ เนื้อปลา ไข่ และแอลกอฮอล์
                    เมื่อเราตั้งครรภ์ อาหารที่ไม่ปลอดภัยในการบริโภค: ซูชิ, กุ้ง, ทูน่า, บลูชีส, ทิรามิสุ, ไข่ลาวา, คาร์ปาชโช, สเต็กความสุกแรร์, ซอสทาร์ทาร์
            7:
                story_text: |
                    พยาบาลของเราต้องคอยตรวจสอบระดับความสมดุลของน้ำในร่างกาย มันคือการคำนวณปริมาณของเหลวที่คนไข้ได้รับ (จากการกินดื่ม หรือสายน้ำเกลือ) ลบกับปริมาณของเเหลวที่คนไข้เสียไป (จากการปัสสาวะหรืออาเจียน)
                    ตัวเลขสมดุลควรเป็นบวกเสมอ หากเป็นลบพยาบาลต้องรีบให้ของเหลวทางสายน้ำเกลือเพิ่ม
                    หนูช่วยพยาบาลสร้างเครื่องมือที่ใช้คำนวณค่าสมดุลน้ำในร่างกายคนไข้ได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมควร:
                    * ถามปริมาณของเหลวที่คนไข้ได้จากการดื่มน้ำในวันนั้น
                    * ถามปริมาณของเหลวที่คนไข้ได้จากการกินในวันนั้น
                    * ถามปริมาณของเหลวที่คนไข้ได้จากการให้น้ำเกลือในวันนั้น
                    * ถามปริมาณของเหลวที่คนไข้เสียไปจากการปัสสาวะในวันนั้น
                    * ถามปริมาณของเหลวที่คนไข้เสียไปจากการอาเจียนในวันนั้น
                    * คำนวรค่าสมดุลน้ำในร่างกายและแสดงผลให้พยาบาลดู
                    * แจ้งพยาบาลว่าค่าที่ได้เป็นบวกหรือลบเพื่อตัดสินใจว่าคนไข้ควรได้รับน้ำเกลือเพิ่มหรือไม่ในวันนั้น
            8:
                story_text: |
                    สัญลักษณ์สีบนลานจอดเฮลิคอปเตอร์เคลื่อนย้ายผู้ป่วยเริ่มจางแล้ว หนูช่วยเขียนโปรแกรมให้เจ้าเต่าวาดสัญลักษณ์ขึ้นมาใหม่ได้ไหม?
                    ### แบบฝึกหัด
                    วาดสัญลักษณ์บนลานจอด
                    <img src="https://github.com/user-attachments/assets/96deeb9e-b155-4a3d-91f3-3c447df7ce2b" width="200">
            9:
                story_text: |
                    รถฉุกเฉินควรได้รับการซ่อมบำรุง สีที่วาดเป็นกางเขนสีแดงด้านข้างเริ่มจางลงและไซเรนก็ไม่ทำงาน
                    หนูซ่อมได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมควร:
                    * ระบายกางเขนสีแดงด้วยเต่านักวาด
                    * ทำให้เสียงไซเรนดังขึ้นหลังวาดกางเขนสีแดงเสร็จ
                    คำใบ้: ใช้คำสั่ง repeat
            10:
                story_text: |
                    เจ้าหน้าที่ในห้องฉุกเฉินกำลังเผชิญปัญหา พวกเขาบอกว่ามีผู้ป่วยจำนวนมากกำลังถูกส่งมาแต่พวกเขาไม่รู้ว่าคนไหนไม่ฉุกเฉิน และคนไหนควรพบแพทย์ทั่วไป
                    ตอนนี้มีคนไข้มหาศาลอยู่ที่ห้องรอทำให้งานล้นไปไหม หนูช่วยเจ้าหน้าที่สร้างแอปคัดกรองที่ช่วยตัดสินว่าคนไข้ควรไปห้องฉุกเฉินหรือไม่ได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมควรบอกคนไข้ว่าควร 'ไปที่ห้องฉุกเฉินโดยด่วน', 'โทรติดต่อผู้ให้บริการด้านสุขภาพเพื่อปรึกษา', หรือ 'ไปหาแพทย์ทั่วไปเมื่อสะดวก'
                    โปรแกรมจะถามคำถามเหล่านี้:
                    * สถานการณ์เสี่ยงต่อการเสียชีวิตหรือไม่?
                    * มีปัญหาการหายใจหรือไม่?
                    * สูญเสียทักษะในการพูด. มองเห็น, เดิน หรือขยับตัวฉับพลันหรือไม่?
                    * ได้บริโภคหรือสูดดมสารพิษหรือไม่?
                    * มีกระดูกหักหรือไม่?
                    * มีอาการแพ้รุนแรงหรือไม่?
                    * มีอาการเจ็บรุนแรงหรือไม่?
                    ถ้าคนไข้ตอบ 'ใช่' ในข้อใดข้อหนึ่ง โปรแกรมจะต้องบอกให้พวกเขาไปห้องฉุกเฉินทันที่ โดยไม่ถามคำถามอื่นเพิ่มเติมเพราะเวลาเป็นสิ่งสำคัญ.
                    ถ้าคนไข้ตอบ 'ไม่ใช่' ทั้งหมด โปรแกรมจะถามต่อว่า:
                    * สามารถรอจนถึงพรุ่งนี้ได้หรือไม่?
                    ถ้าคำตอบคือ 'ใช่' โปรแกรมจะบอกให้คนไข้นัดหมายแพทย์ทั่วไป แต่ถ้าคำตอบคือ 'ไม่ใช่' โปรแกรมจะแนะนำให้โทรติดต่อผู้ให้บริการด้านสุขภาพเพื่อปรึกษาเพิ่มเติม
            11:
                story_text: |
                    เรามีปัญหาที่คลินิกวัคซีน จอที่ใช้แจ้งเรียกคนไข้มันเสีย หนูซ่อมได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมควร:
                    * มีรายชื่อคนไข้ทั้งหมดที่นัดหมายไว้
                    * ถามพยาบาลว่ามีคนไข้ใหม่หรือไม่วันนี้ ถ้ามีมีกี่คน
                    * เพิ่มรายชื่อคนไข้ใหม่ในรายชื่อคนไข้
                    * จากนั้นโปรแกรมจะทำการเรียกคนไข้ไปที่จุดรับวัคซีน
                    * โปรแกรมควรรอ 10 วินาที ล้างข้อมูลบนจอและเรียกคนไข้คนต่อไปจนกว่ารายชื่อทั้งหมดจะถูกเรียกจนครบ
            12:
                story_text: |
                    เรากำลังออกแบบหอผู้ป่วยใหม่จึงอยากวาดแผนผังสำหรับหอผู้ป่วยนี้
                    เราต้องการห้องสำหรับคนไข้ 5 คนในหอนี้ คนไข้ทุกคนจะต้องมีเตียงและโต๊ะหัวเตียงเป็นของตัวเอง
                    แผนผังควรหน้าตาประมาณนี้:
                    <img src="https://github.com/user-attachments/assets/078929cb-c9af-4bcf-87a2-0398ad91d3f0" width="500">
                    ### แบบฝึกหัด
                    โปรแกรมควร:
                    * วาดแผนผังสำหรับหอผู้ป่วยใหม่!
                    * ใช้ฟังก์ชันในการวาดเตียงและโต๊ะหัวเตียง
            13:
                story_text: |
                    โรงพยาบาลของเราไม่ได้มีแค่ผู้ป่วย แต่มีพนักงานมากมาย เจ้าหน้าที่แต่ละคนต้องการป้ายประจำตัวบุคลากร
                    หนูสร้างโปรแกรมเพื่อให้เจ้าหน้าที่ใหม่กรอกข้อมูลเพื่อพิมพ์ป้ายประจำตัวได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมควร:
                    * แสดงการต้อนรับเจ้าหน้าที่
                    * ถามข้อมูลคำนำหน้าชื่อ ชื่อจริง นามสกุล วันเกิด สถานที่เกิด หน้าที่ แผนก และเบอร์โทรติดต่อ
                    * ขอบคุณเจ้าหน้าที่และแจ้งว่าป้ายกำลังถูกพิมพ์
                    * หยุดโปรแกรม 2 วินาที
                    * พิมพ์คำนำหน้าชื่อ ชื่อจริง และนามสกุล
                    * พิมพ์วันเกิดและสถานที่เกิด
                    * พิมพ์หน้าที่และแผนก
                    * พิมพ์เบอร์โทรติดต่อ
            14:
                story_text: |
                    ภารโรงมีงานเยอะมาก บางงานต้องทำทุกวัน บางงานทำแค่บางวัน บางฤดู ซึ่งสร้างความสับสนและอาจทำให้หลงลืมได้
                    หนูช่วยเขียนโปรแกรมที่พิมพ์รายการงานที่ต้องทำในแต่ละวันได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมควร:
                    * อวยพรภารโรงให้มีเช้าที่ดี
                    * ถามภารโรงว่าวันนี้คือวันอะไรของสัปดาห์ เดือนอะไร และวันที่เท่าไหร่ของเดือน
                    * พิมพ์รายการงานที่ต้องทำของวันนั้น
                    งานที่ต้องทำได้แก่:
                    * งานประจำทุกวัน: ถูพื้น, ล้างห้องน้ำ, เปิดม่าน
                    * เฉพาะจันทร์และพฤหัสบดี: รดน้ำต้นไม้
                    * เฉพาะอังคารและศุกร์: ถูพื้นทั้งตึก
                    * เฉพาะวันเสาร์: ล้างเครื่องทำกาแฟ
                    * เฉพาะวันแรกของเดือน: ล้างหน้าต่าง
                    * เฉพาะวันที่ 7 ของเดือน: เติมของในตู้ขายของอัตโนมัติ
                    * เฉพาะวันที่ 14 ของเดือน: ตรวจแบตเตอร์รี่ของสัญญาณไฟไหม้
                    * ทุกวันในฤดูหนาว: เปิดฮีทเตอร์
                    * ทุกวันในฤดูร้อน: เปิดแอร์
                example_code: |
                    โปรแกรมควรลงท้ายด้วย:
                      ```
                      _ โปรแกรมควรลงท้ายด้วย_
                      make_tasklist(day, month, date)
                      ```
            15:
                story_text: |
                    คนไข้บางครั้งอาจมีอาการเจ็บมากหลังผ่าตัดซึ่งในกรณีนี้จะต้องได้รับมอร์ฟีน และคนไข้สามารถให้มอร์ฟีนตัวเองได้หากรู้สึกเจ็บมาก
                    เครื่องให้มอร์ฟีนต้องถูกโปรแกรมอย่างดี เพื่อควบคุมปริมาณมอร์ฟีนที่คนไข้จะได้รับ หนูเขียนโปรแกรมให้หน่อยได้ไหม?
                    ### แบบฝึกหัด
                    โปรแกรมควร:
                    * ถามพยาบาลว่าคนไข้ได้รับมอร์ฟีนไปแล้วกี่มิลลิลิตรในวันนี้.
                    * แจ้งพยาบาลให้มอบเครื่องให้คนไข้
                    * ถามคนไข้ว่ารู้สึกเจ็บแค่ไหนจากระดับ 1 - 10
                    * แจ้งคนไข้ให้กดปุ่ม x หากต้องการมอร์ฟีนเพิ่ม
                    * เรียกใช้ฟังก์ชัน start_pump ด้วยอาร์กิวเมนต์ pain_level และ morphine_level เมื่อปุ่ม x ถูกกด
                    * ฟังก์ชันควรแสดงผล 'คุณจะได้รับมอร์ฟีนเพิ่ม 20 มิลลิลิตร' เมื่อระดับความเจ็บตั้งแต่ 6 ขึ้นไปและระดับมอร์ฟีนต่ำกว่า 120
                    * หลังจากให้มอร์ฟีนแล้ว โปรแกรมควรพักการทำงาน 2 นาที (ในการทดสอบใช้แค่ 2 วินาทีได้)
                    * หลังจากผ่านไป 2 นาที ระดับมอร์ฟีนควรถูกอัพเดท (+20 มล.) และระดับความเจ็บควรถูกอัพเดทด้วยการถามคนไข้ว่าตอนนี้รู้สึกอย่างไร
                    * ถ้าระดับมอร์ฟีนสูงเกินไปหรือคนไข้ไม่มีอาการเจ็บแล้ว โปรแกรมควรแจ้งคนไข้ว่าพวกเขาจะไม่ได้รับมอร์ฟีนเพิ่ม หรือถ้ายังมีอาการเจ็บมาก ให้แจ้งกับพยาบาลที่ดูแล
                    * แจ้งคนไข้ว่าเครื่องจะปิดการทำงาน และให้กดปุ่ม x หากต้องการเปิดเครื่องอีกครั้ง
            16:
                story_text: |
                    นักเรียนแพทย์ต้องเรียนรู้คำศัพท์เฉพาะทางของชิ้นส่วนในร่างกาย แต่ดูเหมือนการจำชื่อกายวิภาคจะยากมากและก็ดูน่าเบื่อมากอีกต่างหาก
                    หนูช่วยพวกเขาสร้างเกมสำหรับฝึกจำคำศัพท์ทางการแพทย์ได้ไหม?
                    คำศัพท์ที่นักเรียนควรรู้: corpus = ร่างกาย, caput = ศีรษะ, ocolus = ดวงตา, nasus = จมูก, auris = หู, os = ปาก, collum = ลำคอ, manus = มือ, pectus = หน้าอก, humerus = ไหล่, venter = กระเพาะอาหาร, tergum = หลัง
                    ### แบบฝึกหัด
                    โปรแกรมควร
                    * ทำตัวเป็นเกมที่ให้นักเรียนสามารถฝึกจำคำศัพท์ทางการแพทย์
                    *ให้คะแนนและคำชมหากนักเรียนตอบถูกต้อง
                    * ลบคะแนนและบอกว่าตอบผิดถ้าพวกเขาตอบผิด
                    * และต้องแสดงคำตอบที่ถูกต้องสักพักหนึ่งหลังจากตอบผิด ก่อนที่จะลบคำตอบทั้งหมด และถามคำถามใหม่อีกครั้งจนตอบถูก
                    * เกมจะดำเนินจนกว่านักเรียนจะตอบคำถามถูกทุกข้อ
                    * แสดงคะแนนรวมทั้งหมดที่ทำได้
                    * ให้คำติชมตามคะแนนที่ทำได้: 12 คะแนน: เก่งสุด ๆ!, 8-11 คะแนน: ดีมาก, พยายามต่อไป, ตั้งแต่ 7 ลงไป: เธอต้องทบทวนมากกว่านี้!
        name: โรงพยาบาล
        default_save_name: โรงพยาบาล
        description: โรงพยาบาล
    hotel:
        levels:
            15:
                story_text: |
                    ในการผจญภัยก่อนหน้านี้หนูได้เรียนรู้วิธีใช้อาร์กิวเมนต์ในฟังก์ชัน รวมถึงการใช้มันคู่กับ {ask}
                    หนูคงสงสัยว่าทำไมต้องใช้ฟังก์ชันในเมื่อมันมีแค่โค้ดบรรทัดเดียวในตัวอย่าง
                    คราวนี้เราจะทำให้ดูว่าฟังก์ชันขนาดใหญ่เป็นอย่างไร และเราจะใช้อาร์กิวเมนต์หลายตัวด้วย รอบนี้จะได้เห็นว่าการใช้ฟังก์ชันดีกว่าอย่างไร
                    นี่คือตัวอย่างของฟังก์ชันที่มีอาร์กิวเมนต์ที่รวมกับคำสั่ง `{ask}`
                example_code: |
                    ```
                    {def} welcome_message(title, last_name, country, room_number):
                        {print} ('ยินดีต้อนรับสู่โรงแรมเฮดี้', title, ' ', last_name)
                        nice_trip {is} {input} ('มีความสุขไหมจากการไปเที่ยวที่', country, '?')
                        {if} nice_trip == 'ใช่':
                            {print} ('เยี่ยมเลย!')
                        {else}:
                            {print} ('แย่จังเลยนะคะ')
                            {print} ('หวังเป็นอย่างยิ่งว่าคุณจะได้พักผ่อนเต็มที่')
                        {print} ('หมายเลขห้องคือ', room_number)

                    {print} ('สวัสดีค่ะ กรุณากรอกข้อมูลเพื่อเช็คอิน')
                    title = {input} ('คำนำหน้าชื่อของคุณคือ (mr, mrs, ms, dr, etc.)?')
                    name = {input} ('นามสกุลของคุณคือ?')
                    homecountry = {input}('คุณเดินทางมาจากประเทศอะไร?')

                    welcome_message(title, name, homecountry, 105)
                    ```
        name: โรงแรม
        default_save_name: โรงแรม
        description: โรงแรม
    if_command:
        levels:
            5:
                story_text: |
                    ## if... else....
                    ในเลเวล 5 ได้มีคำสั่งใหม่ `{if}` เพิ่มเข้ามา! ด้วย `{if}` เราสามารถสร้างตัวเลือกที่แตกต่างกัน 2 แบบได้
                    โค้ดนี้จะตอบกลับว่าเยี่ยมถ้าหนูตอบว่าชื่อเฮดี้และโห่เหมือนหนูตอบอย่างอื่น
                    `{ask}` และ `{print}` ยังคงทำงานเหมือนเดิมเหมือนในเลเวล 4
                example_code: |
                    ```
                    name {is} {ask} 'เธอชื่ออะไร?'
                    {if} name {is} เฮดี้ {print} 'เยี่ยม' {else} {print} 'โห่!'
                    ```
                story_text_2: |
                    บางครั้งโค้ดที่ใช้ `{if}`ก็ยาวมาก ๆ จนล้นบรรทัด <br> เราสามารถแบ่งโค้ดเป็นสองบรรทัดได้โดยเริ่มบรรทัดที่ 2 ด้วย`{else}` แบบนี้:
                example_code_2: |
                    ```
                    name {is} {ask} 'เธอชื่ออะไร?'
                    {if} name {is} เฮดี้ {print} 'เยี่ยม'
                    {else} {print} 'โห่!'
                    ```
                story_text_3: |
                    ### แบบฝึกหัด
                    พยายามสร้างโค้ดด้วย `{if}` และ `{else}` หนูสามารถใช้โค้ดตัวอย่างได้เช่นกัน
                example_code_3: |
                    ```
                    answer {is} {ask} '2 + 2 = ?'
                    _ _ _ 4 _ 'เก่งมาก!'
                    _ _ 'ที่ถูกต้องคือ 2 + 2 = 4'
                    ```
            9:
                story_text: |
                    ## If... Else...
                    หนูได้เรียนวิธีการรันคำสั่งซ้ำด้วย `{repeat}`
                    คราวนี้หนูสามารถใช้การย่อหน้าเพื่อสร้างกลุ่มโค้ดหลังคำสั่ง `{if}` หรือ `{else}`
                    ลองดูจากโค้ดตัวอย่าง

                    ### แบบฝึกหัด
                    เพิ่มคำสั่ง `{else}` ในโค้ดตัวอย่าง สร้างกลุ่มโค้ดด้วยการใช้ย่อหน้าโดยการเว้นว่างด้านหน้าแต่ละบรรทัดจำนวน 4 ช่องไฟ
                example_code: |
                    ```
                    name = {ask} 'เธอชื่ออะไร?'
                    {if} name {is} เฮดี้
                        {print} 'ยินดีต้อนรับนะเฮดี้'
                        {print} 'เธอใช้งานคอมพิวเตอร์ได้!'
                    ```
            10:
                story_text: |
                    เธอสามารถนำคำสั่ง `{if}` ไปใส่ไว้ในคำสั่ง `{if}` อีกอันได้ในเลเวลนี้
                example_code: |
                    ```
                    continue = {ask} 'เธออยากดำเนินการต่อไหม?'
                    {if} continue = ใช่
                        sure = {ask} 'แน่ใจนะ?'
                        {if} sure {is} ใช่
                            {print} 'งั้นเราจะเดินการต่อ'
                        {else}
                            {print} 'เธอไม่แน่ใจหรอ'
                    {else}
                        {print} 'เธอไม่อยากดำเนินการต่อ'
                    ```
        name: '{if} & {else}'
        default_save_name: คำสั่ง_if
        description: แนะนำการใช้คำสั่ง {if}
    in_command:
        levels:
            6:
                story_text: |
                    ## Lists
                    เมื่อเราต้องการเช็คว่ามีอะไรอยู่ในรายการให้เราใช้คำสั่ง `{in}`
                    โค้ดนี้จะแสดงผลว่า สวยเลย! ถ้าหนูเลือกสีเขียวหรือสีเหลือง และแหย่ะถ้าเลือกอย่างอื่น
                example_code: |
                    ```
                    pretty_colors {is} สีเขียว, สีเหลือง
                    favorite_color {is} {ask} 'สีโปรดของเธอคือสีอะไร?'
                    {if} favorite_color {in} pretty_colors
                    {print} 'สวยเลย!'
                    {else}
                    {print} 'แหย่ะ'
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    เติมช่องว่างด้วยคำสั่งที่เรียนรู้ไปเพื่อทำให้โค้ดตัวอย่างนี้สมบูรณ์
                    เมื่อเขียนโค้ดที่สมบูรณ์แล้ว ลองเขียนโค้ดด้วยตนเองและใช้คำถามที่คิดขึ้นเองดูบ้าง
                example_code_2: |
                    ```
                    animals {is} สุนัข, วัว, แกะ
                    answer {is} {ask} 'สัตว์ที่เธอชอบคืออะไร?'
                    _ answer _ animals
                    _ 'เหมือนกันเลย!'
                    _
                    _ 'สัตว์ที่ฉันชอบคือสุนัข, วัว และแกะ'
                    ```
        name: '{in}'
        default_save_name: คำสั่ง_in
        description: แนะนำการใช้คำสั่ง {in}
    is_command:
        levels:
            2:
                story_text: |
                    ## ตัวแปร (Variables)
                    หนูตั้งชื่อด้วยคำสั่ง `{is}` ได้และเราเรียกสิ่งที่ถุูกตั้งชื่อนั้นว่า **ตัวแปร** ในตัวอย่างต่อไปนี้เราได้สร้างตัวแปรที่ชื่อ name กับ age หนูสามารถใช้งานตัวแปร name ที่ไหนก็ได้ในโค้ดแล้วมันจะถูกแทนที่ด้วย 'เฮดี้' แบบนี้:
                example_code: |
                    ```
                    name {is} เฮดี้
                    age {is} 15
                    {print} name มีอายุ age ปี
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    ถึงเวลาสร้างตัวแปรของเธอเอง!
                    เราได้สร้างตัวอย่างตัวแปร 'favorite_animal' ในโค้ดตัวอย่าง ตัวแปรถูกสร้างไว้ในบรรทัดที่ 1 และเราใช้งานตัวแปรกับคำสั่ง {print} ในบรรทัดที่ 2
                    อันดับแรก ให้ใส่ข้อมูลสัตว์ที่หนูชอบในช่องว่าง จากนั้นสร้างโค้ดเพิ่มอีก 3 อัน เลือกตัวแปรและกำหนดตัวแปรด้วยคำสั่ง {is} จากนั้นใช้มันในคำสั่ง {print} ดังที่แสดงให้ดูในตัวอย่าง
                example_code_2: |
                    ```
                    favorite_animal {is} _
                    {print} ฉันชอบ favorite_animal
                    ```
            7:
                story_text: |
                    เราเปลี่ยนวิธีเก็บค่าของตัวแปรได้ด้วยการใช้ `=` แทน `{is}` เมื่อเราต้องการบันทึกคำหรือตัวเลขให้กับตัวแปร อย่างเช่น:
                example_code: |
                    ```
                    name = เฮดี้
                    answer = 20 + 4
                    ```
            13:
                story_text: |
                    เราจะมาเรียนเพิ่มกัน หนูอาจจะรู้จักจากวิชาคณิตศาสตร์อยู่แล้วเกี่ยวกับ `<` และ `>` ซึ่งเราจะใช้ในการเขียนโปรแกรมแทนการใช้ `{greater} {than}` และ `{less} {than}`
                    `<`ตรวจสอบตัวเลขค่าแรกว่าน้อยกว่าค่าที่สองหรือไม่เช่น age `<` 12 ตรวจสอบว่าตัวแปร age มีค่าน้อยกว่า 12 หรือไม่
                    ถ้าอยากตรวจสอบแบบน้อยกว่าหรือเท่ากับให้ใช้ `<=` เช่น age `<=` 11
                    `>`ตรวจสอบตัวเลขค่าแรกว่ามากกว่าค่าที่สองหรือไม่เช่น points `>` 10 ตรวจสอบว่าตัวแปร points มีค่ามากกว่า 10 หรือไม่
                    ถ้าอยากตรวจสอบแบบมากกว่าหรือเท่ากับให้ใช้ `>=` เช่น points `>=` 11
                    หนูจะได้ใช้สัญลักษณ์เหล่านี้ในคำสั่ง `{if}` แบบนี้:
                example_code: |
                    ```
                    age = {input}('เธออายุเท่าไหร่?')
                    {if} age > 12:
                        {print}('เธออายุมากกว่าฉัน!')
                    ```
                    ```
                    age = {input}('เธออายุเท่าไหร่?')
                    {if} age < 12:
                        {print}('เธออายุน้อยกว่าฉัน!')
                    {else}:
                        {print}('เธออายมากกว่าฉัน!')
                    ```
                story_text_2: |
                    นับตั้งแต่เลเวลนี้ หากหนูต้องการเทียบค่าว่าเท่ากันหรือไม่ให้ใช้เครื่องหมายถูกสองอันต่อกันซึ่งเป็นวิธีการใช้งานภาษาโปรแกรมดังเช่น:
                example_code_2: |
                    ```
                    name = {input}('เธอชื่ออะไร?')
                    {if} name == 'เฮดี้':
                        {print}('เธอเจ๋งมาก!')
                    ```
                story_text_3: |
                    หนูสามารถเทียบว่าสิ่งใดไม่เท่ากับสิ่งใดด้วยการใช้ `!=` ได้แบบนี้:
                example_code_3: |
                    ```
                    name = {input}('เธอชื่ออะไร?')
                    {if} name != 'เฮดี้':
                        {print}('เธอไม่ใช่เฮดี้')
                    ```
        name: '{is}'
        default_save_name: คำสั่ง_is
        description: แนะนำการใช้คำสั่ง {is}
    language:
        levels:
            5:
                story_text: |
                    สร้างโปรแกรมของตัวเองเพื่อใช้ในการฝึกคำศัพท์ในภาษาใหม่

                    ### แบบฝึกหัด
                    ทำให้โค้ดยาวขึ้นด้วยการเพิ่มคำศัพท์อย่างน้อย 3 คำเพื่อเรียนรู้
                    **เพิ่มเติม** หนูสามารถเลือกภาษาอื่นนอกเหนือจากภาษาฝรั่งเศสได้ตามที่หนูต้องการเลย
                example_code: |
                    ```
                    {print} 'เรียนภาษาฝรั่งเศส!'
                    cat {is} {ask} '🐱'
                    {if} cat {is} chat {print} 'แย่มาก!'
                    {else} {print} 'ไม่ใช่แมวคือ chat'
                    frog {is} {ask} '🐸'
                    {if} frog {is} grenouille {print} 'ยอดเยี่ยม!'
                    {else} {print} 'ไม่ใช่กบคือ grenouille'
                    ```
            14:
                story_text: |
                    ### แบบฝึกหัด
                    จงดูในโค้ดตัวอย่าง นี่คือโปรแกรมฝึกคำศัพท์ฝรั่งเศส คราวนี้หนูต้องลองสร้างโปรแกรมสำหรับฝึกคำศัพท์ภาษาใหม่บ้าง
                    หากไม่รู้จักภาษาอื่น ๆ ให้ใช้ Google Translate หรือใช้อิโมจิกับภาษาบ้านเกิดของหนู
                example_code: |
                    ```
                    french_words = ['bonjour', 'ordinateur', 'pomme de terre']
                    translation = ['สวัสดี', 'คอมพิวเตอร์', 'มันฝรั่ง']
                    score = 0
                    {for} i {in} {range} (1,3):
                        answer = {input} ('คำศัพท์นี้ ', french_words[i], 'แปลว่าอะไร?')
                        correct = translation[i]
                        {if} answer == correct:
                            {print} ('ถูกต้อง!')
                            score = score + 1
                        {else}:
                            {print} ('ผิดนะ ', french_words[i], ' หมายถึง ', translation[i])
                    {print} ('เธอตอบถูก ', score, ' ข้อ')
                    ```
        name: ภาษา
        default_save_name: ภาษา
        description: ฝึกคำศัพท์ภาษาต่างประเทศ
    maths:
        levels:
            7:
                story_text: |
                    ในเลเวลนี้หนูจะได้เรียนความรู้ใหม่นั่นก็คือการคำนวณ

                    การบวกง่ายมาก หนูเขียนเหมือนกับในวิชาเลขเลยเช่น `5 + 5` ส่วนการลบก็ใช้เป็น `5 - 5`

                    การคูณจะแตกต่างเล็กน้อยเพราะมันไม่มีสัญลักษณ์การคูณบนคีย์บอร์ด จริงๆนะ ไม่เชื่อลองหาดู!
                    เพราะฉะนั้นเราจะใช้เครื่องหมายดอกจันแทนการคูณหรือก็คือ `5 * 5` ซึ่งอ่านว่า "5 คูณ 5"
                example_code: |
                    ```
                    {print} '5 บวก 5 เท่ากับ ' 5 + 5
                    {print} '5 ลบ 5 เท่ากับ ' 5 - 5
                    {print} '5 คูณ 5 เท่ากับ ' 5 * 5
                    {print} '5 หารด้วย 5 เท่ากับ ' 5 / 5
                    ```
                story_text_2: |-
                    **เลขทศนิยม**
                    ที่ผ่านมา Hedy จะไม่แสดงผลเป็นตัวเลขทศนิยมเช่น 1.5 แต่ตอนนี้จะทำได้แล้ว สังเกตว่าคอมพิวเตอร์จะใช้ `.` สำหรับการแสดงจุดทศนิยม
                example_code_2: |
                    ```
                    {print} 'สองครึ่งบวกสองครึ่งเท่ากับ...'
                    {print} 2.5 + 2.5
                    ```
                story_text_3: '**เลขกับตัวแปร**'
                example_code_3: |
                    ```
                    {print} 'ตั๋วหนึ่งใบราคา $2'
                    people = {ask} 'ต้องการตั๋วกี่ใบ?'
                    price = people * 2
                    {print} 'ทั้งหมดเท่ากับ $' price ' ครับ'
                    ```
        name: คณิตศาสตร์
        default_save_name: คณิตศาสตร์
        description: แนะนำการคำนวณคณิต
    music:
        levels:
            1:
                story_text: |-
                    ในเลเวลนี้หนูจะได้เรียนรู้วิธีใช้คำสั่ง `{play}` เพื่อเล่นทำนอง!

                    พิมพ์คำสั่ง `{play}`ตามด้วยโน้ตที่ต้องการโดยโน้ตจะไล่ไปเป็น C-D-E-F-G-A-B
                    อย่างที่เห็นว่ามีตัวอักษรต่างกัน 7 ตัว แต่หนูสามารถเล่นได้มากกว่าแค่ 7 โน้ตดนตรี
                    พิมพ์ตัวเลขระหว่าง 0 - 9 หลังตัวอักษรเพื่อเลือกบันไดเสียงเช่น B4 จะตามด้วย C5
                    C0 คือโน้ตที่ต่ำที่สุด และ B9 คือโน้ตที่สูงที่สุด

                    ### แบบฝึกหัด
                    ลองโค้ดตัวอย่างและปรับเปลี่ยนดู หนูสามารถสร้างเมโลดี้ด้วยตัวเองได้ไหม?
                    ในเลเวลต่อไปเราจะมาเรียนวิธีเล่นเพลงที่มีอยู่แล้วกัน
                example_code: |-
                    ```
                    {play} C4
                    {play} D4
                    {play} E4
                    {play} F4
                    {play} G4
                    {play} A4
                    {play} B4
                    {play} C5
                    ```
            2:
                story_text: |
                    ### แบบฝึกหัด
                    ทำให้เพลงนี้สมบูรณ์! เราได้เริ่มให้แล้วบางส่วน
                example_code: |
                    ```
                    {print} ลุงแมคโดนัลด์เป็นชาวนา
                    {play} C5
                    {play} C5
                    {play} C5
                    {play} G4
                    {play} A4
                    {play} A4
                    {play} G4
                    ```
                story_text_2: ดังที่เห็นแล้วว่าหนูสามารถใช้คำสั่ง `{sleep}`เพื่อให้มีการหยุดเล็กน้อยระหว่างเล่นเพลง
                example_code_2: |
                    ```
                    {print} ดาวดวงน้อย
                    {play} C
                    {play} C
                    {play} G
                    {play} G
                    {play} A
                    {play} A
                    {play} G
                    {sleep} 1
                    {play} F
                    {play} F
                    ```
            3:
                story_text: |
                    สร้างทำนองแบบสุ่มดู!

                    ### แบบฝึกหัด
                    โค้ดตัวอย่างได้สร้างทำนองแบบสุ่มขึ้นมา แต่มันสั้นมากและใช้โน้ตไม่กี่ตัว
                    เพิ่มโน้ตเพื่อสร้างทำนองที่ยาวมากขึ้นด้วยการคัดลอกโค้ดบรรทัดสุดท้ายซ้ำอีกหลาย ๆ รอบ
                example_code: |
                    ```
                    notes {is} A4, B4, C4
                    {play} notes {at} {random}
                    {play} notes {at} {random}
                    {play} notes {at} {random}
                    ```
            4:
                story_text: |
                    ใช้คำสั่ง `{clear}` เพื่อสร้างเครื่องคาราโอเกะ!

                    ### แบบฝึกหัด
                    ทำเวอร์ชันคาราโอเกะของเพลงหนูมาลีมีลูกแมวเหมียวให้สมบูรณ์
                    จากนั้นทำเวอร์ชันคาราโอเกะของเพลงอะไรก็ได้ที่หนูต้องการ!
                example_code: |
                    ```
                    {print} 'หนูมาลีมีลูกแมวเหมียว'
                    {play} E
                    {play} D
                    {play} C
                    {play} D
                    {play} E
                    {play} E
                    {play} E
                    {clear}
                    {print} 'ลูกแมวเหมียว ลูกแมวเหมียว'
                    {play} D
                    {play} D
                    {play} D
                    {play} E
                    {play} E
                    {play} E
                    {clear}
                    {print} 'หนูมาลีมีลูกแมวเหมียว'
                    {play} E
                    ```
            5:
                story_text: |
                    หนูไม่จำเป็นต้องใช้คำสั่ง `{play}`เพื่อเล่นทั้งเพลงเสมอ บางครั้งหนูอาจอยากเล่นแค่โน้ตเดียว
                    ตัวอย่างเช่นถ้าหนูสร้างปริศนา หนูอาจสั่งให้เล่นโน้ตสูงที่ดูมีความสุขเมื่อตอบถูกและโน้ตต่ำที่ดูเศร้าเมื่อตอบผิด

                    ### แบบฝึกหัด
                    ทำให้คำถามแรกเสร็จสมบูรณ์ด้วยการเพิ่มโค้ดหนึ่งบรรทัดที่เล่นโน้ต C3 ถ้าตอบผิด
                    จากนั้นคิดเพิ่มอีก 3 คำถามเข้าสู่ปริศนาทั้งหมด
                example_code: |
                    ```
                    answer {is} {ask} 'เมืองหลวงของซิมบับเวคืออะไร?'
                    {if} answer {is} ฮาราเร {play} C6
                    _
                    ```
            6:
                story_text: |
                    เราใช้ `{elif}` เพื่อเล่นโน้ตที่ต่างกันสำหรับสถานการณ์ที่ต่างกันได้ อย่างเช่นหากกำลังมีความสุข เราก็ให้โปรแกรมเล่นโน้ตที่มีความสุข
                    ### แบบฝึกหัด
                    เริ่มจากสร้างโน้ตที่เศร้าสร้อยจากนั้นสร้างเสียงเพิ่มอีก 2 เสียงสำหรับอารมณ์อื่น ๆ
                example_code: |
                    ```
                    mood {is} {ask} 'เธอรู้สึกอย่างไรวันนี้?'
                    {if} mood {is} มีความสุข
                    {play} C4
                    {elif} mood {is} เศร้า
                    {play} _
                    {elif} mood {is} _
                    {play} _
                    ```
            7:
                story_text: |
                    แทนที่จะให้เล่นโน้ต หนูสามารถใช้ตัวเลขแทนได้ด้วยการพิมพ์ `{play} 1`สำหรับโน้ตต่ำสุด จนถึง`{play} 70`สำหรับโน้ตสูงสุด

                    ### แบบฝึกหัด
                    ถึงเวลาคณิตศาสตร์ทางดนตรีแล้ว ลองใช้โค้ดตัวอย่างด้วยตัวเลขเริ่มต้นที่ต่างกันดูนะ
                    จากนั้นลองดูว่าหนูสามารถแต่งเพลงด้วยตัวเลขได้ไหม
                example_code: |
                    ```
                    number = {ask} 'เลือกเลขเริ่มต้นระหว่าง 1 และ 67 ดู'
                    {print} number
                    {play} number
                    number = number + 1
                    {print} number
                    {play} number
                    number = number + 1
                    {print} number
                    {play} number
                    ```
            8:
                story_text: |
                    ด้วยการใช้คำสั่ง `{repeat}` เธอสามารถทำให้โค้ดทำนองสั้นลงมาก

                    ### แบบฝึกหัด
                    ทำให้โค้ดเพลงดาวดวงน้อยสมบูรณ์ด้วยคำสั่ง `{repeat}`
                    จากนั้นกลับไปที่เพลงที่ได้สร้างไว้ในเลเวลก่อน ๆ แล้วลองทำให้เพลงเหล่านั้นสั้นลงดูได้ไหม?
                example_code: |
                    ```
                    {print} 'ดาวดวงน้อย'
                    {repeat} 2 {times} {play} C4
                    {repeat} 2 {times} {play} G4
                    _
                    ```
            9:
                story_text: |
                    พอใช้คำสั่ง `{repeat}` ได้หลายครั้งแล้ว คราวนี้เราสามารถทำเพลงได้ง่ายขึ้น!

                    ### แบบฝึกหัด
                    ทำให้เพลงพวกเราเหล่าชุมนุมสมบูรณ์ และอย่าลืมใช้คำสั่ง `{repeat}`
                example_code: |
                    ```
                    {print} 'พวกเราเหล่าชุมนุม'
                    {repeat} 2 {times}
                        {play} C
                        {play} D
                        {play} E
                        {play} C
                    {repeat} 2 {times}
                        {play} E
                        {play} F
                        {play} G
                        {sleep} 1
                    ```
            10:
                story_text: |
                    นับจากเลเวลนี้หนูสามารถใช้คำสั่ง `{repeat}` รวมถึงคำสั่งอื่นๆภายในคำสั่ง `{repeat}` ได้
                    วิธีนี้จะทำให้เพลงอย่าง 'สุขสันต์วันเกิด' สั้นลงได้อีก!

                    ### แบบฝึกหัด
                    ทำให้เพลงนี้สมบูรณ์!
                example_code: |
                    ```
                    first_time = ใช่
                    {repeat} 2 {times}
                        {repeat} 2 {times}
                            {play} C
                        {play} D
                        {play} C
                        {if} first_time {is} ใช่
                            {play} F
                            {play} E
                            first_time {is} ไม่ใช่
                        {else}
                            _
                    ```
            12:
                story_text: |
                    ใช้ฟังก์ชันในเพลงของหนูสิ! อย่างที่เห็นในโค้ดตัวอย่างว่าหนูสามารถสร้างฟังก์ชันสำหรับแต่ละบรรทัดของเพลงดาวดวงน้อยได้ เมื่อเขียนโปรแกรมสำหรับ 3 บรรทัดแรกเสร็จแล้ว หนูแค่เรียกใช้ฟังก์ชันตามลำดับเพื่อให้เล่นเพลงอย่างถูกต้อง

                    ### แบบฝึกหัด
                    ทำให้เพลงดาวดวงน้อยสมบูรณ์
                    ย้อนกลับไปดูเพลงอื่นๆที่ได้เขียนโปรแกรมไว้ก่อนหน้านี้ หนูทำให้โค้ดพวกนั้นดีขึ้นและสั้นลงด้วยการใช้ฟังก์ชันได้ไหม?
                example_code: |
                    ```
                    {define} first_line
                        {play} C
                        {play} C
                        {play} G
                        {play} G
                        {play} A
                        {play} A
                        {play} G
                        {sleep}

                    {define} second_line
                        {play} F
                        {play} F
                        {play} E
                        {play} E
                        {play} D
                        {play} D
                        {play} C
                        {sleep}

                    {define} third_line
                        {play} G
                        {play} G
                        {play} F
                        {play} F
                        {play} E
                        {play} E
                        {play} D
                        {sleep}

                    {call} first_line
                    _
                    _
                    ```
            15:
                story_text: |
                    หนูสามารถใช้ฟังก์ชันกับอาวร์กิวเมนต์สำหรับเพลงที่มีโน้ตคล้าย ๆ กัน แต่อาจจะต่างกันเล็กน้อย
                    ตัวอย่างเช่นเพลง 'เรามาเจอกัน' จะเห็นว่าโน้ต 4 ตัวแรกเหมือนกันเลย แต่จะถูกตามด้วยโน้ตที่ต่างกันเล็กน้อยในแต่ละครั้ง

                    ### แบบฝึกหัด
                    หนูทำให้เพลงเรามาเจอกันสมบูรณ์ได้ไหม?
                    หนูนึกถึงเพลงอื่นที่สามารถเขียนโปรแกรมแบบนี้ได้ไหม?
                example_code: |
                    ```
                    {print} 'เรามาเจอกัน'
                    {define} _ (note_1, note_2, note_3
                        {play} C4
                        {play} C4
                        {play} D4
                        {play} E4
                        {play} _
                        {play} _
                        {play} _

                    line_1(29, 31, 30)
                    line_1(29, 28, 0)
                    line_1(32, 31, 30)

                    {play} C4
                    {play} B3
                    {play} G3
                    {play} A3
                    {play} B3
                    {play} C4
                    {play} C4
                    ```
                story_text_2: |
                    หนูสามารถเขียนเพลงเพื่อความสนุกได้ แต่ก็สามารถใช้โน้ตเพลงในการสร้างเสียงที่มีประโยชน์ได้เช่นเสียงสัญญาณเตือนไฟ!

                    ### แบบฝึกหัด
                    ทำให้แน่ใจว่าสัญญาณไฟจะดังเมื่อมีไฟไหม้!
                example_code_2: |
                    ```
                    {define} fire_alarm
                        {print} 'ไฟไหม้!'
                        note = 40
                        {for} i {in} {range} 1 {to} 100
                            {if} note _ 50
                                note = note + 5
                                {play} _
                            {else}
                                note = 40

                    fire = {ask} 'มีไฟไห้หรือไม่?'
                    {if} fire _ 'ใช่'
                        fire_alarm_
                    ```
                story_text_3: |
                    ### แบบฝึกหัด
                    ในเลเวลสุดท้ายนี้ของ Hedy เราก็ยังสร้างเสียงเพลงกันได้! ระวังเรื่องไวยกรณ์ (syntax) ของโค้ดด้วยนะ
                    มาดูกันว่าฟังก์ชันถูกกำหนดและเรียกใช้ยังไงในโค้ดตัวอย่าง
                    แล้วทำให้เพลงสมบูรณ์!
                example_code_3: |
                    ```
                    {def} line_1():
                        {for} i {in} {range}(1, 5):
                            {play} A
                        {play} D
                        {play} F
                        {play} A

                    {def} line_2():
                        {for} i {in} {range}(1, 5):
                            {play} G
                        {play} C
                        {play} E
                        {play} G

                    {def} line_3():
                    _

                    {print} ('ยินดีที่รู้จัก')
                    {print} ('ยินดีที่รู้จัก เพื่อนรักเชิญร่วมจิตใจ')
                    line_1()
                    line_2()
                    line_3()
                    {print} ('เรามาพร้อมใจร่วมไมตรี')
                    ```
            16:
                story_text: |
                    **ระวัง** การผจญภัยนี้อาจจะน่ารำคาญมาก!
                    เราสามารถใช้คำสั่ง `{while}` เพื่อเล่นเพลงซ้ำไปตลอดกาล.

                    ### แบบฝึกหัด
                    ทำให้เพลงที่ไม่รู้จบนี้สมบูรณ์
                example_code: |
                    ```
                    {define} song
                        {play} _

                    yes_or_no = {ask} 'อยากได้ยินเพลงที่ไม่รู้จบของฉันไหม?'
                    {while} yes_or_no = 'ใช่'
                        song()
                        {print} '🥳'
                    ```
        name: ดนตรี
        default_save_name: ดนตรี
        description: เล่นทำนองดูสิ!
    parrot:
        levels:
            1:
                story_text: |
                    สร้างสัตว์เลี้ยงนกแก้วออนไลน์ที่จะพูดตามเธอทุกอย่าง!
                example_code: |
                    ```
                    {print} ฉันคือเจ้านกแก้วเฮดี้
                    {ask} เธอชื่ออะไร?
                    {echo}
                    {echo}
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    คัดลอกโค้ดไปที่หน้าต่างป้อนคำสั่งด้วยการคลิกปุ่มสีเหลือง
                    ทำให้นกแก้วถามคำถามอื่น ด้วยการเติมคำในช่องว่าง!
                    **เพิ่มเติม** หนูสามารถทำให้นกแก้วถามคำถามหลายอย่าง ลองเขียนโค้ดเพิ่มต่อดูนะ
                example_code_2: |
                    ```
                    {print} ฉันคือเจ้านกแก้วเฮดี้
                    {ask} _
                    {echo}
                    {echo}
            2:
                story_text: |
                    ในเลเวลที่ผ่านมาเราได้สร้างนกแก้วที่ทวนคำพูดหนู และในเลเวลนี้เราจะสร้างนกแก้วที่มีปฏิสัมพันธ์มากขึ้นด้วยการใช้ตัวแปรและคำสั่ง `{ask}`
                    เราทำให้นกแก้วดูมีชีวิตจริงขึ้นด้วยคำสั่ง `{sleep}` หลังจากมีการพูดอะไรออกไป
                example_code: |
                    ```
                    {print} ฉันคือเจ้านกแก้วเฮดี้
                    name _ _ เธอชื่ออะไร?
                    {print} name
                    _
                    {print} แกว๊ก
                    _
                    {print} name
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    เริ่มจากทำบรรทัดที่ 2 ให้สมบูรณ์ด้วยคำสั่ง `{is}` และ `{ask}`
                    จากนั้นเติมคำสั่ง `{sleep}` ในบรรทัดที่ 4 และ 6 เพื่อให้นกแก้วเว้นช่วงเล็กน้อย

                    **เพิ่มเติม** หนูสามารถทำให้นกแก้วถามมากกว่าแค่ชื่อด้วยการเพิ่มโค้ดอีกได้ไหม?
            3:
                story_text: |
                    สอนคำพูดใหม่ให้นกแก้วด้วย `{add}`
                    ### แบบฝึกหัด
                    หนูเพิ่มคำสั่ง `{add} {to_list}` เพื่อทำให้โค้ดทำงานได้ไหม
                example_code: |
                    ```
                    words {is} แกว๊ก, เฮดี้
                    {print} ฝึกเจ้านกแก้ว!
                    new_word {is} {ask} อยากสอนคำไหนให้นกแก้ว?
                    _ new_word _ words
                    {print} 🧒 พูด new_word, เฮดี้!
                    {print} 🦜 words {at} {random}
                    ```
            4:
                story_text: |
                    ในเลเวลนี้เราจะเพิ่มเครื่องหมายคำพูดเวลาใช้คำสั่ง `{ask}` และ `{print}`
                    ### แบบฝึกหัด
                    เติมเครื่องหมายคำพูดในช่องว่างเพื่อทำให้โค้ดสมบูรณ์
                example_code: |
                    ```
                    words {is} แกว๊ก, เฮดี้
                    {print} _ ฝึกเจ้านกแก้ว! _
                    new_word {is} {ask} _ เธออยากสอนคำไหนให้นกแก้ว? _
                    {add} new_word {to_list} words
                    {print} _ 🧒 พูด_ new_word _, เฮดี้!_
                    {print} _ 🦜 _ words {at} {random}
                    ```
            5:
                story_text: |
                    ให้รางวัลเจ้านกแก้วหากมันพูดได้ถูกต้อง

                    ### แบบฝึกหัด
                    ทำให้โค้ดสมบูรณ์ด้วยการเติมคำสั่ง 4 อันที่หายไป
                example_code: |
                    ```
                    words {is} แกว๊ก, เฮดี้
                    {print} 'ฝึกฝนเจ้านกแก้ว!'
                    new_word {is} {ask} 'เธออยากสอนคำไหนให้นกแก้ว?'
                    {add} new_word {to_list} words
                    said_word {is} words {at} {random}
                    {print} '🧒 พูด' new_word ', เฮดี้!'
                    {print} '🦜 ' said_word
                    _ said_word {is} new_word _ '🧒 เก่งมากเฮดี้! 🍪'
                    _ _ '🧒 ไม่ใช่นะ เฮดี้! ต้องพูดว่า' new_word
                    ```
        name: เจ้านกแก้ว
        default_save_name: เจ้านกแก้ว
        description: สร้างสัตว์เลี้ยงนกแก้วออนไลน์ที่จะพูดตามเธอทุกอย่าง!
    piggybank:
        levels:
            7:
                story_text: |
                    ในการผจญภัยนี้หนูจะได้เรียนวิธีสร้างกระปุกออมสินดิจิตัล

                    ### แบบฝึกหัด
                    ทำให้โค้ดสมบูรณ์ซึ่งจะนับว่าหนูมีเงินอยู่เท่าไหร่และต้องใช้เวลาอีกนานแค่ไหนถึงจะมีมากพอซื้อของที่ต้องการ!
                    **เพิ่มเติม** บางทีหนูอาจจะมีเงินเก็บอยู่บางส่วน? ต้องเอาส่วนนั้นมาลบกับปริมาณที่ต้องเก็บสะสม
                example_code: |
                    ```
                    {print} 'กระปุกออมสินดิจิตัล'
                    wish = {ask} 'เธออยากซื้ออะไร?'
                    price = {ask} 'สิ่งนั้นราคาเท่าไหร่?'
                    saved = {ask} 'ปัจจุบันมีเงินเก็บเท่าไหร่?'
                    allowance = {ask} 'เธอได้เงินค่าขนมประจำสัปดาห์เท่าไหร่?'
                    to_save = price - saved
                    weeks = to_save / allowance
                    {print} 'เธอสามารถซื้อ' _ ' ได้ใน ' _ ' สัปดาห์'
                    ```
            15:
                story_text: |
                    ### แบบฝึกหัด
                    ในเลเวลนี้เราให้ Hedy เป็นคนบอกดีกว่าว่าเธอเก็บเงินพอแล้วหรือยัง!
                    เติมช่องว่างเพื่อทำให้โค้ดสมบูรณ์!
                example_code: |
                    ```
                    _ calculate_budget(wish, money, allowance):
                        to_save = wish - money
                        weeks = to_save / allowance
                        {if} wish _ money:
                            {print} ('เธอต้องเก็บเงินเพิ่ม!')
                            {print} ("ต้องเก็บเงินอีก ', weeks, ' สัปดาห์")
                        {else}:
                            {print} ('เยี่ยม! เธอมีเงินพอแล้ว')
                            {print} ("ไปช็อปปิ้งกันเถอะ!")

                    money = {input}('มีเงินเก็บเท่าไหร่?')
                    wish = {input}('ต้องการเงินเท่าไหร่?')
                    allowance = {input}('ได้ค่าขนมสัปดาห์ละเท่าไหร่?')

                    _
                    ```
        name: กระปุกออมสิน
        default_save_name: กระปุกออมสิน
        description: มานับเงินเก็บกันเถอะ!
    pressit:
        levels:
            6:
                story_text: |
                    ในเลเวลนี้เราจะได้เรียนคำสั่งใหม่: `{pressed}`!
                    `{pressed}` ทำให้ใช้ปุ่มคีย์บอร์ดในการควบคุมการใช้งานโค้ดแต่ละบรรทัดได้

                    ### แบบฝึกหัด
                    ลองดูตัวอย่างต่อไปนี้และเพิ่มโค้ด 1 บรรทัดที่ตอบสนองต่อการกดปุ่มคีย์บอร์ด
                example_code: |
                    ```
                    {print} 'เธอต้องการให้จบแบบดี (g) หรือแย่ (b)?'
                    {if} g {is} {pressed} {print} 'พวกเขาใช้ชีวิตอย่างมีความสุขนับจากนั้น ❤'
                    {else} {print} 'เจ้าชายได้ถูกกินโดยฮิปโปโปเตมัส 😭'
                    ```
                story_text_2: |
                    หนูสามารถเชื่อมคำสั่งของเต่ากับปุ่มเช่นกัน

                    ### แบบฝึกหัด
                    คัดลอกโค้ด 2-3 ครั้งเพื่อวาดรูปที่ใหญ่ขึ้น
                example_code_2: |
                    ```
                    {if} y {is} {pressed} {forward} 15
                    {else} {turn} 90
                    ```
            8:
                story_text: |
                    หลังจากที่ได้เรียนรู้คำสั่ง `{repeat}` แล้ว เราก็สามารถกดปุ่มหลาย ๆ ครั้งได้
                    ซึ่งหนูสามารถใช้มันเพื่อทำให้เต่าเดินไปข้างหน้าและหันหน้า

                    ### แบบฝึกหัด
                    โค้ดในเลเวล 5 จะตรวจสอบการกดปุ่มแค่ครั้งเดียว ให้คัดลอดโค้ดตัวอย่างนี้แล้วเพิ่ม `{repeat}` เพื่อให้คำสั่งซ้ำทำงานเมื่อกดปุ่มหลายครั้ง
                    ลองใช้โค้ดนี้วาดรูปดู
                example_code: |
                    ```
                    {if} x {is} {pressed} {forward} 15 {else} {turn} 90
                    ```
            10:
                story_text: |
                    เมื่อรู้วิธีรวมประโยคคำสั่ง (statements) แล้ว หนูจะสามารถสร้างเครื่องมือพิมพ์สัมผัสด้วย `{pressed}`

                    ### แบบฝึกหัด
                    ทำให้โค้ดสมบูรณ์ ทุกครั้งที่มีตัวอักษรถูกสุ่มขึ้นมาหนูจะต้องกดมัน ถ้ากดถูกจะได้คะแนน ถ้ากดผิดจะต้องถูกหัก 2 คะแนน
                    **เพิ่มเติม** ให้ล้างข้อมูลบนจอหลังจบแต่ละตัวอักษร และแสดงคะแนนรวมที่ผู้เล่นได้รับ
                example_code: |
                    ```
                    points = 0
                    letters = a, b, c, d, e
                    {repeat} 10 {times}
                        letter = _ _ _
                        {print} 'กดปุ่ม ' letter
                        {if} letter {is} {pressed}
                        _
                        _
                        _
                    ```
        default_save_name: กดปุ่ม
        description: ลองเชื่อมปุ่มคีย์บอร์ดกับคำสั่ง!
        name: '{pressed}'
    print_command:
        levels:
            1:
                story_text: |
                    ## คำสั่ง {print}
                    หนูสั่งให้โปรแกรมแสดงข้อความบนจอด้วยคำสั่ง `{print}`
                example_code: |
                    ```
                    {print} สวัสดีโปรแกรมเมอร์!!
                    {print} ยินดีต้อนรับสู่ Hedy!
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    ใน Hedy หนูจะพบเจอแบบฝึกหัดในทุกการผจญภัย แบบฝึกหัดช่วยฝึดการใช้คำสั่งหรือแนวคิดใหม่ ๆ และได้ลองปรับแต่งโค้ดตัวอย่างตามต้องการ
                    ในแบบฝึกหัดต่อไปนี้ หนูจะได้ช่องว่างสีชมพูซึ่งหนูจะต้องเติมอะไรบางอย่างในช่องว่างเพื่อให้โค้ดทำงานได้

                    เติมคำสั่ง `{print}` ในช่องว่างและเพิ่มโค้ดอีก 5 บรรทัดซึ่งต้องเริ่มต้นด้วยคำสั่ง `{print}`
                    ขอให้สนุก!
                example_code_2: |
                    ```
                    _ สวัสดี!
                    ```
            13:
                story_text: |-
                    คราวนี้เรามาใช้โค้ด Python ของจริงกัน! นั่นหมายความว่าเราต้องใช้วงเล็บกับ `{print}` และ `{range}` จากนี้เป็นต้นไป
                    และหมายความว่าหนูสามารถนำโค้ดจาก Hedy ในเลเวลนี้ไปใช้กับสภาพแวดล้อมการเขียนภาษา Python ได้ด้วยคำสั่งภาษาอังกฤษ ถ้ายังไม่ได้ใช้ภาษาอังกฤษอยู่ แนะนำให้ปรับในเมนูคำสั่ง
                example_code: |
                    ```
                    {print}('สวัสดี!')
                    {for} i {in} {range}(1, 10):
                        {print}('นี่คือบรรทัดที่ ', i)
                    ```
                story_text_2: หากต้องการแสดงผลมากกว่าหนึ่งอย่าง หนูต้องแยกมันด้วยเครื่องหมายจุลภาค (comma)
                example_code_2: |
                    ```
                    temperature = 25
                    {print}('ตอนนี้อุณหภูมิ ', temperature, ' องศาข้างนอก')
                    ```
                    ```
                    name = 'เฮดี้'
                    {print}('ฉันชื่อว่า', name)
                    ```
        name: '{print}'
        default_save_name: การแสดงผล (print)
        description: แนะนำการใช้คำสั่ง print
    quizmaster:
        levels:
            7:
                story_text: |
                    ### แบบฝึกหัด
                    ในการผจญภัยนี้หนูจะได้สร้างคำถามทดสอบของตัวเอง! เติมช่องว่างให้สมบูรณ์ เพิ่มคำถามเข้าไป และขอให้สนุกกับคำถามทดสอบ!
                    คำถามทดสอบจะเกี่ยวกับอะไรก็ได้ที่หนูชอบ: งานอดิเรก, สัตว์ที่ชอบ, หนังสือที่ชอบ หรืออะไรก็ตามแต่!
                example_code: |
                    ```
                    {print} 'สร้างแบบทดสอบ'
                    points_a = 0
                    points_b = 0
                    {print} 'คำถาม'
                    {print} 'ตัวเลือกคำตอบ A'
                    {print} 'ตัวเลือกคำตอบ B'
                    answer = {ask} 'เลือกคำตอบข้อไหน?'
                    {if} answer is 'A'
                    points_a = points_a + 1
                    {if} answer is 'B'
                    points_b = points_b + 1
                    {print} 'จบแบบทดสอบ!'
                    {print} 'มาดูผลคะแนนกัน!'
                    {if} points_a > points_b
                    {print} 'เธอคือสมาชิกกลุ่ม A'
                    {if} points_b > points_a
                    {print} 'เธอคือสมาชิกกลุ่ม B'
                    ```
        name: เจ้าแห่งปริศนา
        default_save_name: เจ้าแห่งปริศนา
        description: สร้างคำถามทดสอบของตัวเอง!
    quotation_marks:
        levels:
            4:
                story_text: |
                    ## 'เครื่องหมายคำพูด'
                    ในเลเวล 4 คำสั่ง `{ask}` และ `{print}` ได้ถูกปรับเปลี่ยน
                    หนูจะต้องวางข้อความที่ต้องการแสดงผลระหว่างเครื่องหมายคำพูด
                    คราวนี้หนูจะสามารถแสดงผลคำทั้งหมดที่ต้องการ รวมถึงคำที่บันทึกไว้ด้วยคำสั่ง `{is}`
                    ภาษาโปรแกรมส่วนใหญ่ก็ใช้เครื่องหมายคำพูดกับคำสั่ง Print เท่ากับว่าหนูก็ใกล้จะได้เป็นโปรแกรมเมอร์ตัวจริงยิ่งขึ้น
                example_code: |
                    ```
                    {print} 'เธอต้องใช้เครื่องหมายคำพูดนับต่อจากนี้!'
                    answer {is} {ask} 'เราต้องใช้อะไรนับต่อจากนี้นะ?'
                    {print} 'เราต้องใช้' answer
                    ```
                story_text_2: |
                    ## การลดรูป
                    เรื่องสำคัญ! เมื่อใช้เครื่องหมายคำพูดแล้ว Hedy อาจสับสนเมื่อใช้ เครื่องหมายฝนทอง (') ในการลดรูปในไวยกรณ์ภาษาอังกฤษเช่น I'm หรือ What's
                    เพราะงั้นจะต้องใช้เครื่องหมายอัญประกาศคู่ (") แทนถ้ามีการใช้เครื่องหมายฝนทอง!
                    ลองดูโค้ดตัวอย่างนี้ว่าการใช้งานที่ผิดเป็นอย่างไร
                example_code_2: |
                    ```
                    _ แบบนี้คือการใช้งานเครื่องหมายฝนทองที่ผิด _
                    {print} 'I'm babysitting my sister's kids'
                    {print} 'What's more fun than that?'
                    _ ที่ถูกต้องควรเป็นแบบนี้ _
                    {print} "I'm babysitting my sister's kids"
                    {print} "What's more fun than that?"
                    ```
        name: "'เครื่องหมายคำพูด'"
        default_save_name: เครื่องหมายคำพูด
        description: แนะนำการใช้เครื่องหมายคำพูด
    random_command:
        levels:
            3:
                story_text: |
                    ## At random
                    ในเลเวลนี้หนูจะได้สร้างรายการด้วยคำสั่ง `{is}` จากนั้นปล่อยให้คอมพิวเตอร์สุ่มเลือกของจากในรายการนั้นด้วยคำสั่ง `{at} {random}`
                example_code: |
                    ```
                    animals {is} สุนัข, แมว, จิงโจ้
                    {print} animals {at} {random}
                    ```
                story_text_2: |
                    หนูสามารถใช้คำสั่ง `{at} {random}` ในประโยคได้เช่นกัน
                example_code_2: |
                    ```
                    food {is} แซนด์วิช, พิซซ่าหนึ่งชิ้น, สลัด, เบอร์ริโต้
                    {print} ฉันจะกิน food {at} {random} เป็นมื้อเที่ยง
                    ```
                story_text_3: |
                    ### แบบฝึกหัด
                    ลองใช้คำสั่ง `{at} {random}` ด้วยการสร้างเกมโชว์เหมือนในทีวีซึ่งผู้เล่นจะต้องเลือกประตูหรือกระเป๋าเพื่อหารางวัลที่มีมูลค่าสูงที่สุด
                    ทำได้ไหม? เราได้เขียนโค้ดบรรทัดเริ่มต้นไว้ให้แล้วในตัวอย่าง
                example_code_3: |
                    ```
                    {print} เกมโชว์สุดยิ่งใหญ่!
                    {print} ด้านหน้าของเธอมีกระเป๋า 3 ใบ...
                    chosen {is} {ask} เธอจะเลือกใบไหน?
                    prizes {is} _
                    _
                    ```
            14:
                story_text: |-
                    เราจะมาสร้างรายการในแบบ Python กัน ด้วยการใช้ก้ามปู [] คลุมรายการไว้ และเราต้องใช้เครื่องหมายคำพูดสำหรับแต่ละไอเทมในรายการตามที่ได้เรียนมาก่อนหน้านี้
                    เราใช้ก้ามปูในการบอกตำแหน่งของสิ่งที่อยู่ในรายการเช่น `friends[1]` คือชื่อที่อยู่ตำแหน่งแรกในรายชื่อเพื่อน ซึ่งเราทำให้ดูในโค้ดตัวอย่างช่วงแรก
                    ส่วนช่วงที่สองเราจะแสดงให้เห็นว่าเราเชื่อมรายการสองอันเข้าด้วยกันด้วยตัวแปร i
                example_code: |
                    ```
                    friends = ['อาเหม็ด', 'เบน', 'เคเดน']
                    {print} friends[1] ' คือเพื่อนคนแรกในรายชื่อ'
                    {print} friends[2] ' คือเพื่อนคนที่สองในรายชื่อ'
                    {print} friends[3] ' คือเพื่อนคนที่สามในรายชื่อ'
                    #คราวนี้เราจะเชื่อมรายการ 2 อันด้วยตัวแปร i
                    lucky_numbers = [15, 18, 6]
                    {for} i {in} {range} (1, 3)
                        {print} ตัวเลขนำโชคของ friends[i] 'คือ ' lucky_numbers[i]
                    ```
                story_text_2: |-
                    เมื่อได้เรียนรู้การใช้ก้ามปูกับรายการแล้ว เราสามารถใช้คำสั่ง {at} {random} ในภาษา Python ได้!
                    เพียงใช้คำสั่ง `[random]`ตามหลังชื่อของรายการนั้น!
                example_code_2: |-
                    ```
                    fruit = ['แอปเปิล', 'กล้วย', 'เชอร์รี่']
                    {print} fruit[random]
                    ```
        default_save_name: random_command
        description: แนะนำการใช้คำสั่ง {at} {random}
        name: '{random}'
    repeat_command:
        levels:
            8:
                story_text: |
                    เลเวลนี้ได้เพิ่มคำสั่ง `{repeat}` เข้ามาซึ่ง `{repeat}` ใช้ในการใช้งานคำสั่งซ้ำหลาย ๆ ครั้ง แบบนี้:

                    ### แบบฝึกหัด
                    ทดลองกับคำสั่ง `{repeat}` ดู หนูทำให้เพลงสุขสันต์วันเกิดทำงานด้วยโค้ด 3 บรรทัด แทนที่จะเป็น 4 บรรทัดได้ไหม?
                example_code: |
                    ```
                    {repeat} 3 {times} {print} 'Hedy สนุกจัง!'
                    ```
            9:
                story_text: |
                    ในเลเวลนี้หนูสามารถใช้โค้ดหลายบรรทัดซ้ำๆได้ด้วยคำสั่ง `{repeat}` อันเดียว
                    ซึ่งหนูทำได้โดยการสร้างกลุ่มโค้ดที่ต้องการใช้ซ้ำขึ้นมา
                    ซึ่งการสร้างกลุ่มโค้ดจะต้องใช้ **การย่อหน้า**
                    นั่นหมายถึงการเว้นช่องว่าง 4 ช่องไฟนำหน้าทุกบรรทัด และถึงแม้จะเป็นกลุ่มโค้ดบรรทัดเดียวก็ต้องย่อหน้านะ
                example_code: |
                    ```
                    {repeat} 5 {times}
                        {print} 'สวัสดีทุกคน'
                        {print} 'ทั้งหมดนี้จะถูกพิมพ์ซ้ำ 5 ครั้ง'
                    ```
            10:
                story_text: |
                    เยี่ยมเลย! หนูผ่านมาอีกเลเวลแล้ว ก่อนหน้านี้หนูได้เรียนวิธีใช้คำสั่งหลายบรรทัดพร้อมด้วยคำสั่ง `{if}` หรือ `{repeat}`
                    แต่หนูยังใช้รวมกันไม่ได้...

                    ข่าวดีก็คือในเลเวลนี้หนูสามารถใช้ `{if}` ใน `{if}`, `{repeat}` ใน `{repeat}` หรือจะใช้สลับระหว่างกันก็ได้
                    ลองดูสิ!
                example_code: |
                    ```
                    {repeat} 3 {times}
                        order = {ask} 'เธออยากสั่งอะไร?'
                        {if} order {is} พิซว่า
                            {print} 'หย่อยเลย'
                        {else}
                            {print} 'พิซซ่าดีกว่านะ!'
                    ```
        default_save_name: คำสั่ง_repeat
        description: คำสั่ง {repeat}
        name: '{repeat}'
    repeat_command_2:
        levels:
            8:
                story_text: |
                    ## Repeat กับคำสั่งอื่นและตัวแปร
                    หนูได้ลองฝึกใช้คำสั่ง `{repeat}` ร่วมกับคำสั่ง `{print}` มาแล้ว แต่หนูรู้ไหมว่าสามารถใช้คำสั่งอื่นร่วมกับ `{repeat}` ได้
                    ในโค้ดตัวอย่างนี้หนูจะได้เห็นการใช้ `{repeat}`กับคำสั่งอื่นอย่างเช่น `{ask}`, `{if}` หรือ `{else}`
                example_code: |
                    ```
                    {repeat} 2 {times} answer = {ask} 'เธอรู้ไหมว่าสามารถถามคำถามได้หลายครั้ง?'
                    {if} answer {is} ใช่
                    {repeat} 2 {times} {print} 'เธอรู้อยู่แล้วหนิ!'
                    {else}
                    {repeat} 3 {times} {print} 'คราวนี้ก็ได้รู้แล้วนะ!'
                    ```
                story_text_2: |
                    สิ่งที่น่าสนใจเกี่ยวกับคำสั่ง `{repeat}` ก็คือการใช้ตัวแปรเพื่อกำหนดจำนวนครั้งที่ต้องการซ้ำได้ ในโค้ดตัวอย่างเราจะถามว่าผู้เล่นอายุเท่าไหร่
                    จากนั้นก็จะทวนคำถามตามอายุในบรรทัดที่ 3 ด้วยการใช้ตัวแปร 'age' ร่วมกับคำสั่ง `{repeat}`
                example_code_2: |
                    ```
                    {print} 'เย้! วันนี้วันเกิดเธอสินะ!'
                    age = {ask} 'อายุเท่าไหร่แล้วล่ะ?'
                    {repeat} age {times} {print} 'ไชโย ไชโย โห่ฮิ้ว!'
                    ```
            9:
                story_text: |
                    ### อยุ่ในกลุ่มหรือไม่?
                    ในเลเวลนี้ หนูต้องคิดให้ดีว่าโค้ดไหนควรอยู่ในกลุ่มโค้ด โค้ดไหนไม่ควรอยู่
                    ตัวอย่างเช่นถ้าต้องการร้องเพลง *เธอรู้จักคนขายขนมไหม* หนูอยากให้ท่อน 'คนขายขนมไหม' ถูกร้องซ้ำแค่ 2 ครั้ง 
                    นั่นหมายความว่าบรรทัดสุดท้ายไม่ควรมีย่อหน้า เพราะมันไม่ควรอยู่ในกลุ่มโค้ด
                    ถ้าหนูใส่ย่อหน้าในบรรทัดสุดท้าย เพลงมันจะเพี้ยนเอานะ

                    ### แบบฝึกหัด
                    โค้ดตัวอย่างแต่ละบรรทัดเริ่มต้นด้วยช่องว่าง ให้ลบช่องว่างออกแล้วหาว่าบรรทัดไหนต้องถูกย่อหน้า บรรทัดไหนไม่ต้อง เพื่อเล่นเพลงเธอรู้จักคนขายขนมไหมให้ถูกต้อง
                example_code: |
                    ```
                    _ {print} 'เธอรู้จักคนขายขนมไหม?'
                    _ {repeat} 2 {times}
                    _ {print} 'คนขายขนมไหม'
                    _ {print} 'เธอรู้จักคนขายขนมไหม ที่อยู่ถนนดรูรี่?'
                    ```
        name: '{repeat} 2'
        default_save_name: คำสั่ง_repeat_2
        description: คำสั่ง {repeat} 2
    restaurant:
        levels:
            1:
                story_text: |
                    ในเลเวล 1 หนูสามารถสร้างร้านอาหารจำลองและรับออเดอร์ลูกค้า
                story_text_2: |
                    ### แบบฝึกหัด
                    คัดลอกโค้ดตัวอย่างไปที่หน้าจอป้อนคำสั่งด้วยการคลิกปุ่มสีเหลือง
                    เริ่มต้นด้วยการเติมคำสั่งที่ถูกต้องในช่องว่างเพื่อให้โค้ดทำงานได้
                    จากนั้นเพิ่มโค้ดอีก 4 บรรทัดเพื่อสร้างโปรแกรมร้านอาหาร
                    ถามลูกค้าว่าพวกเขาอยากได้เครื่องดื่มอะไร และจะจ่ายด้วยเงินสดหรือบัตรเครดิต
                    จบท้ายด้วยการบอกลาลูกค้าดี ๆ
                example_code_2: |
                    ```
                    {print} ยินดีต้อนรับสู่ร้านอาหารของเฮดี้🍟
                    _ คุณต้องการสั่งอะไร?
                    {echo} คุณต้องการสั่ง...
                    {print} ขอบคุณสำหรับออเดอร์!
                    {print} เดี๋ยวมาเสิร์ฟให้นะ!
                    ```
            2:
                story_text: |
                    ในเลเวล 2 เราจะขยายร้านอาหารด้วยการใช้ตัวแปร เพราะในเลเวล 1 Hedy ทำได้แค่ `{echo}` ออเดอร์และจำได้แค่สิ่งสุดท้ายที่ถูกสั่งเท่านั้น
                    ด้วยการใช้ตัวแปร Hedy จะสามารถจำได้ทั้งอาหารและท็อปปิ้งที่ถูกสั่ง!
                example_code: |
                    ```
                    {print} ยินดีต้อนรับสู่ร้านอาหารของเฮดี้!
                    {print} วันนี้เรามีเมนูพิซซ่ากับลาซานญ่า
                    food {is} {ask} คุณต้องการกินอะไร?
                    {print} เลือกได้ดี! food นี่ของโปรดเลย!
                    topping {is} {ask} อยากได้เป็นหน้าเนื้อหรือหน้าผัก?
                    {print} food ที่มี topping กำลังถูกปรุงอยู่!
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    คัดลอกโค้ดร้านอาหารจากเลเวลที่แล้วมาใส่ในหน้าป้อนคำสั่งด้านล่าง
                    แก้ไขโค้ดด้วยการแทนที่คำสั่ง {ask} และ {echo} และใช้ตัวแปรอย่างที่ได้เรียนมาก่อนหน้านี้

                    เมื่อโค้ดทำงานปกติแล้ว ถึงเวลาเพิ่มเติมอะไรเข้าไปหน่อย
                    ลองดูบรรทัดสุดท้ายของตัวอย่าง: `{print} food ที่มี topping กำลังถูกปรุง!`
                    ในบรรทัดเดียวนี้ได้ใช้ตัวแปร 2 ตัวเพื่อสรุปออเดอร์ลูกค้า
                    คราวนี้หนูลองสรุปออเดอร์อาหารและเครื่องดื่มดูนะ

                    **เพิ่มเติม** เมื่อเรียนรู้การใช้งานตัวแปรแล้ว หนูสามารถใช้ตัวแปรกี่ตัวก็ได้ใน 1 บรรทัด เพราะฉะนั้นหนูลองเพิ่มตัวแปรดูเพื่อระบุความต้องการของลูกค้าเพิ่มว่าจะกินที่ร้านหรือกลับบ้าน จ่ายเงินสดหรือบัตรเครดิต หรือจะรับหลอดหรือไม่
            3:
                story_text: |
                    มีปัญหาเลือกไม่ถูกว่าจะกินอะไรเป็นมื้อเย็นหรอ? ให้ Hedy ช่วยเลือกให้สิ!
                    เพียงเพิ่มรายการของที่ชอบกิน (หรือของที่ไม่ชอบกิน) แล้วให้ Hedy สุ่มเลือกให้
                    เล่นสนุกเพิ่มเติมด้วยการให้ Hedy เลือกราคาอาหารมื้อเย็นให้ด้วย! หนูจะได้กินอะไรกันนะ?
                example_code: |
                    ```
                    dishes {is} สปาเกตตี้, กะหล่ำดาว, แฮมเบอร์เกอร์
                    {print} คืนนี้คุณจะต้องกิน {at} {random}!
                    prices {is} 100 บาท, 1000 บาท, 10000 บาท
                    {print} ราคาอาหารจะเท่ากับ prices {at} {random}
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    คราวนี้มาสร้างร้านอาหารแบบสุ่มเลือกกัน
                    จงสร้างรายการเมนูเริ่มต้น เมนูหลัก เมนูของหวาน เครื่องดื่ม และราคาขึ้นมา
                    จากนั้นใช้คำสั่ง `{print}` และ `{at} {random}` เพื่อแจ้งลูกค้าว่าจะได้กินเมนูอะไรคืนนี้
                example_code_2: |
                    ```
                    {print} ยินดีต้อนรับสู่ร้านอาหารของเฮดี้
                    starters {is} _
                    mains {is} _
                    desserts {is} _
                    drinks {is} _
                    prices {is} _
                    _
                    ```
            4:
                story_text: |
                    หนูจะต้องใช้เครื่องหายคำพูดเวลาใช้คำสั่ง `{print}` หรือ `{ask}` ในการผจญภัยร้านอาหารนี้

                    ### แบบฝึกหัด
                    เติมเครื่องหมายคำพูดในโค้ดเพื่อทำให้สมบูรณ์ ระวังว่าตัวแปรไม่ควรจะอยู่ในเครื่องหมายคำพูด
                    จากนั้นใช้คำสั่ง `{clear}` เพื่อให้หน้าจอแสดงผลโชว์ที่ละบรรทัด

                    ### แบบฝึกหัด 2
                    กลับไปที่เลเวลก่อนหน้าและคัดลอกโค้ดร้านอาหารของหนู จากนั้นทำให้โค้ดสมบูรณ์ด้วยการเพิ่มเครื่องหมายคำพูดให้ถูกต้องและเพิ่มคำสั่ง `{clear}`
                example_code: |
                    ```
                    _ เพิ่มเครื่องหมายคำพูดในโค้ด _
                    {print} ยินดีต้อนรับสู่ร้านอาหารเชสเฮดี้!
                    {print} วันนี้เราเสิร์ฟพิซซ่ากับลาซานญ่า.
                    food {is} {ask} คุณอยากกินอะไร?
                    {print} เยี่ยมเลย! เมนู  food  คือของโปรดฉัน!
                    topping {is} {ask} อยากได้หน้าเนื้อหรือหน้าผัก?
                    {print} food  ที่มี  topping  กำลังถูกทำ!
                    drinks {is} {ask} คุณอยากได้เครื่องดื่มอะไร?
                    {print} ขอบคุณสำหรับออเดอร์
                    {print} food  และ  drinks  จะถูกนำไปเสิร์ฟในไม่ช้า!
                    ```
            6:
                story_text: |
                    ### แบบฝึกหัด
                    โค้ดตัวอย่างได้โชว์วิธีเขียนโปรแกรมในกรณีที่ของในเมนูอาจจะหมดแล้ว
                    คัดลอกโค้ดจากเลเวลก่อนหน้า สร้างปัญหาขึ้นมาและเขียนโค้ดเหมือนกับที่แสดงในตัวอย่าง
                    ปัญหาที่เกิดขึ้นได้เช่นเมนูของหมด, ไม่สามารถรับบัตรเครดิต หรือเครื่องทำไอศกรีมเสีย

                    **เพิ่มเติม** ได้ลองเขียนโปรแกรมปัญหาและการตอบสนองที่เหมาะสมหรือยัง? ลองเพิ่มคำสั่ง `{if}` และ `{else}` ในโค้ดเพิ่ม
                    ลองเพิ่มคำสั่ง `{if}` หลังจากคำสั่ง `{ask}` ในโค้ด เพื่อทำให้โค้ดสร้างปฏิสัมพันธ์ได้มากที่สุด!
                example_code: |
                    ```
                    drinks_in_stock {is} น้ำเปล่า, น้ำมะนาว, โคล่า, น้ำส้ม
                    drink {is} {ask} 'คุณอยากดื่มอะไร?'
                    {if} drink {in} drinks_in_stock
                    {print} drink 'หนึ่งที่!'
                    {else}
                    {print} 'ขอโทษด้วย เราไม่ได้ขายอันนั้น'
                    ```
            7:
                story_text: |
                    ในเลเวลนี้เราใช้คณิตศาสตร์มาช่วยคำนวณราคารวมของออเดอร์ลูกค้าได้เพื่อทำให้ร้านอาหารสมจริงขึ้น
                    แต่หนูสามารถเพิ่มอะไรอีกหลายอย่างเข้าไปในร้านอาหารได้เช่นเพิ่มคอร์สอาหาร

                    ### แบบฝึกหัด
                    หนูสามารถเพิ่มเติมหลายอย่างเข้าไปในร้านอาหารเช่น...
                    - ถามลูกค้าว่ามากันกี่คน และคำนวณราคาโดยคูณจำนวนคน?
                    - เพิ่มคอร์สอาหาร?
                    - ให้ส่วนลดเมื่อผู้เล่นกรอกรหัสคูปองลับ?
                    - เพิ่มเมนูสำหรับเด็ก?
                    - ลองคิดอะไรสนุก ๆ ที่ใส่เข้าไปได้อีก?
                example_code: |
                    หนูสามารถสร้างโค้ดร้านอาหารง่าย ๆ แบบนี้::
                    ```
                    {print} 'ยินดีต้อนรับสู่ร้านอาหารเชสเฮดี้'
                    {print} 'เมนูของเราคือ:'
                    {print} 'คอร์สหลักได้แก่พิซซ่า, ลาซานญ่า หรือสปาเกตตี้'
                    main = {ask} 'คุณอยากสั่งคอร์สหลักไหน?'
                    price = 0
                    {if} main {is} พิซว่า
                    price = 10
                    {if} main {is} ลาซานญ่า
                    price = 12
                    {if} main {is} สปาเกตตี้
                    price = 8
                    {print} 'คุณได้สั่ง' main
                    {print} 'ทั้งหมดาราคา ' price ' บาท'
                    {print} 'ขอบคุณที่ใช้บริการ ทานให้อร่อย!!'
                    ```
            8:
                story_text: |
                    ในเลเวลนี้หนูได้เรียนการใช้คำสั่ง `{repeat}` เพื่อใช้งานโค้ดซ้ำ ๆ
                    หนูสามารถใช้งานสิ่งนี้เพื่อ `{ask}` ลูกค้าหลายคนว่าพวกเขาต้องการกินอะไร

                    ### แบบฝึกหัด
                    หนูทำให้โค้ดสมบูรณ์ได้ไหม? Hedy ต้องถามคำถามซ้ำ ๆ เท่ากับจำนวนลูกค้า ถ้ามีลูกค้า 5 คน คำถามต้องถูกถาม 5 ครั้ง
                    **เพิ่มเติม** ขยายโค้ดด้วยคำถามที่มากขึ้นอย่างเช่นถามเกี่ยวกับเครื่องดื่มหรือซอส
                example_code: |
                    ```
                    {print} 'ยินดีต้อนรับสู่ร้านอาหารเชสเฮดี้'
                    people = {ask} 'ลูกค้ามากี่ท่านครับวันนี้?'
                    ```
            9:
                story_text: |
                    ในเลเวลนี้หนูสร้างร้านอาหารที่ซับซ้อนขึ้นด้วยการใช้โค้ดซ้ำ ๆ ได้ แบบนี้:

                    ### แบบฝึกหัด
                    โค้ดนี้ถูกขยายเพิ่มได้ด้วยการเพิ่มไอเทมเข้าไปในเมนู ตัวอย่างเช่นเมนูเครื่องดื่ม หรือคอร์ส หรือของหวาน ลองเพิ่มไอเทมเพิ่มดูสักอย่าง
                    **เพิ่มเติม** เพิ่มไอเทมเข้าไปให้มากที่สุดเท่าที่ต้องการ!
                example_code: |
                    ```
                    {print} 'ยินดีต้อนรับสู่ร้านอาหารเชสเฮดี้!'
                    people = {ask} 'ลูกค้าวันนี้มากี่ท่านครับ?'
                    {print} 'ดีเลย!'
                    {repeat} people {times}
                        food = {ask} 'คุณต้องการสั่งอะไร?'
                        {print} food
                    {print} 'ขอบคุณสำหรับออเดอร์!'
                    {print} 'ทานให้อร่อย!'
                    ```
            10:
                story_text: |
                    ในเลเวลนี้หนูสามารถใช้การเขียนโค้ดซ้อนกันเพื่อทำให้ร้านอาหารสมจริงและสนุกขึ้น!

                    ### แบบฝึกหัด
                    ย่อหน้าได้ถูกลบออกไปจากโค้ดตัวอย่าง 
                    หนูลองหาว่าแต่ละบรรทัดต้องการย่อหน้ามากแค่ไหนเพื่อให้โค้ดทำงานได้?
                    ถ้าลูกค้าสั่งพิซซ่า Hedy ไม่ควรถามว่าลูกค้าต้องการซอสอะไร

                    **เพิ่มเติม** ร้านอาหารไม่ได้สต็อคซอสไว้ทั้งหมด ทำรายการของซอสที่มีและตอบลูกค้าแต่ละออเดอร์ว่ามีอะไรขายบ้าง <br>
                    **เพิ่มเติม** พิซซ่ามีท็อปปิ้ง ถามลูกค้าว่าอยากได้หน้าอะไร<br>
                    **เพิ่มเติม** ลูกค้าต้องการเครื่องดื่มไหม? ถามพวกเขาดู! <br>
                example_code: |
                    ```
                    {print} 'ยินดีต้อนรับสู่ร้านอาหารเชสเฮดี้!'
                    people = {ask} 'วันนี้ลูกค้ามากี่ท่าน?'
                    {print} 'ได้เลย!'
                    price = 0
                    {repeat} people {times}
                    _ food = {ask} 'ต้องการสั่งอะไร?'
                    _ {print} food
                    _ {if} food {is} มันฝรั่งทอด
                    _ price = price + 3
                    _ sauce = {ask} 'อยากได้ซอสกินคู่กับมันฝรั่งทอดเป็นอะไร?'
                    _ {if} sauce {is} ไม่ต้องการ
                    _ {print} 'ไม่รับซอส'
                    _ {else}
                    _ price = price + 1
                    _ {print} 'พร้อม' sauce
                    _ {if} food {is} พิซซ่า
                    _ price = price + 4
                    {print} 'ทั้งหมดรวมกันเป็น ' price ' ดอลลาร์'
                    {print} 'ทานให้อร่อย!'
                    ```
                story_text_2: |
                    ในเลเวลนี้เราเรียนรู้คำสั่งใหม่เพิ่มเติมกัน

                    ### แบบฝึกหัด 1
                    วาง `{and}` และ `{or}` ในตำแหน่งที่เหมาะสม

                    ### แบบฝึกหัด 2
                    ขยายโค้ดด้วยการเพิ่มคำสั่ง `{and}` และ `{or}` อย่างน้อยคำสั่งละ 1 ครั้ง
                    เช่นสร้างคูปองส่วนลดพิเศษที่ใช้งานได้เฉพาะเมื่อสั่งพิซซ่าหรือให้เครื่องดื่มฟรีกับลูกค้า
                    เมื่อซื้อมันฝรั่งทอดกับแพนเค้ก หรือจะลองอย่างอื่นดูก็ได้!
                example_code_2: |
                    ```
                    price = 10
                    food = {ask} 'คุณต้องการกินอะไร?'
                    drinks = {ask} 'คุณต้องการเครื่องดื่มอะไร?'
                    {if} food {is} 'แซนด์วิช' _ drinks {is} 'น้ำผลไม้'
                        {print} 'นั่นเป็นเมนูโปรโมชัน'
                        price = price - 3
                    {if} drinks {is} 'น้ำเปล่า' _ drinks {is} 'น้ำผลไม้'
                        {print} 'เมนูสุขภาพดี'
                    {print} 'ทั้งหมดรวมเป็น ' price ' ดอลลาร์'
                    ```
            11:
                story_text: |
                    ในเลเวลนี้หนูจะได้เรียนวิธีการถามออเดอร์สำหรับคอร์สที่ต่างกัน

                    ### แบบฝึกหัด 1
                    ทำให้โค้ดสมบูรณ์ด้วยการเติม `{ask}` ในช่องว่างเพื่อถามลูกค้าว่าเขาต้องการกินอะไรในแต่ละคอร์ส
                example_code: |
                    ```
                    courses = ของทานเล่น, เมนูหลัก, ของหวาน
                    {for} course {in} courses
                        {print} 'คุณต้องการสั่งอะไรสำหรับ' course '?'
                        _ 
                        _
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    แน่นอนว่าเราให้ลูกค้าหลายคนสั่งอาหารได้
                    หนูสามารถเพิ่มการย่อหน้าในแต่ละบรรทัดที่ถูกต้องเพื่อให้โค้ดทำงานปกติได้ไหม?
                    คำใบ้: บางบรรทัดไม่จำเป็นต้องมีย่อหน้า
                example_code_2: |
                    ```
                    _ courses = ของทานเล่น, เมนูหลัก, ของหวาน
                    _ names = ทิม่อน, โอโน่
                    _ {for} name {in} names
                    _ {for} course {in} courses
                    _ food = {ask} name ', คุณอยากสั่งอะไรสำหรับ' course '?'
                    _ {print} name 'สั่ง' food 'สำหรับ' course
                    ```
            16:
                story_text: |
                    ด้วยคำสั่ง `{while}` หนูสามารถทำให้แน่ใจว่าลูกค้าสามารถสั่งออเดอร์ได้จนกว่าจะพอใจ

                    ### แบบฝึกหัก
                    เติมคำสั่ง `{while}` ให้ถูกต้อง
                example_code: |
                    ```
                    {print} 'ยินดีต้อนรับสู่แมคเฮดี้'
                    more = 'ใช่'
                    _
                        order = {ask} 'คุณต้องการสั่งอะไร?'
                        {print} order
                        more = {ask} 'ต้องการสั่งอะไรเพิ่มเติมอีกไหม?'
                    {print} 'ขอบคุณที่ใช้บริการ!'
                    ```
        name: ร้านอาหาร
        default_save_name: ร้านอาหาร
        description: สร้างร้านอาหารจำลอง
    rock:
        levels:
            1:
                story_text: |
                    ในเลเวล 1 เรามาเริ่มสร้างเกมเป่ายิ้งฉุบกัน

                    ด้วย `{ask}` หนูสามารถสร้างการตัดสินใจได้ และด้วย `{echo}` หนูทวนการตัดสินใจนั้นได้
                example_code: |
                    ```
                    {print} เธอเลือกอะไร?
                    {ask} เลือกว่าจะออกค้อน กรรไกร หรือกระดาษ
                    {echo} เธอเลือก:
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    Instead of using words, you could also use emojis: ✊✋✌
                    Can you create a code using emojis?
                example_code_2: |
                    ```
                    {print} เธอเลือกอะไร?
                    {ask} เลือกจาก _
                    {echo} เธอเลือก:
                    ```
            2:
                story_text: |
                    ในเลเวลนี้เรามาฝึกการใช้ตัวแปรกันเพื่อพัฒนาเกมเป่ายิ้งฉุบไปอีกขั้น!
                    ### แบบฝึกหัด
                    ทำให้โค้ดเสร็จสมบูรณ์โดยการเติม **ตัวแปร** ในช่องว่าง
                    เกมนี้ยังไม่ค่อยมีปฏิสัมพันธ์เท่าไหร่ แต่ไม่ต้องห่วง เพราะการผจญภัยหน้าเราจะสอนใช้ตัวแปรควบคู่กับคำสั่ง `{ask}` เพื่อทำให้เกมมีการตอบโต้กับผู้เล่นมากขึ้น!
                example_code: |-
                    ```
                    choice {is} ค้อน
                    {print} ฉันเลือก _
                    ```
            3:
                story_text: |
                    หนูใช้คำสั่ง `{at} {random}` เพื่อให้คอมพิวเตอร์สุ่มเลือกให้

                    ### แบบฝึกหัด
                    ทำให้โค้ดสมบูรณ์ด้วยการใช้คำสั่ง `{at} {random}`
                example_code: |
                    ```
                    choices {is} ค้อน, กรรไกร, กระดาษ
                    {print} choices _
                    ```
                story_text_2: |
                    **เสริม** ทำให้เกมเล่นได้ 2 คน อันดับแรกถามชื่อของผู้เล่นทั้งสองจากนั้นให้คอมพิวเตอร์สุ่มเลือกว่าจะออกอะไร
                example_code_2: |
                    ```
                    choices {is} ค้อน, กรรไกร, กระดาษ
                    player_1 {is} {ask}ชื่อผู้เล่นคนที่ 1:
                    _
                    ```
            4:
                story_text: |
                    ในเลเวลนี้เราจะโปรแกรมเกมเป่ายิ้งฉุบเพิ่ม แต่ถ้าอยากเพิ่มข้อความเราต้องใช้เครื่องหมายคำพูดในโค้ด
                    ### แบบฝึกหัด
                    เติมเครื่องหมายคำพูดในช่องว่าง แต่จำไว้ว่าตัวแปร `choices` ต้องอยู่นอกเครื่องหมายคำพูด
                example_code: |
                    ```
                    choices {is} ค้อน, กรรไกร, กระดาษ
                    {print} _คอมพิวเตอร์ออก..._ choices {at} {random}
                    ```
            5:
                story_text: |
                    ในเลเวลนี้เราตัดสินว่ามันเสมอหรือไม่ได้ ซึ่งจะต้องใช้คำสั่งใหม่ `{if}`

                    ### แบบฝึกหัด
                    ทำให้โค้ดสมบูรณ์ด้วยการเติมช่องว่าง:
                    * ทำให้คอมพิวเตอร์เลือกออกตัวเลือกแบบสุ่ม
                    * ถามผู้เล่นว่าต้องการออกอะไร
                    * เติมตัวแปรที่ถูกต้องในบรรทัดที่ 4 และ 5
                    * เขียนโค้ดบรรทัดที่ 6 ให้ Hedy ตรวจสอบว่าผลเสมอกันหรือไม่
                example_code: |
                    ```
                    options {is} ค้อน, กรรไกร, กระดาษ
                    computer_choice {is} _
                    choice {is} _
                    {print} 'คุณออก' _
                    {print} 'คอมพิวเตอร์ออก' _
                    {if} _ {is} _ {print} 'เสมอกัน!' {else} {print} 'มีผู้ชนะ'
                    ```

                    เติมช่องว่างด้วยโค้ดที่ถูกต้องเพื่อดูว่าผลเสมอกันหรือไม่
            10:
                story_text: |
                    ด้วยคำสั่ง `{and}` หนูสามารถย่อขนาดโค้ดเกมเป่ายิ้งฉุบได้ ลองดูโค้ดตัวอย่างนี้

                    ### แบบฝึกหัด
                    ทำให้โค้ดสมบูรณ์ด้วยการตัดสินหาผู้ชนะ รันโค้ดหลาย ๆ รอบเพื่อตรวจสอบว่ามีผู้ชนะถูกแสดงผลขึ้นมาไหม
                example_code: |
                    ```
                    options = 'ค้อน', 'กรรไกร', 'กระดาษ'
                    your_choice = {ask} 'คุณเลือกออกอะไร?'
                    computer_choice = options {at} {random}
                    {print} 'คุณออก' your_choice
                    {print} 'คอมพิวเตอร์ออก' computer_choice
                    {if} computer_choice {is} your_choice
                        {print} 'เสมอกัน'
                    {elif} computer_choice {is} 'ค้อน' {and} your_choice {is} 'กระดาษ'
                        {print} 'คุณชนะ!'
                    {elif} computer_choice {is} 'ค้อน' {and} your_choice {is} 'กรรไกร'
                        {print} 'คอมพิวเตอร์ชนะ!'
                    _
                    ```
            11:
                story_text: |
                    ### แบบฝึกหัด
                    ในเลเวลก่อนหน้าเราได้สร้างเกมเป่ายิ้งฉุบมาหลายครั้งแล้ว คราวนี้หนูสามารถเขียนโค้ดและใช้คำสั่ง `{for}` ให้ถูกต้องเพื่อทำให้เกมทำงานได้ไหม
                example_code: |
                    ```
                    choices = _
                    players = _
                    {for} _
                    ```
            16:
                story_text: |
                    ### แบบฝึกหัด
                    เล่นจนกว่าจะเอาชนะคอมพิวเตอร์ได้! แต่เราต้องทำให้โค้ดเสร็จก่อนนะ...
                example_code: |
                    ```
                    won = 'ไม่ใช่'
                    options = 'ค้อน', 'กรรไกร', 'กระดาษ'
                    {while} won == 'ไม่ใช่'
                        your_choice = {ask} 'คุณเลือกออกอะไร?'
                        computer_choice = options {at} {random}
                        {print} 'คุณออก' your_choice
                        {print} 'คอมพิวเตอร์ออก' computer_choice
                        {if} computer_choice == your_choice
                            {print} 'เสมอ!'
                        {if} computer_choice == 'ค้อน' {and} your_choice == 'กรรไกร'
                            {print} 'คุณแพ้!'
                        {if} computer_choice == 'ค้อน' {and} your_choice == 'กระดาษ'
                            {print} 'คุณชนะ!'
                            won = 'ใช่'
                    _
                    ```
        name: ค้อน กรรไกร กระดาษ
        default_save_name: ค้อน_2
        description: สร้างเกมเป่ายิ้งฉุบของตัวเอง
    rock_2:
        levels:
            2:
                story_text: |
                    เมื่อหนูรู้จักการใช้คำสั่ง `{ask}` แล้ว หนูสามารถทำให้เกมเป่ายิ้งฉุบมีการโต้ตอบมากขึ้น!

                    ### แบบฝึกหัด
                    ทำให้เกมเป่ายิ้งฉุบมีการโต้ตอบมากขึ้นด้วยการเพิ่มคำสั่ง `{ask}` และคำถามในโค้ด
                example_code: |
                    ```
                    choice {is} _
                    {print} ฉันเลือก choice
                    ```
        name: ค้อน กรรไกร กระดาษ 2
        default_save_name: ค้อน_2
        description: เป่ายิ้งฉุบ ส่วนที่ 2
    secret:
        levels:
            10:
                story_text: |
                    เราทำให้โค้ดสุดยอดสายลับง่ายขึ้นด้วย `{and}` ซึ่งจะทำให้เราใช้ `{if}` แค่ครั้งเดียวได้

                    ### แบบฝึกหัด 1
                    ทำให้โค้ดสมบูรณ์ด้วยการเติมคำสั่งที่ถูกต้องในช่องว่าง คำใบ้: สุดยอดสายลับต้องตอบคำถามทั้งสองอันให้ถูกต้องถึงจะได้ข้อมูลลับไป!

                    ### แบบฝึกหัด 2
                    เราต้องทำให้ศัตรูสับสนมากกว่านี้! สร้างรายการข้อมูลปลอมและสุ่มเลือกเมื่อสายลับตอบคำถามผิด
                example_code: |
                    ```
                    name = {ask} 'คุณชื่ออะไร?'
                    password = {ask} 'รหัสล่ะ?'
                    {if} name {is} 'Agent007' _ password {is} 'TOPSECRET'
                        {print} 'จงไปที่สนามบินตอน 02:00 น.'
                    {else}
                        {print} 'จงไปที่สถานีรถไฟตอน 10:00 น.'
                     ```
        name: สุดยอดสายลับ
        default_save_name: สุดยอดสายลับ
        description: มาเขียนโค้ดสายลับกัน
    sleep_command:
        levels:
            2:
                story_text: |
                    คำสั่งใหม่ในเลเวลนี้คือ `{sleep}` ซึ่งจะหน่วงโปรแกรมครู่หนึ่ง ถ้าหนูใส่ตัวเลขข้างหลังคำสั่ง `{sleep}` โปรแกมก็จะหยุดพักตามจำนวนวินาทีที่ระบุ

                    ### แบบฝึกหัด
                    ฝึกใช้คำสั่งใหม่นี้ด้วยการเขียนโค้ดโดยใช้คำสั่ง `{sleep}` อย่างน้อย 3 ครั้ง โดยที่คำสั่ง `{sleep}` แต่ละครั้งหยุดนานไม่เท่ากัน
                example_code: |
                    ```
                    {print} สีที่ฉันชอบคือ...
                    {sleep} 2
                    {print} สีเขียว!
                    ```
        default_save_name: คำสั่ง_sleep
        name: '{sleep}'
        description: แนะนำการใช้คำสั่ง {sleep}
    songs:
        levels:
            7:
                story_text: |
                    เพลงส่วนใหญ่จะมีส่วนที่ซ้ำกันหลายจุด ซึ่งการซ้ำนั้นอิงจากจำนวนครั้งการนับ
                    ตัวอย่างเช่นเพลง 'ขวดวางอยู่บนชั้น' ซึ่งหนูสามารถเขียนโปรแกรมเพลงนั้นด้วยคณิตศาสตร์ได้ 

                    คำใบ้: ใช้ฟังก์ชันอ่านออกเสียงเพื่อให้ Hedy ร้องเพลงให้ฟังได้!

                    ### แบบฝึกหัด
                    หนูสามารถให้โค้ดบรรทัดที่ 2 ถึง 7 ทำงานซ้ำได้เท่าที่ต้องการด้วยการคัดลอกซ้ำ ๆ
                example_code: |
                    ```
                    verse = 99
                    {print} 'ขวด ' verse ' ใบวางอยู่บนชั้น'
                    {print} 'ขวด ' verse ' ใบวางอยู่บนชั้น'
                    {print} 'ตกลงมาแตกใบหนึ่ง เหลือขวดกี่ใบ'
                    verse = verse - 1
                    {print} 'ขวด ' verse ' ใบวางอยู่บนชั้น'
                    {sleep}
                    ```
                story_text_2: |
                    เพลงเด็กนี้จะนับจำนวนจากลิง 5 ตัว จนเหลือแค่ 1 ตัว
                    ถ้าหนูคัดลอกโค้ดบรรทัดที่ 2 ถึง 7 แล้วเอามาใช้ซ้ำ หนูก็จะร้องเพลงทั้งเพลงได้
                example_code_2: |
                    ```
                    number = 6
                    number = number - 1
                    {print} 'เจ้าลิง ' number ' ตัวกระโดดอยู่บนเตียง'
                    {print} 'ตัวหนึ่งตกลงมาหัวกระแทกพื้น'
                    {print} 'คุณแม่โทรหาคุณหมอ คุณหมอก็พูดว่า'
                    {print} 'ห้ามเจ้าลิงกระโดดบนเตียงอีกนะ!'
                    {sleep}
                    ```
            8:
                story_text: |
                    เพลงบางเพลงก็มีการซ้ำคำเยอะมาก ๆ เช่นเพลงเบบี้ชาร์ค ที่เวลาร้องก็จะร้องท่อนซ้ำ ๆ หลายครั้ง

                    เบบี้ชาร์ค ดูดู่ดดูดู ดูดู่ด <br>
                    เบบี้ชาร์ค ดูดู่ดดูดู ดูดู่ด <br>
                    เบบี้ชาร์ค ดูดู่ดดูดู ดูดู่ด <br>
                    เบบี้ชาร์ค

                    ### แบบฝึกหัด
                    ลองใช้ `{repeat}`เล่นเพลงเบบี้ชาร์คได้ไหม? จงทำให้โค้ดสมบูรณ์ด้วยการเติมคำในช่องว่าง
                    **เพิ่มเติม** นอกจากเบบี้ชาร์คยังมีเพลงอื่นที่มีลักษณะการซ้ำคำเยอะๆ เหมือนกัน
                    หนูลองนึกถึงเพลงอื่นแล้วลองทำดูได้ไหม?
                example_code: |
                    ```
                    {repeat} _ _ {print} 'เบบี้ชาร์ค ดูดู่ดดูดู ดูดู่ด'
                    {print} 'เบบี้ชาร์ค'
                    ```
            9:
                story_text: |
                    ในเลเวลก่อนหน้าหนูได้เขียนโปรแกรมเพลงขวดวางอยู่บนชั้น แต่ว่าถ้าไม่ใช้คำสั่ง `{repeat}` หนูก็จะต้องคัดลอกและวางท่อนเพลงหลายครั้งมาก
                    ในเลเวลนี้หนูสามารถร้องเพลงซ้ำ 99 ครั้ง ด้วยการเพิ่มโค้ดแค่บรรทัเดียว!

                    ### แบบฝึกหัด
                    เติมคำสั่งในช่องว่างให้ถูกต้องและเว้นย่อหน้าให้เหมาะสม
                example_code: |
                    ```
                    verse = 99
                    _ 99 {times}
                    {print} 'ขวด ' verse ' ใบวางอยู่บนชั้น'
                    {print} 'ขวด ' verse ' ใบวางอยู่บนชั้น'
                    {print} 'ตกลงมาแตกใบหนึ่ง เหลือขวดกี่ใบ'
                    verse = verse - 1
                    {print} 'ขวด ' verse ' ใบวางอยู่บนชั้น'
                    ```
            11:
                story_text: |
                    ด้วยการใช้ `{for}` หนูสามารถแสดงผลเพลงเบบี้ชาร์คทั้งเพลงด้วยโค้ดแค่ 5 บรรทัด!

                    ### แบบฝึกหัด1
                    หนูทำให้โค้ดเพลงเบบี้ชาร์คสั้นลด้วยคำสั่ง `{for}` อันเดียวได้ไหม? มาลองทำในโค้ดตัวอย่างกัน
                example_code: |
                    ```
                    family = เบบี้, มอมมี่, แดดดี้, แกรนด์มา, แกรนด์ปา
                    _ _ _ _ 
                      {print} _
                    ```
                story_text_2: |
                    ### แบบฝึกหัด 2
                    แสดงผลเพลงลิง 5 ตัวกระโดดอยู่บนเตียง ถ้าจำเนื้อเพลงไม่ได้ก็ไปหาในอินเทอร์เน็ตได้นะ

                    **เพิ่มเติม** แสดงผลเพลงตาแมคโดนัลด์มีฟาร์ม แล้วทำให้มั่นใจว่าสัตว์แต่ละตัวส่งเสียงต่างกันด้วยการใช้ `{if}`
                example_code_2: |
                    ```
                    monkeys = 5, 4, 3, 2, 1
                    ```
            13:
                story_text: |
                    คราวนี้เรามาใช้ไวยกรณ์ของภาษา Python กัน เพลงก่อนหน้าที่เคยเขียนก็ต้องปรับเป็นภาษา Python ด้วย!

                    ### แบบฝึกหัด 1
                    โค้ดตัวอย่างเราใช้เพลงจะทำยังไงกับกะลาสีขี้เมาดี? แต่ว่ามันยังไม่สมบูรณ์
                    หนูทำให้โค้ดกลับมาทำงานได้ไหม? คำใบ้คือเราได้ใส่ _ ไว้ตรงจุดที่เป็นปัญหา 

                    ### แบบฝึกหัด 2
                    ลองหาเนื้อเพลงของเพลงตาแมคโดนัลด์มีฟาร์มแล้วแก้ไขให้ถูกต้องดู
                example_code: |
                    ```
                    lines = ['จะทำยังไงกับกะลาสีขี้เมา?', 'จับเขาโกนพุงด้วยมีดโกนสนิม', 'จับเขาโยนลงไปในเรือบดซะ']
                    {for} line {in} lines _
                        {for} i {in} {range} (1, 3) _
                            {print} _ line _
                        {print} 'ในตอนเช้าตรู่อย่างนี้!'
                        {for} i {in} {range} (1, 3)
                            {print} 'เวย์ เฮย์ แล้วเขาก็ลุกขึ้น'
                        {print} 'ในตอนเช้าตรู่อย่างนี้!'
                    ```
            14:
                story_text: |
                    ในเลเวลนี้หนูสามารถเขียนเพลงตาแมคโดนัลด์มีฟาร์มได้เร็วขึ้น หนูสามารถโยงสัตว์ที่ถูกต้องเข้ากับเสียงของมันด้วยการวางทั้งสองอย่างคู่กันในรายการ
                    เราได้เขียนเพลงจะทำยังไงกับกะลาสีขี้เมาดี?อย่างรวดเร็ว ซึ่งใช้โค้ดแค่ 8 บรรทัดเท่านั้น ลองดูนะ!

                    ### แบบฝึกหัด
                    เขียนเพลงตาแมคโดนัลด์มีฟาร์มให้สมบูรณ์ด้วยการกำหนดตัวแปร `animal` เป็น `animals[i]` และ `sound` เป็น `sounds[i]`.
                example_code: |
                    ```
                    animals = ['หมู', 'หมา', 'วัว']
                    sounds = ['อู๊ด', 'โฮ่ง', 'มอ']
                    {for} i {in} {range} (1, 3)
                        animal = _
                        sound = _
                        {print} 'ตาแมคโดนัลด์มีฟาร์ม'
                        {print} 'E I E I O!'
                        {print} 'ในฟาร์มมี' animal 'สักตัว'
                        {print} 'E I E I O!'
                        {print} 'ร้อง ' sound sound ' ตรงนี้'
                        {print} 'ร้อง ' sound sound ' ตรงโน้น'
                        {print} 'นี่ก็ ' sound
                        {print} 'นั่นก็ ' sound
                        {print} 'ที่ไหนก็ร้อง ' sound sound
                    ```

                    ```
                    lines = ['จะทำยังไงกับกะลาสีขี้เมา?', 'จับเขาโกนพุงด้วยมีดโกนสนิม', 'จับเขาโยนลงไปในเรือบดซะ']
                    {for} line {in} lines
                        {for} i {in} {range} (1, 3)
                            {print} line
                        {print} 'ในตอนเช้าตรู่อย่างนี้!'
                        {for} i {in} {range} (1, 3)
                            {print} 'เวย์ เฮย์ แล้วเขาก็ลุกขึ้น'
                        {print} 'ในตอนเช้าตรู่อย่างนี้!'
                    ```
            15:
                story_text: |
                    ในการผจญภัยก่อนหน้าหนูได้เรียนวิธีใช้อาร์กิวเมนต์กับฟังก์ชันแล้ว แต่หนูรู้ไหมว่าสามารถใช้มันร่วมกับคำสั่ง `{ask}` ได้เหมือนกัน?
                    ในตัวอย่างเราได้แก้ไขโปรแกรมเพลง 'My Bonnie' แล้วทำให้มันมีการโต้ตอบมากขึ้น ทำให้หนูสามารถถามว่าบอนนี่อยู่ที่ไหนได้
                example_code: |
                    ```
                    {define} song (place)
                        {print} 'My Bonnie lies over the ' place

                    chosen_place = {ask} 'อยากให้บอนนี่ไปอยู่ไหน?'
                    synonym = {ask} 'คำอื่นสำหรับสถานที่นั้นคืออะไร?'

                    song(chosen_place)
                    song(synonym)
                    song (chosen_place)
                    ```
        name: มาร้องเพลงกัน!
        default_save_name: บทเพลง
        description: แสดงผลบทเพลง
    songs_2:
        levels:
            11:
                story_text: |
                    ### แบบฝึกหัด
                    ทำให้เพลงกล่อมเด็กนี้สมบูรณ์!
                example_code: |
                    ```
                    number = 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten'
                    object = 'on his drum', 'on his shoe', 'on his knee', 'on his door', 'on his hive', 'on his sticks', 'up in heaven', 'on his gate', 'on his vine', 'once again'

                    _
                        {print} 'This old man'
                        {print} 'He played ' _
                        {print} 'He played knick-knack ' _
                        {print} 'With a knick-knack paddywhack'
                        {print} 'Give the dog a bone'
                        {print} 'This old man came rolling home'
                        {sleep} 8
                        {clear}
                    ```
                story_text_2: |
                    ### แบบฝึกหัด 2
                    คราวนี้มาเขียนโค้ดสำหรับเพลงเด็ก 'The wheels on the bus' ในแบบเดียวกัน!
                example_code_2: |
                    ```
                    object = 'wheels', 'doors', _
                    movement = 'round and round', 'open and shut', _
                    ```
            12:
                story_text: |
                    บางเพลงอาจมีการซ้ำคำเยอะ ซึ่งเราสามารถใช้ฟังก์ชันมาช่วยได้
                    ### แบบฝึกหัด
                    ลองดูโค้ดตัวอย่างที่ใช้ฟังก์ชันแล้วเติมเพิ่มอีก 2 บรรทัดเพื่อทำให้เพลงสมบูรณ์
                example_code: |
                    ```
                    {define} twinkle
                        {print} 'Twinkle'
                        {print} _

                    {call} twinkle
                    {print} 'Up above the world so high'
                    {print} 'Like a diamond in the sky'
                    _
                    ```
        name: มาร้องเพลงกันเถอะ! 2
        default_save_name: บทเพลง 2
        description: ร้องเพลง 2
    turtle:
        levels:
            1:
                story_text: |
                    หนูใช้ Hedy วาดรูปได้ ด้วยการรวมการวาดเส้นและการหัน หนูก็จะวาดสี่เหลี่ยมหรือบันไดได้

                    ใช้ `{forward}` เพื่อวาดเส้นตรง ใส่ตัวเลขด้านหลังเพื่อระบุระยะทางที่เต่าจะเดิน ส่วนคำสั่ง `{turn} {right}` จะหัน 90 องศาตามเข็มนาฬิกา และ `{turn} {left}` จะหัน 90 องศาแบบทวนเข็มนาฬิกา

                    ถ้าอยากถอยหลังให้ใช้ `{forward}` คู่กับเลขที่ติดลบเช่น `{forward} -100`
                example_code: |
                    ```
                    {forward} 100
                    {turn} {left}
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    เราได้เริ่มขั้นบันไดเล็ก ๆ เอาไว้ หนูทำให้มันมีเพิ่มอีก 5 ขั้นได้ไหม?
                example_code_2: |
                    ```
                    {forward} 20
                    {turn} {right}
                    {forward} 20
                    {turn} {left}
                    {forward} 20
                    ```
            2:
                story_text: |
                    ในเลเวล 1 เต่าของเราหันได้แค่ซ้ายหรือขวา ซึ่งน่าเบื่อนะว่าไหม!
                    ในเลเวล 2 นี้ เจ้าเต่าจะสามารถหันไปทิศทางไหนก็ได้

                    เราสามารถใช้ตัวเลขเช่น 90 องศาเพื่อหัน 1 ใน 4 วงกลม, 180 เพื่อหันครึ่งวงกลม หรือ 360 เพื่อหันครบรอบ

                    ### แบบฝึกหัด
                    โค้ดนี้วาดตัว T ขึ้นมา หนูเปลี่ยนให้มันวาดตัว B แทนได้ไหม?

                    **เพิ่มเติม ** เปลี่ยนตัวอักษรที่วาดดูอีก คราวนี้เป็นตัวอักษรแรกของชื่อหนู
                    หนูสามารถวาดตัวอักษรหลายตัวด้วยการเปลี่ยนสีเป็น `{color}``{white}` ระหว่างทาง
                example_code: |
                    ```
                    {forward} 80
                    {turn} 90
                    {forward} 50
                    {turn} 180
                    {forward} 100
                    ```
                story_text_2: |
                    หนูสามารถใช้ตัวแปรกับคำสั่ง `turn`

                    ### แบบฝึกหัด
                    แก้ไขโค้ดเพื่อวาดรูปสามเหลี่ยม คำใบ้: เปลี่ยนโค้ดแค่ตำแหน่งเดียว
                example_code_2: |
                    ```
                    {print} วาดรูปเรขาคณิต
                    angle {is} 90
                    {turn} angle
                    {forward} 25
                    {turn} angle
                    {forward} 25
                    {turn} angle
                    {forward} 25
                    ```
            3:
                story_text: |
                    ในเลเวลนี้สามารถใช้ `{at} {random}`กับเจ้าเต่านักวาดได้ การสุ่มเลือกจะทำให้เต่าเดินไปในทิศทางที่ต่างกันออกไปทุกครั้ง
                    ใช้ `{at} {random}` เลือกค่าจากในรายการ
                    ### แบบฝึกหัด
                    คัดลองและวางโค้ดในบรรทัดที่ 2 และ 3 เพื่อสร้างทางสุ่มเลือกที่ยาวมากขึ้น
                example_code: |
                    ```
                    angles {is} 10, 50, 90, 150, 250
                    {turn} angles {at} {random}
                    {forward} 25
                    ```
            4:
                story_text: |
                    ในเลเวล 4 เราใช้เครื่องหมายคำพูดกับ `{print}` และ `{ask}` ได้เหมือนกันเวลาวาดรูป
                example_code: |
                    ```
                    {print} _ วาดรูปต่าง ๆ _
                    angle {is} 90
                    {turn} angle
                    {forward} 25
                    {turn} angle
                    {forward} 25
                    ```
                story_text_2: |
                    หนูสามารถเปลี่ยนสีของลายเส้นด้วยคำสั่ง `{color}` ลองดูในตัวอย่างนะ
                    หนูสามารถใช้คำสั่ง`{color} {white}` เพื่อทำให้ลายเส้น 'ล่องหน' ซึ่งสามารถใช้เส้นสีขาวนี้เพื่อเคลื่อนที่เต่าไปจุดไหนก็ได้บนจอก่อนที่จะเริ่มวาดจริง
                example_code_2: |
                    ```
                    {color} {white}
                    {forward} -80
                    {color} {green}
                    {forward} 50
                    {color} {yellow}
                    {forward} 50
                    {color} {red}
                    {forward} 50
                    ```
            5:
                story_text: |
                    ในเลเวล 5 หนูสามารถสร้างตัวเลือกด้วย `{if}` เช่นเลือกว่าจะวาดรูปอะไร
                example_code: |
                    ```
                    {print} 'วาดรูปทรงต่าง ๆ'
                    figure {is} {ask} 'เธออยากวาดสี่เหลี่ยมหรือสามเหลี่ยม?'
                    {if} figure {is} สามเหลี่ยม angle {is} 120
                    {else} angle {is} 90
                    {turn} angle
                    {forward} 25
                    {turn} angle
                    {forward} 25
                    {turn} angle
                    {forward} 25
                    {turn} angle
                    {forward} 25
                    ```
                story_text_2: |
                    ### แบบฝึกหัด
                    เติมเลขที่ถูกต้องเพื่อให้โค้ดนี้ทำงาน
                    หลังจากนั้นให้ลองเพิ่มตัวเลือกย้อนกลับดู

                    **เพิ่มเติม** แทนที่จะใช้ 'ซ้าย' หรือ 'ขวา' ให้สร้างโปรแกรมใหม่ด้วยการใช้ทิศเหนือ ใต้ ตะวันออก ตะวันตก แทน
                    แบบนี้ก็จะทำให้เพิ่มทิศทางมากขึ้นได้เช่น ตะวันออกเฉียงเหนือ และตะวันตกเฉียงใต้ เป็นต้น
                example_code_2: |
                    ```
                    direction {is} {ask} 'อยากไปทางซ้าย ขวา หรือตรงไป?'
                    {if} direction {is} ซ้าย {turn} _
                    {if} direction {is} ขวา {turn} _
                    {forward} 100
                    ```
            7:
                story_text: |
                    ในเลเวลนี้หนูจะได้ใช้การคำนวณมาวาดรูปทรงมากขึ้น
                    หนูอาจจะเคยรู้แล้วว่าการหมุนเป็นวงกลมก็คือ 360 องศา ถ้าไม่รู้ตอนนี้ก็รู้แล้วนะ
                    นั่นคือสาเหตุว่าทำไมถึงใช้ 90 องศาเพื่อวาดสี่เหลี่ยม เพราะ 360 หารด้วย 4 เท่ากับ 90
                    ตอนนี้เราใช้คณิตศาสตร์กับ Hedy เพื่อวาดรูปทรงอะไรก็ได้ตามต้องการ!
                example_code: |
                    ```
                    angles = {ask} 'อยากให้รูปมีกี่มุม?'
                    angle = 360 / angles
                    {forward} 50
                    {turn} angle
                    {forward} 50
                    {turn} angle
                    {forward} 50
                    {turn} angle
                    {forward} 50
                    {turn} angle
                    {forward} 50
                    {turn} angle
                    {forward} 50
                    {turn} angle
                    ```
            9:
                story_text: |
                    คราวนี้่เราก็สามารถใช้โค้ดซ้ำ ๆ เพื่อสร้างรูปทรงได้ง่ายขึ้น
                    แค่ตั้งองศาที่ต้องการแล้วใช้ตัวแปรที่กำหนดในคำสั่ง `{repeat}`

                    ### แบบฝึกหัด1
                    โค้ดตัวอย่างใช้สร้างรูปสี่เหลี่ยม จงแก้ไขโค้ดเพื่อให้สร้างรูปทรงอื่นเช่นสามเหลี่ยมหรือหกเหลี่ยม 
                    จะทำได้ต้องแก้ไขโค้ด 2 บรรทัด
                    คำใบ้: วงกลมมี 360 องศา

                    ### แบบฝึกหัด 2
                    คราวนี้วาดรูปที่มีรูปหลายเหลี่ยมอย่างน้อย 2 รูป
                example_code: |
                    ```
                    angle = 90
                    {repeat} 4 {times}
                        {turn} angle
                        {forward} 50
                    ```
                story_text_2: |
                    **เพิ่มเติม** เราพัฒนาโปรแกรมให้วาดรูปทรงที่หลากหลายได้ ทำให้โค้ดนี้สมบูรณ์แล้วจะสร้างรูปหลายเหลี่ยมที่ต้องการได้
                example_code_2: |
                    ```
                    figure = {ask} 'ต้องการรูปกี่เหลี่ยม?'
                    angle = 360 / figure
                    {repeat} figure {times}
                        {turn} _
                        {forward} _
                    ```
            10:
                story_text: |
                    เมื่อใช้ `{repeat}` ภายใน `{repeat}` เราจะสร้างรูปที่ซับซ้อนมากขึ้นได้

                    ### แบบฝึกหัด 1
                    โค้ดนี้จะวาดรูปสามเหลี่ยมสีดำ 3 รูป จงเปลี่ยนให้เป็นสี่เหลี่ยมสีชมพู 5 รูป

                     **เพิ่มเติม** วาดรูปทรงตามต้องการแต่ให้มีรูปทรงที่ต่างกันอย่างน้อย 2 รูปแบบ
                example_code: |
                    ```
                    {color} {black}
                    {repeat} 3 {times}
                        {repeat} 3 {times}
                            {forward} 10
                            {turn} 120
                        {color} {white}
                        {forward} 50
                        {color} {black}
                    ```
            11:
                story_text: |
                    ในเลเวลนี้หนูสั่งให้เต่าวาดรูปทรงได้ทันที
                    เต่าจะเดินทางตามระยะที่กำหนดในรายการไล่ลำดับจนมีขนาดใหญ่ขึ้นเรื่อย ๆ
                    ### แบบฝึกหัด 1
                    เพิ่มการหัน 90 องศาในลูป เพื่อวาดรูปทรงขดม้วน
                    เพิ่มตัวเลขอย่างน้อยอีก 5 อันเข้าไปในรายการ ทำให้รูปทรงม้วนใหญ่ขึ้น
                    **(เพิ่มเติม)**เปลี่ยนจากรูปทรงม้วนเป็นอย่างอื่นได้ไหม? ลองทดสอบกับตัวเลขอื่น ๆ ในการหันดู!
                    ### แบบฝึกหัด 2
                    รูปทรงม้วนเป็นการม้วนออก ทำให้มันเป็นการม้วนเข้าได้ไหม?
                example_code: |
                    ```
                    {turn} 90
                    distances = 10, 20, 30, 40, 50, 60
                    {for} distance {in} distances
                        {forward} distance
                    ```
            12:
                story_text: |
                    เราใช้ฟังก์ชันมาช่วยในการวาดรูปทรงที่ซับซ้อนโดยใช้โค้ดไม่เยอะ
                    ### แบบฝึกหัด 1
                    ทำให้ฟังก์ชันสมบูรณ์เพื่อวาดสี่เหลียม 3 รูป และถ้าอยากให้รูปดูสวยขึ้นก็ให้เปลี่ยนสีของเส้นระหว่างแต่ละรูปเป็นสีขาว

                    ### แบบฝึกหัด 2
                    เราทำให้โค้ดสั้นลงได้อีก ให้ย้ายบรรทัดท้าย ๆ เข้าไปใน `{repeat}` เพื่อรักษารูปที่วาดให้เหมือนเดิม

                    ### แบบฝึกหัด 3
                    จงวาดรูปทรงตามที่ต้องการ
                    แก้ไขจำนวนรูปที่วาดด้วย `{repeat}` และรูปร่างของรูปทรงด้วย `{define}`
                example_code: |
                    ```
                    {define} square
                        {repeat} 4 {times}
                            {turn} _
                            {forward} _
                    {call} square
                    {forward} 50
                    {call} square
                    {forward} 50
                    {call} square
                    ```
