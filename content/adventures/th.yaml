        levels:
            4:
                story_text: |
                    ถึงเวลาเรียนคำสั่งใหม่แล้ว! ด้วย `{clear}`หนูสามารถล้างข้อความจากหน้าต่างแสดงผล ทำให้หน้าจอไม่เต็มไปด้วยข้อความเต็มไปหมด
                    ระวัง! หากใช้คำสั่ง `{clear}` หนูอาจจะต้องใช้ `{sleep}` ก่อนหน้า ไม่อย่างนั้น Hedy จะล้างหน้าจอโดยไม่ให้เวลาอ่านข้อความอย่างที่จะได้เห็นในตัวอย่างต่อไปนี้!
                example_code: |
                    ```
                    {print} '3'
                    {clear}
                    {print} '2'
                    {clear}
                    {print} '1'
                    {clear}
                    {print} 'รออีกเดี๋ยว...'
                    {sleep} 3
                    {clear}
                    {print} 'เซอร์ไพรส์!'
                    ```
