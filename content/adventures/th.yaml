adventures:
    story:
        name: เรื่อง
        default_save_name: เรื่อง
        description: สร้างเรื่องสั้นๆ
        levels:
            1:
                story_text: "ในเลเวล 1 คุณสามารถสร้างเรื่องราวโดยมีตัวละครหลักที่คุณป้อนเอง  \n\nในบรรทัดแรก ให้ใช้ `{ask}` และถามว่าตัวละครหลักของเรื่องคือใคร  \n\nหลังจากบรรทัดแรก ให้เริ่มต้นด้วย `{print}` หากต้องการพิมพ์ประโยค  \nใช้ `{echo}` หากต้องการให้ตัวละครหลักอยู่ท้ายประโยค\n"
                example_code: "```\n{ask} ตัวละครหลักของเรื่องนี้คือ  \n{print} ตัวละครหลักกำลังเดินเข้าไปในป่า  \n{echo} พวกเขารู้สึกหวาดกลัวเล็กน้อย,  \n{print} พวกเขาได้ยินเสียงแปลกประหลาดดังทั่วทุกที่  \n{print} พวกเขากลัวว่านี่อาจเป็นป่าผีสิง\n```\n"
                story_text_2: "### แบบฝึกหัด  \nตอนนี้ให้คุณสร้างเรื่องราวของตัวเองโดยใช้โค้ดอย่างน้อย 6 บรรทัด  \nเรื่องราวต้องไม่เหมือนกับตัวอย่างที่ให้มา  \nใช้คำสั่ง `{ask}` อย่างน้อยหนึ่งครั้ง และ `{echo}` อย่างน้อยหนึ่งครั้ง  \nคุณสามารถแต่งเรื่องเกี่ยวกับอะไรก็ได้ที่คุณต้องการ  \nหากนึกไม่ออก ลองใช้หนึ่งในหัวข้อเหล่านี้: ไปดูหนัง, การแข่งขันกีฬา, หรือวันหนึ่งที่สวนสัตว์\n"
            2:
                story_text: "In level 2 you can make your story more fun. Your main character's name can now be anywhere in the sentence.\n\nYou do have to program a little bit extra for that. You must now name your main character first.\n\nYou can then put that name anywhere in a sentence.\n"
                example_code: "```\nname {is} {ask} ชื่อตัวละครหลักคืออะไร?  \n{print} name กำลังวิ่งเข้าไปในป่า  \n{print} name รู้สึกหวาดกลัวเล็กน้อย  \n{print} ทันใดนั้น เธอได้ยินเสียงแปลกประหลาด...  \n{sleep}  \n{print} name กลัวว่านี่อาจเป็นป่าผีสิง  \n```"
                story_text_2: "### แบบฝึกหัด  \nตอนนี้ถึงเวลาที่จะเพิ่มตัวแปรเข้าไปในเรื่องราวของคุณที่คุณได้สร้างในระดับก่อนหน้า  \nไปที่ 'โปรแกรมของฉัน' ค้นหาเรื่องราวในระดับ 1 ของคุณแล้วคัดลอกโค้ดนั้น  วางโค้ดลงในหน้าจอของคุณในระดับนี้  \n\nโค้ดนี้จะไม่ทำงานในระดับนี้ เพราะคุณยังไม่ได้ใช้ตัวแปร  \nเปลี่ยนคำสั่ง `{ask}` และ `{echo}` ในโค้ดของคุณให้เป็นรูปแบบที่ถูกต้องตามที่คุณได้เรียนรู้ในระดับนี้  \n\n**เพิ่มเติม** เพิ่มคำสั่ง `{sleep}` ลงในโค้ดของคุณเพื่อเพิ่มความตึงเครียดในเรื่องราว\n"
            3:
                story_text: "ในเลเวล 3 คุณสามารถทำให้เรื่องราวของคุณสนุกยิ่งขึ้น โดยการใช้ความสุ่มสำหรับสัตว์ประหลาด, สัตว์, หรืออุปสรรคต่างๆ เช่นนี้:\n"
                example_code: "```\nสัตว์ {is} 🦔, 🐿, 🦉, 🦇\n{print} พวกเขาได้ยินเสียงของ สัตว์ {at} {random}\n```\n"
                story_text_2: "คำสั่ง `{add}` ก็สามารถมีประโยชน์ในการสร้างเรื่องราวของคุณเช่นกัน\n"
                example_code_2: "```\n{print} พวกเขาได้ยินเสียง\nสัตว์ {is} 🐿, 🦔, 🦇, 🦉\nสัตว {is} {ask} คุณคิดว่ามันคืออะไร?\n{add} สัตว {to_list} สัตว์\n{print} มันคือ สัตว์ {at} {random}\n```\n"
                story_text_3: "นี่คือตัวอย่างการใช้คำสั่ง `{remove}` ในเรื่องราวของคุณ\n\n### แบบฝึกหัด  \nคัดลอกเรื่องราวของคุณจากระดับก่อนหน้านี้ไปยังระดับนี้  \nในระดับนี้คุณได้เรียนรู้คำสั่งใหม่ 3 คำสั่ง `{at} {random}` , `{add} {to_list}` และ `{remove} {from}`  \nเพิ่มบรรทัดโค้ดใหม่ในเรื่องราวของคุณ เพื่อให้คำสั่งใหม่ทั้งหมดปรากฏในเรื่องราวของคุณอย่างน้อยหนึ่งครั้ง\n"
                example_code_3: "```\n{print} กระเป๋าของเขาหนักเกินไป  \n{print} ภายในมีน้ำ, ไฟฉาย และอิฐ  \nกระเป๋า {is} น้ำ, ไฟฉาย, อิฐ  \ndump {is} {ask} เขาควรทิ้งสิ่งไหน?  \n{remove} dump {from} กระเป๋า  \n```\n"
