adventures:
    story:
        name: కథ
        default_save_name: కధ
        description: ఒక చిన్న కథను రూపొందించండి
        levels:
            1:
                story_text: "లెవల్ 1 లో మీరు వేరే ప్రధాన పాత్రతో కథను తయారు చేసుకోవచ్చు, అందులో మీరే ఎంటర్ అవుతారు.\n\nమొదటి లైన్ లో, `{ask}` ఉపయోగించి కథలోని ప్రధాన పాత్ర ఎవరు అని అడగండి.\n\nఆ మొదటి లైన్ తర్వాత, వాక్యాన్ని ప్రింట్ చేయాల్సి వస్తే `{print}` తో ప్రారంభించండి.\nమీ ప్రధాన పాత్ర వాక్యం చివరలో ఉండాలని మీరు కోరుకుంటే `{echo}` ను ఉపయోగించండి.\n"
                example_code: "```\n{ask} ఈ కథలోని ప్రధాన పాత్ర\n{print} ప్రధాన పాత్ర ఇప్పుడు అడవిలో నడవబోతోంది\n{echo} వాళ్ళు కొంచెం భయపడుతున్నారు,\n{print} వాళ్ళు ప్రతిచోటా పిచ్చి శబ్దాలు వింటారు\n{print} వాళ్ళు ఇది ఒక దయ్యాల అడవి అని భయపడుతున్నారు\n```\n"
                story_text_2: "### వ్యాయామం\nఇప్పుడు కనీసం 6 లైన్ల కోడ్‌తో మీ స్వంత కథను సృష్టించండి.\nఈ కథ ఉదాహరణ కోడ్ లాగా ఉండకూడదు.\nకనీసం ఒక `{ask}` మరియు ఒక `{echo}` ఆదేశాన్ని ఉపయోగించండి.\nమీకు నచ్చిన ఏదైనా అంశం గురించి మీరు దీన్ని చేయవచ్చు.\nమీరు ఒక అంశం గురించి ఆలోచించలేకపోతే, మా ఎంపికలలో ఒకదాన్ని ఉపయోగించండి: సినిమాలకు వెళ్లడం, క్రీడా మ్యాచ్ లేదా జూలో ఒక రోజు.\n"
            2:
                story_text: |
                    స్థాయి 2లో మీరు మీ కథనాన్ని మరింత సరదాగా చేయవచ్చు. మీ ప్రధాన పాత్ర పేరు ఇప్పుడు వాక్యంలో ఎక్కడైనా ఉండవచ్చు.

                    మీరు దాని కోసం కొంచెం అదనంగా ప్రోగ్రామ్ చేయాలి. మీరు ఇప్పుడు మీ ప్రధాన పాత్రకు ముందుగా పేరు పెట్టాలి.

                    మీరు ఆ పేరును వాక్యంలో ఎక్కడైనా ఉంచవచ్చు.
                example_code: |-
                    పేరు {is} {ask} ప్రధాన పాత్ర పేరు ఏమిటి?
                    {print} పేరు ఇప్పుడు అడవుల్లో అమలు కానుంది
                    {print} పేరు కొంచెం భయంగా ఉంది
                    {print} అకస్మాత్తుగా అతనికి వెర్రి శబ్దం వినబడింది...
                    {నిద్ర}
                    ఇది హాంటెడ్ ఫారెస్ట్ అని {print} పేరు భయపడుతోంది
                story_text_2: |
                    ### వ్యాయామం
                    ఇప్పుడు మీరు మునుపటి స్థాయిలో చేసిన మీ స్వంత కథనానికి వేరియబుల్‌లను జోడించాల్సిన సమయం వచ్చింది.
                    'నా ప్రోగ్రామ్‌లు'కి వెళ్లి, మీ లెవల్ 1 స్టోరీ అడ్వెంచర్ కోసం వెతకండి మరియు కోడ్‌ను కాపీ చేయండి. ఈ స్థాయిలో మీ ఇన్‌పుట్ స్క్రీన్‌లో కోడ్‌ను అతికించండి.

                    మీరు ఇంకా వేరియబుల్‌లను ఉపయోగించనందున ఈ కోడ్ ఈ స్థాయిలో పని చేయదు.
                    మీ కోడ్‌లోని `{ask}` ఆదేశాలు మరియు `{echo}` ఆదేశాలను మీరు ఈ స్థాయిలో నేర్చుకున్న సరైన ఫారమ్‌కి మార్చండి.

                    **అదనపు** మీ కథనంలో ఉద్రిక్తతను పెంచడానికి మీ కోడ్‌కి `{sleep}` ఆదేశాన్ని జోడించండి.
            3:
                story_text: |
                    స్థాయి 3లో మీరు మీ కథనాన్ని మరింత సరదాగా చేయవచ్చు. మీరు ఇలాంటి ఏదైనా రాక్షసుడు, జంతువు లేదా ఇతర అడ్డంకి కోసం యాదృచ్ఛికతను ఉపయోగించవచ్చు:
                example_code: |
                    ```
                    జంతువులు {is} 🦔, 🐿, 🦉, 🦇
                    {print} అతను ఇప్పుడు శబ్దాన్ని వింటాడు: జంతువులు {at} {random}
                    ```
                story_text_2: |
                    మీ కథనంలో `{add}` కమాండ్ కూడా ఉపయోగపడుతుంది.
                example_code_2: |
                    ```
                    {print} అతనికి శబ్దం వినిపిస్తుంది
                    జంతువులు {is} 🐿, 🦔, 🦇, 🦉
                    జంతువు {is} {ask} అది ఏమిటి అని మీరు అనుకుంటున్నారు?
                    {add} జంతువు {to_list} జంతువులు
                    {print} ఇది ఒక జంతువులు {at} {random}
                    ```
                story_text_3: |
                    ఇది మీ కథనంలోని `{తొలగించు}` కమాండ్‌కి ఉదాహరణ

                    ### వ్యాయామం
                    మీ కథనాన్ని మునుపటి స్థాయిల నుండి ఈ స్థాయికి కాపీ చేయండి.
                    ఈ స్థాయిలో మీరు 3 కొత్త ఆదేశాలను `{at} {random}` , `{add} {to_list}` మరియు `{remove} {from}` నేర్చుకున్నారు.
                    మీ కథనానికి కొత్త లైన్ కోడ్‌లను జోడించండి, తద్వారా అన్ని కొత్త ఆదేశాలు మీ కథనంలో కనీసం ఒక్కసారైనా ప్రదర్శించబడతాయి.
                example_code_3: |
                    ```
                    {print} అతని బ్యాక్‌ప్యాక్ చాలా బరువుగా ఉంది.
                    {print} లోపల వాటర్ బాటిల్, ఫ్లాష్‌లైట్ మరియు ఇటుక ఉన్నాయి.
                    బ్యాగ్ {is} నీరు, ఫ్లాష్‌లైట్, ఇటుక
                    డంప్ {is} {ask} అతను ఏ వస్తువును డంప్ చేయాలి?
                    {remove} డంప్ {from} బ్యాగ్
                    ```
            4:
                story_text: |
                    ### వ్యాయామం
                    ఉదాహరణ కోడ్‌ను కాపీ చేసి, 1 మరియు 2 పంక్తులలోని ఖాళీలపై కొటేషన్ గుర్తులను జోడించడం ద్వారా దాన్ని పూర్తి చేయండి.
                    లైన్ 3 మరియు 4లోని ఖాళీలను కొటేషన్ గుర్తులతో భర్తీ చేయకూడదు, కానీ `{స్లీప్}` మరియు `{క్లియర్}` ఆదేశం. మీరు దీన్ని పని చేయగలరా?

                    ### వ్యాయామం 2
                    మునుపటి స్థాయికి తిరిగి వెళ్లి, మీ స్టోరీ కోడ్‌ని కాపీ చేయండి. సరైన స్పాట్‌లలో కొటేషన్ మార్కులను జోడించడం ద్వారా కోడ్ ఈ స్థాయిలో పని చేసేలా చేయండి.
                    మనస్సు: మీ స్వంత కథలోని వేరియబుల్స్ కొటేషన్ మార్కులకు వెలుపల ఉండాలి. ఉదాహరణ కోడ్ యొక్క రెండవ పంక్తి వలె. ఆ లైన్‌లో వేరియబుల్ పేరు కొటేషన్ మార్కుల వెలుపల ఉంచబడుతుంది.
            8:
                story_text: |
                    ఒక కథలో, ఎవరైనా చాలాసార్లు మాటలు చెబుతారు. ఉదాహరణకు, ఎవరైనా సహాయం కోసం పిలిచినప్పుడు లేదా పాట పాడినప్పుడు.
                    మీరు మీ కథనంలో ఇటువంటి పునరావృత్తులు, ఈ స్థాయిలో `{repeat}`తో ఉంచవచ్చు.

                    ### వ్యాయామం
                    మీ స్వంత కథకు పునరావృతతను జోడించండి. మీరు సేవ్ చేసిన ప్రోగ్రామ్‌లకు తిరిగి వెళ్లండి, లెవల్ 6 నుండి మీ స్టోరీ ప్రోగ్రామ్‌ని ఎంచుకోండి మరియు
                    `{print}`ని కలిగి ఉన్న పంక్తిని కనుగొని దాన్ని పునరావృతం చేయండి!
