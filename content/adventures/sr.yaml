    turtle:
        name: Корњача
        default_save_name: Корњача
        description: Направи свој цртеж
        levels:
            1:
                story_text: |
                    Можеш такође користити Хеди за цртање. Комбинујући окрете и линије, можеш направити квадрат или степенице!

                    Користећи `{forward}` црташ линију напред. Број иза одређује колико далеко ће корњача ићи. `{turn} {right}` окреће четвртину у смеру казаљке на сату, `{turn} {left}` окреће супротно од казаљке на сату.

                    Ако желиш да идеш уназад, користиш команду `{forward}` али са негативним бројем. На пример `{forward} -100`
                story_text_2: |
                    ### Вежба
                    Ово је почетак малог степеништа. Можете ли направити да има 5 степеника?
                example_code: "```\n{forward} 100\n{turn} {left}\n```\n"
                example_code_2: "```\n{forward} 20\n{turn} {right}\n{forward} 20\n{turn} {left}\n{forward} 20\n```\n"
            2:
                story_text: |
                    На нивоу 1 корњача је могла само да се окреће лево или десно. То је мало досадно!
                    На нивоу 2 може усмерити свој нос у свим правцима.

                    Користи 90 степени да се окренеш четвртину, 180 да се окренеш половину, а пун круг је 360 степени.

                    ### Вежба
                    Овај код сада ствара слово Т. Можеш ли га променити да направи слово Б?

                    **Додатно** Промени слово у друго слово, као што је прво слово твог имена.
                    Можеш такође направити више слова, постављањем боје на `{color}` `{white}` између. 
                story_text_2: |
                    Можеш користити променљиве у корњачином `turn`.

                    ### Вежба
                    Промени код тако да ствара троугао. Савет: потребно је променити код само на једном месту.
                example_code_2: |
                    ```
                    {print} Цртање фигура
                    угао {is} 90
                    {turn} угао
                    {forward} 25
                    {turn} угао
                    {forward} 25
                    {turn} угао
                    {forward} 25
                    ```
                example_code: "```\n{forward} 80\n{turn} 90\n{forward} 50\n{turn} 180\n{forward} 100\n```\n"
            3:
                story_text: |
                    На овом нивоу можеш користити `{at} {random}` са корњачом за цртање. Случајан избор чини да корњача сваки пут иде другачијим путем.
                    Користи `{at} {random}` да изабереш вредност са листе.
                    ### Вежба
                    Можеш ли копирати и налепити линије 2 и 3 да направиш дужи случајни пут?
                example_code: |
                    ```
                    углови {is} 10, 50, 90, 150, 250
                    {turn} углови {at} {random}
                    {forward} 25
                    ```
            4:
                story_text: |
                    На нивоу 4 морате користити наводнике са `{print}` и `{ask}`. Такође и при цртању!
                example_code: |
                    ```
                    {print} _ Цртање фигура _
                    угао {is} 90
                    {turn} угао
                    {forward} 25
                    {turn} угао
                    {forward} 25
                    ```
                story_text_2: |
                    Такође можете променити боју линија командом `{color}`. Погледајте пример.
                    Можете користити команду `{color} {white}` да направите 'невидљиве' линије. Можете користити ове беле линије да померите корњачу било где на екрану пре него што почнете да цртате.
                example_code_2: "```\n{color} {white}\n{forward} -80\n{color} {green}\n{forward} 50\n{color} {yellow}\n{forward} 50\n{color} {red}\n{forward} 50\n```\n"
            5:
                story_text: |
                    На нивоу 5 можете направити избор са `{if}`. На пример, између различитих типова фигура.
                example_code: |
                    ```
                    {print} 'Цртање фигура'
                    фигура {is} {ask} 'Да ли желите квадрат или троугао?'
                    {if} фигура {is} троугао угао {is} 120
                    {else} угао {is} 90
                    {turn} угао
                    {forward} 25
                    {turn} угао
                    {forward} 25
                    {turn} угао
                    {forward} 25
                    {turn} угао
                    {forward} 25
                    ```
                story_text_2: |
                    ### Вежба
                    Попуните тачне бројеве у овом коду да би радио.
                    Након што то урадите, можете покушати да додате опцију уназад.

                    **Додатно** Уместо да користите 'лево' и 'десно', преправите програм са Север, Исток, Југ и Запад.
                    На овај начин можете додати још више праваца као што су Североисток и Југозапад итд.
                example_code_2: |
                    ```
                    правац {is} {ask} 'Да ли желите да идете лево, десно или право?'
                    {if} правац {is} лево {turn} _
                    {if} правац {is} десно {turn} _
                    {forward} 100
                    ```
            7:
                story_text: |
                    На овом нивоу можете користити прорачуне за цртање различитих фигура.
                    Можда сте у школи научили да окретање пуног круга износи 360 степени. Ако нисте, сада знате!
                    Зато користите и 90 степени за квадрат. 360 подељено са 4 је 90.
                    Сада када можемо радити математику са Хеди, можемо цртати све фигуре које желимо!
                example_code: |
                    ```
                    углови = {ask} 'Колико углова желите?'
                    угао = 360 / углови
                    {forward} 50
                    {turn} угао
                    {forward} 50
                    {turn} угао
                    {forward} 50
                    {turn} угао
                    {forward} 50
                    {turn} угао
                    {forward} 50
                    {turn} угао
                    {forward} 50
                    {turn} угао
                    ```
            9:
                story_text: "Сада када можемо понављати неколико линија, можемо лакше правити фигуре.\nСамо треба да подесимо угао једном и онда користимо ту променљиву у `{repeat}`.\n\n### Вежба 1\nПример кода креира квадрат. Промените код тако да креира другу фигуру, као што је троугао или хексагон.\nОво захтева промену две линије кода.\nСавет: Цео круг је 360 степени.\n\n### Вежба 2\nСада направите цртеж који се састоји од најмање два полигона.\n"
                example_code: |
                    ```
                    угао = 90
                    {repeat} 4 {times}
                        {turn} угао
                        {forward} 50
                    ```
                story_text_2: |
                    **Додатно** Сада можемо побољшати програм који црта различите фигуре. Завршите код и можете цртати било који полигон који желите!
                example_code_2: |
                    ```
                    фигура = {ask} 'Колико углова треба да нацртам?'
                    угао = 360 / фигура
                    {repeat} фигура {times}
                        {turn} _
                        {forward} _
                    ```
            10:
                story_text: |
                    Сада када можемо користити `{repeat}` унутар `{repeat}`, можемо креирати сложеније фигуре.

                    ### Вежба 1
                    Овај код креира три црна троугла, промените то у пет ружичастих квадрата.

                     **Додатно** Креирајте фигуру по вашем избору која се састоји од најмање два различита типа облика.
                example_code: "```\n{color} {black}\n{repeat} 3 {times}\n    {repeat} 3 {times}\n        {forward} 10\n        {turn} 120\n    {color} {white}\n    {forward} 50\n    {color} {black}\n```\n"
            11:
                story_text: |
                    На овом нивоу можете направити да корњача нацрта фигуру.
                    Корњача ће путовати растојањима у листи, једно по једно, правећи све веће и веће кораке.
                    ### Вежба 1
                    Додајте скретање од 90 степени у петљу, тако да се нацрта спирала.
                    Додајте најмање 5 бројева у листу, тако да спирала постане већа.
                    **(додатно)** можете ли променити спиралу у други облик? Експериментишите са бројевима за скретање!
                    ### Вежба 2
                    Спирала се црта ка споља, направите да иде ка унутра?
                example_code: |
                    ```
                    {turn} 90
                    удаљености = 10, 20, 30, 40, 50, 60
                    {for} удаљеност {in} удаљености
                        {forward} удаљеност
                    ```
            12:
                story_text: |
                    Можемо користити функције да нацртамо сложеније фигуре са мање кода.
                    ### Вежба 1
                    Попуните функцију тако да се направе три квадрата. Ако желите да слика изгледа лепше, можете направити линије између квадрата беле.

                    ### Вежба 2
                    Код може бити још краћи. Ставите завршне линије у `{repeat}` тако да фигура остане иста.

                    ### Вежба 3
                    Направите свој цртеж са различитим фигурама.
                    Промените и број фигура са `{repeat}` и облик фигура у `{define}`
                example_code: "```\n{define} квадрат\n    {repeat} 4 {times}\n        {turn} _\n        {forward} _\n{call} квадрат\n{forward} 50\n{call} квадрат\n{forward} 50\n{call} квадрат\n```\n"
