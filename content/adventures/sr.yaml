                        изабрана_боја = {ask} 'Које боје?'
                        {color} изабрана_боја
                        {if} облик = 'квадрат'
                            {call} нацртај_квадрат
                    ```
            15:
                story_text: |
                    ### Вежба
                    Направите програм који пита играча колико углова њихова фигура треба да има и затим креира ту фигуру.
