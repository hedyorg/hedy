    if_command:
        name: '{if} и {else}'
        description: Увођење команде {if}
        levels:
            5:
                story_text: |
                    ## If... else....
                    На нивоу 5 постоји нешто ново, `{if}`! Са командом `{if}` можете бирати између две различите опције.
                    Овај код исписује лепо ако унесете Хеди као име, и бу! ако унесете нешто друго.
                    `{ask}` и `{print}` и даље раде као на нивоу 4.
                example_code: |
                    ```
                    име {is} {ask} 'како се зовеш?'
                    {if} име {is} Хеди {print} 'лепо' {else} {print} 'бу!'
                    ```
                story_text_2: |
                    Понекад код са `{if}` постаје заиста дугачак и не стаје добро у ред. <br> Такође можете поделити код на два реда, почевши други ред са `{else}` овако:
                example_code_2: |
                    ```
                    име {is} {ask} 'како се зовеш?'
                    {if} име {is} Хеди {print} 'лепо'
                    {else} {print} 'бу!'
                    ```
                story_text_3: |
                    ### Вежба
                    Покушајте да направите свој код са `{if}` и `{else}`. Можете користити пример кода ако желите.
                example_code_3: |
                    ```
                    одговор {is} {ask} '2 + 2 = ?'
                    _ _ _ 4 _ 'Одличан посао!'
                    _ _ 'Не, 2 + 2 = 4'
                    ```
            9:
                story_text: |
                    ## If... Else...
                    Научили сте да понављате блок линија кода након команде `{repeat}`.
                    Сада можете користити увлачење да направите блокове након команде {if} или {else}.
                    Погледајте пример кода.

                    ### Вежба
                    Додајте команду {else} у пример кода. Направите блок линија користећи увлачење. То радите тако што сваки ред почињете са 4 размака.
                example_code: |
                    ```
                    име = {ask} 'Како се зовеш?'
                    {if} име {is} Хеди
                        {print} 'Добродошла Хеди'
                        {print} 'Можеш да играш на свом рачунару!'
                    ```
            10:
                story_text: |
                    На овом нивоу можете такође ставити `{if}` команду унутар друге `{if}` команде.
                example_code: |
                    ```
                    наставити = {ask} 'Да ли желиш да наставиш?'
                    {if} наставити = да
                        сигуран = {ask} 'Јеси ли сигуран?'
                        {if} сигуран {is} да
                            {print} 'Наставићемо'
                        {else}
                            {print} 'Ниси сигуран'
                    {else}
                        {print} 'Не желиш да наставиш'
                    ```
        default_save_name: if_command
    in_command:
        description: Увођење команде {in}
        levels:
            6:
                story_text: |
                    ## Листе
                    Када желимо да проверимо да ли се нешто налази на листи, сада можемо користити команду `{in}`.
                    Овај код исписује лепо! ако изаберете зелену или жуту, и ме иначе.
                example_code: |
                    ```
                    лепе_боје {is} зелена, жута
                    омиљена_боја {is} {ask} 'Која је твоја омиљена боја?'
                    {if} омиљена_боја {in} лепе_боје {print} 'лепо!'
                    {else} {print} 'ме'
                    ```
                story_text_2: |
                    ### Вежба
                    Завршите пример кода попуњавањем празнина командама које сте научили.
                    Када завршите код, покушајте да направите свој код и користите питање које сте сами смислили.
                example_code_2: |
                    ```
                    животиње {is} пас, крава, овца
                    одговор {is} {ask} 'Која је твоја омиљена животиња?'
                    _ одговор _ животиње _ 'И моја омиљена!'
                    _ _ 'Моје омиљене животиње су пси, краве и овце'
                    ```
        default_save_name: in_command
        name: '{in}'
    is_command:
        description: увођење команде {is}
        levels:
            2:
                story_text: |
                    ## Променљиве
                    Можете именовати реч са `{is}`. Ово се зове **променљива**. У овом примеру смо направили променљиву звану име и променљиву звану године. Можете користити реч име било где у вашем коду и она ће бити замењена са Хеди, овако:
                example_code: |
                    ```
                    име {is} Хеди
                    године {is} 15
                    {print} име има године година
                    ```
                story_text_2: |
                    ### Вежба
                    Време је да направите своје променљиве!
                    У пример коду смо направили пример променљиве `омиљена_животиња`. У линији 1 променљива је постављена, а у линији 2 смо користили променљиву у команди `{print}`.
                    Прво, завршите наш пример попуњавањем ваше омиљене животиње на празном месту. Затим направите најмање 3 оваква кода сами. Изаберите променљиву и поставите променљиву са командом `{is}`. Затим је користите са командом `{print}`, као што смо ми урадили.
                example_code_2: |
                    ```
                    омиљена_животиња {is} _
                    {print} Волим омиљена_животиња
                    ```
            7:
                story_text: |
                    Такође правимо промену у чувању речи у променљивој! Сада можете користити `=` уместо `{is}` када чувамо име или број у променљивој, овако:
                example_code: |
                    ```
                    име = Хеди
                    одговор = 20 + 4
                    ```
        name: '{is}'
        default_save_name: is_command
