        levels:
            3:
                story_text: |
                    Да ли се увек не слажете код куће око тога ко треба да пере судове или мења песак у кутији за мачке данас?
                    Онда можете пустити рачунар да изабере веома фер. Можете то програмирати на овом нивоу!
