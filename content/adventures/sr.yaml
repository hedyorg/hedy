        levels:
            5:
                story_text: |
                    Направите свој програм за вежбање вокабулара на новом језику.

                    ### Вежба
                    Продужите код додавањем најмање 3 речи које играч треба да научи.
                    **Додатно** Наравно, можете изабрати да користите други језик осим француског. Можете променити код на било који језик који желите да научите.
                example_code: |
                    ```
                    {print} 'Научите француски!'
                    мачка {is} {ask} '🐱'
                    {if} мачка {is} chat {print} 'Сјајно!'
                    {else} {print} 'Не, мачка је chat'
                    жаба {is} {ask} '🐸'
                    {if} жаба {is} grenouille {print} 'Супер!'
                    {else} {print} 'Не, жаба је grenouille'
                    ```
            14:
                story_text: |
                    ### Вежба
                    Погледајте пример кода. Ово је програм за вежбање француског речника. Сада направите свој програм за вежбање речника на новом језику.
                    Ако не знате ниједан други језик, можете користити Google преводилац или можете користити емоџије и свој матерњи језик.
                example_code: |
                    ```
                    француске_речи = ['bonjour', 'ordinateur', 'pomme de terre']
                    превод = ['здраво', 'рачунар', 'кромпир']
                    резултат = 0
                    {for} i {in} {range} 1 {to} 3
                        одговор = {ask} 'Шта значи ' француске_речи[i] '?'
                        тачно = превод[i]
                        {if} одговор == тачно
                            {print} 'Тачно!'
                            резултат = резултат + 1
                        {else}
                            {print} 'Погрешно, ' француске_речи[i] ' значи ' превод[i]
                    {print} 'Дали сте ' резултат ' тачних одговора.'
                    ```
