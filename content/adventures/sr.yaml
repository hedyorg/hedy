                    Научи свог папагаја нову реч са `{add}`.
                    ### Вежба
                    Можеш ли додати команду `{add} {to_list}` да би код радио?
                example_code: |
                    ```
                    речи {is} крик, Хеди
                    {print} Тренирај свог папагаја!
                    нова_реч {is} {ask} Коју реч желиш да га научиш?
                    _ нова_реч _ речи
                    {print} 🧒 Реци нова_реч, Хеди!
                    {print} 🦜 речи {at} {random}
                    ```
            4:
                story_text: |
                    На овом нивоу морамо користити наводнике са командама `{ask}` и `{print}`.
                    ### Вежба
                    Заврши код попуњавањем наводника на празним местима.
                example_code: |
                    ```
                    речи {is} крик, Хеди
                    {print} _ Тренирај свог папагаја! _
                    нова_реч {is} {ask} _ Коју реч желиш да га научиш? _
                    {add} нова_реч {to_list} речи
                    {print} _ 🧒 Реци _ нова_реч _, Хеди!_
                    {print} _ 🦜 _ речи {at} {random}
                    ```
            5:
                story_text: |
                    Награди свог папагаја ако каже тачну реч!

                    ### Вежба
                    Заврши код попуњавањем 4 недостајуће команде.
                example_code: |
                    ```
                    речи {is} крик, Хеди
                    {print} 'Тренирај свог папагаја!'
                    нова_реч {is} {ask} 'Коју реч желиш да га научиш?'
                    {add} нова_реч {to_list} речи
                    речена_реч {is} речи {at} {random}
                    {print} '🧒 Реци ' нова_реч ', Хеди!'
                    {print} '🦜 ' речена_реч
                    _ речена_реч {is} нова_реч _ '🧒 Одличан посао, Хеди! 🍪'
                    _ _ '🧒 Не, Хеди! Реци ' нова_реч
                    ```
    piggybank:
        name: Касица прасица
        default_save_name: Касица прасица
        description: Преброј свој џепарац!
        levels:
            7:
                story_text: |
                    У овој авантури ћете научити како да направите дигиталну касицу прасицу.

                    ### Вежба
                    Завршите код да бисте израчунали колико новца имате и колико дуго треба да штедите да бисте купили оно што желите!
                    **Додатно** Можда сте већ уштедели нешто новца? Одузмите то од износа који ћете морати да уштедите.
                example_code: "```\n{print} 'Дигитална касица прасица'\nжеља = {ask} 'Шта бисте желели да купите?'\nцена = {ask} 'Колико то кошта?'\nсачуван = {ask} 'Колико сте новца већ сачували?'\nџепарац = {ask} 'Колико џепарца добијате недељно?'\nза_уштеду = цена - сачуван\nнедеље = за_уштеду / џепарац\n{print} 'Можете купити ' _ ' за ' _ ' недеље.'\n```\n"
            15:
                story_text: |
                    ### Вежба
                    На овом нивоу можете дозволити Хеди да вам каже да ли сте уштедели довољно новца!
                    Завршите овај код попуњавањем празнина!
                example_code: "```\n_ израчунај_буџет {with} жеља, новац, џепарац\n    за_уштеду = жеља - новац\n    недеље = за_уштеду / џепарац\n    {if} жеља _ новац\n        {print} 'Потребно је да сачувате још мало!'\n        {print} 'Требаће вам још ' недеље ' недеље.'\n    {else}\n        {print} 'Сјајно! Имате довољно'\n        {print} 'Идемо у куповину!'\n\nновац = {ask} 'Колико сте новца сачували?'\nжеља = {ask} 'Колико новца вам је потребно?'\nџепарац = {ask} 'Колико џепарца добијате сваке недеље?'\n\n{call} _\n```\n"
    pressit:
        name: Притисци тастера
        default_save_name: Притиснуто
        description: Покушајте да повежете тастер на тастатури са командом!
        levels:
            6:
                story_text: |
                    На овом нивоу постоји још једна нова кључна реч: `{pressed}`!
                    Са `{pressed}` можете користити тастере на вашој тастатури да контролишете које линије се користе.

                    ### Вежба
                    Погледајте пример и додајте још једну линију кода која реагује на притисак тастера.
                example_code: |
                    ```
                    {print} 'Да ли желите добар (g) или лош (b) крај?'
                    {if} g {is} {pressed} {print} 'Живели су срећно до краја живота ❤'
                    {else} {print} 'Принца је појео хипопотам 😭'
                    ```
                story_text_2: |
                    Такође можете повезати команде за корњачу са тастерима.

                    ### Вежба
                    Копирајте линије неколико пута како бисте направили већи цртеж.
                example_code_2: "```\n{if} y {is} {pressed} {forward} 15\n{else} {turn} 90\n```\n"
            8:
                story_text: |
                    Сада када сте научили о `{repeat}`, можемо притискати тастере више пута.
                    Можете га користити да корњача хода напред и скреће.

                    ### Вежба
                    Код који сте видели на нивоу 5 проверава тастер само једном. Копирајте пример кода и додајте `{repeat}` у њега, тако да можете притискати тастере више пута.
                    Користите овај код да нацртате нешто лепо.
                example_code: "```\n{if} x {is} {pressed} {forward} 15 {else} {turn} 90\n```\n"
            10:
                story_text: |
                    Сада када знате како да комбинујете изјаве, можете направити алат за куцање на додир са `{pressed}`.

                    ### Вежба
                    Завршите код. Сваки пут треба изабрати насумично слово које морате притиснути. Добијате поен за тачан притисак, а два поена се одузимају за погрешан притисак.
                    **Додатно** Очистите екран након сваког слова и покажите кориснику колико поена је освојио.
                example_code: |
                    ```
                    points = 0
                    letters = a, b, c, d, e
                    {repeat} 10 {times}
                        letter = _ _ _
                        {print} 'Притисните слово ' letter
                        {if} letter {is} {pressed}
                        _
                        _
                        _
                    ```
    print_command:
        default_save_name: команда за приказивање
        description: Увод у команду за приказивање
        levels:
            1:
                story_text: |
                    ## Команда за приказивање
                    Можете приказати текст на екрану користећи команду `{print}`.
                example_code: |
                    ```
                    {print} Здраво, програмеру!
                    {print} Добродошли у Хеди!
                    ```
                story_text_2: |
                    ### Вежба
                    У Хедију ћете наћи вежбе у свакој авантури. Вежба вам омогућава да вежбате нове команде и концепте, и да дате свој лични печат примерима кода.
                    У овој вежби ћете видети ружичасти празан простор. Морате попунити нешто на месту празног простора пре него што код може да се покрене.

                    Попуните команду `{print}` у празан простор и затим додајте још пет линија кода. Свака линија мора почети са командом `{print}`.
                    Забавите се!
                example_code_2: |
                    ```
                    _ Здраво!
                    ```
            13:
                story_text: |-
                    Стигли смо до правог Python кода! То значи да од сада морамо користити заграде са `{print}` и `{range}`.
                    Такође значи да можете користити Хеди код са овог нивоа у било ком Python окружењу све док користите енглеске команде. Ако до сада нисте, можете пребацити прекидач у менију команди да то урадите.
                example_code: |
                    ```
                    {print}('Здраво!')
                    {for} i {in} {range}(1, 10):
                        {print}('Ово је линија ', i)
                    ```
                story_text_2: Ако желите да прикажете више од једне ставке, потребно је да их раздвојите зарезима.
                example_code_2: |
                    ```
                    температура = 25
                    {print}('Напољу је ', температура, ' степени')
                    ```
                    ```
                    име = 'Хеди'
                    {print}('Моје име је ', име)
                    ```
        name: '{print}'
    quizmaster:
        name: Квизмајстор
        default_save_name: Квизмајстор
        description: Направите свој квиз!
    quotation_marks:
        name: '''наводници'''
        default_save_name: наводници
        description: Увођење наводника
        levels:
            4:
                story_text: |
                    ## 'Наводници'
                    На нивоу 4 `{ask}` и `{print}` су се променили.
                    Морате ставити текст који желите да испишете између наводника.
                    Ово је корисно, јер сада можете исписати све речи које желите. Такође и речи које сте користили да нешто сачувате са `{is}`.
                    Већина програмских језика такође користи наводнике при исписивању, тако да смо корак ближе правом програмирању!
                example_code: |
                    ```
                    {print} 'Морате користити наводнике од сада!'
                    одговор {is} {ask} 'Шта морамо користити од сада?'
                    {print} 'Морамо користити ' одговор
                    ```
                story_text_2: |
                    ## Скраћенице
                    Важно! Имајте на уму да сада када користимо наводнике, hedy ће се збунити када употребите апостроф за скраћенице као што су I'm или What's.
                    Уверите се да користите двоструке наводнике када користите апостроф у вашој линији!
                    Погледајте пример кода да видите погрешан начин употребе апострофа.
                example_code_2: |
                    ```
                    _ Ово је погрешан начин употребе апострофа _
                    {print} 'I'm babysitting my sister's kids'
                    {print} 'What's more fun than that?'
                    _ Овако то решавате _
                    {print} "I'm babysitting my sister's kids"
                    {print} "What's more fun than that?"
                    ```
    random_command:
        description: увођење команде random
        levels:
            3:
                story_text: |
                    ## Насумично
                    На овом нивоу можете направити листу користећи команду `{is}`. Можете дозволити рачунару да изабере насумичну ставку са те листе. То радите са `{at} {random}`.
                example_code: |
                    ```
                    животиње {is} пси, мачке, кенгури
                    {print} животиње {at} {random}
                    ```
                story_text_2: |
                    Можете користити команду `{at} {random}` и у реченици.
                story_text_3: |
                    ### Вежба
                    Испробајте команду `{at} {random}` тако што ћете направити своју сопствену игрицу (као оне на ТВ-у) где бирате врата или кофер и он садржи велику награду!
                    Можете ли то урадити? Већ смо ставили прве линије у пример кода.
                example_code_3: |
                    ```
                    {print} Велика игрица!
                    {print} Испред вас су 3 кофера...
                    изабрано {is} {ask} Који кофер бирате?
                    награде {is} _
                    _
                    ```
                example_code_2: |
                    ```
                    храна {is} сендвич, парче пице, салата, бурито
                    {print} Ја ћу имати храна {at} {random} за ручак.
                    ```
            14:
                story_text: |-
                    Правићемо листе на Python начин, са квадратним заградама око листа! Такође задржавамо наводнике око сваке ставке као што смо научили у претходним нивоима.
                    Користимо квадратне заграде да означимо место на листи. На пример: `friends[1]` је прво име на листи пријатеља, као што можете видети у првом делу пример кода.
                    Други део пример кода показује да можемо такође упарити 2 листе користећи променљиву i.
                example_code: |
                    ```
                    пријатељи = ['Ахмед', 'Бен', 'Кајден']
                    {print} пријатељи[1] ' је први пријатељ на листи.'
                    {print} пријатељи[2] ' је други пријатељ на листи.'
                    {print} пријатељи[3] ' је трећи пријатељ на листи.'
                    # сада ћемо упарити 2 листе користећи променљиву i
                    срећни_бројеви = [15, 18, 6]
                    {for} i {in} {range} 1 {to} 3
                        {print} пријатељи[i] 'ов срећни број је ' срећни_бројеви[i]
                    ```
                story_text_2: |-
                    Сада када сте научили да користите заграде у листама, можете почети да користите и команду {at} {random} на Питон начин!
                    Само укуцајте име ваше листе са `[random]` иза ње!
                example_code_2: |-
                    ```
                    fruit = ['јабука', 'банана', 'трешња']
                    {print} fruit[random]
                    ```
        default_save_name: random_command
        name: '{random}'
    repeat_command:
        description: команда {repeat}
        levels:
            8:
                story_text: |
                    Ниво 7 додаје команду `{repeat}`. `{repeat}` се може користити за извршавање једне линије кода више пута. Овако:

                    ### Вежба
                    Играјте се са командом `{repeat}`. Можете ли направити песму за рођендан у само 3 линије кода уместо 4 сада?
                example_code: |
                    ```
                    {repeat} 3 {times} {print} 'Хеди је забавна!'
                    ```
            9:
                story_text: |
                    На овом нивоу можете поновити више линија кода са само једном командом repeat.
                    То радите тако што правите блок линија које желите да поновите.
                    Линије у овом блоку ће требати **увлачење**.
                    То значи стављање четири размака на почетку сваке линије. Такође ћете морати да увлачите када само желите да направите блок од једне линије.
                example_code: |
                    ```
                    {repeat} 5 {times}
                        {print} 'Здраво свима'
                        {print} 'Ово се понавља 5 пута'
                    ```
            10:
                story_text: |
                    Одличан посао! Достигли сте још један нови ниво! На претходном нивоу сте научили да користите више линија кода у команди `{if}` или `{repeat}`.
                    Али још увек не можете да комбинујете то двоје...

                    Добра вест! На овом нивоу ћете моћи да ставите `{if}` унутар `{if}`, `{repeat}` унутар `{repeat}` команде и једно у друго.
                    Пробајте!
                example_code: |
                    ```
                    {repeat} 3 {times}
                        наруџбина = {ask} 'Шта желите да наручите?'
                        {if} наруџбина {is} пица
                            {print} 'Мммм'
                        {else}
                            {print} 'пица је боља!'
                    ```
        default_save_name: repeat_command
        name: '{repeat}'
    repeat_command_2:
        description: команда {repeat} 2
        levels:
            8:
                story_text: |
                    ## Понављање са другим командама и са променљивама
                    Вежбали сте команду `{repeat}` у комбинацији са командом `{print}`, али да ли сте знали да можете користити и друге команде са `{repeat}`?
                    У овом пример коду можете видети да се `{repeat}` може користити и са командом `{ask}`, `{if}` или `{else}`.
                example_code: |
                    ```
                    {repeat} 2 {times} одговор = {ask} 'Да ли сте знали да можете поставити питање више пута?'
                    {if} одговор {is} да {repeat} 2 {times} {print} 'Већ сте знали то!'
                    {else} {repeat} 3 {times} {print} 'Научили сте нешто ново!'
                    ```
                story_text_2: |
                    Још једна занимљива ствар коју можете урадити са командом `{repeat}` је коришћење променљивих за подешавање броја пута колико нешто треба да се понови. У пример коду можете видети да прво питамо особу колико има година.
                    Затим, у трећем реду, питање се понавља 'године' пута. Тако смо користили променљиву 'године' са командом `{repeat}`.
                example_code_2: |
                    ```
                    {print} 'Јееј! Данас ти је рођендан!'
                    године = {ask} 'Колико сада имаш година?'
                    {repeat} године {times} {print} 'Хип Хип Ура!'
                    ```
            9:
                story_text: |
                    ### У блоку или не?
                    У овом нивоу мораш пажљиво размислити које линије кода треба да буду у блоку, а које не.
                    На пример: Ако желиш да певеш песму *the muffin man*. Желиш само да се линија са 'the muffin man' понови два пута.
                    То значи да последња линија не треба да почиње са увлачењем јер не припада блоку.
                    Ако започнеш последњу линију са увлачењем, песма ће бити погрешна.

                    ### Вежба
                    Свака линија у пример коду почиње са празним простором. Уклони празне просторе и покушај да схватиш која линија треба да има увлачење, а која не, како би песма о muffin man-у била исправна.
                example_code: |
                    ```
                    _ {print} 'Да ли знаш човека од мафина?'
                    _ {repeat} 2 {times}
                    _ {print} 'Човек од мафина'
                    _ {print} 'Да ли знаш човека од мафина, који живи у Друри Лејну?'
                    ```
        default_save_name: repeat_command_2
        name: '{repeat} 2'
    restaurant:
        name: Ресторан
        default_save_name: Ресторан
        description: Направите свој виртуелни ресторан
        levels:
            1:
                story_text: |
                    На нивоу 1 можете направити свој виртуелни ресторан и примати наруџбине од својих гостију.
                story_text_2: |
                    ### Вежба
                    Копирајте пример кода у свој улазни екран кликом на жути дугме.
                    Прво, попуните исправну команду у празнине да би код исправно радио.
                    Затим додајте још најмање 4 реда кода у програм ресторана.
                    Питајте купца шта би желео да пије и питајте да ли жели да плати готовином или картицом.
                    На крају, смислите леп начин да се поздравите са својим купцем.
                example_code_2: |
                    ```
                    {print} Добродошли у Хединин ресторан 🍟
                    _ Шта бисте желели да наручите?
                    {echo} Дакле, желите да наручите
                    {print} Хвала вам на вашој наруџбини!
                    {print} Наруџбина је на путу!
                    ```
            2:
                story_text: |
                    На нивоу 2 можете проширити свој ресторан коришћењем променљивих. На нивоу 1 Хеди је могла само `{echo}` наруџбину једном и памтити само последњу наруџбину.
                    Сада можете користити променљиве и Хеди може памтити и храну и преливе!
                example_code: |
                    ```
                    {print} Добродошли у Хедин ресторан!
                    {print} Данас служимо пицу или лазање.
                    food {is} {ask} Шта бисте желели да једете?
                    {print} Одличан избор! Храна је мој омиљени!
                    topping {is} {ask} Да ли бисте желели месо или поврће на томе?
                    {print} food са topping је на путу!
                    ```
                story_text_2: |
                    ### Вежба
                    Копирајте свој код ресторана са претходног нивоа у улазни екран испод.
                    Поправите код заменом `{ask}` и `{echo}` команди и коришћењем променљивих, као што сте научили на овом нивоу.

                    Сада када ваш код поново ради, време је да додате нешто више.
                    Погледајте последњи ред пример кода: `{print} food са topping је на путу!`
                    У овом једном реду коришћене су 2 променљиве за креирање резимеа наруџбине.
                    Сада додајте свој резиме хране и пића које је купац наручио.

                    **Додатно** Сада када сте научили како да користите променљиве, можете користити онолико променљивих у једном реду колико желите. Можете ли додати више променљивих у свој код, као што су једење у ресторану или понети, готовина или картица, са или без сламке итд.?
            3:
                story_text: |
                    Имате проблема да одлучите шта желите за вечеру? Можете дозволити Хеди да изабере за вас!
                    Једноставно додајте листе својих омиљених (или најмање омиљених) јела и Хеди може насумично изабрати вашу вечеру.
                    Такође можете мало да се забавите, тако што ћете дозволити Хеди да изабере цену за вашу вечеру! Шта ћете добити?
                example_code: |
                    ```
                    dishes {is} шпагете, прокељ, хамбургери
                    {print} Вечерас ћете имати dishes {at} {random}!
                    prices {is} 1 евро, 10 евра, 100 евра
                    {print} То ће бити prices {at} {random}, молим.
                    ```
                story_text_2: |
                    ### Вежба
                    Сада направите своју верзију насумичног ресторана.
                    Направите листу предјела, главних јела, десерта, пића и цена сами.
                    Затим користите `{print}` и `{at} {random}` команде да кажете купцу шта ће бити на њиховом менију вечерас.
                example_code_2: |
                    ```
                    {print} Добродошли у ваш насумични ресторан!
                    starters {is} _
                    mains {is} _
                    desserts {is} _
                    drinks {is} _
                    prices {is} _
                    _
                    ```
            4:
                story_text: |
                    У ресторану морате користити наводнике када користите `{print}` или `{ask}` команду.

                    ### Вежба
                    Додајте наводнике овом коду да би радио! Пазите: променљиве не треба да буду у наводницима.
                    Затим, користите `{clear}` команду да прикажете само један ред у исто време на вашем излазном екрану.

                    ### Вежба 2
                    Вратите се на претходни ниво и копирајте свој код ресторана. Учини да код ради на овом нивоу додавањем наводника на правим местима и додајте неке `{clear}` команде.
                example_code: |
                    ```
                    _ Додајте наводнике овом коду _
                    {print} Добродошли у Ресторан Ше Хеди!
                    {print} Данас служимо пицу или лазање.
                    food {is} {ask} Шта бисте желели да једете?
                    {print} Одличан избор! Храна је мој омиљени!
                    topping {is} {ask} Да ли бисте желели месо или поврће на томе?
                    {print} food са topping је на путу!
                    drinks {is} {ask} Шта бисте желели да пијете уз то?
                    {print} Хвала вам на наруџбини.
                    {print} Ваша храна и пиће ће ускоро стићи!
                    ```
            6:
                story_text: |
                    ### Вежба
                    Пример кода показује како можете програмирати да сте остали без неког артикла на менију у вашем ресторану.
                    Копирајте свој код ресторана са претходних нивоа. Направите проблем у вашем ресторану и програмирајте га, као што је пример кода урадио.
                    На пример, могли бисте остати без неког артикла на менију, или не прихватате кредитне картице, или је машина за сладолед покварена.

                    **Додатно** Да ли сте програмирали проблем и програмирали одговарајуће одговоре? Затим покушајте да додате више `{if}` и `{else}` команди у свој код.
                    Покушајте да додате `{if}` након сваке `{ask}` команде у свом коду да бисте код учинили што интерактивнијим!
                example_code: |
                    ```
                    drinks_in_stock {is} вода, лимунада, кола, сок од поморанџе
                    drink {is} {ask} 'Шта бисте желели да пијете?'
                    {if} drink {in} drinks_in_stock {print} 'Једна ' drink ' стиже!'
                    {else} {print} 'Жао нам је, не продајемо то'
                    ```
            7:
                story_text: |
                    На овом нивоу можете користити математику да израчунате укупну цену наруџбине вашег купца, што може учинити ваш виртуелни ресторан реалистичнијим.
                    Али можете додати и много више ствари у свој виртуелни ресторан, на пример више курсева.

                    ### Вежба
                    Можете додати много више ствари у свој виртуелни ресторан. На пример, можете ли...
                    - питати колико људи долази и помножити цену са тим бројем?
                    - додати још један курс?
                    - дати људима попуст када унесу (тајни) купон код?
                    - додати дечји мени?
                    - смислити друге забавне ствари за додавање?
                example_code: |
                    Можете направити једноставан код ресторана, као овај:
                    ```
                    {print} 'Добродошли у Ресторан Ше Хеди'
                    {print} 'Ево нашег менија:'
                    {print} 'Наши главни курсеви су пица, лазање или шпагети'
                    main = {ask} 'Који главни курс бисте желели?'
                    price = 0
                    {if} main {is} пица price = 10
                    {if} main {is} лазање price = 12
                    {if} main {is} шпагети price = 8
                    {print} 'Наручили сте ' main
                    {print} 'То ће бити ' price ' долара, молим'
                    {print} 'Хвала, уживајте у оброку!'
                    ```
            8:
                story_text: |
                    На овом нивоу сте научили како да користите `{repeat}` команду да поновите линију кода одређени број пута.
                    Можете то користити у свом ресторану да `{ask}` више људи шта би желели да једу.

                    ### Вежба
                    Можете ли завршити код? Хеди треба да понови ово питање онолико пута колико има људи. Дакле, ако има 5 људи, питање треба поставити 5 пута.
                    **Додатно** Проширите свој код са више питања, на пример о пићима или сосу.
                example_code: |
                    ```
                    {print} 'Добродошли у Ресторан Ше Хеди'
                    people = {ask} 'Колико људи нам се данас придружује?'
                    ```
            9:
                story_text: |
                    На овом нивоу можете учинити свој виртуелни ресторан сложенијим понављањем више линија кода. Као ово:

                    ### Вежба
                    Овај код може бити проширен са више артикала на менију, на пример понудом пића, и/или више курсева или десерта. Додајте барем још један артикал.
                    **Додатно** Додајте још више артикала, колико год опција желите!
                example_code: |
                    ```
                    {print} 'Добродошли у Ресторан Ше Хеди!'
                    people = {ask} 'Колико људи ће нам се данас придружити?'
                    {print} 'Одлично!'
                    {repeat} people {times}
                        food = {ask} 'Шта бисте желели да наручите?'
                        {print} food
                    {print} 'Хвала вам на наруџбини!'
                    {print} 'Уживајте у оброку!'
                    ```
            10:
                story_text: "На овом нивоу можете користити угњежђивање да бисте учинили свој ресторан реалистичнијим и забавнијим!\n\n### Вежба\nУ пример коду је уклоњено увлачење. \nМожете ли схватити колико увлачења је потребно свакој линији да би код исправно функционисао?\nАко муштерија наручи пицу, Хеди не би требало да пита који сос муштерија жели.\n\n**Додатно** Ресторан не држи све сосове на залихама. Направите листу доступних сосова и одговорите са сваком наруџбином да ли их продајете. <br>\n**Додатно** Пице имају преливе. Питајте муштерије шта желе.<br>\n**Додатно** Да ли муштерије желе пиће? Питајте их такође! <br>\n"
                example_code: |
                    ```
                    {print} 'Добродошли у ресторан Chez Hedy!'
                    people = {ask} 'Колико људи ће нам се данас придружити?'
                    {print} 'Одлично!'
                    price = 0
                    {repeat} people {times}
                    _ food = {ask} 'Шта бисте желели да наручите?'
                    _ {print} food
                    _ {if} food {is} fries
                    _ price = price + 3
                    _ sauce = {ask} 'Који сос бисте желели уз ваш помфрит?'
                    _ {if} sauce {is} no
                    _ {print} 'без соса'
                    _ {else}
                    _ price = price + 1
                    _ {print} 'са ' sauce
                    _ {if} food {is} pizza
                    _ price = price + 4
                    {print} 'То ће бити ' price ' долара'
                    {print} 'Уживајте у оброку!'
                    ```
            11:
                story_text: |
                    На овом нивоу ћете научити како лако да питате за наруџбине за различите курсеве.

                    ### Вежба 1
                    Завршите код са `{ask}` на празним местима тако да муштерија буде питана шта жели да једе за сваки курс.
                example_code: "```\ncourses = предјело, главно јело, десерт\n{for} course {in} courses\n    {print} 'Шта је ваша наруџбина за ' course '?'\n    _ \n    _\n```\n"
                story_text_2: |
                    ### Вежба
                    Наравно, можете наручити и за више људи!
                    Можете ли додати исправну количину увлачења пре сваке линије да би код исправно функционисао?
                    Савет: неке линије не требају никакво увлачење.
                example_code_2: |
                    ```
                    _ courses = предјело, главно јело, десерт
                    _ names = Тимон, Оно
                    _ {for} name {in} names
                    _ {for} course {in} courses
                    _ food = {ask} name ', шта бисте желели да једете као ваше ' course '?'
                    _ {print} name ' наручује ' food ' као своје ' course
                    ```
            16:
                story_text: |
                    Са `{while}` можете осигурати да ваши муштерије могу наставити да додају наруџбине док не заврше.

                    ### Вежба
                    Правилно додајте команду `{while}` у овај код.
                example_code: |
                    ```
                    {print} 'Добродошли у McHedy'
                    more = 'да'
                    _
                        order = {ask} 'Шта бисте желели да наручите?'
                        {print} order
                        more = {ask} 'Да ли бисте желели да наручите још нешто?'
                    {print} 'Хвала вам!'
                    ```
    rock:
        name: Камен, папир, маказе
        default_save_name: Камен_2
        description: Направите своју игру камен, папир, маказе
        levels:
            1:
                story_text: |
                    На нивоу 1 можете започети са игром камен, папир, маказе.

                    Са `{ask}` можете направити избор, а са `{echo}` можете поновити тај избор.
                example_code: |
                    ```
                    {print} шта бирате?
                    {ask} изаберите између камен, папир или маказе
                    {echo} дакле ваш избор је:
                    ```
                story_text_2: |
                    ### Вежба
                    Уместо речи, можете користити и емоџије: ✊✋✌
                    Можете ли направити код користећи емоџије?
                example_code_2: |
                    ```
                    {print} шта бирате?
                    {ask} изаберите из _
                    {echo} дакле ваш избор је:
                    ```
            2:
                story_text: |
                    На овом нивоу можете вежбати коришћење променљивих, тако да можете правити камен, папир, маказе игру на следећем нивоу!
                    ### Вежба
                    Завршите код попуњавањем **променљиве** на празно.
                    Ова игра није веома интерактивна, али нема бриге! У следећој авантури ћете научити како да користите променљиве са {ask} командом да правите вашу игру интерактивном!
                example_code: |-
                    ```
                    choice {is} камен
                    {print} Ја бирам _
                    ```
            3:
                story_text: |
                    Можете користити команду `{at} {random}` да дозволите рачунару да изабере камен, папир или маказе!

                    ### Вежба
                    Завршите код користећи команду `{at} {random}`.
                example_code: |
                    ```
                    choices {is} камен, папир, маказе
                    {print} choices _
                    ```
                story_text_2: |
                    **Додатно** Направите игру за два играча. Прво питајте два играча да унесу своја имена. Затим дозволите рачунару да насумично изабере њихове изборе.
                example_code_2: |
                    ```
                    choices {is} камен, папир, маказе
                    player_1 {is} {ask} Име играча 1:
                    _
                    ```
            4:
                story_text: |
                    На овом нивоу можемо даље програмирати камен, папир, маказе. Али ако желите да додате текст, морате користити наводнике и овде.
                    ### Вежба
                    Попуните наводнике на празним местима. Имајте на уму да променљива `choices` треба да буде ван наводника.
                example_code: |
                    ```
                    choices {is} камен, папир, маказе
                    {print} _Рачунар бира..._ choices {at} {random}
                    ```
            5:
                story_text: |
                    На овом нивоу можемо одредити да ли је нерешено или не. За то вам је потребан нови код `{if}`.

                    ### Вежба
                    Завршите код попуњавањем празнина:
                    * Нека рачунар изабере насумичну опцију
                    * Питајте играча шта жели да изабере
                    * Попуните тачне променљиве у реду 4 и 5
                    * Завршите ред 6 тако да Хеди може проверити да ли је нерешено или не.
                example_code: |
                    ```
                    options {is} камен, папир, маказе
                    computer_choice {is} _
                    choice {is} _
                    {print} 'изабрали сте ' _
                    {print} 'рачунар је изабрао ' _
                    {if} _ {is} _ {print} 'нерешено!' {else} {print} 'није нерешено'
                    ```

                    Попуните тачан код на празним местима да видите да ли је нерешено.
            10:
                story_text: "На овом нивоу можете програмирати целу игру камен, папир, маказе угнежђивањем команди `{if}`.\n\n### Вежба\nМожете ли завршити код? Програм мора да каже ко је победио за сваку комбинацију.\n\n**Додатно** Желите ли да играте више од једне игре? Проширите код тако да можете играти више рунди. Можете чак користити `{ask}` да питате корисника колико рунди жели да игра.\n"
                example_code: |
                    ```
                    choices = камен, папир, маказе
                    your_choice {is} {ask} 'Шта бирате?'
                    {print} 'Изабрали сте ' your_choice
                    computer_choice {is} choices {at} {random}
                    {print} 'Рачунар је изабрао ' computer_choice
                    {if} computer_choice {is} your_choice
                        {print} 'Нерешено'
                    {if} computer_choice {is} камен
                        {if} your_choice {is} папир
                            {print} 'Победили сте!'
                        {if} your_choice {is} маказе
                            {print} 'Изгубили сте!'
                    # завршите овај код
                    ```
            11:
                story_text: |
                    ### Вежба
                    На претходним нивоима често сте правили своју игру камен, папир, маказе. Можете ли завршити код и правилно користити команду `{for}` да игра проради?
                example_code: "```\nизбори = _\nиграчи = _\n{for} _\n```\n"
            16:
                story_text: |
                    ### Вежба
                    Играјте док не победите рачунар! Али прво, завршите пример кода...
                example_code: |
                    ```
                    won = 'не'
                    options = 'камен', 'папир', 'маказе'
                    {while} won == 'не'
                        your_choice = {ask} 'Шта бирате?'
                        computer_choice = options {at} {random}
                        {print} 'изабрали сте ' your_choice
                        {print} 'рачунар је изабрао ' computer_choice
                        {if} computer_choice == your_choice
                            {print} 'Нерешено!'
                        {if} computer_choice == 'камен' {and} your_choice == 'маказе'
                            {print} 'Изгубили сте!'
                        {if} computer_choice == 'камен' {and} your_choice == 'папир'
                            {print} 'Победили сте!'
                            won = 'да'
                    _
                    ```
    rock_2:
