    music:
        name: музика
        default_save_name: музика
        description: Пуштај мелодију!
        levels:
            1:
                story_text: |-
                    На овом нивоу ћеш научити како да користиш наредбу `{play}` за свирање мелодије!

                    Куцај `{play}` праћено нотом коју желиш да свираш. Скала иде C-D-E-F-G-A-B.
                    Као што видиш, постоји 7 различитих слова, али можемо свирати више од само 7 нота.
                    Куцај број између 0 и 9 иза слова да изабереш скалу, на пример после B4 долази C5.
                    C0 је најнижа нота коју можеш свирати, B9 је највиша.

                    ### Вежба
                    Испробај пример кода, а затим се играј са њим! Можеш ли створити своју мелодију?
                    На следећем нивоу ћеш научити како да свираш неке постојеће песме.
                example_code: "```\n{play} C4\n{play} D4\n{play} E4\n{play} F4\n{play} G4\n{play} A4\n{play} B4\n{play} C5\n```"
            2:
                story_text: |
                    ### Вежба
                    Завршите песме! Почели смо кодове за неке мелодије.
                example_code: |
                    ```
                    {print} Стари Мекдоналд је имао фарму
                    {play} C5
                    {play} C5
                    {play} C5
                    {play} G4
                    {play} A4
                    {play} A4
                    {play} G4
                    ```
                story_text_2: Као што видиш, можеш користити и наредбу `{sleep}` да додаш малу паузу у песму.
                example_code_2: "```\n{print} Сијај сијај звездице\n{play} C\n{play} C\n{play} G\n{play} G\n{play} A\n{play} A\n{play} G\n{sleep} 1\n{play} F\n{play} F\n```\n"
            3:
                story_text: |
                    Направите случајну мелодију!

                    ### Вежба
                    Пример кода прави случајну мелодију, али је веома кратка и не користи много нота.
                    Додајте више нота у листу и направите дужу мелодију копирањем последње линије још неколико пута.
                example_code: "```\nноте {is} A4, B4, C4\n{play} ноте {at} {random}\n{play} ноте {at} {random}\n{play} ноте {at} {random}\n```\n"
            4:
                story_text: |
                    Користи наредбу `{clear}` да направиш караоке машину!

                    ### Вежба
                    Заврши караоке верзију песме 'Mary had a little lamb'.
                    Затим, направи караоке верзију било које песме коју желиш!
                example_code: "```\n{print} 'Мери је имала мало јагње'\n{play} E\n{play} D\n{play} C\n{play} D\n{play} E\n{play} E\n{play} E\n{clear}\n{print} 'Mало јагње, мало јагње'\n{play} D\n{play} D\n{play} D\n{play} E\n{play} E\n{play} E\n{clear}\n{print} 'Мери је имала мало јагње'\n{play} E\n```\n"
            5:
                story_text: |
                    Не мораш увек користити наредбу `{play}` да би свирао целу песму, понекад желиш само да свираш једну ноту.
                    На пример, ако желиш да направиш квиз, можеш свирати веселу високу ноту ако је одговор тачан и тужну ниску ноту ако је одговор погрешан.

                    ### Вежба
                    Заврши прво питање додавањем линије кода која свира ноту C3 ако је одговор погрешан.
                    Затим смисли још 3 питања која ћеш додати у овај квиз.
                example_code: "```\nодговор {is} {ask} 'Шта је главни град Зимбабвеа?'\n{if} одговор {is} Хараре {play} C6\n_\n```\n"
            7:
                story_text: "Уместо свирања нота, сада можеш свирати и бројеве. Једноставно куцај `{play} 1` за најнижу ноту, `{play} 70` за највишу ноту, или било који број између.\n\n### Вежба\nОво захтева музичку математику! Испробај пример кода неколико пута са различитим почетним бројевима.\nЗатим, види да ли можеш компоновати песму користећи бројеве.\n"
                example_code: |
                    ```
                    number = {ask} 'Реци почетни број између 1 и 67'
                    {print} number
                    {play} number
                    number = number + 1
                    {print} number
                    {play} number
                    number = number + 1
                    {print} number
                    {play} number
                    ```
            8:
                story_text: |
                    Коришћење наредбе `{repeat}` може учинити твоје кодове за мелодије много краћим!

                    ### Вежба
                    Заврши код за Twinkle Twinkle Little Star користећи наредбу `{repeat}`.
                    Затим се врати на песме које си направио на претходним нивоима. Можеш ли и те кодове скратити?
                example_code: |
                    ```
                    {print} 'Сјајна, сјајна мала звездо'
                    {repeat} 2 {times} {play} C4
                    {repeat} 2 {times} {play} G4
                    _
                    ```
            9:
                story_text: |
                    Сада када можемо користити команду `{repeat}` за више линија, можемо још лакше правити песме!

                    ### Вежба
                    Заврши песму "Брат Јован" (Frère Jacques). Не заборави да користиш `{repeat}`!
                example_code: |
                    ```
                    {print} 'Брат Јован'
                    {repeat} 2 {times}
                        {play} C
                        {play} D
                        {play} E
                        {play} C
                    {repeat} 2 {times}
                        {play} E
                        {play} F
                        {play} G
                        {sleep} 1
                    ```
            10:
                story_text: |
                    Од овог нивоа можете - између осталог - користити команду {repeat} унутар команде {repeat}.
                    То чини песме попут "Срећан рођендан" још краћим!

                    ### Вежба
                    Заврши песму!
                example_code: |
                    ```
                    first_time = да
                    {repeat} 2 {times}
                        {repeat} 2 {times}
                            {play} C
                        {play} D
                        {play} C
                        {if} first_time {is} да
                            {play} F
                            {play} E
                            first_time {is} не
                        {else}
                            _
                    ```
            16:
                story_text: |
                    **Упозорење** Ова авантура може постати изузетно досадна!
                    Такође можемо користити команду {while} да бисмо понављали песму заувек.

                    ### Вежба
                    Завршите бескрајну песму.
                example_code: |
                    ```
                    {define} song
                        {play} _

                    yes_or_no = {ask} 'Да ли желите да чујете моју бескрајну песму?'
                    {while} yes_or_no = 'да'
                        {call} song
                        {print} '🥳'
                    ```
    parrot:
        name: Папагај
