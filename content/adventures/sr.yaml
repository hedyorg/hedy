                    удаљеност = 5
                    {while} удаљеност < 200
                        удаљеност = удаљеност + 5
                         _
                    ```
                story_text_2: |
                    Вентилатор <img src="https://github.com/hedyorg/hedy/assets/80678586/cb671065-b47b-49f0-b298-dcbcd2a5e28f" width="150">
                example_code_2: |
                    Вентилатор
                    ```
                    {define} нацртај_квадрат {with} страна
                    _

                    i = 100
                    {while} i > 1
                        _ {with} i
                        _
                        i = i - 3
                    ```
                story_text_3: |
                    Звезда <img src="https://github.com/hedyorg/hedy/assets/80678586/17564e0a-63e1-4794-8d41-15ac8c1a5a93" width="150">
                example_code_3: |
                    Звезда
                    Звезда се обично црта користећи окретање од 144 степена. Ако ово мало промените на 143 степена, на пример, и поновите образац више пута са {while} петљом, можете направити ову фигуру.
    while_command:
        default_save_name: док_команда
        levels:
            16:
                story_text: |-
                    Научићемо нову петљу, `{while}` петљу! Настављамо петљу све док је изјава тачна.
                    Зато не заборави да промениш вредност у петљи.

                    У пример коду, настављамо док се не добије тачан одговор.
                    Ако се тачан одговор никада не добије, петља се никада не завршава!
                example_code: |
                    ```
                    одговор = 0
                    {while} одговор != 25
                        одговор = {ask} 'Колико је 5 пута 5?'
                    {print} 'Дат је тачан одговор'
                    ```
        name: '{while}'
        description: '{while}'
