    secret:
        name: СуперШпијун
        default_save_name: СуперШпијун
        description: Направите свој шпијунски код
        levels:
            10:
                story_text: |
                    Можемо поједноставити супер шпијунски код са `{and}`, тако да нам је потребан само један `{if}`.

                    ### Вежба 1
                    Довршите код попуњавањем праве команде на празном месту. Савет: Супер шпијун мора тачно одговорити на ОБА питања пре него што добије поверљиве информације!

                    ### Вежба 2
                    Желимо још више збунити непријатеља! Направите листу са лажним одговорима и изаберите један насумично када се да погрешан одговор.
                example_code: |
                    ```
                    име = {ask} 'Како се зовеш?'
                    лозинка = {ask} 'Која је твоја лозинка?'
                    {if} име {is} 'Агент007' _ лозинка {is} 'СТРОГОПОВЕРЉИВО'
                        {print} 'Иди на аеродром у 02.00'
                    {else}
                        {print} 'Иди на железничку станицу у 10.00'
                     ```
    sleep_command:
        description: увођење команде {sleep}
        levels:
            2:
                story_text: |
                    Још једна нова команда на овом нивоу је `{sleep}`, која паузира ваш програм на секунду. Ако укуцате број иза команде {sleep}, програм ће паузирати на тај број секунди.

                    ### Вежба
                    Вежбајте ову нову команду тако што ћете направити свој код у којем ћете користити команду {sleep} најмање 3 пута. Са сваком командом {sleep} време паузе треба да буде различито.
                example_code: |
                    ```
                    {print} Моја омиљена боја је...
                    {sleep} 2
                    {print} зелена!
                    ```
        default_save_name: sleep_command
        name: '{sleep}'
    songs:
        name: Певај песму!
        default_save_name: Песма
        description: Одштампај песму
        levels:
            7:
                story_text: |
                    Песме често садрже много понављања. Понекад је понављање такође засновано на бројању.
                    На пример, у добро познатој песми 'Бочице пива'. Можеш програмирати ту песму са мало математике.

                    Савет: Користи функцију читања наглас да би Хеди отпевао песму за тебе!

                    ### Вежба
                    Сада можеш понављати линије 2 до 7 колико год пута желиш копирањем линија.
                example_code: |
                    ```
                    стих = 99
                    {print} стих ' бочица пива на зиду'
                    {print} стих ' бочица пива'
                    {print} 'Скини једну, пусти је у круг'
                    стих = стих - 1
                    {print} стих ' бочица пива на зиду'
                    {sleep}
                    ```
                story_text_2: |
                    Ова дечија песма броји од 5 малих мајмуна до 1 мајмуна.
                    Ако копираш линије 2 - 7 и налепиш их испод кода, можеш отпевати целу песму!
                example_code_2: |
                    ```
                    број = 6
                    број = број - 1
                    {print} број ' малих мајмуна скаче по кревету'
                    {print} 'Један је пао и ударио главу'
                    {print} 'Мама је позвала доктора и доктор је рекао'
                    {print} 'НЕМА ВИШЕ МАЈМУНА КОЈИ СКАЧУ ПО КРЕВЕТУ!'
                    {sleep}
                    ```
            8:
                story_text: |
                    Песме често садрже много понављања. На пример... Бејби Шарк! Ако је певате, стално певате исту ствар:

                    Бејби Шарк тутутудутуду <br>
                    Бејби Шарк тутутудутуду <br>
                    Бејби Шарк тутутудутуду <br>
                    Бејби Шарк

                    ### Вежба
                    Можеш ли одштампати песму Бејби Шарк са `{repeat}`? Заврши код заменом празних места?
                    **Додатно** Након Бејби Шарк можеш наравно програмирати и друге песме. Постоји много песама са понављањем!
                    Можеш ли смислити још једну песму и одштампати је?
                example_code: |
                    ```
                    {repeat} _ _ {print} 'Бејби Шарк тутутудутуду'
                    {print} 'Бејби Шарк'
                    ```
            9:
                story_text: |
                    На претходном нивоу програмирао си песму 'Бочице пива'. Али без команде `{repeat}`, морао си много пута копирати стихове.
                    На овом нивоу можеш поновити песму 99 пута, само додавањем једне једноставне линије!

                    ### Вежба
                    Додај праву команду на празна места и правилно увуци код.
                example_code: |
                    ```
                    стих = 99
                    _ 99 {times}
                    {print} стих ' бочица пива на зиду'
                    {print} стих ' бочица пива'
                    {print} 'Скини једну, пусти је у круг'
                    стих = стих - 1
                    {print} стих ' бочица пива на зиду'
                    ```
            11:
                story_text: |
                    Са `{for}` можеш направити целу песму Бејби Шарк (укључујући све остале ајкуле у породици) у само 6 линија!

                    ### Вежба 1
                    Можеш ли учинити код за Бејби Шарк још краћим коришћењем команде `{for}`? Заврши пример кода.
                example_code: "```\nпородица = беба, мама, тата, бака, дека\n_ _ _ _ \n  {print} _\n```\n"
                story_text_2: |
                    ### Вежба 2
                    Одштампај песму Пет малих мајмуна који скачу по кревету. Потражи текст ако се не сећаш.

                    **Додатно** Одштампај песму Стари Макдоналд је имао фарму, и увери се да све животиње праве различите звуке, користећи `{if}`.
                example_code_2: |
                    ```
                    мајмуни = 5, 4, 3, 2, 1
                    ```
            13:
                story_text: |
                    На нивоу 16 смо правили песме користећи листе. Међутим, ови програми више не раде исправно на овом нивоу. Двојне тачке из нивоа 17 и заграде из нивоа 18 још увек треба додати.

                    ### Вежба 1
                    Песма "Пијани морнар" је дата као пример кода, али још увек не ради.
                    Можете ли осигурати да све поново ради? Да бисмо вам помогли, ставили смо _ на места неких грешака.

                    ### Вежба 2
                    Сада такође пронађите своју песму "Стари Макдоналд" са нивоа 16 и исправите је.
                example_code: |
                    ```
                    lines = ['шта ћемо радити са пијаним морнаром', 'обријати му стомак рђавом бритвом', 'ставити га у дугачки чамац док не отрезни']
                    {for} line {in} lines _
                        {for} i {in} {range} 1 {to} 3 _
                            {print} _ line _
                        {print} 'рано ујутру'
                        {for} i {in} {range} 1 {to} 3
                            {print} 'хајде хеј и горе она иде'
                        {print} 'рано ујутру'
                    ```
    songs_2:
        name: Певај песму! 2
        default_save_name: Песма 2
        description: Певај песму 2
        levels:
