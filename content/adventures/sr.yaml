                    _ _ _ _
                        {print} играч ' баца ' избори {at} {random}
                        {sleep}
                    ```
            16:
                story_text: |
                    ### Вежба
                    На овом нивоу можете направити малу игру у којој ћете морати да баците 6 што брже могуће.
                    Започели смо код, на вама је да игра проради!

