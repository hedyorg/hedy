    haunted:
        name: Уклети дом
        default_save_name: Уклети дом
        description: Побегни из уклетог дома
        levels:
            1:
                story_text: |
                    У овој авантури радите на прављењу игре у којој морате побећи из уклетог дома одабиром правих врата.
                    Ако изаберете права врата, преживећете, али ако не, страшно чудовиште би могло...

                    На нивоу 1 почињемо нашу игру уклетог дома тако што ћемо смислити страшну причу и питати играча које чудовиште ће видети у уклетом дому.
                example_code: |
                    ```
                    {print} Како сам доспео овде?
                    {print} Сећам се да ми је пријатељ рекао да уђем у стару вилу...
                    {print} и одједном је све постало црно.
                    {print} Али како сам завршио на поду...?
                    {print} Глава ме боли као да ме је неко ударио бејзбол палицом!
                    {print} Шта је то звук?
                    {print} О не! Осећам као да нисам сам у овој кући!
                    {print} Морам да изађем одавде!
                    {print} Испред мене су 3 врата..
                    {ask} Која врата треба да изаберем?
                    {echo} Бирам врата
                    {print} ...?
                    ```
                story_text_2: |
                    ### Вежба
                    Копирајте пример кода на ваш улазни екран кликом на жуто дугме.
                    Сада завршите причу додавањем најмање 5 линија кода.
                    Запамтите да свака линија кода почиње са `{print}` командом.
            2:
                story_text: |
                    У овој уклетој кући можете изабрати своје чудовиште са емоџијима. Наравно, можете користити и речи.
                story_text_2: |
                    ### Вежба
                    У горњем примеру чудовишта су унапред одређена. Тако да сваки пут када покренете свој код, излаз је исти.
                    Можете ли додати `{ask}` команде да учините уклету кућу интерактивном и да играчи изаберу чудовишта на која наилазе?
                example_code_2: "```\nчудовиште_1 {is} _\nчудовиште_2 {is} _\nчудовиште_3 {is} _\n{print} Улазите у уклету кућу.\n{print} Одједном видите чудовиште_1\n{print} Трчите у другу собу...\n{print} Али чудовиште_2 вас тамо чека!\n{print} О не! Брзо идите у кухињу.\n{print} Али када уђете, чудовиште_3 вас напада!\n```\n"
                example_code: "```\nчудовиште_1 {is} 👻\nчудовиште_2 {is} 🤡\nчудовиште_3 {is} 👶\n{print} Улазите у уклету кућу.\n{print} Одједном видите чудовиште_1\n{print} Трчите у другу собу...\n{print} Али чудовиште_2 вас тамо чека!\n{print} О не! Брзо идите у кухињу.\n{print} Али када уђете, чудовиште_3 вас напада!\n```\n"
            3:
                story_text: |
                    На претходним нивоима направили сте увод у своју игру уклете куће, али као што сте можда приметили, прича би увек имала страшан крај.
                    На овом нивоу можете учинити своју причу интерактивнијом променом исхода игре; понекад ћете бити поједени, понекад ћете побећи!
                    Нека Хеди одлучи насумично!

                    ### Вежба
                    Копирајте пример кода и попуните празнине да би функционисао!

                    **Додатно** Ова прича је прилично једноставна, можда можете додати мало узбуђења додавањем узбудљивије приче.
                    Такође, тренутно имате веома ограничене исходе, постоје само 3 опције шта је иза врата. Можда можете смислити више чудовишта да додате на листу!
                example_code: |
                    ```
                    _ Побегни из уклете куће!
                    _ Испред тебе су 3 врата...
                    _ _ _ Која врата бирате?
                    _ Изабрао си врата ... choice
                    monsters _ зомби, вампир, НИШТА, ПОБЕГАО СИ
                    _ Видиш...
                    {sleep}
                    _ _ _ _
                    ```
            4:
                story_text: |
                    На овом нивоу учите како да користите наводнике у својим играма.

                    ### Вежба
                    Можете ли учинити свој ниво уклете куће 4 доказаним?

                    ### Вежба 2
                    Вратите се на претходни ниво и копирајте свој код уклете куће. Учини да код ради на овом нивоу додавањем наводника на права места.
                example_code: |
                    ```
                    _ Додајте наводнике у овај код _
                    {print} Escape from the haunted house!
                    {print} There are 3 doors in front of you...
                    choice {is} {ask} Which door do you choose?
                    {print} You picked door ... choice
                    monsters {is} a zombie, a vampire, NOTHING YOUVE ESCAPED
                    {print} You see...
                    {sleep}
                    {print} monsters {at} {random}
                     ```
            5:
                story_text: |
                    До овог нивоа игра уклете куће увек је тражила од играча да изабере врата, али као што сте можда приметили, нису морали да одговоре тачно.
                    Ако је играч унео потпуно насумичан одговор, игра би и даље функционисала и играч би можда чак и победио (иако није изабрао врата).
                    На овом нивоу можете победити у игри само ако изаберете иста врата која је Хеди насумично изабрала.

                    ### Вежба
                    Можете ли пронаћи 4 недостајуће речи да бисте завршили код?
                example_code: "```\n{print} 'Побегните из уклете куће!'\n{print} 'Испред вас су 3 врата...'\nврата {is} 1, 2, 3\nчудовишта {is} вукодлак, мумија, вампир, зомби\nизабрана_врата {is} {ask} 'Која врата бирате?'\n{print} 'Изабрали сте врата...' изабрана_врата\n{sleep}\nтачна_врата {is} врата {at} {random}\n_ _ _ _ {print} 'Сјајно! Побегли сте!'\n{else} {print} 'О не! Једе вас...' чудовишта {at} {random}\n```\n"
            10:
                story_text: "На овом нивоу можете користити угњежђивање, што вам омогућава да учините уклету кућу још интерактивнијом!\n\n### Вежба\nСада је веома тешко победити у овој игри, можете ли је учинити лакшом за победу?\nПромените свој код тако да има само једна погрешна врата и два исправна врата уместо једних исправних врата и два погрешна?\nСавет: Ово значи промену променљиве correct_door у wrong_door и замену `{if}` и `{else}` кода.\nИ наравно, можете променити причу и учинити је својом. Промените чудовишта или направите срећну игру у којој добијате поклон!\n"
                example_code: "```\n{print} 'Побегните из уклете куће!'\nплејер = жив\nврата = 1, 2, 3\nчудовишта = зомби, вампир, џиновски паук\n{repeat} 3 {times}\n    {if} плејер {is} жив\n        тачна_врата {is} врата {at} {random}\n        {print} 'Испред вас су 3 врата...'\n        изабрана_врата = {ask} 'Која врата бирате?'\n        {if} изабрана_врата {is} тачна_врата\n            {print} 'Овде нема чудовишта!'\n        {else}\n            {print} 'Једе вас ' чудовишта {at} {random}\n            плејер = мртав\n    {else}\n        {print} 'КРАЈ ИГРЕ'\n{if} плејер {is} жив\n    {print} 'Сјајно! Преживели сте!'\n```\n"
            14:
                story_text: |
                    ### Вежба
                    Ова игра уклете куће користи везу између листа које можете користити на овом нивоу.
                    На пример: сва својства која припадају зомбију су прва на свим листама, вештица друга и вампир трећи.
                    Погледајте код и попуните `weapons[i]`, `monsters[i]`, `bad_fate[i]`, `good_fate[i]`, `hint[i]` на исправним празнинама да бисте добили код који ради!
                example_code: |
                    ```
                    бројеви = [1, 2, 3]
                    i = бројеви[{random}]
                    наговештај = ['режање', 'злокобан смех', 'лепршање крила слепог миша']
                    чудовишта = ['зомби', 'вештица', 'вампир']
                    лоша_судбина = ['Ваш мозак је поједен', 'Зауек сте проклети', 'Уједен сте']
                    добра_судбина = ['Бацате шунку. Зомби је одвраћен и почиње да је једе.', 'Палите завесе. Вештица бежи од страха од ватре', 'Вампир мрзи бели лук и бежи']
                    оружја = ['шунка', 'упаљач', 'бели лук']
                    {print} 'Стојите испред старе виле'
                    {print} 'Нешто није у реду овде'
                    {print} 'Чујете ' _
                    {print} 'Идете да истражите'
                    {print} 'Улазите у кухињу и видите упаљач, сирову шунку и бели лук.'
                    ваше_оружје = {ask} 'Шта носите са собом?'
                    {print} 'Са вашим ' ваше_оружје ' улазите у дневну собу'
                    {print} 'Тамо налазите ' _
                    потребно_оружје = _
                    {if} ваше_оружје == потребно_оружје
                        {print} 'Користите ваше ' ваше_оружје
                        {print} _
                        {print} 'ПОБЕДИЛИ СТЕ!'
                    {else}
                        {print} 'Изабрали сте погрешно оружје...'
                        {print} _
                        {print} 'КРАЈ ИГРЕ'
                    ```
