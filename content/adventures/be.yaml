adventures:
    story:
        name: гісторыя
        default_save_name: Гісторыя
        description: Прыдумай кароценькую гісторыю
        levels:
            1:
                story_text: "На ўзроўні 1 ты зможаш скласці гісторыю пра любога персанажа, каторага ўвядзеш самастойна.\n\nУ першым радку спытай, хто будзе галоўным персанажам тваёй гісторыі з дапамоагй каманды `{ask}`.\n\nКожны наступны радок пачынай з `{print}`, каб надрукаваць сказ.\nА калі ты хочаш, каб галоўны персанаж быў у канцы сказа, скарыстай `{echo}`.\n"
                story_text_2: "### Практыкаванне\nА зараз складзі гісторыю з прынамсі 6 радкоў коду.\nТвая гісторыя павінна быць не такой, як у прыкладзе.\nВыкарыстай хаця б адну каманду `{ask}` і адну `{echo}`.\nГісторыя можа быць на любую тэму, якая табе падабаецца.\nКалі не можаш прыдумаць тэму, скарыстайся адным з нашых варыянтаў: паход у кіно, спартыўны матч або дзень у заапарку.\n"
                example_code: "```\n{ask} Галоўны персанаж гэтай гісторыі —\n{print} Галоўны персанаж збіраецца шпацыраваць па лесе\n{echo} Трошкі страшнавата,\n{print} Паўсюль чуваць дзіўныя гукі\n{print} Узнікае адчуванне, што гэта лес з прывідамі\n```\n"
            2:
                story_text: "На другім узроўні ты можаш зрабіць гісторыю больш цікавай. Імя галоўнага героя цяпер можа быць у любым месцы сказа.\n\nДля гэтага табе прыйдзецца крыху больш папраграмаваць. Цяпер перш-наперш трэба даць галоўнаму герою імя.\n\nА потым можна ўстаўляць гэта імя ў любое месца любога сказа.\n"
                story_text_2: "### Практыкаванне\nЦяпер самы час дадаць у гісторыю, створаную табой на папярэднім узроўні, пераменныя.\nПерайдзі ў раздзел \"Мае праграмы\", знайдзі сваю гісторыю з 1-га ўзроўню, скапіруй код і ўстаў яго у поле ўводу на гэтым узроўні.\n\nГэты код пакуль не будзе працаваць на гэтым узроўні, таму што ў ім яшчэ не выкарыстоўваюцца пераменныя.\nЗмяні каманды `{ask}` і `{echo}` у кодзе на правільную форму, якую мы вывучылі на гэтым узроўні.\n\n**Дадаткова** Дадай каманду `{sleep}`, каб стварыць напружанне ў гісторыі.\n"
                example_code: "```\nімя {is} {ask} Як завуць галоўнага персанажа?\n{print} імя збіраецца пабегаць па лесе\n{print} імя трошкі баіцца\n{print} Раптам чуецца дзіўны гук...\n{sleep}\n{print} імя баіцца, што гэта лес з прывідамі\n```"
            8:
                example_code: "```\n{print} 'Прынц усё клікаў на дапамогу'\n{repeat} 5 {times} {print} 'Дапамажыце!'\n{print} 'Чаму мне ніхто не дапамагае?'\n```\n"
            3:
                example_code: "```\nжывёлы {is} 🦔, 🐿, 🦉, 🦇\n{print} Цяпер чуецца гук жывёлы {at} {random}\n```\n"
                example_code_2: "```\n{print} Раптам пачуўся нейкі гук\nжывёлы {is} 🐿, 🦔, 🦇, 🦉\nжывёла {is} {ask} Як ты думаеш, хто гэта?\n{add} жывёла {to_list} жывёлы\n{print} Гэта быў гук жывёлы {at} {random}\n```\n"
                story_text: "На 3-м узроўні мы зробім гісторыю яшчэ больш цікавай. Можна выкарыстоўваць выпадковасць для любой пачвары, жывёлы ці іншай перашкоды, вось так:\n"
                story_text_2: "Каманда `{add}` таксама можа прыдацца ў гісторыі.\n"
                story_text_3: "Гэта прыклад выкарыстання ў гісторыі каманды `{remove}`\n\n### Практыкаванне\nСкапіруй гісторыю з папярэдніх узроўняў у гэты ўзровень.\nНа гэтым узроўні мы вывучылі тры новыя каманды: `{at} {random}` , `{add} {to_list}` і `{remove} {from}`.\nДадай новыя радкі кода, каб кожная новая каманда прысутнічала ў гісторыі хаця б аднойчы.\n"
                example_code_3: "```\n{print} Заплечнік героя стаў занадта цяжкім.\n{print} Унутры былі бутэлька вады, ліхтарык і цагліна.\nторба {is} вада, ліхтарык, цагліна\nпрэч {is} {ask} Які прадмет трэба выкінуць?\n{remove} прэч {from} торба\n```\n"
            4:
                example_code: |
                    ```
                    імя {is} {ask} _ Як цябе завуць? _
                    {print} _ Імя голоўнага персанажа — _ імя
                    _
                    _
                    {print} імя _ збіраецца пашпацыраваць па лесе _
                    {print} імя _ трошкі баіцца _
                    жывёлы {is} 🦔, 🐿, 🦉, 🦇
                    {print} _ Раптам чуецца гук _ жывёлы {at} {random}
                    {print} імя _ баіцца, што гэта лес з прывідамі _
                    ```
                story_text: |
                    ### Практыкаванне
                    Скапіруй прыклад і завяршы яго. Спачатку запоўні двукоссямі прабелы ў радках 1 і 2.
                    У радкі 3 і 4 трэба дадаць не двукоссі, а каманды `{sleep}` і `{clear}`. Ці дасі рады замяніць усе прабелы?

                    ### Практыкаванне 2
                    Вярніся на папярэдні ўзровень і скапіруй код гісторыі. Зрабі, каб той код працаваў на гэтым узроўні, дадаўшы двукоссі ў патрэбныя месцы.
                    Увага: Пераменныя ў гісторыі павінны быць па-за двукоссямі. Гэтак жа, як і ў другім радку прыкладу. У гэтым радку назва пераменнай знаходзіцца па-за двукоссямі.
            5:
                example_code: |
                    ```
                    імя {is} {ask} 'Хто гуляе па лесе?'
                    {print} імя ' гуляе па лесе'
                    {print} імя ' сустракае пачвару'
                    канец {is} {ask} 'Табе хочацца добры ці дрэнны канец?'
                    {if} канец {is} добры {print} імя ' бярэ меч, і пачвара хутка ўцякае'
                    {else} {print} імя ' становіцца вячэрай для пачвары'
                    ```
                story_text: |
                    На гэтым узроўні мы запраграмуем розныя канцоўкі, што дапаможа яшчэ больш раснастаіць гісторыю.
                    У прыкладзе паказана, як зрабіць 2 розныя канцоўкі.

                    ### Практыкаванне 1
                    Напішы новую кароткую гісторыю як мінімум з 6 радкоў кода на любую тэму.
                    Няма натхнення? Выберы адну з гэтых тэм: супергерой, нудны дзень у школе, хтосьці апынуўся на бязлюдным востраве.

                    Цяпер дай гульцу магчымасць выбраць шчаслівы або дрэнны канец, як у прыкладзе.
                    Запраграмуй абедзве канцоўкі.

                    ### Практыкаванне 2
                    Скапіруй гісторыю, створаную па ўласным сюжэце на папярэдніх узроўнях.
                    Знайдзі спосаб дадаць у яе прынамсі 2 каманды `{if}` і `{else}`.
                    Гэта можа быць таксама пра шчаслівы або дрэнны канец, але ж можна паспрабаваць знайсці і іншыя спосабы выкарыстання гэтых каманд.
            6:
                example_code: |
                    ```
                    персанаж {is} {ask} 'Хто дапаможа табе ў квэсце?'
                    {if} персанаж {is} 'Барбара'
                    {print} 'Ты выбіраеш Барбару! Яна самая разумная з усіх!'
                    {elif} персанаж {is} 'Ігнат'
                    {print} 'Ты выбіраеш Ігната! Ён самы моцны з усіх!'
                    {elif} персанаж {is} 'Якуб'
                    {print} 'Ты выбіраеш Якуба! Ён самы хуткі з усіх!'
                    ```
                story_text: |-
                    Цяпер, з выкарыстаннем `{elif}`, гісторыя можа стаць яшчэ больш інтэрактыўнай! Напрыклад, можна стварыць некалькі персанажаў, кожны з якіх мае ўнікальныя рысы.
                    Або можна даць гульцу выбраць, якой дарогай ісці, якія дзверы адчыніць або якое чароўнае зелле выпіць...

                    ### Практыкаванне
                    Ствары ўласную гісторыю з 3 ці больш варыянтамі, выкарыстоўваючы {elif}.
    and_or_command:
        name: '{and} ды {or}'
    calculator_2:
        name: калькулятар 2
        default_save_name: Калькулятар 2
        description: Калькулятар 2
    elif_command:
        name: '{elif}'
        levels:
            6:
                example_code: |
                    ```
                    прызы {is} 1 мільён долараў, яблычны пірог, нічога
                    ваш_прыз {is} прызы {at} {random}
                    {print} 'Вы выйгралі ' ваш_прыз
                    {if} ваш_прыз {is} '1 мільён долараў'
                    {print} 'Ваў! Вы багатыя!'
                    {elif} ваш_прыз {is} 'яблычны пірог'
                    {print} 'Выдатна, яблычны пірог!'
                    {else}
                    {print} 'Пашанцуе ў наступны раз..'
                    ```
                story_text: |
                    На гэтым узроўні ў нас новая каманда: `{elif}`. `{elif}` — гэта спалучэнне ключавых слоў `{else}` і `{if}`, якое можа прыдацца, каб зрабіць 3 (ці больш!) варыянты.
                    Паспрабуй!
                    ### Практыкаванне
                    Зрабі кола фартуны, дзе можна выйграць розныя прызы і атрымаць адпаведныя рэакцыі.
    harry_potter:
        name: гары потэр
        default_save_name: Гары Потэр
        description: Прыгоды Гары Потэра
    in_command:
        name: '{in}'
        levels:
            6:
                example_code: |
                    ```
                    прыгожыя_колеры {is} зялёны, жоўты
                    любімы_колер {is} {ask} 'Які твой любімы колер?'
                    {if} любімы_колер  {in} прыгожыя_колеры
                    {print} 'прыгожы!'
                    {else}
                    {print} 'так сабе'
                    ```
                example_code_2: |
                    ```
                    жывёлы {is} сабака, карова, авечка
                    адказ {is} {ask} 'Якая твая любімая жывёла?'
                    _ адказ _ жывёлы _ 'Мая таксама!'
                    _ _ 'Мае любімыя жывёлы — сабакі, каровы і авечкі'
                    ```
                story_text: |
                    ## Спісы
                    Калі мы хочам праверыць, ці ёсць нешта ў спісе, цяпер мы можам карыстацца камандай `{in}`.
                    Гэты код выводзіць на экран "прыгожы!", калі ты выбіраеш зялёны або жоўты, і "так сабе" ў адваротным выпадку.
                story_text_2: |
                    ### Практыкаванне
                    Запоўні пропускі ў кодзе новымі камандамі.
                    Пасля гэтага паспрабуй стварыць уласную праграму і выкарыстаць пытанне, прыдуманае самастойна.
    is_command:
        name: '{is}'
        levels:
            2:
                example_code: "```\nімя {is} Хэдзі\nвек {is} 15\n{print} імя мае век гадоў\n```\n"
                story_text: "## Пераменныя\nТы можаш даць назву слову з дапамогай `{is}`. Гэта называецца **пераменная**. У гэтым прыкладзе мы стварылі пераменную з назвай \"імя\" і пераменную з назвай \"век\". Ты можаш выкарыстоўваць слова \"імя\" ў любым месцы кода, і яно будзе замяняцца на \"Хэдзі\", вось так:\n"
                example_code_2: "```\nлюбімая_жывёла {is} _\n{print} Мне падабаецца любімая_жывёла\n```\n"
                story_text_2: "### Практыкаванне\nПрыспеў час стварыць уласныя пераменныя!\nУ гэтым кодзе мы стварылі прыклад пераменнай `любімая_жывёла`. У першым радку пераменная задаецца, а ў другім радку мы выкарыстоўваем пераменную ў камандзе `{print}`.\nСпачатку завяршы наш прыклад, упісаўшы сваю любімую жывёлу ў пустое поле. Затым самастойна ствары прынамсі тры такія коды. Выберы пераменную і задай ёй значэнне з дапамогай каманды `{is}`. Затым выкарыстай яе ў камандзе `{print}`, як мы і рабілі.\n"
            7:
                example_code: |
                    ```
                    імя = Хэдзі
                    адказ = 20 + 4
                    ```
                story_text: |
                    Таксама ёсць змены і ў захоўванні слова ў пераменнай! Цяпер пры захоўванні імені або ліку ў пераменнай можна выкарыстоўваць `=` замест `{is}`, вось так:
    language:
        name: мова
        default_save_name: Мова
        levels:
            5:
                example_code: |
                    ```
                    {print} 'Вывучай французскую!'
                    кот {is} {ask} '🐱'
                    {if} кот {is} chat {print} 'Выдатна!'
                    {else} {print} 'Не, кот — гэта chat'
                    жабка {is} {ask} '🐸'
                    {if} жабка {is} grenouille {print} 'Выдатна!'
                    {else} {print} 'Не, жабка — гэта grenouille'
                    ```
                story_text: |
                    Ствары ўласную праграму для вывучэння лексікі на новай мове.

                    ### Практыкаванне
                    Падаўжы код, дадаўшы прынамсі 3 словы для вывучэння..
                    **Дадаткова** Вядома, можна выкарыстоўваць іншую мову, акрамя французскай. Ты можаш змяніць код на любую мову, якую хочаш вывучыць.
    music:
        name: музыка
        default_save_name: музыка
        levels:
            1:
                example_code: "```\n{play} C4\n{play} D4\n{play} E4\n{play} F4\n{play} G4\n{play} A4\n{play} B4\n{play} C5\n```"
                story_text: "На гэтым узроўні ты даведаешся, як прайграць мелодыю з дапамогай каманды `{play}`\n\nНапішы `{play}`, а пасля ноту, якую хочаш прайграць. Шкала такая: C-D-E-F-G-A-B.\nЯк бачыш, тут у нас 7 розных літар, але сыграць мы можам больш за 7 нот.\nНабяры лічбу ад 0 да 9 пасля літары, каб выбраць актаву, напрыклад, пасля B4 ідзе C5.\nC0 — гэта самая нізкая нота, якую можна прайграць, а B9 — самая высокая.\n\n### Практыкаванне\nПаспрабуй прыклад кода, а потым пагуляйся з ім! Ці зможаш ты стварыць уласную мелодыю?\nНа наступным узроўні ты даведаешся, як прайграць некаторыя існуючыя песні."
            2:
                story_text: "### Практыкаванне\nСкончы песні! Мы пачалі код для некаторых мелодый.\n"
                story_text_2: Як бачыш, з дапамогай каманды `{sleep}` у песню можна дадаць і невялікую паўзу.
            3:
                example_code: "```\nноты {is} A4, B4, C4\n{play} ноты {at} {random}\n{play} ноты {at} {random}\n{play} ноты {at} {random}\n```\n"
                story_text: "Стварыце выпадковую мелодыю!\n\n### Практыкаванне\nУ прыкладзе кода ствараецца выпадковая мелодыя, але яна вельмі кароткая і выкарыстоўвае няшмат нот.\nДадай больш нот у спіс і ствары даўжэйшую мелодыю, скапіраваўшы апошні радок яшчэ некалькі разоў..\n"
            5:
                example_code: |
                    ```
                    адказ {is} {ask} 'Якая сталіца Зімбабвэ?'
                    {if} адказ {is} Харарэ {play} C6
                    _
                    ```
                story_text: |
                    Каманду `{play}` можна выкарыстоўваць не толькі для таго, каб прайграць усю песню. Часам неабходна прайграць толькі адну ноту.
                    Напрыклад, калі ты робіш віктарыну, ты можаш прайграваць вясёлую высокую ноту для правільных адказаў і сумную нізкую ноту, калі адказ няправільны.

                    ### Практыкаванне
                    Завяршы першае пытанне, дадаўшы радок кода, які прайграе ноту C3, калі карыстальнік дае няправільны адказ.
                    І прыдумай яшчэ 3 пытанні, якія можна дадаць у віктарыну.
            6:
                example_code: |
                    ```
                    настрой {is} {ask} 'Які ў цябе сёння настрой?'
                    {if} настрой {is} радасны
                    {play} C4
                    {play} E4
                    {play} G4
                    {play} C5
                    {elif} настрой {is} сумны
                    {play} _
                    {elif} настрой {is} _
                    {play} _
                    ```
                story_text: |
                    Выкарыстоўваючы `{elif}`, можна прайграваць розныя мелодыі для розных сітуацый. Напрыклад, калі чалавек адчувае сябе шчаслівым, можна прайграць яму вясёлую мелодыю.
                    ### Практыкаванне
                    Спачатку прыдумай сумную мелодыю, а затым — прынамсі 2 іншыя мелодыі для розных настрояў.
            7:
                example_code: |
                    ```
                    лік = {ask} 'Назаві пачатковы лік ад 1 да 67'
                    {print} лік
                    {play} лік
                    лік = лік + 1
                    {print} лік
                    {play} лік
                    лік = лік + 1
                    {print} лік
                    {play} лік
                    ```
                story_text: |
                    Замест таго, каб іграць ноты, цяпер можна іграць лікі. Проста ўвядзі `{play} 1`, каб прайграць самую нізкую ноту, `{play} 70` — самую высокую ноту або што-небудзь паміж імі.

                    ### Практыкаванне
                    Спатрэбіцца трохі музычнай матэматыкі! Паспрабуй прыклад некалькі разоў з рознымі пачатковымі лічбамі.
                    Затым паглядзі, ці можаш ты скласці песню, выкарыстоўваючы лічбы.
    parrot:
        name: папугай
        default_save_name: Папугай
        description: Ствары ўласнага анлайн-папугая, які будзе капіраваць цябе!
        levels:
            1:
                story_text: "Ствары ўласнага анлайн-папугая, які будзе капіраваць цябе!\n"
                example_code: "```\n{print} Я папугай Хэдзі\n{ask} Як цябе завуць?\n{echo}\n{echo}\n```\n"
                example_code_2: "```\n{print} Я папугай Хэдзі\n{ask} _\n{echo}\n{echo}\n"
                story_text_2: "### Практыкаванне\nСкапіруй код прыкладу ў поле ўводу, націснуўшы на жоўтую кнопку.\nЗрабі так, каб папугай задаў іншае пытанне. Запоўні прабелы ў прыкладзе!\n**Дадаткова** Ты можаш дазволіць папугаю задаць некалькі пытанняў. Увядзі яшчэ некалькі радкоў пад сваім кодам.\n"
            2:
                example_code: "```\n{print} Я папугай Хэдзі\nімя _ _ як цябе завуць?\n{print} імя\n_\n{print} чырык\n_\n{print} імя\n```\n"
                story_text: "На папярэднім узроўні мы стварылі папугая, які можа паўтараць за табой. На гэтым узроўні мы зробім яго інтэрактыўным з дапамогай пераменнай і каманды `{ask}`.\nА яшчэ мы зробім папугая больш жывым, дадаўшы каманды `{sleep}` паміж ягонымі фразамі.\n"
                story_text_2: "### Практыкаванне\nСпачатку завяршы камандамі `{is}` і `{ask}` радок 2.\nЗатым дадай у радкі 4 і 6 каманду `{sleep}`, каб папугай крыху памаўчаў.\n\n**Дадаткова** Ці можаш ты дапісаць колькі радкоў кода і зрабіць так, каб папугай пытаўся нешта яшчэ, акрамя імені?\n"
            3:
                example_code: "```\nсловы {is} чырык, Хэдзі\n{print} Падрэсіруй свайго папугая!\nновае_слова {is} {ask} Якому слову ты хочаш яго навучыць?\n_ новае_слова _ словы\n{print} 🧒 Скажы новае_слова , Хэдзі!\n{print} 🦜 словы {at} {random}\n```\n"
                story_text: "Навучы папугая новаму слову з дапамогай `{add}`.\n### Практыкаванне\nЦі можаш ты дадаць каманду `{add} {to_list}`, каб код запрацаваў?\n"
            5:
                story_text: |
                    Узнагародзь папугая, калі ён скажа правільнае слова!

                    ### Практыкаванне
                    Дапішы код, дадаўшы 4 прапушчаныя каманды.
                example_code: |
                    ```
                    словы {is} чырык, Хэдзі
                    {print} 'Падрэсіруй свайго папугая!'
                    новае_слова {is} {ask} 'Якому слову ты хочаш яго навучыць?'
                    {add} новае_слова {to_list} словы
                    сказанае_слова {is} словы {at} {random}
                    {print} '🧒 Скажы ' новае_слова ', Хэдзі!'
                    {print} '🦜 ' сказанае_слова
                    _ сказанае_слова {is} новае_слова _ '🧒 Малайчына, Хэдзі! 🍪'
                    _ _ '🧒 Не, Хэдзі! Скажы ' новае_слова
                    ```
            4:
                example_code: |
                    ```
                    словы {is} чырык, Хэдзі
                    {print} _ Падрэсіруй свайго папугая! _
                    новае_слова {is} {ask} _ Якому слову ты хочаш яго навучыць? _
                    {add} новае_слова {to_list} словы
                    {print} _ 🧒 Скажы _ новае_слова _, Хэдзі!_
                    {print} _ 🦜 _ словы {at} {random}
                    ```
                story_text: |
                    На гэтым узроўні нам трэба выкарыстоўваць двукоссі з камандамі `{ask}` і `{print}`.
                    ### Практыкаванне
                    Дапішы код, уставіўшы двукоссі ў прабелы.
    while_command:
        name: '{while}'
        description: '{while}'
    turtle:
        name: чарапаха
        default_save_name: Чарапаха
        levels:
            1:
                example_code: "```\n{forward} 100\n{turn} {left}\n```\n"
                example_code_2: "```\n{forward} 20\n{turn} {right}\n{forward} 20\n{turn} {left}\n{forward} 20\n```\n"
                story_text_2: "### Практыкаванне\nГэта пачатак невялікай лесвіцы. Ці можаш ты зрабіць, каб у яе было 5 прыступак?\n"
                story_text: "З дапамогай Hedy можна таксама рысаваць. Камбінуючы павароты і рысы, ты можаш стварыць квадрат або лесвіцу!\n\nВыкарыстоўваючы `{forward}`, ты рысуеш рысу наперад. Лік за гэтым словам вызначае, як далёка пройдзе чарапаха. `{turn} {right}` паварочвае на чвэрць абароту па ходу гадзіннікавай стрэлкі, `{turn} {left}` паварочвае супраць ходу гадзіннікавай стрэлкі.\n\nКаб пайсці назад, скарыстай каманду `{forward}`, але з адмоўным лікам. Напрыклад, `{forward} -100`\n"
            2:
                example_code: "```\n{forward} 80\n{turn} 90\n{forward} 50\n{turn} 180\n{forward} 100\n```\n"
                example_code_2: "```\n{print} Рысаванне фігур\nвугал {is} 90\n{turn} вугал\n{forward} 25\n{turn} вугал\n{forward} 25\n{turn} вугал\n{forward} 25\n```\n"
                story_text: "На першым узроўні чарапаха магла паварочвацца толькі налева або направа. Гэта трохі нудна!\nНа другім узроўні яна можа круціць носам ва ўсе бакі.\n\n90 градусаў — гэта паварот на чвэрць круга, 180 — палова, а поўны круг — гэта 360 градусаў.\n\n### Практыкаванне\nЦяпер гэты код стварае літару T. Ці можаш ты змяніць яго, каб атрымалася літара B?\n\n**Дадаткова** Паспрабуй іншую літару, напрыклад, першую літару свайго імені.\nА таксама можна стварыць некалькі літар, задаўшы паміж імі колер: `{color}` `{white}`.\n"
                story_text_2: "Для чарапахі таксама карысныя пераменныя. Напрыклад, з камандай `turn`.\n\n### Практыкаванне\nЗмяні код так, каб ён стварыў трохвугольнік. Падказка: код трэба змяніць толькі ў адным месцы.\n"
            10:
                example_code: "```\n{color} {black}\n{repeat} 3 {times}\n    {repeat} 3 {times}\n        {forward} 10\n        {turn} 120\n    {color} {white}\n    {forward} 50\n    {color} {black}\n```\n"
            12:
                example_code: "```\n{define} квадрат\n    {repeat} 4 {times}\n        {turn} _\n        {forward} _\n{call} квадрат\n{forward} 50\n{call} квадрат\n{forward} 50\n{call} квадрат\n```\n"
            11:
                example_code: "```\n{turn} 90\nадлегласці = 10, 20, 30, 40, 50, 60\n{for} адлегласць {in} адлегласці\n    {forward} адлегласць\n```\n"
            4:
                example_code: "```\n{print} _ Рысаванне фігур _\nвугал {is} 90\n{turn} вугал\n{forward} 25\n{turn} вугал\n{forward} 25\n```\n"
                example_code_2: |
                    ```
                    {color} {white}
                    {forward} -80
                    {color} {green}
                    {forward} 50
                    {color} {yellow}
                    {forward} 50
                    {color} {red}
                    {forward} 50
                    ```
                story_text: |
                    На 4-м узроўні трэба выкарыстоўваць двукоссі з `{print}` і `{ask}`. Таксама пры рысаванні!
                story_text_2: |
                    А яшчэ можна змяняць колер рысы з дапамогай каманды `{color}`. Глядзі прыклад.
                    Каманду `{color} {white}` можна выкарыстоўваць, каб зрабіць "нябачныя" рысы. З дапамогай гэтых белых рыс ты можаш перамясціць чарапаху ў любое месца на экране, перш чым пачаць рысаваць.
            3:
                example_code: |
                    ```
                    вуглы {is} 10, 50, 90, 150, 250
                    {turn} вуглы {at} {random}
                    {forward} 25
                    ```
                story_text: |
                    На гэтым узроўні паспрабуем ужыць каманду `{at} {random}` да рысавальнай чарапахі. Выпадковы выбар прымушае чарапаху кожны раз ісці па іншым шляху.
                    Скарыстайце `{at} {random}`, каб выбраць значэнне са спіса.
                    ### Практыкаванне
                    Ці можаш ты скапіраваць і ўставіць радкі 2 і 3, каб стварыць даўшэйшы выпадковы шлях?
            5:
                story_text: |
                    На 5-м узроўні з дапамогай каманды `{if}` ты можаш рабіць выбар. Напрыклад, паміж рознымі тыпамі фігур.
                example_code: |
                    ```
                    {print} 'Рысаванне фігур'
                    фігура {is} {ask} 'Што нарысуем: квадрат ці трохвугольнік?'
                    {if} фігура {is} трохвугольнік вугал {is} 120
                    {else} вугал {is} 90
                    {turn} вугал
                    {forward} 25
                    {turn} вугал
                    {forward} 25
                    {turn} вугал
                    {forward} 25
                    {turn} вугал
                    {forward} 25
                    ```
                example_code_2: |
                    ```
                    напрамак {is} {ask} 'Пойдзем налева, направа ці прама?'
                    {if} напрамак {is} налева {turn} _
                    {if} напрамак {is} направа {turn} _
                    {forward} 100
                    ```
                story_text_2: |
                    ### Практыкаванне
                    Увядзі правільныя лічбы ў гэты код, каб ён працаваў.
                    Пасля гэтага можаш паспрабаваць дадаць варыянт "назад".

                    **Дадаткова** Замест выкарыстання "налева" і "направа" перарабі напрамкі на "поўнач", "усход", "поўдзень" і "захад".
                    Такім чынам, можна дадаць яшчэ больш напрамкаў, такіх як "паўночны ўсход", "паўднёва-захад" і г.д.
    sleep_command:
        name: '{sleep}'
        levels:
            2:
                example_code: "```\n{print} Мой любімы колер — ...\n{sleep} 2\n{print} зялёны!\n```\n"
                story_text: "Яшчэ адна новая каманда на гэтым узроўні — `{sleep}`. Яна прыпыняе праграму на секунду. Калі пасля каманды `{sleep}` ты ўвядзеш лік, праграма прыпыніцца на такую ж колькасць секунд.\n\n### Практыкаванне\nПапрактыкуйся з гэтай новай камандай, напісаўшы ўласны код, у якім каманда `{sleep}` будзе ўжывацца прынамсі тры разы. Для кожнай каманды `{sleep}` час прыпынку павінен адрознівацца.\n"
    repeat_command:
        name: '{repeat}'
        description: Каманда {repeat}
    random_command:
        name: '{random}'
        levels:
            3:
                example_code: "```\nжывёлы {is} сабакі, каты, зубры\n{print} жывёлы {at} {random}\n```\n"
                story_text: "## Выбраць выпадковы\nНа гэтым узроўні ты зможаш стварыць спіс, скарыстаўшы каманду `{is}`. Можна дазволіць камп'ютару выбраць выпадковы элемент з гэтага спісу. Гэта робіцца з дапамогай `{at} {random}`.\n"
                example_code_2: "```\nежа {is} сэндвіч, кавалак піцы, салата, бурыта\n{print} Сёння ў мяне на абед ежа {at} {random}.\n```\n"
                story_text_2: "Каманду `{at} {random}` можна ўжываць таксама і ў сказе.\n"
                example_code_3: "```\n{print} Вялікае гульнявое шоу!\n{print} Перад вамі тры куфэркі...\nвыбар {is} {ask} Які куфэрак вы выбіраеце?\nпрызы {is} _\n_\n```\n"
                story_text_3: "### Практыкаванне\nПаспрабуй каманду `{at} {random}`, стварыўшы ўласнае гульнявое шоу (як па тэлебачанні), дзе гулец выбірае дзверы або куфэрак, у якім ляжыць вялікі прыз!\nЗможаш такое зрабіць? Мы ўжо ўставілі першыя радкі ў прыклад кода.\n"
    print_command:
        name: '{print}'
        levels:
            1:
                example_code_2: "```\n_ Здароў!\n```\n"
                story_text: "## Каманда {print}\nЗ дапамогай каманды `{print}` можна вывесці тэкст на экран.\n"
                example_code: "```\n{print} Здароўценькі, праграміст!\n{print} Вітаем у Hedy!\n```\n"
                story_text_2: "### Практыкаванне\nУ Hedy ты знойдзеш практыкаванні для кожнай прыгоды. Практыкаванні дапамагаюць лепш засвоіць новыя каманды і паняцці, а таксама даюць магчымасць крыху дапрацаваць прыклады кода па-свойму.\nУ гэтым практыкаванні ты ўбачыш ружовае пустое месца. Трэба запоўніць яго чым-небудзь, каб код можна было выканаць.\n\nУвядзі ў пустое месца каманду `{print}`, а затым дадай яшчэ пяць радкоў кода. Кожны радок павінен пачынацца з каманды `{print}`.\nВесяліся!\n"
    ask_command:
        name: '{ask}'
        description: Знаёмства з камандай {ask}
        levels:
            1:
                story_text: "## Каманда `{ask}`\nЦяпер, калі ты ўмееш выкарыстоўваць каманду `{print}`, самы час вывучыць наступную каманду: `{ask}`. З дапамогай каманды `{ask}` можна задаць пытанне. Паспрабуй:\n"
                example_code: "```\n{print} Вітанкі!\n{ask} Як цябе завуць?\n```\n"
                example_code_2: "```\n{print} Вітанкі!\n{ask} Як цябе завуць?\n{echo} Вітаю,\n```\n"
                example_code_3: "```\n_ Як маешся?\n_\n```\n"
                story_text_2: "## Каманда `{echo}`\nКалі ты хочаш, каб камп'ютар паўтарыў табе адказ, можаш скарыстаць каманду `{echo}`. Адказ будзе паўтораны ў канцы сказа, у гэтым прыкладзе пасля \"Вітаю,\".\n"
                story_text_3: "### Практыкаванне\nПаспрабуй каманды `{ask}` і `{echo}`. Спачатку запоўні прабелы, каб праграма працавала.\nЗатым задай яшчэ 2 пытанні з дапамогай каманды `{ask}`, пасля кожнага `{ask}` выкарыстоўвай `{echo}`, каб вывесці адказ на экран.\n"
            2:
                example_code_2: "```\nлюбімая_жывёла {is} {ask} Якая твая любімая жывёла?\n{print} Мне падабаецца любімая_жывёла\n```\n"
                example_code: "```\nімя {is} {ask} Як цябе завуць?\n{print} Вітаю, імя\nвек {is} {ask} Колькі табе гадоў?\n{print} імя мае век гады(-оў).\n```\n"
                story_text: "## Каманда `{ask}`\nЦяпер, калі мы ўмеем ужываць у кодзе **пераменныя**, нам больш не патрэбна каманда `{echo}`.\nЗ дапамогай пераменных можна захоўваць адказы на пытанні, і такім чынам выкарыстоўваць у кодзе адказы на некалькі пытанняў.\nПаглядзі:\n\nВось так код становіцца інтэрактыўным!\n"
                story_text_2: "### Практыкаванне\nУ папярэдняй прыгодзе мы практыкаваліся ў задаванні пераменных, выкарыстоўваючы каманду `{is}`.\nТы стварыў(-ла) не менш за тры пераменныя і выкарыстаў(-ла) іх з дапамогай каманды `{print}`.\nЦяпер замест таго, каб проста задаваць пераменныя, паспрабуй зрабіць іх інтэрактыўнымі, як у прыкладзе.\n\nСкапіруй код з папярэдняй прыгоды і зрабі пераменныя інтэрактыўнымі з дапамогай каманд `{ask}`.\n"
            13:
                example_code: |
                    ```
                    {print}('Мяне завуць Хэдзі!')
                    імя = {input}('Як цябе завуць?')
                    {print}('Значыць, тваё імя — ', імя)
                    ```
    calculator:
        name: калькулятар
        default_save_name: Калькулятар
        description: Ствары калькулятар
        levels:
            7:
                story_text: "Цяпер, калі ты ўжо ўмееш лічыць, ты можаш самастойна зрабіць калькулятар!\n"
    quotation_marks:
        name: "'двукоссі'"
        default_save_name: двукоссі
        description: Знаёмства з двукоссямі
        levels:
            4:
                example_code: |
                    ```
                    {print} 'З гэтага часу трэба выкарыстоўваць двукоссі!'
                    адказ {is} {ask} 'Што нам трэба выкарыстоўваць з гэтага часу?'
                    {print} 'Трэба выкарыстоўваць ' адказ
                    ```
                story_text: |
                    ## 'Двукоссі'
                    На ўзроўні 4 змяняюцца каманды `{ask}` і `{print}`.
                    Тэкст, які ты хочаш надрукаваць, трэба ўзяць у двукоссі.
                    Гэта карысна, бо цяпер ты можаш надрукаваць усе словы, якія хочаш. Нават тыя словы, якія выкарыстоўваліся для захоўвання чагосьці з дапамогай `{is}`.
                    У большасці моў праграмавання пры вывадзе тэксту на экран таксама выкарыстоўваюцца двукоссі. Таму мы становімся яшчэ на крок бліжэй да сапраўднага праграмавання!
                example_code_2: |
                    ```
                    _ Гэта няправільны спосаб выкарыстання апострафа _
                    {print} 'Ля пад'езда з'явілася аб'ява'
                    {print} 'З заапарка збег раз'юшаны леў'
                    _ Вось як гэта вырашаецца _
                    {print} "Ля пад'езда з'явілася аб'ява"
                    {print} "З заапарка збег раз'юшаны леў"
                    ```
                story_text_2: |
                    ## Апострафы (скарачэнні)
                    Важна! Май на ўвазе, што зараз, калі мы карыстаемся двукоссямі, Hedy збянтэжыцца, калі ты будзеш ужываць словы з апострафам. Напрыклад, "пад'езд" або "раз'юшаны" (У англійскай мове гэта тычыцца такіх скарачэнняў, як "I'm" або "What's").
                    Калі ў радку сустракаецца апостраф, абавязкова выкарыстоўвай падвойныя двукоссі!
                    Вось прыклад з няправільным спосабам выкарыстання апострафа.
    repeat_command_2:
        name: '{repeat} 2'
    restaurant:
        name: рэстаран
        default_save_name: Рэстаран
        description: Ствары ўласны віртуальны рэстаран
        levels:
            1:
                story_text: "На першым узроўні ты можаш стварыць уласны віртуальны рэстаран і прымаць заказы ад гасцей.\n"
                example_code_2: "```\n{print} Вітаем у рэстаране Hedy's 🍟\n_ Што б вы хацелі заказаць?\n{echo} Такім чынам, вы хочаце заказаць\n{print} Дзякуй за заказ!\n{print} Ужо працуем над ім!\n```\n"
                story_text_2: "### Практыкаванне\nСкапіруй прыклад кода ў поле ўводу, націснуўшы жоўтую кнопку.\nСпачатку запоўні прабел правільнай камандай, каб код працаваў належным чынам.\nЗатым дадай яшчэ як мінімум 4 радкі кода ў праграму рэстарана.\nСпытай у кліента, што ён будзе піць, і ці хоча ён заплаціць наяўнымі або карткай.\nНарэшце, прыдумай, як ветліва развітацца з кліентам.\n"
            2:
                example_code: "```\n{print} Вітаем у рэстаране Hedy's!\n{print} Сёння мы падаём піцу або лазанью.\nстрава {is} {ask} Што б вы хацелі з'есці?\n{print} Выдатны выбар! страва сёння — язык праглынеш!\nначынка {is} {ask} Што вам больш даспадобы ў якасці начынкі: мяса ці гародніна?\n{print} страва і начынка ужо гатуюцца!\n```\n"
                story_text: "На другім узроўні ты можаш пашырыць рэстаран з дапамогай пераменных. На першым узроўні Хедзі магла толькі адзін раз `{echo}` заказ і запомніць толькі апошняе, што было заказана.\nЦяпер ты можаш выкарыстоўваць пераменныя, і Хедзі можа запомніць як страву, так і начынку!\n"
                story_text_2: "### Практыкаванне\nСкапіруй свой код рэстарана з папярэдняга ўзроўню ў поле ўводу ніжэй.\nПапраў код, замяніўшы каманды `{ask}` і `{echo}` і выкарыстоўваючы пераменныя, як мы навучыліся на гэтым узроўні.\n\nЦяпер, калі код зноў працуе, прыйшоў час дадаць штосьці яшчэ.\nПаглядзі на апошні радок прыкладу: `{print} страва і начынка ужо гатуюцца!`\nУ гэтым адным радку былі выкарыстаны 2 пераменныя, каб падсумаваць заказ.\nЦяпер дадай уласнае падсумаванне страў і напояў, заказаных кліентам.\n\n**Дадаткова** Цяпер, калі ты ўмееш выкарыстоўваць пераменныя, ты можаш ужываць столькі пераменных у адным радку, колькі захочаш. Ці можаш ты дадаць больш пераменных у код, напрыклад, есці на месцы або браць на вынас, наяўныя або картка, з трубачкай або без і г.д.?\n"
            3:
                example_code: "```\nстравы {is} спагецці, брусельская капуста, гамбургеры\n{print} Сёння ў вас на вячэру стравы {at} {random}!\nцэны {is} 1 талер, 10 талераў, 100 талераў\n{print} З вас цэны {at} {random}.\n```\n"
                example_code_2: "```\n{print} Вітаем у вашым уласным выпадковым рэстаране!\nзакускі {is} _\nасноўныя {is} _\nдэсерты {is} _\nнапоі {is} _\nцэны {is} _\n_\n```\n"
                story_text: "Цяжка вырашыць, што з'есці на вячэру? Хай Хэдзі выбера за цябе!\nПроста дадай спісы сваіх любімых (ці нелюбімых) страў, а Хэдзі выпадковым чынам вызначыцца з тваёй вячэрай.\nМожна таксама крыху павесяліцца, дазволіўшы Хэдзі выбраць яшчэ і цану на вячэру! Што атрымаецца?\n"
                story_text_2: "### Практыкаванне\nА зараз ствары ўласную версію выпадковага рэстарана.\nСамастойна складзі спіс закусак, асноўных страў, дэсертаў, напояў і цэн.\nЗатым з дапамогай каманд `{print}` і `{at} {random}` паведамі кліенту, што сёння будзе ў ягоным меню.\n"
            4:
                example_code: |
                    ```
                    _ Дадай у код двукоссі _
                    {print} Вітаем у рэстаране Chez Hedy!
                    {print} Сёння мы падаём піцу або лазанью.
                    страва {is} {ask} Што б вы хацелі з'есці?
                    {print} Выдатны выбар! страва  сёння — язык праглынеш!
                    начынка {is} {ask} Што вам больш даспадобы ў якасці начынкі: мяса ці гародніна?
                    {print} страва  і  начынка   ужо гатуюцца!
                    напой {is} {ask} Які напой падаць да гэтага?
                    {print} Дзякуй за заказ.
                    {print} страва  і  напой  неўзабаве будуць гатовы!
                    ```
                story_text: |
                    Пры выкарыстанні каманды `{print}` або `{ask}` у рэстаране таксама трэба ўжываць двукоссі.

                    ### Практыкаванне
                    Дадай двукоссі ў гэты код, каб ён працаваў! Увага: перыменныя павінны быць па-за двукоссямі.
                    Затым скарыстайся камандай `{clear}`, каб паказваць на экране вываду толькі адзін радок.

                    ### Практыкаванне 2
                    Вярніся на папярэдні ўзровень, скапіруй код рэстарана ды зрабі, каб код працаваў на гэтым узроўні, дадаўшы ў патрэбныя месцы двукоссі, а таксама колькі каманд `{clear}`.
            6:
                example_code: |
                    ```
                    напоі_ў_продажы {is} вада, ліманад, кола, апельсінавы сок
                    напой {is} {ask} 'Што б вы хацелі выпіць?'
                    {if} напой {in} напоі_ў_продажы
                    {print} напой ' хутка будзе!'
                    {else}
                    {print} 'Прабачце, мы гэтага не прадаём'
                    ```
                story_text: |
                    ### Практыкаванне
                    У прыкладзе паказана, як можна запраграмаваць сітуацыю, калі ў рэстаране заканчваецца нешта з меню.
                    Скапіруй свой код рэстарана з папярэдніх узроўняў. Ствары ў рэстаране праблему і вырашы яе, як ў прыкладзе.
                    Напрыклад, у цябе таксама можа скончыцца нейкая пазіцыя з меню, або ты не прымаеш крэдытныя карты, або зламалася машына для марозіва.

                    **Дадаткова** Атрымалася запраграмаваць праблему і адпаведныя адказы? Тады паспрабуй дадаць больш каманд `{if}` і `{else}`.
                    Паспрабуй дадаць `{if}` пасля кожнай каманды `{ask}`, каб зрабіць код максімальна інтэрактыўным!
    rock:
        name: камень, нажніцы, папера
        levels:
            1:
                story_text: "На першым узроўні ты можаш пачаць ствараць гульню \"камень, нажніцы, папера\".\n\nЗ дапамогай каманды `{ask}` можна зрабіць выбар, а з дапамогай `{echo}` — паўтарыць гэты выбар.\n"
                story_text_2: "### Практыкаванне\nЗамест слоў можна выкарыстоўваць эмодзі: ✊✋✌\nЦі зможаш ты стварыць код з дапамогай эмодзі?\n"
                example_code: "```\n{print} Што ты выбіраеш?\n{ask} Выберы паміж каменем, паперай ды нажніцамі\n{echo} Твой выбар:\n```\n"
                example_code_2: "```\n{print} Што ты выбіраеш?\n{ask} Выберы паміж _\n{echo} Твой выбар:\n```\n"
            2:
                example_code: "```\nвыбар {is} камень\n{print} Я выбіраю _\n```"
                story_text: "На гэтым узроўні мы з табой папрактыкуемся ў выкарыстанні пераменных, каб на наступным узроўні зрабіць гульню \"камень, нажніцы, папера\"!\n### Практыкаванне\nЗавяршы код, запоўніўшы пустое поле **пераменнай**.\nГэтая гульня не вельмі інтэрактыўная, але не хвалюйся! У наступнай прыгодзе ты даведаешся, як выкарыстоўваць пераменныя разам з камандай `{ask}`, каб зрабіць гульню інтэрактыўнай!\n"
            4:
                example_code: "```\nварыянты {is} камень, нажніцы, папера\n{print} _Камп'ютар выбірае..._ варыянты {at} {random}\n```\n"
                story_text: |
                    На гэтым узроўні мы можам далей праграмаваць камень, нажніцы, паперу. Але калі ты хочаш дадаць тэкст, памятай пра двукоссі.
                    ### Практыкаванне
                    Запоўні прабелы двукоссямі. Звярні ўвагу, што пераменная `варыянты` павінна быць па-за двукоссямі.
            3:
                example_code_2: "```\nварыянты {is} камень, нажніцы, папера\nгулец_1 {is} {ask} Імя гульца 1:\n_\n```\n"
                example_code: "```\nварыянты {is} камень, нажніцы, папера\n{print} варыянты _\n```\n"
                story_text_2: "**Дадаткова** Зрабі гульню для дваіх гульцоў. Спачатку папрасі абаіх гульцоў увесці свае імёны. Затым хай камп'ютар выпадковым чынам зробіць за іх выбар.\n"
            5:
                example_code: |
                    ```
                    варыянты {is} камень, нажніцы, папера
                    выбар_камп {is} _
                    выбар {is} _
                    {print} 'ты выбіраеш ' _
                    {print} "камп'ютар выбірае " _
                    {if} _ {is} _ {print} 'нічыя!' {else} {print} 'нічыёй няма'
                    ```

                    Увядзі правільны код у пропускі, каб убачыць, ці адбыласа нічыя.
                story_text: |
                    На гэтым узроўні мы можам вызначыць, ці адбылася нічыя. Для гэтага нам спатрэбіцца наша новая каманда `{if}`.

                    ### Практыкаванне
                    Завяршы код, запоўніўшы пропускі:
                    * Хай камп'ютар выбера выпадковы варыянт
                    * Спытай ў гульца, што хоча выбраць ён
                    * Упішы правільныя пераменныя ў радкі 4 і 5
                    * Завяршы радок 6, дзе Hedy будзе правяраць, ці адбылася нічыя.
    haunted:
        levels:
            1:
                story_text: "У гэтай прыгодзе ты будзеш працаваць над стварэннем гульні, у якой табе давядзецца ўцячы з дома з прывідамі, выбраўшы правільныя дзверы.\nКалі ты выбераш правільныя дзверы, то выжывеш, але калі не, то жудасная пачвара можа...\n\nНа першым узроўні мы пачынаем гульню ў дом з прывідамі з таго, што прыдумляем страшную гісторыю. Спытаемся ў гульца, якую пачвару ён убачыць у доме з прывідамі.\n"
                story_text_2: "### Практыкаванне\nСкапіруй прыклад у поле ўводу з дапамогай жоўтай кнопкі.\nЦяпер скончы гісторыю, дадаўшы прынамсі 5 радкоў кода.\nНе забудзься пачынаць кожны радок кода з каманды `{print}`.\n"
                example_code: "```\n{print} Дзе я?\n{print} Памятаю, як мой сябар сказаў мне зайсці ў стары асабняк...\n{print} і раптам усё пацямнела.\n{print} Але чаму я ляжу на падлозе...?\n{print} Галава баліць, быццам мяне ўдарылі бейсбольнай бітай!\n{print} Што гэта за гук?\n{print} О не! Здаецца, у гэтым доме ёсць яшчэ нехта!\n{print} Трэба выбірацца адсюль!\n{print} Перада мной трое дзвярэй..\n{ask} Якія дзверы мне выбраць?\n{echo} Я выбіраю дзверы\n{print} ...?\n```\n"
            2:
                story_text: "На гэтым узроўні дома з прывідамі ты можаш выбіраць пачвар з дапамогай эмодзі. Вядома, па-ранейшаму можна выкарыстоўваць словы.\n"
                story_text_2: "### Практыкаванне\nУ прыведзеным вышэй прыкладзе пачвары вызначаны загадзя. Такім чынам, кожны раз, калі ты запускаеш код, вынік аднолькавы.\nЦі можаш ты дадаць каманды `{ask}`, каб зрабіць дом з прывідамі інтэрактыўным і дазволіць гульцам выбіраць пачвар, якіх яны сустрэнуць?\n"
                example_code: "```\nпачвара_1 {is} 👻\nпачвара_2 {is} 🤡\nпачвара_3 {is} 👶\n{print} Ты заходзіш у дом з прывідамі.\n{print} Раптам перад табой паўстае пачвара_1\n{print} Ты бяжыш у іншы пакой...\n{print} Але там цябе ўжо чакае пачвара_2!\n{print} О, не! Хутчэй на кухню.\n{print} Але як толькі ты ўваходзіш, пачвара_3 нападае на цябе!\n```\n"
                example_code_2: "```\nпачвара_1 {is} _\nпачвара_2 {is} _\nпачвара_3 {is} _\n{print} Ты заходзіш у дом з прывідамі.\n{print} Раптам перад табой паўстае пачвара_1\n{print} Ты бяжыш у іншы пакой...\n{print} Але там цябе ўжо чакае пачвара_2!\n{print} О, не! Хутчэй на кухню.\n{print} Але як толькі ты ўваходзіш, пачвара_3 нападае на цябе!\n```\n"
            3:
                example_code: "```\n_ Уцёкі з дома з прывідамі!\n_ Перад табой трое дзвярэй...\n_ _ _ Якія дзверы ты выбіраеш?\n_ Твой выбар — дзверы ... выбар\nпачвары _ зомбі, вампір, НІКОГА ТЫ НА ВОЛІ\n_ Ты бачыш...\n{sleep}\n_ _ _ _\n```\n"
                story_text: |
                    На папярэдніх узроўнях мы стварылі ўводзіны ў гульню пра дом з прывідамі, але гісторыя заўсёды мела жахлівы канец.
                    На гэтым узроўні ты можаш зрабіць гісторыю больш інтэрактыўнай, змяніўшы вынік гульні; часам гульца будуць з'ядаць, а часам ён зможа уцячы!
                    Хай Hedy вырашае выпадковым чынам!

                    ### Практыкаванне
                    Скапіруй прыклад і запоўні прабелы, каб код запрацаваў!

                    **Дадаткова** Гэтая гісторыя даволі простая, можа ў цябе атрымаецца зрабіць так, каб яна прымушала хвалявацца і кідала ў дрыжыкі.
                    Акрамя таго, у ёй зараз вельмі абмежаваныя вынікі, ёсць толькі 3 варыянты таго, што знаходзіцца за дзвярыма. Прыдумай больш пачвар і дадай іх у спіс!
            4:
                example_code: |
                    ```
                    _ Дадай у код двукоссі _
                    {print} Уцёкі з дома з прывідамі!
                    {print} Перад табой трое дзвярэй...
                    выбар {is} {ask} Якія дзверы ты выбіраеш?
                    {print} Твой выбар — дзверы ... выбар
                    пачвары {is} зомбі, вампір, НІКОГА ТЫ НА ВОЛІ
                    {print} За дзвярыма...
                    {sleep}
                    {print} пачвары {at} {random}
                     ```
                story_text: |
                    На гэтым узроўні ты навучышся выкарыстоўваць двукоссі ў гульнях.

                    ### Практыкаванне
                    Ці можаш ты зрабіць, каб дом з прывідамі адпавядаў правілам 4-га ўзроўню?

                    ### Практыкаванне 2
                    Вярніся на папярэдні ўзровень, скапіруй код дома з прывідамі ды зрабі так, каб код працаваў на гэтым узроўні, дадаўшы двукоссі ў патрэбных месцах.
            5:
                example_code: |
                    ```
                    {print} 'Уцёкі з дома з прывідамі!'
                    {print} 'Перад табой трое дзвярэй...'
                    дзверы {is} 1, 2, 3
                    пачвары {is} ваўкалак, мумія, вампір, зомбі
                    выбраныя {is} {ask} 'Якія дзверы ты выбіраеш?'
                    {print} 'Твой выбар — дзверы...' выбраныя
                    {sleep}
                    правільныя {is} дзверы {at} {random}
                    _ _ _ _ {print} 'Выдатна! Ты ўцякаеш!'
                    {else} {print} 'О, не! Цябе з'ядае...' пачвары {at} {random}
                    ```
                story_text: |
                    Да гэтага ўзроўню гульня "Дом з прывідамі" заўсёды прасіла гульца выбраць дзверы, але, як можна было заўважыць, насамрэч яму не абавязкова трэба было адказваць правільна.
                    Калі гулец даваў зусім выпадковы адказ, гульня ўсё адно працавала, і гулец мог нават выйграць (нягледзячы на тое, што не выбраў дзверы).
                    На гэтым узроўні ты можаш выйграць, толькі выбраўшы тыя ж дзверы, якія выпадкова выбрала Hedy.

                    ### Практыкаванне
                    Ці зможаш ты знайсці 4 прапушчаныя словы, каб завяршыць код?
        name: дом з прывідамі
        default_save_name: Дом з прывідамі
        description: Уцёкі з дома з прывідамі
    turtle_draw_it:
        name: нарысуй!
        levels:
            1:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\n<div class=\"w-full flex flex-row gap-2\">\n    Прамавугольнік <img src=\"https://github.com/hedyorg/hedy/assets/80678586/77aa99d5-cd8f-4969-b49d-e8fed34ac550\" width=\"100\">\n    Квадрат <img src=\"https://github.com/hedyorg/hedy/assets/80678586/03b96c2c-7b94-4032-9f9f-3f3b13573623\" width=\"200\">\n    Лесвіца <img src=\"https://github.com/hedyorg/hedy/assets/80678586/d4301e62-ec66-4031-827c-7d21f73ba106\" width=\"200\">\n</div>\n"
            2:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\n<div class=\"w-full flex flex-row gap-2\">\nТрохвугольнік <img src=\"https://github.com/hedyorg/hedy/assets/80678586/e974b62c-f0cf-445a-8bd4-5ad9f1f71204\" width=\"100\">\nСтрэлка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/803d8f42-9708-448c-82ea-d035697f08c9\" width=\"150\">\nКараблік <img src=\"https://github.com/hedyorg/hedy/assets/80678586/94ef7189-442a-4c8f-827d-12a69203c2e9\" width=\"150\">\n</div>\n"
            3:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\n<div class=\"w-full flex flex-row gap-2\">\nТрохвугольнік <img src=\"https://github.com/hedyorg/hedy/assets/80678586/71e04d98-9545-4614-9caf-a5f179b756a1\" width=\"150\">\nЗорка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/421c4d28-cb99-424b-be26-dcae30d65c80\" width=\"150\">\nСтрэлка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3cbebcae-5258-47c5-a6ac-e7ee36c1d1ce\" width=\"200\">\n</div>\n"
            4:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\n<div class=\"w-full flex flex-row gap-2\">\nКаляровая зорка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/dbe39006-c050-4833-b5c4-f9d1fb1c0781\" width=\"150\">\nВясёлка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/2728b10f-9f7f-45ea-964e-5b284033e4f0\" width=\"500\">\nУкладзеныя квадраты <img src=\"https://github.com/hedyorg/hedy/assets/80678586/f013f9fa-bc68-4c60-b778-2c457799d6f7\" width=\"200\">\n</div>\n"
                example_code: |
                    **Дадаткова** Як наконт сапраўднага выкліку? Зрабі так, каб колеры гэтых фігур выбіраліся выпадковым чынам. Тады пры кожным запуску праграмы яны будуць выглядаць па-рознаму!

                    ```
                    колеры {is} {red}, {orange}, {yellow}, {green}, {blue}, {purple}, {pink}, {brown}, {gray}, {black}
                    {color} _
                    ```
            5:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\n**Дадаткова** Ствары толькі адзін код, які дазволіць гульцу вырашыць, якую літару ён хоча бачыць! А можаш дадаць яшчэ больш літар?\n\n<div class=\"w-full flex flex-row gap-2\">\nF <img src=\"https://github.com/hedyorg/hedy/assets/80678586/8a021b76-c24b-4e7c-b960-48d57f3bcb20\" width=\"100\">\nE <img src=\"https://github.com/hedyorg/hedy/assets/80678586/12821803-6422-416a-8e36-9902d14e57a4\" width=\"100\">\nL <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3af6f919-7b67-4ee7-b923-11e56f2b6b24\" width=\"100\">\n</div>\n"
                example_code: |
                    Падказка:
                    ```
                    выбраная_літара {is} {ask} 'Якую літару ты хочаш убачыць? F, E ці L?'
                    {if} _
                    ```
            7:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\n**Дадаткова** Хай гулец вырашыць, якога колеру павінен быць квадрат.\n\n***Дадаткова*** Можаш таксама зрабіць першую літару свайго імені і сцяг сваёй краіны?\n\n<div class=\"w-full flex flex-row gap-2\">\nКвадрат <img src=\"https://github.com/hedyorg/hedy/assets/80678586/03b96c2c-7b94-4032-9f9f-3f3b13573623\" width=\"150\">\nЛітары <img src=\"https://github.com/hedyorg/hedy/assets/80678586/e75f4fa5-f1f5-4b48-806c-916c28e4e8ad\" width=\"100\">\nСцяг <img src=\"https://github.com/hedyorg/hedy/assets/80678586/877fc337-df80-4185-8005-a6c28904f66e\" width=\"300\">\n</div>\n"
            8:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\n<div class=\"w-full flex flex-row gap-2\">\nШасцікутнік <img src=\"https://github.com/hedyorg/hedy/assets/80678586/92e492e1-1593-489b-aaf0-51d2a29755f4\" width=\"200\">\nТрохвугольнік <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3629a5e6-1f02-4851-aab9-c5430ba4a1f1\" width=\"200\">\nВеер <img src=\"https://github.com/hedyorg/hedy/assets/80678586/1ba2ff71-1230-4fe3-8255-b2c504cf1b4e\" width=\"200\">\n</div>\n"
            9:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\n**Дадаткова** Лічба ў дужках паказвае, у колькіх радках кода можна нарысаваць гэтую фігуру. Ці можаш ты зрабіць гэта за такую ж колькасць радкоў?\n\n<div class=\"w-full flex flex-row gap-2\">\nКвадрат (3) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/03b96c2c-7b94-4032-9f9f-3f3b13573623\" width=\"200\">\nВыпадкова афарбаваная зорка (5) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/dbe39006-c050-4833-b5c4-f9d1fb1c0781\" width=\"150\">\nВыпадкова афарбаваная спіраль (7) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/9bcdb3f1-367d-4ae0-878f-d09005424a35\" width=\"150\">\n</div>\n"
            10:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\n**Дадаткова** Лічба ў дужках паказвае, у колькіх радках кода можна нарысаваць гэтую фігуру. Ці можаш ты зрабіць гэта за такую ж колькасць радкоў?\n\n**Дадаткова** Дай гульцу выбар, сцяг якой краіны ён хацеў бы бачыць.\n\n<div class=\"w-full flex flex-row gap-2\">\nКрыж (7) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/76e42c76-aa3f-4863-8eee-ead73c09a186\" width=\"150\">\nВыпадкова афарбаваныя ўкладзеныя квадраты (8) <img src=\"https://github.com/hedyorg/hedy/assets/80678586/17f878cc-e893-4c10-b32e-a09a50bf08de\" width=\"200\">\nСцягі <img src=\"https://github.com/hedyorg/hedy/assets/80678586/877fc337-df80-4185-8005-a6c28904f66e\" width=\"300\">\n</div>\n"
            11:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\n<div class=\"w-full flex flex-row gap-2\">\nУкладзеныя шасцікутнікі <img src=\"https://github.com/hedyorg/hedy/assets/80678586/3629e908-3cd5-44ac-bbcd-1f1cceb15654\" width=\"150\">\nСвятлафор <img src=\"https://github.com/hedyorg/hedy/assets/80678586/edbbb608-5ff8-4349-85a6-e47809adde43\" width=\"100\">\n</div>\n"
            12:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\nСпачатку трэба вызначыць функцыю **для кожнай формы**, якую ты хочаш выкарыстоўваць для бранзалета. Потым дадавай формы да бранзалета наступным чынам:\n\nПраграма па дызайне бранзалетаў <img src=\"https://github.com/hedyorg/hedy/assets/80678586/549d7f3a-c492-4b4a-b173-746eb3400951\" width=\"500\">\n"
            16:
                story_text: "### Практыкаванне\nУзнаві рысункі з дапамогай чарапахі!\n\nСпіраль <img src=\"https://github.com/hedyorg/hedy/assets/80678586/6943223c-018b-435b-a391-23723cc7a6ad\" width=\"150\">\n"
                story_text_2: "Веер <img src=\"https://github.com/hedyorg/hedy/assets/80678586/cb671065-b47b-49f0-b298-dcbcd2a5e28f\" width=\"150\">\n"
                example_code_2: "Веер\n```\n{define} нарысаваць_квадрат(бок)\n_\n\nі = 100\n{while} і > 1\n    _(і)\n    _\n    і = і - 3\n```\n"
                story_text_3: "Зорка <img src=\"https://github.com/hedyorg/hedy/assets/80678586/17564e0a-63e1-4794-8d41-15ac8c1a5a93\" width=\"150\">\n"
    fortune:
        name: варажбітка
        default_save_name: Варажбітка
        levels:
            1:
                example_code: "```\n_ Вітаю, я Хэдзі, варажбітка!\n_ Хто ты?\n_ Зараз я зірну ў свой крыштальны шар\n_ Я бачу... Я бачу...\n_ Цябе завуць\n```\n"
                story_text: "Калі-небудзь на карнавале варажбітка прадказвала табе будучыню? Або можа табе даводзілася калі-небудзь гуляць з чароўным шарам-васьмёркай?\nТады ты, напэўна, ведаеш, што яны не могуць напраўду прадказваць будучыню, але гуляць усё адно весела!\n\nНа наступных узроўнях ты зможаш навучыцца ствараць уласную машыну для варажбы!\nНа першым узроўні можна пачаць з простага: няхай Хэдзі скажа, што яна варажбітка, і дазволь ёй `{echo}` адказы гульцоў.\nВось так:\n"
                story_text_2: "### Практыкаванне\nСкапіруй прыклад кода ў поле ўводу і запоўні прабелы, каб код працаваў.\n**Дадаткова** Змяні код і зрабі так, каб варажбітка прадказвала не толькі тваё імя, але і ўзрост, любімую спартыўную каманду ці штосьці яшчэ пра цябе.\n"
            3:
                example_code: "```\n{print} Вітаю, я Хэдзі, варажбітка!\nпытанне {is} {ask} Што ты хочаш ведаць?\n{print} Ты хочаш ведаць: пытанне\nадказы {is} так, не, магчыма\n{print} Мой крыштальны шар кажа...\n{sleep} 2\n{print} адказы {at} {random}\n```\n"
                story_text: "На папярэдніх узроўнях мы стварылі першую варажбітку, але Хэдзі не магла нічога прадказаць, толькі `{echo}`.\nНа гэтым узроўні з дапамогай пераменнай і каманды `{at} {random}` ты можаш зрабіць, каб Хэдзі сапраўды выбрала адказ. Паглядзі, напрыклад, гэты код:\n"
                story_text_2: "### Практыкаванне\nЦяпер Хэдзі можа адказаць толькі \"так\", \"не\" або \"магчыма\". Ці можаш ты даць Хэдзі больш варыянтаў адказу, напрыклад, \"безумоўна\" або \"спытай яшчэ раз\"?\n"
            4:
                example_code: |
                    ```
                    _ Дадай у код двукоссі _
                    {print} Вітаю, я Хэдзі, варажбітка!
                    пытанне {is} {ask} Што ты хочаш ведаць?
                    {print} Тваё пытанне:  пытанне
                    адказы {is} так, не, магчыма
                    {print} Мой крыштальны шар кажа...
                    {sleep} 2
                    {print} адказы {at} {random}
                    ```
                story_text: |
                    ### Практыкаванне
                    Мы выдалілі ўсе двукоссі з гэтага прыкладу. Ці можаш ты вярнуць іх ва ўсіх патрэбных месцах?

                    ### Практыкаванне 2
                    Вярніся на папярэдні ўзровень, скапіруй код варажбіткі ды зрабі так, каб код працаваў на гэтым узроўні, дадаўшы двукоссі ў патрэбныя месцы.
            9:
                example_code: |
                    ```
                    {print} 'Вітаю, я Хэдзі, варажбітка!'
                    {print} 'Ты можаш задаць мне тры патанні.
                    адказы = так, не, магчыма
                    _ _ _
                       пытанне = {ask} 'Што ты хочаш ведаць?'
                       {print} пытанне
                       {sleep}
                       {print} 'Мой крыштальны шар кажа... ' адказы {at} {random}
                    ```
            6:
                example_code: |
                    ```
                    сябры {is} Ігнат, Зося, Зміцер
                    {print} 'Я магу прадказаць, ці выйграеш ты заўтра ў латарэю!'
                    чалавек {is} {ask} 'Хто ты?'
                    добры_адказ {is} Ура! Перамога!, Ты абавязкова выйграеш!, У нас ёсць пераможца!
                    дрэнны_адказ {is} Няўдача! Паспрабуй іншым разам!, Выйграе іншы чалавек, Ты прайграеш!
                    {if} чалавек {in} сябры
                    {print} добры_адказ {at} {random}
                    {else}
                    {print} дрэнны_адказ {at} {random}
                    ```
                story_text: |
                    ### Практыкаванне
                    Прыклад паказвае, як стварыць праграму-варажбітку, якая дазваляе табе схіляць шанцы на тваю карысць. Гэтая праграма-падман заўсёды кажа вам, што вы выйграеце ў латарэю, але вашы сябры ніколі не выйграюць.

                    Выкарыстоўвайце гэта, каб стварыць сваю ўласную праграму, праявіце крэатыўнасць! Напрыклад, вы можаце стварыць код, які прадказвае, што:
                    * ваша любімая спартыўная каманда пераможа ўсіх канкурэнтаў!
                    * ваш любімы фільм будзе абраны для кінавечара!
                    * вы выйграеце квіткі на сваё любімае шоу!
                    * вы самы прыгожы з усіх, як чароўнае люстэрка Беласнежкі.
                    Хай ваша фантазія зробіць працу!

                    Ваша праграма павінна складацца прынамсі з 10 радкоў кода і мець як мінімум адну каманду `{if}` і `{else}`.
    debugging:
        name: адладка
        default_save_name: адладка
        description: прыгода адладкі
        levels:
            1:
                story_text: "Вітаем у прыгодзе адладкі. Адладка кода азначае пазбаўленне ад памылак у кодзе.\nГэта значыць, што ў гэтых прыгодах мы пакажам табе код, які яшчэ не працуе.\nТабе трэба будзе высветліць, што не так, і выправіць памылкі.\n\n### Практыкаванне\nАдладзь гэты код. Поспехаў!"
                example_code: "**Увага! Гэты код патрабуе адладкі!**\n```\n{print} Я люблю праграмаваць\nТы таксама любіш праграмаваць?\n{echo}\n{print} Якія твае любімыя заняткі?\n{echo} Твае любімыя заняткі:\n```\n"
            2:
                story_text: "Вітаем у прыгодзе адладкі. Адладка кода азначае пазбаўленне ад памылак у кодзе.\nГэта значыць, што ў гэтых прыгодах мы пакажам табе код, які яшчэ не працуе.\nТабе трэба будзе высветліць, што не так, і выправіць памылкі.\n\n### Практыкаванне\nАдладзь гэты код. Поспехаў!"
                example_code: |
                    **Увага! Гэты код патрабуе адладкі!**
                    ```
                    прызначэнне {ask} Куды вы збіраецеся на святы?
                    {print} Самалёт у прзначэнне вылятае а 15-й гадзіне.
                    {ask} Вы ўжо здалі свой багаж?
                    {echo}
                    {print} Зараз я раздрукую ваш пасадачны талон.
                    {sleep}
                    Гатова! Прыемнага падарожжа!
                    ```
            3:
                story_text: "Вітаем у прыгодзе адладкі. Адладка кода азначае пазбаўленне ад памылак у кодзе.\nГэта значыць, што ў гэтых прыгодах мы пакажам табе код, які яшчэ не працуе.\nТабе трэба будзе высветліць, што не так, і выправіць памылкі.\n\n### Практыкаванне\nАдладзь гэты код. Поспехаў!"
                example_code: |
                    **Увага! Гэты код патрабуе адладкі!**
                    ```
                    варыянты_фільмаў {is} дракула, фарсаж, адзін дома, барбі
                    выбраны_фільм {is} фільмы {at} {random}
                    {print} Сёння ўвечары мы будзем глядзець выбраныя_фільмы
                    улюбёны {ask} Табе падабаецца гэты фільм?
                    {print} Заўтра мы паглядзім што-небудзь іншае.
                    {add} выбраны_фільм {to_list} варыянты_фільмаў
                    {print} Заўтра мы паглядзім заўтрашні_фільм
                    заўтрашні_фільм {is} варыянты_фільмаў {at} {random}
                    Пайду прынясу папкорн! {print}
                    ```
            4:
                story_text: "### Практыкаванне\nАдладзь гэты код. Поспехаў!"
                example_code: |
                    **Увага! Гэты код патрабуе адладкі!**
                    ```
                    {print} 'Вітаем у анлайн-бібліятэцы!
                    {ask} Які жанр кніг вам падабаецца?
                    {print} Вам падабаецца жанр
                    аўтар {is} {ask} 'Хто ваш любімы аўтар?'
                    {print} 'аўтар — ваш любімы аўтар'
                    {print} Хм... думаю, вам варта паспрабаваць... кнігі {at} {random}
                    ```
            5:
                story_text: "### Практыкаванне\nАдладзь гэты код. Поспехаў!"
                example_code: |
                    **Увага! Гэты код патрабуе адладкі!**
                    ```
                    {print} Вітаем у басейне Hedy!
                    сертыфікат {is} {ask} 'У вас ёсць сертыфікат па плаванні?'
                    {if} сертыфікат 'так' {print} 'Выдатна! Вы можаце плаваць у басейне!'
                    {print} {else} 'Вы можаце ўвайсці, але не плаваць.'
                    зніжка {is} {ask} 'Вам менш за 12 гадоў?'
                    {if} зніжка {is} так
                    {print} 'З вас $3,50'
                    'З вас $5,50'
                    {print} 'Прыемнага дня!'
                    ```
                answer_code: |
                    ```
                    {print} "Вітаем у басейне Hedy!"
