                    Завершы код, каб падлічыць, колькі ў цябе грошай і колькі часу яшчэ трэба адкладаць, каб купіць тое, што ты хочаш!
                    **Дадаткова** Магчыма, ты ўжо маеш крыху зэканомленых грошай? Аднімі гэтую суму ад сумы, якую табе трэба будзе адкласці.
