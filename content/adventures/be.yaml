            2:
                example_code: "```\nвыбар {is} _\n{print} Я выбіраю выбар\n```\n"
                story_text: "Цяпер, пасля вывучэння каманды `{ask}`, ты можаш зрабіць інтэрактыўнай таксама гульню \"камень, нажніцы, папера\"!\n\n### Практыкаванне\nЗрабі гульню \"камень, нажніцы, папера\" інтэрактыўнай, дадаўшы ў код каманду `{ask}` і пытанне.\n"
    dice:
        levels:
            3:
                example_code: "```\nварыянты {is} 1, 2, 3, 4, 5, чарвяк\n{print} Табе выпала: _ {at} {random} !\n```\n"
                example_code_2: "```\nварыянты {is} _\n```\n"
                story_text: "На гэтым узроўні мы можам выбіраць са спісу. Такім чынам, мы можам дазволіць камп'ютару выбраць адзін бок кубіка.\nЗірні на настольныя гульні, якія ёсць у цябе дома.\nЦі ёсць там гульні з (незвычайным) кубікам? Ты можаш скапіраваць яго з дапамогай гэтага кода.\nНапрыклад, вось кубік гульні Earthworms з лічбамі ад 1 да 5 і дажджавым чарвяком на ім.\n\n![Кубік ад Earthworms з лічбамі ад 1 да 5 і дажджавым чарвяком на ім](https://cdn.jsdelivr.net/gh/felienne/hedy@24f19e9ac16c981517e7243120bc714912407eb5/coursedata/img/dobbelsteen.jpeg)\n"
                story_text_2: "### Практыкаванне\nКубік у прыведзеным прыкладзе прызначаны для пэўнай гульні. Ці можаш ты зрабіць звычайны кубік?\nАбо іншы спецыяльны кубік з іншай гульні?\n"
            5:
                example_code: |
                    ```
                    варыянты {is} 1, 2, 3, 4, 5, чарвяк
                    спроба {is} варыянты {at} {random}
                    {print} 'Табе выпала: ' спроба
                    _ спроба {is} чарвяк {print} 'Можаш больш не кідаць.'
                    _ {print} 'Мусіш кінуць яшчэ раз!'
                    ```
                story_text: |
                    Прыменім каманды `{if}` і `{else}` і да нашых кубікаў!

                    ### Практыкаванне
                    Завяршы прыклад так, каб з'яўлялася паведамленне "Можаш больш не кідаць", калі выпадзе чарвяк. Калі выпадзе што-небудзь іншае, няхай з'яўляцца паведамленне "Мусіш кінуць яшчэ раз!"
                    **Дадаткова** Магчыма, ты хочаш стварыць кубік з зусім іншай гульні. Цудоўна! Тады прыдумай свае рэакцыі, напрыклад, "так" для 6 і "шкада" для чагосьці іншага.
            7:
                example_code: |
                    ```
                    варыянты = 1, 2, 3, 4, 5, чарвяк
                    ачкі = 0
                    спроба = варыянты {at} {random}
                    {print} 'Табе выпала: ' спроба
                    {if} спроба {is} чарвяк
                    ачкі = ачкі + 5
                    {else}
                    ачкі = ачкі + спроба
                    {print} 'Твае ачкі: ' ачкі
                    ```
                story_text: |
                    Можам зноў зрабіць кубік з чарвяком, але цяпер яшчэ можна падлічыць, колькі было выкінута ачкоў.
                    Магчыма, ты ведаеш, што ў гульні Earthworms чарвяк прыносіць 5 ачкоў. Цяпер пасля спробы можна адразу падлічыць, колькі ачкоў выкінуў гулец.
                    Вось код для падліку ачкоў на адным кубіку:

                    ### Практыкаванне
                    Ці можаш ты перапісаць код так, каб атрымаць агульны бал на 8 кубіках? Каб зрабіць гэта, трэба будзе скапіраваць і ўставіць некалькі радкоў кода.
    add_remove_command:
        levels:
            3:
                example_code: "```\nжывёлы {is} сабака, кот, зубр\nулюбёная {is} {ask} Якая твая любімая жывёла?\n{add} улюбёная {to_list} жывёлы\n{print} Мой выбар: жывёлы {at} {random}\n```\n"
                example_code_2: "```\nжывёлы {is} сабака, кот, зубр\nнялюбая {is} {ask} Якая тавя нелюбімая жывёла?\n{remove} нялюбая {from} жывёлы\n{print} Мой выбар: жывёлы {at} {random}\n```\n"
                story_text: "## {add} {to_list}\nЗ дапамогай каманды `{add} {to_list}` можна дадаць элемент у спіс. Каб зрабіць гэта, проста ўвядзі: `{add} пінгвін {to_list} жывёлы` або скарыстай каманду `{ask}`, як у прыкладзе.\n"
                story_text_2: "## {remove} {from}\nКалі можна дадаваць элементы ў спіс, то, вядома, таксама можна і выдаляць іх. Гэта робіцца камандай `{remove} {from}`.\n"
                example_code_3: "```\n{print} Таямнічы малочны кактэйль\nсмакі {is} клубніцы, шакалад, ваніль\nчаканы {is} {ask} Якога смаку ты чакаеш?\n_\nалергія {is} {ask} У цябе ёсць алергія на які-небудзь смак?\n_\n{print} Ты атрымліваеш кактэйль са смакам смакі {at} {random}\n```\n"
                story_text_3: "### Практыкаванне\nПаспрабуй новыя каманды ў гэтым віртуальным рэстаране. Дадай у спіс смак, які хоча атрымаць гулец, і выдалі тыя, на якія ў яго алергія.\n"
    dishes:
        name: хто мые посуд?
        levels:
            3:
                example_code: "```\nлюдзі {is} мама, тата, Стэфа, Андрусь\n{print} людзі {at} {random} сёння мые посуд\n```\n"
                story_text: "Вы заўсёды спрачаецеся дома наконт таго, хто сёння павінен мыць посуд або выносіць смецце?\nТады няхай камп'ютар зробіць справядлівы выбар. Ты можаш запраграмаваць гэта на гэтым узроўні!\n"
                story_text_2: "### Практыкаванне\nСтвары ўласную версію праграмы для мыцця посуду. Спачатку складзі спіс членаў сям'і.\nЗатым прыдумай задачу, а камп'ютар няхай вырашыць з дапамогай каманды `{at} {random}`, хто павінен яе выканаць.\n\n**Дадаткова** Табе ж не хочацца мыць посуд? Узламай праграму, выдаліўшы сваё імя са спісу з дапамогай каманды `{remove}` `{from}`.\n"
            4:
                example_code: |
                    ```
                    людзі {is} мама, тата, Стэфа, Андрусь
                    {print} _ сёння мые посуд _
                    {sleep}
                    {print} людзі {at} _
                    ```
                story_text: |
                    З дапамогай двукоссяў можна палепшаыць і праграму для мыцця посуду.

                    ### Практыкаванне
                    Спачатку запоўні прабелы правільнымі сімваламі або камандамі, каб праграма запрацавала.
                    Зразумела? Выдатна! Цяпер скапіруй код з папярэдняга ўзроўню і зрабі, каб ён працаваў на гэтым узроўні, дадаўшы двукоссі ў патрэбныя месцы.
            5:
                example_code: |
                    ```
                    людзі {is} мама, тата, Стэфа, Андрусь
                    пасуднік {is} людзі {at} {random}
                    _ пасуднік {is} Стэфа {print} _ шкада, што я мушу мыць посуд _
                    _ {print} 'маё шчасце, бо ' _ ' ужо мые посуд'
                    ```
                story_text: |
                    Дзякуючы камандзе `{if}` можна яшчэ больш забаўляцца з выбарам у праграме. Напрыклад, можна зрабіць, каб праграма рэагавала на выбар, зроблены камп'ютарам.
                    ### Практыкаванне
                    Скончы код так, каб ён выводзіў "шкада", калі надыходзіць твая чарга, а ў адваротным выпадку — «так!»?
                    Не забудзься пра двукоссі!
            7:
                story_text: |
                    Як часта кожны будзе мыць посуд? Ці справядліва атрымліваецца? На гэтым узроўні гэта можна падлічыць.
                example_code: |
                    ```
                    людзі = мама, тата, Стэфа, Андрусь
                    стэфа_мые = 0
                    пасуднік = людзі {at} {random}
                    {print} 'Зараз пасуднік — ' пасуднік
                    {if} пасуднік {is} Стэфа
                    стэфа_мые = стэфа_мые + 1
                    {print} 'Стэфа на гэтым тыдні мые посуд ' стэфа_мые ' разы(-оў)'
                    ```

                    Цяпер можаш скапіраваць радкі з 3 па 5 некалькі разоў (напрыклад, 7 разоў для цэлага тыдня).
                    Зробіш?
                example_code_2: |
                    ```
                    людзі = мама, тата, Стэфа, Андрусь
                    пасуднік = людзі {at} {random}
                    {print} 'У панядзелак посуд мые: ' пасуднік
                    {remove} пасуднік {from} людзі
                    пасуднік = людзі {at} {random}
                    {print} 'У аўторак посуд мые: ' пасуднік
                    {remove} пасуднік {from} людзі
                    ```
                story_text_2: |
                    Калі табе вельмі не пашанцуе, папярэдняя праграма можа выбраць цябе ў якасці пасудніка на ўвесь тыдзень! Гэта несправядліва!
                    Каб стварыць больш справядлівую сістэму, можна скарыстаць каманду `{remove}`, выдаляючы выбранага чалавека са спісу. Такім чынам, табе не прыйдзецца мыць посуд зноў, пакуль не прыйдзе чарга кожнага.

                    Панядзелак і аўторак ужо гатовыя! Ці можаш ты дадаць астатнюю частку тыдня?
                    І… ці можаш ты прыдумаць рашэнне на выпадак, калі спіс апусцее?
    hospital:
        name: шпіталь
        default_save_name: шпіталь
        description: Шпіталь
        levels:
            1:
                story_text: |
                    Вітаем у прыгодызе "Шпіталь". Тут ты будзеш дапамагаць дырэктару шпіталя вырашаць некаторыя праблемы, якія ўзнікаюць у яго шпіталі. Вось тваё першае заданне:

                    На стойцы рэгістрацыі жудасна доўгая чарга, а супрацоўнік вельмі заняты. Ці можаш ты дапамагчы гэтаму супрацоўніку, запраграмаваўшы кіёск самарэгістрацыі?
                    ### Практыкаванне
                    Кіёск самарэгістрацыі павінен:
                    * Павітацца з пацыентам
                    * Спытаць яго імя і паўтарыць яго
                    * Спытаць яго дату нараджэння і паўтарыць яе
                    * Спытаць, у якім аддзяленні ён запісаны на прыём
                    * Спытаць, да якога лекара ён запісаны на прыём
                    * Падзякаваць пацыенту за паспяховую рэгістрацыю
                    * Папрасіць пацыента заняць месца ў пакоі чакання
            4:
                story_text: |
                    Нашы медсёстры штодня выконваюць шмат задач. Адна з іх — ранкам абысці ўсіх пацыентаў і спытаць, што яны хацелі б з'есці на сняданак.
                    Ты можаш зменшыць нагрузку медсясцёр, стварыўшы праграму, у якой пацыенты выбіраюць сняданак і адпраўляюць заказ непасрэдна кухоннаму персаналу.
                    ### Практыкаванне
                    Праграма павінна:
                    * Папрасіць пацыента ўвесці сваё імя і нумар палаты
                    * Прывітаць пацыента па імені
                    * Паказаць усе стравы (бутэрброды, кашы, садавіна і г.д.) і напоі з меню
                    * Спытаць пацыента, што ён хацеў бы з'есці
                    * Спытаць яго, што ён хацеў бы выпіць
                    * Паўтарыць заказ пацыенту
                    * Падзякаваць пацыенту за заказ
                    * Сказаць яму, што заказ будзе дастаўлены ў ягоную палату праз 15 хвілін.
            5:
                story_text: |
                    Наш цэнтр лячэння апёкаў хоча зменшыць нагрузку на персанал, выкарыстоўваючы анлайн-інструмент для першаснай ацэнкі пацыентаў. Такім чынам пацыенты змогуць не толькі ўводзіць сваё імя і дату нараджэння, але і пазначыць, які ў іх апёк (першай, другой ці трэцяй ступені), а таксама атрымаць парады адносна далейшых дзеянняў.
                    Ці можаш ты ім дапамагчы?
                    ### Практыкаванне
                    Праграма павінна:
                    * Пачынацца з прывітання і простай рэгістрацыі імені пацыента і даты яго нараджэння.
                    * Правесці першасную ацэнку апёку. Калі скура толькі пачырванелая — апёк першай ступені. Калі ёсць пухіры — апёк другой ступені. Калі скура знікла, пачарнела або пабялела ў выніку апёку — апёк трэцяй ступені.
                    * Даць пацыенту адпаведныя рэкамендацыі. Першая ступень: Астудзіце апёк вадой і нанясіце крэм. Звяртацца да ўрача не трэба. Другая ступень: Урач вас агледзіць і прызначыць спецыяльны крэм. Калі ласка, пачакайце ў зоне чакання. Трэцяя ступень: Неадкладна звярніцеся ў рэгістратуру. Вам патрэбна медыцынская дапамога як мага хутчэй.
            6:
                story_text: |
                    Нашым акушэркам задаюць шмат пытанняў цяжарныя жанчыны пра тое, што можна, а чаго нельга есці падчас цяжарнасці. Ці можаш ты дапамагчы іх пацыенткам, стварыўшы праграму, якая паведамляе ім, ці бяспечная ежа?
                    ### Практыкаванне
                    Праграма павінна:
                    * Спытаць у пацыенткі, што яна хацела б з'есці.
                    * Правяраць, ці ёсць гэта ў спісе "небяспечных прадуктаў"
                    * Калі гэта ёсць у спісе небяспечных прадуктаў, паведамляць пацыентцы, што гэта небяспечна.
                    * Калі гэтага няма ў спісе, — паведамляць пацыентцы, што гэта, верагодна, бяспечна есці.
                    * Таксама папярэдзіць чалавека заўсёды кіравацца здаровым сэнсам, бо спіс можа быць не на 100% поўным. А яшчэ раіць заўсёды пазбягаць сырога мяса, рыбы, яек і алкаголю.
                    Падчас цяжарнасці небяспечна есці: сушы, крэветкі, тунец, блакітны сыр, тырамісу, сырыя яйкі, карпаччо, стэйк з крэветкамі, тартар.
    clear_command:
        levels:
            4:
                example_code: |
                    ```
                    {print} '3'
                    {clear}
                    {print} '2'
                    {clear}
                    {print} '1'
                    {clear}
                    {print} 'пачакай...'
                    {sleep} 3
                    {clear}
                    {print} 'СЮРПРЫЗ!'
                    ```
                story_text: |
                    Пара вывучыць новую каманду! `{clear}` ачысціць увесь тэкст на экране вываду. Такім чынам можна прадухіліць перапаўненне экрана тэкстам.
                    Увага! Пры выкарыстанні каманды `{clear}` табе можа спатрэбіцца яшчэ і `{sleep}` перад ёй. Інакш Hedy ачысціць экран так хутка, што ты не паспееш прачытаць тэкст! Гэта можна назіраць у прыкладзе.
    if_command:
        levels:
            5:
                example_code: |
                    ```
                    імя {is} {ask} 'Як цябе завуць?'
                    {if} імя {is} Хэдзі {print} 'Цудоўна' {else} {print} 'Ой, не!'
                    ```
                example_code_2: |
                    ```
                    імя {is} {ask} 'Як цябе завуць?'
                    {if} імя {is} Хэдзі {print} 'Цудоўна'
                    {else} {print} 'Ой, не!'
                    ```
                example_code_3: |
                    ```
                    адказ {is} {ask} '2 + 2 = ?'
                    _ _ _ 4 _ 'Малайчына!'
                    _ _ 'Не, 2 + 2 = 4'
                    ```
                story_text: |
                    ## Калі (if)... інакш (else)....
                    На 5-м узроўні з'яўляецца штосьці новае — `{if}`! З дапамогай `{if}` можна выбраць адзін з двух варыянтаў.
                    Гэты код друкуе "Цудоўна", калі ўвесці імя Хэдзі, і "Ой, не!", калі ўвесці нешта іншае.
