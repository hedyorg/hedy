                    З плюсам усё проста, ён пішацца як у матэматыцы: напрыклад, `5 + 5`. З мінусам таксама ўсё зразумела: `5 - 5`.

                    Множанне крыху адрозніваецца, бо на клавіятуры няма сімвала множання. Пашукай, яго сапраўды няма!
                    Вось чаму мы памнажаем з дапамогай зорачкі над 8: `5 * 5`. Чытай гэта як "5 разоў 5", каб лепш запомніць.
                example_code: |
                    ```
                    {print} '5 плюс 5 будзе ' 5 + 5
                    {print} '5 мінус 5 будзе ' 5 - 5
                    {print} '5 памножыць на 5 будзе ' 5 * 5
                    {print} '5 падзяліць на 5 будзе ' 5 / 5
                    ```
                example_code_2: |
                    ```
                    {print} 'Два з паловай плюс два з паловай будзе...'
                    {print} 2.5 + 2.5
                    ```
                example_code_3: |
                    ```
                    {print} 'Білет каштуе 2 талеры'
                    людзі = {ask} 'Колькі білетаў вам трэба?'
                    цана = людзі * 2
                    {print} 'З вас ' цана ' т., калі ласка'
                    ```
                story_text_2: |-
                    **Дзесятковыя лікі**
