    - contents: |-
        ### Exercice
        Un ordinateur ne fait pas juste les choses tout seul. Tu dois toujours lui donner des tâches. Ce genre de tâche est appelé une commande . Pour afficher du code, nous devons utiliser la commande «affiche».

        ### Afficher du texte
        Sur cet écran vous venez de voir la commande «Affiche».
        Une commande «Affiche» affiche un mot, lorsqu'il est entre guillemets. Par exemple 'Affiche bonjour'
        #### Exercice 1 : Prédire les retours
