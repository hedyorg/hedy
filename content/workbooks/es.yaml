        también se hace con el signo menos normal: `5 - 5`.\nCon las multiplicaciones
        puede parecer un poco diferente de lo habitual, utilizamos el asterisco (por
        encima del 8): `5 * 5`.\nLa división se hace con la barra diagonal: `5 / 5`.\n\
        \ \nTen en cuenta que el código matemático no necesita comillas."
      type: text
    - contents: "#### Ejercicio 1: Predice el resultado\n¿Cuál crees que será el resultado
        de estos programas?"
      type: text
