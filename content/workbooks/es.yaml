levels:
  1:
    intro: "### Imprimir y entrada\nAl final de esta lección, podrás:\n* Escribir
      código que imprima texto\n* Crear una historia con entrada"
    exercises:
    - contents: "### Ejercicios\nUn ordenador no hace algo por sí mismo. Siempre debes
        de darle una tarea a un ordenador. Dicha tarea se denomina comando. Para imprimir
        el código, utilizamos el comando `imprimir`.\n\n### Imprimir texto\nEn la
        pantalla acabas de leer el comando `imprimir`.\nUn comando `imprimir` imprime
        una palabra, cuando está entre comillas. Por ejemplo `imprimir hola`.\n#####
        Ejercicio 1: Predecir el resultado"
      type: text
    - code: imprimir Hola a todos
      answer: Hola a todos
      lines: '1'
      type: output
    - code: imprimir Buenos días
      answer: Buenos días
      lines: '1'
      type: output
    - página-nueva

    - contents: "#### Ejercicio 2: ¿Error?\nA veces se cuela un error en tu código.
        No es gran cosa, pero Hedy no puede leer correctamente tu código.\n¿Cuál de
        estos programas piensas que está mal?"
      type: text
    - code: prnt ¡Hola a todos!
      answer: Incorrecto
      options:
      - Derecho
      - Incorrecto
      type: MC-code
    - code: imprimir imprimir
      answer: Derecho
      options:
      - Derecho
      - Incorrecto
      type: MC-code
    - contents: "### Pedir información\n\nSolo el texto es un poco aburrido. También
        puedes pedir _entrada_ en Hedy. Entrada es el texto que le das al ordenador.\n\
        \ El ordenador recuerda ese texto y te lo puede mostrar más tarde.\nEste código
        muestra la pregunta '¿Cómo te llamas?'\n\n```hedy\npreguntar ¿Cómo te llamas?\n\
        \ ```\n\n### Mostrar la entrada\n\nEl comando preguntar guarda la respuesta,
        pero no la muestra todavía. Para eso necesitarás el comando `eco`. `eco` mostrará
        la respuesta al final de la frase.\nAsí:\n\n```hedy\npreguntar ¿cómo te llamas?\n\
        \ eco así que te llamas:\n```\n\nSi alguien llamado Olivia usara este código,
        el resultado sería:\n\n```hedy\nasí que te llamas Olivia\n```\n\nTen en cuenta
        que el ordenador imprimirá el texto exactamente como lo has introducido. Por
        tanto, ¡con los dos puntos y el mismo uso de mayúsculas o minúsculas!\n\n\
        \ #### Ejercicio 3: Predecir el resultado\n\nPredice el resultado de estos
        programas. Imagina que has introducido tu propio nombre."
      type: text
    - code: "preguntar ¿cómo te llamas?\neco así que te llamas:"
      answer: 'así que tu nombre es: **name**'
      lines: '2'
      type: output
    - code: "preguntar ¿Cómo te llamas?\neco Encantado de conocerte,"
      answer: Encantado de conocerte, **nombre**
      lines: '2'
      type: output
    - contents: "#### Ejercicio 4: Vocabulario de programación\n\nEn cada lección
        vamos a aprender palabras nuevas, incluso en esta lección. ¿Sabes qué significan
        estos términos? Explícalo con tus propias palabras."
      type: text
    - answer: Una tarea que le darás al ordenador, p. ej., imprimir.
      lines: '1'
      type: define
      word: comando
    - answer: Lo que escribes en el ordenador cuando Hedy muestra una pantalla 
        de pregunta
      lines: '1'
      type: define
      word: entrada
    - answer: Lo que Hedy muestra en la pantalla de la derecha después de que 
        hayas pulsado el botón 'ejecutar código'.
      lines: '1'
      type: define
      word: resultado
    - contents: "#### Ejercicio 5: Comandos\n\nYa hemos aprendido 3 comandos: `imprimir`,
        `preguntar` y `eco`. ¿Qué hacen? Explícalo con tus propias palabras."
      type: text
    - answer: Muestra texto por pantalla.
      lines: '1'
      type: define
      word: el comando `imprimir`
    - answer: Pide al usuario que introduzca datos.
      lines: '1'
      type: define
      word: el comando `preguntar`
    - answer: Repite los datos introducidos por el usuario.
      lines: '1'
      type: define
      word: el comando `eco`
  2:
    intro: "### Variables\nAl final de esta lección, puedes:\n* Guardar algo en una
      variable\n* Crear una historia o dibujar utilizando variables"
    exercises:
    - code: "nombre es Mo\nimprimir nombre"
      contents: "### Uso de variables\n\nAcabas de ver el comando `es` en la pantalla.\n\
        \ Un comando `es` guarda algo en la memoria del ordenador y le asigna un nombre.
        Lo llamamos variable.\nLo que se guarda en la variable se llama valor de la
        variable."
      type: text
    - contents: '#### Ejercicio 1: Marca el fragmento de código correcto'
      type: text
    - code: "nombre es Hedy\nimprimir Hola nombre\nedad es 17\nimprimir Tienes edad
        años"
      answer: En todas las líneas
      goal: variables
      type: círculo
    - code: "nombre es Hedy\nimprimir Hola nombre\nedad es 17\nImprimir Tienes edad
        años"
      answer: Líneas 1 & 3
      goal: lugares donde se **establece** la variable
      type: círculo
    - code: "nombre es Hedy\nimprimir Hola nombre\nedad es 17\nimprimir Tienes edad
        años"
      answer: Líneas 2 y 4
      goal: lugares donde las variables se **utilizan**
      type: círculo
    - contents: "##### Ejercicio 2: Predecir el resultado\nConsejo: ¿Te cuesta predecir
        el resultado? Sigue estos pasos:\n\n1. Marcar el lugar donde se establece
        una variable\n2. Marcar el lugar donde se utiliza una variable\n3. Trazar
        una línea entre estos dos lugares\n4. Escriba el valor (lo que viene después
        de `es`) en el lugar donde se utiliza la variable."
      type: text
    - code: "nombre es Mo\nimprimir ¡Buen trabajo nombre!"
      answer: ¡Gran trabajo Mo!
      lines: '1'
      type: output
    - code: "nombre es Mo\nimprimir ¡Gran trabajo Mo!"
      answer: ¡Gran trabajo Mo!
      lines: '1'
      type: output
    - code: "primer_nombre es Layla\nimprimir ¡Buenos días primer_nombre!"
      answer: ¡Buenos días Layla!
      lines: '1'
      type: output
    - contents: "#### Ejercicio 3: ¿Error?\nLee los programas cuidadosamente ¿Cuáles
        son los correctos?"
      type: text
    - code: "apellido es Johnson\nimprimir ¡Buenos días apellido!"
      answer: Correcto
      options:
      - Correcto
      - Incorrecto
      type: MC-code
    - code: "nombre es\nimprimir ¡Buenos días, nombre!"
      answer: Incorrecto. Nombre no está establecido.
      options:
      - Correcto
      - Incorrecto
      type: MC-code
    - code: "nombre es Johnson\nimprimir ¡Buenos días mr nombre!\nimprimir ¡Hola mr
        nombre!"
      answer: Correcto. Se permite que utilices una variable varias veces.
      options:
      - Correcto
      - Incorrecto
      type: MC-code
    - code: nombre es preguntar ¿Cómo te llamas?
      contents: "### Pedir información\n\nSolo guardar texto no es muy útil. En el
        nivel 1 hemos visto el comando `preguntar`.\n\nDesde ahora se permite que
        combines `preguntar`con `es`, tal que así:"
      type: text
    - code: "nombre es preguntar ¿Cómo te llamas?\nimprimir así que te llamas: nombre"
      contents: "### Mostrar entrada\nCon las variables, ya no necesitamos más `eco`.
        Simplemente utiliza `imprimir` para mostrar la respuesta."
      type: text
    - contents: "Si alguien llamado Olivia utilizase este código, el resultado sería:
        `así que te llamas: Olivia`\n### Ejercicio 4: Predecir el resultado\nPredice
