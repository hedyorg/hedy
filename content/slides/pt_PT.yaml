levels:
    0:
        1:
            header: Bem-vindo(a) ao Hedy!
            text: Hedy é uma linguagem de programação.
        2:
            header: Programar
            text: |-
                Programar é dar instruções ao computador, usando a linguagem do computador.

                Uma linguagem como esta é chamada de "linguagem de programação".
        3:
            header: Linguagem de programação
            text: |-
                Talvez já sabes algo de linguagens de programação?
                Alguns exemplos são:
                * Scratch
                * Python
                * HTML
        4:
            header: Programar
            text: |-
                Se consegues programar, podes fazer algumas coisas bem divertidas:
                * Construir histórias interactivas
                * Criar desenhos no computador e desenhá-los no papel ou em tecido
                * Construir as tuas próprias apps e usá-las no teu telemóvel
        5:
            header: Programar em Hedy
            text: Em Hedy usamos códigos especiais, tal como `{print}`.
            code: '{print} Bem-vindo(a) a Hedy!'
        6:
            header: Programar em Hedy
            text: Palavras de código vão aparecer em rosa.
            code: '{print} Bem-vindo(a) a Hedy!'
        7:
            header: Programar em Hedy
            text: Para dar início ao código nós usamos o botão Correr por baixo do código.
            code: '{print} Bem-vindo(a) a Hedy!'
        8:
            header: Programar em Hedy
            text: O Output aparece do lado direito.
            code: '{print} Bem-vindo(a) a Hedy!'
        9:
            header: Programar em Hedy
            text: O output também pode ser um desenho.
            code: |-
                {forward} 100
                {turn} {left}
    1:
        2:
            header: 'Hedy level 1: {print}'
            text: |-
                O primeiro código que pode usar no nível 1 é `{print}`.

                `{print}` é usado para mostrar texto no ecrã.
            code: '{print} Mostrar texto no ecrã'
        3:
            header: 'O comando {print}'
            text: |-
                The second code that you can use in level 1 is `{ask}`.

                `{ask}` is used to ask a question that can be answered.
            code: |-
                {print} Welcome to your own rock scissors paper!
                {ask} What will you choose?
        4:
            header: 'Hedy level 1: {echo}'
            text: |-
                The final text code that you can use in level 1 is `{echo}`.

                `{echo}` is used to repeat the answer of an `{ask}`.
            code: |-
                {print} Hello!
                {ask} What is your name?
                {echo} hello
        5:
            header: Programming!
            text: |-
                with `{print}`, `{ask}` and `{echo}` you can already create a little story.
                This is a good time to try the Parrot, Story and Rock, Paper Scissors adventures.
            code: |-
                {print} Olá!
                {ask} Qual é o seu nome?
                {echo} olá
        6:
            text: Adventures are shown in tabs.
            header: A programar!
        7:
            text: The yellow arrow buttons can be used to copy examples.
            editor: /hedy#print_command
            header: A programar!
        8:
            header: A programar!
            text: Os botões amarelos com setas podem ser usados para copiar exemplos.
        9:
            header: 'A desenhar com a tartaruga'
            text: '`{forward}` is used to move the turtle forward.'
        11:
            code: |-
                {forward} 50
                {turn} left
            header: 'A desenhar com a tartaruga: {turn}'
            text: '`{turn}` é usado para fazer a tartaruga virar à direita ou à esquerda.'
        1:
            header: Bem-vindo(a) ao nível 1!
            text: |-
                Vamos começar o nível 1 fazendo uma história em Hedy!

                Vamos precisar de três códigos para criar histórias interativas.
        10:
            header: 'A desenhar com a tartaruga: {forward}'
            text: '`{forward}` é usado para mover a tartaruga adiante.'
        12:
            header: A depurar
            text: Depurar código significa livrar-se de erros e problemas no programa. Vamos depurar este código juntos. Clique na joaninha para iniciar o depurador.
            code: |-
                Sou a DJ Hedy
                {print} Que música gostaria de escutar?
                {ask} Também gosto dessa música!
                {print} A seguir... {echo}
        13:
            header: Que a diversão de programar comece!
            text: Aproveite as aventuras do nível 1!
    2:
        3:
            text: |-
                We can also set a variable by asking questions.

                The answer to the question is stored in the variable.

                This way we don't need the `{echo}`  command.
            code: |-
                nome {is} {ask} Qual é o seu nome?
                {print} Olá nome
        4:
            text: Agora que usamos variáveis, podemos usar várias delas ao invés de ter um só comando `{echo}`.
            header: Múltiplas variáveis
            code: |-
                nome {is} {ask} Qual é o seu nome?
                {print} Olá nome
                idade {is} {ask} Quantos anos tem?
                {print} nome tem idade anos.
        1:
            header: Bem-vindo(a) ao nível 2
            text: |-
                Neste nível, irá aprender a usar variáveis.

                Uma variável é uma palavra que pode ser usada para guardar uma informação.

                Por exemplo: um nome, uma idade ou uma equipa favorita.
        2:
            header: Variáveis
            text: Para criar ou 'definir' uma variável, usamos o comando `{is}`
            code: |-
                nome {is} Hedy
                idade {is} 15
                {print} nome tem idade anos
        5:
            header: Durma
    3:
        1:
            header: Bem-vindo(a) ao nível 3
        8:
            text: Aproveite as aventuras do nível 3!
    4:
        9:
            header: Ready, Set, Go!
            text: Enjoy the adventures in level 4!
