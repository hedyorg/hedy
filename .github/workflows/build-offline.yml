name: Build offline Hedy
on:
  # Can be run on-demand
  workflow_dispatch: {}

  # Runs when 'deploy to prod' runs
  workflow_run:
    workflows: ["Deploy to hedy.org"]
    types: [requested]
    branches:
      - 'main'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Set up NodeJS 18
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
    - name: 'Install npx'
      run: npm install -g npx
    - run: pip install -r requirements.txt
      name: 'Python requirements'
    - run: doit run _offline
    - name: Smoke test the build
      run: cd dist && offlinehedy/run-hedy-server --smoketest

    - uses: fregante/daily-version-action@v2
      name: Create tag if necessary
      id: daily-version

    # Replace the existing "Create zip file" / verification / upload steps with these steps.
    - id: create_zip
      name: Create zip file (robust)
      shell: powershell
      run: |
        $ver = '${{ steps.daily-version.outputs.version }}'
        Write-Host "daily-version.outputs.version = '$ver'"
        if ([string]::IsNullOrEmpty($ver)) {
          Write-Host "Version is empty — falling back to timestamp"
          $ver = (Get-Date -Format "yyyyMMddHHmmss")
        }

        # Ensure workspace
        Write-Host "GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE"
        Set-Location $env:GITHUB_WORKSPACE

        # Ensure source exists
        if (-Not (Test-Path -Path 'dist/offlinehedy')) {
          Write-Error "dist/offlinehedy does not exist; cannot create zip"
          exit 1
        }

        # Create zip at repo root with predictable name and force overwrite if present
        $dest = Join-Path $env:GITHUB_WORKSPACE ("offlinehedy-$ver.zip")
        if (Test-Path $dest) { Remove-Item $dest -Force }
        Compress-Archive -Path "dist/offlinehedy\*" -DestinationPath $dest -Force

        Write-Host "Created zip at: $dest"
        Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter 'offlinehedy-*.zip' | ForEach-Object { Write-Host $_.FullName }

        # Set step output for the zip filename so other steps can reference it
        $zipname = (Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter 'offlinehedy-*.zip' | Select-Object -First 1).Name
        if ($null -ne $zipname) {
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip-file=$zipname"
        } else {
          Write-Error "zip not found after Compress-Archive"
          exit 1
        }

    - id: verify_zip
      name: Verify zip created
      shell: powershell
      run: |
        Write-Host "version = '${{ steps.daily-version.outputs.version }}'"
        Write-Host "zip-file output from create_zip: ${{ steps.create_zip.outputs.zip-file }}"
        Write-Host "Listing zip files in workspace:"
        Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter 'offlinehedy-*.zip' | ForEach-Object { Write-Host $_.FullName }

    - name: Upload release asset
      if: ${{ steps.daily-version.outputs.created == 'true' && steps.create_zip.outputs.zip-file != '' }}
      uses: shogo82148/actions-upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.workspace }}/\${{ steps.create_zip.outputs.zip-file }}
        asset_name: ${{ steps.create_zip.outputs.zip-file }}
        asset_content_type: application/zip
