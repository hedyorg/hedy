name: Build offline Hedy
on:
  # Can be run on-demand
  workflow_dispatch: {}

  # Runs when 'deploy to prod' runs
  workflow_run:
    workflows: ["Deploy to hedy.org"]
    types: [requested]
    branches:
      - 'main'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Set up NodeJS 18
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
    - name: 'Install npx'
      run: npm install -g npx
    - run: pip install -r requirements.txt
      name: 'Python requirements'
    - run: doit run _offline
    - name: Smoke test the build
      run: cd dist && offlinehedy/run-hedy-server --smoketest

    - uses: fregante/daily-version-action@v2
      name: Create tag if necessary
      id: daily-version

    - name: Create zip file
      # Because we're on Windows
      run: |
        cd dist/offlinehedy &&  Compress-Archive -Path . -Destination ../../offlinehedy-${{ steps.daily-version.outputs.version }}.zip

    - name: Debug zip after creation
      shell: pwsh
      run: |
        $expectedZip = "offlinehedy-${{ steps.daily-version.outputs.version }}.zip"
        Write-Host "Expected zip file: $expectedZip"
        Write-Host "Working directory: $(Get-Location)"
        Write-Host "Root directory listing:"
        Get-ChildItem -Force | Format-Table -AutoSize
        Write-Host "dist directory listing (if present):"
        if (Test-Path dist) {
          Get-ChildItem -Recurse -File dist | Select-Object FullName | Format-Table -AutoSize
        } else {
          Write-Host "dist directory does not exist"
        }
        if (Test-Path $expectedZip) {
          Write-Host "Zip created successfully at workspace root"
        } else {
          Write-Error "Expected zip not found at workspace root"
        }


    - if: steps.daily-version.outputs.created
      name: Create Release
      uses: shogo82148/actions-create-release@v1
      id: create_release
      with:
        tag_name: ${{ steps.daily-version.outputs.version }}
        generate_release_notes: true

    - name: Debug zip visibility before upload
      if: steps.daily-version.outputs.created
      shell: pwsh
      run: |
        $expectedZip = "offlinehedy-${{ steps.daily-version.outputs.version }}.zip"
        Write-Host "Upload step runs from: $(Get-Location)"
        Write-Host "Zip files matching *.zip in workspace root:"
        Get-ChildItem -Path . -Filter *.zip -File | Select-Object Name, FullName, Length | Format-Table -AutoSize
        Write-Host "Does expected zip exist? $(Test-Path $expectedZip)"

    - name: Upload Assets
      if: steps.daily-version.outputs.created
      uses: shogo82148/actions-upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: '*.zip'
